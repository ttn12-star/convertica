services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: convertica_db
    # Apply tuning via -c flags (env vars POSTGRES_* are NOT recognized by postgres).
    # shared_buffers: 300MB (was 256MB) – more pages stay in memory.
    # work_mem: 24MB (was 8MB) – faster sorts/hash joins per query.
    # effective_cache_size: 768MB – planner hint for index vs. seq-scan.
    command: >
      postgres
      -c shared_buffers=300MB
      -c work_mem=24MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=768MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-convertica}
      POSTGRES_USER: ${POSTGRES_USER:-convertica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-convertica}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    networks:
      - convertica_network
    restart: unless-stopped

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    container_name: convertica_redis
    # maxmemory increased to 240mb (from 200mb) — stays within 256MB container limit.
    # volatile-lru: evict only keys that have a TTL set (cache hits) rather than
    # evicting Celery task results that have no TTL (broker list entries).
    # NOTE: Celery result_expires=7200 sets a TTL on results, so they can still be
    # evicted under heavy pressure, but at least broker queue entries are protected.
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 240mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - convertica_network
    restart: unless-stopped

  # Nginx for static files and reverse proxy (with Brotli compression)
  nginx:
    build:
      context: .
      dockerfile: ci/nginx.Dockerfile
    container_name: convertica_nginx
    volumes:
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
      - ./ci/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    # IMPORTANT: Using service_started instead of service_healthy to avoid deadlock
    # when web crashes - nginx should start independently and show 502 if web is down
    depends_on:
      web:
        condition: service_started
    healthcheck:
      # Check nginx is responding (health endpoint is served directly by nginx)
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--header=Host: convertica.net", "http://127.0.0.1/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M
    labels:
      - "autoheal=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - convertica_network
    restart: unless-stopped

  # Django Web Application
  web:
    build:
      context: .
      dockerfile: ci/Dockerfile
    container_name: convertica_web
    # Fast startup: only migrate + server. Static files built separately via 'make build-static'
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 utils_site.asgi:application"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
    ports:
      # Bind only to localhost to prevent direct public access bypassing nginx.
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 768M
        reservations:
          cpus: '0.3'
          memory: 384M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # --max-time bounds the curl probe itself so a hung Django doesn't
      # consume the full container timeout before the orchestrator notices.
      test: ["CMD", "curl", "-f", "--max-time", "5", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      - "autoheal=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - convertica_network
    restart: unless-stopped

  # unoserver — keeps LibreOffice warm for fast office document conversions.
  # Word/Excel/PPT → PDF conversions call this via HTTP instead of spawning a
  # new LibreOffice subprocess (cold start ~10-15s) each time.
  # Falls back automatically to subprocess if this service is unavailable.
  unoserver:
    image: ghcr.io/unoserver/unoserver:latest
    container_name: convertica_unoserver
    expose:
      - "2003"
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 750M
        reservations:
          cpus: '0.2'
          memory: 300M
    healthcheck:
      # unoserver 2.x returns 200 on GET /
      test: ["CMD-SHELL", "curl -sf http://localhost:2003/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s  # LibreOffice takes ~30-60s to warm up
    labels:
      - "autoheal=true"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - convertica_network
    restart: unless-stopped

  # Celery Worker - optimized for 4GB server (2 vCPU)
  # Memory reduced from 2.2G to 1.5G because LibreOffice now runs in unoserver,
  # not as a subprocess inside the worker.
  # Queues: fast (priority) → regular → maintenance → default
  # "fast" queue handles quick PDF-only ops (compress, split, merge, rotate, etc.)
  # so they don't wait behind long Word/Excel→PDF conversions in "regular".
  celery:
    build:
      context: .
      dockerfile: ci/Dockerfile
    container_name: convertica_celery
    command: celery -A utils_site worker --loglevel=info --concurrency=2 --pool=prefork -Q fast,regular,maintenance,default
    deploy:
      resources:
        limits:
          cpus: '1.3'
          memory: 1.5G  # Reduced from 2.2G (no LibreOffice subprocess overhead)
        reservations:
          cpus: '0.5'
          memory: 700M
    volumes:
      - ./logs:/app/logs
      - ./media:/app/media
    env_file:
      - .env
    environment:
      - CELERY_WORKER_POOL=prefork
      - CELERY_WORKER_MAX_MEMORY_PER_CHILD=300000000  # 300MB per worker
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=50
      - UNOSERVER_URL=http://unoserver:2003
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A utils_site inspect ping -d celery@$$HOSTNAME || exit 0"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 30s
    labels:
      - "autoheal=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - convertica_network
    restart: unless-stopped

  # Premium Celery Worker (minimal resources until more premium users)
  celery-premium:
    build:
      context: .
      dockerfile: ci/Dockerfile
    container_name: convertica_celery_premium
    command: celery -A utils_site worker --loglevel=info --concurrency=1 --pool=solo -Q premium
    deploy:
      resources:
        limits:
          cpus: '0.5'  # Reduced from 1.0
          memory: 1G   # Reduced from 1.5G
        reservations:
          cpus: '0.25'  # Reduced from 0.5
          memory: 512M  # Reduced from 768M
    volumes:
      - ./logs:/app/logs
      - ./media:/app/media
    env_file:
      - .env
    environment:
      - CELERY_WORKER_POOL=solo
      - CELERY_WORKER_MAX_MEMORY_PER_CHILD=200000000  # 200MB (reduced)
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=50  # Increased for stability
      - UNOSERVER_URL=http://unoserver:2003
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A utils_site inspect ping -d celery@$$HOSTNAME || exit 0"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 30s
    networks:
      - convertica_network
    restart: unless-stopped

    profiles: ["premium"]


  # Celery Beat (scheduled tasks)
  celery-beat:
    build:
      context: .
      dockerfile: ci/Dockerfile
    container_name: convertica_celery_beat
    command: celery -A utils_site beat --loglevel=info
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M  # Increased from 64M - Django import needs memory at startup
        reservations:
          cpus: '0.05'
          memory: 128M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Check if celery beat process is running
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "autoheal=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - convertica_network
    restart: unless-stopped

  # Autoheal - automatically restarts unhealthy containers
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: convertica_autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=120
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - convertica_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  convertica_network:
    driver: bridge
