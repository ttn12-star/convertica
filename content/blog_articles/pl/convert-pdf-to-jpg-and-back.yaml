meta_description_pl: "Skonwertuj PDF na obrazy JPG i odbuduj PDF ze zdjęć, w prawidłowy sposób. Ustawienia rozdzielczości, kiedy wybrać zamiast tego PNG i jak zachować kolejność stron."
