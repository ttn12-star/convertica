  <p>Na taki właśnie kompromis idzie Convertica: jest zoptymalizowana pod osobę pracującą z PDF od czasu do czasu, która nie chce zarządzać kontem ani limitem, a nie pod profesjonalistę chcącego pakietu klasy desktopowej.</p>

