content_pl: |
  Favicon to najmniejszy element twojej marki, a zarazem ten, który ludzie widzą najczęściej. Siedzi w karcie przeglądarki, na pasku zakładek, obok nazwy strony w wynikach wyszukiwania i na ekranie telefonu, kiedy ktoś zapisze twoją stronę. Dobrego favicona nikt nie zauważa. Za to brakującego, rozmytego albo tej szarej kuli ziemskiej, którą przeglądarka pokazuje, gdy ikony w ogóle nie dodałeś, nie da się przeoczyć. Stworzenie porządnego favicona zajmuje kilka minut, gdy już wiesz, czego naprawdę oczekują współczesne przeglądarki i urządzenia. Oto pełny obraz i najszybsza droga przez cały proces.

  <h2>Czym właściwie jest favicon</h2>

  <p>Favicon, czyli skrót od "favorite icon" (ulubiona ikona), to mały kwadratowy obrazek reprezentujący stronę. Narodził się pod koniec lat 90. jako pojedynczy plik 16x16 pikseli o nazwie favicon.ico i przez długi czas na tym się kończyło. Już tak nie jest. Dzisiaj to samo małe logo musi wyglądać ostro w karcie przeglądarki na laptopie o wysokiej rozdzielczości, w zakładce, na ekranie iPhone'a w rozmiarze 180 pikseli, na urządzeniu z Androidem, wewnątrz instalowalnej aplikacji webowej, a czasem obok twojego wpisu w wyszukiwarce. Każde z tych miejsc oczekuje innego rozmiaru, a niektóre wymagają konkretnej nazwy pliku.</p>

  <p>Dlatego rada sprzed lat "wystarczy wgrać ikonę 16x16" daje dziś rozmytą papkę. Malutki obrazek rozciągnięty do ikony ekranu głównego o rozmiarze 180 pikseli wygląda miękko i pikselowato. Właściwe podejście to zacząć od jednego dużego, czystego obrazu i wyprodukować z niego niewielki zestaw plików o poprawnych rozmiarach.</p>

  <h2>Dlaczego jeden rozmiar to już za mało</h2>

  <p>Różne miejsca sięgają po różne ikony. Kiedy zrozumiesz, gdzie trafia każda z nich, lista rozmiarów poniżej wyda się logiczna, a nie wzięta z sufitu:</p>

  <ul>
    <li><strong>Karty przeglądarki i zakładki</strong> korzystają z klasycznego favicona, zwykle w rozmiarze 16x16 albo 32x32, przy czym 32 jest preferowane na nowoczesnych ekranach o wysokim DPI.</li>
    <li><strong>Ekrany główne iPhone'a i iPada</strong> używają apple-touch-icon o rozmiarze 180x180, gdy ktoś doda twoją stronę do ekranu głównego.</li>
    <li><strong>Android i instalowalne aplikacje webowe (PWA)</strong> korzystają z ikon 192x192 i 512x512 zdefiniowanych w małym pliku manifestu.</li>
    <li><strong>Windows i wyświetlacze o wyższej rozdzielczości</strong> zyskują na pośrednich rozmiarach, takich jak 48, 64, 96, 128 i 256, dzięki którym ikona nigdy nie jest skalowana daleko od natywnego rozmiaru.</li>
    <li><strong>Wyniki wyszukiwania</strong> mogą pokazać twój favicon obok tytułu strony, co po cichu wzmacnia markę przy każdym wpisie.</li>
  </ul>

  <h2>Rozmiary favicon, których naprawdę potrzebujesz w 2026 roku</h2>

  <p>Nie musisz zgadywać ani generować setek plików. Oto praktyczny zestaw, który obsługuje każdą popularną przeglądarkę i urządzenie, i który dokładnie odpowiada temu, co daje ci dobry generator:</p>

