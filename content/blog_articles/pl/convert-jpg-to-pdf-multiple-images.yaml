content_pl: |
  Telefony zrobiły z każdego z nas operatora skanera: tu sfotografowana umowa, tam trzy paragony, do tego tablica z ostatniego spotkania. Problem zaczyna się przy dostarczaniu. Nikt nie chce dostać jedenastu luźnych JPG-ów w wątku mailowym — wszyscy chcą jednego PDF-a, ze stronami po kolei, który poprawnie się drukuje. Ten przewodnik pokazuje, jak dokładnie to uzyskać — za darmo i bez instalowania czegokolwiek.

  <h2>Przekonwertuj jeden JPG — albo scal do 50 w jeden PDF</h2>

  <figure><img src="/static/blog/images/tool-jpg-to-pdf-hero.jpg" alt="Ekran wgrywania konwertera JPG na PDF Convertica" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Otwórz konwerter <a href="/pl/jpg-to-pdf/">JPG na PDF</a> i dodaj obrazy. Jeden plik daje jednostronicowy PDF; wiele plików jest scalanych w jeden dokument — jeden obraz na stronę, do 50 obrazów na jedno zlecenie.</li>
    <li><strong>Kolejność ma znaczenie:</strong> obrazy stają się stronami w kolejności dodawania. Nazwij pliki <em>01.jpg, 02.jpg, 03.jpg</em>, zanim je wybierzesz, a kolejność stron zadba o siebie sama.</li>
    <li>W razie potrzeby ustaw suwak jakości (więcej o tym poniżej), a następnie kliknij <strong>Konwertuj</strong>.</li>
    <li>Pobierz gotowy PDF — bez znaku wodnego, bez rejestracji.</li>
  </ol>

  <p>Każdy obraz trafia na stronę A4, wyśrodkowany, z odpowiednimi marginesami, więc wynik wygląda jak dokument, a nie jak zrzut zdjęć. Fotografie pionowe i poziome mieszczą się automatycznie — obraz jest skalowany do strony, nigdy przycinany.</p>

  <h2>Wybór właściwego ustawienia jakości</h2>

  <figure><img src="/static/blog/images/tool-jpg-to-pdf-options.jpg" alt="Opcje jakości w konwerterze JPG na PDF" width="1280" height="800" loading="lazy"></figure>

  <p>Regulacja jakości (60-95, domyślnie 85) decyduje, jak mocno obrazy są rekompresowane wewnątrz PDF-a:</p>

  <ul>
    <li><strong>85 (domyślnie)</strong> — właściwe niemal do wszystkiego. Dokumenty pozostają czytelne, zdjęcia czyste, a rozmiar pliku rozsądny.</li>
    <li><strong>90+</strong> — dla zdjęć, które muszą przetrwać oględziny z bliska: prace do portfolio, zdjęcia produktów, wszystko, co może być drukowane w dużym formacie. Przy 90 i wyżej konwerter pomija też rekompresję obrazów, które już są czystymi JPG-ami, zachowując oryginalne piksele.</li>
    <li><strong>60-75</strong> — dla wyniku przyjaznego e-mailowi, gdy zdjęcia źródłowe są ogromne. Dziesięć zdjęć z telefonu po 12 MP przy wysokiej jakości łatwo robi 30 MB PDF-a; obniżenie suwaka to ujarzmia.</li>
  </ul>

  <p>Jeśli PDF i tak wychodzi za ciężki na limit załącznika, przepuść go potem przez <a href="/pl/pdf-organize/compress/">Kompresuj PDF</a> — połączenie umiarkowanej jakości i kompresji sprowadza większość fotograficznych PDF-ów poniżej typowych limitów poczty.</p>

  <h2>Do czego ludzie naprawdę tego używają</h2>

  <ul>
    <li><strong>Rozliczenia wydatków.</strong> Miesiąc papierowych paragonów sfotografowanych i scalonych w jeden PDF archiwizuje się o niebo lepiej niż folder luźnych obrazków — a księgowość ci podziękuje.</li>
    <li><strong>Sfotografowane dokumenty.</strong> Umowa lub formularz fotografowany telefonem strona po stronie staje się jednym, uporządkowanym dokumentem gotowym do druku.</li>
    <li><strong>Prace zaliczeniowe i zgłoszenia.</strong> Wiele portali przyjmuje dokładnie jeden plik. Dziesięć sfotografowanych stron, jedno pole przesyłania — to jest rozwiązanie.</li>
    <li><strong>Portfolio i moodboardy.</strong> Wyselekcjonowany zestaw obrazów w ustalonej kolejności, odporny na komunikatory, które rekompresują i tasują pliki.</li>
    <li><strong>Archiwizacja.</strong> Strony PDF z datą w nazwie pliku biją rolkę aparatu, gdy dwa lata później szukasz tego jednego paragonu.</li>
  </ul>

  <h2>Czyste wyniki ze zdjęć z telefonu</h2>

  <ul>
    <li>Fotografuj dokumenty prostopadle i wypełniaj kadr — obraz trafia na stronę takim, jaki jest, więc przekrzywione zdjęcie pozostaje przekrzywione.</li>
    <li>Równomierne, rozproszone światło bije lampę błyskową. Odblask na błyszczącym papierze to najczęstszy powód, dla którego sfotografowana strona jest nieczytelna w druku.</li>
    <li>Przytnij zbędne elementy (krawędzie stołu, palce) przed konwersją; strona powinna zawierać dokument, a nie scenę wokół niego.</li>
    <li>Zdjęcia z iPhone'a w formacie HEIC? Najpierw przekonwertuj je na JPG narzędziem <a href="/pl/image/heic-to-jpg/">HEIC na JPG</a>, potem scalaj.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>Czy to naprawdę za darmo? Jakiś znak wodny?</h3>
  <p>Konwersja JPG-ów na PDF jest darmowa, bez znaku wodnego i bez rejestracji. Limity rozmiaru pliku w darmowym planie obowiązują na pojedynczy obraz; premium je podnosi.</p>

  <h3>Ile obrazów mogę scalić naraz?</h3>
  <p>Do 50 obrazów na jedno zlecenie — każdy staje się jedną stroną wynikowego PDF-a. Potrzebujesz więcej? Podziel partię i scal powstałe PDF-y narzędziem <a href="/pl/pdf-organize/merge/">Scal PDF</a>.</p>

  <h3>Czy mogę zmienić kolejność stron po wgraniu?</h3>
  <p>Strony podążają za kolejnością dodawania obrazów. Niezawodny nawyk to numerowanie nazw plików, zanim je wybierzesz. Jeśli gotowy PDF wymaga przetasowania, narzędzie <a href="/pl/pdf-organize/organize/">Organizuj PDF</a> pozwala zmieniać kolejność przeciąganiem.</p>

  <h3>Czy działa z PNG lub innymi formatami?</h3>
  <p>To narzędzie przyjmuje JPG/JPEG. PNG, WebP i inne formaty albo najpierw przekonwertuj na JPG narzędziem <a href="/pl/image/convert/">Konwertuj obraz</a>, albo — w przypadku pojedynczego obrazu — od razu tam przekonwertuj go na PDF.</p>

  <h3>Czy tekst w moim sfotografowanym dokumencie będzie przeszukiwalny?</h3>
  <p>Nie — PDF zawiera obrazki tekstu, a nie tekst. Jeśli musisz przeszukiwać, kopiować lub edytować słowa, przepuść wynik przez narzędzie OCR <a href="/pl/scanned-pdf-to-word/">Zeskanowany PDF na Word</a>, które rozpoznaje tekst i zwraca edytowalny plik.</p>

  <h3>Czy moje dane są bezpieczne?</h3>
  <p>Pliki są przetwarzane na potrzeby konwersji i wkrótce potem usuwane przez zaplanowane czyszczenie. Jak przy każdej usłudze online — przed wgraniem bardzo wrażliwych materiałów sprawdź politykę prywatności.</p>

  <h2>Wypróbuj teraz</h2>

  <p>Weź ten folder ze sfotografowanymi stronami, ponumeruj pliki i wrzuć je do konwertera <a href="/pl/jpg-to-pdf/">JPG na PDF</a>. Trzydzieści sekund później będziesz mieć to, czego wszyscy naprawdę chcieli: jeden plik, strony po kolei, gotowe do wysłania.</p>
