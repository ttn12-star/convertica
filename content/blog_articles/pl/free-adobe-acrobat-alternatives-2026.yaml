      <tr><td>Word / Excel do PDF</td><td><a href="/pl/word-to-pdf/">Office do PDF</a></td><td>Identyczny wynik dla standardowych dokumentów</td></tr>
      <tr><td>Łączenie plików</td><td><a href="/pl/pdf-organize/merge/">Scal PDF</a></td><td>Pełna równość w kolejności i łączeniu</td></tr>
      <tr><td>Dzielenie / wyciąganie stron</td><td><a href="/pl/pdf-organize/split/">Podziel PDF</a></td><td>Pełna równość według strony lub zakresu</td></tr>
      <tr><td>Zmniejszanie rozmiaru pliku</td><td><a href="/pl/pdf-organize/compress/">Kompresja PDF</a></td><td>Porównywalne współczynniki przy zrównanej jakości</td></tr>
      <tr><td>Podpisanie dokumentu</td><td><a href="/pl/pdf-edit/sign/">Podpisz PDF</a></td><td>Wystarcza do samodzielnego podpisu; to nie pełny workflow e-podpisu</td></tr>
