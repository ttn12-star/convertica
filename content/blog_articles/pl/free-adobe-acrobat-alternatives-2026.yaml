content_pl: |
  Adobe Acrobat Pro to domyślna odpowiedź na niemal każde pytanie o PDF, i nie bez powodu: robi prawie wszystko. Haczyk tkwi w cenie. Subskrypcja Pro kosztuje mniej więcej 155 do 240 USD rocznie, zależnie od tego, czy płacisz z góry za rok, czy z miesiąca na miesiąc, i nie przestaje naliczać opłat, gdy przestajesz jej używać. Dla projektanta albo zespołu prawnego przerabiającego PDF-y cały dzień to uczciwy układ. Dla osoby, która musi scalić dwa pliki przed spotkaniem i raz na kwartał wypełnić formularz, to karnet na siłownię dla kogoś, kto biega dwa razy w roku.

  Ten poradnik rozbija Acrobata na zadania, które ludzie faktycznie nim wykonują, a potem pokazuje darmowe narzędzie zastępujące każde z nich. Na końcu jest uczciwa sekcja o garstce zadań, w których Acrobat wciąż zarabia na siebie - bo udawanie, że darmowe narzędzia wygrywają każdą rundę, nie pomogłoby ci w decyzji.

  <h2>Co Acrobat naprawdę robi (i czego naprawdę używasz)</h2>
  <p>Acrobat Pro pakuje mniej więcej dwa tuziny funkcji. W praktyce ankiety wśród zwykłych użytkowników wciąż lądują na tej samej krótkiej liście:</p>
  <ul>
    <li>Konwersja PDF-ów do i z Worda, Excela oraz obrazów.</li>
    <li>Scalanie kilku PDF-ów w jeden i dzielenie jednego na kilka.</li>
    <li>Kompresja PDF-a tak, by zmieścił się w e-mailu.</li>
    <li>Wypełnianie i podpisywanie formularzy.</li>
    <li>Zabezpieczanie pliku hasłem przed wysłaniem.</li>
    <li>Uruchamianie OCR na zeskanowanym dokumencie, by tekst stał się zaznaczalny.</li>
  </ul>
  <p>Każda pozycja z tej listy ma darmowy, działający w przeglądarce odpowiednik, który wykonuje zadanie na tym samym poziomie przy okazjonalnym użyciu. Funkcje, za które dopłacasz - redakcja ze śladem audytu, zgodność z archiwizacją PDF/A, numeracja Batesa na dużą skalę, zaawansowany pre-press - są realne, ale nie z ich powodu większość ludzi otwiera Acrobata.</p>

  <h2>Mapa zamienników zadanie po zadaniu</h2>
  <p>To serce tego porównania. Znajdź zadanie w lewej kolumnie; darmowy zamiennik jest po prawej.</p>
  <table>
    <thead>
      <tr><th>Zadanie, które robisz w Acrobacie</th><th>Darmowy zamiennik</th><th>Jak blisko mu do oryginału?</th></tr>
    </thead>
