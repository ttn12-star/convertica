excerpt_pl: "Zablokowanie zdjęcia może znaczyć dwie rzeczy: ukrycie go we własnym telefonie albo zapieczętowanie kopii hasłem, aby nikt nie otworzył jej po wysłaniu. Zdjęcia nie mają własnego hasła, więc oto jak działa każda opcja i gdzie się kończy."
content_pl: |
  Chcesz zablokować zdjęcie. Ale zablokować może znaczyć dwie zupełnie różne rzeczy, a ich mylenie sprawia, że tyle porad w sieci trafia obok. Czasem chcesz tylko, żeby prywatne ujęcie nie wyskakiwało, gdy podajesz telefon znajomemu. Innym razem musisz wysłać lub przechować zdjęcie tak, by nikt nie otworzył go bez hasła, nawet jeśli plik trafi na nie ten telefon. Ten poradnik obejmuje oba przypadki i szczerze mówi, gdzie każde podejście przestaje działać.

  <h2>Najpierw ustal, co "zabezpieczyć" znaczy dla ciebie</h2>

  <p>Dwa cele, dwa zestawy narzędzi.</p>

  <ul>
    <li><strong>Ukryć zdjęcie we własnym telefonie.</strong> Tylko ty używasz urządzenia i chcesz jedynie wyjąć pewne obrazy z głównej galerii i schować za Face ID lub PIN-em. Ma to wbudowany każdy telefon i nic nie kosztuje.</li>
    <li><strong>Zablokować zdjęcie, które zamierzasz wysłać lub przechować.</strong> Tu plik wychodzi z twoich rąk. Prywatny album w telefonie nic nie da, gdy tylko obraz zostanie dołączony do maila albo skopiowany na pendrive. Do tego hasło musi podróżować wewnątrz samego pliku.</li>
  </ul>

  <p>Zanim zaczniesz, zapytaj, czego naprawdę potrzebujesz. Pierwsze to ustawienie telefonu, które włączasz w kilka sekund. Drugie wymaga prawdziwego szyfrowania, i tu ze zdjęciami robi się kłopotliwie, jak zobaczysz niżej.</p>

  <h2>Blokowanie zdjęć na iPhonie</h2>

  <p>iOS daje dwie drogi, zależnie od tego, jak prywatne jest zdjęcie.</p>

  <p><strong>Album Ukryte.</strong> W Zdjęciach otwórz obraz, dotknij przycisku udostępniania lub więcej i wybierz Ukryj. Przeniesie się do albumu Ukryte, którego nie widać w głównej bibliotece. W iOS 16 i nowszych ten album, razem z Ostatnio usuniętymi, jest domyślnie zablokowany za Face ID lub kodem, więc ktoś przeglądający twoją rolkę nie natknie się na niego przypadkiem.</p>

  <p><strong>Zablokuj je w notatce.</strong> Do czegoś, co chcesz mieć za prawdziwym hasłem, wklej zdjęcie do aplikacji Notatki i zablokuj tę notatkę przyciskiem udostępniania. Notatki używają kodu urządzenia lub osobnego hasła, które ustawisz, a zablokowana notatka jest szyfrowana na urządzeniu. Przydatna sztuczka, gdy chcesz zapieczętować jedno czy dwa czułe zdjęcia, a nie ukrywać cały album.</p>

  <h2>Blokowanie zdjęć na Androidzie</h2>

  <p><strong>Zablokowany folder w Zdjęciach Google.</strong> Otwórz Zdjęcia, wejdź w Biblioteka, potem Narzędzia i skonfiguruj Zablokowany folder. Wszystko, co tam przeniesiesz, znika z siatki, z wyszukiwania i z każdej aplikacji czytającej galerię, a otwiera się dopiero po blokadzie ekranu. Zdjęć w Zablokowanym folderze nie obejmuje kopia zapasowa, i to jest cena za to, że zostają prywatne na urządzeniu.</p>

  <p><strong>Folder zabezpieczony Samsunga.</strong> W telefonach Galaxy Folder zabezpieczony jest w Ustawieniach, w sekcji Bezpieczeństwo i prywatność, i tworzy osobną, zaszyfrowaną przestrzeń z własną blokadą. Przenieś tam zdjęcia, a znikną ze zwykłej galerii, dopóki nie odblokujesz folderu. Idzie dalej niż ukryty album, bo zaszyfrowana jest cała przestrzeń, a nie tylko schowana z oczu.</p>

  <h2>Pułapka wspólna dla każdego sejfu w telefonie</h2>

  <p>Wszystkie powyższe opcje chronią zdjęcie na jednym urządzeniu. To naprawdę przydatne, ale przeczytaj uważnie granicę: ochrona nie podróżuje z plikiem. W chwili, gdy dołączysz ukryte zdjęcie do maila, wyślesz je komunikatorem albo skopiujesz na komputer, dotrze jako zwykły, otwieralny obraz. Blokada mieszkała w twoim telefonie, nie w zdjęciu.</p>

  <p>Więc jeśli twoim celem jest wysłanie zdjęcia, które zostanie prywatne w drodze, albo trzymanie go na współdzielonym dysku, gdzie inni mogliby je otworzyć, sejf w telefonie to złe narzędzie. Potrzebujesz hasła wpisanego w plik.</p>

  <h2>Zabezpieczyć zdjęcie hasłem do wysłania lub przechowania</h2>

  <p>Oto szczera część, którą większość poradników pomija: pliki obrazów nie mają miejsca na hasło. JPG czy PNG to tylko dane pikseli. W formacie nie ma pola, które przechowałoby hasło, ani standardowego sposobu, by przeglądarka zdjęć o nie zapytała. Dlatego nigdy nie widzisz okienka "wpisz hasło" przy otwieraniu zwykłego obrazu i dlatego zmiana nazwy albo "ukrycie" pliku samo w sobie niczego nie chroni.</p>

  <p>Uniwersalne rozwiązanie to zawinąć zdjęcie w coś, co obsługuje hasło, a formatem, który każde urządzenie już otwiera, jest PDF. Włóż obraz do PDF-a, zaszyfruj ten PDF hasłem, a dostaniesz plik, który do wpisania właściwego kodu nie pokazuje nic poza prośbą o hasło, czy otworzysz go na iPhonie, Androidzie, Macu, czy pececie z Windowsem.</p>

  <p>Dokładnie to robi narzędzie <a href="/pl/image/password-protect-image/">Zabezpiecz obraz hasłem</a>.</p>

  <ol>
    <li>Otwórz narzędzie <a href="/pl/image/password-protect-image/">Zabezpiecz obraz hasłem</a> i wgraj zdjęcie. Działają JPG, PNG i HEIC.</li>
    <li>Wybierz hasło. Niech będzie mocne i takie, które zapamiętasz, bo plik jest naprawdę szyfrowany i nie ma tylnej furtki, jeśli je zgubisz.</li>
    <li>Pobierz wynik. To PDF ze zdjęciem w środku, zapieczętowany szyfrowaniem AES-256. Wyślij go lub przechowaj gdziekolwiek, a każdy, kto go otworzy, najpierw napotka prośbę o hasło, a nie twoje zdjęcie.</li>
  </ol>

  <p>Hasło przekaż innym kanałem niż sam plik. Hasło SMS-em, a plik mailem jest o wiele bezpieczniejsze niż jedno i drugie w tej samej wiadomości.</p>

  <h2>Dlaczego AES-256, a nie "zablokowany JPG"</h2>

  <p>AES-256 to ta sama klasa szyfrowania, którą chroni się pliki bankowe i rządowe. Gdy zdjęcie tkwi w PDF-ie zaszyfrowanym AES-256, piksele nie są tylko ukryte, są przemieszane, i bez hasła nie ma czego wyświetlić. Porównaj to z ukrytym albo przemianowanym obrazem, który każdy odsłoni w kilka sekund. Jeśli zdjęcie jest na tyle ważne, by je blokować, warto zablokować je porządnie.</p>

  <h2>Najczęstsze pytania</h2>

  <h3>Czy mogę nałożyć hasło wprost na JPG lub PNG?</h3>
  <p>Nie na sam obraz. Formaty JPG i PNG nie mają pola na hasło, więc żadna standardowa przeglądarka zdjęć go nie zablokuje ani nie odblokuje. Żeby zabezpieczyć zdjęcie hasłem, zawijasz je w zaszyfrowany kontener, a PDF to kontener, który każde urządzenie otwiera. Takie podejście stosuje to narzędzie.</p>

  <h3>Czy ukrycie zdjęcia to to samo co zabezpieczenie go hasłem?</h3>
  <p>Nie. Ukrycie usuwa zdjęcie z widoku na jednym urządzeniu, ale plik nadal w pełni się otwiera. Jeśli opuści urządzenie albo ktoś odblokuje telefon, zdjęcie jest na miejscu. Zabezpieczenie hasłem szyfruje plik, więc bez hasła w ogóle się go nie otworzy, gdziekolwiek trafi.</p>

  <h3>Co, jeśli zapomnę hasła?</h3>
  <p>Pliku nie da się otworzyć, i tak ma być. Prawdziwe szyfrowanie nie ma przycisku odzyskiwania, więc trzymaj hasło w menedżerze haseł i nigdy jako jedynej kopii. Jeśli potrzebujesz tylko codziennej prywatności na własnym telefonie, a nie zapieczętowanego pliku, sejf w telefonie całkiem omija to ryzyko.</p>

  <h3>Czy zabezpieczony plik traci jakość obrazu?</h3>
  <p>Nie. Twoje zdjęcie trafia do PDF-a takie, jakie jest, więc obraz w środku ma tę samą jakość co oryginał. Szyfrowanie zmienia sposób przechowywania pliku, a nie wygląd obrazu po odblokowaniu.</p>

  <h3>Czy odbiorca otworzy go bez specjalnego programu?</h3>
  <p>Tak. Wynik to zwykły zaszyfrowany PDF, a czytnik PDF ma już każdy telefon i komputer. Wpisuje hasło raz i pojawia się zdjęcie, nic nie trzeba instalować.</p>

  <h3>Czy zabezpieczanie zdjęcia online jest bezpieczne?</h3>
  <p>Wgrane pliki są przetwarzane, a potem po krótkiej chwili usuwane z serwera, więc nic nie jest przechowywane ani udostępniane. Dla zdjęcia, które nigdy nie powinno opuścić komputera, najbezpieczniejszy jest sejf w telefonie lub narzędzie offline. Dla zdjęcia, które trzeba wysłać lub przechować z hasłem, zaszyfrowanie go online jest szybkie, a od tej pory ochronę niesie już sam plik.</p>

  <h2>Wypróbuj teraz</h2>

  <p>Jeśli chcesz tylko wyjąć kilka ujęć z głównej galerii, album Ukryte, Zablokowany folder albo Folder zabezpieczony w telefonie załatwią to w sekundy. Ale jeśli zdjęcie ma podróżować albo leżeć na współdzielonym dysku z hasłem, wrzuć je do narzędzia <a href="/pl/image/password-protect-image/">Zabezpiecz obraz hasłem</a> i pobierz zablokowany PDF, który bez kodu nie otworzy się nikomu.</p>
