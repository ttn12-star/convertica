meta_description_pl: "Ukryj zdjęcia na iPhonie lub Androidzie albo zablokuj zdjęcie hasłem, aby je wysłać lub przechować. Dlaczego obrazy nie mają własnego hasła i jak to rozwiązać zaszyfrowanym PDF-em."
