excerpt_pl: 'Nasza największa aktualizacja jest już w drodze — subskrypcje Premium, rangi Bohaterów, tryb ciemny, szybsza kolejka i pięć nowych konwerterów. Oto wszystko, co nadchodzi.'
content_pl: |
  <p>Nasza największa aktualizacja jest już niemal gotowa. To wydanie dodaje <strong>system subskrypcji Premium</strong>, ulepsza narzędzia, których już używasz, i wprowadza pięć nowych konwerterów. Oto, co nadchodzi.</p>

  <h2>Krótka uwaga przed startem</h2>
  <p>Wydanie tej wielkości porusza wiele elementów, więc w pierwszych dniach niektóre rzeczy mogą działać dziwnie. Jeśli coś się zepsuje — <strong>daj nam znać</strong>, a szybko to naprawimy.</p>

  <h2>Subskrypcje Premium</h2>
  <p>Premium dostępne jest w trzech planach:</p>
  <ul>
    <li><strong>1 dzień</strong> — $1</li>
    <li><strong>1 miesiąc</strong> — $5</li>
    <li><strong>1 rok</strong> — $52</li>
  </ul>
  <p>Każdy plan Premium odblokowuje:</p>
  <ul>
    <li>Wyższe limity rozmiaru pliku i liczby stron</li>
    <li>Przetwarzanie OCR</li>
    <li>Przetwarzanie wsadowe w wybranych narzędziach</li>
    <li>Osobną, szybszą kolejkę przetwarzania</li>
    <li>Opcjonalny tryb ciemny</li>
  </ul>

  <h2>Rangi Bohaterów</h2>
  <p>Subskrybenci Premium utrzymują Convertica przy życiu, dlatego nazywamy ich <strong>Bohaterami</strong>. Im dłużej masz subskrypcję, tym wyższa ranga:</p>
  <ul>
    <li><strong>Bohater Brązowy</strong> — 30+ kolejnych dni</li>
    <li><strong>Bohater Srebrny</strong> — 90+ kolejnych dni</li>
    <li><strong>Bohater Złoty</strong> — 180+ kolejnych dni</li>
    <li><strong>Bohater Platynowy</strong> — 365+ kolejnych dni</li>
  </ul>
  <p>Będzie też <strong>ranking</strong> 10 Bohaterów wspierających nas najdłużej oraz opcjonalny pasek dla każdego, kto chce znaleźć się w centrum uwagi.</p>

  <h2>Pięć nowych konwerterów</h2>
  <p>Obok funkcji Premium i ulepszeń narzędzi dodajemy pięć konwerterów:</p>
  <ul>
    <li>PDF na HTML</li>
    <li>HTML na PDF</li>
    <li>PDF na PPTX</li>
    <li>PPTX na PDF</li>
    <li>Excel na PDF</li>
  </ul>

  <figure><img src="/static/blog/images/tool-all-tools-hero.jpg" alt="Zestaw narzędzi PDF Convertica" width="1280" height="800" loading="lazy"></figure>

  <h2>Dziękujemy, że jesteś z nami</h2>
  <p>To wydanie, z którego jesteśmy najbardziej dumni, a to wasze opinie je ukształtowały. Zajrzyj do <a href="/pl/all-tools/">wszystkich narzędzi</a>, by zobaczyć, co jest dostępne już dziś, albo wypróbuj <a href="/pl/excel-to-pdf/">konwerter Excel na PDF</a>, gdy tylko się pojawi. Więcej już wkrótce.</p>
