meta_description_pl: "Zamień zdjęcie, zrzut ekranu lub skan na edytowalny tekst za pomocą darmowego OCR. Dowiedz się, jak to działa, co wpływa na dokładność i jak obsługiwać zdjęcia iPhone HEIC oraz 17 języków."
