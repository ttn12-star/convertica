    <li>Wybierz format docelowy oraz — dla JPEG lub WebP — poziom jakości (90 to bezpieczna wartość domyślna).</li>
    <li>Pobierz wynik. Wymiary w pikselach zostają dokładnie te same — zmienia się tylko kodowanie.</li>
