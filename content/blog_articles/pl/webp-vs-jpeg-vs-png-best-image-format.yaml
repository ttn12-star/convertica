  <p>Konwersja PNG-ów z przezroczystością do WebP zachowuje kanał alfa; konwersja do JPEG wypełnia przezroczyste obszary bielą — więc logo do JPEG to zwykle błąd. Jeśli celem jest wyłącznie mniejszy plik w <em>tym samym</em> formacie, narzędzie <a href="/pl/image/optimize/">Optymalizuj obraz</a> kompresuje bez zmiany formatu i może też ograniczyć wymiary.</p>

  <h2>FAQ</h2>

  <h3>Czy WebP ma niższą jakość niż JPEG?</h3>
  <p>Nie — przy porównywalnych ustawieniach WebP zachowuje tę samą jakość wizualną w mniejszym pliku. Jego kompresor jest po prostu nowszy i sprytniejszy niż JPEG-owy, rocznik 1992. O jakości decyduje wybrany poziom, a nie nazwa formatu.</p>

  <h3>Dlaczego niektóre strony odrzucają mój plik WebP?</h3>
  <p>Ich walidacja przesyłania powstała, zanim WebP zyskał popularność, i dopuszcza tylko JPEG i PNG. Na potrzeby takiego formularza przekonwertuj plik do JPEG — to dziesięć sekund roboty — a WebP zostaw dla własnej strony.</p>

  <h3>Czy warto przekonwertować istniejące JPEG-i na WebP?</h3>
  <p>Dla strony, którą prowadzisz — tak, to zwykle najtańsza dostępna wygrana w szybkości ładowania. Koduj ponownie z najlepszego źródła, jakie masz, a nie z już mocno skompresowanej kopii, żeby artefakty się nie nawarstwiały.</p>

  <h3>A co z GIF-em?</h3>
  <p>W animacji WebP (albo prawdziwy plik wideo) bije GIF-a rozmiarem i głębią kolorów. W obrazach statycznych limit 256 kolorów czyni GIF najgorszym z całej czwórki — przetrwał głównie z przyzwyczajenia i memowej tradycji.</p>

  <h3>Jakie jest najlepsze ustawienie jakości dla JPEG i WebP?</h3>
  <p>80-85 do zastosowań webowych — złoty środek, w którym artefakty są niewidoczne przy normalnych rozmiarach wyświetlania. 90+, gdy obraz może być jeszcze edytowany lub oglądany z bliska. Poniżej 70 oszczędności wciąż rosną, ale rosną też widoczne plamy, zwłaszcza na niebie i gradientach.</p>

  <h2>Wybierz raz, konwertuj w razie potrzeby</h2>

  <p>Cała reguła mieści się w jednej linijce: <strong>WebP na twoją stronę, JPEG dla zdjęć, które podróżują, PNG dla grafiki z krawędziami.</strong> A gdy obraz przyjdzie w niewłaściwym formacie do zadania, narzędzie <a href="/pl/image/convert/">Konwertuj obraz</a> naprawia to jednym kliknięciem — za darmo, bez rejestracji, z nietkniętymi wymiarami.</p>
