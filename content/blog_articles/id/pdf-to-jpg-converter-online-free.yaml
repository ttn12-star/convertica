  <p>Saat alat hanya mengeluarkan JPG dan halaman penuh teks, solusinya sederhana: naikkan DPI satu tingkat untuk mengimbangi halo di sekitar huruf.</p>

  <h2>Ekspor hanya halaman yang Anda butuhkan</h2>

  <p>PDF banyak halaman menjadi satu gambar per halaman. Konversi laporan 40 halaman dan Anda dapat 40 file — jarang ada yang menginginkannya. Sebelum mengonversi, atur rentang halaman agar Anda hanya mendapat halaman 3, atau halaman 1–5, alih-alih seluruh tumpukan.</p>

  <p>Ini penghemat waktu terbesar dalam pekerjaan PDF ke JPG, sekaligus pengendali ukuran file: lebih sedikit halaman, lebih sedikit megabita, lebih sedikit yang harus disortir setelahnya. Jika Anda memang butuh semua halaman, itu juga tidak apa — biarkan itu jadi pilihan, bukan setelan bawaan yang tak Anda sadari.</p>

  <h2>Menjaga ukuran file tetap wajar</h2>

  <ul>
    <li><strong>Jangan bolak-balik.</strong> Rantai PDF → JPG → PDF mengompresi ulang konten tiap kali dan menurunkan kualitasnya. Simpan PDF asli dan ekspor gambar darinya saat dibutuhkan.</li>
    <li><strong>Perkecil sebelum berbagi.</strong> Ekspor A4 pada 300 DPI berukuran beberapa ribu piksel lebar — lebih dari yang dipakai unggahan obrolan atau media sosial mana pun. Untuk layar, 150 DPI sudah cukup dan berukuran sepersekian darinya.</li>
    <li><strong>Satu halaman berat mengalahkan empat puluh halaman ringan.</strong> Jika Anda hanya butuh satu halaman, mengekspor halaman itu pada kualitas tinggi tetap lebih kecil daripada seluruh dokumen pada kualitas sedang.</li>
  </ul>

  <h2>Bagaimana mengembalikan gambar menjadi PDF?</h2>

  <p>Perjalanan baliknya sama lazimnya: Anda punya beberapa JPG — foto kontrak dari ponsel, setumpuk struk — dan butuh semuanya jadi satu PDF. <a href="/id/jpg-to-pdf/">Alat JPG ke PDF</a> menangani itu, dengan satu hal yang perlu diawasi: unggah semua gambar sekaligus dan periksa urutannya di pratinjau sebelum mengekspor. Pengurutan berdasarkan nama file menempatkan IMG_10 sebelum IMG_2, yang mengacak halaman. Penjelasan lengkap kedua arah ada di panduan kami tentang cara <a href="/id/blog/convert-pdf-to-jpg-and-back/">mengonversi PDF ke JPG dan kembali tanpa kehilangan kualitas</a>.</p>

  <p>Satu hal lagi: gambar berisi teks tidak bisa dicari. Jika Anda menyusun ulang PDF dari foto atau halaman yang diekspor lalu butuh menyalin atau mencari kata, jalankan <a href="/id/image/to-text/">OCR pada gambar</a> untuk menarik teksnya. Artikel pendamping tentang cara <a href="/id/blog/how-to-extract-text-from-an-image/">mengekstrak teks dari gambar</a> menjelaskan kapan itu layak dilakukan.</p>

