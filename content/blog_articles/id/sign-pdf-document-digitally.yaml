content_id: |
  Sebuah formulir muncul di inbox dalam bentuk PDF: perjanjian sewa, formulir persetujuan, surat penawaran kerja, atau kontrak. Semuanya butuh tanda tanganmu. Rutinitas lama memang menyebalkan: cetak dulu, tanda tangani dengan pena, pindai kembali, lalu berharap hasil pindaiannya lurus. Kamu bisa melewati semua itu dan menandatangani file langsung di layar. Panduan ini menunjukkan caranya, sekaligus meluruskan satu hal yang sering disalahpahami orang soal "tanda tangan digital".

  <h2>Dua hal yang sama-sama disebut "tanda tangan" padahal berbeda</h2>

  <p>Sebelum menandatangani apa pun, ada baiknya kamu tahu mana yang sebenarnya kamu butuhkan, karena keduanya menyelesaikan masalah yang berbeda.</p>

  <ul>
    <li><strong>Tanda tangan elektronik</strong> adalah gambar tanda tanganmu yang ditempatkan di halaman: diketik, digambar dengan mouse atau jari, atau diunggah sebagai gambar. Ia menunjukkan niat untuk menandatangani, dan inilah yang diminta hampir semua formulir harian, kontrak sewa, atau persetujuan internal.</li>
    <li><strong>Tanda tangan digital</strong> adalah segel kriptografis yang terikat pada sebuah sertifikat. Ia tidak sekadar menampilkan namamu, tetapi membuktikan secara matematis siapa yang menandatangani dan bahwa file tidak berubah sejak itu. Bank, instansi pemerintah, dan sebagian pengajuan hukum mensyaratkan jenis yang lebih kuat ini.</li>
  </ul>

  <p>Untuk sebagian besar dokumen yang masuk ke inbox-mu, tanda tangan elektronik justru persis seperti yang diminta. Jika sebuah dokumen secara khusus mensyaratkan tanda tangan digital bersertifikat, biasanya hal itu dinyatakan dengan jelas, dan sering kali kamu diarahkan ke penyedia tertentu atau portal pemerintah.</p>

  <h2>Cara tanda tangan PDF di layar (untuk keperluan sehari-hari)</h2>

  <figure><img src="/static/blog/images/tool-sign-hero.jpg" alt="Alat Tanda Tangan PDF Convertica dengan dokumen siap ditandatangani" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Buka alat <a href="/id/pdf-edit/sign/">Tanda Tangan PDF</a> dan unggah file-mu.</li>
    <li>Buat tanda tanganmu: ketik lalu pilih gaya tulisan tangan, gambar dengan mouse atau jari, atau unggah foto tanda tangan aslimu.</li>
    <li>Letakkan di tempat yang tepat pada halaman, sesuaikan ukurannya, dan tambahkan tanggal atau inisial jika formulir memerlukannya.</li>
    <li>Unduh PDF yang sudah ditandatangani. File siap dikirim kembali, dan tampil sama di mana pun dibuka.</li>
  </ol>

  <figure><img src="/static/blog/images/tool-sign-options.jpg" alt="Opsi tanda tangan: ketik, gambar, atau unggah di alat Tanda Tangan PDF" width="1280" height="800" loading="lazy"></figure>

  <p>Seluruh prosesnya makan waktu kurang dari satu menit, dan file yang diunggah dihapus dari server setelah jeda singkat, hal yang penting ketika dokumennya adalah kontrak dan bukan sekadar berkas sekali pakai.</p>

  <h2>Mendapatkan tanda tangan yang rapi</h2>

  <p>Beberapa hal kecil membuat tanda tangan di layar terlihat pas alih-alih berantakan:</p>

  <ul>
    <li><strong>Menggambar di ponsel atau tablet lebih baik daripada mouse.</strong> Jari atau stylus menghasilkan garis yang jauh lebih alami dibanding menyeret penunjuk mouse.</li>
    <li><strong>Jika kamu mengunggah foto tanda tangan,</strong> bubuhkan dengan tinta gelap di atas kertas putih polos, lalu potong rapat. Gambar bersih dengan kontras tinggi tampil jauh lebih rapi di halaman.</li>
    <li><strong>Sesuaikan ukuran dengan garisnya.</strong> Tanda tangan yang terlalu besar dan melebar di formulir terlihat janggal. Ubah ukurannya agar duduk rapi di garis tanda tangan.</li>
  </ul>

  <h2>Cegah file yang sudah ditandatangani agar tak bisa diubah</h2>

  <p>Setelah sebuah dokumen ditandatangani, biasanya kamu tidak ingin ada yang mengeditnya kemudian. Tanda tangan elektronik hanyalah gambar, jadi ia tidak mengunci file dengan sendirinya. Jika dokumennya sensitif, tambahkan kata sandi agar tidak bisa diubah atau dibuka oleh orang yang salah: proses dulu lewat alat <a href="/id/pdf-security/protect/">Proteksi PDF</a> sebelum mengirim. Jika kamu rutin mengirim kontrak yang sudah ditandatangani lewat email, panduan kami tentang <a href="/id/blog/password-protect-pdf-before-emailing/">memberi kata sandi pada PDF sebelum dikirim via email</a> membahas cara melakukannya dengan aman.</p>

  <h2>FAQ</h2>

  <h3>Apakah tanda tangan elektronik sah secara hukum?</h3>
  <p>Di sebagian besar negara, tanda tangan elektronik diakui secara hukum untuk perjanjian sehari-hari, dan aturan seperti ESIGN Act di AS serta regulasi eIDAS di Uni Eropa mendukungnya. Beberapa dokumen tertentu (pengajuan properti, dokumen pengadilan, atau berkas yang dinotariskan) memerlukan tanda tangan digital bersertifikat yang lebih kuat. Bila demikian, dokumen atau pihak yang meminta akan memberitahumu.</p>

  <h3>Sekali lagi, apa beda tanda tangan elektronik dan tanda tangan digital?</h3>
  <p>Tanda tangan elektronik menunjukkan niat, yaitu gambar tanda tanganmu di halaman. Tanda tangan digital menambahkan bukti kriptografis atas identitas dan bahwa file tidak berubah. Formulir harian butuh yang pertama; pengajuan yang diatur ketat kadang butuh yang kedua.</p>

  <h3>Bisakah saya tanda tangan PDF di ponsel?</h3>
  <p>Bisa, dan sering kali justru cara terbaik, karena kamu bisa menggambar tanda tangan dengan jari untuk tampilan yang alami. Buka alatnya di browser ponsel, gambar, tempatkan, lalu unduh. Tidak perlu aplikasi.</p>

  <h3>Apakah tanda tangan akan mengubah bagian lain dokumen?</h3>
  <p>Tidak. Tanda tanganmu ditambahkan sebagai elemen di halaman. Teks, tata letak, dan halaman lain yang sudah ada tetap persis seperti semula.</p>

  <h3>Apakah saya perlu mencetak sesuatu?</h3>
  <p>Tidak. Justru inti menandatangani di layar adalah melewatkan proses cetak dan pindai sepenuhnya. Kamu mengunggah PDF, menambahkan tanda tangan, lalu mengunduh file yang sudah jadi.</p>

  <h2>Coba sekarang</h2>

  <p>Jika sebuah formulir sedang menunggu tanda tangan di inbox-mu, buka alat <a href="/id/pdf-edit/sign/">Tanda Tangan PDF</a>, tambahkan tanda tanganmu, dan kirim kembali dalam satu menit. Dan jika salinan yang sudah ditandatangani bersifat rahasia, kunci dengan <a href="/id/pdf-security/protect/">Proteksi PDF</a> sebelum keluar dari outbox-mu.</p>
