    <li><strong>Biarkan ia memproses.</strong> Mesin render menata setiap halaman di sisi server. Dokumen biasa selesai dalam sekejap; file panjang yang penuh gambar butuh sedikit lebih lama.</li>
    <li><strong>Unduh dan periksa.</strong> Buka PDF sekali. Pastikan font terlihat benar, pemisah halaman jatuh di tempat yang Anda mau, dan tidak ada yang terpotong di margin.</li>
  </ol>
  <p>Tanpa akun, tanpa tanda air, dan file yang diunggah dihapus otomatis setelah diproses.</p>
