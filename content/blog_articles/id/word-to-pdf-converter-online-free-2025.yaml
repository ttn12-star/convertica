content_id: |
  Anda menyelesaikan resume di Word, mengirim file .docx, dan perekrut membukanya di komputer lain yang tidak punya font judul Anda: marginnya berubah dan halaman kedua kini punya satu baris yatim. Dokumen Word sebenarnya tidak terkunci — ia dirender ulang sesuai font, ukuran halaman, dan versi Word yang kebetulan dimiliki pembaca. Mengonversi ke PDF membekukan dokumen persis seperti yang Anda rancang, jadi apa yang Anda kirim itulah yang mereka lihat.

  Panduan ini membahas mengapa PDF adalah format yang tepat untuk berbagi, bagaimana font dan tata letak bertahan saat konversi, beberapa jebakan yang membuat teks bergeser, serta alur "unggah dan beres" untuk mengonversi Word ke PDF secara gratis.

  <h2>Mengapa mengonversi Word ke PDF</h2>

  <figure><img src="/static/blog/images/tool-word-to-pdf.jpg" alt="Konverter Word ke PDF Convertica dengan area unggah file" width="1280" height="800" loading="lazy"></figure>
  <p>File .docx adalah sekumpulan instruksi: "gunakan Calibri 11pt di sini, indentasi paragraf ini, putus halaman kira-kira di sini." Perangkat lunak pembaca menjalankan instruksi itu memakai sumber daya yang ada secara lokal. Ganti komputer, hasilnya bisa ikut berubah. PDF bekerja sebaliknya — ia menyimpan halaman jadi, termasuk posisi glif yang tepat, sehingga dirender identik di mana saja. Perbedaan itu penting dalam tiga situasi konkret:</p>
  <ul>
    <li><strong>Tata letak tetap.</strong> Kontrak yang ditandatangani, faktur, atau resume berformat harus tampil sama bagi setiap pembaca. PDF mengunci geometri halaman, jadi tidak ada yang bergeser.</li>
    <li><strong>Kesetiaan font.</strong> PDF dapat menyematkan font yang Anda pakai. Penerima melihat tipografi Anda meski tidak pernah memasangnya.</li>
    <li><strong>Berbagi dengan aman.</strong> PDF bersifat hanya-baca secara default dan lebih sulit diedit tanpa sengaja, itulah sebabnya pemberi kerja, pengadilan, dan universitas memintanya.</li>
  </ul>
  <p>Jika dokumen perlu bisa diedit lagi nanti, itu perjalanan baliknya — Anda bisa <a href="/id/pdf-to-word/">mengonversi PDF kembali ke Word</a> — tetapi untuk mengirim, mengarsip, dan mencetak, PDF adalah format yang berperilaku konsisten.</p>

  <h2>Bagaimana format benar-benar bertahan saat konversi</h2>
  <p>Konversi Word ke PDF yang baik bukan tangkapan layar. Ia membaca struktur dokumen dan membangunnya kembali sebagai konten vektor: teks tetap bisa dipilih dan dicari; garis dan tabel tetap berupa goresan vektor yang tajam; gambar mempertahankan resolusinya. Tiga hal menentukan apakah hasilnya cocok dengan layar Anda:</p>
  <ul>
    <li><strong>Font.</strong> Jika konverter menyematkan font yang dipakai dalam dokumen, jarak dan pemisah baris dipertahankan dengan presisi. Jika sebuah font tidak bisa disematkan (sebagian font berlisensi melarangnya), konverter mengganti dengan padanan terdekat, yang bisa sedikit mengubah lebar baris.</li>
    <li><strong>Ukuran halaman dan margin.</strong> Konversi menghormati pengaturan halaman yang didefinisikan di Word — A4 atau Letter, potret atau lanskap, margin. Jika ukuran halaman di Word berbeda dari yang Anda harapkan di kertas, atur dulu di Word.</li>
    <li><strong>Elemen dinamis.</strong> Apa pun yang sudah otomatis di Word — kolom yang diperbarui, stempel "tanggal saat ini", konten tertaut — diselesaikan ke nilai saat ini pada momen konversi lalu dibekukan.</li>
  </ul>
  <p>Karena Convertica mengonversi memakai mesin render LibreOffice penuh alih-alih parser teks ringan, dokumen kompleks — tata letak banyak kolom, catatan kaki, tabel, grafik tersemat — keluar jauh lebih dekat ke aslinya dibanding konverter cepat di sisi peramban.</p>

  <h2>Font dan penyematan: bagian yang sering bikin tersandung</h2>
  <p>Keluhan paling umum "PDF saya tampak berbeda" bermuara pada font. Berikut versi singkat cara menghindarinya:</p>
  <ul>
    <li><strong>Utamakan font umum</strong> (Calibri, Arial, Times New Roman, Georgia) untuk teks isi. Font ini tersemat bersih dan punya pengganti andal jika penyematan gagal.</li>
    <li><strong>Jika Anda memakai font dekoratif yang khas</strong> untuk judul, periksa ulang PDF setelahnya. Judul dengan font yang tak bisa disematkan mesin bisa jatuh ke font default dan mengubah panjang baris.</li>
    <li><strong>Aksara non-Latin</strong> (Arab, Hindi/Devanagari, CJK) butuh font yang benar-benar memuat glif itu. Jika dokumen mencampur aksara, pastikan PDF jadi menampilkan setiap karakter, bukan kotak kosong "tofu".</li>
  </ul>

