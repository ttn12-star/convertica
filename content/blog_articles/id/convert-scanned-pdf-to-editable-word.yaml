excerpt_id: "Jika 'select text' di PDF Anda hanya menyorot ruang kosong, Anda memiliki PDF hasil scan, dan Anda butuh OCR alih-alih konverter biasa. Berikut yang perlu Anda harapkan."
content_id: |
  Coba ini pada PDF di depan Anda: klik dan seret melintasi paragraf seolah-olah Anda akan menyalin teksnya. Jika kursor menyorot kata-kata individual, PDF tersebut digital dan konverter standar berfungsi. Jika menyorot persegi panjang besar di sekitar seluruh halaman, Anda memiliki scan, yang berarti setiap halaman pada dasarnya adalah foto kertas, dan alat PDF-ke-Word biasa akan memberi Anda kembali dokumen Word penuh gambar, bukan teks.

  Di sinilah OCR berperan. Optical character recognition membaca piksel dan merekonstruksinya sebagai huruf, kata, dan paragraf yang sebenarnya. Dilakukan dengan baik, Anda mendapatkan .docx yang bisa diedit. Dilakukan dengan buruk, Anda mendapatkan teks kacau dan harus membersihkan koma, spasi, dan kesalahan rn-versus-m selama satu jam. Perbedaannya sebagian besar ada di file sumber dan beberapa hal yang dapat Anda kendalikan.

  <figure><img src="/static/blog/images/tool-pdf-to-word.jpg" alt="Konverter PDF ke Word Convertica menerima dokumen hasil scan untuk OCR" width="1280" height="800" loading="lazy"></figure>

  <h2>Cara mengetahui apakah PDF Anda hasil scan</h2>

  Tiga pemeriksaan cepat:

  <ul>
    <li><strong>Seleksi teks.</strong> Coba pilih satu kata. Jika seluruh halaman menjadi satu persegi panjang yang dapat diseleksi, halamannya adalah gambar.</li>
    <li><strong>Ukuran file.</strong> PDF teks 10 halaman biasanya 100 hingga 500 KB. PDF scan 10 halaman sering 5 hingga 30 MB karena setiap halaman adalah gambar resolusi tinggi.</li>
    <li><strong>Artefak visual.</strong> Scan menunjukkan bintik-bintik, sedikit rotasi, tepi memudar, dan tekstur kertas yang terlihat. PDF born-digital memiliki huruf tajam dengan tepi anti-aliased dan tanpa noise latar.</li>
    <li><strong>Bentuk kursor.</strong> Hover di atas teks. PDF digital membalik kursor Anda menjadi I-beam di atas teks dan panah di atas gambar. PDF hasil scan tetap berupa panah di mana saja - karena semuanya adalah gambar.</li>
  </ul>

  PDF hibrida juga ada, di mana seseorang men-scan kontrak lalu menambahkan halaman tanda tangan born-digital. OCR melewati halaman digital (tidak perlu) dan hanya memproses yang hasil scan. Jalankan tes seleksi teks pada beberapa halaman berbeda dari file besar mana pun sebelum mengasumsikan keseluruhannya satu jenis.

  <h2>Apa yang sebenarnya dilakukan OCR</h2>

  OCR adalah pengenalan pola untuk bentuk huruf. Engine melihat kelompok piksel, membandingkannya dengan model yang dilatih pada jutaan gambar glyph, dan mengeluarkan tebakan karakter terbaik beserta skor kepercayaan. Engine modern juga menggunakan konteks sekitar: jika 80% yakin kata berikutnya adalah "agreement" dan huruf ketiga ambigu antara "r" dan "n", ia memilih "r" karena "agreement" adalah kata nyata.

  Dua pengaturan menentukan akurasi lebih dari yang lain:

  <ul>
    <li><strong>Bahasa sumber.</strong> Model yang dilatih bahasa Inggris pada dokumen Prancis salah membaca karakter beraksen dan bingung dengan kata-kata umum. Selalu atur bahasa secara eksplisit ketika alat menawarkannya.</li>
    <li><strong>DPI sumber.</strong> 300 DPI adalah lantai praktis untuk OCR yang bersih. Scan 200 DPI bisa berfungsi untuk cetakan besar tetapi kesulitan dengan footnote kecil. Di bawah 150, akurasi runtuh dengan cepat.</li>
  </ul>

  Faktor ketiga yang jarang dipikirkan orang: kontras. OCR bekerja pada perbedaan antara tinta dan latar. Fotokopi memudar dari sebuah fotokopi bisa memiliki resolusi nominal 300 DPI dan tetap menghasilkan bubur karena rasio kontras terlalu rendah bagi pengenal untuk menemukan tepi huruf. Engine modern menangani ini lebih baik dari yang lama, tetapi build Tesseract lama (apa pun sebelum versi 4.0, dirilis 2018) masih kesulitan pada input kontras rendah.

  <h2>Langkah demi langkah: PDF hasil scan ke Word</h2>

  <figure><img src="/static/blog/images/tool-pdf-to-word.jpg" alt="Konversi PDF-ke-Word bertenaga OCR mengubah scan menjadi .docx yang bisa diedit" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Buka alat <a href="/id/pdf-to-word/">konversi PDF ke Word</a> dan unggah scan Anda. Alat mendeteksi apakah OCR diperlukan secara otomatis ketika seleksi teks mengembalikan kosong.</li>
    <li>Pilih bahasa sumber agar pengenal menggunakan kamus yang tepat. Inggris, Spanyol, Jerman, Prancis, Italia, Portugis, Rusia, dan Polandia semua berperilaku jauh lebih baik ketika diatur secara eksplisit.</li>
    <li>Jalankan konversi. Scan 10 halaman memakan kira-kira 30 hingga 90 detik tergantung kompleksitas gambar. Arsip 100 halaman bisa berjalan beberapa menit.</li>
    <li>Unduh .docx dan buka di Word. Periksa halaman pertama terhadap PDF asli sebelum mempercayai sisanya.</li>
  </ol>

  <blockquote class="callout">Selalu simpan PDF hasil scan asli. Jika OCR mengacaukan halaman, Anda ingin bisa membandingkannya dengan sumber daripada menebak apa kata yang tidak terbaca seharusnya.</blockquote>

  Perlu diperiksa sekali sebelum mempercayai output: buka .docx di Word dan lihat tanda formatting (toggle dengan Ctrl+Shift+8 di Windows, Cmd+8 di macOS). Jika Anda melihat banyak tanda paragraf di akhir setiap baris - karena OCR mengira setiap baris visual adalah paragraf - Anda akan ingin memperbaikinya dengan find-and-replace sebelum mengedit. Solusinya sederhana: ganti tanda paragraf tunggal dengan spasi, lalu tanda paragraf ganda kembali menjadi tunggal. (Saya berpendapat trik Word tunggal ini menghemat lebih banyak waktu daripada pengaturan OCR mana pun.)

  <h2>Ekspektasi akurasi yang realistis</h2>

  Klaim pemasaran "akurasi 99%" mengasumsikan teks cetak bersih pada kertas putih di 300 DPI. Dokumen dunia nyata sangat bervariasi. Berikut yang sebenarnya bisa diharapkan:

  <table>
    <thead>
      <tr>
        <th>Jenis dokumen</th>
        <th>Akurasi OCR tipikal</th>
        <th>Pembersihan dibutuhkan</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Teks cetak bersih, dokumen modern</td>
        <td>95-99%</td>
        <td>Minimal, sebagian besar tanda baca</td>
      </tr>
      <tr>
        <td>Dokumen fax atau fotokopi</td>
        <td>80-90%</td>
        <td>Proofreading per halaman</td>
      </tr>
      <tr>
        <td>Cetakan mesin tik lama / pra-2000</td>
        <td>75-90%</td>
        <td>Proofreading berat, terutama untuk "1" vs "l"</td>
      </tr>
      <tr>
        <td>Tulisan tangan</td>
        <td>30-70%, sangat bervariasi</td>
        <td>Sering lebih cepat mengetik ulang</td>
      </tr>
      <tr>
        <td>Tabel angka</td>
        <td>Layout gagal sebagian besar waktu</td>
        <td>Format ulang manual</td>
      </tr>
      <tr>
        <td>Layout multi-kolom koran atau majalah</td>
        <td>Teks benar, layout salah</td>
        <td>Reflow ke kolom tunggal manual</td>
      </tr>
      <tr>
        <td>Foto kamera halaman (pencahayaan baik)</td>
        <td>85-95%</td>
        <td>Crop dan deskew dulu untuk hasil terbaik</td>
      </tr>
    </tbody>
  </table>

  Siapa pun yang menjanjikan 99% pada dokumen fax entah belum mengujinya atau sedang menjual sesuatu. Atur ekspektasi Anda ke "saya perlu proofread", bukan "saya bisa kirim ini mentah".

  Jebakan spesifik: nomor invoice dan kode referensi adalah tempat kesalahan OCR paling menyakitkan. Digit yang salah baca dalam paragraf body teks dapat dimaafkan; digit yang salah baca pada "Invoice 1023841" dapat membayar ke rekening yang salah. Selalu cocokkan ID numerik di output OCR terhadap aslinya.

  <h2>Pembersihan pra-OCR yang meningkatkan akurasi</h2>

  Lima menit persiapan memotong waktu pembersihan pasca-OCR menjadi setengah:

  <ul>
    <li><strong>Putar halaman miring.</strong> Engine OCR mengasumsikan teks horizontal. Halaman miring 90 derajat mengembalikan ngawur atau tidak ada apa-apa. Gunakan alat untuk <a href="/id/pdf-edit/rotate/">memutar halaman miring terlebih dahulu</a> sebelum OCR.</li>
    <li><strong>Crop margin berlebih.</strong> Border putih lebar membingungkan analyzer layout sehingga mengira kolom tunggal Anda adalah dua. <a href="/id/pdf-edit/rotate/">Crop marginnya</a> ke tempat teks sebenarnya dimulai.</li>
    <li><strong>Tingkatkan kontras.</strong> Scan memudar mendapat manfaat dari peningkatan kontras di software scanner Anda atau editor gambar mana pun sebelum disimpan ulang sebagai PDF. Teks hitam murni di atas latar putih murni adalah standar emas.</li>
    <li><strong>Deskew.</strong> Halaman miring bahkan 2 hingga 3 derajat saja merusak akurasi. Sebagian besar software scanner memiliki opsi auto-deskew, dan layak dijalankan.</li>
    <li><strong>Turunkan warna ke grayscale atau hitam-putih</strong> sebelum scan jika bisa. Tint warna (output fotokopi kantor tipikal yang kekuningan) menggeser kontras dengan cara yang membuat pengenal kacau.</li>
    <li><strong>Lepas staples dan kerutan sebelum scan.</strong> Kedengarannya jelas, tetapi halaman terlipat menghasilkan garis berbayang yang dibaca OCR sebagai underscore atau border tabel.</li>
  </ul>

  <h2>Daftar pembersihan pasca-OCR</h2>

  Setelah .docx mendarat, jalankan beberapa pass find-and-replace sebelum Anda mulai mengedit secara serius. Ini adalah kesalahan OCR paling umum di seluruh dokumen Inggris:

  <ul>
    <li><code>rn</code> sering menjadi <code>m</code>, atau sebaliknya. Cari "rn" dan kata mirip "modern".</li>
    <li><code>l</code> (L kecil) bingung dengan <code>1</code> (satu). Sangat umum di nomor invoice dan tanggal.</li>
    <li><code>0</code> (nol) bingung dengan <code>O</code> (o kapital) di dalam kode dan ID.</li>
    <li>Smart quotes terbalik menjadi straight quotes atau sebaliknya, merusak kutipan.</li>
    <li>Em dash dikonversi menjadi dua hyphen atau hyphen-spasi-hyphen.</li>
    <li>Header dan footer dari setiap halaman bisa berakhir inline sebagai teks. Hapus sekali dan kunci header Word yang nyata sebagai gantinya.</li>
    <li>List berbutir dirender sebagai paragraf biasa diawali dengan literal "•" atau karakter "o" nyasar.</li>
    <li>Kata-kata berhyphen di akhir baris (mer-/chant pada baris berurutan) kadang bertahan ke dokumen Word sebagai hyphen sungguhan. Cari "- " (hyphen-spasi) dan bersihkan.</li>
  </ul>

  Tabel hampir selalu butuh dibangun ulang manual. Jika sumber berisi data yang sebaiknya ada di spreadsheet saja, mungkin lebih cepat untuk <a href="/id/pdf-to-excel/">mengekstrak data ke Excel saja</a> dan melewatkan Word sepenuhnya untuk bagian numerik.

  Layak paragraf terpisah: tanda tangan dan stempel tidak bertahan dari OCR. Mereka muncul sebagai gambar tertanam kecil, sering terpotong, kadang hilang sepenuhnya. Jika nilai hukum dokumen bergantung pada tanda tangan, versi Word hasil OCR Anda adalah salinan kerja, bukan salinan otoritatif. Simpan PDF asli sebagai catatan kanonis.

  <h2>Kapan OCR tidak sepadan</h2>

  Terkadang jawaban yang tepat adalah mengetik ulang daripada OCR-dan-bersihkan. Titik impas tergantung pada panjang dokumen dan kualitas sumber:

  <ul>
    <li><strong>Di bawah satu halaman cetak bersih:</strong> Mengetik ulang sering lebih cepat daripada menjalankan OCR, mengunduh, membuka Word, dan proofing.</li>
    <li><strong>Satu hingga sepuluh halaman cetak bersih:</strong> OCR menang, bahkan dengan pembersihan.</li>
    <li><strong>Sepuluh atau lebih halaman kualitas fax buruk:</strong> OCR menang dalam waktu, tetapi pass pembersihan bisa membosankan. Rencanakan sebagai tugas nyata, bukan pekerjaan cepat lima menit.</li>
    <li><strong>Apa pun yang ditulis tangan:</strong> Ketik ulang kecuali dokumen ratusan halaman dan alternatifnya adalah "tidak memilikinya secara digital sama sekali".</li>
    <li><strong>Data numerik:</strong> Mengetik ulang angka lebih cepat daripada memverifikasi setiap digit output OCR, dan langkah verifikasi wajib jika akurasi penting.</li>
  </ul>

  Satu hal lagi yang patut diketahui tentang kerahasiaan: catatan medis hasil scan atau transkrip deposisi yang Anda OCR melalui layanan web sekarang telah berada sebentar di server orang lain, bahkan jika server itu menghapusnya segera. Untuk dokumen yang dilindungi HIPAA, data kategori khusus GDPR, atau hak istimewa pengacara-klien, jalankan OCR secara lokal dengan Tesseract atau alat desktop seperti ABBYY FineReader. Pajak setup lima menit sepadan dengan ketenangan pikiran.

  <h2>FAQ</h2>

  <h3>Mengapa dokumen Word saya keluar kosong setelah konversi?</h3>
  <p>Hampir selalu, Anda menjalankan konverter non-OCR pada PDF hasil scan. Konverter tidak menemukan layer teks, jadi menghasilkan dokumen Word dengan gambar halaman tertanam tetapi tanpa teks yang bisa diedit. Jalankan ulang file melalui jalur konversi yang OCR-enabled.</p>

  <h3>Apakah OCR bisa menangani catatan tulisan tangan?</h3>
  <p>Kadang, dengan buruk. OCR tulisan tangan membaik dengan model neural tetapi masih berkisar 30% hingga 70% akurasi pada tulisan tangan dunia nyata. Untuk apa pun yang penting, mengetik ulang biasanya lebih cepat daripada mengoreksi output OCR. Tulisan tangan cetak (seperti formulir diisi dengan huruf kapital) jauh lebih baik daripada cursive.</p>

  <h3>Bahasa apa saja yang didukung OCR?</h3>
  <p>Sebagian besar engine, termasuk yang digunakan Convertica, mencakup semua bahasa Eropa utama termasuk Inggris, Spanyol, Prancis, Jerman, Italia, Portugis, Rusia, Polandia, dan banyak lagi. Atur bahasa sumber secara eksplisit untuk skrip beraksen atau non-Latin. Dokumen multi-bahasa (Inggris dengan kutipan Prancis) bekerja paling baik ketika diatur ke bahasa dominan.</p>

  <h3>Mengapa tabel keluar sebagai teks acak?</h3>
  <p>OCR membaca kiri-ke-kanan, atas-ke-bawah, dan batas sel tabel mengacaukan alur itu. Angka dari baris 1 kolom 3 mungkin berakhir di sebelah baris 2 kolom 1. Untuk data tabular, mengonversi langsung ke Excel dan membangun ulang tabel di sana biasanya lebih cepat daripada memperbaikinya di Word.</p>

  <h3>Apakah konversi OCR rahasia?</h3>
  <p>Alat berbasis browser yang reputable memproses file dalam sesi sementara dan menghapusnya tak lama kemudian. Baca kebijakan privasi alat apa pun sebelum mengunggah dokumen sensitif. Untuk material yang sangat rahasia, pertimbangkan OCR lokal (Tesseract, ABBYY) alih-alih layanan web mana pun.</p>

  <h3>Berapa lama OCR untuk scan 50 halaman?</h3>
  <p>Kira-kira dua hingga lima menit pada layanan yang baik, tergantung resolusi gambar dan beban server. Scan pada 600 DPI memakan waktu jauh lebih lama daripada 300 DPI tanpa menghasilkan hasil lebih baik.</p>

  <h2>Coba sekarang</h2>

  <p>Berhenti mengetik ulang. Unggah scan Anda ke <a href="/id/pdf-to-word/">konverter PDF ke Word</a>, atur bahasa sumber, dan Anda akan mengedit di Word satu menit kemudian. Cukup rencanakan pass proofreading cepat sebelum mengirim hasilnya.</p>
