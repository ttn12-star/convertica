  <p>Convertica dibangun di sekitar sisi lima pertanyaan itu yang penting bagi pengguna kasual, bukan pengguna berat. Inilah versi lugasnya, dipetakan ke daftar periksa yang sama:</p>
  <ul>
    <li><strong>Tugas gratis:</strong> operasi sehari-hari - konversi, gabung, pisah, kompres, putar, atur - gratis dipakai, bukan pratinjau di balik dinding berbayar.</li>
    <li><strong>Batas:</strong> untuk pemakaian normal tak ada penghitung tugas harian untuk ditabrak. Anda tak berpacu dengan kuota yang reset tengah malam.</li>
    <li><strong>Watermark:</strong> tak ada pada hasil. File yang Anda unduh adalah file itu, tanpa cap logo.</li>
