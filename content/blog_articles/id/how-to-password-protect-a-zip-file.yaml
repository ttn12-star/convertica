content_id: |
  File ZIP adalah wadah paling universal untuk berbagi banyak file sekaligus. Namun secara default, ZIP tidak menawarkan privasi apa pun — siapa pun yang mendapatkan arsip tersebut dapat langsung membukanya. Menambahkan kata sandi mengubah hal ini: konten menjadi teks terenkripsi yang tidak dapat dibaca tanpa kunci.

  Panduan ini mencakup: cara menambahkan perlindungan kata sandi yang kuat, standar enkripsi apa yang harus dipilih (dan mengapa hal ini memengaruhi kompatibilitas), serta cara menghapus kata sandi nanti jika sudah tidak diperlukan.

  <h2>Mengapa melindungi file ZIP dengan kata sandi?</h2>

  <p>Ada tiga skenario umum di mana arsip yang tidak terlindungi merupakan risiko nyata:</p>

  <ul>
    <li><strong>Lampiran email.</strong> Email direplikasi di seluruh server dan dicadangkan selama bertahun-tahun. ZIP berisi kontrak, slip gaji, atau rekam medis yang dikirim tanpa enkripsi dapat dibaca oleh siapa saja yang memiliki akses ke cadangan tersebut.</li>
    <li><strong>Penyimpanan cloud dan drive bersama.</strong> Mengunggah file sensitif ke Google Drive, Dropbox, atau SharePoint perusahaan berarti penyedia cloud dan siapa saja yang pernah diberi akses ke folder tersebut dapat melihat isinya.</li>
    <li><strong>USB dan serah terima fisik.</strong> Flash drive bisa hilang, ditemukan, dan dicolokkan ke komputer mana saja. ZIP terenkripsi di flash drive tidak bisa dibuka tanpa kata sandi.</li>
  </ul>

  <p>Perlindungan kata sandi bukan pengganti semua langkah keamanan — Anda tetap membutuhkan kata sandi yang kuat dan cara aman untuk membagikannya. Namun ini adalah lapisan perlindungan paling sederhana yang tersedia tanpa perangkat lunak khusus di kedua pihak.</p>

  <h2>AES-256 vs ZipCrypto — pilih enkripsi yang tepat</h2>

  <p>Tidak semua perlindungan kata sandi ZIP setara. Ada dua standar utama:</p>

  <ul>
    <li><strong>ZipCrypto (disebut juga enkripsi "tradisional" atau "Zip 2.0").</strong> Dibangun ke dalam spesifikasi ZIP asli dari tahun 1990-an. Ini lemah — alat modern dapat membobolnya dalam hitungan detik dengan serangan kamus. Satu-satunya keunggulannya: Windows File Explorer dan Archive Utility macOS dapat membukanya secara native.</li>
    <li><strong>AES-256.</strong> Standar emas saat ini, digunakan oleh bank, pemerintah, dan penyedia cloud besar. Mustahil secara komputasi untuk membobolnya dengan perangkat keras apa pun yang ada saat ini. Alat Protect ZIP Convertica menggunakan AES-256.</li>
  </ul>

  <blockquote class="callout">Gunakan AES-256 untuk semua hal yang benar-benar penting. ZipCrypto memberikan rasa aman yang palsu — itu akan menghentikan penyerang yang gigih selama menit, bukan tahun.</blockquote>

  <h3>Catatan kompatibilitas: siapa yang bisa membuka ZIP dengan AES-256?</h3>

  <p>Kompromi AES-256 adalah alat arsip bawaan Windows dan macOS tidak mendukungnya:</p>

  <ul>
    <li><strong>Windows File Explorer</strong> — tidak dapat membuka file ZIP yang dienkripsi AES-256. Akan menampilkan kesalahan atau arsip kosong.</li>
    <li><strong>Archive Utility macOS (ekstraktor klik ganda bawaan)</strong> — juga tidak mendukung AES-256.</li>
  </ul>

  <p>Penerima perlu menginstal aplikasi arsip pihak ketiga yang gratis. Semua berikut ini mendukung AES-256 dan gratis:</p>

  <ul>
    <li><strong>7-Zip</strong> (Windows) — gratis, open source, banyak digunakan.</li>
    <li><strong>WinRAR</strong> (Windows) — secara teknis perangkat lunak percobaan tetapi berfungsi penuh untuk membuka ZIP.</li>
    <li><strong>WinZip</strong> (Windows/macOS) — berbayar tetapi umum di lingkungan perusahaan.</li>
    <li><strong>Keka</strong> (macOS) — gratis dari situs web pengembang, berbayar di Mac App Store.</li>
    <li><strong>The Unarchiver</strong> (macOS) — gratis di Mac App Store, menangani ZIP AES-256.</li>
  </ul>

  <p>Saat mengirim ZIP yang dilindungi kata sandi, sertakan catatan yang memberi tahu penerima aplikasi mana yang digunakan jika mereka belum memilikinya. Ini mencegah keluhan umum "file rusak" padahal penyebab sebenarnya adalah ekstraktor yang tidak kompatibel.</p>

  <h2>Langkah demi langkah: lindungi file ZIP dengan Convertica</h2>

  <ol>
    <li>Buka alat <a href="/archive/protect/">Protect ZIP</a> di Convertica. Tidak diperlukan akun atau pendaftaran.</li>
    <li>Unggah file ZIP Anda. Jika Anda memiliki file terpisah, kompres terlebih dahulu menggunakan opsi "Kirim ke ZIP" sistem operasi Anda, lalu unggah arsip yang dihasilkan.</li>
    <li>Masukkan kata sandi yang kuat. Lihat tips di bawah. Ketik dengan hati-hati — tidak ada opsi pemulihan jika Anda lupa.</li>
    <li>Klik tombol proteksi. Convertica menerapkan enkripsi AES-256 dan menghasilkan ZIP baru yang dilindungi kata sandi.</li>
    <li>Unduh file yang dilindungi. Buka sendiri dengan 7-Zip atau aplikasi arsip yang kompatibel untuk memastikan berfungsi sebelum mengirimkannya kepada siapa pun.</li>
    <li>Bagikan file — dan kirim kata sandi melalui saluran terpisah. Kirim file lewat email, tetapi kata sandi lewat SMS, aplikasi pesan, atau tautan rahasia sekali pakai. Jangan pernah meletakkan kata sandi di email yang sama dengan lampiran.</li>
  </ol>

  <p>Convertica memproses file Anda di memori dan tidak menyimpannya setelah tautan unduhan dibuat. Tidak diperlukan akun, dan file tidak disimpan di server setelah pemrosesan.</p>

  <h2>Cara memilih kata sandi yang kuat untuk ZIP</h2>

  <p>Enkripsi hanya sekuat kata sandi yang melindunginya. AES-256 secara teoritis tidak dapat dipecahkan, tetapi kata sandi yang lemah dapat ditebak atau dipaksa secara offline setelah penyerang memiliki file tersebut.</p>

  <ul>
    <li><strong>Panjang lebih penting dari "kompleksitas".</strong> 16 karakter acak lebih kuat dari 8 karakter penuh simbol.</li>
    <li><strong>Gunakan generator dari pengelola kata sandi.</strong> Alat seperti 1Password, Bitwarden, atau KeePass menghasilkan kata sandi acak yang tidak perlu Anda ingat.</li>
    <li><strong>Hindari data pribadi.</strong> Nama, tanggal lahir, nama perusahaan, dan nama hewan peliharaan bisa ditebak dari informasi publik.</li>
    <li><strong>Simpan salinan cadangan.</strong> Simpan kata sandi di pengelola kata sandi segera. Jika lupa, file tidak dapat dipulihkan.</li>
  </ul>

  <h2>Cara menghapus kata sandi dari file ZIP</h2>

  <p>Jika perlindungan tidak lagi diperlukan, alat <a href="/archive/unlock/">Unlock ZIP</a> Convertica dapat menghapus kata sandi.</p>

  <p>Batasan penting:</p>

  <ul>
    <li>Anda harus mengetahui kata sandi saat ini. Alat ini mendekripsi arsip menggunakan kata sandi yang Anda berikan, lalu menyimpan hasilnya tanpa enkripsi. Ini tidak memecahkan atau melewati kata sandi yang tidak diketahui.</li>
    <li>Jika kata sandi terlupakan dan tidak ada cadangan, file tidak dapat dipulihkan dengan cara apa pun yang praktis.</li>
  </ul>

  <p>Prosesnya sama seperti perlindungan: unggah ZIP terenkripsi, masukkan kata sandi, unduh arsip yang tidak terkunci. Tidak diperlukan pendaftaran.</p>

  <h2>Ringkasan praktik terbaik</h2>

  <ul>
    <li>Selalu gunakan AES-256. Jangan pernah gunakan ZipCrypto untuk hal-hal penting.</li>
    <li>Beritahu penerima aplikasi arsip mana yang harus dipasang jika mereka bukan pengguna teknis.</li>
    <li>Kirim kata sandi melalui saluran berbeda dari file.</li>
    <li>Segera simpan kata sandi di pengelola kata sandi — tidak ada pemulihan.</li>
    <li>Simpan salinan asli yang tidak terenkripsi di tempat yang aman agar bisa dienkripsi ulang jika diperlukan.</li>
    <li>Verifikasi file yang dilindungi sebelum dikirim. Kesalahan ketik pada kata sandi tidak terdeteksi sampai penerima mencoba membuka arsip.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>Bisakah Windows membuka ZIP yang dilindungi kata sandi tanpa perangkat lunak tambahan?</h3>
  <p>Hanya jika ZIP menggunakan enkripsi ZipCrypto yang lebih lama — yang dapat dipecahkan dengan cepat. ZIP yang dienkripsi dengan AES-256 (yang digunakan Convertica) tidak dapat dibuka di Windows File Explorer. Beri tahu penerima untuk menginstal 7-Zip — gratis dan butuh kurang dari satu menit untuk dipasang.</p>

  <h3>Apakah enkripsi cukup kuat untuk dokumen sensitif?</h3>
  <p>Ya. AES-256 adalah standar yang sama yang digunakan untuk melindungi informasi pemerintah rahasia dan data keuangan di seluruh dunia. Risikonya hampir selalu pada kata sandi, bukan algoritmanya — gunakan kata sandi panjang yang dihasilkan secara acak dan Anda akan terlindungi dengan baik.</p>

  <h3>Apa yang terjadi jika saya lupa kata sandi?</h3>
  <p>File secara praktis tidak dapat dipulihkan. Tidak ada kunci utama, opsi pemulihan, atau cara untuk memecahkan AES-256 dalam waktu yang wajar. Itulah mengapa menyimpan kata sandi di pengelola kata sandi dan menjaga file asli yang tidak terenkripsi di tempat yang aman sangat penting sebelum Anda mengenkripsi.</p>

  <h3>Bisakah saya melindungi ZIP yang sudah berisi file dengan kata sandi?</h3>
  <p>Ya. Alat Protect ZIP bekerja pada arsip ZIP yang sudah ada. Jika Anda memiliki file terpisah, kompres terlebih dahulu menggunakan Windows atau macOS, lalu unggah ZIP ke Convertica untuk menambahkan perlindungan AES-256.</p>

  <h3>Apakah Convertica menyimpan file saya setelah pemrosesan?</h3>
  <p>Tidak. File diproses di memori dan tautan unduhan kedaluwarsa segera setelah dibuat. Convertica tidak menyimpan file Anda, dan tidak diperlukan akun atau pendaftaran untuk menggunakan alat ini.</p>

  <h2>Coba sekarang</h2>

  <p>Buka alat <a href="/archive/protect/">Protect ZIP</a>, unggah arsip Anda, atur kata sandi yang kuat, dan unduh file terenkripsi. Saat perlu menghapus kata sandi, gunakan alat <a href="/archive/unlock/">Unlock ZIP</a> — selama Anda masih mengingatnya.</p>
