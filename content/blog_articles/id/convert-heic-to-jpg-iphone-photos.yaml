content_id: |
  Seseorang mengirimimu foto liburan lewat AirDrop, atau kamu menyalin gambar dari iPhone ke laptop Windows, dan file-nya menolak dibuka. Ekstensinya <strong>.heic</strong>, thumbnail-nya kosong, dan penampil foto menyarankanmu membeli codec. Tidak ada yang rusak — kamu baru saja berkenalan dengan format foto Apple. Panduan ini menjelaskan apa itu HEIC, mengapa iPhone-mu menggunakannya, dan tiga cara praktis untuk mendapatkan JPG normal darinya.

  <h2>Apa itu HEIC dan mengapa iPhone-mu menggunakannya?</h2>

  <p>HEIC (High Efficiency Image Container, berbasis standar HEIF) telah menjadi format kamera bawaan di iPhone sejak iOS 11 pada 2017. Apple memilihnya karena satu alasan: pada kualitas visual yang sama, foto HEIC memakan kira-kira setengah dari ruang penyimpanan sebuah JPG. Untuk galeri kamera berisi ribuan foto, itu jumlah ruang yang serius — itulah sebabnya ponselmu memotret dalam HEIC kecuali kamu mengaturnya sebaliknya.</p>

  <p>Masalahnya adalah kompatibilitas. JPG sudah ada di mana-mana selama tiga puluh tahun; HEIC belum. Windows membutuhkan ekstensi codec berbayar untuk membukanya, perangkat Android lama kesulitan, banyak situs web dan portal pemerintah menolaknya saat diunggah, dan kebanyakan kios cetak foto tidak pernah mendengarnya.</p>

  <h2>Metode 1 - Konversi online (untuk file yang sudah kamu miliki)</h2>

  <figure><img src="/static/blog/images/tool-heic-to-jpg-hero.jpg" alt="Layar unggah konverter HEIC ke JPG Convertica" width="1280" height="800" loading="lazy"></figure>

  <p>Saat file HEIC sudah ada di komputermu — dikirim lewat email, disalin dari ponsel, diunduh dari album cloud — mengonversinya di browser adalah jalur terpendek:</p>

  <ol>
    <li>Buka konverter <a href="/id/image/heic-to-jpg/">HEIC ke JPG</a> dan unggah file .heic atau .heif milikmu (hingga 25 MB).</li>
    <li>Pilih format keluaran: <strong>JPG</strong> untuk kompatibilitas universal, <strong>PNG</strong> jika kamu butuh kualitas lossless, atau <strong>PDF</strong> jika foto harus dikirim sebagai dokumen.</li>
    <li>Unduh file hasil konversi. File ini terbuka di semua versi Windows, semua paket aplikasi perkantoran, dan bisa diunggah ke mana saja.</li>
  </ol>

  <figure><img src="/static/blog/images/tool-heic-to-jpg-options.jpg" alt="Opsi format keluaran di konverter HEIC ke JPG" width="1280" height="800" loading="lazy"></figure>

  <p>Konverter ini adalah bagian dari paket alat premium Convertica, dan pengguna premium dapat mengonversi hingga 10 foto HEIC sekaligus secara batch — berguna saat satu album penuh harus menjadi JPG. Jika kamu hanya sesekali menemui satu file HEIC, dua metode gratis di bawah ini mungkin sudah cukup.</p>

  <h2>Metode 2 - Atur iPhone agar memotret JPG (gratis, untuk foto berikutnya)</h2>

  <p>Jika HEIC terus mengganggumu, ubah format kamera di ponsel itu sendiri:</p>

  <ol>
    <li>Buka <strong>Pengaturan</strong> dan masuk ke <strong>Kamera</strong>.</li>
    <li>Ketuk <strong>Format</strong>.</li>
    <li>Pilih <strong>Paling Kompatibel</strong> alih-alih Efisiensi Tinggi.</li>
  </ol>

  <p>Mulai sekarang kamera langsung menyimpan JPG. Imbalannya jujur: fotomu akan memakan ruang kira-kira dua kali lipat, dan mode 48 MP yang mendekati ProRAW di iPhone terbaru mungkin terbatas. Banyak orang membiarkan HEIC aktif demi penghematan ruang dan hanya mengonversi foto tertentu saat ada yang menuntut JPG.</p>

  <h2>Metode 3 - Trik berbagi bawaan (gratis, satu foto per sekali jalan)</h2>

  <p>Dua perilaku diam-diam dari iOS bisa menyelamatkanmu dari konversi sama sekali:</p>

  <ul>
    <li><strong>Email dan banyak aplikasi pesan mengonversi otomatis.</strong> Bagikan foto melalui Mail dan biasanya foto tiba sebagai JPG, bukan HEIC.</li>
    <li><strong>Salin-tempel juga mengonversi.</strong> Jika kamu memilih foto di aplikasi Foto, ketuk Bagikan, lalu <strong>Salin Foto</strong>, dan menempelkannya ke folder atau dokumen, iOS menyerahkan JPG.</li>
  </ul>

  <p>Ada juga pengaturan yang membereskan transfer USB: <strong>Pengaturan &gt; Foto &gt; Transfer ke Mac atau PC &gt; Otomatis</strong>. Dengan pengaturan ini aktif, foto yang disalin lewat kabel tiba dalam format yang kompatibel meskipun tersimpan sebagai HEIC di ponsel.</p>

  <h2>Apakah mengonversi HEIC ke JPG menurunkan kualitas?</h2>

  <p>Secara teknis foto dienkode ulang, jadi terjadi sedikit rekompresi. Dalam praktiknya, pada pengaturan kualitas tinggi perbedaannya tak terlihat — kamu tidak akan menemukannya tanpa zoom sampai level piksel dan membandingkan berdampingan. Dua hal yang patut diketahui:</p>

  <ul>
    <li>JPG akan <strong>lebih besar</strong> daripada HEIC asalnya — sering kali mendekati dua kali lipat. Itu bukan kualitas tambahan; itu semata karena JPG memang kompresor yang kurang efisien. Persis itulah alasan Apple meninggalkannya.</li>
    <li>Jika foto akan banyak diedit setelahnya, konversi ke <strong>PNG</strong> saja. PNG bersifat lossless, sehingga penyimpanan berulang tidak akan menumpuk artefak kompresi.</li>
  </ul>

  <h2>Keluaran mana yang sebaiknya kamu pilih: JPG, PNG, atau PDF?</h2>

  <ul>
    <li><strong>JPG</strong> - jawaban default. Paling kecil dari ketiganya, terbuka di mana saja, tepat untuk foto yang menuju web, chat, atau dokumen kantor.</li>
    <li><strong>PNG</strong> - lossless dan lebih besar. Pilih untuk alur kerja tangkapan layar dari foto, pengeditan berat, atau saat formulir unggah memaksa PNG.</li>
    <li><strong>PDF</strong> - saat foto harus berperilaku seperti dokumen: klaim asuransi, struk, halaman bertanda tangan yang difoto dengan ponsel. Jika kamu punya beberapa foto yang seharusnya menjadi satu dokumen, konversikan dengan alat <a href="/id/jpg-to-pdf/">JPG ke PDF</a> — alat ini menggabungkan banyak gambar menjadi satu PDF.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>Mengapa Windows meminta saya membayar untuk membuka HEIC?</h3>
  <p>Microsoft menyediakan codec video HEVC yang menjadi tumpuan HEIC sebagai add-on berbayar, sehingga instalasi Windows yang baru tidak bisa mendekode format ini. Mengonversi file ke JPG melewati seluruh masalah itu — tidak ada yang diinstal, tidak ada yang dibeli.</p>

  <h3>Apakah konversi mempertahankan metadata foto?</h3>
  <p>Gambarnya sendiri terkonversi dengan bersih. Sebagian metadata (lokasi, pengaturan kamera) mungkin tidak ikut bertahan, jadi jika data EXIF penting untuk keperluanmu, periksa file hasil konversi sebelum menghapus aslinya.</p>

  <h3>Bisakah saya mengonversi satu album sekaligus?</h3>
  <p>Pengguna premium dapat mengunggah hingga 10 file HEIC per batch dan mendapatkan ZIP sebagai hasilnya. Untuk ratusan foto, langkah yang lebih baik adalah perbaikan di sisi iPhone: atur kamera ke Paling Kompatibel, atau gunakan pengaturan transfer USB otomatis, sehingga foto tidak pernah perlu dikonversi sama sekali.</p>

  <h3>Apa perbedaan antara HEIC dan HEIF?</h3>
  <p>HEIF adalah standarnya; HEIC adalah varian khusus yang dipakai Apple (kontainer HEIF dengan kompresi HEVC). Untuk keperluan konversi keduanya berperilaku sama, dan alat ini menerima kedua ekstensi.</p>

  <h3>Apakah HEIC lebih baik daripada JPG?</h3>
  <p>Sebagai format penyimpanan, ya — kualitas sama dengan ukuran sekitar setengahnya, plus dukungan warna 10-bit dan live photo. Sebagai format pertukaran, tidak — dunia masih berbahasa JPG. Pengaturan yang masuk akal adalah HEIC di ponsel, JPG untuk berbagi, dan itu persis yang diberikan metode-metode di atas.</p>

  <h2>Coba sekarang</h2>

  <p>Jika sebuah file HEIC sedang nongkrong di desktopmu dan menolak dibuka, jatuhkan ke <a href="/id/image/heic-to-jpg/">konverter HEIC ke JPG</a>, pilih JPG, dan selesai dalam hitungan detik. Dan jika ini terjadi padamu setiap minggu, luangkan sedetik untuk mengalihkan kamera iPhone ke Paling Kompatibel — dirimu di masa depan akan berterima kasih.</p>
