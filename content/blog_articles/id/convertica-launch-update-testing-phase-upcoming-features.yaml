content_id: |
  <p>Kabar singkat dari tim: <strong>Convertica dirilis pada 8 Desember</strong>, dan seluruh rangkaian alat kini terbuka untuk semua orang. Terima kasih kepada semua yang sudah mencobanya di hari-hari pertama.</p>

  <h2>Kami masih dalam pengujian aktif</h2>

  <p>Kami memantau bagaimana platform bekerja dalam penggunaan nyata, dan kami jujur bahwa ini masih tahap awal. Saat ini kamu mungkin menemui:</p>

  <ul>
    <li>Alat yang berperilaku berbeda dari yang kamu harapkan</li>
    <li>Konversi yang masih perlu disempurnakan</li>
    <li>Sesekali bug kecil atau bagian yang belum mulus</li>
  </ul>

  <p>Semua ini wajar tepat setelah peluncuran, dan setiap laporan yang kami terima membantu kami membereskannya lebih cepat.</p>

  <h2>Beri tahu kami apa yang bermasalah</h2>

  <p>Kalau ada yang tidak berfungsi, atau kamu punya ide tentang apa yang sebaiknya kami buat berikutnya, kirimkan lewat formulir kontak. Kami membaca setiap pesan, mencoba mereproduksi masalah yang dilaporkan, dan memakai masukanmu untuk menentukan apa yang diperbaiki lebih dulu. Masukan awal benar-benar menentukan arah Convertica.</p>

  <h2>Pembaruan besar akan datang</h2>

  <p>Kami sudah mengerjakan rilis yang lebih besar, direncanakan untuk <strong>akhir Januari hingga awal Februari</strong>. Pembaruan ini membawa fitur baru, performa lebih baik, dan pengalaman yang lebih mulus secara keseluruhan. Mendekati tanggalnya, kami akan menulis pos lanjutan dengan rincian apa saja yang baru.</p>

  <h2>Coba alatnya</h2>

  <figure><img src="/static/blog/images/tool-all-tools-hero.jpg" alt="Sekilas alat PDF online Convertica" width="1280" height="800" loading="lazy"></figure>

  <p>Sementara itu, semuanya sudah aktif dan gratis. Jelajahi seluruh rangkaiannya di halaman <a href="/id/all-tools/">semua alat</a>, atau langsung buka yang populer seperti <a href="/id/pdf-to-word/">PDF ke Word</a>. Kalau menemui kendala, kabari kami. Terima kasih sudah hadir sejak awal.</p>
