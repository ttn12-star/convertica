content_id: |
  Anda menggabungkan surat pengantar, CV, dan tiga dokumen referensi menjadi satu PDF untuk lamaran, mengirimnya, dan peninjau membalas email: "Bisakah Anda menunjukkan di mana Anda menyebut anggaran?" Tidak ada nomor halaman untuk ditunjuk. Nomor halaman terasa seperti pemikiran sampingan soal format sampai saat seseorang perlu merujuk halaman tertentu dalam dokumen panjang - dan saat itu ketiadaannya benar-benar menjengkelkan.

  Menambahkannya ke PDF yang sudah ada butuh sekitar dua puluh detik. Satu-satunya keputusan yang patut dipikirkan adalah di mana nomor diletakkan, format apa yang dipakai, dan apakah halaman sampul harus dihitung. Panduan ini mencakup ketiganya, ditambah varian dunia hukum (Bates numbering) dan kasus bundel gabungan di mana nomor halaman paling penting.

  <figure><img src="/static/blog/images/tool-page-numbers-hero.jpg" alt="Alat tambah nomor halaman Convertica dengan area unggah file" width="1280" height="800" loading="lazy"></figure>

  <h2>Mengapa menambahkan nomor setelah PDF ada</h2>

  Jika Anda menulis dokumen di Word atau Google Docs, Anda bisa saja menambahkan nomor di sana. Tetapi bukan dari situ kebanyakan masalah penomoran berasal. Mereka berasal dari PDF yang tidak Anda tulis atau tidak mudah diedit ulang:

  <ul>
    <li>Bundel yang Anda <a href="/id/pdf-organize/merge/">gabungkan dari beberapa file</a>, masing-masing dengan penomorannya sendiri atau tanpa sama sekali.</li>
    <li>Dokumen hasil scan yang hanya ada sebagai PDF.</li>
    <li>File yang dikirim orang lain kepada Anda yang butuh referensi konsisten sebelum rapat.</li>
  </ul>

  Dalam semua kasus ini, sumbernya tidak praktis untuk diedit ulang, jadi Anda menstempel nomor pada PDF yang sudah jadi. Itulah persis yang dilakukan alat penomoran halaman - ia menambahkan lapisan teks di margin tanpa menyentuh konten halaman.

  <h2>Langkah demi langkah: menomori PDF</h2>

  <figure><img src="/static/blog/images/tool-page-numbers-options.jpg" alt="Opsi nomor halaman termasuk posisi, format, dan nomor awal" width="1280" height="800" loading="lazy"></figure>

  Untuk <a href="/id/pdf-edit/add-page-numbers/">menambahkan nomor halaman online</a>:

  <ol>
    <li>Unggah PDF. Pratinjau menunjukkan di mana nomor akan muncul.</li>
    <li>Pilih posisi - bawah-tengah adalah default yang aman; bawah-kanan cocok untuk dokumen yang akan dijilid di sisi kiri.</li>
    <li>Pilih format. "1" polos paling bersih; "Page 1 of 20" memberi tahu pembaca seberapa banyak yang tersisa; "1 of 20" adalah jalan tengah yang ringkas.</li>
    <li>Atur nomor awal dan halaman pertama yang dinomori (lihat di bawah).</li>
    <li>Terapkan dan unduh. Gulir sekali untuk memastikan nomor tidak menimpa teks yang ada.</li>
  </ol>

  <h2>Pertanyaan halaman sampul</h2>

  Kesalahan paling umum adalah menomori sampul. Halaman judul atau daftar isi biasanya tidak boleh menampilkan "1" - penomoran harus dimulai di halaman konten pertama. Alat menanganinya dengan dua pengaturan terpisah yang sering membuat orang bingung:

  <ul>
    <li><strong>Halaman pertama yang dinomori</strong> - memberi tahu alat untuk melewati penomoran halaman 1 (sampul) dan mulai mencetak dari halaman 2.</li>
    <li><strong>Nomor awal</strong> - memberi tahu alat nilai apa yang dicetak pertama. Atur ke 1 agar halaman konten pertama terbaca "1", bukan "2".</li>
  </ul>

  <blockquote class="callout">Untuk mendapatkan sampul tanpa nomor dan konten yang dimulai dari "1": lewati halaman pertama, dan atur nomor awal ke 1. Sesuaikan keduanya - mengubah hanya satu membuat konten mulai dari halaman 2.</blockquote>

  Logika yang sama meluas ke dokumen dengan beberapa halaman pembuka. Laporan dengan sampul dan bagian daftar isi dua halaman mungkin melewati tiga halaman pertama dan mulai hitungan cetak di 1 pada halaman empat.

  <h2>Bates numbering untuk dokumen hukum</h2>

  Firma hukum menggunakan varian yang lebih ketat bernama Bates numbering - pengenal unik berurutan yang distempel di setiap halaman di seluruh kumpulan dokumen, sering dengan prefiks seperti <code>SMITH-000123</code>. Ia ada agar halaman tunggal mana pun dalam produksi discovery bisa dirujuk tanpa ambiguitas, bahkan di antara ribuan halaman dari file berbeda. Jika Anda menyiapkan exhibit atau set discovery, cari opsi prefiks dan nomor lebar-tetap (nol di depan) agar pengenal mengurut dan merujuk dengan rapi. Untuk dokumen sehari-hari, penomoran polos sudah cukup.

  <h2>Menomori bundel gabungan</h2>

  Nomor halaman paling bermanfaat pada dokumen gabungan. Urutan operasi yang benar penting: <strong>gabungkan dulu, lalu nomori</strong>. Jika Anda menomori file individual lalu menggabungkannya, Anda mendapat tiga "halaman 1" dalam satu bundel. Dengan menomori setelah penggabungan, seluruh dokumen membawa satu urutan kontinu dari depan ke belakang.

  Jika Anda kemudian menyisipkan atau menghapus halaman, jalankan ulang penomoran alih-alih mengedit nomor yang distempel - alat akan menomori ulang seluruh file secara konsisten, sementara perbaikan manual meninggalkan celah.

  <h2>Menjaga nomor tetap terbaca</h2>

  <ul>
    <li><strong>Perhatikan margin.</strong> Jika dokumen sudah punya teks footer, letakkan nomor di sudut agar tidak tumpang tindih.</li>
    <li><strong>Sesuaikan nada.</strong> Font kecil dan netral dengan warna sama seperti teks isi terlihat disengaja; nomor tebal besar terlihat seperti ditempelkan.</li>
    <li><strong>Periksa halaman landscape.</strong> Dalam file orientasi campuran, pastikan nomor tetap berada di tempat yang masuk akal pada halaman yang diputar.</li>
    <li><strong>Sisakan ruang untuk penjilidan.</strong> Jika dokumen akan dicetak dan dijilid, jauhkan nomor dari tepi penjilidan.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>Bagaimana cara menambahkan nomor halaman ke PDF secara gratis?</h3>
  <p>Unggah file ke alat penomoran halaman, pilih posisi dan format, atur nomor awal, dan unduh. Ia menambahkan lapisan teks di margin tanpa mengubah konten halaman, dan tidak butuh perangkat lunak atau akun.</p>

  <h3>Bagaimana cara memulai penomoran setelah halaman sampul?</h3>
  <p>Atur "halaman pertama yang dinomori" ke halaman 2 agar sampul tetap kosong, dan atur "nomor awal" ke 1 agar halaman konten pertama Anda terbaca "1". Sesuaikan kedua pengaturan - mengubah hanya satu membuat konten mulai dari "2".</p>

  <h3>Bisakah saya menampilkan "Page 1 of 20" alih-alih hanya "1"?</h3>
  <p>Ya. Kebanyakan alat menawarkan format yang menyertakan total jumlah halaman. "Page X of Y" membantu pada dokumen panjang karena memberi tahu pembaca seberapa banyak yang tersisa.</p>

  <h3>Haruskah saya menomori sebelum atau setelah menggabungkan file?</h3>
  <p>Setelah. Gabungkan dokumen menjadi satu PDF terlebih dahulu, lalu nomori file gabungan agar membawa satu urutan kontinu tunggal. Menomori sebelum menggabungkan menghasilkan beberapa "halaman 1".</p>

  <h3>Apa itu Bates numbering?</h3>
  <p>Skema penomoran hukum yang menstempel pengenal unik berurutan - sering dengan prefiks dan nol di depan, seperti SMITH-000123 - di setiap halaman di seluruh kumpulan dokumen, sehingga halaman mana pun bisa dirujuk tanpa ambiguitas. Gunakan alat dengan opsi prefiks dan lebar-tetap untuk itu.</p>

  <h2>Coba sekarang</h2>

  <p>Buka <a href="/id/pdf-edit/add-page-numbers/">alat tambah nomor halaman</a>, atur posisi dan halaman awal Anda, dan stempel urutan yang rapi dalam hitungan detik. Membangun bundel dulu? <a href="/id/pdf-organize/merge/">Gabungkan file Anda</a>, lalu nomori - atau jelajahi <a href="/id/all-tools/">semua alat PDF</a>.</p>
