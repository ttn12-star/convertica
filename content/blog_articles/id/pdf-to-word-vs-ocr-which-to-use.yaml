  <p>Baris terakhir lebih penting daripada yang dipikirkan orang. Jika tujuan Anda adalah mendapatkan baris dan kolom angka ke spreadsheet, jangan konversi ke Word lalu salin tabel ke Excel. <a href="/id/pdf-to-excel/">Ekstrak tabel ke Excel saja</a> langsung - struktur dipertahankan jauh lebih andal.</p>

  <h2>PDF hibrida: pendekatan dua-pass</h2>
  <p>Dokumen hibrida adalah kasus paling rumit. Kontrak 30 halaman yang digital kecuali dua halaman tanda tangan hasil scan secara teknis dapat dijalankan melalui OCR untuk seluruh file, tetapi Anda akan membayar pajak waktu OCR pada halaman yang tidak membutuhkannya.</p>
  <p>Pendekatan yang lebih bersih ketika penting:</p>
  <ol>
    <li>Pisahkan PDF menjadi seksi digital dan seksi hasil scan.</li>
    <li>Jalankan bagian digital melalui konversi standar.</li>
    <li>Jalankan bagian hasil scan melalui konversi OCR.</li>
    <li>Gabungkan kedua output kembali di Word.</li>
  </ol>
  <p>Untuk sebagian besar kasus santai, jalankan saja seluruh file melalui konversi OCR - halaman digital akan lewat dengan bersih karena sudah memiliki teks yang dapat diseleksi, dan halaman hasil scan akan diproses dengan benar.</p>

  <h2>Apa yang harus dilakukan jika Anda salah memilih</h2>
  <p>Dua mode kegagalan mudah dikenali:</p>
  <h3>Gejala 1: dokumen Word kosong</h3>
  <p>Anda menjalankan konversi standar pada PDF hasil scan. .docx terbuka dan tidak ada apa-apa di dalamnya, atau hanya beberapa page break nyasar. Jalankan ulang file yang sama melalui konversi OCR - teks ada di gambar, bukan di metadata file, jadi OCR adalah satu-satunya cara untuk mengekstraknya.</p>
  <h3>Gejala 2: teks acak</h3>
  <p>Dokumen Word berisi kata seperti "rmaragnemt" atau "1ncome", atau memiliki karakter dari alfabet yang sama sekali salah. Ini adalah OCR yang bekerja dengan pengaturan bahasa yang salah. Jalankan ulang dengan bahasa sumber yang benar dipilih (Inggris vs Spanyol vs Jerman dll.) dan akurasi melonjak drastis.</p>
  <h3>Gejala 3: teks terekstrak tetapi layout hancur</h3>
  <p>Ini normal untuk layout sangat berat (laporan multi-kolom, halaman gaya majalah). Baik konversi standar maupun OCR membangun ulang teks secara linear dan mungkin tidak mempertahankan grid kompleks. Kadang jawabannya adalah menerima trade-off; kadang menyalin bagian individual alih-alih seluruh dokumen.</p>

  <h2>Biaya, privasi, dan waktu pemrosesan</h2>
  <p>Konversi standar pada dasarnya gratis dalam istilah komputasi - lebih dekat ke parse daripada analisis. OCR lebih mahal: setiap halaman diproses melalui model pengenalan, itulah sebabnya scan 50 halaman membutuhkan jauh lebih lama daripada PDF digital 50 halaman. Pada tier gratis, ini mungkin berarti antrean sedikit lebih lama untuk pekerjaan OCR. Pada tier berbayar, mungkin dihitung berbeda terhadap kuota Anda.</p>
  <p>Privasi sama di kedua jalur - unggahan file dienkripsi dalam transit dan diproses hanya selama durasi konversi - tetapi jika Anda ragu, bagian dokumen sensitif dari panduan password-protect membahas kapan Anda harus menambahkan kata sandi pada hasil sebelum berbagi.</p>

  <h2>Aturan satu baris</h2>
  <blockquote class="callout">Jika Anda dapat memilih teks di PDF, gunakan konversi standar. Jika tidak, gunakan OCR. Selebihnya di panduan ini adalah catatan kaki pada tes tunggal itu.</blockquote>

  <p>Anda dapat menjelajahi <a href="/id/all-tools/">semua alat konversi</a> jika Anda memerlukan operasi terdekat seperti memisah file hibrida atau mengekstrak tabel.</p>

  <h2>FAQ</h2>
  <h3>Bagaimana cara saya tahu PDF saya hasil scan atau digital?</h3>
  <p>Coba pilih teks dengan kursor. Jika kata individual tersorot, PDF adalah digital. Jika seluruh halaman (atau region persegi panjang besar) tersorot sebagai satu bentuk, seperti gambar, PDF adalah hasil scan.</p>
  <h3>Apakah OCR lebih lambat dari konversi biasa?</h3>
  <p>Ya, jauh lebih lambat. Konversi standar adalah parse dan berjalan dalam detik; OCR menjalankan setiap halaman melalui model pengenalan dan memakan detik-hingga-menit per halaman tergantung panjang dan kompleksitas. Untuk scan 50 halaman, harapkan beberapa menit total.</p>
  <h3>Apakah OCR memakan lebih banyak kredit atau pemrosesan?</h3>
  <p>Tergantung model harga platform. OCR menggunakan lebih banyak komputasi, jadi platform yang menagih per halaman atau per menit biasanya menetapkan harga OCR lebih tinggi daripada konversi standar. Pada tier gratis biasanya berarti antrean lebih panjang alih-alih harga berbeda.</p>
  <h3>Bisakah saya menjalankan OCR pada PDF digital saja?</h3>
  <p>Bisa, tetapi sebaiknya tidak. Hasilnya akan sedikit lebih buruk daripada konversi standar (OCR memperkenalkan kesalahan pengenalan kecil yang tidak ada ketika teks sudah digital), dan akan memakan waktu jauh lebih lama. Gunakan OCR hanya ketika Anda harus.</p>
  <h3>Mengapa dokumen Word hasil konversi saya tidak ada teks sama sekali?</h3>
  <p>PDF adalah hasil scan dan Anda menggunakan konversi standar. Konversi standar tidak punya apa-apa untuk diekstrak karena tidak ada teks sebenarnya di file. Jalankan ulang PDF yang sama melalui konversi bertenaga OCR dan teks akan muncul.</p>

