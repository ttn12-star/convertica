content_id: |
  Anda ingin mengunci sebuah foto. Tapi mengunci bisa berarti dua hal yang sangat berbeda, dan mencampuradukkannya itulah sebabnya begitu banyak saran di internet meleset. Kadang Anda hanya ingin agar foto pribadi tidak muncul saat menyerahkan ponsel ke teman. Di lain waktu Anda perlu mengirim atau menyimpan foto sedemikian rupa sehingga tak seorang pun bisa membukanya tanpa kata sandi, bahkan jika berkas itu jatuh ke perangkat yang salah. Panduan ini membahas keduanya, dan jujur soal di mana tiap pendekatan berhenti bekerja.

  <h2>Pertama, tentukan apa arti "melindungi" bagi Anda</h2>

  <p>Dua tujuan, dua perangkat berbeda.</p>

  <ul>
    <li><strong>Menyembunyikan foto di ponsel Anda sendiri.</strong> Hanya Anda yang memakai perangkat itu, dan Anda cuma ingin mengeluarkan sebagian gambar dari galeri utama lalu menaruhnya di balik Face ID atau PIN. Setiap ponsel sudah punya ini bawaan dan tidak berbiaya.</li>
    <li><strong>Mengunci foto yang hendak Anda kirim atau simpan.</strong> Di sini berkas lepas dari tangan Anda. Album pribadi di ponsel tak berguna begitu gambar dilampirkan ke email atau disalin ke flash disk. Untuk ini kata sandi harus ikut di dalam berkas itu sendiri.</li>
  </ul>

  <p>Sebelum mulai, tanyakan mana yang sebenarnya Anda butuhkan. Yang pertama adalah setelan ponsel yang bisa dinyalakan dalam hitungan detik. Yang kedua butuh enkripsi sungguhan, dan di sinilah gambar jadi rumit, seperti akan Anda lihat di bawah.</p>

  <h2>Mengunci foto di iPhone</h2>

  <p>iOS memberi dua jalan, tergantung seberapa pribadi fotonya.</p>

  <p><strong>Album Tersembunyi.</strong> Di Photos, buka gambarnya, ketuk tombol bagikan atau lainnya, lalu pilih Sembunyikan. Foto pindah ke album Tersembunyi yang tak muncul di pustaka utama. Pada iOS 16 ke atas, album itu, bersama Baru Dihapus, terkunci di balik Face ID atau kode sandi secara bawaan, jadi orang yang membolak-balik galeri Anda tak akan tak sengaja menemukannya.</p>

  <p><strong>Kunci di dalam catatan.</strong> Untuk sesuatu yang ingin Anda taruh di balik kata sandi sungguhan, tempel foto ke aplikasi Notes lalu kunci catatan itu lewat tombol bagikan. Notes memakai kode sandi perangkat atau kata sandi terpisah yang Anda atur, dan catatan terkunci dienkripsi di perangkat. Trik yang praktis saat Anda ingin menyegel satu atau dua gambar sensitif alih-alih menyembunyikan seluruh album.</p>

  <h2>Mengunci foto di Android</h2>

  <p><strong>Folder Terkunci Google Foto.</strong> Buka Foto, masuk ke Perpustakaan, lalu Utilitas, dan siapkan Folder Terkunci. Apa pun yang Anda pindahkan ke sana tetap di luar kisi, di luar pencarian, dan di luar aplikasi mana pun yang membaca galeri, dan hanya terbuka setelah kunci layar. Foto di Folder Terkunci tidak dicadangkan, dan itulah harga untuk membuatnya tetap pribadi di perangkat.</p>

  <p><strong>Secure Folder Samsung.</strong> Di ponsel Galaxy, Secure Folder ada di Pengaturan, di bawah Keamanan dan privasi, dan membuat ruang terpisah yang terenkripsi dengan kuncinya sendiri. Pindahkan foto ke sana dan foto lenyap dari galeri biasa sampai Anda membuka folder itu. Ia melangkah lebih jauh daripada album tersembunyi karena seluruh ruangnya terenkripsi, bukan sekadar disingkirkan dari pandangan.</p>

  <h2>Jebakan yang dimiliki setiap brankas di ponsel</h2>

  <p>Semua opsi di atas melindungi foto di satu perangkat. Itu memang berguna, tapi baca batasnya baik-baik: perlindungan tidak ikut bersama berkas. Begitu Anda melampirkan foto tersembunyi ke email, membagikannya lewat pesan, atau menyalinnya ke komputer, ia tiba sebagai gambar biasa yang bisa dibuka. Kuncinya tinggal di ponsel Anda, bukan di gambarnya.</p>

  <p>Jadi jika tujuan Anda mengirim foto yang tetap pribadi di perjalanan, atau menyimpannya di drive bersama tempat orang lain bisa membukanya, brankas ponsel adalah alat yang salah. Anda butuh kata sandi yang tertanam di dalam berkas.</p>

  <h2>Memberi kata sandi pada foto untuk dikirim atau disimpan</h2>

  <p>Inilah bagian jujur yang dilewatkan kebanyakan panduan: berkas gambar tak punya tempat untuk kata sandi. JPG atau PNG hanyalah data piksel. Tak ada kolom dalam format itu untuk menyimpan kata sandi, dan tak ada cara baku bagi penampil foto untuk memintanya. Itu sebabnya Anda tak pernah melihat kotak "masukkan kata sandi" saat membuka gambar biasa, dan sebabnya mengganti nama atau "menyembunyikan" berkas tidak melindungi apa pun dengan sendirinya.</p>

  <p>Solusi universalnya adalah membungkus foto dalam sesuatu yang mendukung kata sandi, dan format yang sudah bisa dibuka setiap perangkat adalah PDF. Taruh gambar Anda di dalam PDF, enkripsi PDF itu dengan kata sandi, dan Anda mendapat berkas yang tak menampilkan apa pun selain permintaan kata sandi sampai kode yang benar diketik, entah dibuka di iPhone, Android, Mac, atau PC Windows.</p>

  <p>Itulah persis yang dilakukan alat <a href="/id/image/password-protect-image/">Lindungi Gambar dengan Kata Sandi</a>.</p>

  <ol>
    <li>Buka alat <a href="/id/image/password-protect-image/">Lindungi Gambar dengan Kata Sandi</a> dan unggah foto Anda. JPG, PNG, dan HEIC semuanya bisa.</li>
    <li>Pilih kata sandi. Buat yang kuat dan mudah Anda ingat, karena berkas benar-benar dienkripsi dan tak ada pintu belakang jika Anda kehilangannya.</li>
    <li>Unduh hasilnya. Ini PDF berisi gambar Anda, disegel dengan enkripsi AES-256. Kirim atau simpan di mana saja, dan siapa pun yang membukanya menemui permintaan kata sandi lebih dulu, bukan foto Anda.</li>
  </ol>

  <p>Bagikan kata sandi lewat saluran yang berbeda dari berkasnya. Kata sandi lewat pesan teks dan berkas lewat email jauh lebih aman daripada menaruh keduanya dalam satu pesan.</p>

  <h2>Kenapa AES-256 dan bukan "JPG terkunci"</h2>

  <p>AES-256 adalah kelas enkripsi yang sama yang dipakai untuk melindungi berkas perbankan dan pemerintah. Ketika foto berada di dalam PDF terenkripsi AES-256, pikselnya bukan sekadar disembunyikan, melainkan diacak, dan tanpa kata sandi tak ada yang bisa ditampilkan sama sekali. Bandingkan dengan gambar yang disembunyikan atau diganti namanya, yang bisa diungkap siapa saja dalam hitungan detik. Jika sebuah foto cukup penting untuk dikunci, ia layak dikunci dengan benar.</p>

  <h2>Pertanyaan yang sering diajukan</h2>

  <h3>Bisakah saya menaruh kata sandi langsung pada JPG atau PNG?</h3>
  <p>Tidak pada gambarnya sendiri. Format JPG dan PNG tak punya kolom kata sandi, jadi tak ada penampil foto baku yang bisa menguncinya atau membukanya. Untuk melindungi foto dengan kata sandi, Anda membungkusnya dalam wadah terenkripsi, dan PDF adalah wadah yang bisa dibuka setiap perangkat. Itulah pendekatan yang dipakai alat ini.</p>

  <h3>Apakah menyembunyikan foto sama dengan melindunginya dengan kata sandi?</h3>
  <p>Tidak. Menyembunyikan memindahkan foto dari pandangan di satu perangkat, tapi berkasnya tetap sepenuhnya bisa dibuka. Jika ia meninggalkan perangkat, atau seseorang membuka kunci ponsel, fotonya ada di situ. Perlindungan kata sandi mengenkripsi berkas, sehingga tak bisa dibuka sama sekali tanpa kata sandi, ke mana pun ia berakhir.</p>

  <h3>Apa yang terjadi jika saya lupa kata sandinya?</h3>
  <p>Berkas tak bisa dibuka, dan itu memang disengaja. Enkripsi sungguhan tak punya tombol pemulihan, jadi simpan kata sandi di pengelola kata sandi dan jangan pernah jadikan satu-satunya salinan. Jika Anda hanya butuh privasi sehari-hari di ponsel sendiri, bukan berkas tersegel, brankas ponsel menghindarkan risiko ini sepenuhnya.</p>

  <h3>Apakah berkas yang dilindungi kehilangan kualitas gambar?</h3>
  <p>Tidak. Foto Anda masuk ke PDF apa adanya, jadi gambar di dalamnya berkualitas sama dengan aslinya. Enkripsi mengubah cara berkas disimpan, bukan tampilan gambar setelah dibuka kuncinya.</p>

  <h3>Bisakah penerima membukanya tanpa perangkat lunak khusus?</h3>
  <p>Bisa. Hasilnya adalah PDF terenkripsi biasa, dan pembaca PDF sudah ada di setiap ponsel dan komputer. Mereka mengetik kata sandi sekali dan fotonya muncul, tanpa perlu memasang apa pun.</p>

  <h3>Apakah aman melindungi foto secara online?</h3>
  <p>Berkas yang diunggah diproses lalu dihapus dari server setelah jeda singkat, jadi tak ada yang disimpan atau dibagikan. Untuk foto yang tak boleh meninggalkan komputer Anda, jalur teraman adalah brankas ponsel atau alat luring. Untuk foto yang perlu Anda kirim atau simpan dengan kata sandi, mengenkripsinya secara online itu cepat, dan sejak itu berkasnya sendiri yang membawa perlindungan.</p>

  <h2>Coba sekarang</h2>

  <p>Jika Anda hanya ingin mengeluarkan beberapa foto dari galeri utama, album Tersembunyi, Folder Terkunci, atau Secure Folder di ponsel menuntaskannya dalam hitungan detik. Tapi jika foto itu harus bepergian, atau menetap di drive bersama dengan kata sandi, jatuhkan ke alat <a href="/id/image/password-protect-image/">Lindungi Gambar dengan Kata Sandi</a> dan unduh PDF terkunci yang tak terbuka bagi siapa pun tanpa kodenya.</p>
