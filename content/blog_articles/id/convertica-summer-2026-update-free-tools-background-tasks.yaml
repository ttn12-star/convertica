content_id: |
  <p>Sejak berita terakhir, banyak hal yang kami rilis. Singkatnya: lima alat keluar dari Premium, dua pengonversi baru hadir, dan Premium kini bisa terus bekerja saat Anda mengerjakan hal lain. Berikut rinciannya.</p>

  <h2>Lima alat kini gratis</h2>
  <p>Dulu alat-alat ini butuh langganan Premium. Sekarang tidak lagi:</p>
  <ul>
    <li><a href="/id/image/heic-to-jpg/">HEIC ke JPG</a> (foto iPhone)</li>
    <li><a href="/id/pdf-to-markdown/">PDF ke Markdown</a></li>
    <li><a href="/id/epub-to-pdf/">EPUB ke PDF</a> dan <a href="/id/pdf-to-epub/">PDF ke EPUB</a></li>
    <li><a href="/id/pdf-to-text/">PDF ke Teks</a></li>
    <li><a href="/id/pdf-edit/sign/">Tanda Tangani PDF</a></li>
  </ul>
  <p>Tembok berbayar per alat juga kami hapus. Gantinya, ada satu kuota harian sederhana yang berlaku untuk semua alat di situs: <strong>10 konversi per hari</strong> tanpa akun, <strong>40 per hari</strong> dengan akun gratis, dan tanpa batas untuk Premium. Hanya konversi yang berhasil yang dihitung, dan penghitungnya di-reset setiap hari. Pemrosesan massal, OCR, dan file berukuran sangat besar tetap khusus Premium.</p>

  <h2>Baru: lindungi foto dengan kata sandi</h2>
  <p>Perlu mengirim pindaian paspor atau foto dokumen? <a href="/id/image/password-protect-image/">Lindungi Gambar</a> mengemas satu atau beberapa gambar menjadi satu PDF yang dikunci dengan enkripsi AES-256. Penerima file hanya bisa membukanya dengan kata sandi. Gratis, seperti alat gambar lainnya.</p>

  <figure><img src="/static/images/tools/image-password-protect-image.jpg" alt="Alat Lindungi Gambar: foto menjadi PDF berkata sandi" width="1200" height="750" loading="lazy"></figure>

  <h2>Baru: PDF ke PDF/A untuk arsip</h2>
  <p>Pengadilan, kampus, dan portal pemerintah sering hanya menerima PDF/A, format ISO untuk pengarsipan jangka panjang. <a href="/id/pdf-to-pdfa/">Konverter PDF ke PDF/A</a> yang baru menghasilkan PDF/A-1b, 2b, atau 3b dan memeriksa bahwa hasilnya benar-benar menyatakan kesesuaian sebelum diserahkan. Bagian dari Premium.</p>

  <h2>Premium: tutup tab, kami lanjutkan</h2>
  <p>Pekerjaan panjang seperti OCR pada pindaian tebal dulu menyandera tab browser Anda. Kini pengguna Premium bisa mengirim konversi panjang apa pun ke latar belakang dan melanjutkan aktivitas. Begitu selesai:</p>
  <ul>
    <li>hasil dikirim lewat email (lampiran hingga 10 MB, selebihnya berupa tautan unduhan),</li>
    <li>browser menampilkan notifikasi push, bahkan saat Anda membuka situs lain,</li>
    <li>file menunggu di riwayat konversi Anda yang baru.</li>
  </ul>
  <p>Detailnya ada di halaman <a href="/id/background-tasks/">Tugas Latar Belakang</a>.</p>

  <figure><img src="/static/images/tools/background-tasks.jpg" alt="Antrean tugas latar belakang: konversi tetap berjalan setelah tab ditutup" width="1200" height="750" loading="lazy"></figure>

  <h2>Premium: alur kerja tersimpan</h2>
  <p>Mengompres faktur dengan pengaturan yang sama setiap Jumat? Simpan alat beserta pengaturannya sebagai alur kerja, lalu buka semuanya dengan satu klik. Alur kerja tersimpan di browser dan tersinkron lewat akun Anda: preset yang dibuat di kantor muncul juga di laptop rumah. Selengkapnya di halaman <a href="/id/saved-workflows/">Alur Kerja Tersimpan</a>.</p>

  <figure><img src="/static/images/tools/saved-workflows.jpg" alt="Dasbor alur kerja tersimpan dengan preset alat" width="1200" height="750" loading="lazy"></figure>

  <h2>Lindungi PDF: Anda yang menentukan hak pembaca</h2>
  <p><a href="/id/pdf-security/protect/">Lindungi PDF</a> tetap gratis mengenkripsi file dengan AES-256. Premium menambahkan kontrol izin: Anda bisa memblokir pencetakan, penyalinan, atau pengeditan file yang dilindungi.</p>

  <h2>Convertica sebagai aplikasi</h2>
  <p>Convertica kini bisa dipasang di ponsel atau komputer layaknya aplikasi biasa: ikon di layar utama, jendela sendiri, tanpa embel-embel browser. Tidak perlu toko aplikasi. <a href="/id/install/">Panduan pemasangan</a> mencakup iPhone, Android, Windows, dan Mac.</p>

  <h2>Lebih cepat, lebih senyap, lebih stabil</h2>
  <ul>
    <li>Halaman terasa jauh lebih cepat; sebagian besar kini hampir menyentuh skor sempurna di PageSpeed.</li>
    <li>Kami melepas analitik pihak ketiga. Kunjungan dihitung oleh penghitung kami sendiri tanpa cookie.</li>
    <li>Setiap halaman alat kini menampilkan tangkapan layar antarmukanya, dan banyak yang punya tutorial video singkat.</li>
    <li>Bug yang membuat halaman konverter tampil kosong bagi sebagian pengguna berbahasa Arab sudah diperbaiki, plus puluhan perbaikan kecil lainnya.</li>
  </ul>

  <h2>Coba sekarang</h2>
  <p>Semua yang di atas sudah aktif. Jelajahi <a href="/id/all-tools/">semua alat</a>, dan kalau ada yang aneh, kabari kami lewat <a href="/id/contact/">formulir kontak</a>. Separuh rilis ini lahir dari laporan Anda.</p>
