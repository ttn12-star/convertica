content_id: |
  <p>Pembaruan terbesar kami hampir tiba. Rilis ini menambahkan <strong>sistem langganan Premium</strong>, menyempurnakan alat yang sudah Anda pakai, dan menghadirkan lima konverter baru. Inilah yang akan datang.</p>

  <h2>Pemberitahuan sebelum peluncuran</h2>
  <p>Rilis sebesar ini menyentuh banyak bagian yang bergerak, jadi pada hari-hari pertama beberapa hal mungkin berperilaku aneh. Jika ada yang rusak — <strong>beri tahu kami</strong>, dan kami akan memperbaikinya dengan cepat.</p>

  <h2>Langganan Premium</h2>
  <p>Premium hadir dalam tiga paket:</p>
  <ul>
    <li><strong>1 hari</strong> — $1</li>
    <li><strong>1 bulan</strong> — $5</li>
    <li><strong>1 tahun</strong> — $52</li>
  </ul>
  <p>Setiap paket Premium membuka:</p>
  <ul>
    <li>Batas lebih tinggi untuk ukuran file dan jumlah halaman</li>
    <li>Pemrosesan OCR</li>
    <li>Pemrosesan batch pada alat tertentu</li>
    <li>Antrean pemrosesan terpisah yang lebih cepat</li>
    <li>Mode gelap opsional</li>
  </ul>

  <h2>Peringkat Hero</h2>
  <p>Pelanggan Premium menjaga Convertica tetap berjalan, jadi kami menyebut mereka <strong>Hero</strong>. Semakin lama Anda berlangganan, semakin tinggi peringkat Anda:</p>
  <ul>
    <li><strong>Bronze Hero</strong> — 30+ hari berturut-turut</li>
    <li><strong>Silver Hero</strong> — 90+ hari berturut-turut</li>
    <li><strong>Gold Hero</strong> — 180+ hari berturut-turut</li>
    <li><strong>Platinum Hero</strong> — 365+ hari berturut-turut</li>
  </ul>
  <p>Akan ada juga <strong>papan peringkat</strong> berisi 10 Hero yang paling lama mendukung kami, plus ticker opsional bagi siapa pun yang ingin tampil di sorotan.</p>

  <h2>Lima konverter baru</h2>
  <p>Bersama fitur Premium dan peningkatan alat, kami menambahkan lima konverter:</p>
  <ul>
    <li>PDF ke HTML</li>
    <li>HTML ke PDF</li>
    <li>PDF ke PPTX</li>
    <li>PPTX ke PDF</li>
    <li>Excel ke PDF</li>
  </ul>

  <figure><img src="/static/blog/images/tool-all-tools-hero.jpg" alt="Koleksi alat PDF Convertica" width="1280" height="800" loading="lazy"></figure>

  <h2>Terima kasih telah bersama kami</h2>
  <p>Ini rilis yang paling kami banggakan, dan masukan Andalah yang membentuknya. Jelajahi <a href="/id/all-tools/">semua alat</a> untuk melihat apa yang tersedia hari ini, atau coba <a href="/id/excel-to-pdf/">konverter Excel ke PDF</a> begitu tersedia. Segera hadir lebih banyak.</p>
