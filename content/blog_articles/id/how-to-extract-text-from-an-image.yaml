content_id: |
  Kamu bisa melihat kata-katanya, tapi tidak bisa memilihnya. Semuanya terkunci di dalam gambar — tangkapan layar slide, foto halaman cetak, struk yang dipindai, kartu nama. Mengetik ulang adalah pilihan yang paling jelas sekaligus paling buruk. Pengenalan karakter optik (OCR) melakukannya untukmu: membaca piksel, mengenali bentuk huruf, dan mengembalikan teks yang bisa kamu salin, edit, dan cari.

  Panduan ini menunjukkan cara menarik teks dari gambar menggunakan alat gratis di browser, apa yang membuat hasilnya bersih atau kacau, serta cara menangani kasus yang lebih sulit seperti foto HEIC dari iPhone dan teks non-Inggris.

  <h2>Kapan kamu membutuhkan OCR (dan kapan tidak)</h2>

  <figure><img src="/static/blog/images/tool-image-to-text-hero.jpg" alt="Layar unggah alat OCR Gambar ke Teks Convertica" width="1280" height="800" loading="lazy"></figure>

  Jika kamu sudah bisa menyorot kata-kata individual dengan kursor, teks sudah "hidup" — cukup salin saja, tidak perlu OCR. Kamu membutuhkan OCR ketika kata-kata adalah bagian dari gambar itu sendiri:

  <ul>
    <li><strong>Tangkapan layar</strong> teks yang tidak bisa dipilih (frame video, obrolan, kotak dialog error).</li>
    <li><strong>Foto</strong> halaman cetak, papan tulis, papan nama, atau slide.</li>
    <li><strong>Scan dan faks</strong> yang disimpan sebagai JPG, PNG, atau TIFF.</li>
    <li><strong>Struk dan kartu nama</strong> yang ingin kamu simpan sebagai teks.</li>
  </ul>

  <h2>Cara mengekstrak teks dari gambar</h2>

  <figure><img src="/static/blog/images/tool-image-to-text-options.jpg" alt="Opsi untuk mengekstrak teks dari gambar dengan OCR" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Buka alat <a href="/id/image/to-text/">Gambar ke Teks</a> dan unggah gambarmu (JPG, PNG, WebP, HEIC, BMP, TIFF, atau GIF). Kamu bisa langsung menariknya ke halaman.</li>
    <li>Pilih bahasa teks, atau biarkan di <strong>Deteksi otomatis</strong>. Menetapkan bahasa secara eksplisit sangat membantu untuk teks non-Inggris atau yang memuat karakter beraksen.</li>
    <li>Klik <strong>Ekstrak Teks</strong>. Teks yang dikenali muncul di halaman dalam beberapa detik.</li>
    <li>Gunakan <strong>Salin</strong> untuk mengambilnya, atau <strong>Unduh .txt</strong> untuk menyimpannya sebagai file teks biasa. Selalu lakukan pengecekan cepat sebelum menggunakannya.</li>
  </ol>

  <p>Tidak ada yang diinstal dan file diproses dalam sesi sementara lalu dihapus — tetapi lihat catatan kerahasiaan di FAQ untuk dokumen sensitif.</p>

  <h2>Apa yang sebenarnya memengaruhi akurasi</h2>

  Kualitas OCR sebagian besar ditentukan oleh gambar yang kamu berikan. Tiga hal paling penting:

  <ul>
    <li><strong>Ketajaman.</strong> Teks yang tajam dan fokus terbaca dengan bersih. Blur akibat gerakan dan foto ponsel yang tidak fokus adalah penyebab utama hasil yang kacau.</li>
    <li><strong>Kontras.</strong> OCR bekerja berdasarkan perbedaan antara tinta dan latar belakang. Fotokopi yang pudar atau foto dalam kondisi cahaya rendah memberikan terlalu sedikit informasi bagi pengenalan, bahkan pada resolusi tinggi sekalipun.</li>
    <li><strong>Bahasa.</strong> Model yang dilatih dalam bahasa Inggris salah membaca karakter beraksen dan kata-kata yang tidak familiar. Pilih bahasa yang benar alih-alih Otomatis kapan pun kamu mengetahuinya.</li>
  </ul>

  <p>Resolusi juga membantu: usahakan teks memiliki tinggi setidaknya beberapa ratus piksel per baris. Untuk scan, 300 DPI adalah batas bawah yang nyaman. Pada teks catatan kaki kecil di foto resolusi rendah, di situlah akurasi runtuh.</p>

  <h2>Foto iPhone (HEIC) dan format lainnya</h2>

  <p>Foto langsung dari iPhone atau iPad modern biasanya berformat <strong>HEIC/HEIF</strong>, bukan JPG. Kamu tidak perlu mengonversinya terlebih dahulu — unggah HEIC dan alat ini mendekodinya secara langsung. JPG, PNG, WebP, BMP, TIFF, dan GIF semuanya bekerja dengan cara yang sama. Untuk TIFF multihalaman atau GIF animasi, hanya frame pertama yang digunakan.</p>

  <h2>Tips untuk hasil yang bersih</h2>

  <ul>
    <li>Isi bingkai dengan teks dan potong latar belakang, tangan, dan tepi meja — kekacauan membingungkan deteksi tata letak.</li>
    <li>Foto dari depan secara lurus. Halaman yang difoto dari sudut miring mendistorsi huruf dan menurunkan akurasi; alat ini meluruskan kemiringan ringan, tetapi foto langsung dari depan adalah yang terbaik.</li>
    <li>Hindari silau dan bayangan. Cahaya merata dan difus lebih baik daripada jendela yang terang atau flash ponsel.</li>
    <li>Untuk tata letak multikolom, harapkan teks dalam urutan baca, bukan kolom yang direkonstruksi.</li>
    <li>Periksa tersangka biasa: 0/O, 1/l/I, rn/m, dan tanda baca yang tidak sesuai.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>Apakah benar-benar gratis?</h3>
  <p>Ya. Mengekstrak teks dari satu gambar gratis, tanpa registrasi dan tanpa tanda air pada hasilnya.</p>

  <h3>Bahasa apa saja yang didukung?</h3>
  <p>17 bahasa, termasuk Inggris, Rusia, Jerman, Prancis, Spanyol, Italia, Portugis, Polandia, Turki, Ukraina, Hindi, Indonesia, Arab, Tionghoa (Sederhana dan Tradisional), Jepang, dan Korea — ditambah deteksi otomatis. Untuk teks dengan aksen atau aksara non-Latin, atur bahasa secara eksplisit untuk akurasi terbaik.</p>

  <h3>Bisakah membaca tulisan tangan?</h3>
  <p>Terkadang, dan tidak secara andal. OCR dilatih pada teks cetak; akurasi tulisan tangan sangat bervariasi dan tulisan sambung adalah yang paling buruk. Huruf cetak — seperti formulir yang diisi dengan tangan — terbaca jauh lebih baik daripada tulisan bersambung.</p>

  <h3>Mengapa ada teks yang salah atau hilang?</h3>
  <p>Hampir selalu masalahnya ada pada gambar sumber: blur, kontras rendah, teks kecil, atau pengaturan bahasa yang salah. Foto ulang dengan lebih tajam dan pencahayaan lebih baik, pilih bahasa yang benar, dan hasilnya biasanya meningkat drastis.</p>

  <h3>Apakah ini rahasia?</h3>
  <p>Gambar diproses dalam sesi sementara dan dihapus sesaat kemudian. Meski begitu, baca kebijakan privasi sebelum mengunggah materi sensitif. Untuk dokumen yang sangat rahasia — rekam medis, file hukum yang dilindungi — lebih baik gunakan OCR lokal (seperti Tesseract) daripada layanan web mana pun.</p>

  <h3>Bisakah saya mendapatkan teks sebagai dokumen Word?</h3>
  <p>Alat ini mengembalikan teks biasa yang bisa kamu tempel di mana saja. Jika kamu secara khusus membutuhkan <em>PDF</em> yang dipindai diubah menjadi file Word berformat, gunakan konverter <a href="/id/pdf-to-word/">PDF ke Word</a> dengan OCR.</p>

  <h2>Coba sekarang</h2>

  <p>Berhenti mengetik ulang. Jatuhkan tangkapan layar atau fotomu ke alat <a href="/id/image/to-text/">Gambar ke Teks</a>, pilih bahasanya, dan kamu akan mendapatkan teks yang dapat diedit dalam hitungan detik — cukup lakukan pengecekan cepat sebelum menggunakannya.</p>
