  <h2>Mengapa ukuran file lebih penting dari kelihatannya</h2>

  <p>Gambar biasanya menjadi muatan terberat di sebuah halaman. Mengecilkannya adalah kemenangan performa yang paling mudah: halaman dimuat lebih cepat, skor <strong>Core Web Vitals</strong> membaik, dan pengunjung seluler membakar lebih sedikit kuota. Kecepatan halaman adalah sinyal peringkat, jadi bagi pemilik situs pilihan format diam-diam juga merupakan keputusan SEO.</p>

  <p>Gambaran konkret angkanya: foto 12 megapiksel tipikal berukuran sekitar 2-4 MB sebagai JPEG kualitas tinggi, 1,5-3 MB sebagai WebP pada kualitas visual yang sama, dan 15-25 MB sebagai PNG. Angka PNG itu bukan salah ketik — penyimpanan foto secara lossless luar biasa mahal, dan itulah alasan PNG adalah format yang keliru untuk fotografi.</p>

  <h2>Kapan JPEG masih menjadi pilihan tepat</h2>

  <p>WebP menang soal ukuran, tetapi JPEG punya satu keunggulan tak terkalahkan: tiga puluh tahun dukungan universal. Pilih JPEG saat gambar keluar dari kendalimu:</p>

  <ul>
    <li>Melampirkan foto ke email atau dokumen yang mungkin dibuka seseorang di perangkat lunak lama.</li>
    <li>Mengunggah ke portal pemerintah, lamaran kerja, dan formulir dengan daftar tipe file yang ketat.</li>
    <li>Mengirim foto ke layanan cetak atau kios foto.</li>
    <li>Berbagi dengan orang yang perangkatnya sama sekali tidak kamu ketahui.</li>
  </ul>

  <p>Lampiran WebP yang tidak bisa dibuka penerimanya menghemat 30% dari nol.</p>

  <h2>Kapan PNG adalah satu-satunya jawaban yang benar</h2>

  <p>Kompresi lossy bekerja dengan membuang detail yang dimaafkan mata pada foto — tetapi mata tidak memaafkannya pada grafik. Teks yang dikompresi JPEG menumbuhkan halo buram; batas warna yang tajam menjadi luntur. Gunakan PNG untuk:</p>

  <ul>
    <li><strong>Logo dan ikon</strong>, terutama yang ditempatkan di atas latar berwarna (kamu butuh transparansinya).</li>
    <li><strong>Tangkapan layar UI</strong> yang memuat teks — dokumentasi, laporan bug, tutorial.</li>
    <li><strong>Bagan, diagram, dan pixel art</strong> dengan tepi keras dan warna datar.</li>
    <li>Gambar apa pun yang akan <strong>diedit dan disimpan ulang berkali-kali</strong> — lossless berarti tidak ada degradasi antargenerasi.</li>
  </ul>

