  <h2>FAQ</h2>

  <h3>Apakah kualitas WebP lebih rendah daripada JPEG?</h3>
  <p>Tidak — pada pengaturan yang sebanding WebP mempertahankan kualitas visual yang sama dalam file yang lebih kecil. Kompresornya hanya lebih baru dan lebih cerdas daripada milik JPEG yang berasal dari 1992. Kualitas ditentukan oleh tingkat yang kamu pilih, bukan oleh nama formatnya.</p>

  <h3>Mengapa sebagian situs menolak unggahan WebP saya?</h3>
  <p>Validasi unggahan mereka lebih tua daripada popularitas WebP dan hanya mengizinkan JPEG dan PNG. Konversikan ke JPEG untuk unggahan itu — pekerjaan sepuluh detik — dan tetap pakai WebP untuk situsmu sendiri.</p>

  <h3>Haruskah saya mengonversi JPEG yang sudah ada ke WebP?</h3>
  <p>Untuk situs yang kamu kelola — ya, biasanya itu kemenangan kecepatan halaman termurah yang tersedia. Enkode ulang dari sumber berkualitas tertinggi yang kamu miliki, bukan dari salinan yang sudah dikompresi berat, agar artefak tidak menumpuk.</p>

  <h3>Bagaimana dengan GIF?</h3>
  <p>Untuk animasi, WebP (atau file video sungguhan) mengalahkan GIF dalam ukuran dan kedalaman warna. Untuk gambar statis, batas 256 warna GIF menjadikannya yang terburuk dari keempatnya — format ini bertahan terutama karena kebiasaan dan tradisi meme.</p>

  <h3>Berapa pengaturan kualitas terbaik untuk JPEG dan WebP?</h3>
  <p>80-85 untuk penggunaan web — titik manis di mana artefak tak terlihat pada ukuran tampilan normal. 90+ saat gambar mungkin diedit lagi atau dilihat dari dekat. Di bawah 70, penghematan terus bertambah tetapi begitu pula bercak yang terlihat, terutama di langit dan gradasi.</p>

  <h2>Pilih sekali, konversi saat perlu</h2>

  <p>Aturan praktisnya muat dalam satu baris: <strong>WebP untuk situs webmu, JPEG untuk foto yang berpindah tangan, PNG untuk grafik dengan tepi tajam.</strong> Dan saat sebuah gambar datang dalam format yang salah untuk tugasnya, alat <a href="/id/image/convert/">Konversi Gambar</a> membereskannya dalam satu klik — gratis, tanpa registrasi, dimensi tak tersentuh.</p>
