content_id: |
  Hampir setiap gambar yang akan kamu unggah berjalan dalam salah satu dari tiga kontainer: JPEG, PNG, atau WebP. Sekilas ketiganya tampak bisa saling menggantikan — gambar tetaplah gambar — tetapi di balik layar mereka membuat kompromi yang sangat berbeda, dan pilihan yang salah diam-diam membebanimu: logo yang buram, tangkapan layar 4 MB, foto yang ditolak sistem lama. Perbandingan ini menjernihkan untuk apa sebenarnya tiap format dibuat.

  <h2>Jawaban singkatnya</h2>

  <ul>
    <li><strong>WebP</strong> - default untuk situs web. 25-35% lebih kecil daripada JPEG pada kualitas yang sama, mendukung transparansi dan animasi. Gunakan setiap kali kamu mengendalikan tempat gambar ditampilkan.</li>
    <li><strong>JPEG</strong> - default untuk foto yang berpindah tangan. Setiap perangkat, program, dan formulir unggah sejak era 1990-an menerimanya. Gunakan saat kompatibilitas lebih penting daripada kilobyte terakhir.</li>
    <li><strong>PNG</strong> - default untuk grafik yang harus presisi piksel. Lossless, dengan transparansi yang bersih. Gunakan untuk logo, tangkapan layar UI, bagan, dan apa pun yang punya tepi tajam dan teks.</li>
  </ul>

  <h2>Perbandingan berdampingan</h2>

  <table>
    <thead>
      <tr><th></th><th>WebP</th><th>JPEG</th><th>PNG</th></tr>
    </thead>
