content_id: |
  Ponsel mengubah semua orang menjadi operator pemindai: kontrak yang difoto di sini, tiga struk di sana, papan tulis dari rapat terakhir. Masalahnya ada di pengiriman. Tidak ada yang mau menerima sebelas JPG berserakan dalam satu utas email — mereka ingin satu PDF, halaman berurutan, yang tercetak dengan benar. Panduan ini menunjukkan cara mendapatkan persis itu, gratis, tanpa menginstal apa pun.

  <h2>Konversi satu JPG - atau gabungkan hingga 50 menjadi satu PDF</h2>

  <figure><img src="/static/blog/images/tool-jpg-to-pdf-hero.jpg" alt="Layar unggah konverter JPG ke PDF Convertica" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Buka konverter <a href="/id/jpg-to-pdf/">JPG ke PDF</a> dan tambahkan gambarmu. Satu file menghasilkan PDF satu halaman; beberapa file digabungkan menjadi satu dokumen, satu gambar per halaman, hingga 50 gambar per permintaan.</li>
    <li><strong>Urutan itu penting:</strong> gambar menjadi halaman sesuai urutan kamu menambahkannya. Beri nama file <em>01.jpg, 02.jpg, 03.jpg</em> sebelum memilihnya dan urutan halaman akan beres dengan sendirinya.</li>
    <li>Atur slider kualitas jika perlu (penjelasannya di bawah), lalu klik <strong>Konversi</strong>.</li>
    <li>Unduh PDF yang sudah jadi — tanpa tanda air, tanpa registrasi.</li>
  </ol>

  <p>Setiap gambar ditempatkan pada halaman A4, di tengah dengan margin yang pas, sehingga hasilnya tampak seperti dokumen, bukan tumpukan foto. Foto potret maupun lanskap muat secara otomatis — gambar diskalakan ke halaman, tidak pernah dipotong.</p>

  <h2>Memilih pengaturan kualitas yang tepat</h2>

  <figure><img src="/static/blog/images/tool-jpg-to-pdf-options.jpg" alt="Opsi kualitas di konverter JPG ke PDF" width="1280" height="800" loading="lazy"></figure>

  <p>Kontrol kualitas (60-95, default 85) menentukan seberapa banyak gambar dikompresi ulang di dalam PDF:</p>

  <ul>
    <li><strong>85 (default)</strong> - tepat untuk hampir semua kebutuhan. Dokumen tetap terbaca, foto tetap bersih, ukuran file tetap wajar.</li>
    <li><strong>90+</strong> - untuk foto yang harus tahan diamati dari dekat: karya portofolio, foto produk, apa pun yang mungkin dicetak besar. Pada 90 ke atas, konverter juga melewati rekompresi untuk gambar yang sudah berupa JPG bersih, sehingga piksel aslinya terjaga.</li>
    <li><strong>60-75</strong> - untuk hasil yang ramah email saat foto sumbernya besar. Sepuluh foto ponsel 12 MP dengan mudah menghasilkan PDF 30 MB pada kualitas tinggi; menurunkan slider menjinakkannya.</li>
  </ul>

  <p>Jika PDF masih terlalu berat untuk batas lampiran, jalankan melalui <a href="/id/pdf-organize/compress/">Kompres PDF</a> setelahnya — kombinasi kualitas sedang plus kompresi membuat sebagian besar PDF foto lolos batas email pada umumnya.</p>

  <h2>Untuk apa orang benar-benar menggunakannya</h2>

  <ul>
    <li><strong>Laporan pengeluaran.</strong> Struk kertas sebulan yang difoto dan digabung menjadi satu PDF jauh lebih mudah diarsipkan daripada folder gambar berserakan — dan bagian akuntansi akan berterima kasih.</li>
    <li><strong>Dokumen yang difoto.</strong> Kontrak atau formulir yang dipotret halaman demi halaman dengan ponsel menjadi satu dokumen berurutan yang siap cetak.</li>
    <li><strong>Tugas dan lamaran.</strong> Banyak portal hanya menerima tepat satu file. Sepuluh halaman yang difoto, satu kolom unggah — inilah solusinya.</li>
    <li><strong>Portofolio dan mood board.</strong> Kumpulan gambar terkurasi dalam urutan tetap, kebal dari aplikasi chat yang mengompresi ulang dan mengacak urutannya.</li>
    <li><strong>Pengarsipan.</strong> Halaman PDF dengan tanggal di nama file mengalahkan galeri kamera untuk menemukan satu struk itu dua tahun kemudian.</li>
  </ul>

  <h2>Mendapatkan hasil bersih dari foto ponsel</h2>

  <ul>
    <li>Foto dokumen lurus dari depan dan penuhi bingkai — gambar ditempatkan di halaman apa adanya, jadi foto yang miring tetap miring.</li>
    <li>Cahaya merata dan difus lebih baik daripada flash. Silau pada kertas mengilap adalah penyebab paling umum halaman yang difoto tak terbaca saat dicetak.</li>
    <li>Potong kekacauan (tepi meja, jari) sebelum mengonversi; halaman seharusnya berisi dokumen, bukan pemandangan di sekitarnya.</li>
    <li>Foto iPhone berformat HEIC? Konversikan dulu ke JPG dengan alat <a href="/id/image/heic-to-jpg/">HEIC ke JPG</a>, baru gabungkan.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>Apakah benar-benar gratis? Ada tanda air?</h3>
  <p>Mengonversi JPG ke PDF gratis, tanpa tanda air dan tanpa registrasi. Batas ukuran file paket gratis berlaku per gambar; premium menaikkannya.</p>

  <h3>Berapa banyak gambar yang bisa saya gabungkan sekaligus?</h3>
  <p>Hingga 50 gambar per permintaan, masing-masing menjadi satu halaman PDF hasilnya. Butuh lebih? Pecah batch-nya dan gabungkan PDF-PDF hasilnya dengan alat <a href="/id/pdf-organize/merge/">Gabungkan PDF</a>.</p>

  <h3>Bisakah saya mengubah urutan halaman setelah mengunggah?</h3>
  <p>Halaman mengikuti urutan gambar ditambahkan. Kebiasaan yang andal adalah menomori nama file sebelum memilihnya. Jika PDF yang sudah jadi perlu diatur ulang, alat <a href="/id/pdf-organize/organize/">Atur PDF</a> menyediakan pengurutan ulang dengan drag-and-drop.</p>

  <h3>Apakah bisa dengan PNG atau format lain?</h3>
  <p>Alat ini menerima JPG/JPEG. Untuk PNG, WebP, atau format lainnya, konversikan dulu ke JPG dengan alat <a href="/id/image/convert/">Konversi Gambar</a>, atau — untuk satu gambar saja — konversikan langsung ke PDF di sana.</p>

  <h3>Apakah teks di dokumen yang saya foto bisa dicari?</h3>
  <p>Tidak — PDF tersebut berisi gambar teks, bukan teks. Jika kamu perlu mencari, menyalin, atau mengedit kata-katanya, jalankan hasilnya melalui alat OCR <a href="/id/scanned-pdf-to-word/">PDF Hasil Scan ke Word</a>, yang mengenali teks dan mengembalikan file yang dapat diedit.</p>

  <h3>Apakah data saya aman?</h3>
  <p>File diproses untuk konversi dan dibersihkan oleh pemeliharaan terjadwal tak lama setelahnya. Sebagaimana layanan online mana pun, periksa kebijakan privasi sebelum mengunggah materi yang sangat sensitif.</p>

  <h2>Coba sekarang</h2>

  <p>Ambil folder berisi halaman-halaman yang difoto itu, nomori file-nya, dan jatuhkan ke konverter <a href="/id/jpg-to-pdf/">JPG ke PDF</a>. Tiga puluh detik kemudian kamu akan memiliki hal yang sebenarnya diinginkan semua orang: satu file, halaman berurutan, siap dikirim.</p>
