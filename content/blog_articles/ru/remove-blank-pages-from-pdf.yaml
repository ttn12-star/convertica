excerpt_ru: "Дуплексные сканеры обожают вставлять пустые страницы там, где оригинал был односторонним. Уберите их за секунды без Adobe Acrobat."
content_ru: |
  Откройте PDF, вышедший из дуплексного сканера, — и часто увидите пустую страницу после каждой реальной: сканер послушно снял оборот каждого одностороннего оригинала. Откройте шаблон договора — там могут быть две пустые страницы, «зарезервированные под подписи». Откройте объединённый документ — и обнаружите забытые разделители из исходных файлов. Классический виновник — офисный Brother или Canon с автоподатчиком, по умолчанию сканирующий «двусторонне», просили вы об этом или нет.

  Удалить такие страницы — секунды в браузере. Не нужен Adobe Acrobat. Не нужно распечатывать и сканировать заново. Не нужно ничего перенабирать. Нужен только инструмент, в котором вы кликаете по ненужным страницам и скачиваете то, что осталось.

  <figure><img src="/static/blog/images/tool-organize.jpg" alt="Инструмент Convertica для организации PDF (Пдф): превью с выделенными для удаления пустыми страницами" width="1280" height="800" loading="lazy"></figure>

  <h2>Откуда берутся пустые страницы</h2>

  Понимание источника помогает быстрее их находить:

  <ul>
    <li><strong>Дуплексные сканеры на односторонних оригиналах.</strong> Классика. Каждая вторая страница на выходе пустая.</li>
    <li><strong>Word-документы с разрывами разделов.</strong> Разрывы «следующая нечётная» или «следующая чётная» страница вставляют пустоту, чтобы сохранить пагинацию, — и эта пустота переживает экспорт в PDF.</li>
    <li><strong>Шаблоны форм с заглушками.</strong> Многие шаблоны договоров и отчётов идут со страницами, зарезервированными под «приложения», «exhibits» или подписи, которые вам, возможно, и не понадобятся.</li>
    <li><strong>Объединённые PDF из несовпадающих источников.</strong> Слияние файлов, каждый из которых заканчивался на чётной странице, оставляет пустоты. Часто этим грешат годовые отчёты и питч-деки.</li>
    <li><strong>Драйверы печати.</strong> «Печать в PDF» с некоторыми настройками принтера может добавить лист подтверждения или «прокладку» в конце. Старые универсальные драйверы HP были этим знамениты в 2018-2020.</li>
    <li><strong>Мобильные приложения для сканирования.</strong> CamScanner, Adobe Scan и им подобные иногда вставляют рекламную страницу «scanned with [app]» на бесплатном тарифе — это уже не функция, а водяной знак, с которым приходится бороться.</li>
  </ul>

  <h2>Пошагово: удалить страницы визуально</h2>

  Этот подход правильный, когда нельзя заранее предсказать, какие страницы пусты, не глядя на них.

  <figure><img src="/static/blog/images/tool-organize.jpg" alt="Кликаем по превью пустых страниц PDF и удаляем их одним проходом" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Откройте инструмент <a href="/ru/pdf-edit/rotate/">удаления страниц из PDF</a> и загрузите файл.</li>
    <li>Посмотрите на сетку превью. Пустые страницы видны сразу: сплошные белые плитки без текста и картинок. Страницы с лёгким сканерным шумом всё же имеют видимую фактуру и выглядят светло-серыми, а не чисто белыми.</li>
    <li>Кликните по страницам, которые хотите удалить. Большинство инструментов выделяет выбор цветной рамкой или иконкой корзины.</li>
    <li>Подтвердите и скачайте очищенный файл. Проверьте, что количество страниц совпало с ожиданиями.</li>
  </ol>

  Если заодно нужно ещё переупорядочить или повернуть, делать всё в одной сессии быстрее, чем гонять три отдельных инструмента. Совмещённый <a href="/ru/pdf-organize/merge/">режим организации страниц PDF с drag and drop</a> позволяет удалять, перетаскивать и поворачивать перед единственным экспортом.

  <h2>Пошагово: удалить страницы по диапазону</h2>

  Когда номера страниц уже известны, ввести их быстрее, чем кликать.

  <ol>
    <li>Загрузите PDF.</li>
    <li>Переключитесь в режим диапазонов (большинство инструментов умеет переключаться между визуальным режимом и вводом диапазонов).</li>
    <li>Введите диапазон списком через запятую и дефис для интервалов. <code>3, 7-9, 12</code> означает: удалить страницу 3, страницы с 7 по 9 и страницу 12. Остальные останутся.</li>
    <li>Применить и скачать.</li>
  </ol>

  <blockquote class="callout">Номера страниц в этом синтаксисе — физические, а не напечатанные на документе. Если в договоре нумерация «1» начинается с третьей физической страницы, то ваша «страница 1» — это физическая страница 3.</blockquote>

  Полезно знать: большинство полей не принимает «открытые» диапазоны вроде <code>50-</code>, означающие «всё с 50-й до конца». Придётся ввести реальную последнюю страницу (например, <code>50-78</code> для файла из 78 страниц). Один раз посчитать в начале — это сэкономить циклы «погоди, не сработало» позже.

  <h2>Удалить vs скрыть страницы</h2>

  Часть PDF-инструментов (и Adobe Acrobat) позволяет «скрыть» страницы вместо удаления. Скрытые страницы не отображаются, но данные остаются в файле. Любой, кто откроет файл другим просмотрщиком или снимет скрытие, увидит контент снова.

  Для чувствительного контента это серьёзная проблема. Если вы убираете страницу с зарплатой из HR-документа просто скрытием — данные о зарплате путешествуют вместе с файлом. Полное удаление — единственный безопасный вариант, когда:

  <ul>
    <li>На страницах конфиденциальная информация, которая не должна попасть к получателю.</li>
    <li>Вы передаёте файл за пределы организации.</li>
    <li>Файл может быть заархивирован или переслан.</li>
    <li>Документ может попасть под e-discovery или запросы по закону о доступе к информации, где скрытое всё равно может быть обнаружено.</li>
  </ul>

  Браузерные инструменты удаления страниц удаляют данные, а не просто скрывают их. Проверьте, открыв результат в другом просмотрщике — удалённые страницы должны исчезнуть, а не стать невидимыми. Параноидальная проверка: откройте очищенный файл в любом текстовом редакторе (да, даже в «Блокноте») и поищите уникальное слово с удалённой страницы. Если не найдено — страница реально удалена.

  <h2>Перенумерация после удаления</h2>

  В большинстве PDF нет программных номеров страниц — там просто текст «1», «2», «3», запечённый в каждую страницу при изначальном экспорте. Удаление страниц само не перенумеровывает остаток. Если в документе был нумерованный футер «Стр. 5 из 12» на каждой странице, после удаления вы получите страницы 1, 2, 4, 6, 7 из 12 — выглядит сломанно.

  Два варианта:

  <ul>
    <li><strong>Смириться</strong> для внутренних документов, где напечатанные номера не имеют значения.</li>
    <li><strong>Перенумеровать,</strong> срезав существующий футер и добавив свежие. Инструменты, которые умеют <a href="/ru/pdf-edit/rotate/">проставить новые номера страниц</a>, перетирают зону колонтитула одним проходом по всему документу.</li>
  </ul>

  Так же обновите оглавление. Содержание, ссылающееся на «страницу 7», когда ваша новая страница 7 — это бывшая 9, бесит любого читателя. (По-моему, это вторая по частоте причина, по которой коллега говорит «этот PDF сломан»; первая — «и ссылка из оглавления тоже не работает».)

  <h2>Массовая чистка сканированных архивов</h2>

  Чистить 200-страничный скан кликом по странице — удовольствие сомнительное. Помогают два приёма:

  <h3>Замечать пустые страницы на масштабе</h3>

  Увеличьте размер превью, если инструмент это поддерживает. Белые прямоугольники видны мгновенно. Для очень слабого шума сканера прищурьтесь на номера страниц: если нельзя различить текст и фигуры — значит, пусто.

  Некоторые инструменты рендерят превью в очень низком разрешении ради экономии трафика. Если ваши пустые не выглядят явно белыми из-за дитеринга или сжатия, переключитесь в режим крупных превью (часто есть кнопка «Large preview» или «Detailed thumbnails») перед просмотром. Лишнее время на отрисовку лучше, чем по ошибке удалить реальную страницу.

  <h3>Шорткат для дуплексного сканера</h3>

  Если вы сканировали стопку односторонних оригиналов на дуплексе, оборот у каждой страницы пуст. Это значит, что вам нужно удалить каждую <strong>чётную</strong> физическую страницу. Подойдёт диапазон <code>2, 4, 6, 8, 10, ...</code>, и большинство инструментов умеет генерировать его опцией «удалить каждую n-ю страницу» или «чётные страницы».

  Перепроверьте по первым результатам. Если сканер иногда переворачивает оригиналы или стопка началась с оборотной стороны — паттерн собьётся, и удалять надо будет нечётные. Серия Fujitsu ScanSnap особенно к этому склонна, когда автоподатчик хватает сразу два листа: ваша первая страница оказывается оборотом, и вся последовательность сбивается.

  После чистки возможно, что файл выиграет от разбиения на меньшие документы. Ветка <a href="/ru/pdf-organize/split/">разделить на главы</a> хорошо работает, когда вы расчистили 200-страничный архив, который на самом деле должен быть пятью 40-страничными документами.

  <h2>Проверка перед отправкой</h2>

  Перед отправкой очищенного файла другому человеку сделайте две проверки. Первая: количество страниц совпадает с ожидаемым (вошло 210 страниц, удалили каждую вторую — на выходе 105). Вторая: быстро пролистайте результат и убедитесь, что в чистку не попала ни одна реальная страница. Что подстерегает: титульные страницы с очень малым количеством текста на превью могут выглядеть почти пустыми и быть удалены случайно. То же со страницами, состоящими из одного изображения (график, подпись, логотип) — превью может ужать его в невидимость.

  <h2>FAQ</h2>

  <h3>Как автоматически удалить пустые страницы из 200-страничного скана?</h3>
  <p>Если пустоты идут по шаблону (каждая вторая после дуплекса) — переключитесь в режим диапазонов и удалите чётные страницы одной операцией. Если они разбросаны хаотично — визуальная сетка превью быстрее любого правила: пролистываете и кликаете каждую белую плитку.</p>

  <h3>Удаление страниц Пдф сломает мою нумерацию?</h3>
  <p>Если в документе номера вшиты текстом в футер («Стр. 5 из 12») — да. Оставшиеся страницы сохранят свои исходные номера. Либо смиритесь во внутреннем использовании, либо после чистки срежьте старые номера и проставьте новые поверх всего файла.</p>

  <h3>Можно ли отменить удаление страницы?</h3>
  <p>Сам инструмент создаёт новый файл, ваш оригинал на компьютере не трогает. Если удалили страницы и скачали результат — просто вернитесь к оригинальному PDF, если ошиблись. Всегда храните оригиналы до проверки очищенной версии.</p>

  <h3>Почему удалённые страницы иногда «возвращаются»?</h3>
  <p>Так бывает, когда инструмент только скрыл страницы вместо удаления, или файл открыли в редакторе, восстановившем сохранённую ревизию. Используйте инструмент, который реально срезает данные страницы, и проверяйте, что итоговый размер и количество страниц совпадают с ожидаемым.</p>

  <h3>Можно ли удалить страницы из Пдф с паролем?</h3>
  <p>Сначала придётся ввести пароль. Большинство онлайн-инструментов спрашивает его при загрузке. Без пароля легитимно изменить файл нельзя.</p>

  <h2>Попробуйте сейчас</h2>

  <p>Перестаньте пролистывать пустые страницы. Откройте <a href="/ru/pdf-edit/rotate/">инструмент удаления страниц PDF</a>, кликните по ненужным превью и скачайте чистую версию заметно меньше чем за минуту. Быстрее, чем даже найти ключ от своей лицензии Acrobat.</p>
