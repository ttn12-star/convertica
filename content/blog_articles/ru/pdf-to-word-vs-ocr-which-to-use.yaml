excerpt_ru: "Стандартная конвертация PDF в Word молча падает на сканах: вы получаете пустой файл и ни одного сообщения об ошибке. Понимание разницы экономит час путаницы."
content_ru: |
  Два PDF, выглядящих на экране одинаково, могут требовать совершенно разные инструменты для конвертации. Один откроется в Word с почти целыми текстом, шрифтами и таблицами. Другой — как одно изображение размером со страницу, без единого выделяемого символа. Разница невидима, пока вы не попробуете воспользоваться результатом, и большинство узнают её только после того, как двадцать минут потратили на не тот инструмент.

  Этот гайд — короткая версия того урока. К концу вы будете знать, как определить, какого типа перед вами PDF, какой путь конвертации ему нужен и что делать, если выбрали не тот.

  <h2>Два типа PDF, которые вам встретятся</h2>
  <p>Любой PDF в мире попадает в одну из трёх корзин: цифровой, сканированный или гибридный (смесь обоих).</p>
  <h3>Цифровые PDF</h3>
  <p>Сделаны напрямую из цифрового источника — Word-файла, веб-страницы, экспорта из InDesign, бухгалтерского софта. Текст внутри настоящий: символы, шрифты, абзацная структура. Можно выделить предложение, скопировать, вставить в чат. Они обычно небольшие, чёткие на любом масштабе и нормально ведут себя со стандартными конвертерами.</p>
  <h3>Сканированные PDF</h3>
  <p>Это фотографии листов. Кто-то прогнал страницы через сканер или сфоткал их телефоном и сохранил картинки в обёртке PDF. Реального текста в файле нет — только изображения текста. Выделение «текста» курсором подсвечивает прямоугольник, а не буквы. Размеры обычно больше, потому что картинки занимают больше байтов, чем символы.</p>
  <h3>Гибридные PDF</h3>
  <p>Частые гости в реальных воркфлоу: цифровой шаблон договора с приклеенной отсканированной страницей подписи или объединённый файл, где часть страниц из Word, а часть с копира. Каждая страница может быть своего типа.</p>

  <h2>Как определить тип за две секунды</h2>
  <p>Откройте PDF и попробуйте выделить слово курсором. Возможны три исхода:</p>
  <ul>
    <li><strong>Слово выделяется буква за буквой.</strong> Цифровой PDF.</li>
    <li><strong>Вся страница (или крупный блок) подсвечивается одной фигурой, как будто вы тянете рамку поверх изображения.</strong> Сканированный PDF.</li>
    <li><strong>Часть страниц ведёт себя как 1, часть — как 2.</strong> Гибрид.</li>
  </ul>
  <p>Этот двухсекундный тест экономит больше времени, чем любое сравнение фич.</p>

  <h2>Стандартный PDF в Word: когда работает</h2>
  <p>Для цифровых PDF стандартный путь <a href="/ru/pdf-to-word/">конвертация PDF в Word</a> — правильный выбор. Инструмент читает встроенный текст, шрифты и структурные подсказки и пересобирает их внутри .docx. Чего ждать:</p>
  <ul>
    <li>Точность по тексту близка к 100% — символы уже цифровые, угадывать ничего не надо.</li>
    <li>Сохранённое форматирование: шрифты, заголовки, жирный/курсив, списки, простые таблицы.</li>
    <li>Картинки примерно там же, где они стояли в источнике.</li>
    <li>Скорость: 50-страничный отчёт конвертируется за секунды.</li>
  </ul>
  <p>Оставшийся 1-2% проблем обычно про вёрстку: футер втянулся в абзац, двухколоночная страница превратилась в одну длинную колонку, сложная таблица слегка съехала. Доработка, а не переписывание.</p>

  <h2>Конвертация с OCR: когда нужна именно она</h2>
  <p>Для сканированных PDF стандартная конвертация сделает вид, что отработала, и выдаст Word без текста. Инструмент не находит текст, потому что его нет — только картинки. Нужен OCR, оптическое распознавание: оно смотрит на изображения и реконструирует текст по формам букв.</p>
  <p>Случаи, где OCR обязателен:</p>
  <ul>
    <li>Любой документ, прошедший через сканер или копир.</li>
    <li>Фотографии страниц на телефон.</li>
    <li>Факсы (да, до сих пор живут в медицине и юриспруденции).</li>
    <li>Старые PDF до примерно 2005 года — многие были сканами по умолчанию.</li>
    <li>Госформы, полученные как «распечатано-и-отсканировано».</li>
  </ul>
  <p>Конвертация с OCR медленнее стандартной (от секунд до минут на страницу в зависимости от объёма) и никогда не на 100% точна. Подробнее про настройки языка и реальные ожидания по качеству — в <a href="/ru/blog/convert-scanned-pdf-to-editable-word/">гайде «сканированный PDF в редактируемый Word»</a>.</p>

  <h2>Сравнительная таблица для решения</h2>
  <table>
    <thead>
      <tr><th>Тип документа</th><th>Рекомендуемый инструмент</th><th>Время на 10 страниц</th><th>Ожидаемая точность</th></tr>
    </thead>
    <tbody>
      <tr><td>Цифровой PDF (из Word, веб)</td><td>Стандартный PDF в Word</td><td>Секунды</td><td>98-100%</td></tr>
      <tr><td>Сканированный PDF, чистая печать</td><td>Конвертация с OCR</td><td>30-60 секунд</td><td>95-99%</td></tr>
      <tr><td>Факс или ксерокопия</td><td>Конвертация с OCR</td><td>1-2 минуты</td><td>80-90%</td></tr>
      <tr><td>Фото страницы на телефон</td><td>Конвертация с OCR (после поворота/обрезки)</td><td>1-2 минуты</td><td>85-95%</td></tr>
      <tr><td>Рукописные заметки</td><td>Надёжного варианта нет — перенабрать</td><td>Вручную</td><td>Сильно варьируется</td></tr>
      <tr><td>Таблица из PDF, нужна как данные</td><td>PDF в Excel, а не в Word</td><td>Секунды</td><td>90-99%</td></tr>
    </tbody>
  </table>
  <p>Последняя строка важнее, чем кажется. Если задача — затащить строки и колонки чисел в таблицу, не конвертируйте в Word и копируйте оттуда в Excel. <a href="/ru/pdf-to-excel/">Извлекайте таблицы сразу в Excel</a> — структура сохраняется намного надёжнее.</p>

  <h2>Гибридные PDF: подход в два прохода</h2>
  <p>Гибридные документы — самый каверзный случай. 30-страничный договор, где всё цифровое, кроме двух отсканированных страниц подписей, технически можно прогнать через OCR целиком, но вы платите OCR-налогом за страницы, где он не нужен.</p>
  <p>Чище подход, если результат важен:</p>
  <ol>
    <li>Разделите PDF на цифровую часть и сканированную часть.</li>
    <li>Цифровую — через стандартную конвертацию.</li>
    <li>Сканированную — через OCR-конвертацию.</li>
    <li>Соедините оба результата обратно в Word.</li>
  </ol>
  <p>Для большинства бытовых случаев просто прогоните весь файл через OCR — цифровые страницы пройдут чисто, потому что у них уже есть выделяемый текст, а сканированные обработаются правильно.</p>

  <h2>Что делать, если выбрали не тот путь</h2>
  <p>Два варианта провала легко узнаются:</p>
  <h3>Симптом 1: пустой Word-документ</h3>
  <p>Вы прогнали стандартную конвертацию на сканированном PDF. .docx открылся, и в нём ничего нет — или только пара случайных разрывов страниц. Прогоните тот же файл через OCR — текст лежит в картинках, а не в метаданных файла, и OCR — единственный способ его вытащить.</p>
  <h3>Симптом 2: нечитаемая каша</h3>
  <p>В Word слова вроде «rmaragnemt» или «1ncome», либо вообще символы из чужого алфавита. Это OCR с неправильно выставленным языком. Запустите ещё раз с правильным языком источника (английский вместо испанского, немецкий и т.д.) — точность подскочит.</p>
  <h3>Симптом 3: текст вытащен, но вёрстка убита</h3>
  <p>Это нормально для очень тяжёлых макетов (многоколоночные отчёты, журнальные развороты). И стандартная конвертация, и OCR пересобирают текст линейно и могут не сохранить сложную сетку. Иногда ответ — принять компромисс; иногда — копировать отдельные секции, а не весь документ.</p>

  <h2>Стоимость, приватность и время обработки</h2>
  <p>Стандартная конвертация по сути бесплатна по вычислениям — это скорее парсинг, чем анализ. OCR дороже: каждая страница идёт через распознающую модель, и поэтому 50-страничные сканы заметно дольше 50-страничных цифровых PDF. На бесплатном тарифе это может означать чуть более длинную очередь для OCR-задач. На платном — иначе списываться с квоты.</p>
  <p>Приватность одинаковая на обоих путях — загрузки шифруются при передаче и обрабатываются только на время конвертации. Но если сомневаетесь, в гайде по защите паролем есть раздел про чувствительные документы — когда стоит ставить пароль на результат до того, как им поделиться.</p>

  <h2>Правило в одну строку</h2>
  <blockquote class="callout">Если в PDF можно выделить текст — используйте стандартную конвертацию. Если нельзя — OCR. Всё остальное в этом гайде — сноски к одному этому тесту.</blockquote>

  <p>Можно полистать <a href="/ru/all-tools/">все инструменты конвертации</a>, если нужны смежные операции — разбить гибридный файл, вытащить таблицы.</p>

  <h2>FAQ</h2>
  <h3>Как понять, что мой Пдф сканированный, а не цифровой?</h3>
  <p>Попробуйте выделить текст курсором. Если выделяются отдельные слова, PDF цифровой. Если вся страница (или большой прямоугольник) подсвечивается как одна фигура, как картинка — PDF сканированный.</p>
  <h3>OCR медленнее обычной конвертации?</h3>
  <p>Да, заметно. Стандартная конвертация — это парсинг, она работает за секунды; OCR прогоняет каждую страницу через распознающую модель и тратит секунды-минуты на страницу, в зависимости от объёма и сложности. Для 50-страничного скана закладывайте несколько минут.</p>
  <h3>OCR списывает больше кредитов или мощности?</h3>
  <p>Зависит от ценовой модели. OCR требует больше вычислений, поэтому платформы с оплатой за страницу или минуту обычно тарифицируют его дороже стандартной конвертации. На бесплатных тарифах это обычно лишь более длинная очередь, а не другая цена.</p>
  <h3>Можно ли всё равно прогнать цифровой Пдф через OCR?</h3>
  <p>Можно, но не нужно. Результат будет чуть хуже стандартной конвертации (OCR вносит мелкие ошибки распознавания, которых не бывает, когда текст уже цифровой), и займёт куда дольше. Используйте OCR только тогда, когда без него никак.</p>
  <h3>Почему в моём конвертированном Ворд совсем нет текста?</h3>
  <p>PDF сканированный, а вы использовали стандартную конвертацию. Стандартной конвертации нечего вытаскивать — реального текста в файле нет. Прогоните тот же PDF через OCR-конвертацию, и текст появится.</p>

  <h2>Попробуйте сейчас</h2>
  <p>Сделайте двухсекундный тест выделения и выберите правильный путь. <a href="/ru/pdf-to-word/">Открыть конвертер PDF в Word →</a></p>
