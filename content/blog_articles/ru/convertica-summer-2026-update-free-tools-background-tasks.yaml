title_ru: 'Что нового на Convertica: больше бесплатных инструментов, фоновые задачи и рабочие процессы'
meta_title_ru: 'Что нового летом 2026 | Convertica'
meta_description_ru: 'Пять инструментов вышли из-под Premium, вместо платных стен появился общий дневной лимит, добавились два новых конвертера, а Premium научился доделывать работу после закрытия вкладки.'
meta_keywords_ru: 'convertica новости, бесплатные pdf инструменты, пдф инструменты бесплатно, heic в jpg бесплатно, pdf в markdown, пдф в маркдаун, epub в pdf, подписать pdf онлайн, пдф в текст, pdf в pdf/a, фото под паролем, фоновая конвертация, сохранённые процессы'
excerpt_ru: 'Пять инструментов стали бесплатными, появились два новых конвертера, а Premium теперь доделывает работу, даже когда вкладка закрыта. Рассказываем, что изменилось за лето.'
content_ru: |
  <p>С прошлого новостного поста накопилось много изменений. Коротко: пять инструментов вышли из-под Premium, появились два новых конвертера, а Premium научился работать, пока вы занимаетесь своими делами. Теперь подробно.</p>

  <h2>Пять инструментов стали бесплатными</h2>
  <p>Раньше они требовали подписку Premium. Больше нет:</p>
  <ul>
    <li><a href="/ru/image/heic-to-jpg/">HEIC в JPG</a> (фото с айфона)</li>
    <li><a href="/ru/pdf-to-markdown/">PDF в Markdown</a></li>
    <li><a href="/ru/epub-to-pdf/">EPUB в PDF</a> и <a href="/ru/pdf-to-epub/">PDF в EPUB</a></li>
    <li><a href="/ru/pdf-to-text/">PDF в текст</a></li>
    <li><a href="/ru/pdf-edit/sign/">Подписать PDF</a></li>
  </ul>
  <p>Отдельные платные стены на инструментах мы тоже убрали. Вместо них один понятный дневной лимит на все инструменты сайта: <strong>10 конвертаций в день</strong> без аккаунта, <strong>40 в день</strong> с бесплатным аккаунтом, без ограничений на Premium. Считаются только успешные конвертации, счётчик обнуляется каждый день. Пакетная обработка, OCR и очень большие файлы остаются в Premium.</p>

  <h2>Новое: фото под паролем</h2>
  <p>Нужно отправить скан паспорта или фото документа? <a href="/ru/image/password-protect-image/">Инструмент «Защитить изображение»</a> упаковывает одну или несколько картинок в единый PDF с шифрованием AES-256. Открыть файл получится только по паролю. Бесплатно, как и остальные инструменты для изображений.</p>

  <figure><img src="/static/images/tools/image-password-protect-image.jpg" alt="Инструмент «Защитить изображение»: фото превращаются в PDF под паролем" width="1200" height="750" loading="lazy"></figure>

  <h2>Новое: PDF в PDF/A для архивов</h2>
  <p>Суды, вузы и госпорталы часто принимают только PDF/A, ISO-формат для долгосрочного хранения. Новый <a href="/ru/pdf-to-pdfa/">конвертер PDF в PDF/A</a> выдаёт PDF/A-1b, 2b или 3b и после конвертации проверяет, что файл действительно декларирует соответствие стандарту. Входит в Premium.</p>

  <h2>Premium: закройте вкладку, мы доделаем</h2>
  <p>Долгие задачи вроде OCR по толстому скану раньше держали вкладку браузера в заложниках. Теперь подписчики Premium могут отправить любую долгую конвертацию в фон и заняться другим. Когда всё готово:</p>
  <ul>
    <li>результат приходит на почту (вложением до 10 МБ, иначе ссылкой на скачивание),</li>
    <li>браузер показывает push-уведомление, даже если вы на другом сайте,</li>
    <li>файл ждёт вас в новой истории конвертаций.</li>
  </ul>
  <p>Подробности на странице <a href="/ru/background-tasks/">«Фоновые задачи»</a>.</p>

  <figure><img src="/static/images/tools/background-tasks.jpg" alt="Очередь фоновых задач: конвертация продолжается после закрытия вкладки" width="1200" height="750" loading="lazy"></figure>

  <h2>Premium: сохранённые рабочие процессы</h2>
  <p>Каждую пятницу сжимаете счета с одними и теми же настройками? Сохраните инструмент вместе с настройками как рабочий процесс и открывайте всё одним кликом. Процессы хранятся в браузере и синхронизируются через аккаунт: пресет, сохранённый на работе, появится и на домашнем ноутбуке. Подробнее на странице <a href="/ru/saved-workflows/">«Сохранённые процессы»</a>.</p>

  <figure><img src="/static/images/tools/saved-workflows.jpg" alt="Панель сохранённых рабочих процессов с пресетами инструментов" width="1200" height="750" loading="lazy"></figure>

  <h2>Защита PDF: решайте, что можно читателю</h2>
  <p><a href="/ru/pdf-security/protect/">«Защитить PDF»</a> по-прежнему бесплатно шифрует файлы AES-256. Premium добавляет сверху управление правами: можно запретить печать, копирование или редактирование защищённого файла.</p>

  <h2>Convertica как приложение</h2>
  <p>Convertica теперь ставится на телефон или компьютер как обычное приложение: иконка на главном экране, своё окно, ничего лишнего от браузера. Магазины приложений не нужны. <a href="/ru/install/">Инструкция по установке</a> охватывает iPhone, Android, Windows и Mac.</p>

  <h2>Быстрее, тише, надёжнее</h2>
  <ul>
    <li>Страницы заметно ускорились: большинство теперь набирает почти максимум в PageSpeed.</li>
    <li>Мы отказались от сторонней аналитики. Посещения считает собственный счётчик без cookie.</li>
    <li>На каждой странице инструмента появился скриншот интерфейса, у многих есть короткие видеоуроки.</li>
    <li>Починили баг, из-за которого арабоязычные пользователи иногда видели пустые страницы конвертеров, плюс десятки мелких исправлений.</li>
  </ul>

  <h2>Попробуйте</h2>
  <p>Всё перечисленное уже работает. Загляните в <a href="/ru/all-tools/">каталог инструментов</a>, а если что-то ведёт себя странно, напишите через <a href="/ru/contact/">форму обратной связи</a>. Половина этого релиза выросла из ваших сообщений.</p>
