excerpt_ru: "Gmail режет вложения на 25 МБ, Outlook — на 20 МБ, и одного отсканированного 10-страничного договора хватает, чтобы пробить оба лимита. Вот самый быстрый способ уменьшить файл без потери качества."
content_ru: |
  Почтовые сервисы до сих пор воспринимают тяжёлые вложения как проблему 2010 года. Gmail отказывается отправлять что-либо крупнее 25 МБ, Outlook.com обрезает на 20 МБ, а корпоративные Exchange-серверы обычно настроены ещё жёстче. Одного отсканированного 12-страничного договора часто достаточно, чтобы получить отбой, а сообщение о недоставке («Message could not be delivered. The attachment exceeds the allowed size») приходит через час, когда вы уже занимаетесь другими делами.

  Хорошая новость: почти любой PDF можно уложить в лимит меньше чем за две минуты, если знать, что делать. В этой статье — три способа, которые реально работают, ориентиры по итоговому размеру для разных типов документов и момент, когда стоит бросить почту и отправить ссылку из облака. В примерах используем <a href="/ru/pdf-organize/compress/">бесплатный компрессор PDF от Convertica</a>, но принципы применимы к любому инструменту.

  <figure><img src="/static/blog/images/tool-compress.jpg" alt="Интерфейс PDF-компрессора (Пдф) Convertica с загрузкой файла и выбором пресета" width="1280" height="800" loading="lazy"></figure>

  <h2>Реальные лимиты на вложения в 2026 году</h2>

  Прежде чем что-то сжимать, полезно понимать, в какую цифру вы целитесь. Крупные сервисы публикуют чуть разные лимиты, и практический потолок ниже заявленного — почта по дороге раздувает бинарные файлы.

  <table>
    <thead>
      <tr><th>Провайдер</th><th>Лимит на отправку</th><th>Лимит на получение</th></tr>
    </thead>
    <tbody>
      <tr><td>Gmail</td><td>25 МБ</td><td>50 МБ</td></tr>
      <tr><td>Outlook.com</td><td>20 МБ</td><td>20 МБ</td></tr>
      <tr><td>Yahoo Mail</td><td>25 МБ</td><td>25 МБ</td></tr>
      <tr><td>iCloud Mail</td><td>20 МБ</td><td>20 МБ</td></tr>
      <tr><td>Корпоративный Exchange (типично)</td><td>10-25 МБ</td><td>10-35 МБ</td></tr>
    </tbody>
  </table>

  Есть один подвох, о котором забывают: вложения кодируются в base64 (стандарт MIME), и это раздувает бинарные данные примерно на 33% при передаче. PDF в 20 МБ на диске прилетает на провод как ~27 МБ. Если у провайдера написано «25 МБ», на диске лучше держаться в пределах 18 МБ.

  <blockquote class="callout">Простое правило: цельтесь в 15 МБ на диске для обычных писем и в 8 МБ, если получатель сидит в корпоративной сети.</blockquote>

  Несколько конкретных нюансов, на которых регулярно спотыкаются и при этом думают, что с файлом всё в порядке:

  <ul>
    <li><strong>Рассылки.</strong> Один большой PDF на список из 200 человек умножает нагрузку на доставку, и многие корпоративные серверы списывают это с дневной квоты или режут письмо без церемоний.</li>
    <li><strong>Reply-all-цепочки.</strong> Вложение, прошедшее один хоп, всё ещё может отвалиться при ответе всем — если у одного из получателей лимит ящика жёстче. И тогда тред падает у всех сразу.</li>
    <li><strong>Мобильные операторы.</strong> Часть mail-шлюзов сотовых операторов до сих пор держит потолок в 10 МБ для входящих MMS-подобных каналов. Если адресат читает почту на кнопочном телефоне или старом мобильном клиенте, держите это в голове.</li>
    <li><strong>Задержки антивируса.</strong> Большие вложения дольше сканируются на шлюзе получателя. Письмо со статусом «доставлено», которое не появляется 20 минут, не сломано — оно в очереди.</li>
  </ul>

  <h2>Откуда вообще берутся гигантские PDF</h2>

  Сжатие работает лучше всего, когда понимаешь, куда ушли байты. PDF разрастаются по предсказуемым причинам:

  <ul>
    <li><strong>Сканы с высоким DPI.</strong> Дуплексный сканер на 600 DPI в цвете выдаёт 5-15 МБ на страницу. Большинству документов хватит 200 DPI в оттенках серого — на обычном расстоянии чтения разницы не видно.</li>
    <li><strong>Вшитые шрифты и цветовые профили.</strong> Экспорт «Save as PDF/A» легко добавляет 1-3 МБ на сабсеты шрифтов и ICC-профили, которые для письма вам не нужны. PDF/A придумали для архивов, а не для входящих.</li>
    <li><strong>Несжатые изображения.</strong> Картинки, вставленные из Word, или скриншоты в формате PNG внутри PDF почти никогда не упакованы оптимально. Один сырой 4K-скриншот легко добавляет 8 МБ.</li>
    <li><strong>Скрытая история правок.</strong> «Сохранить» в Acrobat дописывает инкрементальные обновления вместо того, чтобы переписать файл. За годы редактирования это превращается в невидимый балласт — договор, начавший с 200 КБ, после тридцати правок весит 12 МБ.</li>
    <li><strong>Прикреплённые файлы внутри PDF.</strong> Некоторые PDF возят внутри себя таблицы или zip-архивы. Прежде чем сжимать, загляните в панель вложений (иконка скрепки в Acrobat) — может оказаться, что вы вместе с PDF тащите 30 МБ Excel.</li>
    <li><strong>Формы с растровыми фонами полей.</strong> В госформах каждое поле ввода часто отрисовано отдельной мелкой картинкой. Умножьте на 80 полей — и получите неожиданно толстый файл.</li>
  </ul>

  Знание, что доминирует именно в вашем файле, подсказывает, какой из методов ниже сработает лучше. Откройте файл в любой читалке и посмотрите на первую страницу. Если это явно фотография листа бумаги — речь про изображения. Если текст чёткий и выделяется мышкой, перед вами «born-digital» PDF, и причина пухлости в чём-то другом.

  <h2>Способ 1 — Сжать PDF (рекомендуется)</h2>

  Для 80% перевешивающих PDF простое сжатие — правильный ответ. Оно переписывает файл с более грамотной обработкой картинок и шрифтов, не трогая ни количество страниц, ни текст.

  <figure><img src="/static/blog/images/tool-compress.jpg" alt="Пошаговое сжатие PDF с выбором пресета: low, medium, high" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Откройте <a href="/ru/pdf-organize/compress/">бесплатный компрессор PDF</a> от Convertica в любом браузере.</li>
    <li>Перетащите PDF в зону загрузки или кликните, чтобы выбрать файл.</li>
    <li>Выберите пресет: <strong>low</strong> (максимум качества, скромная экономия), <strong>medium</strong> (рекомендуется) или <strong>high</strong> (агрессивно, для черновиков и справочных материалов).</li>
    <li>Подождите, пока файл обработается. Тяжёлые сканы занимают 20-40 секунд; очень большие (200+ страниц) — минуту-две.</li>
    <li>Скачайте сжатую копию. Оригинал у вас на устройстве остаётся нетронутым.</li>
  </ol>

  <h3>Какой пресет выбрать</h3>

  Medium — правильный выбор по умолчанию. Он опускает изображения примерно до 150 DPI и срезает лишние метаданные — на экране это незаметно, и на A4 печатает чисто. High используйте только тогда, когда печать получателю не нужна; low — если в документе есть схемы или фотографии, которые должны остаться чёткими.

  Маленькая, но полезная клавиатурная привычка: после загрузки обычно можно нажать Enter, чтобы подтвердить дефолтный пресет, и не тянуться за мышкой. (По-хорошему, веб-инструменты должны бы сразу ставить medium и пропускать клик, но дефолты у всех разные.)

  <h3>Какой выигрыш по размеру ждать по типам документов</h3>

  Здесь обычно сыпятся маркетинговые обещания «до 90% меньше!». Честные цифры — то, что сжатие реально умеет:

  <table>
    <thead>
      <tr><th>Тип документа</th><th>Типичная экономия</th><th>Пример</th></tr>
    </thead>
    <tbody>
      <tr><td>Только текст (экспорт из Word, web)</td><td>80-95%</td><td>40 МБ → 2-8 МБ</td></tr>
      <tr><td>Текст + фотографии</td><td>40-70%</td><td>30 МБ → 9-18 МБ</td></tr>
      <tr><td>Чистый скан (каждая страница — картинка)</td><td>30-60%</td><td>50 МБ → 20-35 МБ</td></tr>
      <tr><td>Уже сжатый PDF</td><td>0-15%</td><td>Попробуйте другой способ</td></tr>
    </tbody>
  </table>

  Если отсканированный PDF после medium-сжатия всё ещё больше лимита — переходите к Способу 3.

  <h2>Способ 2 — Разделить PDF на части поменьше</h2>

  Иногда файл должен остаться в полном качестве (юридические приложения, дизайн-макеты), и одного сжатия не хватает. Разбиение выигрывает у сжатия, когда:

  <ul>
    <li>Получатель попросил оригинальное качество.</li>
    <li>Сжатие даёт 30 МБ, а нужно 20 МБ.</li>
    <li>В PDF есть естественные смысловые границы (главы, ежемесячные выписки, приложения от A до D).</li>
    <li>Вы отправляете доказательства регулятору, который завернёт всё, что выглядит перекодированным.</li>
  </ul>

  Используйте инструмент Convertica, чтобы <a href="/ru/pdf-organize/split/">разделить PDF на части</a>, выберите диапазон страниц или количество частей и скачайте куски. Хитрость — в именовании, чтобы получатель смог собрать их обратно без путаницы:

  <pre><code>2026-04-28_proposal_part-1-of-3.pdf
  2026-04-28_proposal_part-2-of-3.pdf
  2026-04-28_proposal_part-3-of-3.pdf</code></pre>

  Отправляйте каждую часть отдельным письмом с короткой припиской: «Часть 1 из 3 — остальное в следующих двух письмах». Получатель потом сможет <a href="/ru/pdf-organize/merge/">собрать сжатые части обратно</a> в один файл, когда понадобится отправить в архив. Если боитесь, что человек потеряет второе письмо, отправьте все части в одной цепочке с последовательными темами — папка «Входящие» удержит их рядом при сортировке.

  Один нюанс, о котором стоит знать: некоторые корпоративные спам-фильтры считают серию из трёх почти одинаковых писем подозрительной. Раздвиньте отправки на 60 секунд или вышлите первое предупреждающее сообщение («сейчас придёт три части в течение пары минут»), чтобы не злить шлюз.

  <h2>Способ 3 — Превратить скан в текстовый PDF</h2>

  Если файл — это отсканированный договор, факс или фото листа, байты в нём — это картинки, а не текст. Никакой пресет сжатия не уложит чистый скан 50 МБ в 10 МБ без видимой потери качества. Решение — прогнать его через распознавание текста (OCR), чтобы вытащить слова и переэкспортировать документ как текстовый PDF.

  Воркфлоу:

  <ol>
    <li>Запустите OCR на скане, чтобы получить версию в Word или текстовом формате.</li>
    <li>Проверьте точность по первой странице — ищите места, где «н» распозналось как «и», «3» как «8», и кластеры, где распознаватель явно сомневался.</li>
    <li>Переэкспортируйте обратно в PDF из Word.</li>
    <li>Сожмите новый файл по Способу 1.</li>
  </ol>

  Скан на 50 МБ после такого тура часто превращается в 1-2 МБ, потому что текст занимает крошечную долю от того, что весили картинки страниц. Цена вопроса: рукописные пометки, подписи и печати при конвертации не уцелеют, поэтому если они юридически важны — храните оригинал. Для судебных приложений и всего, что может потребовать подтверждения подлинности, никогда не заменяйте источник OCR-версией: отправляйте обе.

  <h2>Качество и размер: чего ждать</h2>

  Будьте честны с собой по поводу того, что на самом деле нужно адресату:

  <ul>
    <li><strong>Чтение с экрана.</strong> Medium-сжатие незаметно. Используйте смело.</li>
    <li><strong>Печать на обычной офисной бумаге.</strong> Medium тоже подходит. High начинает «вылезать» на фото.</li>
    <li><strong>Профессиональная печать или подписание.</strong> Оставайтесь на low или вообще не сжимайте — отправьте ссылку из облака.</li>
    <li><strong>Юридические приложения и доказательства.</strong> Не сжимайте вообще. Целостность файла важнее удобства почты, и противоположная сторона может использовать факт перекодирования как аргумент против.</li>
    <li><strong>Подача документов через судебные e-filing-порталы.</strong> Многие суды публикуют точные требования к PDF (PDF/A 1b, без вшитых шрифтов сверх базовых 14, не больше 35 МБ). Подгоняйте файл под их спецификацию, а не угадывайте.</li>
  </ul>

  <h2>Когда лучше отправить ссылку из облака</h2>

  Если ваш PDF исходно тяжелее 100 МБ или вам нужно за раз отправить несколько крупных файлов — перестаньте бороться с почтой и переключайтесь на ссылку. У большинства людей уже есть один из этих сервисов:

  <table>
    <thead>
      <tr><th>Сервис</th><th>Бесплатный объём</th><th>Замечания</th></tr>
    </thead>
    <tbody>
      <tr><td>Google Drive</td><td>15 GB бесплатно всего</td><td>Получателю нужно открыть доступ по ссылке</td></tr>
      <tr><td>WeTransfer (free)</td><td>2 GB на передачу</td><td>Ссылка живёт 7 дней</td></tr>
      <tr><td>Dropbox</td><td>2 GB бесплатно всего</td><td>Постоянные ссылки на расшаривание</td></tr>
      <tr><td>OneDrive</td><td>5 GB бесплатно</td><td>Лучший вариант для получателей в Outlook</td></tr>
    </tbody>
  </table>

  Маленькая ремарка про приватность: облачная ссылка означает копию файла за пределами вашей организации. Если документ чувствительный, поставьте на PDF пароль перед загрузкой и передайте пароль другим каналом. Выставляйте права «только для конкретных людей», а не «всем по ссылке», и задавайте срок жизни ссылки, если платформа поддерживает (Drive — да; Dropbox — на платных тарифах).

  Для всего остального — <a href="/ru/all-tools/">все PDF-инструменты</a>: сжатие, разбиение и защита в одном месте.

  <h2>FAQ</h2>

  <h3>Почему Пдф после сжатия всё ещё больше 25 МБ?</h3>
  <p>Либо файл — это в основном отсканированные изображения (Способ 1 на чистых сканах упирается в ~60% экономии), либо его уже сжимали один раз. Прогоните сканы через OCR по Способу 3 или разделите файл на два письма по Способу 2. Если это born-digital PDF, который не уменьшается, проверьте панель вложений — внутри могут ехать прикреплённые файлы.</p>

  <h3>Сжатие Пдф ухудшает качество?</h3>
  <p>Medium-сжатие опускает картинки примерно до 150 DPI — это незаметно на нормальном расстоянии чтения и нормально печатается на A4. High уже видно на фото и детальных схемах. Текст не страдает ни на одном пресете — векторный текст не пересэмплируется.</p>

  <h3>Можно ли сжать PDF с паролем?</h3>
  <p>Сначала придётся снять защиту своим паролем, потом сжать, и при необходимости поставить защиту снова. Инструменты сжатия не умеют читать зашифрованные страницы — это и задумывалось так: если бы умели, шифрование не имело бы смысла.</p>

  <h3>Какой безопасный размер для корпоративной почты?</h3>
  <p>Цельтесь в 10 МБ или меньше. Многие Exchange-серверы режут вложения от 10-15 МБ, и спам-фильтр получателя добавляет ещё запас. Если сомневаетесь — сжимайте до 8 МБ или используйте облачную ссылку.</p>

  <h3>Сможет ли получатель распечатать сжатый PDF?</h3>
  <p>Да. Medium и low сохраняют достаточное разрешение для аккуратной офисной печати. Если документ будут печатать профессионально на крупном формате (всё, что больше A3), оставайтесь на low или отправляйте оригинал.</p>

  <h2>Попробуйте сейчас</h2>

  <p>Большинство проблем «PDF слишком большой для почты» решается за минуту пресетом medium. Закиньте файл в компрессор Convertica и отправьте уменьшенную копию с чистой совестью. <a href="/ru/pdf-organize/compress/">Открыть компрессор PDF →</a></p>
