content_ru: |
  <p>Наш самый крупный апдейт почти готов. В этом релизе появляется <strong>система Premium-подписок</strong>, улучшаются уже привычные инструменты и добавляются пять новых конвертеров. Рассказываем, что будет.</p>

  <h2>Предупреждение перед запуском</h2>
  <p>Релиз такого масштаба затрагивает множество движущихся частей, поэтому в первые дни что-то может вести себя странно. Если что-то сломается — <strong>напишите нам</strong>, и мы быстро всё починим.</p>

  <h2>Premium-подписки</h2>
  <p>Premium доступен в трёх вариантах:</p>
  <ul>
    <li><strong>1 день</strong> — $1</li>
    <li><strong>1 месяц</strong> — $5</li>
    <li><strong>1 год</strong> — $52</li>
  </ul>
  <p>Любой план Premium открывает:</p>
  <ul>
    <li>Повышенные лимиты на размер файла и число страниц</li>
    <li>Обработку с OCR</li>
    <li>Пакетную обработку на отдельных инструментах</li>
    <li>Отдельную, более быструю очередь обработки</li>
    <li>Опциональную тёмную тему</li>
  </ul>

  <h2>Ранги Героев</h2>
  <p>Premium-подписчики поддерживают работу Convertica, поэтому мы зовём их <strong>Героями</strong>. Чем дольше вы с подпиской, тем выше ваш ранг:</p>
  <ul>
    <li><strong>Бронзовый Герой</strong> — 30+ дней подряд</li>
    <li><strong>Серебряный Герой</strong> — 90+ дней подряд</li>
    <li><strong>Золотой Герой</strong> — 180+ дней подряд</li>
    <li><strong>Платиновый Герой</strong> — 365+ дней подряд</li>
  </ul>
  <p>Ещё будет <strong>таблица лидеров</strong> с топ-10 Героев, поддерживающих нас дольше всех, плюс опциональная бегущая строка для тех, кто хочет оказаться в центре внимания.</p>

  <h2>Пять новых конвертеров</h2>
  <p>Вместе с функциями Premium и апгрейдами инструментов мы добавляем пять конвертеров:</p>
  <ul>
    <li>PDF в HTML</li>
    <li>HTML в PDF</li>
    <li>PDF в PPTX</li>
    <li>PPTX в PDF</li>
    <li>Excel в PDF</li>
  </ul>

  <figure><img src="/static/blog/images/tool-all-tools-hero.jpg" alt="Коллекция PDF-инструментов Convertica" width="1280" height="800" loading="lazy"></figure>

  <h2>Спасибо, что вы с нами</h2>
  <p>Это релиз, которым мы гордимся больше всего, и именно ваши отзывы его сформировали. Загляните в <a href="/ru/all-tools/">все инструменты</a>, чтобы посмотреть, что доступно уже сегодня, или попробуйте <a href="/ru/excel-to-pdf/">конвертер Excel в PDF</a>, как только он появится. Скоро ещё больше.</p>
