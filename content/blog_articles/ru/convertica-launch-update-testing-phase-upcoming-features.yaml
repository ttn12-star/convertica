excerpt_ru: Convertica запустилась 8 декабря и сейчас в активном тестировании. Рассказываем, над чем работаем, как прислать обратную связь и что будет в следующем обновлении.
content_ru: |
  <p>Короткий апдейт от команды: <strong>Convertica запустилась 8 декабря</strong>, и весь набор инструментов теперь открыт для всех. Спасибо всем, кто попробовал сервис в первые дни.</p>

  <h2>Мы всё ещё в активном тестировании</h2>

  <p>Мы смотрим, как платформа ведёт себя при реальной нагрузке, и честно признаём: это пока ранний этап. Сейчас вы можете столкнуться с таким:</p>

  <ul>
    <li>Инструмент ведёт себя не так, как вы ожидали</li>
    <li>Какая-то конвертация ещё требует доработки</li>
    <li>Иногда попадается мелкий баг или шероховатость</li>
  </ul>

  <p>Всё это нормально сразу после запуска, и каждое сообщение от вас помогает нам быстрее всё подтянуть.</p>

  <h2>Расскажите, что сломалось</h2>

  <p>Если что-то не работает или у вас есть идея, что нам стоит сделать дальше, напишите нам через форму обратной связи. Мы читаем каждое сообщение, пытаемся воспроизвести описанные проблемы и на их основе решаем, что чинить в первую очередь. Ранняя обратная связь реально влияет на то, куда движется Convertica.</p>

  <h2>Скоро будет большое обновление</h2>

  <p>Мы уже работаем над крупным релизом, запланированным на <strong>конец января — начало февраля</strong>. В нём будут новые функции, более высокая производительность и в целом более удобная работа. Ближе к дате мы напишем отдельный пост с подробностями о том, что нового.</p>

  <h2>Попробуйте инструменты</h2>

  <figure><img src="/static/blog/images/tool-all-tools-hero.jpg" alt="Обзор онлайн-инструментов Convertica для PDF (Пдф)" width="1280" height="800" loading="lazy"></figure>

  <p>А пока всё уже работает и бесплатно. Посмотрите весь набор на странице <a href="/ru/all-tools/">все инструменты</a> или сразу откройте популярный — например, <a href="/ru/pdf-to-word/">PDF в Word</a>. Споткнулись о что-то — дайте знать. Спасибо, что вы с нами с самого начала.</p>
