content_ru: |
  Favicon, или фавикон, это самая маленькая часть вашего бренда и та, которую люди видят чаще всего. Он живёт во вкладке браузера, в панели закладок, рядом с названием сайта в результатах поиска и на домашнем экране телефона, когда кто-то сохраняет вашу страницу. Хороший favicon никто не замечает. А вот пропавший, размытый или стандартный серый глобус, который браузер подставляет, если иконку забыли добавить, замечают сразу. Сделать нормальную иконку сайта можно за пару минут, если знать, что на самом деле требуют современные браузеры и устройства. Ниже полная картина и самый быстрый путь через неё.

  <h2>Что такое favicon на самом деле</h2>

  <p>Favicon, сокращение от английского favorite icon, это маленькая квадратная картинка, которая представляет сайт. Появился он в конце 1990-х как один файл размером 16x16 пикселей с именем favicon.ico, и долгое время этим всё и ограничивалось. Сейчас уже нет. Сегодня тот же логотип должен чётко рисоваться во вкладке браузера на ноутбуке с высоким разрешением, в закладке, на домашнем экране iPhone при 180 пикселях, на устройстве с Android, внутри устанавливаемого веб-приложения и иногда рядом с вашей строкой в поисковой выдаче. Каждому из этих мест нужен свой размер, а некоторым ещё и конкретное имя файла.</p>

  <p>Именно поэтому старый совет из разряда "просто загрузи 16x16" сегодня даёт мыльное месиво. Крохотная картинка, растянутая до иконки 180 пикселей на домашнем экране, выглядит нерезкой и в пикселях. Правильный подход другой: начать с одного большого и чистого изображения и сделать из него небольшой набор файлов нужных размеров.</p>

  <h2>Почему одного размера больше не хватает</h2>

  <p>Разные поверхности тянут разные иконки. Если понять, куда идёт каждая, список размеров ниже покажется логичным, а не взятым с потолка:</p>

  <ul>
    <li><strong>Вкладки браузера и закладки</strong> используют классический favicon, обычно 16x16 или 32x32, причём на современных экранах с высокой плотностью пикселей предпочтительнее 32.</li>
    <li><strong>Домашние экраны iPhone и iPad</strong> используют apple-touch-icon 180x180, когда пользователь добавляет вашу страницу на домашний экран.</li>
    <li><strong>Android и устанавливаемые веб-приложения (PWA)</strong> используют иконки 192x192 и 512x512, описанные в небольшом файле-манифесте.</li>
    <li><strong>Windows и дисплеи с высоким разрешением</strong> выигрывают от промежуточных размеров вроде 48, 64, 96, 128 и 256, чтобы иконку никогда не приходилось сильно масштабировать от исходного размера.</li>
    <li><strong>Результаты поиска</strong> могут показывать ваш favicon рядом с заголовком страницы, и это ненавязчиво укрепляет бренд в каждой строке выдачи.</li>
  </ul>

  <h2>Какие размеры favicon реально нужны в 2026 году</h2>

  <p>Гадать и генерировать сотни файлов не нужно. Вот практичный набор, который закрывает все массовые браузеры и устройства и точно совпадает с тем, что выдаёт хороший генератор:</p>

  <table>
    <thead>
      <tr><th>Файл</th><th>Размер</th><th>Где появляется</th></tr>
    </thead>
    <tbody>
      <tr><td>favicon.ico</td><td>16, 32, 48 (несколько размеров)</td><td>Универсальный запасной вариант: вкладки, адресная строка, закладки, старые браузеры</td></tr>
      <tr><td>favicon-16x16.png</td><td>16x16</td><td>Мелкая отрисовка во вкладке и закладке</td></tr>
      <tr><td>favicon-32x32.png</td><td>32x32</td><td>Стандартная иконка вкладки в современных десктопных браузерах</td></tr>
      <tr><td>apple-touch-icon.png</td><td>180x180</td><td>Ярлык на домашнем экране iPhone и iPad</td></tr>
      <tr><td>android-chrome-192x192.png</td><td>192x192</td><td>Домашний экран Android и установка PWA</td></tr>
      <tr><td>android-chrome-512x512.png</td><td>512x512</td><td>Экран запуска Android и PWA высокого разрешения</td></tr>
      <tr><td>PNG на 48, 64, 96, 128, 256 px</td><td>разные</td><td>Дисплеи с высокой плотностью и Windows, чтобы иконка почти не масштабировалась</td></tr>
    </tbody>
  </table>

  <p>Итого одиннадцать файлов: один ICO, десять PNG, плюс небольшой манифест и фрагмент HTML. Делать всё это руками в графическом редакторе занудно и легко ошибиться. Собрать за один шаг и есть весь смысл следующего раздела.</p>

  <h2>Самый быстрый способ: собрать весь комплект сразу</h2>

  <figure><img src="/static/images/tools/image-favicon-generator.jpg" alt="Генератор favicon от Convertica превращает одну картинку в полный комплект иконок сайта" width="1280" height="800" loading="lazy"></figure>

  <p>Вместо того чтобы экспортировать размеры по одному, начните с одного качественного изображения и дайте генератору собрать весь набор. Вот как это работает в <a href="/ru/image/favicon-generator/">генераторе favicon</a>:</p>

  <ol>
    <li>Откройте <a href="/ru/image/favicon-generator/">генератор favicon</a> и загрузите исходное изображение. Подойдёт PNG, JPG, WebP или SVG, причём SVG или крупный PNG дают самый чёткий результат.</li>
    <li>Инструмент обрезает картинку по центру до квадрата и рисует за вас каждый размер: многоразмерный favicon.ico, весь диапазон PNG-иконок от 16 до 512, apple-touch-icon на 180 пикселей и иконки Android на 192 и 512.</li>
    <li>Скачайте ZIP. Внутри все иконки, готовый site.webmanifest для поддержки PWA и Android и небольшой блок HTML, который нужно вставить на сайт.</li>
  </ol>

  <p>Загруженное изображение удаляется с сервера после обработки, поэтому логотип, который вы ещё не выпустили, нигде не задерживается. На выходе полный, корректный по стандартам набор иконок из одной загрузки, без графического редактора.</p>

  <h2>HTML, который вы вставляете, разбираем построчно</h2>

  <p>Favicon работает только тогда, когда браузер знает, где его искать. Генератор выдаёт вот такой фрагмент, который нужно поместить внутрь <code>&lt;head&gt;</code> ваших страниц:</p>

  <pre><code>&lt;link rel="icon" type="image/x-icon" href="/favicon.ico"&gt;
  &lt;link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"&gt;
  &lt;link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png"&gt;
  &lt;link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"&gt;
  &lt;link rel="manifest" href="/site.webmanifest"&gt;</code></pre>

  <p>Что делает каждая строка:</p>

  <ul>
    <li>Первая строка указывает на <strong>favicon.ico</strong>, универсальный запасной вариант, который понимает любой браузер, включая старые.</li>
    <li>Две строки с PNG дают современным браузерам более чёткие иконки <strong>32x32</strong> и <strong>16x16</strong> и позволяют выбрать подходящую под конкретный экран.</li>
    <li>Строка <strong>apple-touch-icon</strong> отвечает за то, что используют iPhone и iPad, когда пользователь сохраняет страницу на домашний экран, чтобы иконка выглядела как у настоящего приложения, а не как размытый скриншот.</li>
    <li>Строка <strong>manifest</strong> указывает на веб-манифест, откуда Android и устанавливаемые веб-приложения берут свои иконки и данные о приложении.</li>
  </ul>

  <p>Загрузите файлы иконок и манифест в корень сайта, чтобы пути выше срабатывали, и дальше браузер всё сделает сам.</p>

  <h2>Зачем нужен веб-манифест</h2>

  <p>site.webmanifest это маленький текстовый файл, который описывает ваш сайт как устанавливаемое приложение. Его главная задача применительно к favicon: перечислить иконки 192x192 и 512x512, которые Android и прогрессивные веб-приложения используют для домашнего экрана и экрана запуска. Если вы не собираетесь делать сайт устанавливаемым, манифест всё равно не мешает и держит Android довольным. А если собираетесь, эти две иконки именно то, что ему нужно, и генератор заполняет их за вас.</p>

  <h2>Как выбрать и подготовить исходное изображение</h2>

  <p>Самый сильный рычаг качества это то, с какой картинки вы стартуете. Несколько привычек делают каждый сгенерированный размер лучше:</p>

  <ul>
    <li><strong>Начинайте с большого и квадратного.</strong> Картинка 512x512 или SVG уменьшаются аккуратно. Крохотный исходник всегда останется крохотным.</li>
    <li><strong>Держите проще.</strong> Favicon часто показывают при 16 пикселях. Мелкие детали, тонкие линии и маленький текст на таком размере исчезают. Одна жирная буква, символ или упрощённый знак логотипа читаются куда лучше, чем полный логотип со слоганом.</li>
    <li><strong>Ставьте на контраст.</strong> Иконка должна выделяться и на светлой, и на тёмной теме браузера. Высокий контраст между знаком и фоном сохраняет её читаемой везде.</li>
    <li><strong>Следите за полями.</strong> Оставьте немного воздуха вокруг знака, чтобы его не обрезало, когда платформа скругляет углы иконки приложения.</li>
  </ul>

  <p>Если вы прикидываете, с какого формата стартовать, гайд про <a href="/ru/blog/webp-vs-jpeg-vs-png-best-image-format/">WebP против JPEG против PNG</a> разбирает компромиссы, а если вам интересно, что происходит с загруженным логотипом, наша заметка о том, <a href="/ru/blog/is-convertica-safe-pdf-file-security-privacy-explained/">как Convertica обращается с вашими файлами</a>, объясняет сторону приватности.</p>

  <h2>Типичные ошибки, из-за которых favicon ломается</h2>

  <ul>
    <li><strong>Заливать только favicon.ico.</strong> Он закрывает вкладки, но не домашние экраны iPhone и не установку PWA. Эти пробелы закрывают apple-touch-icon и иконки из манифеста.</li>
    <li><strong>Неправильные пути к файлам.</strong> Если <code>href</code> в тегах не совпадает с тем, куда вы на самом деле загрузили файлы, браузер не покажет ничего. Держите иконки в корне сайта или поправьте пути под фактическое расположение.</li>
    <li><strong>Валить всё на кеш браузера.</strong> Favicon кешируются очень агрессивно. После добавления или замены иконки жёсткое обновление или заход в приватном окне обычно показывают новую иконку, которую обычная перезагрузка ещё прятала.</li>
    <li><strong>Стартовать с крохотной картинки.</strong> Растягивание маленького логотипа до 180 или 512 пикселей даёт мягкую иконку в пикселях. Всегда начинайте с самой большой чистой версии, что у вас есть.</li>
  </ul>

  <h2>Частые вопросы</h2>

  <h3>Нужен ли ещё favicon.ico или хватит PNG?</h3>
  <p>Оставьте оба. Современные браузеры спокойно используют PNG-иконки, но favicon.ico остаётся безопасным универсальным запасным вариантом, и некоторые браузеры и инструменты до сих пор ищут его по имени в корне сайта. Полный набор включает оба, поэтому генератор и выдаёт ICO рядом с PNG.</p>

  <h3>В чём разница между ICO и PNG здесь?</h3>
  <p>ICO это более старый формат, который может упаковать несколько размеров (16, 32 и 48) внутри одного файла, поэтому он так хорошо работает как единый запасной favicon. PNG хранит один размер на файл, зато поддерживает чёткие качественные изображения и прозрачность, поэтому крупные иконки идут в PNG. Нужны оба, каждый делает то, в чём хорош.</p>

  <h3>Можно ли использовать прозрачный фон?</h3>
  <p>Да, и PNG его поддерживает. Прозрачный фон позволяет иконке естественно ложиться на светлую и тёмную темы браузера. Только убедитесь, что у самого знака достаточно контраста, чтобы оставаться видимым на обеих.</p>

  <h3>Почему мой новый favicon не отображается?</h3>
  <p>Почти всегда дело в кеше. Браузеры держат favicon дольше большинства ресурсов. Сделайте жёсткое обновление, откройте сайт в приватном окне или проверьте файл иконки напрямую по его URL, чтобы убедиться, что он загрузился. Как только кеш очистится, новая иконка появится.</p>

  <h3>Нужен ли favicon для SEO?</h3>
  <p>Это не фактор ранжирования, но favicon может появиться рядом с заголовком страницы в результатах поиска, а это укрепляет бренд и способно поднять кликабельность. Задача маленькая и разовая, а визуальный эффект остаётся надолго, так что пропускать её нет смысла.</p>

  <h2>Сделайте свой прямо сейчас</h2>

  <p>Если ваш сайт работает без favicon или с размытым наследием многолетней давности, поправьте это за пару минут. Загрузите логотип в <a href="/ru/image/favicon-generator/">генератор favicon</a>, скачайте ZIP, положите файлы в корень сайта и вставьте фрагмент HTML. Если вам нужен только один файл иконки, а не весь комплект, конвертеры <a href="/ru/image/png-to-ico/">PNG в ICO</a> и <a href="/ru/image/svg-to-ico/">SVG в ICO</a> делают эту одну задачу, а <a href="/ru/image/optimize/">оптимизатор изображений</a> поможет сначала подрезать исходную картинку.</p>
