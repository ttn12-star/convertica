content_ru: |
  В почте оказывается PDF: договор аренды, согласие на обработку данных, оффер, контракт. Нужна ваша подпись. Старый порядок действий утомляет: распечатать, расписаться ручкой, отсканировать обратно и надеяться, что скан не съедет. Всё это можно пропустить и подписать файл прямо на экране. В этом руководстве покажем как, и заодно проясним то единственное, в чём обычно путаются, когда речь заходит о «цифровой подписи».

  <h2>Два разных смысла слова «подпись»</h2>

  <p>Прежде чем что-то подписывать, полезно понять, что именно вам нужно, потому что эти две вещи решают разные задачи.</p>

  <ul>
    <li><strong>Электронная подпись</strong> представляет собой изображение вашей подписи на странице: набранное текстом, нарисованное мышью или пальцем либо загруженное картинкой. Она выражает намерение подписать, и именно её просят почти все бытовые бланки, договоры и внутренние согласования.</li>
    <li><strong>Цифровая подпись</strong> представляет собой криптографическую печать, привязанную к сертификату. Она не просто показывает ваше имя, а математически подтверждает, кто подписал и что файл не менялся с этого момента. Такую требуют банки, госорганы и некоторые юридические процедуры.</li>
  </ul>

  <p>Для подавляющего большинства документов, которые приходят в почту, электронной подписи ровно достаточно: именно её и просят. Если документу нужна именно сертифицированная цифровая подпись, об этом будет сказано прямо, и обычно вас направят к конкретному сервису или на государственный портал.</p>

  <h2>Подписать PDF на экране (обычный способ)</h2>

  <figure><img src="/static/blog/images/tool-sign-hero.jpg" alt="Инструмент «Подписать PDF» от Convertica с документом, готовым к подписи" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Откройте инструмент <a href="/ru/pdf-edit/sign/">Подписать PDF</a> и загрузите файл.</li>
    <li>Создайте подпись: наберите её текстом и выберите рукописный стиль, нарисуйте мышью или пальцем либо загрузите фото своей настоящей подписи.</li>
    <li>Поставьте её в нужное место на странице, измените размер и добавьте дату или инициалы, если бланк этого требует.</li>
    <li>Скачайте подписанный PDF. Он готов к отправке и одинаково открывается везде.</li>
  </ol>

  <figure><img src="/static/blog/images/tool-sign-options.jpg" alt="Варианты подписи: набрать, нарисовать или загрузить в инструменте «Подписать PDF»" width="1280" height="800" loading="lazy"></figure>

  <p>Всё занимает меньше минуты, а загруженный файл удаляется с сервера через короткое время, что важно, когда речь о договоре, а не о черновике.</p>

  <h2>Как получить аккуратную подпись</h2>

  <p>Несколько мелочей делают подпись на экране опрятной, а не корявой:</p>

  <ul>
    <li><strong>Рисовать на телефоне или планшете лучше, чем мышью.</strong> Палец или стилус дают куда более естественную линию, чем перетаскивание курсора.</li>
    <li><strong>Если загружаете фото подписи,</strong> распишитесь тёмными чернилами на чистом белом листе и обрежьте кадр плотно. Чёткое контрастное изображение ложится на страницу гораздо лучше.</li>
    <li><strong>Подгоняйте размер под линию.</strong> Гигантская подпись, расползшаяся через весь бланк, выглядит нелепо. Уменьшите её так, чтобы она аккуратно села на строку для подписи.</li>
  </ul>

  <h2>Защитите подписанный файл от изменений</h2>

  <p>После подписания документ обычно не хочется давать редактировать кому попало. Электронная подпись это всего лишь картинка, поэтому сама по себе она файл не запирает. Если документ важный, поставьте пароль, чтобы его нельзя было изменить или открыть чужому: прогоните его через инструмент <a href="/ru/pdf-security/protect/">Защитить PDF</a> перед отправкой. А если вы регулярно отправляете подписанные договоры по почте, наше руководство о том, как <a href="/ru/blog/password-protect-pdf-before-emailing/">поставить пароль на PDF перед отправкой</a>, описывает, как сделать это безопасно.</p>

  <h2>FAQ</h2>

  <h3>Имеет ли электронная подпись юридическую силу?</h3>
  <p>В большинстве стран электронная подпись юридически признаётся для повседневных соглашений, и это подкреплено законами вроде американского ESIGN Act и европейского регламента eIDAS. Отдельные документы (некоторые сделки с недвижимостью, судебные или нотариальные бумаги) требуют более строгой сертифицированной цифровой подписи. Когда это так, документ или запрашивающая сторона вам об этом сообщат.</p>

  <h3>Так в чём же разница между электронной и цифровой подписью?</h3>
  <p>Электронная подпись выражает намерение: это изображение вашей подписи на странице. Цифровая подпись добавляет криптографическое подтверждение личности и того, что файл не менялся. Бытовым бланкам нужна первая; регулируемым процедурам иногда нужна вторая.</p>

  <h3>Можно ли подписать PDF на телефоне?</h3>
  <p>Да, и часто это лучший вариант, потому что подпись можно нарисовать пальцем, так выходит естественнее. Откройте инструмент в браузере телефона, нарисуйте, поставьте и скачайте. Приложение не нужно.</p>

  <h3>Изменит ли подпись остальной документ?</h3>
  <p>Нет. Подпись добавляется как элемент поверх страницы. Существующий текст, вёрстка и остальные страницы остаются ровно такими же.</p>

  <h3>Нужно ли что-то распечатывать?</h3>
  <p>Нет. Весь смысл подписи на экране в том, чтобы полностью обойтись без печати и сканирования. Вы загружаете PDF, добавляете подпись и скачиваете готовый файл.</p>

  <h2>Попробуйте прямо сейчас</h2>

  <p>Если в почте ждёт бланк на подпись, откройте инструмент <a href="/ru/pdf-edit/sign/">Подписать PDF</a>, добавьте подпись и отправьте его обратно за минуту. А если подписанная копия конфиденциальна, закройте её паролем через <a href="/ru/pdf-security/protect/">Защитить PDF</a>, прежде чем она уйдёт из вашего ящика.</p>
