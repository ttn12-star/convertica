excerpt_ru: "Если в Adobe Reader вы поворачивали PDF, а после открытия он возвращался обратно — вот лекарство. Флаг ориентации страницы живёт внутри самого файла."
content_ru: |
  Поверните PDF в Adobe Reader, закройте файл, откройте снова — и страницы вернулись на исходные позиции. В этот момент большинство впервые узнаёт, что есть два совершенно разных типа поворота, и только один из них реально меняет файл. Сообщение Adobe Reader при попытке сохранить поворот — «this file has been rotated and you must use Adobe Acrobat to commit the change» — это одно из тех тихих обламываний, которые стоят полудня всем, кто этого не ждал.

  Этот гайд про тот поворот, что закрепляется. На выходе у вас будет PDF, одинаково выглядящий в Chrome, Preview, Acrobat, на чьём-то телефоне и на принтере, который его в итоге распечатает. Никому ниже по цепочке не придётся поворачивать его самому.

  <figure><img src="/static/blog/images/tool-rotate.jpg" alt="Инструмент Convertica поворота PDF (Пдф): сетка превью и кнопки направления" width="1280" height="800" loading="lazy"></figure>

  <h2>Почему ваш поворот всё время исчезает</h2>

  PDF хранит флаг ориентации для каждой страницы внутри структуры файла. Когда вы «поворачиваете» в бесплатной версии Adobe Reader — вы только говорите просмотрщику, как показать страницу на экране в этой сессии. Флаг в файле остаётся нетронутым.

  За кулисами происходят три вещи:

  <ul>
    <li><strong>Поворот на уровне просмотрщика</strong> меняет рендеринг, а не данные. Закрыли документ — переопределение исчезло.</li>
    <li><strong>Поворот на уровне файла</strong> переписывает запись об ориентации страницы. Любой следующий просмотрщик читает уже новое значение.</li>
    <li><strong>«Сохранить как» в бесплатном Adobe Reader</strong> может пересохранить файл, но не зафиксирует поворот, сделанный во вьювере. Эта функция спрятана за платным Acrobat.</li>
  </ul>

  <blockquote class="callout">Если можете повернуть, но изменение исчезает после закрытия — почти наверняка вы использовали поворот уровня просмотрщика. Возьмите инструмент, который переписывает ориентацию страницы прямо в файле.</blockquote>

  Поведение немного изменилось в Adobe Reader DC версий 2019 и старше: кнопка поворота теперь спрятана под Tools &gt; Organize Pages, и выглядит так, будто должна сохранить изменение, но всё равно не сохранит, пока вы не заплатите. Бесплатная версия мелким шрифтом в футере говорит, что «saving page rotations requires Acrobat Pro», — что многие просто не читают.

  Самый быстрый ответ — браузерный ротатор, который перекодирует файл напрямую. Можно <a href="/ru/pdf-edit/rotate/">повернуть PDF онлайн</a> примерно за десять секунд без установки чего-либо.

  <h2>Пошагово: повернуть все страницы на 90 градусов</h2>

  Этот вариант — правильный, когда весь скан вышел боком или кто-то случайно экспортировал альбомный отчёт как книжный.

  <figure><img src="/static/blog/images/tool-rotate.jpg" alt="Поворот всех страниц на 90 градусов по часовой одним пакетным действием" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Откройте инструмент поворота и бросьте PDF. Файлы остаются в сессии загрузки только на время обработки.</li>
    <li>Выберите направление. 90 градусов по часовой чинит большинство боковых сканов. 180 градусов — для документов «вверх ногами» из автоподатчика, схватившего лист не той стороной.</li>
    <li>Применить ко всем страницам. Инструмент за один проход переписывает флаг ориентации для каждой страницы.</li>
    <li>Скачайте новый файл. Откройте в любом просмотрщике, чтобы проверить.</li>
  </ol>

  Сохраните результат под понятным именем вроде <code>contract_rotated.pdf</code>, чтобы случайно не перезаписать оригинал. Хранить оригинал — дешёвая страховка, если поворот пошёл не туда. И «поворот не туда» — это самый частый отчёт «потратил десять минут впустую» от тех, кто впервые пользуется ротатором. Два поворота по часовой = один против часовой, так что восстановление быстрое — но только если у вас остался исходник.

  <h2>Пошагово: повернуть только конкретные страницы</h2>

  PDF со смешанной ориентацией — обычное дело, когда в пачке скана и портретные письма, и альбомная таблица, либо когда кто-то слил файлы из разных источников.

  <ol>
    <li>Загрузите PDF. Посмотрите на сетку превью и определите, какие страницы боком.</li>
    <li>Выберите страницы по номеру. Большинство инструментов позволяют поворачивать страницы 3, 7 и 9 независимо, а не весь файл.</li>
    <li>При необходимости задайте направление поворота для каждой страницы. Чек, отсканированный вверх ногами на странице 5, может потребовать 180 градусов, а страница 7 — 90 по часовой.</li>
    <li>Применить и скачать. Перед отправкой убедитесь, что превью показывают исправленную ориентацию.</li>
  </ol>

  Если вы постоянно бьётесь с постраничными поворотами, часто проще <a href="/ru/pdf-organize/">организовать страницы PDF</a> в одном совмещённом виде, где можно поворачивать, удалять и переупорядочивать перед экспортом.

  Стоит знать клавиатурный шорткат в нашем инструменте (и во многих браузерных): когда у превью фокус, квадратные скобки часто его поворачивают. Правая — по часовой, левая — против. Не везде так, но достаточно часто, чтобы попробовать прежде чем тянуться за мышью.

  <h2>Типичные сценарии</h2>

  <h3>Сканированные боком чеки</h3>

  Планшетные сканеры и камерные приложения часто захватывают мелкие чеки в неправильной ориентации. Поворот на 90 по часовой обычно лечит. Если вы сканируете стопку со смешанной ориентацией — сделайте всё за раз и поворачивайте по странице, не пересканируйте. Чеки на термобумаге (та, что выцветает) часто оказываются на 180 градусов перевёрнуты, потому что их складывают печатной стороной вниз ради сохранности.

  <h3>Мобильные фото, конвертированные в PDF</h3>

  iOS и Android иногда зашивают ориентацию фотографии в EXIF-метаданные, которые конвертер PDF игнорирует. В итоге портретное фото становится альбомной страницей PDF. Поворот на уровне файла — самое чистое лекарство. Стоит знать: эта проблема заметно ухудшилась около iOS 14, когда Apple переключил формат фото с JPEG на HEIC. Старые PDF-инструменты, срезающие HEIC-теги ориентации при конвертации, гарантированно дают боковые страницы. Возврат камеры в режим «Most Compatible» решает проблему ещё на этапе съёмки.

  <h3>Смешанные альбомные и портретные отчёты</h3>

  Годовые отчёты и питч-деки часто сочетают портретный текст с альбомными графиками. Если конвертер выровнял всё в портрет, страницы с графиками может потребоваться повернуть на 90 градусов, чтобы они нормально читались при прокрутке или печати в альбомной ориентации. Инвесторские деки из PowerPoint, экспортированные в PDF, — частые жертвы; путь PowerPoint «Print to PDF» обращается со всем файлом как с одной ориентацией, а не с каждым слайдом по отдельности.

  <h3>Формы, пришедшие факсом</h3>

  Многие медицинские и юридические формы до сих пор приходят факсом — а это значит, что они проходят через принтер, который мог повернуть страницу под формат бумаги. Подсказка — блок подписи, оказавшийся сверху. Поверните на 180, сохраните, и при необходимости отправьте обратно тем же факсом.

  <h2>Проверка, что поворот закрепился</h2>

  Перед отправкой файла сделайте 30-секундную проверку:

  <ul>
    <li>Откройте повернутый PDF в просмотрщике, в котором его не поворачивали. Chrome, Preview на macOS и Edge читают файл иначе, чем Acrobat.</li>
    <li>Отправьте себе письмом и откройте вложение с телефона. Мобильные просмотрщики уважают флаг ориентации на уровне файла и сразу покажут, реальное ли изменение.</li>
    <li>Запустите предпросмотр печати. Превью отражает ориентацию файла, а не оверрайд просмотрщика — боковое превью значит, что поворот не сохранился.</li>
    <li>Посмотрите на превью в файловом менеджере. И Windows Explorer, и macOS Finder показывают ориентацию из файла в панели предпросмотра. Если превью совпало с ожидаемым — поворот закрепился.</li>
  </ul>

  Если файл выглядит правильно в одном просмотрщике и неправильно в другом — поворот был на уровне просмотрщика. Прогоните файл через инструмент, который пишет на диск.

  <h2>Советы по массовому повороту</h2>

  Если собираетесь объединять несколько PDF, чините ориентацию <strong>до</strong> слияния. Иначе придётся искать перевёрнутые страницы внутри 200-страничного пакета — это намного медленнее, чем починить каждый исходный файл по отдельности.

  Обратный совет — для сканов с дуплексной автоподачи. Если каждая вторая страница вышла вверх ногами из-за того, что сканер неправильно перевернул оборот, поворачивайте сначала, а потом <a href="/ru/pdf-organize/merge/">собирайте в один файл</a>. Это сэкономит шаг по сравнению со «слили и пытаемся повернуть чётные страницы внутри объединённого PDF».

  И ещё: поворот не меняет данные изображения, только запись об ориентации. То есть качество не теряется, а размер файла остаётся почти таким же (плюс-минус несколько байт на переписанные метаданные). Это значит, что поворот безопасно запускать на юридических приложениях и доказательственных файлах, где важна целостность исходного потока байт. Хеш данных изменится, потому что изменились метаданные, но содержимое страницы — байт в байт прежнее.

  Подвох с драйверами печати: некоторые корпоративные принтеры игнорируют флаг ориентации PDF и используют свою auto-rotate-логику по самой длинной строке текста. Если ваш повёрнутый PDF печатается боком на офисном Konica или Xerox — принтер вас перекрывает. Найдите в окне печати «Auto-rotate» или «Orientation: From file» и переключите на ручной режим.

  <h2>FAQ</h2>

  <h3>Почему мой PDF выглядит правильно в Chrome, но боком в Adobe?</h3>
  <p>Chrome иногда автокорректирует ориентацию по эвристикам направления текста, а Adobe уважает буквальный флаг ориентации в файле. Если просмотрщики расходятся — флаг в файле всё-таки неправильный, просто Chrome маскирует проблему. Поверните файл правильно, чтобы оба сошлись.</p>

  <h3>Можно ли повернуть только одну страницу в многостраничном PDF?</h3>
  <p>Да. Возьмите инструмент, позволяющий выбрать страницы по одной, или откройте файл в виде организатора страниц. Выберите нужные, задайте направление по странице и экспортируйте. Невыбранные страницы останутся как были.</p>

  <h3>Поворот ухудшит качество Пдф?</h3>
  <p>Нет. Поворот меняет только запись об ориентации в метаданных файла. Изображения и текст не перекодируются, потери качества нет, размер по сути такой же.</p>

  <h3>Почему поворот не сохраняется в бесплатной версии Adobe Reader?</h3>
  <p>Бесплатный Reader умеет только поворот уровня просмотрщика. Сохранение файла не фиксирует поворот на диск. Постоянный поворот — функция платного Acrobat, либо используйте бесплатный браузерный инструмент, переписывающий флаг ориентации напрямую.</p>

  <h3>Можно ли повернуть Пдф с паролем?</h3>
  <p>Сначала придётся ввести пароль. Большинство онлайн-ротаторов спрашивает его при загрузке зашифрованного файла. Без пароля легитимно изменить файл нельзя. Если вы владелец и забыли пароль — это уже другая (и неприятная) задача восстановления.</p>

  <h2>Попробуйте сейчас</h2>

  <p>Перестаньте бороться с просмотрщиком. Откройте <a href="/ru/pdf-edit/rotate/">инструмент поворота PDF</a> и зафиксируйте ориентацию в файле за один проход — или зайдите в <a href="/ru/all-tools/">все инструменты PDF</a>, если нужно ещё объединить или переупорядочить.</p>
