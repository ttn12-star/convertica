content_ru: |
  Поиск «конвертер PDF в JPG онлайн бесплатно» выдаёт сотню инструментов, которые делают примерно одно и то же: загружаете PDF — получаете изображения. «Бесплатно» редко бывает проблемой. Спотыкаются люди на том, что идёт дальше: текст при втором взгляде выглядит мягким, файл весит десять мегабайт вместо двух, или формат не тот для того, что вы с ним делаете.

  Это не невезение. Три небольших решения — разрешение, формат и то, какие страницы вы на самом деле экспортируете, — определяют, годится ли результат. Принимайте их осознанно, и конвертация действительно станет делом в два клика. Этот гайд разбирает каждое простыми словами.

  <figure><img src="/static/blog/images/tool-pdf-to-jpg-hero.jpg" alt="Бесплатный онлайн-конвертер Convertica PDF (Пдф) в JPG (Джипег) с областью загрузки файла" width="1280" height="800" loading="lazy"></figure>

  <h2>Зачем вообще превращать PDF в JPG?</h2>

  <p>Причины почти всегда практические, а не технические. Маркетплейс или соцплатформа принимает изображения, но отвергает PDF, — значит, нужна одна страница как картинка. Вы собираете презентацию и хотите вставить страницу как графику. Форма или чат принимают только JPG. Или вы хотите обрезать, аннотировать либо перекрасить страницу в графическом редакторе, который не открывает PDF.</p>

  <p>В каждом из этих случаев вам нужен не весь документ как файл — вам нужны конкретные страницы, отрендеренные как изображения в качестве, которое подходит для места назначения. Этот взгляд делает настройки ниже очевидными.</p>

  <h2>Решение про разрешение (вот что действительно важно)</h2>

  <p>Когда конвертер превращает страницу PDF в JPG, он рендерит её как сетку пикселей с выбранным разрешением, измеряемым в DPI — точках на дюйм. Более высокий DPI означает больше пикселей, более резкий текст и более крупный файл. Именно из-за этого единственного числа экспорт у одного человека выходит чётким, а у другого — как факс.</p>

  <ul>
    <li><strong>72–96 DPI</strong> — только для экрана. Годится для миниатюры или быстрого предпросмотра, слишком мягко в тот же миг, как появляется мелкий текст.</li>
    <li><strong>150 DPI</strong> — повседневная золотая середина для шеринга на экранах. Текст читается чётко на телефоне или мониторе, а файл остаётся лёгким.</li>
    <li><strong>300 DPI</strong> — качество печати. Используйте, если изображение будут печатать или кто-то может приблизить вплотную. Файлы становятся заметно крупнее, но линии и мелкий шрифт остаются резкими.</li>
  </ul>

  <blockquote class="callout">Если ваш JPG выглядит размытым — почти наверняка вы экспортировали со слишком низким DPI. Переэкспортируйте на 150 для экранов или 300 для печати. Резкость изображению низкого разрешения постфактум не вернуть — детали просто не были захвачены.</blockquote>

  <p>Ошибка в обратную сторону — экспортировать всё на 300 DPI «на всякий случай». Страница для поста в Instagram на 300 DPI — это тяжёлый файл, несущий детали, которые ни один экран никогда не покажет. Подберите DPI под место назначения, и качество с размером уладятся сами.</p>

  <h2>JPG или PNG? Выбирайте по тому, что на странице</h2>

  <p>Бесплатный конвертер PDF в JPG обычно предлагает и PNG, и выбор тут не косметический. JPG и PNG сжимают по-разному, и для документов разница видна.</p>

  <p>JPG использует сжатие с потерями — великолепное для фотографий, где глаз никогда не замечает отброшенные детали. Но на резком чёрном тексте на белом то же сжатие оставляет слабые «ореолы» и муть вокруг букв. PNG работает без потерь: он держит каждый край идеально чётким — а это именно то, что нужно тексту и штриховой графике, ценой более крупного файла.</p>

  <figure><img src="/static/blog/images/tool-pdf-to-jpg-options.jpg" alt="Опции вывода PDF в JPG, включая диапазон страниц, формат и разрешение" width="1280" height="800" loading="lazy"></figure>

  <p>Практическое правило:</p>

  <table>
    <thead>
      <tr><th>Что на странице</th><th>Лучший формат</th><th>Почему</th></tr>
    </thead>
    <tbody>
      <tr><td>В основном текст — договор, счёт, письмо</td><td>PNG</td><td>Края без потерь сохраняют мелкий шрифт разборчивым</td></tr>
      <tr><td>Схемы, графики, штриховая графика</td><td>PNG</td><td>Резкие линии, без мути от сжатия</td></tr>
      <tr><td>Страница целиком — фотография</td><td>JPG</td><td>Намного меньший файл, без видимых потерь</td></tr>
      <tr><td>Листовка, где смешаны фото и текст</td><td>JPG на более высоком DPI</td><td>Поднимите DPI, чтобы компенсировать ореолы текста</td></tr>
    </tbody>
  </table>

  <p>Когда инструмент выдаёт только JPG, а страница насыщена текстом, обходной путь прост: поднимите DPI на ступеньку, чтобы компенсировать ореолы вокруг букв.</p>

  <h2>Экспортируйте только нужные страницы</h2>

  <p>Многостраничный PDF превращается в одно изображение на страницу. Сконвертируйте 40-страничный отчёт — получите 40 файлов, что редко кому нужно. Перед конвертацией задайте диапазон страниц, чтобы получить только страницу 3 или страницы 1–5, а не всю стопку.</p>

  <p>Это самая большая экономия времени в работе с PDF в JPG, и заодно — контроль размера файла: меньше страниц, меньше мегабайт, меньше разбирать потом. Если вам и правда нужны все страницы — это тоже нормально, просто пусть это будет выбором, а не настройкой по умолчанию, которую вы не заметили.</p>

  <h2>Как держать размер файла разумным</h2>

  <ul>
    <li><strong>Не гоняйте по кругу.</strong> Цепочка PDF → JPG → PDF каждый раз пересжимает содержимое и ухудшает его. Держите исходный PDF и экспортируйте из него изображения по мере надобности.</li>
    <li><strong>Уменьшайте перед шерингом.</strong> Экспорт A4 на 300 DPI — это несколько тысяч пикселей в ширину, больше, чем использует любая загрузка в чат или соцсеть. Для экрана 150 DPI с лихвой хватает и весит долю от этого.</li>
    <li><strong>Одна тяжёлая страница лучше сорока лёгких.</strong> Если нужна была одна страница, экспорт именно её в высоком качестве всё равно меньше, чем весь документ в среднем качестве.</li>
  </ul>

  <h2>А как вернуть изображения обратно в PDF?</h2>

  <p>Обратная дорога столь же частая: у вас горстка JPG — фото договора с телефона, набор чеков — и нужно собрать их в один PDF. <a href="/ru/jpg-to-pdf/">Инструмент JPG в PDF</a> с этим справляется, но за одним стоит следить: загрузите все изображения разом и проверьте порядок в превью перед экспортом. Сортировка по имени файла ставит IMG_10 перед IMG_2 и путает страницы. Полный разбор обоих направлений — в нашем гайде о том, как <a href="/ru/blog/convert-pdf-to-jpg-and-back/">конвертировать PDF в JPG и обратно без потери качества</a>.</p>

  <p>И ещё одно: изображение текста не ищется. Если вы пересобрали PDF из фото или экспортированных страниц и позже нужно копировать или искать слова, прогоните <a href="/ru/image/to-text/">OCR по изображению</a>, чтобы вытащить текст. Соседняя статья о том, как <a href="/ru/blog/how-to-extract-text-from-an-image/">извлечь текст из изображения</a>, объясняет, когда это стоит делать.</p>

  <h2>Как конвертировать PDF в JPG онлайн</h2>

  <ol>
    <li>Откройте <a href="/ru/pdf-to-jpg/">конвертер PDF в JPG</a> и загрузите ваш PDF или перетащите его на страницу.</li>
    <li>Задайте диапазон страниц, если вам не нужны все.</li>
