    <li>Конвертируйте и скачивайте. Это бесплатно, без аккаунта и без водяного знака.</li>
  </ol>

  <h2>FAQ</h2>

  <h3>Как конвертировать PDF в JPG онлайн бесплатно без потери качества?</h3>
  <p>Экспортируйте на 150 DPI для экранов или 300 DPI для печати. Потеря качества идёт от выбора слишком низкого разрешения, а не от самой конвертации. Для страниц с обилием текста PNG держит края резче, чем JPG.</p>

  <h3>Есть ли бесплатный конвертер PDF в JPG без водяного знака и регистрации?</h3>
  <p>Да. Инструмент Convertica PDF в JPG бесплатен, не добавляет водяной знак и не требует аккаунта — загрузите, задайте настройки и скачайте.</p>

  <h3>Экспортировать как JPG или PNG?</h3>
  <p>PNG для страниц, в основном из текста или штриховой графики, потому что сжатие без потерь держит края чистыми. JPG для фотографий на всю страницу, потому что он даёт намного меньший файл без видимых потерь.</p>

  <h3>Можно ли конвертировать только одну страницу PDF в изображение?</h3>
  <p>Да. Задайте диапазон страниц перед конвертацией, чтобы получить только нужную страницу, а не по одному изображению на каждую страницу всего документа.</p>

  <h3>Почему мой экспортированный JPG такой большой?</h3>
  <p>Вы, вероятно, экспортировали на высоком DPI для экранного использования. Опуститесь до 150 DPI для всего, что будут смотреть только на телефоне или мониторе, и экспортируйте только нужные страницы.</p>

