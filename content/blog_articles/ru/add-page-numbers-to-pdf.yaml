excerpt_ru: "Номера страниц кажутся мелочью, пока вы не объединили пять документов в 60-страничный пакет, на который невозможно сослаться. Вот как добавить их аккуратно — и как начать нумерацию после обложки, а не на ней."
content_ru: |
  Вы объединяете сопроводительное письмо, резюме и три рекомендательных документа в один PDF для заявки, отправляете — и проверяющий пишет в ответ: «Можете показать, где вы упоминаете бюджет?» А ссылаться не на что — нет номеров страниц. Номера страниц ощущаются как запоздалая мелочь форматирования ровно до момента, когда кому-то нужно сослаться на конкретную страницу в длинном документе — и тогда их отсутствие реально раздражает.

  Добавить их в существующий PDF — дело примерно двадцати секунд. Стоит подумать лишь о трёх решениях: где будут номера, в каком они формате и нужно ли считать обложку. Этот гайд покрывает все три, плюс вариант из юридического мира (нумерация Бейтса) и случай объединённого пакета, где номера страниц важнее всего.

  <figure><img src="/static/blog/images/tool-page-numbers-hero.jpg" alt="Инструмент Convertica для добавления номеров страниц в PDF (Пдф) с областью загрузки файла" width="1280" height="800" loading="lazy"></figure>

  <h2>Зачем добавлять номера после того, как PDF уже создан</h2>

  Если вы писали документ в Word или Google Docs, номера можно было добавить там. Но не оттуда берётся большинство проблем с нумерацией. Они идут от PDF, которые вы не писали или которые сложно перередактировать:

  <ul>
    <li>Пакет, который вы <a href="/ru/pdf-organize/merge/">объединили из нескольких файлов</a>, у каждого своя нумерация или её нет вовсе.</li>
    <li>Сканированный документ, существующий только как PDF.</li>
    <li>Файл, присланный кем-то другим, которому нужны единые ссылки перед встречей.</li>
  </ul>

  Во всех этих случаях исходник непрактично перередактировать, поэтому вы штампуете номера на готовый PDF. Именно это и делает инструмент нумерации страниц — добавляет текстовый слой на поле, не трогая содержимое страницы.

  <h2>Пошагово: пронумеровать PDF</h2>

  <figure><img src="/static/blog/images/tool-page-numbers-options.jpg" alt="Опции номеров страниц: позиция, формат и начальный номер" width="1280" height="800" loading="lazy"></figure>

  Чтобы <a href="/ru/pdf-edit/add-page-numbers/">добавить номера страниц онлайн</a>:

  <ol>
    <li>Загрузите PDF. Превью покажет, куда лягут номера.</li>
    <li>Выберите позицию: снизу по центру — безопасный вариант по умолчанию; снизу справа подходит документам, которые будут сшиты слева.</li>
    <li>Выберите формат. Простая «1» — самый чистый вариант; «Страница 1 из 20» сообщает читателю, сколько осталось; «1 из 20» — компактная золотая середина.</li>
    <li>Задайте начальный номер и первую страницу для нумерации (см. ниже).</li>
    <li>Примените и скачайте. Прокрутите один раз, чтобы убедиться, что номера не наезжают на существующий текст.</li>
  </ol>

  <h2>Вопрос обложки</h2>

  Самая частая ошибка — нумеровать обложку. Титульная страница или оглавление обычно не должны показывать «1» — нумерация должна начинаться на первой содержательной странице. Инструменты решают это двумя отдельными настройками, которые люди часто путают:

  <ul>
    <li><strong>Первая страница для нумерации</strong> — говорит инструменту не штамповать номер на странице 1 (обложке) и начать печатать со страницы 2.</li>
    <li><strong>Начальный номер</strong> — говорит инструменту, какое значение печатать первым. Поставьте 1, чтобы первая содержательная страница читалась как «1», а не «2».</li>
  </ul>

  <blockquote class="callout">Чтобы получить обложку без номера и содержимое, начинающееся с «1»: пропустите первую страницу и задайте начальный номер 1. Настройте оба — изменение только одного и есть причина, по которой содержимое начинается со страницы 2.</blockquote>

  Та же логика распространяется на документы с несколькими страницами вступительной части. Отчёт с обложкой и двухстраничным оглавлением может пропустить первые три страницы и начать печатный отсчёт с 1 на четвёртой странице.

  <h2>Нумерация Бейтса для юридических документов</h2>

  Юридические фирмы используют более строгий вариант под названием нумерация Бейтса — уникальный последовательный идентификатор, проштампованный на каждой странице по всему набору документов, часто с префиксом вроде <code>SMITH-000123</code>. Она существует, чтобы на любую отдельную страницу в материалах раскрытия можно было сослаться однозначно, даже среди тысяч страниц из разных файлов. Если вы готовите вещественные доказательства или набор для раскрытия, ищите опцию префикса и номер фиксированной ширины (ведущие нули), чтобы идентификаторы аккуратно сортировались и на них можно было ссылаться. Для повседневных документов хватит обычной нумерации.

  <h2>Нумерация объединённого пакета</h2>

  Номера страниц больше всего оправдывают себя на объединённых документах. Правильный порядок действий важен: <strong>сначала объедините, потом нумеруйте</strong>. Если пронумеровать отдельные файлы, а затем их объединить, вы получите три «страницы 1» в одном пакете. Нумеруя после объединения, весь документ несёт одну непрерывную последовательность от начала до конца.

  Если позже вы вставите или уберёте страницу, перезапустите нумерацию, а не правьте проштампованные номера — инструмент перенумерует весь файл согласованно, тогда как ручная правка оставит пробел.

  <h2>Как сохранить читаемость номеров</h2>

  <ul>
    <li><strong>Следите за полем.</strong> Если в документе уже есть текст в колонтитуле, ставьте номера в угол, чтобы они не перекрывались.</li>
    <li><strong>Подбирайте под стиль.</strong> Мелкий нейтральный шрифт того же цвета, что и основной текст, выглядит продуманно; крупный жирный номер выглядит прикрученным сбоку.</li>
    <li><strong>Проверьте альбомные страницы.</strong> В файле со смешанной ориентацией убедитесь, что номер по-прежнему ложится в разумное место на повёрнутых страницах.</li>
    <li><strong>Оставьте место для переплёта.</strong> Если документ будут печатать и сшивать, держите номера подальше от края переплёта.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>Как добавить номера страниц в PDF бесплатно?</h3>
  <p>Загрузите файл в инструмент нумерации страниц, выберите позицию и формат, задайте начальный номер и скачайте. Он добавляет текстовый слой на поле, не меняя содержимое страницы, и не требует ни софта, ни аккаунта.</p>

  <h3>Как начать нумерацию после обложки?</h3>
  <p>Установите «первую страницу для нумерации» на страницу 2, чтобы обложка осталась пустой, и задайте «начальный номер» 1, чтобы первая содержательная страница читалась как «1». Настройте обе опции — если изменить только одну, содержимое так и начнётся с «2».</p>

  <h3>Можно ли показывать «Страница 1 из 20» вместо просто «1»?</h3>
  <p>Да. Большинство инструментов предлагают формат, включающий общее число страниц. «Страница X из Y» полезна в длинных документах, потому что сообщает читателю, сколько осталось.</p>

  <h3>Нумеровать до или после объединения файлов?</h3>
  <p>После. Сначала объедините документы в один PDF, затем пронумеруйте совмещённый файл, чтобы он нёс единую непрерывную последовательность. Нумерация до объединения даёт несколько «страниц 1».</p>

  <h3>Что такое нумерация Бейтса?</h3>
  <p>Юридическая схема нумерации, штампующая уникальный последовательный идентификатор — часто с префиксом и ведущими нулями, как SMITH-000123 — на каждой странице по всему набору документов, чтобы на любую страницу можно было сослаться однозначно. Используйте для неё инструмент с опцией префикса и фиксированной ширины.</p>

  <h2>Попробуйте сейчас</h2>

  <p>Откройте <a href="/ru/pdf-edit/add-page-numbers/">инструмент добавления номеров страниц</a>, задайте позицию и стартовую страницу и проштампуйте чистую последовательность за секунды. Сначала собираете пакет? <a href="/ru/pdf-organize/merge/">Объедините файлы</a>, затем нумеруйте — или загляните в <a href="/ru/all-tools/">все инструменты PDF</a>.</p>
