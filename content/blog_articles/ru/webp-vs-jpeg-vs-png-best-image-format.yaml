title_ru: "WebP, JPEG или PNG: какой формат изображения выбрать?"
meta_title_ru: "WebP vs JPEG vs PNG — лучший формат изображений | Convertica"
meta_description_ru: "WebP на 25-35% меньше JPEG, PNG не теряет качество, JPEG открывается везде. Практичное сравнение: таблица, примеры размеров файлов и простое правило выбора."
