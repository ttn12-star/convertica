excerpt_ru: "Три формата покрывают почти все изображения в интернете, и неверный выбор стоит вам размера файла, качества или совместимости. Вот чем WebP, JPEG и PNG отличаются на самом деле — и простое правило выбора."
content_ru: |
  Почти каждое изображение, которое вы когда-либо загрузите, путешествует в одном из трёх контейнеров: JPEG, PNG или WebP. Они кажутся взаимозаменяемыми — картинка же остаётся картинкой, — но под капотом у них совсем разные компромиссы, и неудачный выбор незаметно чего-то стоит: размытый логотип, скриншот на 4 MB, фотография, которую старая система отказывается принимать. Это сравнение расставляет по местам, для чего на самом деле нужен каждый формат.

  <h2>Короткий ответ</h2>

  <ul>
    <li><strong>WebP</strong> — выбор по умолчанию для сайтов. На 25-35% меньше JPEG при том же качестве, поддерживает прозрачность и анимацию. Используйте его всегда, когда сами контролируете, где изображение будет показано.</li>
    <li><strong>JPEG</strong> — выбор по умолчанию для фотографий, которые отправляются в путь. Каждое устройство, программа и форма загрузки с 1990-х его принимает. Используйте, когда совместимость важнее последнего килобайта.</li>
    <li><strong>PNG</strong> — выбор по умолчанию для попиксельно точной графики. Без потерь, с чистой прозрачностью. Используйте для логотипов, скриншотов интерфейсов, диаграмм и всего с резкими краями и текстом.</li>
  </ul>

  <h2>Сравнение бок о бок</h2>

  <table>
    <thead>
      <tr><th></th><th>WebP</th><th>JPEG</th><th>PNG</th></tr>
    </thead>
    <tbody>
      <tr><td><strong>Сжатие</strong></td><td>С потерями или без</td><td>С потерями</td><td>Без потерь</td></tr>
      <tr><td><strong>Типичный размер фото</strong></td><td>Наименьший</td><td>Средний</td><td>Наибольший (часто в 5-10 раз больше JPEG)</td></tr>
      <tr><td><strong>Прозрачность</strong></td><td>Да</td><td>Нет (заливается белым)</td><td>Да</td></tr>
      <tr><td><strong>Анимация</strong></td><td>Да</td><td>Нет</td><td>Нет (APNG — редкость)</td></tr>
      <tr><td><strong>Поддержка в браузерах</strong></td><td>Все современные браузеры</td><td>Универсальная</td><td>Универсальная</td></tr>
      <tr><td><strong>Старые программы и устройства</strong></td><td>Иногда отклоняется</td><td>Принимается всегда</td><td>Принимается почти всегда</td></tr>
      <tr><td><strong>Лучше всего для</strong></td><td>Веб-страницы, интернет-магазины</td><td>Фото для обмена, почты, фотопечати</td><td>Логотипы, скриншоты, графика с текстом</td></tr>
    </tbody>
  </table>

  <h2>Почему размер файла важнее, чем кажется</h2>

  <p>Изображения — обычно самое тяжёлое, что есть на странице. Уменьшить их — самый простой выигрыш в производительности: страницы грузятся быстрее, показатели <strong>Core Web Vitals</strong> улучшаются, а мобильные посетители тратят меньше трафика. Скорость страницы — фактор ранжирования, так что для владельца сайта выбор формата — это незаметно ещё и SEO-решение.</p>

  <p>Чтобы прочувствовать цифры: типичная 12-мегапиксельная фотография занимает порядка 2-4 MB в высококачественном JPEG, 1.5-3 MB в WebP при том же визуальном качестве и 15-25 MB в PNG. Цифра для PNG — не опечатка: хранение фото без потерь обходится чудовищно дорого, поэтому PNG — неправильный формат для фотографий.</p>

  <h2>Когда JPEG всё ещё правильный выбор</h2>

  <p>WebP выигрывает по размеру, но у JPEG есть одно непобедимое свойство: тридцать лет универсальной поддержки. Выбирайте JPEG, когда изображение покидает зону вашего контроля:</p>

  <ul>
    <li>Фото во вложениях к письмам и документам, которые кто-то может открыть в старой программе.</li>
    <li>Загрузка на государственные порталы, в заявки на работу и формы со строгими списками типов файлов.</li>
    <li>Отправка фотографий в фотопечать или фотокиоск.</li>
    <li>Обмен с людьми, об устройствах которых вы ничего не знаете.</li>
  </ul>

  <p>WebP-вложение, которое получатель не может открыть, экономит вам 30% от ничего.</p>

  <h2>Когда PNG — единственный верный ответ</h2>

  <p>Сжатие с потерями работает за счёт отбрасывания деталей, которые глаз прощает на фотографии, — но на графике глаз их не прощает. У сжатого в JPEG текста вырастают мутные ореолы; резкие цветовые границы размазываются. Используйте PNG для:</p>

  <ul>
    <li><strong>Логотипов и иконок</strong>, особенно тех, что ложатся на цветной фон (нужна прозрачность).</li>
    <li><strong>Скриншотов интерфейсов</strong> с текстом — документация, баг-репорты, обучающие материалы.</li>
    <li><strong>Диаграмм, схем и пиксель-арта</strong> с жёсткими краями и плоскими цветами.</li>
    <li>Любого изображения, которое будут <strong>многократно редактировать и пересохранять</strong>: без потерь — значит без деградации от поколения к поколению.</li>
  </ul>

  <h2>Как конвертировать между форматами</h2>

  <figure><img src="/static/blog/images/tool-convert-image-hero.jpg" alt="Экран загрузки конвертера форматов изображений Convertica" width="1280" height="800" loading="lazy"></figure>

  <p>Смена формата занимает секунды, и устанавливать ничего не нужно:</p>

  <ol>
    <li>Откройте инструмент <a href="/ru/image/convert/">«Конвертировать изображение»</a> и загрузите файл JPEG, PNG, WebP, GIF, BMP или TIFF.</li>
    <li>Выберите целевой формат и, для JPEG или WebP, уровень качества (90 — безопасное значение по умолчанию).</li>
    <li>Скачайте результат. Размеры в пикселях останутся ровно теми же — меняется только кодирование.</li>
  </ol>

  <figure><img src="/static/blog/images/tool-convert-image-options.jpg" alt="Выбор формата и качества в конвертере изображений" width="1280" height="800" loading="lazy"></figure>

  <p>При конвертации PNG с прозрачностью в WebP альфа-канал сохраняется; при конвертации в JPEG прозрачные области заливаются белым — так что логотип в JPEG обычно ошибка. Если цель — просто файл поменьше в <em>том же</em> формате, инструмент <a href="/ru/image/optimize/">«Оптимизировать изображение»</a> сжимает на месте и заодно может ограничить размеры.</p>

  <h2>FAQ</h2>

  <h3>WebP хуже по качеству, чем JPEG?</h3>
  <p>Нет — при сопоставимых настройках WebP сохраняет то же визуальное качество в меньшем файле. Его компрессор просто новее и умнее, чем у JPEG образца 1992 года. Качество определяется выбранным уровнем, а не названием формата.</p>

  <h3>Почему некоторые сайты отклоняют мой WebP при загрузке?</h3>
  <p>Их проверка загрузок написана до того, как WebP стал популярен, и пропускает только JPEG и PNG. Конвертируйте в JPEG для этой загрузки — дело десяти секунд — и оставьте WebP для собственного сайта.</p>

  <h3>Стоит ли конвертировать существующие JPEG в WebP?</h3>
  <p>Для сайта, который вы ведёте, — да, обычно это самый дешёвый из доступных выигрышей в скорости страниц. Перекодируйте из самого качественного исходника, какой у вас есть, а не из уже сильно сжатой копии — чтобы артефакты не накапливались.</p>

  <h3>А как же GIF?</h3>
  <p>Для анимации WebP (или настоящий видеофайл) бьёт GIF и по размеру, и по глубине цвета. Для статичных картинок ограничение GIF в 256 цветов делает его худшим из четырёх — он выживает в основном по привычке и мемной традиции.</p>

  <h3>Какая настройка качества лучше всего для JPEG и WebP?</h3>
  <p>80-85 для веба — золотая середина, где артефакты невидимы при обычном просмотре. 90+ — когда изображение могут редактировать дальше или рассматривать вблизи. Ниже 70 экономия продолжает расти, но вместе с ней растут и видимые пятна, особенно на небе и градиентах.</p>

  <h2>Выберите один раз, конвертируйте по необходимости</h2>

  <p>Правило умещается в одну строку: <strong>WebP для вашего сайта, JPEG для фото, которые отправляются в путь, PNG для графики с резкими краями.</strong> А когда изображение приходит не в том формате, инструмент <a href="/ru/image/convert/">«Конвертировать изображение»</a> исправляет это в один клик — бесплатно, без регистрации, с нетронутыми размерами.</p>
