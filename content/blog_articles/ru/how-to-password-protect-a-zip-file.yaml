excerpt_ru: "Шифрование ZIP-архива защищает документы, фото и файлы от посторонних, даже если архив перехватят или он окажется в общем хранилище. Вот как сделать это правильно — и что нужно сообщить получателю, чтобы он мог открыть файл."
content_ru: |
  ZIP-архив — самый универсальный контейнер для передачи нескольких файлов сразу. Но по умолчанию он никак не защищён: любой, кто получит архив, откроет его мгновенно. Пароль меняет это: содержимое превращается в зашифрованный текст, нечитаемый без ключа.

  В этом руководстве — как добавить надёжную защиту паролем, какой стандарт шифрования выбрать (и почему это влияет на совместимость), и как снять пароль позже, если он станет не нужен.

  <h2>Зачем защищать ZIP-архив паролем?</h2>

  <figure><img src="/static/blog/images/tool-zip-protect-hero.jpg" alt="Экран загрузки инструмента Convertica «Защитить ZIP»" width="1280" height="800" loading="lazy"></figure>

  <p>Есть три типичных сценария, когда незащищённый архив — реальный риск:</p>

  <ul>
    <li><strong>Вложения в письмах.</strong> Почта реплицируется на серверах и хранится в бэкапах годами. ZIP с договорами, расчётными листками или медкартами, отправленный без шифрования, может прочитать любой, у кого есть доступ к этим бэкапам.</li>
    <li><strong>Облачные хранилища и общие папки.</strong> Загрузка чувствительных файлов в Google Диск, Dropbox или корпоративный SharePoint означает, что облачный провайдер и все, кому когда-либо откроют доступ к папке, смогут просмотреть содержимое.</li>
    <li><strong>USB-носители и физическая передача.</strong> Флешку можно потерять, найти и воткнуть в любой компьютер. Зашифрованный ZIP на флешке без пароля не откроется.</li>
  </ul>

  <p>Защита паролем — не замена всем мерам безопасности: нужен сильный пароль и безопасный способ его передачи. Но это простейший слой защиты, не требующий специального ПО ни у отправителя, ни у получателя.</p>

  <h2>AES-256 против ZipCrypto — выберите правильное шифрование</h2>

  <p>Не всякая парольная защита ZIP одинакова. Есть два основных стандарта:</p>

  <ul>
    <li><strong>ZipCrypto (также «традиционное» или «Zip 2.0» шифрование).</strong> Встроено в исходную спецификацию ZIP 1990-х годов. Оно слабое — современные инструменты взламывают его за секунды словарной атакой. Единственное преимущество: Проводник Windows и Архивная утилита macOS открывают его без дополнительного ПО.</li>
    <li><strong>AES-256.</strong> Современный золотой стандарт, используемый банками, правительствами и крупными облачными провайдерами. Перебор такого шифрования на любом существующем сегодня железе практически невозможен. Инструмент Convertica «Защитить ZIP» использует именно AES-256.</li>
  </ul>

  <blockquote class="callout">Используйте AES-256 для всего, что реально важно. ZipCrypto создаёт ложное ощущение безопасности — он задержит злоумышленника на минуты, а не на годы.</blockquote>

  <h3>Совместимость: кто может открыть ZIP с шифрованием AES-256?</h3>

  <p>Обратная сторона AES-256 — встроенные архиваторы Windows и macOS его не поддерживают:</p>

  <ul>
    <li><strong>Проводник Windows</strong> — не открывает ZIP-архивы с шифрованием AES-256. Покажет ошибку или пустой архив.</li>
    <li><strong>Архивная утилита macOS (встроенное двойное нажатие)</strong> — также не поддерживает AES-256.</li>
  </ul>

  <p>Получателю нужно установить бесплатный сторонний архиватор. Все перечисленные ниже поддерживают AES-256 и бесплатны:</p>

  <ul>
    <li><strong>7-Zip</strong> (Windows) — бесплатный, с открытым исходным кодом, широко распространён.</li>
    <li><strong>WinRAR</strong> (Windows) — технически пробная версия, но полностью функционален для открытия ZIP.</li>
    <li><strong>WinZip</strong> (Windows/macOS) — платный, но распространён в корпоративной среде.</li>
    <li><strong>Keka</strong> (macOS) — бесплатен с сайта разработчика, платен в Mac App Store.</li>
    <li><strong>The Unarchiver</strong> (macOS) — бесплатен в Mac App Store, открывает ZIP с AES-256.</li>
  </ul>

  <p>Отправляя защищённый паролем ZIP, укажите получателю, какое приложение использовать, если у него его ещё нет. Это предотвратит жалобы на «повреждённый файл», когда реальная причина — несовместимый архиватор.</p>

  <h2>Пошагово: защитить ZIP с помощью Convertica</h2>

  <figure><img src="/static/blog/images/tool-zip-protect-options.jpg" alt="Опции пароля и шифрования AES-256 для ZIP-файла" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Откройте инструмент <a href="/archive/protect/">«Защитить ZIP»</a> на Convertica. Регистрация не нужна.</li>
    <li>Загрузите ZIP-файл. Если у вас отдельные файлы, сначала запакуйте их средствами ОС («Отправить в ZIP» или «Сжать»), а затем загрузите готовый архив.</li>
    <li>Введите надёжный пароль. Советы по выбору пароля — ниже. Вводите внимательно — возможности восстановить забытый пароль нет.</li>
    <li>Нажмите кнопку защиты. Convertica применяет шифрование AES-256 и создаёт новый, защищённый паролем ZIP.</li>
    <li>Скачайте защищённый файл. Откройте его сами с помощью 7-Zip или другого совместимого архиватора, чтобы убедиться в корректности, прежде чем отправлять кому-либо.</li>
    <li>Поделитесь файлом — а пароль передайте другим каналом. Отправьте файл по почте, но пароль — отдельно: SMS, мессенджер или одноразовая ссылка-секрет. Никогда не кладите пароль в то же письмо, что и вложение.</li>
  </ol>

  <p>Convertica обрабатывает файл в памяти и не хранит его после генерации ссылки для скачивания. Аккаунт не требуется, файлы на сервере после обработки не сохраняются.</p>

  <h2>Как выбрать надёжный пароль для ZIP</h2>

  <p>Шифрование настолько надёжно, насколько надёжен защищающий его пароль. AES-256 теоретически неуязвим, но слабый пароль можно угадать или перебрать офлайн, если у злоумышленника уже есть файл.</p>

  <ul>
    <li><strong>Длина важнее «сложности».</strong> 16 случайных символов надёжнее, чем 8 с кучей знаков. «CloudDeskLemonPaper7» гораздо труднее взломать, чем «P@55w0rd!».</li>
    <li><strong>Используйте генератор в менеджере паролей.</strong> Инструменты вроде 1Password, Bitwarden или KeePass создают случайные пароли, которые не нужно запоминать — они хранятся в менеджере.</li>
    <li><strong>Избегайте личных данных.</strong> Имена, даты рождения, названия компаний и клички животных угадываются по открытым источникам.</li>
    <li><strong>Храните резервную копию.</strong> Сразу сохраните пароль в менеджере. Если потеряете — файл нельзя восстановить: AES-256 без ключа не обратить.</li>
  </ul>

  <h2>Как снять пароль с ZIP-архива</h2>

  <p>Если защита больше не нужна — например, вы распространили файл и хотите незашифрованную копию для собственного архива — инструмент Convertica <a href="/archive/unlock/">«Снять защиту с ZIP»</a> удалит пароль.</p>

  <p>Важные ограничения:</p>

  <ul>
    <li>Вы должны знать текущий пароль. Инструмент расшифровывает архив с помощью введённого вами пароля и сохраняет результат без шифрования. Он не взламывает и не обходит неизвестные пароли.</li>
    <li>Если пароль забыт и резервной копии нет — файл нельзя восстановить никакими практическими средствами. Это и есть то, что делает AES-256 надёжным.</li>
  </ul>

  <p>Процесс такой же, как при защите: загрузите зашифрованный ZIP, введите пароль, скачайте разблокированный архив. Регистрация не нужна.</p>

  <h2>Краткий список лучших практик</h2>

  <ul>
    <li>Всегда используйте AES-256. Никогда не используйте ZipCrypto для чего-либо важного.</li>
    <li>Сообщите получателю, какой архиватор установить, если он не технический пользователь.</li>
    <li>Передавайте пароль другим каналом, не тем, по которому отправляете файл.</li>
    <li>Сразу сохраняйте пароль в менеджер паролей — восстановления нет.</li>
    <li>Храните оригинальную незашифрованную копию в надёжном месте, чтобы при необходимости перезашифровать.</li>
    <li>Проверяйте защищённый файл перед отправкой. Опечатку в пароле не обнаружить, пока получатель не попробует открыть архив.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>Может ли Windows открыть ZIP с паролем без дополнительного ПО?</h3>
  <p>Только если ZIP использует старое шифрование ZipCrypto — которое взламывается быстро. ZIP с AES-256 (что использует Convertica) в Проводнике Windows не открыть. Скажите получателю установить 7-Zip — это бесплатно и занимает меньше минуты.</p>

  <h3>Достаточно ли шифрования для защиты чувствительных документов?</h3>
  <p>Да. AES-256 — тот же стандарт, которым защищают секретные государственные данные и финансовую информацию по всему миру. Риск почти всегда в пароле, а не в алгоритме — используйте длинный случайный пароль, и защита будет надёжной.</p>

  <h3>Что будет, если забыть пароль?</h3>
  <p>Файл фактически нельзя восстановить. Нет ни мастер-ключа, ни кода восстановления, ни способа взломать AES-256 за разумное время. Именно поэтому важно сразу хранить пароль в менеджере паролей — и держать незашифрованные оригиналы в надёжном месте.</p>

  <h3>Можно ли защитить паролем ZIP, который уже содержит файлы?</h3>
  <p>Да. Инструмент «Защитить ZIP» работает с любым существующим ZIP-архивом. Если у вас отдельные файлы, сначала запакуйте их стандартными средствами Windows или macOS, а затем загрузите ZIP в Convertica для добавления шифрования AES-256.</p>

  <h3>Хранит ли Convertica мои файлы после обработки?</h3>
  <p>Нет. Файлы обрабатываются в памяти, ссылка для скачивания истекает вскоре после генерации. Convertica не хранит ваши файлы, аккаунт и регистрация не нужны.</p>

  <h2>Попробуйте сейчас</h2>

  <p>Откройте инструмент <a href="/archive/protect/">«Защитить ZIP»</a>, загрузите архив, задайте надёжный пароль и скачайте зашифрованный файл. А если понадобится снять защиту — используйте <a href="/archive/unlock/">«Снять защиту с ZIP»</a>, пока помните пароль.</p>
