excerpt_ru: "Нужный текст застрял в картинке — скриншот, сфотографированная страница, чек. OCR читает пиксели и возвращает редактируемый текст. Вот как делать это правильно."
content_ru: |
  Вы видите слова, но не можете их выделить. Они заперты в изображении — скриншот слайда, фотография печатной страницы, отсканированный чек, визитная карточка. Перепечатать — очевидный вариант и самый плохой. Оптическое распознавание символов (OCR) делает это за вас: читает пиксели, распознаёт буквы и возвращает текст, который можно скопировать, отредактировать и найти поиском.

  В этом руководстве рассказывается, как вытащить текст из изображения с помощью бесплатного инструмента в браузере, что делает результат чистым или кашеобразным, и как справляться с нестандартными случаями — HEIC-фотографиями с iPhone и текстом не на английском.

  <h2>Когда нужен OCR (а когда нет)</h2>

  <figure><img src="/static/blog/images/tool-image-to-text-hero.jpg" alt="Экран загрузки инструмента Convertica «Изображение в текст» (OCR)" width="1280" height="800" loading="lazy"></figure>

  Если вы уже можете выделять отдельные слова курсором, текст «живой» — просто скопируйте его, OCR не нужен. OCR нужен, когда слова являются частью самого изображения:

  <ul>
    <li><strong>Скриншоты</strong> текста, который нельзя выделить (кадр из видео, чат, диалог с ошибкой).</li>
    <li><strong>Фотографии</strong> печатной страницы, доски, вывески или слайда.</li>
    <li><strong>Сканы и факсы</strong>, сохранённые как JPG, PNG или TIFF.</li>
    <li><strong>Чеки и визитные карточки</strong>, которые хочется сохранить как текст.</li>
  </ul>

  <h2>Как извлечь текст из изображения</h2>

  <figure><img src="/static/blog/images/tool-image-to-text-options.jpg" alt="Опции извлечения текста из изображения с помощью OCR" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Откройте инструмент <a href="/ru/image/to-text/">«Изображение в текст»</a> и загрузите своё изображение (JPG, PNG, WebP, HEIC, BMP, TIFF или GIF). Можно перетащить прямо на страницу.</li>
    <li>Выберите язык текста или оставьте <strong>Автоопределение</strong>. Явное указание языка сильно помогает для текста не на английском или с диакритикой.</li>
    <li>Нажмите <strong>Извлечь текст</strong>. Распознанный текст появится на странице через пару секунд.</li>
    <li>Используйте <strong>Копировать</strong>, чтобы взять текст, или <strong>Скачать .txt</strong>, чтобы сохранить как текстовый файл. Обязательно быстро проверьте результат перед использованием.</li>
  </ol>

  <p>Ничего не устанавливается, файл обрабатывается во временной сессии и затем удаляется — но для чувствительных документов читайте примечание о конфиденциальности в FAQ.</p>

  <h2>Что на самом деле влияет на точность</h2>

  Качество OCR в основном определяется изображением, которое вы подаёте. Три вещи важнее всего:

  <ul>
    <li><strong>Резкость.</strong> Чёткий, сфокусированный текст читается чисто. Смазанность от движения и нечёткие фотографии с телефона — главная причина каши на выходе.</li>
    <li><strong>Контраст.</strong> OCR работает на разнице между чернилами и фоном. Выцветшая ксерокопия или фото в плохом освещении дают распознавателю слишком мало, даже при высоком разрешении.</li>
    <li><strong>Язык.</strong> Модель, обученная на английском, неверно читает символы с диакритикой и незнакомые слова. Выбирайте правильный язык вместо «Авто» всегда, когда знаете его.</li>
  </ul>

  <p>Разрешение тоже важно: стремитесь к тому, чтобы текст в строке занимал несколько сотен пикселей по высоте. Для сканов 300 DPI — это удобная нижняя граница. Мелкие сноски на фотографии с низким разрешением — вот где точность рассыпается.</p>

  <h2>Фотографии с iPhone (HEIC) и другие форматы</h2>

  <p>Фотографии с современного iPhone или iPad обычно в формате <strong>HEIC/HEIF</strong>, а не JPG. Конвертировать их заранее не нужно — загрузите HEIC, и инструмент раскодирует его напрямую. JPG, PNG, WebP, BMP, TIFF и GIF работают точно так же. Для многостраничного TIFF или анимированного GIF используется первый кадр.</p>

  <h2>Советы для чистого результата</h2>

  <ul>
    <li>Заполните кадр текстом и обрежьте фон, руки и края стола — лишние детали сбивают определение компоновки.</li>
    <li>Снимайте прямо. Страница, сфотографированная под углом, искажает буквы и снижает точность; инструмент исправляет небольшой перекос, но съёмка в лоб лучше всего.</li>
    <li>Избегайте бликов и теней. Равномерный рассеянный свет лучше яркого окна или вспышки телефона.</li>
    <li>Для многоколоночного текста ожидайте его в порядке чтения, а не в виде восстановленных колонок.</li>
    <li>Проверьте типичные ошибки: 0/O, 1/l/I, rn/m и лишние знаки препинания.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>Это действительно бесплатно?</h3>
  <p>Да. Извлечение текста из одного изображения бесплатно, без регистрации и без водяного знака на результате.</p>

  <h3>Какие языки поддерживаются?</h3>
  <p>17 языков: английский, русский, немецкий, французский, испанский, итальянский, португальский, польский, турецкий, украинский, хинди, индонезийский, арабский, китайский (упрощённый и традиционный), японский и корейский — плюс автоматическое определение. Для текстов с диакритикой или нелатинских алфавитов задавайте язык явно для наилучшей точности.</p>

  <h3>Умеет ли инструмент читать рукописный текст?</h3>
  <p>Иногда, и без гарантий. OCR обучен на печатном тексте; точность для рукописей сильно варьируется, курсив распознаётся хуже всего. Печатные заглавные буквы — например, форма, заполненная от руки — читаются намного лучше, чем связный почерк.</p>

  <h3>Почему часть текста неверна или пропущена?</h3>
  <p>Почти всегда виновато исходное изображение: размытость, низкий контраст, мелкий текст или неверно указанный язык. Переснимите чётче и при лучшем освещении, выберите правильный язык — и результат обычно резко улучшается.</p>

  <h3>Это конфиденциально?</h3>
  <p>Изображение обрабатывается во временной сессии и вскоре удаляется. Тем не менее перед загрузкой чувствительных материалов читайте политику конфиденциальности. Для строго конфиденциальных документов — медицинских записей, юридически защищённых файлов — предпочтите локальный OCR (например, Tesseract) любому веб-сервису.</p>

  <h3>Можно получить текст в формате Word?</h3>
  <p>Этот инструмент возвращает обычный текст, который можно вставить куда угодно. Если вам нужен отсканированный <em>PDF</em> именно в виде форматированного файла Word, воспользуйтесь конвертером <a href="/ru/pdf-to-word/">PDF в Word</a> с поддержкой OCR.</p>

  <h2>Попробуйте прямо сейчас</h2>

  <p>Перестаньте перепечатывать. Перетащите скриншот или фотографию в инструмент <a href="/ru/image/to-text/">«Изображение в текст»</a>, выберите язык — и через несколько секунд у вас будет редактируемый текст. Только быстро проверьте его перед использованием.</p>
