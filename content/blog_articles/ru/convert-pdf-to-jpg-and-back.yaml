excerpt_ru: "Конвертация PDF в JPG и обратно кажется пустяком, пока текст не размылся или страницы не вышли в неправильном порядке. Решение — две настройки, которые большинство инструментов прячут: разрешение на выходе и порядок страниц на возврате."
content_ru: |
  Есть две бытовые причины превратить PDF в JPG: вы хотите выложить одну страницу там, где принимают только изображения — объявление на маркетплейсе, пост в соцсети, чат, — или вам нужно вставить страницу в слайд либо документ как картинку. И есть столь же частая обратная дорога: у вас куча фото с телефона или сканов, и нужно, чтобы они пришли одним аккуратным PDF, а не пятнадцатью отдельными вложениями.

  Оба направления бесплатны и занимают секунды. Чёткий результат от размытого месива в неправильном порядке отделяют две настройки, которые большинство конвертеров прячет. Настройте их правильно — и больше об этом не вспомните.

  <figure><img src="/static/blog/images/tool-pdf-to-jpg-hero.jpg" alt="Конвертер Convertica PDF (Пдф) в JPG (Джипег) с областью загрузки файла" width="1280" height="800" loading="lazy"></figure>

  <h2>PDF в JPG: решение про разрешение</h2>

  Когда вы экспортируете страницу PDF в JPG, инструмент рендерит страницу как растр с выбранным разрешением, измеряемым в DPI (точек на дюйм). Это единственное число решает, останется ли ваш текст резким или превратится в кашу.

  <ul>
    <li><strong>72–96 DPI</strong> — только для экрана. Годится для миниатюры или быстрого предпросмотра, слишком мягко для всего, где есть мелкий текст.</li>
    <li><strong>150 DPI</strong> — золотая середина для шеринга на экранах. Текст читается чётко на телефоне или мониторе, а файл остаётся лёгким.</li>
    <li><strong>300 DPI</strong> — качество печати. Используйте, если изображение будут печатать или приближать. Файлы становятся крупнее, но текст и тонкие линии остаются резкими.</li>
  </ul>

  <blockquote class="callout">Если ваш JPG выглядит размытым — почти наверняка вы экспортировали со слишком низким DPI. Переэкспортируйте на 150 для экранов или 300 для печати — резкость изображению низкого разрешения постфактум не вернуть.</blockquote>

  Многостраничный PDF превращается в один JPG на страницу. Решите заранее, нужны ли вам все страницы или только одна — экспортировать 40-страничный отчёт в 40 изображений, когда нужна была лишь страница 3, — самая частая трата времени здесь. Большинство инструментов позволяют задать диапазон страниц перед конвертацией.

  <h2>JPG или PNG? Это важнее, чем кажется</h2>

  JPG и PNG сжимают по-разному, и для документов разница видна. JPG использует сжатие с потерями, прекрасное для фотографий, но создающее слабые «ореолы» вокруг резкого чёрного текста на белом — а именно из такого содержимого состоит большинство документов. PNG работает без потерь и держит края текста идеально чёткими.

  <figure><img src="/static/blog/images/tool-pdf-to-jpg-options.jpg" alt="Опции вывода PDF в JPG, включая диапазон страниц и разрешение" width="1280" height="800" loading="lazy"></figure>

  Практическое правило: если страница в основном текст или штриховая графика (договоры, счета, схемы) — предпочитайте PNG. Если это в основном фотография или насыщенная графика — JPG даёт намного меньший файл без видимых потерь. Когда инструмент выдаёт только JPG, поднимите DPI на ступеньку, чтобы компенсировать ореолы вокруг текста.

  <h2>JPG обратно в PDF: сохраните порядок</h2>

  Пересборка PDF из изображений — место, где всё тихо ломается. Ловушка — сортировка по имени файла. Если ваши фото названы <code>IMG_2, IMG_10, IMG_1</code>, многие инструменты сортируют их по алфавиту, и <code>IMG_10</code> оказывается раньше <code>IMG_2</code>. Ваши страницы перемешиваются.

  <figure><img src="/static/blog/images/tool-jpg-to-pdf-hero.jpg" alt="Инструмент Convertica JPG (Джипег) в PDF для объединения нескольких изображений в один документ" width="1280" height="800" loading="lazy"></figure>

  Чтобы <a href="/ru/jpg-to-pdf/">объединить изображения в один PDF</a> без сюрпризов:

  <ol>
    <li>Загрузите все изображения разом, а не по одному.</li>
    <li>Проверьте порядок в превью перед экспортом. Перетащите миниатюры, чтобы поправить те, что встали не в той последовательности.</li>
    <li>Задайте единый размер страницы, если изображения разнятся — иначе портретный скан и альбомное фото дадут несовпадающие страницы.</li>
    <li>Экспортируйте, затем один раз прокрутите результат, чтобы убедиться, что последовательность читается правильно.</li>
  </ol>

  Это быстрый способ превратить стопку чеков, многостраничный договор, который вы сфотографировали, или домашку ребёнка в единый файл, который учитель или бухгалтер реально сможет открыть.

  <h2>Типичные сценарии</h2>

  <h3>Выложить одну страницу PDF на маркетплейс или в соцсеть</h3>
  <p>Объявления и соцплатформы отвергают PDF, но принимают изображения. Экспортируйте нужную страницу на 150 DPI как JPG, и она загрузится как любое фото. Для листовки с обилием текста используйте PNG, чтобы мелкий шрифт оставался разборчивым, когда кто-то приближает.</p>

  <h3>Превратить фото документа с телефона в PDF</h3>
  <p>Сфотографируйте каждую страницу при ровном свете, загрузите их вместе, поправьте порядок в превью и экспортируйте. Если фото большие, итоговый PDF может оказаться тяжёлым — <a href="/ru/pdf-organize/compress/">сожмите PDF</a> после, чтобы он стал удобным для почты.</p>

  <h3>Отправить скан через приложение, которое принимает только изображения</h3>
  <p>Некоторые чаты и формы загрузки принимают JPG, но не PDF. Конвертируйте каждую страницу в JPG на 150 DPI и отправьте изображения, либо пересоберите позже, если получателю нужен единый документ.</p>

  <h2>Советы по качеству и размеру файла</h2>

  <ul>
    <li>Цепочка PDF → JPG → PDF каждый раз пересжимает содержимое. Не гоняйте файл по кругу многократно; держите исходный PDF и экспортируйте из него изображения по мере надобности.</li>
    <li>Фото прямо с телефона часто шириной 4000 пикселей — куда больше, чем нужно документу. Конвертация их сначала в PDF, а затем сжатие обычно резко уменьшают файл без видимых потерь.</li>
    <li>Если вы пересобрали PDF из сканов и теперь нужно искать или копировать текст, прогоните его через OCR — изображения текста не ищутся, пока вы этого не сделаете.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>Как конвертировать PDF в JPG без потери качества?</h3>
  <p>Экспортируйте на 300 DPI для печати или 150 DPI для экранов. Потеря качества при конвертации PDF в JPG идёт от выбора слишком низкого разрешения, а не от самой конвертации. Для страниц с обилием текста PNG сохраняет края лучше, чем JPG.</p>

  <h3>Что лучше для документов — JPG или PNG?</h3>
  <p>PNG для текста и штриховой графики, потому что его сжатие без потерь держит края резкими. JPG для фотографий, потому что он даёт намного меньшие файлы без видимых потерь на изображениях с плавными тонами.</p>

  <h3>Как объединить несколько JPG в один PDF в правильном порядке?</h3>
  <p>Загрузите все изображения вместе, затем проверьте и перетащите миниатюры в превью перед экспортом. Не полагайтесь на порядок по имени файла — алфавитная сортировка ставит IMG_10 перед IMG_2 и путает страницы.</p>

  <h3>Почему мой PDF огромный после того, как я сделал его из фото?</h3>
  <p>Фото с телефона очень высокого разрешения, так что PDF, собранный из них, наследует этот размер. Сожмите готовый PDF или уменьшите изображения перед конвертацией, если вам не нужно разрешение для печати.</p>

  <h3>Можно ли конвертировать только одну страницу PDF в изображение?</h3>
  <p>Да. Задайте диапазон страниц перед конвертацией, чтобы получить только нужную страницу, а не по одному изображению на каждую страницу всего документа.</p>

  <h2>Попробуйте сейчас</h2>

  <p>Уходите в изображения? Откройте <a href="/ru/pdf-to-jpg/">инструмент PDF в JPG</a>. Возвращаетесь к документу? Используйте <a href="/ru/jpg-to-pdf/">JPG в PDF</a>, чтобы объединить всё по порядку — или загляните в <a href="/ru/all-tools/">все инструменты PDF</a> для остальной части рабочего процесса.</p>
