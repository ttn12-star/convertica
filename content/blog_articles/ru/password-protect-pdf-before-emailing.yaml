content_ru: |
  Зашифровать PDF — около 30 секунд. Передать пароль так, чтобы не уничтожить шифрование на ровном месте — две минуты подумать, и именно на этом большинство и спотыкается. Положить пароль в то же письмо, что и вложение, — это кибербезопасный аналог того, чтобы запереть входную дверь и приклеить ключ скотчем к ручке.

  В этой статье — обе половины: как реально зашифровать файл и как доставить пароль получателю каналом, до которого почта не дотянется.

  <figure><img src="/static/blog/images/tool-protect.jpg" alt="Инструмент Convertica для защиты PDF (Пдф) паролем с шифрованием AES-256" width="1280" height="800" loading="lazy"></figure>

  <h2>Почему почтовым вложениям нужна дополнительная защита</h2>

  Почта между провайдерами шифруется при передаче (TLS), но не end-to-end. Это значит:

  <ul>
    <li>Ваш почтовый провайдер видит содержимое.</li>
    <li>Почтовый провайдер получателя видит содержимое.</li>
    <li>Если письмо пересылают, архивируют или индексируют, копии оседают там, где вы их не контролируете.</li>
    <li>Общие ящики (info@, accounts@) часто читает гораздо больше людей, чем думает отправитель.</li>
    <li>Почтовые бэкапы в регулируемых отраслях могут жить семь и больше лет — даже после того, как исходное письмо удалено из ящика.</li>
    <li>Повестка, внутреннее расследование или legal hold могут вытащить письмо из этих бэкапов спустя годы.</li>
  </ul>

  Из этого не следует, что почта небезопасна для повседневной переписки. Из этого следует, что договор, расчётный листок, медкарта или подписанное соглашение заслуживают слоя защиты, который переживает пересылку и архивацию. Шифрование PDF — это ровно такой слой.

  <h2>Пошагово: зашифровать ваш Пдф</h2>

  <figure><img src="/static/blog/images/tool-protect.jpg" alt="Установка надёжного пароля и уровня шифрования AES-256 для PDF" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Откройте инструмент <a href="/ru/pdf-security/protect/">защиты PDF паролем</a> и загрузите файл. Оригинал на устройстве остаётся как был.</li>
    <li>Задайте надёжный пароль. Получателю нужна ровно эта строка — наберите аккуратно или вставьте из менеджера паролей, не печатайте дважды руками.</li>
    <li>Подтвердите уровень шифрования. Современные инструменты по умолчанию используют AES-256 — тот же стандарт, что у банков и госведомств. Старые RC4 и AES-128 ещё существуют ради совместимости, но их стоит избегать, если только получатель не сидит на древнем софте (Acrobat 8 и старше, встроенные читалки в старых промышленных системах).</li>
    <li>Скачайте зашифрованный файл. Откройте его сами с тем же паролем, чтобы убедиться, что всё работает, и только потом прикрепляйте к письму.</li>
  </ol>

  <blockquote class="callout">Проверяйте перед отправкой. Откройте зашифрованный файл паролем сами, в той читалке, которой скорее всего пользуется получатель. Удивительно много жалоб «шифрование не работает» оборачиваются опечаткой в пароле, замеченной только после того, как письмо уже улетело.</blockquote>

  Нюанс, на который стоит обратить внимание: если вы копируете пароль из менеджера, а тот добавляет хвостовой пробел или заменяет кавычки на типографские, обычная попытка ввода у получателя не совпадёт. Срезайте пробелы и заменяйте «фигурные» кавычки (' ' " ") на прямые ASCII (' ") до того, как сохраните пароль в менеджере. Это «тихий» сценарий примерно у половины тикетов «шифрование сломалось», которые я видел у коллег.

  Если документ — черновик или содержит грифы конфиденциальности, можно ещё <a href="/ru/pdf-edit/add-watermark/">добавить водяной знак «Конфиденциально»</a>, чтобы любой, кто всё-таки получит доступ, сразу видел: контент с ограничением.

  <h2>Как безопасно передать пароль</h2>

  Это та половина процесса, которую обычно пропускают, и именно она определяет, защищает ли ваше шифрование вообще что-то.

  <h3>Используйте другой канал</h3>

  Правило простое: пароль должен идти маршрутом, который не имеет ничего общего с почтой. Хорошие варианты:

  <ul>
    <li><strong>SMS или мессенджер.</strong> Отправьте пароль СМС или через end-to-end-мессенджер вроде Signal или WhatsApp. Номер телефона — это другая идентичность, отдельная от почты.</li>
    <li><strong>Ссылка на шаринг из менеджера паролей.</strong> 1Password, Bitwarden и Dashlane умеют «поделиться элементом» через ссылку, которая истекает после одного просмотра или по таймеру.</li>
    <li><strong>Голосом — лично или по телефону.</strong> Старомодно, но надёжно. Хорошо для важных документов людям, которым можно позвонить.</li>
    <li><strong>Сервисы одноразовых секретов.</strong> Bitwarden Send и сервисы one-time-secret генерируют ссылку, которая самоуничтожается после одного открытия.</li>
    <li><strong>Внеканальный тикетинг.</strong> Если у обеих сторон общий service desk (Jira Service Desk, Zendesk), пароль может пойти приватным комментарием, отдельным от почтового треда.</li>
  </ul>

  Плохие варианты, которые выглядят приемлемо, но таковыми не являются:

  <ul>
    <li><strong>«Пароль будет в следующем письме».</strong> Тот же ящик, тот же аудит-след, те же пересыльщики. Шифрование превращается в «лежачего полицейского».</li>
    <li><strong>Пароль в теме письма.</strong> Та же проблема, ещё и на виду.</li>
    <li><strong>Угадываемые шаблоны («пароль — фамилия получателя»).</strong> Тому, кто может угадать, пароль уже не нужен.</li>
    <li><strong>iMessage между смешанными iPhone и Android.</strong> Если получатель не на iMessage, сообщение откатится в обычное СМС, которое лежит у оператора в открытом виде.</li>
    <li><strong>Голосовая почта.</strong> Многие корпоративные системы хранят записи в ящиках, интегрированных с email, и могут их транскрибировать и индексировать.</li>
  </ul>

  <h3>Как выбрать пароль, который не сломают</h3>

  Шифрование PDF использует пароль для вывода ключа. Слабые пароли подбираются офлайн — стоит атакующему получить файл. Делайте сложно.

  <ul>
    <li><strong>Длина важнее «сложности».</strong> 16 случайных символов сильнее, чем 10 с пятью спецсимволами. «PurpleDolphinChairOcean42» сильнее, чем «P@55!».</li>
    <li><strong>Избегайте личных данных.</strong> Имя получателя, день рождения, компания и кличка собаки угадываются по LinkedIn за минуту.</li>
    <li><strong>Генерируйте, а не выдумывайте.</strong> Используйте генератор в менеджере паролей. Даже 4-словная diceware-фраза заметно безопаснее того, что вы придумаете сами.</li>
    <li><strong>Избегайте символов, которые автозаменяются.</strong> Некоторые клавиатуры (особенно мобильные) подменяют ASCII-знаки препинания на «умные» аналоги. Если делитесь между платформами — оставайтесь на буквах и цифрах.</li>
  </ul>

  Практический минимум для чувствительных материалов: 12 случайных алфавитно-цифровых символов или 4-словная diceware-фраза. И то, и другое даёт примерно 60-70 бит энтропии — этого достаточно, чтобы перебор AES-256 был непрактичным на любом железе, существующем в 2026 году.

  <h2>Open password vs permissions password</h2>

  Шифрование PDF поддерживает два разных пароля — и они делают разные вещи:

  <table>
    <thead>
      <tr>
        <th>Тип пароля</th>
        <th>Что делает</th>
        <th>Когда использовать</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Open / user password</td>
        <td>Нужен, чтобы вообще открыть документ. Без него файл — нечитаемый шифр-текст.</td>
        <td>Когда сам контент конфиденциален.</td>
      </tr>
      <tr>
        <td>Permissions / owner password</td>
        <td>Ограничивает действия читателя (печать, копирование текста, изменение). Документ открывается и без него.</td>
        <td>Для документов, которые можно читать, но нельзя редактировать или копировать (шаблоны форм, распространяемые отчёты).</td>
      </tr>
    </tbody>
  </table>

  Большинству задач «отправить конфиденциальный PDF по почте» нужен <strong>open password</strong>, потому что вы хотите, чтобы без ключа файл был нечитаем. Permissions-пароли полезны, но настойчивый получатель легко их обходит — некоторые PDF-инструменты (и большинство старых версий Mac Preview) вообще игнорируют permissions-флаги на документах без open-пароля.

  Ставьте оба, если задача требует обоих: open — чтобы контролировать доступ, permissions — чтобы ограничить, что может авторизованный получатель.

  <h2>Советы по почте вокруг шифрования</h2>

  Два практических момента, на которых часто ломаются:

  <ul>
    <li><strong>Шифруйте до сжатия.</strong> Если PDF ещё и слишком большой для почты, сначала <a href="/ru/pdf-organize/compress/">сожмите перед шифрованием</a>, а не наоборот. Некоторые компрессоры тихо переэкспортируют файл и срывают шифрование.</li>
    <li><strong>Скажите получателю, что файл зашифрован.</strong> Короткая строка в теле письма («Этот PDF защищён паролем. Пароль пришлю отдельным СМС через минуту.») предотвращает то, что файл сочтут битым или поместят в карантин.</li>
    <li><strong>Берегитесь ложных срабатываний спам-фильтров.</strong> Зашифрованные вложения не сканируются на вирусы, поэтому корпоративные фильтры иногда их помечают или карантинят. Предупредите получателя проверить «Спам», если письма нет за несколько минут, а на важных отправках — заранее предупредите ИТ.</li>
    <li><strong>Не отправляйте пароль самому себе «на всякий».</strong> Если ваш ящик взломают, файл в «Отправленных» и пароль во «Входящих» становятся доступны одновременно. Храните пароль только в менеджере паролей.</li>
  </ul>

  <h2>Что делать, если забыли пароль</h2>

  Храните оригинал без шифрования в надёжном месте. Шифрование симметричное: если потеряли пароль, файл фактически не восстановить легитимным путём. Перебор AES-256 на нормальном горизонте времени нереалистичен — стандартная шутка «дождитесь тепловой смерти Солнца».

  Если вы — владелец документа, потеряли пароль, но оригинал есть — перешифруйте новым паролем и замените файл. Если у вас только зашифрованная копия и вы реально владеете правами на неё, есть инструменты <a href="/ru/pdf-security/unlock/">снять защиту с собственного PDF</a>, которые могут попробовать убрать слабые ограничения, но сильный AES-256 они не подберут. (Для слабых ограничений — «только permissions» в PDF из экспортов 2003 года — снятие тривиально. Для настоящего AES-256 с длинным паролем — забудьте.)

  <h2>FAQ</h2>

  <h3>AES-256 достаточно надёжен для юридических документов?</h3>
  <p>Да. AES-256 одобрен Агентством национальной безопасности США для материалов высшего уровня секретности и используется банками, госструктурами и крупными облачными провайдерами. Слабым звеном защиты PDF почти всегда оказывается пароль, а не сам алгоритм.</p>

  <h3>Можно ли отправить пароль тем же письмом, если потом удалить его?</h3>
  <p>Нет. Почта реплицируется по серверам, бэкапится, архивируется и пересылается. «Удалить после отправки» удаляет только локальную копию — на десятках других мест, где живёт сообщение, оно остаётся. Используйте отдельный канал.</p>

  <h3>Что если получатель забыл пароль?</h3>
  <p>Перешлите пароль ему по защищённому каналу. Если он потерял и файл, и пароль — перешифруйте свой оригинал новым паролем и отправьте заново. Никаких кодов восстановления или мастер-ключей у защищённого паролем PDF нет.</p>

  <h3>Шифрование меняет размер Пдф?</h3>
  <p>Чуть-чуть. Шифрование добавляет несколько сотен байт метаданных «рукопожатия». Сам контент шифруется на месте, поэтому PDF на 5 МБ становится примерно 5.001 МБ. Этого недостаточно, чтобы пробить почтовый лимит.</p>

  <h3>Получатель сможет снять пароль после открытия?</h3>
  <p>Да. Когда у него есть пароль, он может снять шифрование любым обычным PDF-инструментом. Если нужна устойчивая защита, переживающая действия получателя, одно шифрование не ответ. Сочетайте с водяными знаками и понятной политикой доступа, а для дорогостоящего распространения посмотрите DRM-инструменты.</p>

  <h2>Попробуйте сейчас</h2>

  <p>Сначала заприте файл, потом отдайте ключ через другую дверь. Откройте <a href="/ru/pdf-security/protect/">инструмент защиты PDF</a>, зашифруйте документ — а затем закиньте пароль в Signal, СМС или ссылку из менеджера паролей до того, как нажмёте «отправить».</p>
