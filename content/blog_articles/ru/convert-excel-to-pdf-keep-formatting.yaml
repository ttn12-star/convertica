excerpt_ru: "Большинство гайдов по Excel-в-PDF пропускают самое важное: настройку области печати, чтобы таблица не превратилась в восемь корявых полупустых страниц."
content_ru: |
  Почти каждый получал такое письмо: книга на 12 вкладок, конвертированная в PDF напрямую, со строками, размазанными по девяти страницам, обрезанными колонками и заголовком, который виден только на первой. Решение — не «конвертер получше». Решение — двадцать секунд настройки внутри Excel до того, как нажать «экспорт».

  Этот гайд — про шаги настройки, которые отделяют чистый, годный к печати PDF от табличной катастрофы, плюс простой воркфлоу «загрузил-получил», когда файл уже сконфигурирован правильно.

  <h2>Почему Эксель-в-Пдф часто идёт не так</h2>
  <p>Excel не воспринимает таблицу как «документ» в том же смысле, что Word. Тут нет фиксированной страницы. Сетка по сути бесконечна, а PDF-экспорт вынужден решать, где её резать. По умолчанию решения принимаются так себе:</p>
  <ul>
    <li>Область печати по умолчанию — это весь использованный диапазон, включая одинокую ячейку в столбце AZ, в которую вы что-то вписали и забыли.</li>
    <li>Автоматические разрывы страниц падают там, где «по математике» — это редко совпадает с логическими блоками строк.</li>
    <li>Заголовочные строки не повторяются, пока вы это явно не настроите. Со второй страницы документ выглядит как табличный дамп без заголовка.</li>
    <li>Скрытые столбцы всё равно печатаются, если их не спрятать правильно — поведение зависит от версии Excel.</li>
  </ul>
  <p>В итоге PDF выходит совсем не похожим на ту аккуратно скомпонованную таблицу, что вы видели на экране.</p>

  <h2>Подготовка Excel перед конвертацией</h2>
  <p>Потратьте две минуты на эти четыре настройки — и сама конвертация становится тривиальной.</p>

  <h3>1. Задайте область печати</h3>
  <p>Выделите ровно тот диапазон, который должен попасть в PDF. В Excel: <code>Page Layout &gt; Print Area &gt; Set Print Area</code>. С этого момента в экспорт пойдёт только этот диапазон. Если справа болтается крошечный спарклайн или заметка, которые вам в печати не нужны, этот шаг их и уберёт.</p>

  <h3>2. Масштаб «по ширине одна страница»</h3>
  <p>Широкие таблицы — причина номер один жалоб «PDF расползся на 8 страниц». На вкладке Page Layout найдите блок Scale to Fit и поставьте <code>Width: 1 page</code>, <code>Height: Automatic</code>. В итоге в PDF все колонки помещаются по горизонтали, а данные стекают вниз на столько страниц, сколько нужно — именно так должны печататься таблицы.</p>
  <p>Если лист настолько широкий, что масштаб «в одну страницу» делает текст микроскопическим — это сигнал переключиться на альбомную ориентацию или разбить данные на два PDF с разными группами колонок.</p>

  <h3>3. Повторяйте заголовочные строки на каждой странице</h3>
  <p>Самый часто пропускаемый шаг. Откройте <code>Page Layout &gt; Print Titles</code> и в поле <code>Rows to repeat at top</code> кликните по строке 1 (или той, где у вас заголовок). Теперь каждая страница PDF начинается с одних и тех же подписей колонок. Читателю больше не придётся листать назад, чтобы вспомнить, что было в колонке F.</p>

  <h3>4. Скрывать или удалять ненужные колонки</h3>
  <p>Скройте колонки, которые могут пригодиться позже (правый клик по букве колонки, Hide). Удаляйте только то, в чём точно уверены, что это мусор. Скрытые колонки исключаются из области печати, если вы задаёте область печати после скрытия. Если задать область сначала, а потом скрыть колонки, поведение меняется от версии к версии — для надёжности заново задавайте область печати после любых hide/unhide.</p>

  <h2>Пошагово: конвертация в Convertica</h2>
  <p>Когда таблица настроена, сама конвертация — простая часть. Можно <a href="/ru/word-to-pdf/">конвертировать Excel в PDF</a> в три шага:</p>
  <ol>
    <li><strong>Загрузите .xlsx-файл.</strong> Перетащите его в зону загрузки. Старые .xls тоже работают.</li>
    <li><strong>Выберите ориентацию, если попросят.</strong> Книжная — для длинных узких данных; альбомная — для широких таблиц.</li>
    <li><strong>Скачайте PDF.</strong> Откройте его и убедитесь, что разрывы страниц легли там, где вы рассчитывали — и готово.</li>
  </ol>
  <blockquote class="callout">Если PDF всё равно выглядит не так, проблема почти всегда выше по течению, в Excel — область печати, масштаб или повторяющиеся строки, а не в конвертере. Откройте книгу, исправьте настройку и переэкспортируйте.</blockquote>

  <h2>Книги с несколькими листами</h2>
  <p>Книга с пятью вкладками поднимает вопрос: вам нужен один PDF на лист — или все пять листов склеены в один файл?</p>
  <ul>
    <li><strong>Один PDF на лист</strong> — правильно, когда каждая вкладка самодостаточна, как отдельный отчёт для разных аудиторий. Тут важно именование: <code>YYYY-MM-DD_workbook_sheet-name.pdf</code> аккуратно читается в любой папке.</li>
    <li><strong>Все листы в одном PDF</strong> — правильно, когда вкладки — это одно целое (обложка, summary, детализация, приложение). Если конвертер выдаёт каждый лист отдельно, вторым шагом можно <a href="/ru/pdf-organize/merge/">объединить листы в один PDF</a>.</li>
  </ul>
  <p>В любом случае задайте область печати на каждом листе, который собираетесь экспортировать. Пустая вкладка экспортируется как пустая страница; вкладка с одинокой ячейкой в столбце AZ — как почти пустая страница с этой ячейкой посередине.</p>

  <h2>Типичные проблемы форматирования и их решения</h2>
  <p>Если в итоговом PDF всё ещё проблемы, симптом обычно указывает на конкретную настройку Excel:</p>
  <table>
    <thead>
      <tr><th>Симптом</th><th>Скорее всего причина</th><th>Что сделать</th></tr>
    </thead>
    <tbody>
      <tr><td>Правая колонка обрезается</td><td>Не выставлен Scale to Fit на 1 страницу по ширине</td><td>Page Layout &gt; Width: 1 page</td></tr>
      <tr><td>Со страницы 2 нет заголовков</td><td>Не настроены Print Titles</td><td>Page Layout &gt; Print Titles &gt; Rows to repeat at top</td></tr>
      <tr><td>Случайные пустые страницы между данными</td><td>Лишняя ячейка или форматированная область за пределами видимых данных</td><td>Удалите лишнее и переустановите область печати</td></tr>
      <tr><td>Формулы показывают #REF! или #NAME?</td><td>Сломанные внешние ссылки</td><td>Copy &gt; Paste Values, чтобы зафиксировать значения перед экспортом</td></tr>
      <tr><td>Графики режутся между страницами</td><td>Автоматический разрыв страницы попадает по встроенному объекту</td><td>Поставьте ручной разрыв над графиком или переместите его</td></tr>
      <tr><td>Крошечный нечитаемый текст</td><td>Слишком агрессивный Scale to Fit</td><td>Перейдите в альбомную ориентацию или разбейте на два экспорта</td></tr>
    </tbody>
  </table>

  <h2>Когда оставить Excel, а когда отправить PDF</h2>
  <p>PDF — правильный формат, если файл «только для чтения»: коммерческие предложения, подписанные отчёты, налоговые декларации, материалы для совета директоров. PDF сохраняет вёрстку точно, защищает от случайных правок, его проще подписать или поставить водяной знак.</p>
  <p>Excel — правильный формат, если получателю нужно фильтровать, сортировать или пересчитывать. Отправлять PDF финансовой модели тому, кому надо поменять одно допущение — значит заставить его перенабивать всё с нуля. Если PDF уже ушёл и получателю нужны данные обратно, можно <a href="/ru/pdf-to-excel/">конвертировать PDF обратно в Excel</a>, но круговой обмен вносит мелкие ошибки и плохо заменяет «отправить правильный формат сразу».</p>
  <p>Полезное правило по умолчанию: PDF — для официального учёта; .xlsx — отдельным вложением, если получателю может понадобиться что-то поменять. PDF идёт в архив, .xlsx — это рабочий файл.</p>

  <h2>Ещё один проход: размер файла</h2>
  <p>Excel-в-PDF на выходе бывает удивительно тяжёлым, особенно с встроенными графиками и условным форматированием. Если вы собираетесь отправить результат по почте, прогоните его через компрессор перед отправкой, чтобы он не отскочил от лимита получателя. <a href="/ru/blog/compress-pdf-for-email-under-25mb/">Гайд по сжатию для почты</a> описывает реалистичные ориентиры по размеру, а <a href="/ru/pdf-organize/compress/">инструмент сжатия</a> делает саму работу.</p>

  <h2>FAQ</h2>
  <h3>Почему таблица Эксель криво режется по страницам Пдф?</h3>
  <p>Почти всегда — потому что область печати слишком широкая, а Scale to Fit не настроен. Откройте Page Layout, поставьте Width в 1 page и переэкспортируйте. Если результат стал нечитаемо мелким — переключитесь на альбомную ориентацию или разбейте данные на два PDF.</p>
  <h3>Можно ли конвертировать все листы книги сразу?</h3>
  <p>Да. Конвертер работает с многолистовыми книгами. По умолчанию он экспортирует каждый лист, где есть данные, в один общий PDF. Если хочется получить по одному PDF на лист, настройте область печати на каждом листе и запускайте конвертацию по одному разу для каждого, либо разбейте результат после.</p>
  <h3>Графики и формулы конвертируются корректно?</h3>
  <p>Графики идут как визуальные объекты — что вы видите в Excel, то и в PDF. Формулы при конвертации вычисляются до текущих значений. Сломанные ссылки (#REF!, #NAME?) останутся видны в PDF — лечите их в Excel заранее или зафиксируйте значения через paste-values.</p>
  <h3>Как сделать так, чтобы заголовки повторялись на каждой странице PDF?</h3>
  <p>В Excel: Page Layout &gt; Print Titles, кликните в поле «Rows to repeat at top» и выберите свою заголовочную строку (или строки). Сохраните и переэкспортируйте. Настройка задаётся для каждого листа отдельно — установите её на каждой вкладке, которую планируете конвертировать.</p>
  <h3>Почему PDF гораздо больше, чем сам Excel-файл?</h3>
  <p>PDF вшивает шрифты, растеризует графики и заводит отдельный объект-страницу на каждую страницу. Книга на 200 КБ может выдать PDF на 3 МБ — и в этом ничего ненормального нет. Если размер мешает отправке по почте — сожмите PDF после конвертации: данные и качество остаются, уменьшается только хранилище.</p>

  <h2>Попробуйте сейчас</h2>
  <p>Задайте область печати, настройте Scale to Fit, поставьте Print Titles — и экспортируйте. Две лишние минуты в Excel избавляют от позора с таблицей, размазанной по восьми страницам. <a href="/ru/word-to-pdf/">Открыть инструмент Excel в PDF →</a></p>
