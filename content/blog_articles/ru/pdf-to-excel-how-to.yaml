content_ru: |
  Поставщик присылает прайс-лист в PDF. Банк выгружает выписки в PDF. В почте лежит отчёт ровно с той таблицей, что вам нужна, запертой в документе, который нельзя редактировать. Вы выделяете таблицу, копируете, вставляете в Excel, и всё схлопывается в один столбец слипшегося текста. Правильная конвертация PDF возвращает эти строки и столбцы в настоящие ячейки. Разбираем, как это сделать и как справиться с файлами, которые сопротивляются.

  <h2>Почему копирование превращает таблицу в кашу</h2>

  <p>PDF на самом деле не хранит таблицу. Он хранит текст в фиксированных точках на странице плюс линии вокруг него, которые ваш глаз читает как сетку. Когда вы копируете, вы забираете текст в порядке чтения, но теряете сетку, поэтому столбцы перетекают друг в друга, а числа встают рядом с чужими подписями. Правильная конвертация работает иначе: она смотрит, где расположено каждое значение, восстанавливает столбцы и заново собирает настоящую таблицу, где каждое число попадает в свою ячейку.</p>

  <h2>Сначала проверьте, какой у вас PDF</h2>

  <p>Эта одна проверка решает всё, что будет дальше, так что десяти секунд она стоит. Откройте PDF и попробуйте выделить курсором одно число.</p>

  <ul>
    <li><strong>Если текст выделяется</strong>, у вас текстовый PDF. Данные это настоящий выделяемый текст, и конвертация выйдет чистой и точной.</li>
    <li><strong>Если ничего не выделяется и страница ведёт себя как картинка</strong>, у вас сканированный PDF. Таблица здесь это изображение, поэтому числа сначала нужно распознать с помощью OCR (оптического распознавания символов), и только потом они станут ячейками. Это тоже работает, просто добавляется шаг распознавания и внимательный взгляд на результат.</li>
  </ul>

  <h2>Конвертируйте PDF в Excel</h2>

  <figure><img src="/static/blog/images/tool-pdf-to-excel.jpg" alt="Конвертер Convertica из PDF в Excel: документ готов к конвертации" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Откройте конвертер <a href="/ru/pdf-to-excel/">PDF в Excel</a> и загрузите файл (до 25 МБ).</li>
    <li>Дайте ему обработать файл. Для текстового PDF это быстро. Для сканированного он сначала считывает текст, и это занимает чуть дольше.</li>
    <li>Скачайте файл XLSX и откройте его в Excel, Google Таблицах или LibreOffice Calc. Ваши строки и столбцы теперь редактируемые ячейки, которые можно сортировать, фильтровать и суммировать.</li>
  </ol>

  <p>Загруженные файлы удаляются с сервера через короткое время, а это важно, когда речь о банковской выписке или зарплатной ведомости.</p>

  <h2>Наводим порядок после конвертации</h2>

  <p>Даже хорошая конвертация иногда требует лёгкой правки, особенно на плотных или сканированных таблицах. Несколько быстрых приёмов закрывают почти всё:</p>

  <ul>
    <li><strong>Слипшиеся столбцы.</strong> Если два столбца оказались в одном, выделите его и через «Данные», затем «Текст по столбцам» разбейте их обратно по пробелу или запятой.</li>
    <li><strong>Числа, сохранённые как текст.</strong> Если столбец не суммируется, значит, Excel считает его текстом. Выделите его и через маленький значок предупреждения или «Данные», затем числовой формат, верните к настоящим числам.</li>
    <li><strong>Лишняя строка заголовка.</strong> На многостраничных таблицах могут пролезть повторяющиеся заголовки страниц. Удалите лишние строки, и готово.</li>
    <li><strong>Сканированные файлы.</strong> Сканированную конвертацию всегда проверяйте выборочно. OCR может принять смазанную 8 за 3, так что пробегитесь глазами по каждому столбцу, прежде чем доверять итогам.</li>
  </ul>

  <h2>XLSX или CSV: что выбрать?</h2>

  <p>XLSX это правильный вариант по умолчанию. Он сохраняет форматирование, несколько листов и всё специфичное для Excel, и именно его большинство и подразумевает под таблицей. К CSV стоит тянуться, только когда вы импортируете данные куда-то ещё: в бухгалтерскую программу, базу данных, веб-приложение, которое ждёт простой файл с разделителями-запятыми. CSV легче и понятен всем, но хранит только сырые значения, без форматирования и формул. Если вы сами открываете результат в Excel, оставайтесь на XLSX.</p>

  <h2>Живой пример: превращаем выписки в то, что можно суммировать</h2>

  <p>Допустим, вы ведёте учёт в небольшой фирме, и каждая выписка поставщика приходит в PDF. Перепечатывать их долго и чревато опечатками, а одна неверная цифра ломает всю сверку. Конвертация каждой выписки в Excel вместо этого даёт столбцы, которые можно суммировать, фильтровать по дате и вставлять прямо в вашу учётную таблицу. То, что было часом кропотливого набора, превращается в пару минут конвертации и быструю проверку. Если ваш процесс идёт и в обратную сторону, и таблицу нужно отправить как фиксированный документ, конвертер <a href="/ru/excel-to-pdf/">Excel в PDF</a> замыкает круг.</p>

  <h2>FAQ</h2>

  <h3>Переживут ли мои формулы конвертацию?</h3>
  <p>Нет, и это ожидаемо. PDF хранит только вычисленные значения, а не формулы за ними, так что обратно вы получаете числа в том виде, в каком они выглядели. Если нужны живые формулы, пересоберите их в Excel поверх сконвертированных данных, и это всё равно куда быстрее, чем перепечатывать всё вручную.</p>

  <h3>Можно ли конвертировать сканированный PDF в Excel?</h3>
  <p>Да. Конвертер считывает текст с помощью OCR и заново собирает таблицу из того, что распознал. Точность зависит от того, насколько чистый скан: чёткий и ровный скан конвертируется хорошо, а бледный или перекошенный требует больше проверки. Сканированный результат всегда просматривайте, прежде чем полагаться на цифры.</p>

  <h3>Что если в PDF несколько таблиц или много страниц?</h3>
  <p>Многостраничные таблицы конвертируются нормально и продолжаются по листу. Когда в документе несколько разных таблиц, просмотрите результат и разнесите их по отдельным листам или диапазонам, если хотите держать их порознь.</p>

  <h3>Есть ли ограничение на размер файла?</h3>
  <p>Один файл может быть до 25 МБ, чего хватает на большинство выписок и отчётов. Если сканированный PDF больше, сначала сожмите его: обычно это укладывает файл в лимит, не портя текст.</p>

  <h3>Нужно ли что-то устанавливать?</h3>
  <p>Нет. Конвертация идёт в браузере, так что скачивать и настраивать нечего. Вам нужен только PDF и та программа для таблиц, которой вы уже пользуетесь, чтобы открыть результат.</p>

  <h2>Попробуйте прямо сейчас</h2>

  <p>Если нужная таблица прямо сейчас застряла внутри PDF, загрузите его в конвертер <a href="/ru/pdf-to-excel/">PDF в Excel</a> и откройте таблицу, которая вернётся. А если когда-нибудь понадобится обратное, превратить готовый лист в аккуратный нередактируемый документ, <a href="/ru/excel-to-pdf/">Excel в PDF</a> справится с этой стороной так же быстро.</p>
