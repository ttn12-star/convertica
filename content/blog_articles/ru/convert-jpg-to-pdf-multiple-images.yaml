excerpt_ru: "Сфотографированный договор, стопка чеков, сканы, сохранённые картинками, — рано или поздно всем им нужно стать одним аккуратным PDF. Вот как сделать это бесплатно, в правильном порядке и с правильным качеством."
content_ru: |
  Телефоны превратили каждого в оператора сканера: тут сфотографированный договор, там три чека, плюс доска с последней встречи. Проблема — в доставке. Никто не хочет получать одиннадцать разрозненных JPG в почтовой переписке — все хотят один пдф: страницы по порядку, печатается корректно. Это руководство показывает, как получить ровно это — бесплатно и ничего не устанавливая.

  <h2>Конвертируйте один JPG — или склейте до 50 в единый PDF</h2>

  <figure><img src="/static/blog/images/tool-jpg-to-pdf-hero.jpg" alt="Экран загрузки конвертера JPG в PDF от Convertica" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Откройте конвертер <a href="/ru/jpg-to-pdf/">JPG в PDF</a> и добавьте изображения. Один файл даст одностраничный PDF; несколько файлов склеиваются в единый документ — по одному изображению на страницу, до 50 изображений за запрос.</li>
    <li><strong>Порядок важен:</strong> изображения становятся страницами в том порядке, в каком вы их добавили. Назовите файлы <em>01.jpg, 02.jpg, 03.jpg</em> перед выбором — и порядок страниц устроится сам.</li>
    <li>Подвиньте ползунок качества, если нужно (об этом ниже), и нажмите <strong>«Конвертировать»</strong>.</li>
    <li>Скачайте готовый PDF — без водяного знака и без регистрации.</li>
  </ol>

  <p>Каждое изображение размещается на странице A4, по центру и с аккуратными полями, так что результат выглядит документом, а не свалкой фотографий. Вертикальные и горизонтальные снимки вписываются автоматически — изображение масштабируется под страницу и никогда не обрезается.</p>

  <h2>Как выбрать правильное качество</h2>

  <figure><img src="/static/blog/images/tool-jpg-to-pdf-options.jpg" alt="Настройки качества в конвертере JPG в PDF" width="1280" height="800" loading="lazy"></figure>

  <p>Регулятор качества (60-95, по умолчанию 85) определяет, насколько сильно изображения пересжимаются внутри PDF:</p>

  <ul>
    <li><strong>85 (по умолчанию)</strong> — подходит почти для всего. Документы остаются читаемыми, фотографии чистыми, размер файла разумным.</li>
    <li><strong>90+</strong> — для фотографий, которые должны выдержать пристальный взгляд: портфолио, предметная съёмка, всё, что могут напечатать в крупном формате. На 90 и выше конвертер к тому же не пересжимает изображения, которые и так являются чистыми JPG, сохраняя исходные пиксели.</li>
    <li><strong>60-75</strong> — для результата, дружелюбного к почте, когда исходные фото огромные. Десять телефонных снимков по 12 МП легко превращаются в PDF на 30 MB при высоком качестве; сдвиг ползунка вниз это укрощает.</li>
  </ul>

  <p>Если PDF всё равно выходит слишком тяжёлым для лимита вложений, прогоните его потом через <a href="/ru/pdf-organize/compress/">«Сжать PDF»</a> — связка умеренного качества и сжатия загоняет большинство фото-PDF под типичные почтовые ограничения.</p>

  <h2>Для чего это используют на самом деле</h2>

  <ul>
    <li><strong>Отчёты о расходах.</strong> Месяц бумажных чеков, сфотографированных и склеенных в один PDF, подшивается куда лучше папки разрозненных картинок — и бухгалтерия скажет вам спасибо.</li>
    <li><strong>Сфотографированные документы.</strong> Договор или бланк, снятый телефоном страница за страницей, становится единым упорядоченным документом, готовым к печати.</li>
    <li><strong>Задания и заявки.</strong> Многие порталы принимают ровно один файл. Десять сфотографированных страниц, одно поле загрузки — вот решение.</li>
    <li><strong>Портфолио и мудборды.</strong> Подобранный набор изображений в фиксированном порядке, неуязвимый для мессенджеров, которые пересжимают и перетасовывают картинки.</li>
    <li><strong>Архив.</strong> PDF-страницы с датой в имени файла бьют фотоплёнку телефона, когда тот самый чек нужно найти два года спустя.</li>
  </ul>

  <h2>Как получить чистый результат из телефонных фото</h2>

  <ul>
    <li>Снимайте документы строго в лоб и заполняйте кадр — изображение кладётся на страницу как есть, так что перекошенное фото останется перекошенным.</li>
    <li>Ровный рассеянный свет лучше вспышки. Блик на глянцевой бумаге — самая частая причина, по которой сфотографированная страница нечитаема в печати.</li>
    <li>Обрежьте лишнее (края стола, пальцы) до конвертации; на странице должен быть документ, а не сцена вокруг него.</li>
    <li>Фото с iPhone в формате HEIC? Сначала конвертируйте их в JPG инструментом <a href="/ru/image/heic-to-jpg/">HEIC в JPG</a>, потом склеивайте.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>Это правда бесплатно? Есть водяной знак?</h3>
  <p>Конвертация JPG в PDF бесплатна, без водяного знака и без регистрации. На бесплатном тарифе действуют лимиты на размер каждого изображения; премиум их повышает.</p>

  <h3>Сколько изображений можно склеить за раз?</h3>
  <p>До 50 изображений за запрос, каждое становится одной страницей итогового PDF. Нужно больше? Разбейте партию на части и объедините получившиеся PDF инструментом <a href="/ru/pdf-organize/merge/">«Объединить PDF»</a>.</p>

  <h3>Можно ли изменить порядок страниц после загрузки?</h3>
  <p>Страницы следуют порядку добавления изображений. Надёжная привычка — пронумеровать имена файлов до их выбора. Если готовый PDF нужно перетасовать, инструмент <a href="/ru/pdf-organize/organize/">«Организовать PDF»</a> переставляет страницы перетаскиванием.</p>

  <h3>Работает ли с PNG и другими форматами?</h3>
  <p>Этот инструмент принимает JPG/JPEG. Для PNG, WebP и других форматов либо сначала конвертируйте их в JPG инструментом <a href="/ru/image/convert/">«Конвертировать изображение»</a>, либо — для одиночного изображения — конвертируйте его там сразу в PDF.</p>

  <h3>Будет ли текст в моём сфотографированном документе доступен для поиска?</h3>
  <p>Нет — PDF содержит картинки текста, а не текст. Если слова нужно искать, копировать или редактировать, прогоните результат через OCR-инструмент <a href="/ru/scanned-pdf-to-word/">«Сканированный PDF в Word»</a>, который распознаёт текст и возвращает редактируемый файл.</p>

  <h3>Мои данные в безопасности?</h3>
  <p>Файлы обрабатываются для конвертации и вскоре после неё удаляются плановой очисткой. Как и с любым онлайн-сервисом, перед загрузкой особо чувствительных материалов сверьтесь с политикой конфиденциальности.</p>

  <h2>Попробуйте прямо сейчас</h2>

  <p>Берите папку со сфотографированными страницами, пронумеруйте файлы и перетащите их в конвертер <a href="/ru/jpg-to-pdf/">JPG в PDF</a>. Через тридцать секунд у вас будет то, чего все на самом деле и хотели: один файл, страницы по порядку, готово к отправке.</p>
