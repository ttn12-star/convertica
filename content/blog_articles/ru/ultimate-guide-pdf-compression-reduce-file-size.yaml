meta_description_ru: "Как на самом деле работает сжатие PDF, насколько реально можно уменьшить файл и какой пресет выбрать для почты, печати или архива без потери качества."
meta_keywords_ru: "сжать pdf, сжать пдф, уменьшить размер pdf, уменьшить размер пдф, сжатие pdf, сжатие пдф, оптимизация pdf, уменьшить вес pdf, сжать отсканированный pdf"
excerpt_ru: "Отчёт на 40 МБ и скан на 40 МБ сжимаются совершенно по-разному. Вот что на самом деле съедает байты, как работает даунсемплинг и какой пресет подходит для каждой задачи."
content_ru: |
  Два PDF, которые в файловом менеджере оба показывают «40 МБ», могут быть совершенно разными задачами. Один — текстовый отчёт, выгруженный из Word, который за один проход упадёт до 3 МБ. Другой — стопка цветных сканов на 600 DPI, которые удаётся ужать лишь до 28 МБ, и при этом они начинают выглядеть хуже. «Сжать PDF» — это одна кнопка, но то, что происходит за ней, целиком зависит от содержимого файла.

  В этой статье разбираем, как сжатие PDF работает на самом деле, что реально уменьшается, а что нет, и как подобрать правильную настройку под задачу вместо того, чтобы гадать. В примерах используем <a href="/ru/pdf-organize/compress/">бесплатный компрессор PDF от Convertica</a>, но логика применима к любому честному инструменту.

  <figure><img src="/static/blog/images/tool-compress-hero.jpg" alt="Компрессор PDF (Пдф) Convertica с загруженным файлом и выбором пресета сжатия" width="1280" height="800" loading="lazy"></figure>

  <h2>Где на самом деле находятся байты</h2>

  Прежде чем уменьшать PDF, полезно понимать, что именно занимает место. PDF — это контейнер, и вес редко распределён равномерно:

  <ul>
    <li><strong>Изображения доминируют почти в любом тяжёлом файле.</strong> Одна полностраничная цветная фотография на 300 DPI весит около 2-4 МБ сама по себе. Отсканированный документ — это <em>только</em> изображения, по одному на страницу, поэтому сканы так быстро раздуваются.</li>
    <li><strong>Текст крошечный.</strong> Сами символы и вёрстка 50-страничного отчёта в сумме дают пару сотен килобайт. Настоящий текст — самое дешёвое, что есть в PDF.</li>
    <li><strong>Встроенные шрифты накапливаются.</strong> Несколько subset-шрифтов — не страшно, но полное семейство шрифтов со всеми глифами тихо добавит мегабайт-другой.</li>
    <li><strong>Невидимый балласт.</strong> История правок от многократных «Сохранить» в Acrobat, неиспользуемые объекты, раздутые цветовые профили и встроенные файлы (да, PDF может нести внутри таблицу) — всё это едет с файлом незаметно.</li>
  </ul>

  Самая полезная привычка перед сжатием: откройте файл и попробуйте выделить текст на первой странице. Если слова выделяются буква за буквой — перед вами «цифровой» PDF, и вес в нём, скорее всего, в шрифтах, встроенных изображениях или балласте. Если вся страница выделяется одним прямоугольником — это скан, и вес там в изображениях, и точка. Этот один тест предсказывает почти всё о том, сколько вы сэкономите.

  <h2>Как сжатие PDF работает на самом деле</h2>

  В игре участвуют два принципиально разных механизма, и хорошие инструменты используют оба. Понимание этого разделения отделяет «почему ничего не произошло?» от «почему мой скан теперь мутный?».

  <h3>Сжатие без потерь (бесплатное качество)</h3>

  Часть экономии не стоит вам ничего. Компрессор может переписать структуру файла, не тронув ни одного видимого пикселя:

  <ul>
    <li>Deflate-сжатие (как в zip) текста и потоков содержимого, плотно упаковывающее повторяющиеся данные.</li>
    <li>Удаление неиспользуемых объектов, осиротевших страниц и устаревшей истории правок.</li>
    <li>Subset-сжатие шрифтов: встраиваются только реально используемые глифы.</li>
    <li>Дедупликация одинаковых изображений, встречающихся на нескольких страницах (например, логотип в колонтитуле).</li>
  </ul>

  Для «цифрового» текстового PDF одного сжатия без потерь часто хватает на большую часть работы. Ничего не деградирует — файл просто упакован умнее.

  <h3>Сжатие с потерями: даунсемплинг изображений (где уходит качество)</h3>

  Крупные сокращения идут от изображений, и они по своей природе с потерями. Происходят две вещи:

  <ul>
    <li><strong>Даунсемплинг</strong> снижает разрешение. Скан на 600 DPI, уменьшенный до 150 DPI, сохраняет четверть пикселей по каждой стороне, то есть примерно одну шестнадцатую данных. Отсюда и берутся резкие падения размера.</li>
    <li><strong>Перекодирование</strong> заново сжимает каждое изображение в JPEG на выбранном уровне качества, отбрасывая мелкие детали, которые глаз почти не замечает.</li>
  </ul>

  Вот почему текстовые и насыщенные изображениями PDF ведут себя так по-разному. В векторном тексте нет разрешения, которое можно выбросить, поэтому уже компактный текстовый PDF просто не сожмётся сильно. Скан же — это сплошное «выбрасываемое» разрешение, и именно поэтому он так хорошо сжимается и при этом именно он может стать мутным.

  <blockquote class="callout">Главная мысль: сжатие без потерь всегда безопасно и обычно скромно по эффекту. Большие цифры дают даунсемплинг изображений — и это единственный шаг, который может заметно стоить вам качества.</blockquote>

  <h2>Пресеты сжатия простыми словами</h2>

  Большинство инструментов, включая Convertica, прячут математику за несколькими пресетами. Вот что они делают на самом деле под капотом.

  <figure><img src="/static/blog/images/tool-compress-options.jpg" alt="Выбор пресета сжатия: варианты «низкий», «средний» и «высокий» в инструменте Convertica" width="1280" height="800" loading="lazy"></figure>

  <ul>
    <li><strong>Низкий.</strong> Сжатие без потерь плюс лёгкое перекодирование изображений почти без даунсемплинга. Лучшее качество, наименьшая экономия. Используйте, когда резкость критична.</li>
    <li><strong>Средний (разумный выбор по умолчанию).</strong> Даунсемплинг изображений примерно до 150 DPI и перекодирование на сбалансированном уровне JPEG. Незаметно на экране, чисто печатается на A4 и подходит для большинства реальных файлов.</li>
    <li><strong>Высокий.</strong> Даунсемплинг жёстче (около 96-120 DPI) и более агрессивное сжатие изображений. Отлично подходит, чтобы уложиться в упрямый лимит, когда получатель только читает с экрана и никогда не печатает.</li>
  </ul>

  Средний — правильная стартовая точка примерно в девяти случаях из десяти. К низкому стоит тянуться, только когда диаграммы или фотографии должны остаться чёткими, а к высокому — только когда вы воюете с жёстким лимитом размера и единственная цель — чтение с экрана.

  <h2>Какая настройка для какой задачи</h2>

  Подбирайте пресет под то, для чего документ реально нужен, а не под то, насколько маленьким вы технически можете его сделать.

  <table>
    <thead>
      <tr><th>Цель по качеству / сценарий</th><th>Рекомендуемый пресет</th><th>Почему</th></tr>
    </thead>
    <tbody>
      <tr><td>Чтение с экрана, отправка черновика</td><td>Средний или высокий</td><td>Экранное разрешение прощает многое; даунсемплинг незаметен.</td></tr>
      <tr><td>Отправка по почте под лимит 20-25 МБ</td><td>Сначала средний, потом высокий</td><td>Средний справляется с большинством файлов; повышайте, только если не хватило.</td></tr>
      <tr><td>Офисная печать на A4 / Letter</td><td>Средний</td><td>150 DPI чисто печатается на обычном лазерном принтере.</td></tr>
      <tr><td>Фотографии, диаграммы, дизайн-пруфы</td><td>Низкий</td><td>Сохраняет мелкие детали и градиенты, которые губит агрессивный JPEG.</td></tr>
      <tr><td>Профессиональная / широкоформатная печать</td><td>Низкий или оригинал</td><td>Типографиям нужно 300 DPI; даунсемплинг виден на большом размере.</td></tr>
      <tr><td>Юридические приложения, подписанные договоры</td><td>Не сжимать</td><td>Целостность файла важнее размера; перекодирование можно оспорить.</td></tr>
      <tr><td>Долгосрочный архив (PDF/A)</td><td>Низкий или без сжатия</td><td>Архивы призваны сохранять точность, а не экономить место.</td></tr>
    </tbody>
  </table>

  <h2>Насколько реально можно уменьшить?</h2>

  Здесь и рассыпаются большинство обещаний вроде «меньше на 99%!». Сжатие может выбросить только то, что избыточно, поэтому реальный диапазон целиком зависит от содержимого. Честные цифры:

  <table>
    <thead>
      <tr><th>Тип документа</th><th>Типичное сокращение</th><th>Пример</th></tr>
    </thead>
    <tbody>
      <tr><td>Только текст (выгрузка из Word, веба)</td><td>70-95%</td><td>40 МБ → 2-12 МБ</td></tr>
      <tr><td>Смешанный текст + фото</td><td>40-70%</td><td>30 МБ → 9-18 МБ</td></tr>
      <tr><td>Чистый скан (каждая страница — изображение)</td><td>30-60%</td><td>50 МБ → 20-35 МБ</td></tr>
      <tr><td>Уже сжатый PDF</td><td>0-15%</td><td>Вы у предела; лучше разделить</td></tr>
    </tbody>
  </table>

  Из этой таблицы следуют две вещи. Во-первых, если файл почти не уменьшился — он не сломан, а, вероятно, уже был оптимизирован, и убирать просто нечего. Во-вторых, у чистого скана есть предел: ни один пресет не уложит скан на 50 МБ под 10 МБ без видимого ущерба, потому что данные — это <em>и есть</em> картинка. Когда вы упёрлись в эту стену, перестаньте сжимать и смените тактику.

  <h2>Когда сжатие — не ответ</h2>

  Сжатие — один из инструментов, а не единственный. Две частые ситуации требуют другого хода:

  <ul>
    <li><strong>Файл должен остаться в полном качестве, но превышает лимит.</strong> Не ухудшайте его — <a href="/ru/pdf-organize/split/">разделите PDF на части</a> по диапазону страниц и отправьте или загрузите их по отдельности. Так каждый пиксель остаётся нетронутым, что важно для дизайн-пруфов, приложений к делу и всего, что будет придирчиво изучать регулятор. Разобранный пример — в нашем руководстве по <a href="/ru/blog/split-bank-statement-pdf-by-page/">разделению PDF с банковской выпиской по страницам</a>.</li>
    <li><strong>Вы объединяете много мелких PDF, и проблема в суммарном объёме.</strong> Иногда правильный порядок — сначала <a href="/ru/pdf-organize/merge/">объединить файлы в один PDF</a>, а затем один раз сжать готовый документ, чтобы общие ресурсы вроде шрифтов дедуплицировались по всему набору. Эту схему показываем в материале об <a href="/ru/blog/merge-invoices-into-one-pdf-for-accounting/">объединении счетов в один PDF для бухгалтерии</a>.</li>
  </ul>

  А если вся причина сжатия — письмо, которое отбивается по размеру, то отдельная инструкция (реальные лимиты провайдеров, надбавка base64, когда отправлять ссылку из облака) лежит в статье <a href="/ru/blog/compress-pdf-for-email-under-25mb/">как сжать PDF для почты до 25 МБ</a>.

  <h2>Повторяемый рабочий процесс</h2>

  Если собрать всё вместе, быстрый путь выглядит так:

  <ol>
    <li>Проведите тест на выделение текста, чтобы понять, перед вами «цифровой» файл или скан.</li>
    <li>Сначала пробуйте средний. Для большинства файлов на этом всё.</li>
    <li>Если всё ещё велик и это скан — примите, что вы у предела: разделите его или заново прогоните через OCR и переэкспортируйте в текстовый PDF, а не загоняйте качество в пол.</li>
    <li>Если всё ещё велик и это «цифровой» файл — проверьте встроенные файлы и балласт истории правок, прежде чем решить, что пресет не справился.</li>
    <li>Всегда сохраняйте оригинал. Сжатие необратимо для выброшенных деталей, а полноразмерная копия может понадобиться позже.</li>
  </ol>

  <h2>Частые вопросы</h2>

  <h3>Почему мой PDF почти не уменьшился?</h3>
  <p>Скорее всего, он уже был оптимизирован или это «цифровой» текстовый PDF, в котором почти нет изображений для даунсемплинга. Сжатие убирает избыточность; если её не осталось, экономить нечего. Заодно проверьте панель вложений — вдруг размер раздувает встроенный файл.</p>

  <h3>Теряет ли PDF в качестве при сжатии?</h3>
  <p>Пострадать может только часть с изображениями. Текст и векторная графика переупаковываются без потерь и остаются попиксельно точными. Изображения подвергаются даунсемплингу и перекодированию — это незаметно на «среднем» для экрана и офиса и начинает проявляться на «высоком» на фотографиях и детальных диаграммах.</p>

  <h3>Можно ли сжать один и тот же PDF дважды, чтобы он стал ещё меньше?</h3>
  <p>Редко того стоит. Первый проход уже убрал избыточность; второй в основном перекодирует уже ухудшенные изображения, добавляя артефакты почти без выигрыша в размере. Если одного прохода мало — лучше разделите файл или заново прогоните скан через OCR.</p>

  <h3>Почему отсканированный PDF всё ещё огромен после сжатия?</h3>
  <p>Скан — это чистые данные изображений, поэтому у него жёсткий предел (примерно 30-60% сокращения). Чтобы пойти дальше, прогоните OCR, чтобы превратить страницы в настоящий текст, и переэкспортируйте в текстовый PDF, а затем сожмите его. Скан на 50 МБ так может упасть до 1-2 МБ, но рукописный текст и подписи не сохранятся — берегите оригинал.</p>

  <h3>Безопасно ли онлайн-сжатие PDF для конфиденциальных документов?</h3>
  <p>Загрузки шифруются при передаче и обрабатываются только на время задачи. Для по-настоящему конфиденциальных файлов поставьте пароль на PDF после сжатия и передайте пароль по отдельному каналу — либо разделите файл и держите его на своём компьютере.</p>

  <h2>Попробуйте прямо сейчас</h2>

  <p>Проведите тест на выделение текста, начните со «среднего» пресета и сверьте результат с тем, для чего документ реально нужен. <a href="/ru/pdf-organize/compress/">Открыть инструмент сжатия PDF →</a></p>
