content_ru: |
  «Это безопасно?» — правильный вопрос задать до того, как закинуть на сайт договор, расчётный листок или скан паспорта. Задайте его Convertica — и задайте каждому другому онлайн-инструменту тоже. Эта страница отвечает честно: что происходит с вашим файлом, что мы с ним делаем и чего не делаем, и как проверить ответ самому, а не верить на слово.

  Без расплывчатого «ваша приватность важна для нас». Только реальная механика.

  <figure><img src="/static/blog/images/tool-pdf-protect-hero.jpg" alt="Инструменты PDF от Convertica поверх шифрованного соединения HTTPS" width="1280" height="800" loading="lazy"></figure>

  <h2>Что происходит с файлом после загрузки</h2>

  Когда вы выбираете файл и запускаете конвертацию, вот его жизненный цикл от начала до конца:

  <ol>
    <li>Файл покидает ваше устройство и идёт на наш сервер по шифрованному соединению (HTTPS).</li>
    <li>Рабочая копия попадает на сервер исключительно для того, чтобы движку конвертации было что читать.</li>
    <li>Инструмент делает своё дело — конвертирует, сжимает, объединяет, защищает, что бы вы ни запросили.</li>
    <li>Вы скачиваете результат.</li>
    <li>Загруженный файл и сгенерированный результат автоматически удаляются спустя короткое время.</li>
  </ol>

  Вот и вся история. Нет этапа, на котором человек открывает ваш документ, нет этапа, на котором он отправляется в постоянное хранилище, и нет этапа, на котором его содержимое читают ради рекламы или аналитики. Файлы обрабатывает софт, на время задачи, после чего их убирают.

  Мы намеренно описываем это в общих словах, а не называем точное число минут, потому что важен практический ответ: ваш файл не должен оставаться у нас — и он не остаётся. Хранить тысячи чужих документов стоило бы нам денег за хранилище и не давало бы ничего, поэтому мы так не делаем.

  <h2>Шифрование при передаче: часть про HTTPS</h2>

  Самый важный технический факт: и загрузка, и скачивание идут по HTTPS. Это то же шифрование транспортного уровня (TLS), которое использует сайт вашего банка. Проще говоря, байты вашего файла перемешаны, пока летят между устройством и сервером, так что тот, кто перехватывает трафик в кафешном Wi-Fi или сидит в сети по дороге, видит шифр-текст, а не ваш документ.

  Это можно проверить за две секунды самому: посмотрите на адресную строку. Если URL начинается с <code>https://</code> и браузер показывает замок — соединение шифровано. Если когда-нибудь увидите <code>http://</code> без <strong>s</strong> — остановитесь и не загружайте ничего важного ни нам, ни кому-либо ещё.

  Один честный нюанс, который стоит понимать: HTTPS защищает файл <em>при передаче</em>. Это не то же самое, что end-to-end-шифрование, где ключ есть только у вас. Серверу нужно уметь читать файл, чтобы его конвертировать, — для любого серверного инструмента это неизбежно. На стороне сервера вас защищает вторая половина истории: файл обрабатывается и затем удаляется, а не хранится.

  <h2>Автоматическое удаление, а не бессрочное хранение</h2>

  Успокаивающая часть — это не обещание, а сама архитектура. Convertica построена вокруг одноразовых, короткоживущих файлов:

  <ul>
    <li>Загруженный оригинал существует ровно столько, сколько нужно для обработки.</li>
    <li>Сконвертированный результат существует ровно столько, чтобы вы успели его скачать.</li>
    <li>Оба удаляются автоматически после — вам не нужно ничего нажимать, чтобы это случилось.</li>
    <li>Мы не строим поисковый архив ваших документов и не делаем скрытых бэкапов, чтобы их хранить.</li>
  </ul>

  Именно поэтому на Convertica нет страницы «мои файлы»: нет библиотеки, которую можно показать, потому что ничего не хранится. Если когда-нибудь это покажется недостающей функцией — на самом деле это работает гарантия приватности.

  <h2>Без аккаунта, без профиля, без слежки за документами</h2>

  Чтобы пользоваться бесплатными инструментами, аккаунт не нужен — и это сделано намеренно. Отсутствие регистрации означает:

  <ul>
    <li>Не нужно отдавать email или пароль, прежде чем сконвертировать файл.</li>
    <li>Нет личного профиля, который связывает документ с вашей личностью.</li>
    <li>Нет истории конвертаций, привязанной к «вам».</li>
    <li>Нет анализа того, что внутри ваших документов, ради профиля или продажи кому-либо.</li>
  </ul>

  Мы не продаём и не передаём ваши файлы. Наша модель проста и нарочито скучна: базовые инструменты бесплатны, а кому нужно больше (файлы крупнее, пакетные задачи, без ожидания) — может оплатить премиум. Деньги идут оттуда, а не из ваших документов.

  <h2>Когда ВАМ всё-таки стоит поставить пароль</h2>

  Вот часть, которую большинство страниц «это безопасно?» пропускают, потому что она перекладывает часть ответственности на вас. Шифрование при передаче и автоматическое удаление закрывают момент загрузки и обработки. Они никак не влияют на то, куда файл уйдёт <em>после</em> того, как вы его скачаете, — письмо, к которому вы его прикрепите, общий диск, куда вы его положите, коллега, которому перешлёте.

  Для по-настоящему чувствительных материалов поставьте свой пароль, чтобы защита путешествовала <em>вместе с файлом</em>:

  <ul>
    <li>Договоры, NDA и подписанные соглашения.</li>
    <li>Расчётные листки, выписки из банка и налоговые документы.</li>
    <li>Сканы удостоверений, паспортов или медкарт.</li>
    <li>Всё, что вам было бы неприятно увидеть пересланным не в тот ящик.</li>
  </ul>

  Используйте инструмент <a href="/ru/pdf-security/protect/">защиты PDF паролем</a>, чтобы запереть файл шифрованием AES-256 перед отправкой. Теперь, даже если файл окажется не там, где надо, без ключа он нечитаем. Когда документ сделал своё дело и его снова нужно редактировать, вы можете <a href="/ru/pdf-security/unlock/">снять пароль с собственного PDF</a>. Полный сценарий — включая самую частую ошибку, когда пароль отправляют тем же письмом, что и файл, — смотрите в статье <a href="/ru/blog/password-protect-pdf-before-emailing/">как защитить PDF паролем перед отправкой по почте</a>. Если вы упаковываете несколько файлов вместе, та же логика работает и для архивов: вот <a href="/ru/blog/how-to-password-protect-a-zip-file/">как защитить паролем ZIP-файл</a>.

  <h2>Как проверить любой онлайн-инструмент PDF (включая этот)</h2>

  Не верьте заявлению о безопасности только потому, что на странице красивым шрифтом написано «secure». Прогоните этот короткий чек-лист на любом инструменте до того, как загрузите что-то важное, — он занимает меньше минуты и работает на любом сайте, не только на нашем.

  <ul>
    <li><strong>Проверьте HTTPS.</strong> Замок в адресной строке, URL начинается с <code>https://</code>. Нет замка — нет загрузки.</li>
    <li><strong>Найдите политику удаления.</strong> Надёжный инструмент где-то в доступном месте заявляет, что загруженные файлы удаляются после обработки. Расплывчато или вовсе нет? Считайте это за «хранятся бессрочно» и действуйте соответственно.</li>
    <li><strong>Посмотрите, навязывают ли аккаунт.</strong> Если вас заставляют зарегистрироваться и подтвердить email до простой конвертации — файл привязывается к вашей личности. Возможность без аккаунта — это плюс инструменту в пользу приватности.</li>
    <li><strong>Прочитайте, что говорят о продаже или передаче данных.</strong> Политика приватности должна прямо говорить, что файлы не продаются и не передаются третьим лицам. Не нашли такого заявления — предполагайте обратное.</li>
    <li><strong>Соотнесите чувствительность и метод.</strong> Для по-настоящему конфиденциальных документов часто безопаснее инструмент, который обрабатывает файл прямо в браузере, или просто защита файла паролем до того, как он покинет ваше устройство.</li>
  </ul>

  <blockquote class="callout">Одна привычка, которая защищает вас везде: для всего чувствительного ставьте пароль на файл <em>до</em> того, как загрузите или отправите. Тогда политики инструмента, сроки хранения почтового сервера и привычки получателя значат гораздо меньше — ведь файл нечитаем без ключа, который контролируете вы.</blockquote>

  Полный набор операций Convertica можно посмотреть на странице <a href="/ru/all-tools/">всех инструментов</a> — конвертация, сжатие, объединение, разделение, защита, снятие пароля и не только.

  <h2>FAQ</h2>

  <h3>Безопасно ли пользоваться Convertica для конфиденциальных документов?</h3>
  <p>Для большинства документов — да: файлы загружаются по шифрованному соединению HTTPS, обрабатываются только на время конвертации и затем автоматически удаляются, без аккаунта и без продажи ваших данных. Для по-настоящему конфиденциальных материалов добавьте слой, который контролируете вы, — поставьте пароль на файл до загрузки или отправки, — чтобы он оставался защищённым везде, куда бы ни попал дальше.</p>

  <h3>Хранит ли Convertica мои файлы после конвертации?</h3>
  <p>Нет. Загруженный файл и сконвертированный результат удаляются автоматически спустя короткое время после завершения задачи. Нет библиотеки документов, нет постоянного архива и нет скрытого бэкапа. Поэтому на сайте и нет истории «мои файлы».</p>

  <h3>Нужен ли аккаунт, чтобы пользоваться Convertica?</h3>
  <p>Нет. Базовые инструменты работают без регистрации. Чтобы сконвертировать файл, не нужны email или пароль, и ничто не привязывает документ к личному профилю. Премиум-планы существуют ради повышенных лимитов и пакетной обработки, но они опциональны.</p>

  <h3>Шифруется ли мой файл во время загрузки?</h3>
  <p>Шифруется соединение. Загрузки и скачивания идут по HTTPS — той же транспортной TLS-защите, что у банков, — так что файл перемешан, пока летит между устройством и сервером. Это шифрование <em>при передаче</em>. Сервер всё же читает файл, чтобы его сконвертировать, что нормально для любого серверного инструмента, — а защита на той стороне это автоматическое удаление. Для end-to-end-приватности сначала поставьте пароль на файл сами.</p>

  <h3>Как проверить, можно ли доверять онлайн-инструменту PDF?</h3>
  <p>Ищите HTTPS (замок в адресной строке), найдите заявленную политику, что файлы удаляются после обработки, предпочитайте инструменты, которые не заставляют создавать аккаунт, и читайте, продают ли они данные или передают их. Если сомневаетесь с чувствительными файлами — поставьте на них пароль до загрузки, чтобы политика инструмента значила меньше.</p>

  <h2>Попробуйте сейчас</h2>

  <p>Самый безопасный ход с чувствительным документом — один шаг: заприте его до того, как поделитесь. Откройте <a href="/ru/pdf-security/protect/">инструмент защиты PDF</a>, поставьте надёжный пароль — и файл останется нечитаемым для любого без ключа: на наших серверах, в вашей почте и везде, куда он путешествует дальше.</p>
