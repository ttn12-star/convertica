excerpt_ru: "Отправляете черновик договора или чувствительное предложение? Диагональный знак на каждой странице защищает и юридически, и визуально — но только если настроен правильно."
content_ru: |
  Водяной знак — это мягкое ограждение. Он не остановит решительного злоумышленника, но три вещи делает уверенно: говорит читателю, что документ не финал, делает скриншоты и фотокопии очевидно отслеживаемыми и сбивает рефлекс «дай-ка я просто перешлю». Для черновика договора, внутреннего предложения или дизайнерского proof — это ровно тот уровень трения, который нужен.

  В этой статье — как поставить водяной знак CONFIDENTIAL или DRAFT на каждую страницу PDF в инструменте Convertica <a href="/ru/pdf-edit/add-watermark/">«добавить водяной знак на PDF»</a>, с настройками, которые в реальной практике выглядят профессионально. И ещё то, что большинство статей пропускает: водяной знак — это сдерживающее средство, а не шифрование, и в каких случаях его стоит сочетать с реальной защитой.

  <figure><img src="/static/blog/images/tool-watermark.jpg" alt="Инструмент Convertica для водяных знаков на PDF (Пдф) с настройками текста, прозрачности и поворота" width="1280" height="800" loading="lazy"></figure>

  <h2>Когда водяной знак реально нужен</h2>

  Водяные знаки сигнализируют о статусе. Используйте их, когда статус документа — часть его смысла:

  <ul>
    <li><strong>Черновики договоров.</strong> Метка <code>DRAFT</code> на каждой странице не даёт принять раннюю версию за подписанный финал. (У многих юридических команд есть история про «DRAFT», улетевший в закупки, подписанный без снятия знака и ставший действующим соглашением.)</li>
    <li><strong>Материалы под NDA.</strong> <code>CONFIDENTIAL</code> усиливает юридическую позицию документа и делает любой утёкший скриншот изобличающим самим фактом.</li>
    <li><strong>Только для внутреннего пользования.</strong> <code>INTERNAL USE ONLY</code> на материалах для совета директоров и стратегических деках снижает шанс случайной пересылки.</li>
    <li><strong>Proofs фотографов и дизайнеров.</strong> Диагональный текст на каждом превью отбивает у клиента желание использовать работу до оплаты.</li>
    <li><strong>Доодобренные отчёты.</strong> <code>PENDING REVIEW</code> не даёт цитировать черновики как официальные.</li>
    <li><strong>Литигационные черновики на стадии discovery.</strong> Маркировка состязательных бумаг как <code>DRAFT - ATTORNEY WORK PRODUCT</code> даёт им чёткий статус, если они случайно покинут привилегированный канал.</li>
  </ul>

  <blockquote class="callout">Если читатель может перепутать ваш файл с финалом — на нём должен быть водяной знак.</blockquote>

  <h2>Текстовый или картиночный знак</h2>

  Есть два формата на выбор, иногда оба сразу:

  <table>
    <thead>
      <tr><th>Тип</th><th>Подходит для</th><th>Компромисс</th></tr>
    </thead>
    <tbody>
      <tr><td>Текстовый знак</td><td>Слова статуса: DRAFT, CONFIDENTIAL, INTERNAL</td><td>Простой, но узнаваемый и лёгкий</td></tr>
      <tr><td>Картиночный знак (логотип)</td><td>Брендирование владения: логотип компании на proof</td><td>Выглядит респектабельнее, увеличивает размер файла, нужен PNG с чистой прозрачностью</td></tr>
      <tr><td>Оба сразу</td><td>Чувствительная клиентская работа: логотип плюс DRAFT</td><td>Больше настройки, самый сильный сигнал</td></tr>
    </tbody>
  </table>

  Текста хватает, когда сообщение процедурное («это не финальная версия»). Логотип — правильный выбор, когда сообщение про владение («эта работа принадлежит нам, пока вы не оплатили счёт»). Сочетать оба — перебор для бытовых черновиков, но норма для дизайнерских и фотопоставок.

  Конкретный нюанс по логотипам: если ваш PNG экспортирован с белым фоном вместо настоящей альфа-прозрачности, водяной знак сядет внутри видимого белого прямоугольника на каждой странице — это выглядит хуже, чем вообще без знака. Откройте PNG в любом просмотрщике, показывающем прозрачность (Preview на macOS, режим «tile» в IrfanView на Windows), и убедитесь, что вокруг логотипа клетчатый паттерн, а не белый.

  <h2>Пошагово: добавить текстовый водяной знак</h2>

  Настройки, которые на практике выглядят профессионально:

  <figure><img src="/static/blog/images/tool-watermark.jpg" alt="Диагональный знак CONFIDENTIAL применён на каждой странице PDF" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Откройте инструмент <a href="/ru/pdf-edit/add-watermark/">добавления водяного знака</a> и загрузите файл.</li>
    <li>Переключите тип водяного знака на <strong>Text</strong>.</li>
    <li>Введите текст знака. Используйте верхний регистр: <code>DRAFT</code>, <code>CONFIDENTIAL</code> или название вашей компании.</li>
    <li>Шрифт — без засечек (Arial или Helvetica), крупный размер: 60-80 pt для A4.</li>
    <li>Цвет — средне-серый (около #888), чтобы знак читался на светлых страницах и не «бомбил» тёмные изображения чёрным.</li>
    <li>Прозрачность — <strong>30-40%</strong>. Меньше 25% — почти не видно при печати; больше 50% — мешает основному тексту.</li>
    <li>Поворот — <strong>45 градусов</strong> по диагонали. Так знак покрывает больше площади страницы, чем горизонтальный текст, и это устоявшаяся конвенция для меток конфиденциальности.</li>
    <li>Применить ко <strong>всем страницам</strong>, а не только к первой.</li>
    <li>Посмотрите превью. Знак сидит за текстом — готово. Если он перекрывает критичную строку с подписью — снизьте прозрачность до 25%.</li>
    <li>Скачайте.</li>
  </ol>

  Стоит проверить после скачивания: откройте файл в той читалке, которой скорее всего пользуется получатель, а не только в той, где вы ставили знак. Старые версии Foxit и Nitro Reader рендерят знаки чуть крупнее, чем Acrobat, и диагональный текст может уехать за край страницы. Если получатель сидит на корпоративной машине со старым PDF-просмотрщиком — именно эта версия и решает, выглядит ли знак нормально.

  <h2>Лучшие практики для юридического веса</h2>

  Водяной знак весит больше в споре, когда он последовательный и видимый. Практические правила:

  <ul>
    <li><strong>Прозрачность 30-40%.</strong> Читается на любом фоне и явно остаётся оверлеем.</li>
    <li><strong>Диагональное расположение.</strong> Покрывает больше площади, чем верхняя или нижняя полоса, и переживает обрезку скриншотов.</li>
    <li><strong>Применяйте на каждую страницу.</strong> Знак только на первой странице приглашает делать частичные скриншоты, выглядящие как «без метки».</li>
    <li><strong>Храните мастер без знака.</strong> Всегда сохраняйте оригинал отдельно. Когда сделка закрывается и документ становится финалом, вы выпускаете чистую версию, а не «вычистите-знак».</li>
    <li><strong>Стандартизируйте формулировку.</strong> Выберите одну фразу («DRAFT - NOT FOR EXECUTION» или «CONFIDENTIAL») и используйте её последовательно. Разнобой выглядит «по случаю» и ослабляет сигнал.</li>
    <li><strong>Датируйте знак.</strong> «DRAFT - 2026-04-28» сразу показывает, какую ревизию человек смотрит, и обезоруживает аргумент «но в той версии, что я видел, было иначе».</li>
    <li><strong>Не смешивайте регистры.</strong> «Confidential» и «CONFIDENTIAL» в одном комплекте документов выглядят так, будто один — черновик другого.</li>
  </ul>

  Для документов из нескольких частей можно <a href="/ru/pdf-organize/merge/">сначала объединить страницы черновика</a> в один файл и поставить знак один раз сразу на весь пакет — это выглядит чище, чем ставить знак на каждую часть по отдельности.

  <h2>Водяные знаки — это не шифрование</h2>

  Эту часть большинство статей «как поставить водяной знак» пропускает, потому что она неудобна для апсейла. Водяной знак — видимое сдерживание. Он не делает следующего:

  <ul>
    <li>Не мешает получателю скопировать текст из PDF.</li>
    <li>Не предотвращает скриншоты — включая скриншоты-вместе-со-знаком, обрезанные до одного абзаца.</li>
    <li>Не шифрует содержимое файла.</li>
    <li>Не останавливает упорного злоумышленника с графическим редактором (медленно, неаккуратно — но снимет).</li>
    <li>Не переживает качественный OCR-проход, перенабивающий тело текста в новый документ.</li>
  </ul>

  Что он делает — задаёт социальный и юридический контекст. Утёкший черновик без знака можно правдоподобно объяснить случайностью. Утёкший черновик с <code>CONFIDENTIAL</code> на каждой странице — это явное нарушение какого-либо NDA, который подписал получатель, и эта разница имеет значение, когда юристы оценивают убытки.

  Для реально чувствительных материалов сочетайте водяной знак с настоящей защитой: <a href="/ru/pdf-security/protect/">поставьте пароль</a> с шифрованием AES-256 и передавайте пароль другим каналом, не вместе с файлом. «Знак плюс пароль» — уровень обороны, который большинство юридических и финансовых команд ожидает для материалов совета директоров и неподписанных коммерческих соглашений. (По-моему, и на этом уровне вы доверяете получателю. Технического контроля, который не даст инсайдеру сфотографировать экран телефоном, не существует. «Знак плюс пароль» — это «добросовестность плюс сдерживание», а не «несрываемая защита».)

  <table>
    <thead>
      <tr><th>Уровень риска</th><th>Рекомендуемая защита</th></tr>
    </thead>
    <tbody>
      <tr><td>Внутренний черновик в маленькой команде</td><td>Только водяной знак</td></tr>
      <tr><td>Внешний черновик контрагенту под NDA</td><td>Знак + пароль</td></tr>
      <tr><td>Материалы совета директоров, необъявленная M&A, payroll</td><td>Знак + пароль + защищённый канал</td></tr>
      <tr><td>Публичный раздаточный материал</td><td>Знак не нужен</td></tr>
      <tr><td>Персональный proof одному получателю по имени</td><td>Знак с его именем + пароль</td></tr>
    </tbody>
  </table>

  Последняя строка заслуживает отдельной заметки. Если ставить знак «Confidential - prepared for John Smith, Acme Corp», а не общий «CONFIDENTIAL», любая утечка с этой копии однозначно отслеживается до конкретного получателя. Фотографы и редакции до публикации десятилетиями пользуются этим приёмом. Это лишние тридцать секунд на получателя и резкий рост социальной цены утечки.

  <h2>Снять собственный знак позже</h2>

  Когда сделка финализируется, вам нужен чистый файл. Хороший способ ровно один — переэкспортировать из источника.

  <ol>
    <li>Сохраните мастер без знака до того, как запустили инструмент водяного знака.</li>
    <li>Когда документ одобрен — поставьте на мастере знак <code>FINAL</code> или вообще снимите водяные знаки, в зависимости от конвенции.</li>
    <li>Распространяйте новую чистую версию, а не «версию с убранным знаком» из черновика.</li>
  </ol>

  Мы намеренно не предлагаем инструмент удаления водяных знаков с документов, которыми вы не владеете. Снятие знаков на чужих PDF почти всегда нарушает авторское право, NDA или условия отправителя — и мы не хотим это упрощать.

  <h2>FAQ</h2>

  <h3>Какую прозрачность ставить для CONFIDENTIAL?</h3>
  <p>30-40% — золотая середина. Читается на светлом фоне и переживает чёрно-белую печать, не закрывая основной текст. Меньше 25% — становится невидимым на «загруженных» страницах; больше 50% — мешает читать.</p>

  <h3>Можно ли поставить знак только на отдельные страницы Пдф?</h3>
  <p>Да, и для этого есть валидные основания (обложка без знака, приложения без знака). При этом частичная маркировка проще «срывается» скриншотом — поэтому ставьте на каждую страницу, если только нет специфической причины по вёрстке.</p>

  <h3>Знак появится при печати?</h3>
  <p>Да. Знак — часть содержимого страницы, а не оверлей просмотрщика, и печатается ровно так, как видно на экране. При чёрно-белой печати средне-серые знаки печатаются чуть темнее, чем ожидаешь — снизьте прозрачность на 5%, если планируете печать. У некоторых драйверов печати есть опция «skip watermarks», по умолчанию включённая на ряде корпоративных принтеров — проверяйте перед большим тиражом.</p>

  <h3>Водяной знак мешает копировать Пдф?</h3>
  <p>Нет. Знак — только визуальное сдерживание. Чтобы ограничить копирование или печать, сочетайте знак с permissions-паролем, отключающим эти действия в просмотрщиках, уважающих стандарт.</p>

  <h3>Можно ли добавить логотип вместо текста?</h3>
  <p>Да. Используйте PNG с прозрачным фоном — так результат чище. Поместите его по диагонали с прозрачностью 30-40% по тем же соображениям покрытия, что и для текста. Знаки-логотипы — стандартная практика для дизайнерских и фотопоставок.</p>

  <h2>Попробуйте сейчас</h2>

  <p>Поставьте на черновик, предложение или proof понятную метку статуса меньше чем за минуту — и отправляйте без сомнений, что получатель воспримет это как финал. <a href="/ru/pdf-edit/add-watermark/">Открыть инструмент водяных знаков →</a> Полистайте остальные <a href="/ru/all-tools/">инструменты редактирования PDF</a>, пока вы здесь.</p>
