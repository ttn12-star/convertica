      <tr><td>Project handover</td><td>Report (Word), budget (Excel), screenshots (JPG)</td><td>Report → budget → screenshots</td></tr>
      <tr><td>Property pack</td><td>Listing (Word), floor plan (JPG), costs (Excel)</td><td>Listing → floor plan → costs</td></tr>
    </tbody>
  </table>

  <h2>बचने लायक pitfalls</h2>
  <p><strong>Excel print setup skip करना.</strong> यह एक ugly packet की सबसे common वजह है। Spreadsheet convert करने से पहले हमेशा print area set करें और fit-to-page on करें।</p>
  <p><strong>Reading order के बजाय upload order में merge करना.</strong> Merge tool वही order रखता है जो आप arrange करते हैं, वह नहीं जिसमें आपने files add कीं। Export करने से पहले हमेशा reading sequence में drag करें।</p>
  <p><strong>यह भूलना कि file बड़ी हो जाती है.</strong> हर photo एक megabyte या ज़्यादा add कर सकती है। एक five-photo packet आसानी से एक email limit पार कर सकता है - आख़िर में compress करें, पहले नहीं, ताकि आप सिर्फ़ एक बार compress करें।</p>
  <p><strong>Final file का नाम "document.pdf" रखना.</strong> Packet को एक clear नाम दें जैसे <code>Smith-Application-2026.pdf</code>। इसकी reasoning और एक पूरा naming system <a href="/hi/blog/pdf-naming-conventions-best-practices/">PDF naming conventions guide</a> में है।</p>

  <h2>Accounting और invoices के लिए एक note</h2>
  <p>अगर आपका packet ख़ासतौर पर invoices या financial statements हैं जो bookkeeping के लिए bundle हो रहे हैं, तो एक tailored walkthrough है - इसमें यह भी कि एक consistent order और एक clean audit trail कैसे रखें - <a href="/hi/blog/merge-invoices-into-one-pdf-for-accounting/">merge invoices for accounting guide</a> में।</p>

  <blockquote class="callout">पूरा काम दो stages का है: हर file को उसके अपने PDF में convert करें, फिर उन PDFs को reading order में merge करें। बाक़ी सब - rotating, numbering, compressing - उसके ऊपर optional polish है।</blockquote>

  <h2>FAQ</h2>
  <h3>क्या मैं एक Word file और एक JPG को सीधे एक PDF में combine कर सकता हूँ?</h3>
  <p>एक step में reliably नहीं। Word file को PDF में और JPG को PDF में अलग-अलग convert करें, फिर दोनों PDFs को merge करें। यह two-stage approach आपको layout और order पर control देता है और surprises से बचाता है।</p>
  <h3>मैं अपनी files को सही order में कैसे रखूँ?</h3>
  <p>Merge tool में, export करने से पहले files को उस sequence में drag करें जो आप चाहते हैं - output arranged order को follow करता है, उस order को नहीं जिसमें आपने उन्हें add किया। अगर आपको बाद में कोई गलती दिखे, combined file में pages को इधर-उधर drag करने के लिए organize tool use करें।</p>
  <h3>मेरी Excel sheet PDF में कई pages में क्यों टूट जाती है?</h3>
  <p>Print area set नहीं है। Convert करने से पहले, Excel में print area define करें और "Fit Sheet on One Page" या scale-to-fit-width enable करें, फिर convert करें। यह एक wide table को एक single page पर रखता है।</p>
  <h3>मेरा combined PDF email करने के लिए बहुत बड़ा है। मैं क्या करूँ?</h3>
  <p>Photo-heavy packets तेज़ी से बड़े हो जाते हैं। Finished PDF को last step के तौर पर एक compressor से चलाएँ ताकि वह आपके email provider की limit के नीचे आ जाए (Gmail के लिए लगभग 25 MB, Outlook के लिए 20 MB)।</p>
  <h3>मेरा एक scanned page sideways है - मैं इसे कैसे ठीक करूँ?</h3>
  <p>Phone photos अक्सर rotated import होती हैं। Page को permanently turn करने के लिए rotate tool use करें ताकि यह सही orientation में save हो, सिर्फ़ current view के लिए नहीं।</p>
  <h3>क्या मैं कई images को एक-एक करके merge करने के बजाय एक PDF के रूप में add कर सकता हूँ?</h3>
  <p>हाँ। JPG to PDF tool एक साथ कई images ले सकता है और एक single multi-page PDF produce कर सकता है, जो grouped images जैसे एक multi-page certificate के लिए आपका एक अलग merge step बचाता है।</p>

  <h2>अभी try करें</h2>
  <p>अपनी loose files convert करें, फिर उन्हें सही order में साथ लाएँ। <a href="/hi/pdf-organize/merge/">Merge PDF tool खोलें →</a></p>
