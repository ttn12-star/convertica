title_hi: "फ़ोटो पर पासवर्ड कैसे लगाएँ: फ़ोन पर और भेजने के लिए"
meta_title_hi: "फ़ोटो पर पासवर्ड: फ़ोन में तस्वीरें छिपाएँ या लॉक करके भेजें | Convertica"
meta_description_hi: "अपने iPhone या Android में फ़ोटो छिपाएँ, या भेजने और सहेजने के लिए किसी तस्वीर को पासवर्ड से लॉक करें। तस्वीरों का अपना पासवर्ड क्यों नहीं होता और इसे एन्क्रिप्टेड PDF से कैसे हल करें।"
meta_keywords_hi: "फ़ोटो पर पासवर्ड, तस्वीर लॉक करना, फ़ोटो को पासवर्ड से कैसे सुरक्षित करें, iphone में फ़ोटो छिपाना, गूगल फ़ोटो लॉक्ड फ़ोल्डर, सैमसंग सिक्योर फ़ोल्डर, फ़ोटो एन्क्रिप्ट करना, इमेज पर पासवर्ड"
excerpt_hi: "फ़ोटो लॉक करने के दो मतलब हो सकते हैं: उसे अपने ही फ़ोन में छिपाना, या एक प्रति को पासवर्ड से सील करना ताकि भेजने के बाद कोई उसे न खोल सके। तस्वीरों का अपना पासवर्ड नहीं होता, तो यहाँ है कि हर तरीका कैसे काम करता है और कहाँ रुक जाता है।"
content_hi: |
  आप एक फ़ोटो लॉक करना चाहते हैं। पर लॉक करने के दो बिलकुल अलग मतलब हो सकते हैं, और इन्हें आपस में मिला देना ही वजह है कि इंटरनेट की इतनी सलाह निशाना चूक जाती है। कभी आप बस यह चाहते हैं कि दोस्त को फ़ोन देते समय कोई निजी तस्वीर सामने न आ जाए। और कभी आपको कोई फ़ोटो ऐसे भेजनी या सहेजनी होती है कि पासवर्ड के बिना कोई उसे न खोल सके, भले ही फ़ाइल किसी गलत डिवाइस पर पहुँच जाए। यह गाइड दोनों को कवर करती है, और ईमानदारी से बताती है कि हर तरीका कहाँ काम करना बंद कर देता है।

  <h2>पहले तय करें कि आपके लिए "सुरक्षित करना" क्या है</h2>

  <p>दो मकसद, दो अलग औज़ार।</p>

  <ul>
    <li><strong>अपने ही फ़ोन में फ़ोटो छिपाना।</strong> डिवाइस सिर्फ़ आप इस्तेमाल करते हैं, और आप बस कुछ तस्वीरें मुख्य गैलरी से हटाकर Face ID या पिन के पीछे रखना चाहते हैं। यह हर फ़ोन में पहले से मौजूद है और मुफ़्त है।</li>
    <li><strong>वह फ़ोटो लॉक करना जिसे आप भेजने या सहेजने वाले हैं।</strong> यहाँ फ़ाइल आपके हाथ से निकल जाती है। फ़ोन का निजी एल्बम किसी काम का नहीं रह जाता जैसे ही तस्वीर किसी ईमेल से जुड़ती है या USB में कॉपी होती है। इसके लिए पासवर्ड को फ़ाइल के भीतर ही साथ चलना होगा।</li>
  </ul>

  <p>शुरू करने से पहले खुद से पूछें कि असल में आपको किसकी ज़रूरत है। पहला फ़ोन की एक सेटिंग है जिसे सेकंडों में चालू कर लेते हैं। दूसरे के लिए असली एन्क्रिप्शन चाहिए, और यहीं तस्वीरें उलझ जाती हैं, जैसा आप नीचे देखेंगे।</p>

  <h2>iPhone पर फ़ोटो लॉक करना</h2>

  <p>तस्वीर कितनी निजी है, इसके हिसाब से iOS दो रास्ते देता है।</p>

  <p><strong>Hidden एल्बम।</strong> Photos में तस्वीर खोलें, शेयर या मोर बटन दबाएँ और Hide चुनें। वह Hidden एल्बम में चली जाती है जो आपकी मुख्य लाइब्रेरी में नहीं दिखता। iOS 16 और उसके बाद यह एल्बम, Recently Deleted के साथ, डिफ़ॉल्ट रूप से Face ID या पासकोड के पीछे लॉक रहता है, इसलिए आपकी गैलरी पलटता कोई इस पर संयोग से नहीं पहुँचेगा।</p>

  <p><strong>इसे किसी नोट के भीतर लॉक करें।</strong> जिसे आप सचमुच पासवर्ड के पीछे रखना चाहते हैं, उसके लिए फ़ोटो को Notes ऐप में पेस्ट करें और शेयर बटन से उस नोट को लॉक कर दें। Notes आपके डिवाइस पासकोड या अलग से तय पासवर्ड का इस्तेमाल करता है, और लॉक किया नोट डिवाइस पर एन्क्रिप्ट होता है। जब पूरा एल्बम छिपाने के बजाय एक-दो संवेदनशील तस्वीरें सील करनी हों, तो यह काम की तरकीब है।</p>

  <h2>Android पर फ़ोटो लॉक करना</h2>

  <p><strong>Google Photos का Locked Folder।</strong> Photos खोलें, Library में जाएँ, फिर Utilities, और Locked Folder सेट करें। जो कुछ आप वहाँ ले जाते हैं वह ग्रिड से, खोज से और गैलरी पढ़ने वाले हर ऐप से बाहर रहता है, और स्क्रीन लॉक के बाद ही खुलता है। Locked Folder की तस्वीरों का बैकअप नहीं बनता, और यही कीमत है उन्हें डिवाइस तक निजी रखने की।</p>

  <p><strong>Samsung का Secure Folder।</strong> Galaxy फ़ोन में Secure Folder, Settings में Security and privacy के अंदर होता है, और अपने अलग लॉक के साथ एक अलग, एन्क्रिप्टेड जगह बनाता है। तस्वीरें उसमें ले जाएँ तो वे सामान्य गैलरी से गायब हो जाती हैं जब तक आप फ़ोल्डर अनलॉक न करें। यह छिपे एल्बम से आगे जाता है, क्योंकि पूरी जगह एन्क्रिप्टेड होती है, सिर्फ़ नज़र से हटाई नहीं जाती।</p>

  <h2>फ़ोन के हर "तिजोरी" की साझा कमी</h2>

  <p>ऊपर के सभी तरीके फ़ोटो को एक डिवाइस पर सुरक्षित रखते हैं। यह सचमुच उपयोगी है, पर सीमा को ध्यान से पढ़ें: सुरक्षा फ़ाइल के साथ यात्रा नहीं करती। जैसे ही आप छिपी फ़ोटो को ईमेल से जोड़ते हैं, मैसेंजर पर भेजते हैं, या कंप्यूटर पर कॉपी करते हैं, वह एक सामान्य, खुलने वाली तस्वीर के रूप में पहुँचती है। ताला आपके फ़ोन में रहता था, तस्वीर में नहीं।</p>

  <p>तो अगर आपका मकसद ऐसी फ़ोटो भेजना है जो रास्ते में निजी बनी रहे, या उसे किसी साझा ड्राइव पर रखना है जहाँ दूसरे उसे खोल सकें, तो फ़ोन की तिजोरी गलत औज़ार है। आपको पासवर्ड फ़ाइल में ही समाया हुआ चाहिए।</p>

  <h2>भेजने या सहेजने के लिए फ़ोटो पर पासवर्ड लगाना</h2>

  <p>यह वह ईमानदार बात है जिसे ज़्यादातर गाइड छोड़ जाती हैं: इमेज फ़ाइलों में पासवर्ड की जगह ही नहीं होती। JPG या PNG बस पिक्सल का डेटा है। फ़ॉर्मैट में ऐसा कोई खाना नहीं जो पासवर्ड रख सके, और फ़ोटो व्यूअर के लिए उसे माँगने का कोई मानक तरीका नहीं। इसीलिए सामान्य तस्वीर खोलते समय "पासवर्ड डालें" वाला बॉक्स कभी नहीं दिखता, और इसीलिए फ़ाइल का नाम बदलना या उसे "छिपाना" अपने आप कुछ नहीं बचाता।</p>

  <p>सार्वभौमिक हल यह है कि फ़ोटो को किसी ऐसी चीज़ में लपेट दें जो पासवर्ड सँभालती हो, और वह फ़ॉर्मैट जिसे हर डिवाइस पहले से खोलता है, वह है PDF। अपनी तस्वीर को PDF के भीतर रखें, उस PDF को पासवर्ड से एन्क्रिप्ट करें, और आपको एक फ़ाइल मिलती है जो सही कोड डाले जाने तक पासवर्ड की माँग के सिवा कुछ नहीं दिखाती, चाहे वह iPhone पर खुले, Android पर, Mac पर या Windows वाले पीसी पर।</p>

  <p>ठीक यही काम <a href="/hi/image/password-protect-image/">इमेज पर पासवर्ड लगाएँ</a> टूल करता है।</p>

  <ol>
    <li><a href="/hi/image/password-protect-image/">इमेज पर पासवर्ड लगाएँ</a> टूल खोलें और अपनी फ़ोटो अपलोड करें। JPG, PNG और HEIC सभी चलते हैं।</li>
    <li>एक पासवर्ड चुनें। इसे मज़बूत और याद रहने लायक बनाएँ, क्योंकि फ़ाइल सचमुच एन्क्रिप्ट होती है और खो जाने पर कोई पिछला दरवाज़ा नहीं होता।</li>
    <li>नतीजा डाउनलोड करें। यह आपकी तस्वीर वाला एक PDF है, AES-256 एन्क्रिप्शन से सील। इसे कहीं भी भेजें या रखें, और जो भी इसे खोलेगा उसे पहले पासवर्ड की माँग मिलेगी, आपकी फ़ोटो नहीं।</li>
  </ol>

  <p>पासवर्ड को फ़ाइल से अलग रास्ते से भेजें। पासवर्ड टेक्स्ट मैसेज से और फ़ाइल ईमेल से भेजना, दोनों को एक ही संदेश में डालने से कहीं ज़्यादा सुरक्षित है।</p>

  <h2>AES-256 क्यों, न कि कोई "लॉक किया JPG"</h2>

  <p>AES-256 वही श्रेणी का एन्क्रिप्शन है जिससे बैंकिंग और सरकारी फ़ाइलें सुरक्षित होती हैं। जब फ़ोटो AES-256 से एन्क्रिप्ट किए PDF के भीतर होती है, तो पिक्सल सिर्फ़ छिपे नहीं होते, वे उलझा दिए जाते हैं, और पासवर्ड के बिना दिखाने को कुछ बचता ही नहीं। इसकी तुलना छिपी या नाम बदली तस्वीर से करें, जिसे कोई भी सेकंडों में सामने ले आता है। अगर फ़ोटो इतनी अहम है कि उसे लॉक किया जाए, तो उसे ढंग से लॉक करना ही ठीक है।</p>

  <h2>अक्सर पूछे जाने वाले सवाल</h2>

  <h3>क्या मैं सीधे JPG या PNG पर पासवर्ड लगा सकता हूँ?</h3>
  <p>तस्वीर पर सीधे नहीं। JPG और PNG फ़ॉर्मैट में पासवर्ड का कोई खाना नहीं, इसलिए कोई भी मानक फ़ोटो व्यूअर उसे न लॉक कर सकता है न अनलॉक। फ़ोटो को पासवर्ड से सुरक्षित करने के लिए उसे एक एन्क्रिप्टेड कंटेनर में लपेटा जाता है, और PDF वह कंटेनर है जिसे हर डिवाइस खोलता है। यही तरीका यह टूल अपनाता है।</p>

  <h3>फ़ोटो छिपाना और उस पर पासवर्ड लगाना एक ही बात है?</h3>
  <p>नहीं। छिपाना फ़ोटो को एक डिवाइस पर नज़र से हटा देता है, पर फ़ाइल पूरी तरह खुलने योग्य रहती है। अगर वह डिवाइस छोड़ दे, या कोई फ़ोन अनलॉक कर ले, तो फ़ोटो वहीं है। पासवर्ड सुरक्षा फ़ाइल को एन्क्रिप्ट कर देती है, इसलिए पासवर्ड के बिना वह कहीं भी हो, खुलती ही नहीं।</p>

  <h3>अगर मैं पासवर्ड भूल जाऊँ तो?</h3>
  <p>फ़ाइल नहीं खुलेगी, और यह जानबूझकर ऐसा है। असली एन्क्रिप्शन में रिकवरी बटन नहीं होता, इसलिए पासवर्ड को पासवर्ड मैनेजर में रखें और कभी अकेली प्रति न बनाएँ। अगर आपको सिर्फ़ अपने फ़ोन पर रोज़मर्रा की निजता चाहिए, सील की गई फ़ाइल नहीं, तो फ़ोन की तिजोरी यह जोखिम पूरी तरह टाल देती है।</p>

  <h3>क्या सुरक्षित फ़ाइल की इमेज क्वालिटी घटती है?</h3>
  <p>नहीं। आपकी फ़ोटो जैसी है वैसी ही PDF में जाती है, इसलिए भीतर की तस्वीर मूल जैसी ही गुणवत्ता की रहती है। एन्क्रिप्शन यह बदलता है कि फ़ाइल कैसे सहेजी जाती है, यह नहीं कि अनलॉक होने पर तस्वीर कैसी दिखती है।</p>

  <h3>क्या पाने वाला इसे बिना खास सॉफ़्टवेयर के खोल सकता है?</h3>
  <p>हाँ। नतीजा एक साधारण एन्क्रिप्टेड PDF है, और PDF रीडर हर फ़ोन और कंप्यूटर में पहले से है। वे एक बार पासवर्ड डालते हैं और फ़ोटो सामने आ जाती है, कुछ भी इंस्टॉल करने की ज़रूरत नहीं।</p>

  <h3>क्या फ़ोटो को ऑनलाइन सुरक्षित करना ठीक है?</h3>
  <p>अपलोड की गई फ़ाइलें प्रोसेस होती हैं और फिर थोड़ी देर बाद सर्वर से हटा दी जाती हैं, इसलिए कुछ भी न रखा जाता है न साझा होता है। जिस फ़ोटो को आपके कंप्यूटर से कभी बाहर नहीं जाना चाहिए, उसके लिए सबसे सुरक्षित रास्ता फ़ोन की तिजोरी या ऑफ़लाइन टूल है। और जिस फ़ोटो को पासवर्ड के साथ भेजना या सहेजना है, उसे ऑनलाइन एन्क्रिप्ट करना तेज़ है, और उसके बाद सुरक्षा फ़ाइल खुद अपने साथ लेकर चलती है।</p>

  <h2>अभी आज़माएँ</h2>

  <p>अगर आपको बस कुछ तस्वीरें मुख्य गैलरी से हटानी हैं, तो फ़ोन का Hidden एल्बम, Locked Folder या Secure Folder इसे सेकंडों में सँभाल लेता है। पर अगर फ़ोटो को यात्रा करनी है, या पासवर्ड के साथ किसी साझा ड्राइव पर रहना है, तो उसे <a href="/hi/image/password-protect-image/">इमेज पर पासवर्ड लगाएँ</a> टूल में डालें और एक लॉक किया PDF डाउनलोड करें जो कोड के बिना किसी के लिए नहीं खुलता।</p>
