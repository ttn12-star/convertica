content_hi: |
  PDF encrypt करने में लगभग 30 seconds लगते हैं। Encryption को instantly defeat किए बिना password share करने में लगभग दो minutes का thought लगता है, और वहीं ज़्यादातर लोग ठोकर खाते हैं। Password को attachment के same email में डालना cybersecurity में अपने front door को lock करके key को doorknob से tape करने के बराबर है।

  यह guide दोनों halves cover करती है: file को actually कैसे encrypt करें, और password को recipient के hands में email-नहीं-पहुँच सकने वाले channel से कैसे लाएँ।

  <figure><img src="/static/blog/images/tool-protect.jpg" alt="Convertica password-protect PDF tool AES-256 encryption के साथ" width="1280" height="800" loading="lazy"></figure>

  <h2>Email attachments को extra protection क्यों चाहिए</h2>

  Providers के बीच standard email transit (TLS) में encrypted है लेकिन end-to-end नहीं। मतलब:

  <ul>
    <li>आपका email provider contents read कर सकता है।</li>
    <li>Recipient का email provider contents read कर सकता है।</li>
    <li>अगर message forward हो जाए, archive हो जाए, या search index में pull हो जाए, copies उन जगहों पर बैठती हैं जिन्हें आप control नहीं करते।</li>
    <li>Shared inboxes (info@, accounts@) के अक्सर sender से ज़्यादा readers होते हैं।</li>
    <li>Email backups regulated industries में सात साल या उससे ज़्यादा persist कर सकते हैं, original message inbox से delete होने के बाद भी।</li>
    <li>एक subpoena, internal investigation, या inadvertent legal hold years बाद उन backups से message वापस pull कर सकता है।</li>
  </ul>

  इसमें से कुछ भी मतलब यह नहीं है कि email everyday correspondence के लिए unsafe है। मतलब यह है कि एक contract, payslip, medical record, या signed agreement एक layer deserves करता है जो forwarding और archiving survive करे। PDF encryption exactly वो layer है।

  <h2>Step-by-step: अपना PDF encrypt करें</h2>

  <figure><img src="/static/blog/images/tool-protect.jpg" alt="PDF के लिए strong password और AES-256 encryption level set करना" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li><a href="/hi/pdf-security/protect/">PDF password-protect</a> tool खोलें और अपनी file upload करें। Original आपके device पर unchanged रहता है।</li>
    <li>Strong password set करें। Recipient को exactly यह string चाहिए, इसलिए carefully type करें और दो बार typing के बजाय password manager से paste करें।</li>
    <li>Encryption level confirm करें। Modern tools AES-256 default करते हैं, जो वही standard है जो banks और government agencies use करती हैं। पुराने RC4 और AES-128 modes compatibility के लिए अब भी exist करते हैं लेकिन avoid किए जाने चाहिए जब तक recipient ancient software नहीं चला रहा (Acrobat 8 और earlier, पुराने industrial systems में कुछ embedded readers)।</li>
    <li>Encrypted file download करें। Password के साथ इसे एक बार खुद open करें verify करने के लिए कि सब काम कर रहा है, फिर अपने email में attach करें।</li>
  </ol>

  <blockquote class="callout">Send करने से पहले verify करें। Encrypted file को password के साथ खुद open करें, उस viewer में जो recipient likely use करेगा। बहुत सी "encryption broken" complaints password में typos निकलती हैं, email जाने के बाद ही पकड़ी जाती हैं।</blockquote>

  Quirk worth flagging: अगर आप password manager से password copy करते हैं और आपका manager auto-add करता है trailing space या smart-quote character, तो recipient की plain-text password attempt match नहीं करेगी। Whitespace strip करें और किसी भी "curly" quotes (' ' " ") को manager में password save करने से पहले straight ASCII quotes (' ") से replace करें। यह लगभग आधी "encryption broken" tickets के लिए silent failure mode है जो मैंने colleagues को raise करते देखी हैं।

  अगर document भी draft है या sensitive markings रखता है, आप <a href="/hi/pdf-edit/add-watermark/">confidential watermark भी add</a> कर सकते हैं ताकि कोई भी जो access करे clearly देखे कि content restricted है।

  <h2>Password को safely कैसे share करें</h2>

  यह workflow का वो आधा है जो skip हो जाता है, और यह वो आधा है जो decide करता है कि आपका encryption actually कुछ protect करता है या नहीं।

  <h3>अलग channel use करें</h3>

  Rule simple है: password को ऐसे route से travel करना है जिसका email से कुछ नहीं लेना देना। Good options:

  <ul>
    <li><strong>SMS या messenger.</strong> Password को text या Signal या WhatsApp जैसे end-to-end encrypted messenger से भेजें। Phone number email account से separate identity है।</li>
    <li><strong>Password manager share link.</strong> 1Password, Bitwarden, और Dashlane सभी "share an item" या "share via link" features offer करते हैं जो single view या set time के बाद expire हो जाते हैं।</li>
    <li><strong>In person या phone पर verbal handoff.</strong> Old-fashioned, लेकिन bulletproof. High-value items के लिए useful जो आप call कर सकें।</li>
    <li><strong>Secret-sharing services.</strong> Bitwarden Send या one-time-secret services जैसे tools आपको ऐसा link generate करने देते हैं जो एक open के बाद खुद destroy हो जाता है।</li>
    <li><strong>Out-of-band ticketing system.</strong> अगर दोनों parties shared service desk (Jira Service Desk, Zendesk) use करती हैं, password private comment के रूप में travel कर सकता है जो email thread से separate है।</li>
  </ul>

  Bad options जो acceptable लगते हैं लेकिन हैं नहीं:

  <ul>
    <li><strong>"Password अगले email में है।"</strong> Same inbox, same audit trail, same forwarders. Encryption अब speed bump है।</li>
    <li><strong>Subject line में Password.</strong> Same problem, extra visibility के साथ।</li>
    <li><strong>Predictable patterns ("password recipient का last name है")।</strong> कोई भी जो guess कर सकता है उसे password नहीं चाहिए।</li>
    <li><strong>Mixed Apple और Android devices के बीच iMessage.</strong> अगर recipient iMessage पर नहीं है, message plain SMS पर fall back होता है, जो carrier infrastructure पर unencrypted बैठता है।</li>
    <li><strong>Voicemail.</strong> कई corporate voicemail systems recordings inboxes में store करते हैं जो email से integrate होते हैं और transcribed और indexed हो सकते हैं।</li>
  </ul>

  <h3>ऐसा password choose करना जो crack नहीं होगा</h3>

  PDF encryption password से encryption key derive करता है। Weak passwords offline brute-force हो जाते हैं attacker के पास file होने के बाद। इसे hard बनाएँ।

  <ul>
    <li><strong>Length over complexity.</strong> 16-character random string पाँच symbols वाली 10-character string से बेहतर है। "PurpleDolphinChairOcean42" "P@55!" से stronger है।</li>
    <li><strong>Personal data avoid करें.</strong> Recipient का name, birthday, company, और pet सब quick LinkedIn check से guessable हैं।</li>
    <li><strong>Generate करें, invent मत करें.</strong> अपने password manager का generator use करें। यहाँ तक कि 4-word diceware passphrase भी आपके बनाए गए कुछ से dramatically ज़्यादा secure है।</li>
    <li><strong>Auto-correct होने वाले characters avoid करें.</strong> कुछ keyboards (especially mobile) certain ASCII punctuation को smart equivalents से auto-replace कर देते हैं। Platforms पर sharing कर रहे हैं तो letters और digits पर stick करें।</li>
  </ul>

  Sensitive material के लिए practical floor: 12 random alphanumeric characters या 4-word diceware passphrase। दोनों लगभग 60-70 bits of entropy देते हैं, जो 2026 में existing किसी भी hardware पर AES-256 brute-force impractical रखने के लिए काफ़ी है।

  <h2>Open password vs permissions password</h2>

  PDF encryption दो different passwords support करता है, और वे different jobs करते हैं:

  <table>
    <thead>
      <tr>
        <th>Password type</th>
        <th>क्या करता है</th>
        <th>कब use करें</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Open / user password</td>
        <td>Document देखने के लिए ही ज़रूरी। इसके बिना, file unreadable ciphertext है।</td>
        <td>जब भी content खुद confidential हो।</td>
      </tr>
      <tr>
        <td>Permissions / owner password</td>
        <td>Restrict करता है viewer क्या कर सकता है (printing, copying text, modifying)। Doc फिर भी इसके बिना open होता है।</td>
        <td>उन documents के लिए जो readable होने चाहिए लेकिन edit या copy न हों (form templates, distributed reports)।</td>
      </tr>
    </tbody>
  </table>

  ज़्यादातर "send confidential PDF by email" cases <strong>open password</strong> call करते हैं, क्योंकि आप file को key के बिना unreadable चाहते हैं। Permissions passwords useful हैं लेकिन determined recipients द्वारा easier bypass हो जाते हैं - कुछ PDF tools (और Mac Preview के ज़्यादातर older versions) open password नहीं रखने वाले documents पर permissions flag entirely ignore कर देते हैं।

  अगर आपकी situation को दोनों चाहिए तो दोनों set करें: access control करने के लिए open, authorized recipient क्या कर सकता है restrict करने के लिए permissions।

  <h2>Encryption के around email tips</h2>

  दो practical notes जो लोगों को अक्सर bite करते हैं:

  <ul>
    <li><strong>Compressing से पहले encrypt करें.</strong> अगर PDF email करने के लिए भी बहुत बड़ा है, बाद में करने के बजाय <a href="/hi/pdf-organize/compress/">compress पहले फिर encrypt</a> step run करें। कुछ compressors quietly file को इस तरह re-encode करते हैं कि encryption strip हो जाता है।</li>
    <li><strong>Recipient को बताएँ कि यह encrypted है.</strong> Email body में एक छोटी note ("यह PDF password-protected है। मैं अभी SMS से password भेजूँगा।") file को corrupt या quarantined के रूप में flag होने से रोकती है।</li>
    <li><strong>Spam-filter false positives से सावधान रहें.</strong> Encrypted attachments malware के लिए scan नहीं हो सकते, इसलिए corporate spam filters कभी-कभी उन्हें flag या quarantine करते हैं। Recipient को warn करें कि अगर वो email कुछ minutes में न दिखे तो spam folder check करें, और high-value sends के लिए IT को advance में inform करें।</li>
    <li><strong>Password को "backup" के रूप में खुद को email न करें.</strong> अगर कोई आपके inbox को breach करे, Sent folder में file और Inbox में password दोनों available हैं। Password को सिर्फ़ अपने password manager में store करें।</li>
  </ul>

  <h2>अगर आप password भूल जाएँ तो क्या करें</h2>

  Unencrypted original को कहीं safe रखें। Encryption symmetric है: अगर आप password lose कर देते हैं, file legitimate means से effectively unrecoverable है। AES-256 brute-force किसी normal timescale पर realistic नहीं है - sun का heat death usual humorous estimate है।

  अगर आप document own करते हैं और password lose कर दिया लेकिन original है, नए password से re-encrypt करें और file replace करें। अगर आपके पास सिर्फ़ encrypted copy है और आप genuinely इसके rights own करते हैं, ऐसे tools हैं जो <a href="/hi/pdf-security/unlock/">PDF unlock आप own करते हैं</a> जो weak protections removal attempt कर सकते हैं, लेकिन वे strong AES-256 password crack नहीं करेंगे। (Weak protections के लिए - 2003-era exports से "permissions only" PDFs - removal trivial है। Long password वाले real AES-256 के लिए, give up करें।)

  <h2>FAQ</h2>

  <h3>क्या AES-256 encryption legal documents के लिए strong enough है?</h3>
  <p>हाँ। AES-256 US National Security Agency द्वारा top-secret material के लिए approved है और banks, governments, और major cloud providers द्वारा use होता है। PDF security में weak link लगभग हमेशा password होता है, algorithm नहीं।</p>

  <h3>क्या मैं password same email में भेज सकता हूँ अगर बाद में delete कर दूँ?</h3>
  <p>नहीं। Email servers में replicate होता है, backed up होता है, archived होता है, और forwarded होता है। "Send के बाद delete" सिर्फ़ आपकी local copy delete करता है और उन dozens of other places के बारे में कुछ नहीं करता जहाँ message exist करता है। अलग channel use करें।</p>

  <h3>अगर recipient password भूल जाए तो क्या होगा?</h3>
  <p>आप password को secure channel से re-send करते हैं। अगर उन्होंने file और password दोनों खो दिए हैं, आप अपना original नए password से re-encrypt करते हैं और re-send करते हैं। Password-protected PDF का कोई recovery code या master key नहीं है।</p>

  <h3>क्या encryption PDF का file size change करेगा?</h3>
  <p>थोड़ा। Encryption security handshake metadata के लिए कुछ hundred bytes add करता है। Actual content in place encrypted होता है, इसलिए 5 MB PDF लगभग 5.001 MB बन जाता है। आपको email size limit के पार push करने के लिए काफ़ी नहीं।</p>

  <h3>क्या recipient open करने के बाद password remove कर सकता है?</h3>
  <p>हाँ। एक बार उनके पास password है, वे किसी भी standard PDF tool से encryption remove कर सकते हैं। अगर आपको persistent protection चाहिए जो recipient की actions survive करे, अकेले encryption answer नहीं है। इसे watermarks और clear access policy के साथ combine करें, और high-value distribution के लिए DRM tools consider करें।</p>

  <h2>अभी try करें</h2>

  <p>पहले file lock करें, फिर key अलग door से भेजें। <a href="/hi/pdf-security/protect/">PDF protection tool</a> खोलें और अपना document encrypt करें, फिर email पर send hit करने से पहले password को Signal, SMS, या अपने password manager के share link में drop करें।</p>
