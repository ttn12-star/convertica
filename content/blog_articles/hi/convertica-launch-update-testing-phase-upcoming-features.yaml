excerpt_hi: Convertica 8 दिसंबर को लाइव हुई और अभी एक्टिव टेस्टिंग में है। हम बता रहे हैं कि अभी किस पर काम चल रहा है, फीडबैक कैसे भेजें और अगले अपडेट में क्या आएगा।
content_hi: |
  <p>टीम की ओर से एक छोटा अपडेट: <strong>Convertica 8 दिसंबर को लाइव हो गई</strong>, और अब सभी टूल हर किसी के लिए खुले हैं। पहले कुछ दिनों में इसे आज़माने वाले सभी लोगों का धन्यवाद।</p>

  <h2>हम अभी भी एक्टिव टेस्टिंग में हैं</h2>

  <p>हम देख रहे हैं कि असली इस्तेमाल में प्लेटफ़ॉर्म कैसा व्यवहार करता है, और हम ईमानदारी से मानते हैं कि अभी शुरुआती दौर है। फ़िलहाल आपको ये चीज़ें मिल सकती हैं:</p>

  <ul>
    <li>कोई टूल जो आपकी उम्मीद से अलग व्यवहार करे</li>
    <li>कोई कन्वर्ज़न जिसे अभी और बेहतर करना बाकी है</li>
    <li>कभी-कभार कोई छोटा बग या खुरदुरा किनारा</li>
  </ul>

  <p>लॉन्च के तुरंत बाद इसमें कुछ भी असामान्य नहीं है, और आपकी हर रिपोर्ट हमें चीज़ें तेज़ी से ठीक करने में मदद करती है।</p>

  <h2>बताइए क्या काम नहीं कर रहा</h2>

  <p>अगर कुछ काम न करे, या आपके पास कोई सुझाव हो कि हमें आगे क्या बनाना चाहिए, तो उसे कॉन्टैक्ट फ़ॉर्म के ज़रिए हमें भेजें। हम हर मैसेज पढ़ते हैं, रिपोर्ट की गई समस्याओं को दोहराने की कोशिश करते हैं, और आपकी बात के आधार पर तय करते हैं कि पहले क्या ठीक करना है। शुरुआती फीडबैक सचमुच यह तय करता है कि Convertica किस दिशा में जाए।</p>

  <h2>एक बड़ा अपडेट आ रहा है</h2>

  <p>हम पहले से ही एक बड़े रिलीज़ पर काम कर रहे हैं, जो <strong>जनवरी के अंत से फरवरी की शुरुआत</strong> के लिए तय है। इसमें नई सुविधाएँ, बेहतर परफ़ॉर्मेंस और कुल मिलाकर ज़्यादा सहज अनुभव मिलेगा। तारीख के करीब हम एक फ़ॉलो-अप पोस्ट लिखेंगे जिसमें बताएँगे कि नया क्या है।</p>

  <h2>टूल आज़माएँ</h2>

  <figure><img src="/static/blog/images/tool-all-tools-hero.jpg" alt="Convertica के ऑनलाइन PDF टूल का अवलोकन" width="1280" height="800" loading="lazy"></figure>

  <p>इस बीच, सब कुछ लाइव है और मुफ़्त है। पूरा सेट <a href="/hi/all-tools/">सभी टूल</a> पेज पर देखें, या सीधे कोई आम टूल खोलें जैसे <a href="/hi/pdf-to-word/">PDF से Word</a>। कहीं अटकें तो हमें बताएँ। शुरुआत से हमारे साथ होने के लिए धन्यवाद।</p>
