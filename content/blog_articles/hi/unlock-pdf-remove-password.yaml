  आप एक PDF खोलने जाते हैं और वह एक line दिखाने से पहले ही password माँग लेती है। या वह तुरंत खुल जाती है, normal दिखती है, और फिर चुपचाप मना कर देती है जब आप कोई paragraph copy करने या print दबाने जाते हैं। दोनों protected files हैं, पर दोनों दो बिलकुल अलग तरीकों से locked हैं, और fix इस पर निर्भर करता है कि आप किस lock से जूझ रहे हैं। यह guide इस difference को आसान शब्दों में समझाती है और दिखाती है कि जिस file को खोलने का हक़ आपके पास है, उससे password remove kaise kare।

  <h2>PDF के लिए "locked" का असल मतलब क्या है</h2>

  <p>एक PDF दो अलग passwords रख सकती है, और ज़्यादातर confusion इन्हें एक ही चीज़ मान लेने से पैदा होता है।</p>

  <ul>
    <li><strong>Open password</strong> (इसे user password भी कहते हैं)। इसके बिना file खुलेगी ही नहीं। Content encrypted होता है, इसलिए सही password type किए बिना reader के पास दिखाने को कुछ नहीं होता। यही वह password है जो file पर double-click करते ही सामने आ जाता है।</li>
    <li><strong>Owner password</strong> (इसे permissions password भी कहते हैं)। File बिना किसी prompt के खुल जाती है, पर author ने कुछ actions बंद कर रखे होते हैं: text copy करना, print करना, edit करना, forms भरना, या pages निकालना। आप उसे पढ़ सकते हैं, फिर भी जो buttons चाहिए वे greyed out रहते हैं।</li>
  </ul>

  <p>एक ही PDF में इनमें से एक, दूसरा, या दोनों हो सकते हैं। आपके पास कौन सा है यह जानते ही पता चल जाता है कि कितना काम बाकी है। जिस file को आप पहले से खोल पा रहे हैं, उससे owner password हटाना तेज़ है। जो open password आप नहीं जानते उसे पार करना अलग बात है, और अक्सर design के हिसाब से नामुमकिन, जो कि encryption का पूरा मक़सद है।</p>

  <h2>Case 1: आप password जानते हैं और बार-बार पूछे जाने से थक चुके हैं</h2>

  <p>यह सबसे आम case है। किसी colleague ने आपको password भेजा, या आपने ख़ुद set किया, और अब हर बार file खुलते वक़्त उसे type करते-करते परेशान हैं। आपको एक साफ़ copy चाहिए जिसमें कोई password ही न हो।</p>

