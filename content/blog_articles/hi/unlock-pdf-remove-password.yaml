  <h2>Case 2: file खुलती है पर copy, print, या edit रोक देती है</h2>

  <p>यहाँ PDF में सिर्फ़ owner password है। आप उसे पढ़ सकते हैं, यानी आपके पास पहले से legitimate access है, पर author ने कुछ actions disable कर दिए हैं। अगर यह आपकी अपनी document है, या ऐसी है जिस पर काम करने की आपको इजाज़त है, तो इन restrictions को हटाना सीधा-सा है: उसे उसी <a href="/hi/pdf-security/unlock/">Unlock PDF</a> tool से चलाएँ और permissions बहाल हुई copy download कर लें। कोई password prompt नहीं आता, क्योंकि आपको उसे खोलने से तो पहले कभी रोका ही नहीं गया था।</p>

  <p>इस type पर एक ईमानदार बात। Owner-password restrictions कभी मज़बूत protection थे ही नहीं। कई PDF readers इन्हें अनदेखा कर देते हैं, और format ख़ुद इन्हें एक दीवार की जगह एक request की तरह लेता है। इसलिए अगर आपका मक़सद किसी document को सचमुच protect करना है, तो restrictions ग़लत tool हैं। सही तरीका नीचे बताया गया है।</p>

  <h2>Case 3: file आपकी है पर open password भूल गए</h2>

  <p>यह मुश्किल case है, और यहाँ realistic रहना मदद करता है। अगर किसी PDF में modern encryption वाला असली open password है, तो उस password के बिना content पढ़ा ही नहीं जा सकता। कोई secret unlock button नहीं है, और जो site seconds में strong encryption तोड़ने का दावा करती है वह या तो झूठ बोल रही है या background में हर common password आज़मा रही है, जो सिर्फ़ कमज़ोर passwords पर ही चलता है।</p>

  <p>इसलिए कुछ और करने से पहले, अपने कदम दोबारा देखें:</p>

  <ul>
    <li>जिस email या message के साथ file आई थी उसे check करें। Open passwords अक्सर document के ठीक साथ ही share किए जाते हैं।</li>
    <li>अपने password manager में देखें। अगर password आपने set किया था, तो वहाँ save हो सकता है।</li>
    <li>जिसने file बनाई या भेजी उससे पूछें। Work documents के लिए author या आपकी IT team आमतौर पर एक open copy दोबारा जारी कर सकती है।</li>
    <li>अगर PDF आपने ख़ुद किसी दूसरे program से export की थी, तो locked copy से लड़ने के बजाय उसे source file से फिर से generate करें।</li>
  </ul>

  <p>अगर password सचमुच जा चुका है और encryption असली है, तो समझदारी की बात यह है कि file पर हमला करने के बजाय source से एक ताज़ा copy ले ली जाए। यह किसी एक tool की कमी नहीं है, encryption को इसी तरह काम करना चाहिए।</p>

  <h2>क्या PDF unlock करना legal है?</h2>

  <p>Password हटाना ठीक है जब document आपकी हो या उसे खोलने की आपको इजाज़त हो: आपके अपने scans, वे files जो किसी client ने आपको काम के लिए भेजीं, आपकी team की रिपोर्ट्स। यह ठीक नहीं है कि किसी और की confidential file, किसी paid ebook, या ऐसी किसी चीज़ की protection bypass की जाए जिस तक पहुँचने का हक़ आपको नहीं था। Tool यह मानकर चलता है कि file पर आपका हक़ है, और उस भरोसे को निभाना आपके ज़िम्मे है।</p>

