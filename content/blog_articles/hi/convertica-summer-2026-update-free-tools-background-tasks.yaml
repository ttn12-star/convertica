slug: convertica-summer-2026-update-free-tools-background-tasks
title_hi: 'Convertica में नया क्या है: और मुफ़्त टूल, बैकग्राउंड टास्क और सेव किए वर्कफ़्लो'
meta_title_hi: 'गर्मी 2026 के अपडेट | Convertica'
meta_description_hi: 'पाँच टूल Premium से बाहर आ गए, टूल-दर-टूल पेवॉल की जगह एक साझा दैनिक सीमा आई, दो नए कन्वर्टर जुड़े, और Premium अब टैब बंद करने के बाद भी काम पूरा करता है।'
meta_keywords_hi: 'convertica अपडेट, मुफ़्त pdf टूल, heic से jpg मुफ़्त, pdf से markdown, epub से pdf मुफ़्त, pdf पर हस्ताक्षर ऑनलाइन, pdf से टेक्स्ट, pdf से pdf/a कन्वर्टर, फोटो पर पासवर्ड, बैकग्राउंड कन्वर्ज़न, सेव किए वर्कफ़्लो'
excerpt_hi: 'पाँच टूल अब Premium नहीं माँगते, दो नए कन्वर्टर आए हैं, और Premium टैब बंद होने पर भी काम जारी रखता है। इस गर्मी में जो कुछ बदला, वह सब यहाँ है।'
content_hi: |
  <p>पिछली न्यूज़ पोस्ट के बाद से हमने बहुत कुछ जारी किया है। संक्षेप में: पाँच टूल Premium से बाहर आ गए, दो नए कन्वर्टर जुड़े, और Premium ने सीखा कि आपके टैब बंद करने के बाद भी काम कैसे पूरा किया जाए। अब विस्तार से।</p>

  <h2>पाँच टूल अब मुफ़्त हैं</h2>
  <p>पहले इनके लिए Premium सब्सक्रिप्शन चाहिए था। अब नहीं:</p>
  <ul>
    <li><a href="/hi/image/heic-to-jpg/">HEIC से JPG</a> (iPhone की फ़ोटो)</li>
    <li><a href="/hi/pdf-to-markdown/">PDF से Markdown</a></li>
    <li><a href="/hi/epub-to-pdf/">EPUB से PDF</a> और <a href="/hi/pdf-to-epub/">PDF से EPUB</a></li>
    <li><a href="/hi/pdf-to-text/">PDF से टेक्स्ट</a></li>
    <li><a href="/hi/pdf-edit/sign/">PDF पर हस्ताक्षर</a></li>
  </ul>
  <p>टूल-दर-टूल पेवॉल भी हटा दी गई हैं। उनकी जगह अब पूरी साइट के सभी टूल पर एक साझा दैनिक सीमा लागू है: बिना अकाउंट <strong>10 कन्वर्ज़न प्रतिदिन</strong>, मुफ़्त अकाउंट के साथ <strong>40 प्रतिदिन</strong>, और Premium पर कोई सीमा नहीं। सिर्फ़ सफल कन्वर्ज़न गिने जाते हैं, और काउंटर हर दिन रीसेट होता है। बैच प्रोसेसिंग, OCR और बहुत बड़ी फ़ाइलें Premium में ही रहेंगी।</p>

  <h2>नया: फ़ोटो पर पासवर्ड लगाइए</h2>
  <p>पासपोर्ट का स्कैन या किसी दस्तावेज़ की फ़ोटो भेजनी है? <a href="/hi/image/password-protect-image/">इमेज सुरक्षित करें</a> एक या कई तस्वीरों को AES-256 एन्क्रिप्शन वाली एक PDF में बदल देता है। फ़ाइल पाने वाला उसे पासवर्ड के बिना नहीं खोल पाएगा। बाकी इमेज टूल की तरह यह भी मुफ़्त है।</p>

  <figure><img src="/static/images/tools/image-password-protect-image.jpg" alt="इमेज सुरक्षित करें टूल: फ़ोटो पासवर्ड वाली PDF बन जाती हैं" width="1200" height="750" loading="lazy"></figure>

  <h2>नया: अभिलेखागार के लिए PDF से PDF/A</h2>
  <p>अदालतें, विश्वविद्यालय और सरकारी पोर्टल अक्सर केवल PDF/A स्वीकार करते हैं, जो दीर्घकालिक संग्रहण का ISO फ़ॉर्मैट है। नया <a href="/hi/pdf-to-pdfa/">PDF से PDF/A कन्वर्टर</a> PDF/A-1b, 2b या 3b बनाता है और फ़ाइल देने से पहले जाँचता है कि नतीजा वाक़ई मानक के अनुरूप घोषित है। यह Premium का हिस्सा है।</p>

  <h2>Premium: टैब बंद कीजिए, काम हम पूरा करेंगे</h2>
  <p>मोटे स्कैन पर OCR जैसे लंबे काम अब तक आपके ब्राउज़र टैब को बंधक बनाए रखते थे। अब Premium उपयोगकर्ता किसी भी लंबे कन्वर्ज़न को बैकग्राउंड में भेजकर अपने काम में लग सकते हैं। काम पूरा होते ही:</p>
  <ul>
    <li>नतीजा ईमेल से आता है (10 MB तक अटैचमेंट, उससे बड़ा हो तो डाउनलोड लिंक),</li>
    <li>ब्राउज़र पुश नोटिफ़िकेशन दिखाता है, भले ही आप किसी और साइट पर हों,</li>
    <li>फ़ाइल आपके नए कन्वर्ज़न इतिहास में मिल जाती है।</li>
  </ul>
  <p>पूरा ब्यौरा <a href="/hi/background-tasks/">बैकग्राउंड टास्क पेज</a> पर है।</p>

  <figure><img src="/static/images/tools/background-tasks.jpg" alt="बैकग्राउंड टास्क कतार: टैब बंद होने के बाद भी कन्वर्ज़न चलता रहता है" width="1200" height="750" loading="lazy"></figure>

  <h2>Premium: सेव किए वर्कफ़्लो</h2>
  <p>हर शुक्रवार एक जैसी सेटिंग से इनवॉइस कंप्रेस करते हैं? टूल को उसकी सेटिंग समेत वर्कफ़्लो के रूप में सेव कीजिए और एक क्लिक में सब कुछ खोलिए। वर्कफ़्लो आपके ब्राउज़र में रहते हैं और अकाउंट के ज़रिए सिंक होते हैं: दफ़्तर में सेव किया प्रीसेट घर के लैपटॉप पर भी दिखेगा। ज़्यादा जानकारी <a href="/hi/saved-workflows/">सेव किए वर्कफ़्लो पेज</a> पर।</p>

  <figure><img src="/static/images/tools/saved-workflows.jpg" alt="टूल प्रीसेट के साथ सेव किए वर्कफ़्लो का डैशबोर्ड" width="1200" height="750" loading="lazy"></figure>

  <h2>PDF सुरक्षा: तय कीजिए कि पढ़ने वाला क्या कर सकता है</h2>
  <p><a href="/hi/pdf-security/protect/">PDF सुरक्षित करें</a> पहले की तरह मुफ़्त में फ़ाइलों को AES-256 से एन्क्रिप्ट करता है। Premium इसके ऊपर अनुमति नियंत्रण जोड़ता है: सुरक्षित फ़ाइल की छपाई, कॉपी या संपादन रोका जा सकता है।</p>

  <h2>Convertica अब ऐप की तरह</h2>
  <p>Convertica अब फ़ोन या कंप्यूटर पर आम ऐप की तरह इंस्टॉल होता है: होम स्क्रीन पर आइकन, अपनी अलग विंडो, ब्राउज़र का कोई झंझट नहीं। किसी ऐप स्टोर की ज़रूरत नहीं। <a href="/hi/install/">इंस्टॉलेशन गाइड</a> में iPhone, Android, Windows और Mac सब शामिल हैं।</p>

  <h2>तेज़, शांत, दुरुस्त</h2>
  <ul>
    <li>पेज साफ़ तौर पर तेज़ी से खुलते हैं; ज़्यादातर अब PageSpeed में लगभग पूरे अंक पाते हैं।</li>
    <li>हमने बाहरी एनालिटिक्स हटा दिया। विज़िट अब हमारा अपना कुकी-रहित काउंटर गिनता है।</li>
    <li>हर टूल पेज पर अब इंटरफ़ेस का स्क्रीनशॉट दिखता है, और कई पर छोटे वीडियो ट्यूटोरियल हैं।</li>
    <li>वह बग ठीक कर दिया गया जिसकी वजह से कुछ अरबी भाषी उपयोगकर्ताओं को कन्वर्टर पेज खाली दिखते थे, साथ ही दर्जनों छोटे सुधार भी हुए।</li>
  </ul>

  <h2>आज़माइए</h2>
  <p>ऊपर लिखा सब कुछ लाइव है। <a href="/hi/all-tools/">सभी टूल</a> देखिए, और अगर कुछ गड़बड़ लगे तो <a href="/hi/contact/">संपर्क फ़ॉर्म</a> से बताइए। इस रिलीज़ का आधा हिस्सा आपकी ही रिपोर्टों से निकला है।</p>
