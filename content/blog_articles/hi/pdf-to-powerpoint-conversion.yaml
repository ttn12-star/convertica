  कोई colleague एक slide deck भेजता है, पर वह PDF की तरह आती है, और अब आपको दो numbers बदलने और एक logo swap करना है। PDFs इसलिए बनी हैं कि हर जगह एक जैसी दिखें, edit होने के लिए नहीं, इसलिए आप बस किसी slide पर click करके type नहीं कर सकते। PDF को वापस PowerPoint में convert करने से आपको फिर editable slides मिल जाती हैं। यहाँ जानें यह कैसे करें, और साथ में एक ईमानदार नज़र कि result कब साफ़ आता है और कब उसे थोड़ा सँवारना पड़ता है।

  <h2>PDF पहली जगह editable क्यों नहीं होती</h2>

  <p>जब कोई PowerPoint deck को PDF में export करता है, तो slides fixed pages में flatten हो जाती हैं। Text, shapes, और images अपनी जगह जम जाते हैं ताकि file किसी भी screen पर एक जैसी दिखे। यह sharing के लिए बढ़िया और editing के लिए बेकार है। PowerPoint में वापस conversion उसी flattening को उलटने की कोशिश करता है: यह हर page को एक slide की तरह फिर बनाता है और जमे हुए elements को वापस उन text boxes तथा images में बदलता है जिन्हें आप हिला और बदल सकते हैं।</p>

  <h2>एक ही चीज़ तय करती है कि result कितना साफ़ होगा</h2>

  <p>सभी PDFs एक जैसी convert नहीं होतीं, और बात इस पर आती है कि PDF बनी कैसे थी।</p>

  <ul>
    <li><strong>PowerPoint (या Keynote, या Google Slides) से export की गई PDF</strong> अच्छी convert होती है। Text असली, selectable text होता है, इसलिए वह editable text boxes के रूप में वापस आता है और layout original के क़रीब रहता है।</li>
    <li><strong>Scanned PDF या slides की photo</strong> एक image है। recover करने लायक कोई असली text नहीं होता, इसलिए conversion OCR पर टिकता है और result को ज़्यादा सफ़ाई चाहिए। formatting को हाथ से ठीक करने की उम्मीद रखें।</li>
    <li><strong>भारी design वाली PDF</strong>, custom fonts और पेचीदा layouts के साथ, convert तो होगी, पर fonts बदल सकते हैं और elements खिसक सकते हैं, क्योंकि converter जो उपलब्ध है उसी से दोबारा बना सकता है।</li>
  </ul>

  <p>झटपट test हमेशा वही है: PDF में text की एक line select करने की कोशिश करें। अगर वह highlight होती है, तो आप अच्छी हालत में हैं।</p>

