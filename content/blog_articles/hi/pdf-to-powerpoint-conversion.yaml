    <li><strong>Font swaps।</strong> अगर कोई custom font embed नहीं था, तो PowerPoint सबसे मिलता-जुलता match रख देता है। slide master से अपना brand font दोबारा लगाएँ और वह पूरे deck में बह जाता है।</li>
    <li><strong>खिसके हुए elements।</strong> कोई logo या text box कुछ pixels इधर-उधर बैठ सकता है। उसे वापस अपनी जगह drag करें; content पूरा वहीं है, बस align करना है।</li>
