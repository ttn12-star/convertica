content_hi: |
  किसी भी वेबसाइट पर कोई अनुबंध, सैलरी स्लिप या पासपोर्ट का स्कैन डालने से पहले "क्या यह सुरक्षित है?" पूछना सही सवाल है। यह सवाल Convertica से पूछिए, और हर दूसरे ऑनलाइन टूल से भी पूछिए। यह पेज इसका ईमानदार जवाब देता है: आपकी फ़ाइल के साथ क्या होता है, हम उसके साथ क्या करते हैं और क्या नहीं, और आप किसी की बात पर भरोसा करने के बजाय यह जवाब खुद कैसे जाँच सकते हैं।

  "आपकी गोपनीयता हमारे लिए मायने रखती है" जैसी धुंधली भराई नहीं। बस असली तंत्र।

  <figure><img src="/static/blog/images/tool-pdf-protect-hero.jpg" alt="एन्क्रिप्टेड HTTPS कनेक्शन पर दिखाए गए Convertica के PDF टूल" width="1280" height="800" loading="lazy"></figure>

  <h2>अपलोड करने पर आपकी फ़ाइल के साथ क्या होता है</h2>

  जब आप कोई फ़ाइल चुनकर रूपांतरण शुरू करते हैं, तो शुरू से आख़िर तक उसका जीवनचक्र यह है:

  <ol>
    <li>आपकी फ़ाइल आपके डिवाइस से निकलकर एन्क्रिप्टेड कनेक्शन (HTTPS) पर हमारे सर्वर तक जाती है।</li>
    <li>सर्वर पर एक कार्यशील प्रति सिर्फ़ इसलिए आती है ताकि रूपांतरण इंजन के पास पढ़ने को कुछ हो।</li>
    <li>टूल अपना काम करता है — रूपांतरण, संपीड़न, विलय, सुरक्षा, जो भी आपने माँगा।</li>
    <li>आप परिणाम डाउनलोड करते हैं।</li>
    <li>अपलोड की गई फ़ाइल और बना हुआ परिणाम थोड़ी देर बाद अपने आप हटा दिए जाते हैं।</li>
  </ol>

  बस यही पूरी कहानी है। ऐसा कोई चरण नहीं जहाँ कोई व्यक्ति आपका दस्तावेज़ खोले, कोई चरण नहीं जहाँ वह स्थायी पुस्तकालय में दर्ज हो, और कोई चरण नहीं जहाँ उसकी सामग्री विज्ञापन या एनालिटिक्स के लिए पढ़ी जाए। फ़ाइलें सॉफ़्टवेयर संभालता है, काम भर के समय के लिए, और फिर साफ़ कर दी जाती हैं।

  हम इसे जानबूझकर सामान्य रूप में बता रहे हैं, मिनटों की सटीक संख्या नहीं, क्योंकि जो जवाब मायने रखता है वह व्यावहारिक है: आपकी फ़ाइल टिकने के लिए नहीं है, और वह टिकती भी नहीं। हज़ारों अजनबियों के दस्तावेज़ रखना हमारा स्टोरेज-ख़र्च बढ़ाएगा और बदले में कुछ नहीं देगा, इसलिए हम ऐसा नहीं करते।

  <h2>ट्रांज़िट में एन्क्रिप्शन: HTTPS वाला हिस्सा</h2>

  सबसे अहम तकनीकी तथ्य यह है कि अपलोड और डाउनलोड दोनों HTTPS पर होते हैं। यह वही ट्रांसपोर्ट-लेयर एन्क्रिप्शन (TLS) है जो आपके बैंक की वेबसाइट इस्तेमाल करती है। सीधे शब्दों में, आपकी फ़ाइल के बाइट आपके डिवाइस और सर्वर के बीच यात्रा के दौरान घुले-मिले रहते हैं, इसलिए कॉफ़ी-शॉप के Wi-Fi पर ट्रैफ़िक ताकने वाला या बीच के नेटवर्क पर बैठा कोई व्यक्ति आपके दस्तावेज़ की जगह सिफ़र-टेक्स्ट देखता है।

  आप इसे खुद दो सेकंड में पक्का कर सकते हैं: एड्रेस बार देखिए। अगर URL <code>https://</code> से शुरू होता है और ब्राउज़र ताला दिखाता है, तो कनेक्शन एन्क्रिप्टेड है। अगर कभी <code>http://</code> बिना <strong>s</strong> के दिखे, तो रुक जाइए और कुछ भी संवेदनशील अपलोड मत कीजिए — न हमें, न किसी और को।

  समझने लायक एक ईमानदार चेतावनी: HTTPS फ़ाइल को <em>ट्रांज़िट में</em> सुरक्षित रखता है। यह एंड-टू-एंड एन्क्रिप्शन जैसा नहीं है, जहाँ कुंजी सिर्फ़ आपके पास हो। फ़ाइल को बदलने के लिए सर्वर को उसे पढ़ पाना ही होगा — किसी भी सर्वर-साइड टूल के लिए यह अटल है। सर्वर की ओर आपको कहानी का दूसरा आधा हिस्सा बचाता है: फ़ाइल प्रोसेस होकर हटा दी जाती है, रखी नहीं जाती।

  <h2>स्वतः हटाव, अनिश्चितकालीन भंडारण नहीं</h2>

  आश्वस्त करने वाला हिस्सा कोई वादा नहीं, बल्कि स्वयं डिज़ाइन है। Convertica एक-बार-इस्तेमाल वाली, अल्पजीवी फ़ाइलों के इर्द-गिर्द बनी है:

  <ul>
    <li>अपलोड किया मूल उतनी ही देर मौजूद रहता है जितनी प्रोसेस करने को चाहिए।</li>
    <li>रूपांतरित परिणाम उतनी ही देर मौजूद रहता है जितनी आपको डाउनलोड करने को चाहिए।</li>
    <li>दोनों बाद में अपने आप हट जाते हैं — इसके लिए आपको कुछ क्लिक नहीं करना पड़ता।</li>
    <li>हम आपके दस्तावेज़ों का खोज-योग्य संग्रह नहीं बनाते, और रखने के लिए उनका छिपा हुआ बैकअप भी नहीं बनाते।</li>
  </ul>

  इसीलिए Convertica पर कोई "मेरी फ़ाइलें" पेज नहीं है: दिखाने को कोई पुस्तकालय ही नहीं, क्योंकि कुछ रखा ही नहीं जाता। अगर कभी यह एक छूटी हुई सुविधा-सी लगे, तो असल में वह गोपनीयता की गारंटी अपना काम कर रही है।

  <h2>कोई खाता नहीं, कोई प्रोफ़ाइल नहीं, दस्तावेज़ों की कोई ट्रैकिंग नहीं</h2>

  मुफ़्त टूल इस्तेमाल करने के लिए आप खाता नहीं बनाते, और यह जानबूझकर है। कोई साइन-अप न होने का मतलब:

  <ul>
    <li>फ़ाइल बदलने से पहले कोई ईमेल या पासवर्ड देने की ज़रूरत नहीं।</li>
    <li>कोई निजी प्रोफ़ाइल नहीं जो दस्तावेज़ को आपकी पहचान से जोड़े।</li>
    <li>"आप" के नाम सहेजा गया कोई रूपांतरण इतिहास नहीं।</li>
    <li>प्रोफ़ाइल बनाने या किसी को बेचने के लिए आपके दस्तावेज़ों की सामग्री का कोई विश्लेषण नहीं।</li>
  </ul>

  हम आपकी फ़ाइलें न बेचते हैं न साझा करते हैं। हमारा मॉडल सरल और जानबूझकर उबाऊ है: मुख्य टूल मुफ़्त हैं, और जिन्हें ज़्यादा चाहिए (बड़ी फ़ाइलें, बैच काम, बिना इंतज़ार) वे प्रीमियम के लिए भुगतान कर सकते हैं। पैसा वहीं से आता है, आपके दस्तावेज़ों से नहीं।

  <h2>आपको खुद पासवर्ड कब जोड़ना चाहिए</h2>

  यह वह हिस्सा है जिसे ज़्यादातर "क्या यह सुरक्षित है" पेज छोड़ देते हैं, क्योंकि यह कुछ ज़िम्मेदारी वापस आप पर डालता है। ट्रांज़िट में एन्क्रिप्शन और स्वतः हटाव अपलोड-और-प्रोसेस वाले पल को संभालते हैं। डाउनलोड करने के <em>बाद</em> आपकी फ़ाइल कहाँ जाती है, इस बारे में वे कुछ नहीं करते — वह ईमेल जिसमें आप उसे जोड़ते हैं, वह साझा ड्राइव जहाँ आप उसे डालते हैं, वह सहकर्मी जिसे आप उसे अग्रेषित करते हैं।

  सचमुच संवेदनशील सामग्री के लिए, अपना पासवर्ड जोड़िए ताकि सुरक्षा <em>फ़ाइल के साथ-साथ</em> यात्रा करे:

  <ul>
    <li>अनुबंध, NDA और हस्ताक्षरित समझौते।</li>
    <li>सैलरी स्लिप, बैंक स्टेटमेंट और टैक्स दस्तावेज़।</li>
    <li>पहचान-पत्र, पासपोर्ट या मेडिकल रिकॉर्ड के स्कैन।</li>
    <li>ऐसा कुछ भी जिसे ग़लत इनबॉक्स में अग्रेषित होते देखना आपको असहज करे।</li>
  </ul>

  साझा करने से पहले फ़ाइल को AES-256 एन्क्रिप्शन से बंद करने के लिए <a href="/hi/pdf-security/protect/">PDF को पासवर्ड से सुरक्षित करने वाला</a> टूल इस्तेमाल कीजिए। अब अगर फ़ाइल कहीं ग़लत जगह पहुँच भी जाए, तो कुंजी के बिना वह अपठनीय है। जब दस्तावेज़ अपना काम कर चुके और आपको उसे फिर संपादित करना हो, तो आप <a href="/hi/pdf-security/unlock/">अपने PDF से पासवर्ड हटा</a> सकते हैं। पूरा तरीका — जिसमें सबसे आम ग़लती, यानी फ़ाइल के साथ ही उसी संदेश में पासवर्ड भेजना, भी शामिल है — <a href="/hi/blog/password-protect-pdf-before-emailing/">ईमेल भेजने से पहले PDF को पासवर्ड से कैसे सुरक्षित करें</a> में है। अगर आप कई फ़ाइलें एक साथ पैक कर रहे हैं, तो यही तर्क आर्काइव पर भी लागू होता है: यह रहा <a href="/hi/blog/how-to-password-protect-a-zip-file/">ZIP फ़ाइल को पासवर्ड से कैसे सुरक्षित करें</a>।

  <h2>किसी भी ऑनलाइन PDF टूल को कैसे परखें (इसे भी)</h2>

  किसी सुरक्षा दावे पर सिर्फ़ इसलिए भरोसा मत कीजिए कि पेज पर सुंदर फ़ॉन्ट में "secure" लिखा है। कुछ अहम अपलोड करने से पहले किसी भी टूल पर यह त्वरित चेकलिस्ट चलाइए — इसमें एक मिनट से कम लगता है और यह सिर्फ़ हमारी नहीं, हर साइट पर काम करती है।

  <ul>
    <li><strong>HTTPS जाँचिए.</strong> एड्रेस बार में ताला, URL <code>https://</code> से शुरू। ताला नहीं, तो अपलोड नहीं।</li>
    <li><strong>हटाव की नीति खोजिए.</strong> भरोसेमंद टूल किसी पहुँच-योग्य जगह बताता है कि अपलोड की गई फ़ाइलें प्रोसेसिंग के बाद हटा दी जाती हैं। धुंधला या नदारद? इसे "अनिश्चितकाल तक रखी जाती हैं" मानकर उसी हिसाब से चलिए।</li>
    <li><strong>देखिए कि खाता ज़बरदस्ती है या नहीं.</strong> साधारण रूपांतरण से पहले रजिस्टर करवाना और ईमेल सत्यापित करवाना फ़ाइल को आपकी पहचान से जोड़ देता है। बिना-खाता विकल्प गोपनीयता के लिहाज़ से टूल के पक्ष में एक अंक है।</li>
    <li><strong>पढ़िए कि वे डेटा बेचने या साझा करने के बारे में क्या कहते हैं.</strong> गोपनीयता नीति में साफ़ लिखा होना चाहिए कि फ़ाइलें न बेची जाती हैं न तीसरे पक्ष को दी जाती हैं। यह कथन न मिले? उल्टा मान लीजिए।</li>
    <li><strong>संवेदनशीलता को तरीके से मिलाइए.</strong> सचमुच गोपनीय दस्तावेज़ों के लिए, सबसे सुरक्षित अक्सर वह टूल होता है जो फ़ाइल आपके ब्राउज़र में ही प्रोसेस करे, या बस फ़ाइल को डिवाइस छोड़ने से पहले पासवर्ड से सुरक्षित कर देना।</li>
  </ul>

  <blockquote class="callout">एक आदत जो आपको हर जगह बचाती है: हर संवेदनशील चीज़ के लिए, अपलोड या साझा करने से <em>पहले</em> फ़ाइल को पासवर्ड से सुरक्षित कीजिए। तब टूल की नीतियाँ, ईमेल सर्वर का भंडारण-काल और प्राप्तकर्ता की आदतें बहुत कम मायने रखती हैं, क्योंकि उस कुंजी के बिना फ़ाइल अपठनीय है जिसे आप नियंत्रित करते हैं।</blockquote>

  Convertica जो भी काम करता है उनका पूरा सेट आप <a href="/hi/all-tools/">सभी टूल</a> पेज पर देख सकते हैं — रूपांतरण, संपीड़न, विलय, विभाजन, सुरक्षा, अनलॉक और बहुत कुछ।

  <h2>सामान्य प्रश्न</h2>

  <h3>क्या गोपनीय दस्तावेज़ों के लिए Convertica सुरक्षित है?</h3>
  <p>ज़्यादातर दस्तावेज़ों के लिए हाँ: फ़ाइलें एन्क्रिप्टेड HTTPS कनेक्शन पर अपलोड होती हैं, सिर्फ़ रूपांतरण के दौरान प्रोसेस होती हैं और बाद में अपने आप हट जाती हैं, बिना खाते के और आपका डेटा बेचे बिना। सचमुच गोपनीय सामग्री के लिए, अपने नियंत्रण वाली एक परत जोड़िए — अपलोड या साझा करने से पहले फ़ाइल को पासवर्ड से सुरक्षित कीजिए — ताकि वह आगे जहाँ भी जाए, सुरक्षित रहे।</p>

  <h3>क्या Convertica रूपांतरण के बाद मेरी फ़ाइलें रखता है?</h3>
  <p>नहीं। अपलोड की गई फ़ाइल और रूपांतरित परिणाम काम पूरा होने के थोड़ी देर बाद अपने आप हट जाते हैं। कोई दस्तावेज़ पुस्तकालय नहीं, कोई स्थायी संग्रह नहीं, और कोई छिपा बैकअप नहीं रखा जाता। इसीलिए साइट पर कोई "मेरी फ़ाइलें" इतिहास नहीं है।</p>

  <h3>क्या Convertica इस्तेमाल करने के लिए खाता चाहिए?</h3>
  <p>नहीं। मुख्य टूल बिना साइन-अप के चलते हैं। फ़ाइल बदलने के लिए कोई ईमेल या पासवर्ड ज़रूरी नहीं, और कुछ भी दस्तावेज़ को निजी प्रोफ़ाइल से नहीं जोड़ता। ऊँची सीमाओं और बैच प्रोसेसिंग के लिए प्रीमियम प्लान मौजूद हैं, पर वे वैकल्पिक हैं।</p>

  <h3>क्या अपलोड के दौरान मेरी फ़ाइल एन्क्रिप्ट होती है?</h3>
  <p>कनेक्शन होता है। अपलोड और डाउनलोड HTTPS पर चलते हैं — वही TLS ट्रांसपोर्ट एन्क्रिप्शन जो बैंक इस्तेमाल करते हैं — इसलिए डिवाइस और सर्वर के बीच यात्रा के दौरान फ़ाइल घुली-मिली रहती है। यह <em>ट्रांज़िट में</em> एन्क्रिप्शन है। सर्वर फ़ाइल को बदलने के लिए फिर भी पढ़ता है, जो किसी भी सर्वर-साइड टूल के लिए सामान्य है — उस ओर आपकी सुरक्षा स्वतः हटाव है। एंड-टू-एंड गोपनीयता के लिए, पहले खुद फ़ाइल को पासवर्ड से सुरक्षित कीजिए।</p>

  <h3>किसी ऑनलाइन PDF टूल पर भरोसा किया जाए या नहीं, यह कैसे जाँचूँ?</h3>
  <p>HTTPS देखिए (एड्रेस बार में ताला), यह घोषित नीति खोजिए कि फ़ाइलें प्रोसेसिंग के बाद हटती हैं, ऐसे टूल को प्राथमिकता दीजिए जो खाता बनाने को मजबूर न करें, और पढ़िए कि वे डेटा बेचते या साझा करते हैं या नहीं। संवेदनशील फ़ाइलों पर संदेह हो तो अपलोड से पहले उन्हें पासवर्ड से सुरक्षित कीजिए ताकि टूल की नीति कम मायने रखे।</p>

  <h2>अभी आज़माएँ</h2>

  <p>संवेदनशील दस्तावेज़ के साथ सबसे सुरक्षित कदम बस एक है: साझा करने से पहले उसे बंद कर दीजिए। <a href="/hi/pdf-security/protect/">PDF सुरक्षा टूल</a> खोलिए, एक मज़बूत पासवर्ड जोड़िए, और कुंजी के बिना आपकी फ़ाइल किसी के लिए भी अपठनीय रहेगी — हमारे सर्वर पर, आपके ईमेल में, और आगे जहाँ भी वह यात्रा करे।</p>
