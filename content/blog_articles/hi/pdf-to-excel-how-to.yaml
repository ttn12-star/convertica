content_hi: |
  एक supplier price list PDF के रूप में भेजता है। आपका bank statements PDF में export करता है। एक report आपके inbox में आती है जिसमें ठीक वही table है जो आपको चाहिए, पर एक ऐसे document के अंदर बंद जिसे आप edit नहीं कर सकते। आप table select करते हैं, copy करते हैं, Excel में paste करते हैं, और सब कुछ एक-दूसरे से जुड़े text के एक अकेले column में ढह जाता है। PDF को ठीक से convert करना उन rows और columns को वापस असली cells में डाल देता है। यहाँ जानें यह कैसे करें, और जो files पलटकर लड़ती हैं उन्हें कैसे संभालें।

  <h2>Copy-paste किसी table को गड़बड़ में क्यों बदल देता है</h2>

  <p>एक PDF दरअसल table store करती ही नहीं है। वह page पर fixed positions पर text store करती है, साथ में उनके इर्द-गिर्द खिंची lines, जिन्हें आपकी आँख एक grid की तरह पढ़ती है। जब आप copy करते हैं, तो text reading order में पकड़ में आ जाता है पर grid खो जाती है, इसलिए columns एक-दूसरे में घुल जाते हैं और numbers ग़लत labels के साथ line में लग जाते हैं। एक सही conversion अलग तरह काम करती है: वह देखती है कि हर value कहाँ बैठी है, columns को दोबारा बनाती है, और एक असली spreadsheet फिर से खड़ा करती है जहाँ हर number अपनी ख़ुद की cell में उतरता है।</p>

  <h2>पहले जाँचें कि आपके पास किस तरह की PDF है</h2>

  <p>यह एक जाँच आगे की सारी बातें तय कर देती है, इसलिए इस पर दस seconds लगाना सही है। PDF खोलें और अपने cursor से कोई एक number select करने की कोशिश करें।</p>

  <ul>
    <li><strong>अगर text highlight होता है,</strong> तो आपके पास native PDF है। Data असली, selectable text है, और conversion साफ़ व accurate होगी।</li>
    <li><strong>अगर कुछ highlight नहीं होता और page किसी picture की तरह behave करता है,</strong> तो आपके पास scanned PDF है। Table एक image है, इसलिए numbers को cells बनने से पहले OCR (optical character recognition) से पढ़ना पड़ता है। यह फिर भी काम करता है, बस इसमें recognition का एक extra step और result पर थोड़ी और नज़र चाहिए।</li>
  </ul>

