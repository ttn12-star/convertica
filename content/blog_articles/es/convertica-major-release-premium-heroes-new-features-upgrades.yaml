excerpt_es: 'Nuestra mayor actualización está en camino: suscripciones Premium, rangos Héroe, modo oscuro, una cola más rápida y cinco conversores nuevos. Esto es todo lo que llega.'
content_es: |
  <p>Nuestra mayor actualización ya casi está aquí. Esta versión añade un <strong>sistema de suscripciones Premium</strong>, mejora las herramientas que ya usas y suma cinco conversores nuevos. Esto es lo que llega.</p>

  <h2>Un aviso antes del lanzamiento</h2>
  <p>Una versión de este tamaño toca muchas piezas en movimiento, así que en los primeros días algunas cosas pueden comportarse de forma rara. Si algo falla, <strong>avísanos</strong> y lo arreglaremos rápido.</p>

  <h2>Suscripciones Premium</h2>
  <p>Premium llega en tres planes:</p>
  <ul>
    <li><strong>1 día</strong> — $1</li>
    <li><strong>1 mes</strong> — $5</li>
    <li><strong>1 año</strong> — $52</li>
  </ul>
  <p>Cada plan Premium desbloquea:</p>
  <ul>
    <li>Límites más altos de tamaño de archivo y número de páginas</li>
    <li>Procesamiento con OCR</li>
    <li>Procesamiento por lotes en herramientas seleccionadas</li>
    <li>Una cola de procesamiento separada y más rápida</li>
    <li>Modo oscuro opcional</li>
  </ul>

  <h2>Rangos Héroe</h2>
  <p>Los suscriptores Premium mantienen Convertica en marcha, por eso los llamamos <strong>Héroes</strong>. Cuanto más tiempo mantengas la suscripción, más alto será tu rango:</p>
  <ul>
    <li><strong>Héroe Bronce</strong> — 30+ días consecutivos</li>
    <li><strong>Héroe Plata</strong> — 90+ días consecutivos</li>
    <li><strong>Héroe Oro</strong> — 180+ días consecutivos</li>
    <li><strong>Héroe Platino</strong> — 365+ días consecutivos</li>
  </ul>
  <p>También habrá una <strong>tabla de clasificación</strong> con los 10 Héroes que llevan más tiempo apoyándonos, además de un ticker opcional para quien quiera salir en primer plano.</p>

  <h2>Cinco conversores nuevos</h2>
  <p>Junto con las funciones Premium y las mejoras de herramientas, añadimos cinco conversores:</p>
  <ul>
    <li>PDF a HTML</li>
    <li>HTML a PDF</li>
    <li>PDF a PPTX</li>
    <li>PPTX a PDF</li>
    <li>Excel a PDF</li>
  </ul>

  <figure><img src="/static/blog/images/tool-all-tools-hero.jpg" alt="Colección de herramientas PDF de Convertica" width="1280" height="800" loading="lazy"></figure>

  <h2>Gracias por estar aquí</h2>
  <p>Es la versión de la que estamos más orgullosos, y son tus comentarios los que la han dado forma. Echa un vistazo a <a href="/es/all-tools/">todas las herramientas</a> para ver qué hay disponible hoy, o prueba el <a href="/es/excel-to-pdf/">conversor de Excel a PDF</a> en cuanto llegue. Pronto, más.</p>
