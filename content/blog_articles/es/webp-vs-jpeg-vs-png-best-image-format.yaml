excerpt_es: "Tres formatos cubren casi todas las imágenes de la web, y elegir mal te cuesta tamaño de archivo, calidad o compatibilidad. Así se diferencian realmente WebP, JPEG y PNG — y una regla simple para elegir."
content_es: |
  Casi todas las imágenes que vas a subir en tu vida viajan en uno de tres contenedores: JPEG, PNG o WebP. Parecen intercambiables — la foto es la foto — pero por dentro hacen concesiones muy distintas, y la elección equivocada te cuesta algo en silencio: un logo borroso, una captura de pantalla de 4 MB, una foto que un sistema antiguo se niega a aceptar. Esta comparación aclara para qué sirve realmente cada formato.

  <h2>La respuesta corta</h2>

  <ul>
    <li><strong>WebP</strong> — el predeterminado para sitios web. 25-35% más pequeño que JPEG con la misma calidad, soporta transparencia y animación. Úsalo siempre que controles dónde se muestra la imagen.</li>
    <li><strong>JPEG</strong> — el predeterminado para fotos que viajan. Todos los dispositivos, programas y formularios de subida desde los años noventa lo aceptan. Úsalo cuando la compatibilidad importa más que el último kilobyte.</li>
    <li><strong>PNG</strong> — el predeterminado para gráficos pixel-perfect. Sin pérdida, con transparencia limpia. Úsalo para logos, capturas de interfaz, gráficas y cualquier cosa con bordes nítidos y texto.</li>
  </ul>

  <h2>Comparación lado a lado</h2>

  <table>
    <thead>
      <tr><th></th><th>WebP</th><th>JPEG</th><th>PNG</th></tr>
    </thead>
    <tbody>
      <tr><td><strong>Compresión</strong></td><td>Con o sin pérdida</td><td>Con pérdida</td><td>Sin pérdida</td></tr>
      <tr><td><strong>Tamaño típico de una foto</strong></td><td>El más pequeño</td><td>Medio</td><td>El más grande (a menudo 5-10x JPEG)</td></tr>
      <tr><td><strong>Transparencia</strong></td><td>Sí</td><td>No (rellena con blanco)</td><td>Sí</td></tr>
      <tr><td><strong>Animación</strong></td><td>Sí</td><td>No</td><td>No (APNG es raro)</td></tr>
      <tr><td><strong>Soporte en navegadores</strong></td><td>Todos los navegadores modernos</td><td>Universal</td><td>Universal</td></tr>
      <tr><td><strong>Software / dispositivos antiguos</strong></td><td>A veces rechazado</td><td>Siempre aceptado</td><td>Casi siempre aceptado</td></tr>
      <tr><td><strong>Ideal para</strong></td><td>Páginas web, tiendas online</td><td>Fotos para compartir, correo, servicios de impresión</td><td>Logos, capturas de pantalla, gráficos con texto</td></tr>
    </tbody>
  </table>

  <h2>Por qué el tamaño del archivo importa más de lo que parece</h2>

  <p>Las imágenes suelen ser lo más pesado de una página. Reducirlas es la mejora de rendimiento más fácil que existe: las páginas cargan más rápido, las puntuaciones de <strong>Core Web Vitals</strong> mejoran y los visitantes móviles gastan menos datos. La velocidad de la página es una señal de posicionamiento, así que para el dueño de un sitio la elección de formato es, en silencio, también una decisión de SEO.</p>

  <p>Para tener una idea concreta de los números: una foto típica de 12 megapíxeles ronda los 2-4 MB como JPEG de alta calidad, 1.5-3 MB como WebP con la misma calidad visual, y 15-25 MB como PNG. Esa cifra de PNG no es un error — almacenar fotos sin pérdida es enormemente caro, y por eso PNG es el formato equivocado para fotografías.</p>

  <h2>Cuándo JPEG sigue siendo la decisión correcta</h2>

  <p>WebP gana en tamaño, pero JPEG tiene una ventaja imbatible: treinta años de soporte universal. Elige JPEG cuando la imagen sale de tu control:</p>

  <ul>
    <li>Al adjuntar fotos a correos o documentos que alguien podría abrir en software antiguo.</li>
    <li>Al subir a portales gubernamentales, solicitudes de empleo y formularios con listas estrictas de tipos de archivo.</li>
    <li>Al enviar fotos a un servicio de impresión o a un quiosco de fotos.</li>
    <li>Al compartir con personas de cuyos dispositivos no sabes nada.</li>
  </ul>

  <p>Un adjunto WebP que el destinatario no puede abrir te ahorra el 30% de nada.</p>

  <h2>Cuándo PNG es la única respuesta correcta</h2>

  <p>La compresión con pérdida funciona descartando detalle que el ojo perdona en una foto — pero el ojo no lo perdona en los gráficos. El texto comprimido en JPEG genera halos borrosos; los límites de color nítidos se emborronan. Usa PNG para:</p>

  <ul>
    <li><strong>Logos e iconos</strong>, sobre todo los que van sobre fondos de color (necesitas la transparencia).</li>
    <li><strong>Capturas de interfaz</strong> que incluyen texto — documentación, reportes de errores, tutoriales.</li>
    <li><strong>Gráficas, diagramas y pixel art</strong> con bordes duros y colores planos.</li>
    <li>Cualquier imagen que se vaya a <strong>editar y volver a guardar repetidamente</strong> — sin pérdida significa sin degradación generacional.</li>
  </ul>

