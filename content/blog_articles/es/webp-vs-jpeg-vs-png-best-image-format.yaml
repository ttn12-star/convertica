  <h2>Preguntas frecuentes</h2>

  <h3>¿WebP tiene menor calidad que JPEG?</h3>
  <p>No — con ajustes comparables, WebP conserva la misma calidad visual en un archivo más pequeño. Su compresor simplemente es más nuevo y más inteligente que el de JPEG, que data de 1992. La calidad la determina el nivel que elijas, no el nombre del formato.</p>

  <h3>¿Por qué algunos sitios rechazan mi WebP al subirlo?</h3>
  <p>Su validación de subida es anterior a la popularidad de WebP y solo admite JPEG y PNG. Convierte a JPEG para esa subida — es un trabajo de diez segundos — y mantén WebP para tu propio sitio.</p>

  <h3>¿Debería convertir mis JPEG existentes a WebP?</h3>
  <p>Para un sitio que administras — sí, suele ser la mejora de velocidad más barata disponible. Recodifica desde la fuente de mayor calidad que tengas, en lugar de desde una copia ya muy comprimida, para que los artefactos no se acumulen.</p>

  <h3>¿Y qué hay de GIF?</h3>
  <p>Para animación, WebP (o un archivo de vídeo de verdad) supera a GIF en tamaño y profundidad de color. Para imágenes estáticas, el límite de 256 colores de GIF lo convierte en el peor de los cuatro — sobrevive sobre todo por costumbre y por tradición memera.</p>

  <h3>¿Cuál es el mejor ajuste de calidad para JPEG y WebP?</h3>
  <p>80-85 para uso web — el punto dulce donde los artefactos son invisibles a tamaños de visualización normales. 90+ cuando la imagen se vaya a editar de nuevo o a mirar de cerca. Por debajo de 70 el ahorro sigue creciendo, pero también las manchas visibles, sobre todo en cielos y degradados.</p>

  <h2>Elige una vez, convierte cuando haga falta</h2>

  <p>La regla práctica cabe en una línea: <strong>WebP para tu sitio web, JPEG para fotos que viajan, PNG para gráficos con bordes.</strong> Y cuando una imagen llega en el formato equivocado para la tarea, la herramienta <a href="/es/image/convert/">Convertir imagen</a> lo arregla en un clic — gratis, sin registro y sin tocar las dimensiones.</p>
