excerpt_es: "Una contraseña en el PDF es solo la mitad del trabajo. Mandar la contraseña en el mismo correo lo echa todo a perder. Aquí tienes cómo hacer bien las dos mitades."
content_es: |
  Cifrar un PDF lleva unos 30 segundos. Compartir la contraseña sin anular al instante el cifrado lleva unos dos minutos de reflexión, y ahí es donde tropieza la mayoría. Poner la contraseña en el mismo correo que el adjunto es el equivalente en ciberseguridad a cerrar la puerta de casa con llave y pegar la llave al pomo.

  Esta guía cubre las dos mitades: cómo cifrar el archivo de verdad y cómo hacer llegar la contraseña al destinatario por un canal al que el correo no puede acceder.

  <figure><img src="/static/blog/images/tool-protect.jpg" alt="Herramienta de Convertica para proteger PDF con contraseña con cifrado AES-256" width="1280" height="800" loading="lazy"></figure>

  <h2>Por qué los adjuntos de correo necesitan protección extra</h2>

  El correo estándar entre proveedores se cifra en tránsito (TLS) pero no de extremo a extremo. Eso significa:

  <ul>
    <li>Tu proveedor de correo puede leer el contenido.</li>
    <li>El proveedor de correo del destinatario puede leer el contenido.</li>
    <li>Si el mensaje se reenvía, se archiva o se incorpora a un índice de búsqueda, quedan copias en sitios que tú no controlas.</li>
    <li>Las bandejas compartidas (info@, cuentas@) suelen tener muchos más lectores de los que el remitente imagina.</li>
    <li>Las copias de seguridad de correo pueden persistir siete años o más en sectores regulados, incluso después de borrar el mensaje original de la bandeja.</li>
    <li>Una citación judicial, una investigación interna o una retención legal involuntaria pueden sacar el mensaje de esas copias años después.</li>
  </ul>

  Nada de esto significa que el correo sea inseguro para la correspondencia diaria. Sí significa que un contrato, una nómina, un historial médico o un acuerdo firmado merece una capa que sobreviva al reenvío y al archivado. El cifrado de PDF es exactamente esa capa.

  <h2>Paso a paso: cifra tu PDF</h2>

  <figure><img src="/static/blog/images/tool-protect.jpg" alt="Configurar una contraseña fuerte y nivel de cifrado AES-256 para un PDF" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Abre la herramienta para <a href="/es/pdf-security/protect/">proteger un PDF con contraseña</a> y sube tu archivo. El original queda intacto en tu equipo.</li>
    <li>Define una contraseña fuerte. El destinatario necesita exactamente esa cadena, así que tecléala con cuidado y pégala desde un gestor de contraseñas en lugar de teclearla dos veces.</li>
    <li>Confirma el nivel de cifrado. Las herramientas modernas vienen por defecto con AES-256, el mismo estándar que usan los bancos y las agencias gubernamentales. Los modos antiguos RC4 y AES-128 siguen existiendo por compatibilidad, pero conviene evitarlos salvo que el destinatario use software muy antiguo (Acrobat 8 o anterior, algunos lectores embebidos en sistemas industriales viejos).</li>
    <li>Descarga el archivo cifrado. Ábrelo tú mismo una vez con la contraseña para verificar que todo funciona y luego adjúntalo al correo.</li>
  </ol>

  <blockquote class="callout">Verifica antes de enviar. Abre tú mismo el archivo cifrado con la contraseña, en un visor que el destinatario probablemente vaya a usar. Una cantidad sorprendente de quejas de «el cifrado no funciona» resulta ser un error tipográfico en la contraseña, detectado solo después de que el correo ya se haya enviado.</blockquote>

  Detalle a marcar: si copias una contraseña desde un gestor y tu gestor añade automáticamente un espacio final o una comilla tipográfica, el intento de contraseña en texto plano del destinatario no coincidirá. Quita los espacios y sustituye cualquier comilla «curva» (' ' " ") por comillas ASCII rectas (' ") antes de guardar la contraseña en el gestor. Este es el modo de fallo silencioso de aproximadamente la mitad de los tickets de «el cifrado no funciona» que he visto abrir a colegas.

  Si el documento es además un borrador o contiene marcas sensibles, quizá quieras <a href="/es/pdf-edit/add-watermark/">añadir también una marca de agua de confidencial</a> para que cualquiera que lo abra vea con claridad que el contenido está restringido.

  <h2>Cómo compartir la contraseña con seguridad</h2>

  Esta es la mitad del flujo que se salta la gente, y es la mitad que decide si tu cifrado realmente protege algo.

  <h3>Usa un canal distinto</h3>

  La regla es simple: la contraseña debe viajar por una vía que no tenga nada que ver con el correo. Buenas opciones:

  <ul>
    <li><strong>SMS o mensajería.</strong> Manda la contraseña por mensaje de texto o por una mensajería con cifrado de extremo a extremo como Signal o WhatsApp. El número de teléfono es una identidad separada de la cuenta de correo.</li>
    <li><strong>Enlace para compartir del gestor de contraseñas.</strong> 1Password, Bitwarden y Dashlane ofrecen funciones de «compartir un elemento» o «compartir por enlace» que caducan tras una sola visualización o un tiempo determinado.</li>
    <li><strong>Entrega verbal en persona o por teléfono.</strong> A la antigua, pero infalible. Útil para elementos de alto valor que van a personas a las que puedes llamar.</li>
    <li><strong>Servicios de compartición de secretos.</strong> Herramientas como Bitwarden Send o servicios de un solo uso te permiten generar un enlace que se autodestruye al primer acceso.</li>
    <li><strong>Sistema de tickets fuera de banda.</strong> Si ambas partes usan un mismo service desk (Jira Service Desk, Zendesk), la contraseña puede viajar como un comentario privado separado del hilo de correo.</li>
  </ul>

  Malas opciones que parecen aceptables pero no lo son:

  <ul>
    <li><strong>«La contraseña va en el siguiente correo».</strong> La misma bandeja, el mismo rastro de auditoría, los mismos reenviadores. El cifrado se queda en mero badén.</li>
    <li><strong>La contraseña como asunto del correo.</strong> El mismo problema, con visibilidad extra.</li>
    <li><strong>Patrones predecibles («la contraseña es el apellido del destinatario»).</strong> Quien pueda adivinarla no necesita la contraseña.</li>
    <li><strong>iMessage entre dispositivos mixtos Apple y Android.</strong> Si el destinatario no está en iMessage, el mensaje cae a SMS plano, que viaja sin cifrar por la infraestructura del operador.</li>
    <li><strong>Buzón de voz.</strong> Muchos sistemas corporativos de buzón de voz almacenan las grabaciones en bandejas integradas con el correo y pueden transcribirse e indexarse.</li>
  </ul>

  <h3>Elegir una contraseña que no se vaya a romper</h3>

  El cifrado de PDF usa la contraseña para derivar una clave de cifrado. Las contraseñas débiles se rompen por fuerza bruta sin conexión una vez que un atacante tiene el archivo. Pónselo difícil.

  <ul>
    <li><strong>Longitud sobre complejidad.</strong> Una cadena aleatoria de 16 caracteres supera a una de 10 con cinco símbolos. «PurpleDolphinChairOcean42» es más fuerte que «P@55!».</li>
    <li><strong>Evita datos personales.</strong> El nombre, cumpleaños, empresa y mascota del destinatario son adivinables con un vistazo rápido a LinkedIn.</li>
    <li><strong>Genera, no inventes.</strong> Usa el generador de tu gestor de contraseñas. Incluso una passphrase de 4 palabras tipo diceware es muchísimo más segura que algo que te inventes.</li>
    <li><strong>Evita caracteres que se autocorrigen.</strong> Algunos teclados (sobre todo móviles) sustituyen de forma automática ciertos signos ASCII por equivalentes tipográficos. Quédate con letras y dígitos si compartes entre plataformas.</li>
  </ul>

  Mínimo práctico para material sensible: 12 caracteres alfanuméricos aleatorios o una passphrase diceware de 4 palabras. Ambas dan unos 60-70 bits de entropía, suficiente para mantener la fuerza bruta sobre AES-256 inviable en cualquier hardware que exista en 2026.

  <h2>Contraseña de apertura frente a contraseña de permisos</h2>

  El cifrado de PDF admite dos contraseñas distintas y hacen cosas distintas:

  <table>
    <thead>
      <tr>
        <th>Tipo de contraseña</th>
        <th>Qué hace</th>
        <th>Cuándo usarla</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Contraseña de apertura / usuario</td>
        <td>Necesaria para ver el documento. Sin ella, el archivo es texto cifrado ilegible.</td>
        <td>Siempre que el contenido en sí sea confidencial.</td>
      </tr>
      <tr>
        <td>Contraseña de permisos / propietario</td>
        <td>Restringe lo que puede hacer quien lo ve (imprimir, copiar texto, modificar). El documento se abre sin ella.</td>
        <td>Para documentos que deben poder leerse pero no editarse ni copiarse (plantillas de formularios, informes distribuidos).</td>
      </tr>
    </tbody>
  </table>

  La mayoría de los casos del tipo «mandar PDF confidencial por correo» piden una <strong>contraseña de apertura</strong>, porque quieres que el archivo sea ilegible sin la clave. Las contraseñas de permisos son útiles pero más fáciles de saltarse para destinatarios decididos: algunas herramientas de PDF (y la mayoría de versiones antiguas de la Vista Previa de Mac) ignoran el indicador de permisos por completo en documentos sin contraseña de apertura.

  Pon ambas si tu situación lo requiere: la de apertura para controlar el acceso y la de permisos para restringir lo que un destinatario autorizado puede hacer.

  <h2>Consejos de correo en torno al cifrado</h2>

  Dos notas prácticas que pinchan a menudo:

  <ul>
    <li><strong>Cifra antes de comprimir.</strong> Si el PDF también es demasiado grande para el correo, pasa antes por el paso de <a href="/es/pdf-organize/compress/">comprimir antes de cifrar</a> en lugar de después. Algunos compresores recodifican el archivo en silencio de un modo que elimina el cifrado.</li>
    <li><strong>Avisa al destinatario de que está cifrado.</strong> Una nota corta en el cuerpo del correo («Este PDF está protegido con contraseña. Te enviaré la contraseña por SMS en un momento.») evita que el archivo se marque como dañado o se ponga en cuarentena.</li>
    <li><strong>Cuidado con los falsos positivos del antispam.</strong> Los adjuntos cifrados no se pueden escanear contra malware, así que los filtros antispam corporativos a veces los marcan o ponen en cuarentena. Avisa al destinatario de que revise su carpeta de spam si no ve el correo en unos minutos, y avisa a IT con antelación en envíos importantes.</li>
    <li><strong>No te mandes la contraseña a ti mismo como «copia de seguridad».</strong> Si alguien entra en tu bandeja, el archivo en Enviados y la contraseña en la bandeja de entrada estarán los dos disponibles. Guarda la contraseña solo en tu gestor de contraseñas.</li>
  </ul>

  <h2>Qué hacer si olvidas la contraseña</h2>

  Conserva el original sin cifrar en un sitio seguro. El cifrado es simétrico: si pierdes la contraseña, el archivo es prácticamente irrecuperable por medios legítimos. Romper AES-256 por fuerza bruta no es realista en ninguna escala temporal normal: la muerte térmica del sol es la estimación humorística habitual.

  Si eres dueño del documento y perdiste la contraseña pero aún tienes el original, vuelve a cifrarlo con una nueva y reemplaza el archivo. Si solo tienes la copia cifrada y de verdad eres titular de los derechos, hay herramientas para <a href="/es/pdf-security/unlock/">desbloquear un PDF que te pertenece</a> que pueden intentar quitar protecciones débiles, pero no van a romper una contraseña fuerte de AES-256. (Para protecciones débiles —PDF de «solo permisos» de exportaciones de la era 2003— quitarlas es trivial. Para AES-256 de verdad con una contraseña larga, ríndete.)

  <h2>FAQ</h2>

  <h3>¿El cifrado AES-256 es lo bastante fuerte para documentos legales?</h3>
  <p>Sí. AES-256 está aprobado para material de máximo secreto por la Agencia de Seguridad Nacional de EE. UU. y lo usan bancos, gobiernos y los grandes proveedores en la nube. El eslabón débil de la seguridad del PDF casi siempre es la contraseña, no el algoritmo.</p>

  <h3>¿Puedo enviar la contraseña en el mismo correo si la borro después?</h3>
  <p>No. El correo se replica en servidores, se respalda, se archiva y se reenvía. «Borrar tras enviar» borra solo tu copia local y no hace nada respecto a las decenas de otros sitios donde existe el mensaje. Usa un canal separado.</p>

  <h3>¿Qué pasa si el destinatario olvida la contraseña?</h3>
  <p>Le vuelves a enviar la contraseña por un canal seguro. Si ha perdido el archivo y la contraseña, vuelves a cifrar tu original con una nueva y se la reenvías. No hay código de recuperación ni clave maestra para un PDF protegido con contraseña.</p>

  <h3>¿Cifrar cambia el tamaño del PDF?</h3>
  <p>Ligeramente. El cifrado añade unos cientos de bytes para los metadatos del handshake de seguridad. El contenido se cifra en sitio, así que un PDF de 5 MB pasa a unos 5.001 MB. No lo suficiente para empujarte por encima del límite de tamaño del correo.</p>

  <h3>¿Puede el destinatario quitar la contraseña después de abrirlo?</h3>
  <p>Sí. En cuanto tiene la contraseña, puede quitar el cifrado con cualquier herramienta de PDF estándar. Si necesitas una protección persistente que sobreviva a las acciones del destinatario, el cifrado por sí solo no es la respuesta. Combínalo con marcas de agua y una política de acceso clara, y considera herramientas DRM para distribución de alto valor.</p>

  <h2>Pruébalo ahora</h2>

  <p>Cierra primero el archivo, y luego envía la llave por una puerta distinta. Abre la <a href="/es/pdf-security/protect/">herramienta de protección de PDF</a> y cifra tu documento; después suelta la contraseña en Signal, SMS o el enlace para compartir de tu gestor de contraseñas antes de pulsar enviar en el correo.</p>
