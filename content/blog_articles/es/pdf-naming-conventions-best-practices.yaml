title_es: "Convenciones de nombres para PDF: guía práctica para autónomos, equipos y archivos"
meta_title_es: "Convenciones de nombres para PDF que funcionan | Convertica"
meta_description_es: "Deja de buscar 'final_v2_REAL_final.pdf'. Una convención de nombres simple y duradera para facturas, contratos, escaneos y archivos compartidos que aguanta años."
