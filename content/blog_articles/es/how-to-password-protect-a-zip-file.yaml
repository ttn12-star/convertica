excerpt_es: "Cifrar un archivo ZIP mantiene documentos, fotos y archivos privados aunque el archivo sea interceptado o esté en un almacenamiento compartido. Aquí te explicamos cómo hacerlo correctamente y qué decirle al destinatario para que pueda abrirlo."
content_es: |
  El archivo ZIP es el contenedor más universal para compartir múltiples archivos a la vez. Sin embargo, por defecto no ofrece ninguna privacidad: cualquiera que tenga el archivo puede abrirlo instantáneamente. Añadir una contraseña cambia eso: el contenido se convierte en texto cifrado ilegible sin la clave.

  Esta guía explica cómo añadir protección con contraseña sólida, qué estándar de cifrado elegir (y por qué afecta a la compatibilidad), y cómo eliminar la contraseña más tarde si ya no la necesitas.

  <h2>¿Por qué proteger un archivo ZIP con contraseña?</h2>

  <figure><img src="/static/blog/images/tool-zip-protect-hero.jpg" alt="Pantalla de subida de la herramienta Proteger ZIP de Convertica" width="1280" height="800" loading="lazy"></figure>

  <p>Hay tres situaciones comunes donde un archivo sin protección supone un riesgo real:</p>

  <ul>
    <li><strong>Adjuntos de correo electrónico.</strong> El correo electrónico se replica en servidores y se guarda en copias de seguridad durante años. Un ZIP con contratos, nóminas o historiales médicos enviado sin cifrado puede ser leído por cualquiera con acceso a esas copias.</li>
    <li><strong>Almacenamiento en la nube y unidades compartidas.</strong> Subir archivos sensibles a Google Drive, Dropbox o un SharePoint corporativo significa que el proveedor de nube y cualquier persona con la que se haya compartido la carpeta puede ver el contenido.</li>
    <li><strong>USB y entrega física.</strong> Un USB puede perderse, encontrarse y conectarse a cualquier ordenador. Un ZIP cifrado en el USB no se puede abrir sin la contraseña.</li>
  </ul>

  <p>La protección con contraseña no sustituye a todas las medidas de seguridad — también necesitas una contraseña sólida y una forma segura de compartirla. Pero es la capa de protección más sencilla disponible sin software especializado en ningún extremo.</p>

  <h2>AES-256 vs ZipCrypto — elige el cifrado correcto</h2>

  <p>No toda la protección con contraseña ZIP es equivalente. Existen dos estándares principales:</p>

  <ul>
    <li><strong>ZipCrypto (también llamado cifrado "tradicional" o "Zip 2.0").</strong> Integrado en la especificación ZIP original de los años 90. Es débil — las herramientas modernas lo descifran en segundos con un ataque de diccionario. Su única ventaja: el Explorador de archivos de Windows y el Archivo de macOS pueden abrirlo de forma nativa.</li>
    <li><strong>AES-256.</strong> El estándar de oro actual, utilizado por bancos, gobiernos y principales proveedores de nube. Es computacionalmente inviable forzarlo por fuerza bruta con cualquier hardware que exista hoy. La herramienta Protect ZIP de Convertica usa AES-256.</li>
  </ul>

  <blockquote class="callout">Usa AES-256 para todo lo que realmente importa. ZipCrypto da una falsa sensación de seguridad — retrasará a un atacante determinado minutos, no años.</blockquote>

  <h3>Nota de compatibilidad: ¿quién puede abrir un ZIP con AES-256?</h3>

  <p>La contrapartida de AES-256 es que las herramientas de archivo integradas en Windows y macOS no lo admiten:</p>

  <ul>
    <li><strong>Explorador de archivos de Windows</strong> — no puede abrir archivos ZIP cifrados con AES-256. Mostrará un error o un archivo vacío.</li>
    <li><strong>Utilidad de Archivo de macOS (extractor integrado de doble clic)</strong> — tampoco admite AES-256.</li>
  </ul>

  <p>El destinatario necesita instalar un compresor de terceros gratuito. Todos los siguientes admiten AES-256 y son gratuitos:</p>

  <ul>
    <li><strong>7-Zip</strong> (Windows) — gratuito, de código abierto, ampliamente utilizado.</li>
    <li><strong>WinRAR</strong> (Windows) — técnicamente software de prueba, pero completamente funcional para abrir ZIP.</li>
    <li><strong>WinZip</strong> (Windows/macOS) — comercial, pero común en entornos empresariales.</li>
    <li><strong>Keka</strong> (macOS) — gratuito desde la web del desarrollador, de pago en Mac App Store.</li>
    <li><strong>The Unarchiver</strong> (macOS) — gratuito en Mac App Store, gestiona ZIP con AES-256.</li>
  </ul>

  <p>Al enviar un ZIP protegido con contraseña, incluye una nota indicando qué aplicación usar si el destinatario no la tiene. Esto evitará la queja habitual de "el archivo está dañado" cuando el verdadero problema es un extractor incompatible.</p>

  <h2>Paso a paso: protege un archivo ZIP con Convertica</h2>

  <figure><img src="/static/blog/images/tool-zip-protect-options.jpg" alt="Opciones de contraseña y cifrado AES-256 para un archivo ZIP" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Abre la herramienta <a href="/archive/protect/">Protect ZIP</a> en Convertica. No se requiere cuenta ni registro.</li>
    <li>Sube tu archivo ZIP. Si tienes archivos sueltos, primero compímalos con la opción "Enviar a ZIP" de tu sistema operativo y luego sube el archivo resultante.</li>
    <li>Introduce una contraseña sólida. Consulta los consejos a continuación. Escríbela con cuidado — no hay opción de recuperación si la olvidas.</li>
    <li>Haz clic en el botón de protección. Convertica aplica cifrado AES-256 y genera un nuevo ZIP protegido con contraseña.</li>
    <li>Descarga el archivo protegido. Ábrelo tú mismo con 7-Zip u otro extractor compatible para confirmar que funciona antes de enviarlo a nadie.</li>
    <li>Comparte el archivo — y envía la contraseña por un canal separado. Envía el archivo por correo, pero la contraseña por SMS, una aplicación de mensajería o un enlace de secreto de un solo uso. Nunca pongas la contraseña en el mismo correo que el adjunto.</li>
  </ol>

  <p>Convertica procesa tu archivo en memoria y no lo conserva después de generar el enlace de descarga. No se necesita cuenta y los archivos no se almacenan en el servidor tras el procesamiento.</p>

  <h2>Cómo elegir una contraseña sólida para tu ZIP</h2>

  <p>El cifrado es tan fuerte como la contraseña que lo protege. AES-256 es teóricamente irrompible, pero una contraseña débil puede adivinarse o forzarse offline si un atacante ya tiene el archivo.</p>

  <ul>
    <li><strong>La longitud importa más que la "complejidad".</strong> Una cadena aleatoria de 16 caracteres es más fuerte que una de 8 con muchos símbolos.</li>
    <li><strong>Usa el generador de tu gestor de contraseñas.</strong> Herramientas como 1Password, Bitwarden o KeePass generan contraseñas aleatorias que no necesitas recordar.</li>
    <li><strong>Evita datos personales.</strong> Nombres, fechas de nacimiento, nombres de empresas y mascotas pueden adivinarse con información pública.</li>
    <li><strong>Guarda una copia de respaldo.</strong> Almacena la contraseña en tu gestor inmediatamente. Si la olvidas, el archivo es irrecuperable.</li>
  </ul>

  <h2>Cómo eliminar la contraseña de un archivo ZIP</h2>

  <p>Si ya no necesitas la protección, la herramienta <a href="/archive/unlock/">Unlock ZIP</a> de Convertica puede eliminar la contraseña.</p>

  <p>Limitaciones importantes:</p>

  <ul>
    <li>Debes conocer la contraseña actual. La herramienta descifra el archivo usando la contraseña que proporcionas y guarda el resultado sin cifrado. No descifra ni evita contraseñas desconocidas.</li>
    <li>Si has olvidado la contraseña y no existe copia de seguridad, el archivo no puede recuperarse por ningún medio práctico.</li>
  </ul>

  <p>El proceso es igual que la protección: sube el ZIP cifrado, introduce la contraseña, descarga el archivo desbloqueado. No se requiere registro.</p>

  <h2>Resumen de buenas prácticas</h2>

  <ul>
    <li>Usa siempre AES-256. Nunca uses ZipCrypto para nada importante.</li>
    <li>Indica al destinatario qué compresor instalar si no es usuario técnico.</li>
    <li>Envía la contraseña por un canal diferente al del archivo.</li>
    <li>Guarda la contraseña en un gestor de contraseñas inmediatamente — no hay recuperación.</li>
    <li>Conserva la copia original sin cifrar en un lugar seguro para poder volver a cifrar si es necesario.</li>
    <li>Verifica el archivo protegido antes de enviarlo. Un error tipográfico en la contraseña no se detecta hasta que el destinatario intenta abrirlo.</li>
  </ul>

  <h2>Preguntas frecuentes</h2>

  <h3>¿Puede Windows abrir un ZIP protegido con contraseña sin software adicional?</h3>
  <p>Solo si el ZIP usa el antiguo cifrado ZipCrypto — que puede romperse rápidamente. Los ZIP cifrados con AES-256 (que usa Convertica) no pueden abrirse en el Explorador de archivos de Windows. Dile al destinatario que instale 7-Zip, que es gratuito y tarda menos de un minuto en configurarse.</p>

  <h3>¿Es el cifrado suficientemente fuerte para documentos sensibles?</h3>
  <p>Sí. AES-256 es el mismo estándar utilizado para proteger información gubernamental clasificada y datos financieros en todo el mundo. El riesgo casi siempre está en la contraseña, no en el algoritmo — usa una contraseña larga y generada aleatoriamente y estarás bien protegido.</p>

  <h3>¿Qué ocurre si olvido la contraseña?</h3>
  <p>El archivo es prácticamente irrecuperable. No hay clave maestra, opción de recuperación ni forma de forzar AES-256 en un tiempo razonable. Por eso es fundamental guardar la contraseña en un gestor de contraseñas y mantener los archivos originales sin cifrar en un lugar seguro.</p>

  <h3>¿Puedo proteger con contraseña un ZIP que ya contiene archivos?</h3>
  <p>Sí. La herramienta Protect ZIP funciona con cualquier archivo ZIP existente. Si tienes archivos sueltos, primero compímalos con Windows o macOS y luego sube el ZIP a Convertica para añadir protección AES-256.</p>

  <h3>¿Convertica almacena mis archivos tras el procesamiento?</h3>
  <p>No. Los archivos se procesan en memoria y el enlace de descarga caduca poco después de generarse. Convertica no conserva tus archivos y no se necesita cuenta ni registro para usar la herramienta.</p>

  <h2>Pruébalo ahora</h2>

  <p>Abre la herramienta <a href="/archive/protect/">Protect ZIP</a>, sube tu archivo, establece una contraseña sólida y descarga el archivo cifrado. Cuando necesites eliminar la contraseña, usa la herramienta <a href="/archive/unlock/">Unlock ZIP</a> — siempre que aún la recuerdes.</p>
