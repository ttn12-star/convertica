excerpt_es: Convertica salió el 8 de diciembre y está en fase de pruebas activas. Te contamos en qué trabajamos, cómo enviarnos comentarios y qué traerá la próxima actualización.
content_es: |
  <p>Una actualización rápida del equipo: <strong>Convertica salió el 8 de diciembre</strong> y todo el conjunto de herramientas ya está abierto para todos. Gracias a quienes la probaron en los primeros días.</p>

  <h2>Seguimos en pruebas activas</h2>

  <p>Estamos viendo cómo se comporta la plataforma con uso real, y somos sinceros: aún es muy pronto. Por ahora puedes encontrarte con:</p>

  <ul>
    <li>Una herramienta que se comporta de forma distinta a lo que esperabas</li>
    <li>Una conversión que todavía necesita ajustes</li>
    <li>Algún error pequeño o detalle por pulir de vez en cuando</li>
  </ul>

  <p>Nada de esto es raro justo después de un lanzamiento, y cada reporte que recibimos nos ayuda a afinar las cosas más rápido.</p>

  <h2>Cuéntanos qué falla</h2>

  <p>Si algo no funciona, o tienes una idea de lo que deberíamos crear a continuación, mándanosla a través del formulario de contacto. Leemos cada mensaje, intentamos reproducir los problemas reportados y usamos lo que nos dices para decidir qué corregir primero. Los comentarios tempranos marcan de verdad hacia dónde va Convertica.</p>

  <h2>Viene una actualización mayor</h2>

  <p>Ya estamos trabajando en una versión más grande prevista para <strong>finales de enero o principios de febrero</strong>. Trae nuevas funciones, mejor rendimiento y una experiencia más fluida en general. Más cerca de la fecha publicaremos otra entrada con los detalles de lo nuevo.</p>

  <h2>Prueba las herramientas</h2>

  <figure><img src="/static/blog/images/tool-all-tools-hero.jpg" alt="Vista general de las herramientas PDF en línea de Convertica" width="1280" height="800" loading="lazy"></figure>

  <p>Mientras tanto, todo está activo y es gratis. Echa un vistazo al conjunto completo en la página de <a href="/es/all-tools/">todas las herramientas</a>, o ve directo a una popular como <a href="/es/pdf-to-word/">PDF a Word</a>. Si te topas con algo, avísanos. Gracias por estar aquí desde el principio.</p>
