title_es: 'Lanzamiento de Convertica: fase de pruebas y lo que viene'
meta_title_es: 'Lanzamiento de Convertica: fase de pruebas | Convertica'
meta_description_es: Convertica salió el 8 de diciembre y está en pruebas activas. Esto es lo que corregimos ahora y la gran actualización prevista para finales de enero.
