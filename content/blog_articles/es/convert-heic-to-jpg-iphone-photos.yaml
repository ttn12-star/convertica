content_es: |
  Alguien te manda por AirDrop las fotos de las vacaciones, o copias imágenes de un iPhone a una laptop con Windows, y los archivos se niegan a abrirse. La extensión es <strong>.heic</strong>, la miniatura está en blanco y el visor de fotos te sugiere comprar un códec. No hay nada roto — acabas de conocer el formato de fotos de Apple. Esta guía explica qué es HEIC, por qué tu iPhone lo usa y las tres formas prácticas de sacar de él un JPG normal.

  <h2>¿Qué es HEIC y por qué tu iPhone lo usa?</h2>

  <p>HEIC (High Efficiency Image Container, basado en el estándar HEIF) es el formato de cámara predeterminado en los iPhone desde iOS 11, en 2017. Apple lo eligió por una razón: con la misma calidad visual, una foto HEIC ocupa aproximadamente la mitad del espacio que un JPG. En un carrete con miles de fotos, eso es una cantidad seria de almacenamiento — por eso tu teléfono dispara en HEIC a menos que le indiques lo contrario.</p>

  <p>El problema es la compatibilidad. JPG lleva treinta años en todas partes; HEIC no. Windows necesita extensiones de códec de pago para abrirlo, los dispositivos Android antiguos tienen dificultades, muchos sitios web y portales gubernamentales lo rechazan al subirlo, y la mayoría de los quioscos de impresión nunca han oído hablar de él.</p>

  <h2>Método 1 — Convertir online (sirve para archivos que ya tienes)</h2>

  <figure><img src="/static/blog/images/tool-heic-to-jpg-hero.jpg" alt="Pantalla de subida del conversor HEIC a JPG de Convertica" width="1280" height="800" loading="lazy"></figure>

  <p>Cuando el archivo HEIC ya está en tu computadora — te lo enviaron por correo, lo copiaste de un teléfono, lo descargaste de un álbum en la nube — convertirlo en el navegador es el camino más corto:</p>

  <ol>
    <li>Abre el conversor <a href="/es/image/heic-to-jpg/">HEIC a JPG</a> y sube tu archivo .heic o .heif (hasta 25 MB).</li>
    <li>Elige la salida: <strong>JPG</strong> para compatibilidad universal, <strong>PNG</strong> si necesitas calidad sin pérdida, o <strong>PDF</strong> si la foto tiene que viajar como documento.</li>
    <li>Descarga el archivo convertido. Se abre en cualquier versión de Windows, en todas las suites de oficina y se sube a cualquier sitio.</li>
  </ol>

  <figure><img src="/static/blog/images/tool-heic-to-jpg-options.jpg" alt="Opciones de formato de salida en el conversor HEIC a JPG" width="1280" height="800" loading="lazy"></figure>

  <p>Las conversiones individuales son gratuitas — sin registro y con un límite diario — y los usuarios premium pueden convertir por lotes hasta 10 fotos HEIC a la vez — útil cuando todo un álbum necesita volverse JPG. Si prefieres que los HEIC no aparezcan en absoluto, los dos métodos de abajo lo resuelven en el propio iPhone.</p>

  <h2>Método 2 — Dile a tu iPhone que dispare en JPG (gratis, para fotos futuras)</h2>

  <p>Si HEIC se sigue cruzando en tu camino, cambia el formato de cámara en el propio teléfono:</p>

  <ol>
    <li>Abre <strong>Ajustes</strong> y ve a <strong>Cámara</strong>.</li>
    <li>Toca <strong>Formatos</strong>.</li>
    <li>Selecciona <strong>Más compatible</strong> en lugar de Alta eficiencia.</li>
  </ol>

  <p>A partir de ahora la cámara guarda JPG directamente. El precio es honesto: tus fotos ocuparán aproximadamente el doble de espacio, y los modos cercanos a ProRAW de 48 MP en los iPhone más nuevos pueden verse limitados. Mucha gente deja HEIC activado por el ahorro de espacio y convierte fotos individuales solo cuando algo exige un JPG.</p>

  <h2>Método 3 — El truco de compartir integrado (gratis, una foto a la vez)</h2>

  <p>Dos comportamientos discretos de iOS pueden ahorrarte la conversión por completo:</p>

  <ul>
    <li><strong>El correo y muchos mensajeros convierten automáticamente.</strong> Comparte una foto a través de Mail y normalmente llega como JPG, no como HEIC.</li>
    <li><strong>Copiar y pegar también convierte.</strong> Si seleccionas fotos en la app Fotos, tocas Compartir y luego <strong>Copiar fotos</strong>, y las pegas en una carpeta o documento, iOS entrega JPG.</li>
  </ul>

  <p>También hay un ajuste que arregla las transferencias por USB: <strong>Ajustes &gt; Fotos &gt; Transferir al Mac o PC &gt; Automático</strong>. Con eso activado, las fotos copiadas por cable llegan en un formato compatible aunque en el teléfono estén guardadas como HEIC.</p>

  <h2>¿Convertir HEIC a JPG pierde calidad?</h2>

  <p>Técnicamente la foto se recodifica, así que hay algo de recompresión. En la práctica, con un ajuste de calidad alto la diferencia es invisible — no la encontrarás sin hacer zoom a nivel de píxel y comparar lado a lado. Vale la pena saber dos cosas:</p>

  <ul>
    <li>El JPG será <strong>más grande</strong> que el HEIC del que salió — a menudo cerca del doble. No es calidad añadida; es solo que JPG es un compresor menos eficiente. Exactamente por eso Apple lo abandonó.</li>
    <li>Si la foto se va a editar intensamente después, convierte a <strong>PNG</strong> en su lugar. PNG no tiene pérdida, así que los guardados repetidos no acumularán artefactos de compresión.</li>
  </ul>

  <h2>¿Qué salida elegir: JPG, PNG o PDF?</h2>

  <ul>
    <li><strong>JPG</strong> — la respuesta por defecto. El más pequeño de los tres, se abre en todas partes, ideal para fotos que van a la web, al chat o a documentos de oficina.</li>
    <li><strong>PNG</strong> — sin pérdida y más grande. Elígelo para flujos con capturas de fotos, edición intensiva o cuando un formulario de subida insiste en PNG.</li>
    <li><strong>PDF</strong> — cuando la foto debe comportarse como un documento: un reclamo de seguro, un recibo, una página firmada fotografiada con el teléfono. Si tienes varias fotos que pertenecen a un mismo documento, conviértelas con la herramienta <a href="/es/jpg-to-pdf/">JPG a PDF</a> — combina varias imágenes en un solo PDF.</li>
  </ul>

  <h2>Preguntas frecuentes</h2>

  <h3>¿Por qué Windows me pide pagar para abrir HEIC?</h3>
  <p>Microsoft distribuye el códec de vídeo HEVC del que depende HEIC como un complemento de pago, así que una instalación limpia de Windows no puede decodificar el formato. Convertir el archivo a JPG esquiva todo el problema — nada que instalar, nada que comprar.</p>

  <h3>¿La conversión conserva los metadatos de la foto?</h3>
  <p>La imagen en sí se convierte limpiamente. Algunos metadatos (ubicación, ajustes de cámara) pueden no sobrevivir el viaje, así que si los datos EXIF importan para tu caso, revisa el archivo convertido antes de borrar el original.</p>

  <h3>¿Puedo convertir un álbum entero de una vez?</h3>
  <p>Los usuarios premium pueden subir hasta 10 archivos HEIC por lote y recibir un ZIP de vuelta. Para cientos de fotos, la mejor jugada es resolverlo en el propio iPhone: pon la cámara en «Más compatible» o usa el ajuste de transferencia automática por USB, para que las fotos nunca necesiten conversión.</p>

  <h3>¿Cuál es la diferencia entre HEIC y HEIF?</h3>
  <p>HEIF es el estándar; HEIC es la variante específica que usa Apple (contenedor HEIF con compresión HEVC). A efectos de conversión se comportan igual, y la herramienta acepta ambas extensiones.</p>

  <h3>¿HEIC es mejor que JPG?</h3>
  <p>Como formato de almacenamiento, sí — la misma calidad en aproximadamente la mitad del tamaño, más soporte de color de 10 bits y live photos. Como formato de intercambio, no — el mundo todavía habla JPG. La configuración sensata es HEIC en el teléfono y JPG para compartir, que es exactamente lo que te dan los métodos de arriba.</p>

  <h2>Pruébalo ahora</h2>

  <p>Si un archivo HEIC está ahora mismo en tu escritorio negándose a abrirse, suéltalo en el conversor <a href="/es/image/heic-to-jpg/">HEIC a JPG</a>, elige JPG y en segundos está listo. Y si esto te pasa cada semana, dedica uno de esos segundos a cambiar la cámara de tu iPhone a «Más compatible» — tu yo del futuro te lo agradecerá.</p>
