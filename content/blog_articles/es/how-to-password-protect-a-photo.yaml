excerpt_es: "Bloquear una foto puede significar dos cosas: ocultarla en tu propio móvil, o sellar una copia con contraseña para que nadie la abra después de enviarla. Las imágenes no tienen contraseña propia, así que aquí ves cómo funciona cada opción y dónde se queda corta."
content_es: |
  Quieres bloquear una foto. Pero bloquear puede significar dos cosas muy distintas, y confundirlas es por lo que tanto consejo de internet falla. A veces solo quieres que una imagen privada deje de aparecer cuando le pasas el móvil a un amigo. Otras necesitas enviar o guardar una foto de modo que nadie pueda abrirla sin contraseña, aunque el archivo acabe en el dispositivo equivocado. Esta guía cubre ambos casos y es honesta sobre dónde deja de funcionar cada enfoque.

  <h2>Primero decide qué significa "proteger" para ti</h2>

  <p>Dos objetivos, dos juegos de herramientas.</p>

  <ul>
    <li><strong>Ocultar una foto en tu propio móvil.</strong> Eres el único que usa el dispositivo y solo quieres sacar ciertas imágenes de la galería principal y dejarlas tras Face ID o un PIN. Todo móvil lo trae de serie y no cuesta nada.</li>
    <li><strong>Bloquear una foto que vas a enviar o guardar.</strong> Aquí el archivo se te va de las manos. Un álbum privado en el móvil no sirve de nada en cuanto adjuntas la imagen a un correo o la copias a un USB. Para esto la contraseña tiene que viajar dentro del propio archivo.</li>
  </ul>

  <p>Antes de empezar, pregúntate cuál necesitas de verdad. La primera es un ajuste del móvil que activas en segundos. La segunda pide cifrado real, y ahí es donde las imágenes se complican, como verás enseguida.</p>

  <h2>Bloquear fotos en un iPhone</h2>

  <p>iOS te da dos caminos según lo privada que sea la foto.</p>

  <p><strong>El álbum Oculto.</strong> En Fotos, abre la imagen, toca el botón de compartir o el de más, y elige Ocultar. Se mueve a un álbum Oculto que no aparece en tu fototeca principal. En iOS 16 y posteriores, ese álbum, junto con Eliminados recientemente, queda bloqueado tras Face ID o tu código por defecto, así que quien hojee tu carrete no lo encontrará por casualidad.</p>

  <p><strong>Bloquéala dentro de una nota.</strong> Para algo que quieras tras una contraseña de verdad, pega la foto en la app Notas y bloquea esa nota desde el botón de compartir. Notas usa el código del dispositivo o una contraseña aparte que tú fijas, y una nota bloqueada se cifra en el dispositivo. Es un buen truco cuando quieres sellar una o dos imágenes sensibles en lugar de ocultar un álbum entero.</p>

  <h2>Bloquear fotos en Android</h2>

  <p><strong>Carpeta bloqueada de Google Fotos.</strong> Abre Fotos, ve a Biblioteca, luego Utilidades, y configura la Carpeta bloqueada. Todo lo que muevas ahí queda fuera de la cuadrícula, fuera de la búsqueda y fuera de cualquier app que lea tu galería, y solo se abre tras el bloqueo de pantalla. Las fotos de la Carpeta bloqueada no se respaldan, y ese es el precio de mantenerlas privadas en el dispositivo.</p>

  <p><strong>Carpeta segura de Samsung.</strong> En los móviles Galaxy, la Carpeta segura está en Ajustes, dentro de Seguridad y privacidad, y crea un espacio aparte y cifrado con su propio bloqueo. Mueve fotos ahí y desaparecen de la galería normal hasta que desbloquees la carpeta. Va más allá que un álbum oculto porque todo el espacio está cifrado, no solo apartado de la vista.</p>

  <h2>La trampa que comparte toda caja fuerte del móvil</h2>

  <p>Todas las opciones anteriores protegen una foto en un dispositivo. Es muy útil, pero lee bien el límite: la protección no viaja con el archivo. En cuanto adjuntas una foto oculta a un correo, la compartes por un mensajero o la copias a un ordenador, llega como una imagen normal y abrible. El candado vivía en tu móvil, no en la foto.</p>

  <p>Así que si tu objetivo es enviar una foto que siga privada por el camino, o guardar una en un disco compartido donde otros podrían abrirla, la caja fuerte del móvil es la herramienta equivocada. Necesitas la contraseña metida en el archivo.</p>

  <h2>Poner contraseña a una foto para enviarla o guardarla</h2>

  <p>Aquí va la parte honesta que casi todas las guías se saltan: los archivos de imagen no tienen hueco para una contraseña. Un JPG o un PNG son solo datos de píxeles. No hay campo en el formato donde meter una contraseña, ni forma estándar de que un visor de fotos la pida. Por eso nunca ves un cuadro de "introduce la contraseña" al abrir una imagen normal, y por eso renombrar u "ocultar" un archivo no protege nada por sí solo.</p>

  <p>La solución universal es envolver la foto en algo que sí admita contraseña, y el formato que todo dispositivo ya abre es el PDF. Mete tu imagen dentro de un PDF, cifra ese PDF con una contraseña y obtienes un archivo que no muestra nada salvo la petición de contraseña hasta escribir el código correcto, lo abras en un iPhone, un Android, un Mac o un PC con Windows.</p>

  <p>Eso es exactamente lo que hace la herramienta <a href="/es/image/password-protect-image/">Proteger imagen con contraseña</a>.</p>

  <ol>
    <li>Abre la herramienta <a href="/es/image/password-protect-image/">Proteger imagen con contraseña</a> y sube tu foto. Funcionan JPG, PNG y HEIC.</li>
    <li>Elige una contraseña. Que sea fuerte y que la recuerdes, porque el archivo se cifra de verdad y no hay puerta trasera si la pierdes.</li>
    <li>Descarga el resultado. Es un PDF con tu imagen dentro, sellado con cifrado AES-256. Envíalo o guárdalo donde quieras, y quien lo abra se topa primero con la petición de contraseña, no con tu foto.</li>
  </ol>

  <p>Comparte la contraseña por un canal distinto del propio archivo. La contraseña por un mensaje de texto y el archivo por correo es mucho más seguro que poner ambos en el mismo mensaje.</p>

  <h2>Por qué AES-256 y no un "JPG bloqueado"</h2>

  <p>AES-256 es la misma clase de cifrado que protege archivos bancarios y de gobierno. Cuando una foto está dentro de un PDF cifrado con AES-256, los píxeles no solo se ocultan, se revuelven, y sin la contraseña no hay nada que mostrar. Compáralo con una imagen oculta o renombrada, que cualquiera revela en segundos. Si una foto importa lo bastante como para bloquearla, merece bloquearse bien.</p>

  <h2>Preguntas frecuentes</h2>

  <h3>¿Puedo poner una contraseña directamente a un JPG o PNG?</h3>
  <p>No en la propia imagen. Los formatos JPG y PNG no tienen campo de contraseña, así que ningún visor de fotos estándar puede bloquearla ni desbloquearla. Para proteger una foto con contraseña la envuelves en un contenedor cifrado, y un PDF es el contenedor que todo dispositivo abre. Es el enfoque que sigue esta herramienta.</p>

  <h3>¿Ocultar una foto es lo mismo que protegerla con contraseña?</h3>
  <p>No. Ocultar mueve una foto fuera de la vista en un dispositivo, pero el archivo sigue siendo del todo abrible. Si sale del dispositivo, o alguien desbloquea el móvil, la foto está ahí. La protección con contraseña cifra el archivo, así que no se puede abrir sin la contraseña, acabe donde acabe.</p>

  <h3>¿Qué pasa si olvido la contraseña?</h3>
  <p>El archivo no se puede abrir, y es a propósito. El cifrado real no tiene botón de recuperación, así que guarda la contraseña en un gestor de contraseñas y nunca como copia única. Si solo necesitas privacidad diaria en tu propio móvil y no un archivo sellado, la caja fuerte del móvil te evita este riesgo por completo.</p>

  <h3>¿El archivo protegido pierde calidad de imagen?</h3>
  <p>No. Tu foto entra en el PDF tal cual, así que la imagen de dentro tiene la misma calidad que el original. El cifrado cambia cómo se guarda el archivo, no el aspecto de la imagen una vez desbloqueada.</p>

  <h3>¿El destinatario puede abrirlo sin programas especiales?</h3>
  <p>Sí. El resultado es un PDF cifrado corriente, y todo móvil y ordenador ya tiene un lector de PDF. Escribe la contraseña una vez y aparece la foto, sin nada que instalar.</p>

  <h3>¿Es seguro proteger una foto en línea?</h3>
  <p>Los archivos subidos se procesan y luego se eliminan del servidor tras un breve intervalo, así que nada se guarda ni se comparte. Para una foto que jamás debe salir de tu equipo, lo más seguro es la caja fuerte del móvil o una herramienta sin conexión. Para una foto que necesitas enviar o guardar con contraseña, cifrarla en línea es rápido, y a partir de ahí el propio archivo lleva la protección.</p>

  <h2>Pruébalo ahora</h2>

  <p>Si solo quieres sacar unas fotos de la galería principal, el álbum Oculto, la Carpeta bloqueada o la Carpeta segura de tu móvil lo resuelven en segundos. Pero si la foto tiene que viajar, o quedarse en un disco compartido con una contraseña, suéltala en la herramienta <a href="/es/image/password-protect-image/">Proteger imagen con contraseña</a> y descarga un PDF bloqueado que no se abre para nadie sin el código.</p>
