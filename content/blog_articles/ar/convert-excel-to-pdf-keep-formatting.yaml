slug: convert-excel-to-pdf-keep-formatting
title_ar: "كيفية تحويل Excel إلى PDF دون فقدان التنسيق أو الرؤوس أو مناطق الطباعة"
meta_title_ar: "Excel إلى PDF دون فقدان التنسيق | Convertica"
meta_description_ar: "تجنب كارثة 'الجدول مقسم على 8 صفحات' الكلاسيكية. اضبط مناطق الطباعة، والتحجيم للملاءمة، والرؤوس المتكررة بشكل صحيح قبل تحويل Excel إلى PDF."
meta_keywords_ar: "excel إلى pdf، xlsx إلى pdf، جدول بيانات إلى pdf، طباعة excel كـ pdf، حفظ excel كـ pdf"
excerpt_ar: "تتجاوز معظم أدلة Excel-إلى-PDF الجزء الأهم: ضبط مناطق الطباعة بحيث لا ينتهي جدولك مقسما على ثماني صفحات محرجة وفارغة جزئيا."
content_ar: |
  استلم الجميع تقريبا هذا البريد الإلكتروني: مصنف من 12 علامة تبويب محول مباشرة إلى PDF، بصفوف منشورة على تسع صفحات، وأعمدة مقطوعة إلى نصفين، ورأس يظهر فقط في الصفحة الأولى. الإصلاح ليس محولا أفضل. الإصلاح هو عشرون ثانية من الإعداد داخل Excel قبل أن تضغط على التصدير على الإطلاق.

  يغطي هذا الدليل خطوات الإعداد التي تفصل PDF نظيفا قابلا للطباعة عن كارثة جدول بيانات، بالإضافة إلى تدفق الرفع والتشغيل عندما يكون ملفك مهيأ بشكل صحيح بالفعل.

  <h2>لماذا غالبا ما يفشل تحويل Excel إلى PDF</h2>
  <p>لا يعامل Excel جدول البيانات الخاص بك كـ "مستند" بالطريقة التي يعامل بها Word. لا توجد صفحة ثابتة. الشبكة لا نهائية في الأساس، ويجب على تصدير PDF اتخاذ قرارات بشأن مكان تقطيعها. افتراضيا، تلك القرارات ليست رائعة:</p>
  <ul>
    <li>منطقة الطباعة الافتراضية هي النطاق المستخدم بأكمله، بما في ذلك خلية وحيدة في العمود AZ كتبتها مرة ونسيتها.</li>
    <li>تقع فواصل الصفحات التلقائية حيث تقول حسابات الصفحة أنها يجب أن تقع، وهذا نادرا ما يتماشى مع تجميعات الصفوف المنطقية.</li>
    <li>صفوف الرأس لا تتكرر إلا إذا أخبرتها أن تفعل. يمكن أن تبدو الصفحة 2 وما بعدها مثل تفريغ بيانات بلا جدول.</li>
    <li>تطبع الأعمدة المخفية لا تزال إلا إذا كانت مخفية بشكل صحيح، اعتمادا على إصدار Excel.</li>
  </ul>
  <p>النتيجة هي PDF لا يشبه إطلاقا جدول البيانات المؤطر بنظافة الذي رأيته على الشاشة.</p>

  <h2>إعداد Excel قبل التحويل</h2>
  <p>اقض دقيقتين على هذه الإعدادات الأربعة ويصبح التحويل نفسه تافها.</p>

  <h3>1. اضبط منطقة الطباعة</h3>
  <p>حدد النطاق الدقيق الذي تريده في PDF. في Excel، اذهب إلى <code>Page Layout &gt; Print Area &gt; Set Print Area</code>. من هذه النقطة فصاعدا، سيُصدر فقط هذا النطاق. إذا كان لديك أيضا خط شراري صغير أو ملاحظة على اليمين لا تريد طباعتها، تزيلها هذه الخطوة الواحدة.</p>

  <h3>2. التحجيم للملاءمة بعرض صفحة واحدة</h3>
  <p>جداول البيانات العريضة هي السبب الأول لتقارير "PDF مقسم على 8 صفحات". في علامة التبويب Page Layout، ابحث عن مجموعة Scale to Fit واضبط <code>Width: 1 page</code>، <code>Height: Automatic</code>. النتيجة هي PDF يلائم فيه كل عمود أفقيا وتتدفق البيانات لأسفل عبر العديد من الصفحات حسب الحاجة - وهي الطريقة التي يجب أن تطبع بها جداول البيانات.</p>
  <p>إذا كانت ورقتك عريضة لدرجة أن التحجيم إلى صفحة واحدة يجعل النص مجهريا، فهذه إشارة إلى أنه يجب عليك التبديل إلى الاتجاه الأفقي، أو تقسيم البيانات إلى ملفي PDF يغطيان مجموعات أعمدة مختلفة.</p>

  <h3>3. كرر صفوف الرأس على كل صفحة</h3>
  <p>هذه الخطوة الأكثر تجاوزا. افتح <code>Page Layout &gt; Print Titles</code> وفي حقل <code>Rows to repeat at top</code>، انقر فوق الصف 1 (أو أي صفوف تشكل رأسك). الآن تبدأ كل صفحة PDF بنفس تسميات الأعمدة. لم يعد على القراء العودة إلى الصفحة الأولى لتذكر ما هو العمود F.</p>

  <h3>4. إخفاء مقابل حذف الأعمدة التي لا تحتاجها</h3>
  <p>أخفِ الأعمدة التي قد تحتاجها لاحقا (انقر بزر الفأرة الأيمن على حرف العمود، Hide). احذف الأعمدة التي تتأكد أنها بقايا. تُستثنى الأعمدة المخفية من منطقة الطباعة طالما ضبطت منطقة الطباعة بعد الإخفاء. إذا ضبطت المنطقة أولا، ثم أخفيت الأعمدة، يمكن أن يختلف السلوك حسب إصدار Excel - أعد ضبط منطقة الطباعة بعد أي جولة إخفاء/إظهار لتكون آمنا.</p>

  <h2>خطوة بخطوة: التحويل باستخدام Convertica</h2>
  <p>مع تهيئة جدول البيانات، يكون التحويل الفعلي هو الجزء السهل. يمكنك <a href="/ar/word-to-pdf/">تحويل Excel إلى PDF</a> في ثلاث خطوات:</p>
  <ol>
    <li><strong>ارفع ملف .xlsx.</strong> اسحب وأفلت في صندوق الرفع. ملفات .xls الأقدم تعمل أيضا.</li>
    <li><strong>اختر الاتجاه إذا طُلب منك.</strong> عمودي للبيانات الطويلة الضيقة؛ أفقي للجداول العريضة.</li>
    <li><strong>نزّل PDF.</strong> افتحه مرة للتأكد من أن فواصل الصفحات وقعت حيث توقعت، وانتهيت.</li>
  </ol>
  <blockquote class="callout">إذا كان PDF لا يزال يبدو خاطئا، فالمشكلة دائما تقريبا في Excel من الأمام - منطقة الطباعة، أو التحجيم، أو الصفوف المتكررة - وليست في المحول. أعد فتح المصنف، أصلح الإعداد، وأعد التصدير.</blockquote>

  <h2>المصنفات متعددة الأوراق</h2>
  <p>المصنف الذي يحتوي على خمس علامات تبويب يطرح سؤالا: هل تريد PDF واحدا لكل ورقة، أم خمس أوراق مدمجة في ملف واحد؟</p>
  <ul>
    <li><strong>PDF واحد لكل ورقة</strong> هو الصحيح عندما تكون كل علامة تبويب منتجا مستقلا - تقرير منفصل لجمهور منفصل. تصبح التسمية مهمة؛ <code>YYYY-MM-DD_workbook_sheet-name.pdf</code> يقرأ بنظافة في أي مجلد.</li>
    <li><strong>جميع الأوراق في PDF واحد</strong> هو الصحيح عندما تنتمي علامات التبويب معا كحزمة (غلاف، ملخص، تفاصيل، ملحق). إذا صدّر المحول كل ورقة على حدة، يمكنك <a href="/ar/pdf-organize/merge/">دمج عدة أوراق في PDF واحد</a> في خطوة ثانية.</li>
  </ul>
  <p>في كلتا الحالتين، اضبط منطقة الطباعة على كل ورقة تنوي تصديرها. ستصدر علامة التبويب الفارغة صفحة فارغة؛ والتي بها خلية تائهة في العمود AZ ستصدر صفحة شبه فارغة بهذه الخلية تطفو في الفضاء.</p>

  <h2>مشكلات التنسيق الشائعة وإصلاحاتها</h2>
  <p>إذا كان ملف PDF الناتج لا يزال به مشكلات، فإن العَرَض عادة يشير إلى إعداد محدد في Excel:</p>
  <table>
    <thead>
      <tr><th>العَرَض</th><th>السبب المحتمل</th><th>الإصلاح</th></tr>
    </thead>
    <tbody>
      <tr><td>أقصى عمود يميني مقطوع</td><td>التحجيم للملاءمة لم يضبط على عرض صفحة واحدة</td><td>Page Layout &gt; Width: 1 page</td></tr>
      <tr><td>لا توجد رؤوس في الصفحة 2 وما بعدها</td><td>عناوين الطباعة غير مهيأة</td><td>Page Layout &gt; Print Titles &gt; Rows to repeat at top</td></tr>
      <tr><td>صفحات فارغة عشوائية بين البيانات</td><td>خلية تائهة أو منطقة منسقة خارج البيانات المرئية</td><td>أعد ضبط منطقة الطباعة بعد حذف التائهات</td></tr>
      <tr><td>المعادلات تعرض ‎#REF!‎ أو ‎#NAME?‎</td><td>مراجع خارجية مكسورة</td><td>Copy &gt; Paste Values لتسطيحها قبل التصدير</td></tr>
      <tr><td>الرسوم البيانية مقطوعة بين الصفحات</td><td>فواصل صفحات تلقائية تقسم كائنا مضمنا</td><td>أدرج فاصل صفحة يدويا فوق الرسم البياني، أو حرّك الرسم البياني</td></tr>
      <tr><td>نص صغير غير قابل للقراءة</td><td>التحجيم للملاءمة مفروض بقوة شديدة</td><td>التبديل إلى الاتجاه الأفقي، أو التقسيم إلى تصديرين</td></tr>
    </tbody>
  </table>

  <h2>متى تحتفظ بـ Excel ومتى ترسل PDF</h2>
  <p>PDF هو التنسيق الصحيح عندما يكون الملف للقراءة فقط - عروض الأسعار والتقارير الموقعة والإقرارات الضريبية وحقائب مجلس الإدارة. يحافظ PDF على التخطيط بدقة، ويمنع التعديلات العرضية، وأسهل في التوقيع أو وضع علامة مائية.</p>
  <p>Excel هو التنسيق الصحيح عندما يحتاج المستلم إلى التصفية أو الفرز أو إعادة الحساب. إرسال PDF لنموذج إلى شخص يحتاج إلى تغيير افتراض يجبره على إعادة كتابة كل شيء من الصفر. إذا كنت قد أرسلت بالفعل PDF واحتاج المستلم البيانات مرة أخرى، يمكنك <a href="/ar/pdf-to-excel/">تحويل PDF إلى Excel لاحقا</a>، لكن الجولة تقدم أخطاء صغيرة وهي بديل ضعيف لإرسال التنسيق الصحيح في المرة الأولى.</p>
  <p>افتراض مفيد: أرسل PDF للسجل الرسمي، أرفق .xlsx بشكل منفصل إذا كان المستلم قد يحتاج إلى التحرير. PDF هو ما يُؤرشف؛ و .xlsx هو ملف العمل.</p>

  <h2>تمرير إضافي: حجم الملف</h2>
  <p>يمكن أن يكون ناتج Excel-إلى-PDF كبيرا بشكل مفاجئ، خاصة مع الرسوم البيانية المضمنة والتنسيق الشرطي. إذا كنت ترسل النتيجة بالبريد الإلكتروني، شغّلها عبر أداة ضغط قبل الضغط على إرسال حتى لا ترتد عن حد صندوق بريد المستلم. يستعرض <a href="/ar/blog/compress-pdf-for-email-under-25mb/">دليل الضغط للبريد</a> أهداف حجم واقعية، وتتولى <a href="/ar/pdf-organize/compress/">أداة الضغط</a> التقليص الفعلي.</p>

  <h2>الأسئلة الشائعة</h2>
  <h3>لماذا ينقسم جدول البيانات الخاص بي بشكل محرج عبر الصفحات؟</h3>
  <p>دائما تقريبا لأن منطقة الطباعة عريضة جدا والتحجيم للملاءمة غير مضبوط. افتح Page Layout، اضبط Width على صفحة 1، ثم أعد التصدير. إذا كانت النتيجة صغيرة بشكل غير مقروء، فبدّل إلى الاتجاه الأفقي أو قسّم البيانات إلى ملفي PDF.</p>
  <h3>هل يمكنني تحويل جميع الأوراق في مصنف دفعة واحدة؟</h3>
  <p>نعم. يتعامل المحول مع المصنفات متعددة علامات التبويب. افتراضيا يصدر كل ورقة بها بيانات إلى PDF واحد. إذا كنت تفضل PDF واحد لكل ورقة، هيئ منطقة طباعة كل ورقة وشغّل التحويل مرة لكل علامة تبويب، أو قسّم النتيجة بعد ذلك.</p>
  <h3>هل ستتحول الرسوم البيانية والمعادلات بشكل صحيح؟</h3>
  <p>تتحول الرسوم البيانية ككائنات مرئية - ما تراه في Excel هو ما تحصل عليه في PDF. تُقيَّم المعادلات إلى قيمها الحالية أثناء التحويل. ستظهر المراجع المكسورة (‎#REF!‎، ‎#NAME?‎) في PDF أيضا، لذا أصلحها في Excel أولا أو الصق-القيم لتسطيحها.</p>
  <h3>كيف أجعل الرؤوس تتكرر على كل صفحة PDF؟</h3>
  <p>في Excel، اذهب إلى Page Layout &gt; Print Titles وانقر داخل حقل "Rows to repeat at top"، ثم حدد صفوف رأسك. احفظ وأعد التصدير. الإعداد لكل ورقة، لذا اضبطه على كل علامة تبويب تخطط لتحويلها.</p>
  <h3>لماذا يكون PDF الخاص بي أكبر بكثير من ملف Excel؟</h3>
  <p>تضمّن ملفات PDF الخطوط والرسوم البيانية المرسومة كصور وكائن صفحة منفصلا لكل صفحة. يمكن أن ينتج مصنف بحجم 200 KB ملف PDF بحجم 3 MB دون أن يكون هناك أي خطأ. إذا كان الحجم مشكلة للبريد، اضغط PDF بعد التحويل - تبقى البيانات والجودة كما هي، فقط ينكمش التخزين.</p>

  <h2>جرّبه الآن</h2>
  <p>اضبط منطقة الطباعة، اضبط التحجيم للملاءمة، اضبط عناوين الطباعة، ثم صدّر. دقيقتان إضافيتان داخل Excel تجنبك إحراج جدول البيانات المقطع على ثماني صفحات. <a href="/ar/word-to-pdf/">افتح أداة Excel إلى PDF ←</a></p>
