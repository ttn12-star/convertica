excerpt_ar: 'أكبر تحديث لدينا في الطريق — اشتراكات Premium، ورتب الأبطال، والوضع الداكن، وطابور أسرع، وخمسة محولات جديدة. إليك كل ما هو قادم.'
content_ar: |
  <p>أكبر تحديث لدينا على وشك الوصول. هذا الإصدار يضيف <strong>نظام اشتراكات Premium</strong>، ويحسّن الأدوات التي تستخدمها بالفعل، ويطلق خمسة محولات جديدة. إليك ما هو قادم.</p>

  <h2>تنبيه قبل الإطلاق</h2>
  <p>إصدار بهذا الحجم يمسّ أجزاء متحركة كثيرة، لذا قد تتصرف بعض الأمور بشكل غريب في الأيام الأولى. إذا تعطّل شيء ما — <strong>أخبرنا</strong>، وسنصلحه بسرعة.</p>

  <h2>اشتراكات Premium</h2>
  <p>تتوفر Premium في ثلاث باقات:</p>
  <ul>
    <li><strong>يوم واحد</strong> — $1</li>
    <li><strong>شهر واحد</strong> — $5</li>
    <li><strong>سنة واحدة</strong> — $52</li>
  </ul>
  <p>كل باقة Premium تفتح:</p>
  <ul>
    <li>حدودا أعلى لحجم الملف وعدد الصفحات</li>
    <li>معالجة OCR</li>
    <li>معالجة دفعية على أدوات مختارة</li>
    <li>طابور معالجة منفصلا وأسرع</li>
    <li>وضعا داكنا اختياريا</li>
  </ul>

  <h2>رتب الأبطال</h2>
  <p>مشتركو Premium هم من يبقون Convertica قائما، لذا نسميهم <strong>الأبطال</strong>. كلما طالت مدة اشتراكك، ارتفعت رتبتك:</p>
  <ul>
    <li><strong>بطل برونزي</strong> — 30+ يوما متتاليا</li>
    <li><strong>بطل فضي</strong> — 90+ يوما متتاليا</li>
    <li><strong>بطل ذهبي</strong> — 180+ يوما متتاليا</li>
    <li><strong>بطل بلاتيني</strong> — 365+ يوما متتاليا</li>
  </ul>
  <p>سيكون هناك أيضا <strong>لوحة متصدرين</strong> تضم أفضل 10 أبطال دعمونا لأطول مدة، إضافة إلى شريط اختياري لكل من يرغب في الظهور في دائرة الضوء.</p>

  <h2>خمسة محولات جديدة</h2>
  <p>إلى جانب ميزات Premium وترقيات الأدوات، نضيف خمسة محولات:</p>
  <ul>
    <li>PDF إلى HTML</li>
    <li>HTML إلى PDF</li>
    <li>PDF إلى PPTX</li>
    <li>PPTX إلى PDF</li>
    <li>Excel إلى PDF</li>
  </ul>

  <figure><img src="/static/blog/images/tool-all-tools-hero.jpg" alt="مجموعة أدوات PDF من Convertica" width="1280" height="800" loading="lazy"></figure>

  <h2>شكرا لوجودك معنا</h2>
  <p>هذا الإصدار الذي نفخر به أكثر من غيره، وملاحظاتكم هي ما شكّلته. تصفّح <a href="/ar/all-tools/">جميع الأدوات</a> لترى ما هو متاح اليوم، أو جرّب <a href="/ar/excel-to-pdf/">محول Excel إلى PDF</a> فور وصوله. والمزيد قريبا.</p>
