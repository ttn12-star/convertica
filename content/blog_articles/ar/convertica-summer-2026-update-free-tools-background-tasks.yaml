slug: convertica-summer-2026-update-free-tools-background-tasks
title_ar: 'جديد Convertica: أدوات مجانية أكثر، مهام في الخلفية، وسير عمل محفوظ'
meta_title_ar: 'جديد صيف 2026 | Convertica'
meta_description_ar: 'خمس أدوات خرجت من Premium، وحلّ حد يومي مشترك محل جدران الدفع، ووصل محوّلان جديدان، وصار Premium يكمل العمل حتى بعد إغلاق التبويب.'
meta_keywords_ar: 'جديد convertica, أدوات pdf مجانية, heic إلى jpg مجانا, pdf إلى markdown, epub إلى pdf مجانا, توقيع pdf أون لاين, pdf إلى نص, محول pdf إلى pdf/a, حماية صورة بكلمة مرور, تحويل في الخلفية, سير عمل محفوظ'
excerpt_ar: 'خمس أدوات لم تعد تتطلب Premium، ومحوّلان جديدان وصلا، وصار Premium يواصل العمل حتى بعد إغلاق التبويب. إليك كل ما تغيّر هذا الصيف.'
content_ar: |
  <p>منذ آخر منشور إخباري أطلقنا الكثير. باختصار: خمس أدوات خرجت من Premium، ومحوّلان جديدان وصلا، وتعلّم Premium أن يكمل العمل بينما تنشغل أنت بأمور أخرى. وإليك التفاصيل.</p>

  <h2>خمس أدوات صارت مجانية</h2>
  <p>كانت هذه الأدوات تتطلب اشتراك Premium. لم تعد كذلك:</p>
  <ul>
    <li><a href="/ar/image/heic-to-jpg/">HEIC إلى JPG</a> (صور الآيفون)</li>
    <li><a href="/ar/pdf-to-markdown/">PDF إلى Markdown</a></li>
    <li><a href="/ar/epub-to-pdf/">EPUB إلى PDF</a> و<a href="/ar/pdf-to-epub/">PDF إلى EPUB</a></li>
    <li><a href="/ar/pdf-to-text/">PDF إلى نص</a></li>
    <li><a href="/ar/pdf-edit/sign/">توقيع PDF</a></li>
  </ul>
  <p>اختفت أيضا جدران الدفع الخاصة بكل أداة. بدلا منها صار هناك حد يومي واحد بسيط تتشاركه كل أدوات الموقع: <strong>10 تحويلات في اليوم</strong> بدون حساب، و<strong>40 في اليوم</strong> مع حساب مجاني، وبلا حدود مع Premium. تُحتسب التحويلات الناجحة فقط، ويُصفَّر العداد كل يوم. تبقى المعالجة الدفعية وOCR والملفات الضخمة ضمن Premium.</p>

  <h2>جديد: احمِ صورتك بكلمة مرور</h2>
  <p>تحتاج إلى إرسال نسخة ممسوحة من جواز سفر أو صورة مستند؟ أداة <a href="/ar/image/password-protect-image/">حماية الصورة</a> تضع صورة واحدة أو أكثر في ملف PDF واحد مشفّر بمعيار AES-256. من يستلم الملف لن يفتحه إلا بكلمة المرور. مجانية مثل بقية أدوات الصور.</p>

  <figure><img src="/static/images/tools/image-password-protect-image.jpg" alt="أداة حماية الصورة: الصور تتحول إلى PDF محمي بكلمة مرور" width="1200" height="750" loading="lazy"></figure>

  <h2>جديد: PDF إلى PDF/A للأرشفة</h2>
  <p>المحاكم والجامعات والبوابات الحكومية كثيرا ما تقبل PDF/A فقط، وهو معيار ISO للأرشفة طويلة الأمد. <a href="/ar/pdf-to-pdfa/">محوّل PDF إلى PDF/A</a> الجديد ينتج ملفات PDF/A-1b أو 2b أو 3b، ويتحقق قبل تسليمك الملف من أنه يعلن التوافق مع المعيار فعلا. جزء من Premium.</p>

  <h2>Premium: أغلق التبويب، ونحن نكمل</h2>
  <p>المهام الطويلة، مثل OCR على مستند ممسوح ضخم، كانت تحتجز تبويب المتصفح رهينة. الآن يستطيع مشتركو Premium إرسال أي تحويل طويل إلى الخلفية والانصراف إلى شؤونهم. وعند الانتهاء:</p>
  <ul>
    <li>تصلك النتيجة بالبريد الإلكتروني (مرفقا حتى 10 ميغابايت، وإلا فرابط تنزيل)،</li>
    <li>يعرض المتصفح إشعارا فوريا حتى لو كنت على موقع آخر،</li>
    <li>يبقى الملف في انتظارك ضمن سجل التحويلات الجديد.</li>
  </ul>
  <p>التفاصيل على صفحة <a href="/ar/background-tasks/">المهام في الخلفية</a>.</p>

  <figure><img src="/static/images/tools/background-tasks.jpg" alt="طابور المهام في الخلفية: التحويل مستمر بعد إغلاق التبويب" width="1200" height="750" loading="lazy"></figure>

  <h2>Premium: سير عمل محفوظ</h2>
  <p>تضغط الفواتير بالإعدادات نفسها كل جمعة؟ احفظ الأداة مع إعداداتها كسير عمل وافتح كل شيء بنقرة واحدة. يعيش سير العمل في متصفحك ويتزامن عبر حسابك: الإعداد الذي حفظته في المكتب يظهر أيضا على حاسوبك المنزلي. المزيد على صفحة <a href="/ar/saved-workflows/">سير العمل المحفوظ</a>.</p>

  <figure><img src="/static/images/tools/saved-workflows.jpg" alt="لوحة سير العمل المحفوظ مع إعدادات الأدوات الجاهزة" width="1200" height="750" loading="lazy"></figure>

  <h2>حماية PDF: أنت تقرر ما يستطيع القارئ فعله</h2>
  <p>أداة <a href="/ar/pdf-security/protect/">حماية PDF</a> ما زالت تشفّر الملفات بمعيار AES-256 مجانا. ويضيف Premium فوق ذلك التحكم في الأذونات: يمكنك منع طباعة الملف المحمي أو نسخه أو تحريره.</p>

  <h2>Convertica كتطبيق</h2>
  <p>صار بالإمكان تثبيت Convertica على الهاتف أو الحاسوب كتطبيق عادي: أيقونة على الشاشة الرئيسية، ونافذة مستقلة، ومن دون واجهة المتصفح. ولا حاجة لأي متجر تطبيقات. <a href="/ar/install/">دليل التثبيت</a> يغطي iPhone وAndroid وWindows وMac.</p>

  <h2>أسرع وأهدأ وأمتن</h2>
  <ul>
    <li>الصفحات صارت أسرع بوضوح؛ معظمها يحقق الآن نتيجة شبه كاملة في PageSpeed.</li>
    <li>تخلينا عن أدوات التحليلات الخارجية. الزيارات يحصيها الآن عدّادنا الخاص من دون ملفات تعريف الارتباط.</li>
    <li>كل صفحة أداة تعرض الآن لقطة شاشة للواجهة، ولكثير منها دروس فيديو قصيرة.</li>
    <li>أصلحنا الخلل الذي كان يجعل صفحات المحوّلات تظهر فارغة لبعض مستخدمي العربية، إضافة إلى عشرات الإصلاحات الصغيرة.</li>
  </ul>

  <h2>جرّب بنفسك</h2>
  <p>كل ما سبق متاح الآن. تصفّح <a href="/ar/all-tools/">جميع الأدوات</a>، وإذا تصرّف شيء بغرابة فأخبرنا عبر <a href="/ar/contact/">نموذج التواصل</a>. نصف هذا الإصدار وُلد من بلاغاتكم.</p>
