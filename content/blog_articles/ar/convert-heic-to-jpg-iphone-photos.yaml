meta_description_ar: "صور iPhone تصلك بصيغة HEIC وWindows يرفض فتحها. تعرّف على ماهية HEIC، وثلاث طرق للحصول على JPG (اثنتان منها مجانيتان ومدمجتان في هاتفك)، ومتى يكون المحوّل أسرع."
meta_keywords_ar: "heic إلى jpg، تحويل heic إلى jpg، فتح heic على windows، صور iphone بصيغة heic، محول heic، heic إلى jpeg، ما هو heic"
excerpt_ar: "يرسل لك أحدهم صورة من iPhone فيقف Windows عاجزا أمامها. الملف بصيغة HEIC — صيغة Apple الموفّرة للمساحة. إليك ما هي وأسرع الطرق لتحويلها إلى JPG يُفتح في كل مكان."
content_ar: |
  يرسل لك أحدهم صور العطلة عبر AirDrop، أو تنسخ صورا من iPhone إلى حاسوب Windows محمول، فترفض الملفات أن تُفتح. الامتداد هو <strong>‎.heic</strong>، والصورة المصغّرة فارغة، وعارض الصور يقترح عليك شراء برنامج ترميز. لا شيء معطوب — لقد تعرّفت للتو على صيغة Apple للصور. يشرح هذا الدليل ما هي HEIC، ولماذا يستخدمها هاتفك iPhone، والطرق العملية الثلاث للحصول على JPG عادي منها.

  <h2>ما هي HEIC ولماذا يستخدمها iPhone؟</h2>

  <p>HEIC (حاوية الصور عالية الكفاءة، المبنية على معيار HEIF) هي صيغة الكاميرا الافتراضية في هواتف iPhone منذ iOS 11 في عام 2017. اختارتها Apple لسبب واحد: عند الجودة البصرية نفسها، تشغل صورة HEIC نصف مساحة التخزين التي يشغلها ملف JPG تقريبا. وعلى مستوى ألبوم كاميرا يضم آلاف الصور، فهذه مساحة كبيرة فعلا — ولهذا يلتقط هاتفك الصور بصيغة HEIC ما لم تطلب منه خلاف ذلك.</p>

  <p>المشكلة هي التوافق. JPG موجود في كل مكان منذ ثلاثين عاما؛ أما HEIC فلا. يحتاج Windows إلى إضافات ترميز مدفوعة لفتحها، وأجهزة Android القديمة تعاني معها، وكثير من المواقع والبوابات الحكومية ترفضها عند الرفع، ومعظم أكشاك الطباعة لم تسمع بها قط.</p>

  <h2>الطريقة 1 — التحويل أونلاين (تناسب الملفات الموجودة لديك بالفعل)</h2>

  <figure><img src="/static/blog/images/tool-heic-to-jpg-hero.jpg" alt="شاشة رفع محوّل HEIC إلى JPG من Convertica" width="1280" height="800" loading="lazy"></figure>

  <p>عندما يكون ملف HEIC موجودا بالفعل على حاسوبك — وصلك عبر البريد الإلكتروني، أو نُسخ من هاتف، أو نُزّل من ألبوم سحابي — فإن تحويله في المتصفح هو أقصر طريق:</p>

  <ol>
    <li>افتح محوّل <a href="/ar/image/heic-to-jpg/">HEIC إلى JPG</a> وارفع ملف ‎.heic أو ‎.heif (حتى 25 MB).</li>
    <li>اختر صيغة الإخراج: <strong>JPG</strong> للتوافق الشامل، أو <strong>PNG</strong> إذا كنت تحتاج جودة بلا فقدان، أو <strong>PDF</strong> إذا كان على الصورة أن تنتقل كمستند.</li>
    <li>نزّل الملف المحوَّل. سيُفتح في أي إصدار من Windows، وفي كل حزم المكتب، ويُرفع في أي مكان.</li>
  </ol>

  <figure><img src="/static/blog/images/tool-heic-to-jpg-options.jpg" alt="خيارات صيغة الإخراج في محوّل HEIC إلى JPG" width="1280" height="800" loading="lazy"></figure>

  <p>التحويلات الفردية مجانية — بلا تسجيل ومع حد يومي — ويمكن لمستخدمي بريميوم تحويل ما يصل إلى 10 صور HEIC دفعة واحدة — وهذا مفيد عندما يحتاج ألبوم كامل إلى أن يصبح ملفات JPG. وإذا كنت تفضّل ألا تظهر ملفات HEIC أصلًا، فالطريقتان أدناه تحلّان الأمر من جهة iPhone نفسه.</p>

  <h2>الطريقة 2 — اجعل iPhone يلتقط JPG مباشرة (مجانية، للصور المستقبلية)</h2>

  <p>إذا كانت HEIC تعترض طريقك باستمرار، فبدّل صيغة الكاميرا على الهاتف نفسه:</p>

  <ol>
    <li>افتح <strong>الإعدادات</strong> وانتقل إلى <strong>الكاميرا</strong>.</li>
    <li>اضغط على <strong>التنسيقات</strong>.</li>
    <li>اختر <strong>«الأكثر توافقاً»</strong> بدلا من «الكفاءة العالية».</li>
  </ol>

  <p>من الآن فصاعدا ستحفظ الكاميرا ملفات JPG مباشرة. المقابل واضح: ستشغل صورك ضعف مساحة التخزين تقريبا، وقد تكون أوضاع 48 ميجابكسل القريبة من ProRAW على أجهزة iPhone الأحدث محدودة. كثيرون يُبقون HEIC مفعّلة لتوفير المساحة ويحوّلون صورا فردية فقط عندما يطالب شيء ما بصيغة JPG.</p>

  <h2>الطريقة 3 — حيلة المشاركة المدمجة (مجانية، صورة واحدة في كل مرة)</h2>

  <p>سلوكان صامتان في iOS قد يوفّران عليك التحويل بالكامل:</p>

  <ul>
    <li><strong>البريد الإلكتروني وكثير من تطبيقات المراسلة تحوّل تلقائيا.</strong> شارك صورة عبر تطبيق البريد وغالبا ما تصل كملف JPG لا HEIC.</li>
    <li><strong>النسخ واللصق يحوّل أيضا.</strong> إذا حددت صورا في تطبيق الصور، وضغطت على مشاركة، ثم <strong>نسخ الصور</strong>، ولصقتها في مجلد أو مستند، فإن iOS يسلّمك ملفات JPG.</li>
  </ul>

  <p>هناك أيضا إعداد يُصلح النقل عبر USB: <strong>الإعدادات &gt; الصور &gt; النقل إلى Mac أو PC &gt; تلقائي</strong>. مع تفعيله، تصل الصور المنسوخة عبر الكابل بصيغة متوافقة حتى لو كانت مخزّنة على الهاتف بصيغة HEIC.</p>

  <h2>هل يفقد تحويل HEIC إلى JPG شيئا من الجودة؟</h2>

  <p>تقنيا، تُعاد ترميز الصورة، فيحدث قدر من إعادة الضغط. عمليا، عند إعداد جودة مرتفع يكون الفرق غير مرئي — لن تجده دون التكبير حتى مستوى البكسلات والمقارنة جنبا إلى جنب. أمران يستحقان المعرفة:</p>

  <ul>
    <li>سيكون ملف JPG <strong>أكبر</strong> من ملف HEIC الذي جاء منه — وغالبا قريبا من الضعف. هذه ليست جودة مضافة؛ إنها ببساطة لأن JPG ضاغط أقل كفاءة. وهذا بالضبط سبب تخلي Apple عنه.</li>
    <li>إذا كانت الصورة ستخضع لتحرير مكثف لاحقا، فحوّلها إلى <strong>PNG</strong> بدلا من ذلك. PNG بلا فقدان، لذا لن تتراكم تشوهات الضغط مع الحفظ المتكرر.</li>
  </ul>

  <h2>أي إخراج تختار: JPG أم PNG أم PDF؟</h2>

  <ul>
    <li><strong>JPG</strong> — الإجابة الافتراضية. الأصغر بين الثلاثة، يُفتح في كل مكان، ومناسب للصور المتجهة إلى الويب أو الدردشة أو مستندات المكتب.</li>
    <li><strong>PNG</strong> — بلا فقدان وأكبر حجما. اختره لسير عمل لقطات الشاشة للصور، أو التحرير المكثف، أو عندما يصرّ نموذج رفع على PNG.</li>
    <li><strong>PDF</strong> — عندما يجب أن تتصرف الصورة كمستند: مطالبة تأمين، إيصال، صفحة موقّعة مصوَّرة بالهاتف. إذا كانت لديك عدة صور تنتمي إلى مستند واحد، فحوّلها بأداة <a href="/ar/jpg-to-pdf/">JPG إلى PDF</a> بدلا من ذلك — فهي تدمج عدة صور في ملف PDF واحد.</li>
  </ul>

  <h2>الأسئلة الشائعة</h2>

  <h3>لماذا يطلب مني Windows الدفع لفتح HEIC؟</h3>
  <p>توفّر Microsoft برنامج ترميز الفيديو HEVC الذي تعتمد عليه HEIC كإضافة مدفوعة، لذا لا يستطيع تثبيت Windows جديد فك ترميز الصيغة. تحويل الملف إلى JPG يتجاوز المشكلة برمتها — لا شيء يُثبَّت، ولا شيء يُشترى.</p>

  <h3>هل يحتفظ التحويل ببيانات الصورة الوصفية؟</h3>
  <p>الصورة نفسها تُحوَّل بنظافة. بعض البيانات الوصفية (الموقع، إعدادات الكاميرا) قد لا تنجو من الرحلة، فإذا كانت بيانات EXIF مهمة لحالتك، فافحص الملف المحوَّل قبل حذف الأصل.</p>

  <h3>هل يمكنني تحويل ألبوم كامل دفعة واحدة؟</h3>
  <p>يمكن لمستخدمي بريميوم رفع ما يصل إلى 10 ملفات HEIC في الدفعة الواحدة والحصول على ملف ZIP. أما لمئات الصور، فالخطوة الأفضل هي الحل من جهة iPhone: اضبط الكاميرا على «الأكثر توافقاً»، أو استخدم إعداد النقل التلقائي عبر USB، فلا تحتاج الصور إلى تحويل أصلا.</p>

  <h3>ما الفرق بين HEIC وHEIF؟</h3>
  <p>HEIF هو المعيار؛ وHEIC هي النسخة المحددة التي تستخدمها Apple (حاوية HEIF مع ضغط HEVC). لأغراض التحويل يتصرفان بالطريقة نفسها، والأداة تقبل كلا الامتدادين.</p>

  <h3>هل HEIC أفضل من JPG؟</h3>
  <p>كصيغة تخزين، نعم — الجودة نفسها بنحو نصف الحجم، مع دعم ألوان 10-bit والصور الحية. كصيغة تبادل، لا — فالعالم ما زال يتحدث JPG. الإعداد المعقول هو HEIC على الهاتف وJPG للمشاركة، وهو بالضبط ما تمنحك إياه الطرق أعلاه.</p>

  <h2>جرّبه الآن</h2>

  <p>إذا كان ملف HEIC جاثما على سطح مكتبك الآن رافضا أن يُفتح، فأسقطه في محوّل <a href="/ar/image/heic-to-jpg/">HEIC إلى JPG</a>، واختر JPG، وستنتهي في ثوانٍ. وإذا كان هذا يحدث لك أسبوعيا، فأنفق ثانية من تلك الثواني في تبديل كاميرا iPhone إلى «الأكثر توافقاً» — وستشكر نفسك لاحقا.</p>
