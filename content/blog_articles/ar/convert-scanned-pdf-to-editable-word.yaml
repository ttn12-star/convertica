slug: convert-scanned-pdf-to-editable-word
title_ar: "كيفية تحويل PDF ممسوح ضوئيا إلى مستند Word قابل للتحرير (مع نصائح OCR)"
meta_title_ar: "تحويل PDF ممسوح إلى Word مجانا | Convertica"
meta_description_ar: "PDF الممسوح ضوئيا هو مجرد صور لنص. تعلّم كيف يحوّله OCR إلى مستند Word قابل للتحرير، وما الدقة المتوقعة، وخطوات التنظيف التي تجعله صالحا للاستخدام."
meta_keywords_ar: "pdf ممسوح إلى word، ocr pdf إلى word، pdf قابل للتحرير، صورة pdf إلى word، تحويل المسح إلى docx"
excerpt_ar: "إذا كان 'تحديد النص' في PDF يبرز فقط مساحة فارغة، فلديك PDF ممسوح ضوئيا، وتحتاج إلى OCR بدلا من محول عادي. إليك ما يجب توقعه."
content_ar: |
  جرّب هذا على PDF أمامك: انقر واسحب عبر فقرة كما لو كنت ستنسخ النص. إذا أبرز مؤشرك كلمات فردية، فإن PDF رقمي ومحول قياسي يعمل. إذا أبرز مستطيلا كبيرا حول الصفحة بأكملها، فلديك مسح ضوئي، مما يعني أن كل صفحة هي في الأساس صورة من ورقة، وأي أداة عادية لـ PDF-إلى-Word ستعيد إليك مستند Word مليئا بالصور، لا بالنص.

  هنا يأتي دور OCR. التعرف الضوئي على الحروف يقرأ البكسلات ويعيد بناءها كحروف وكلمات وفقرات حقيقية. عند تنفيذه جيدا، تحصل على ‎.docx‎ قابل للتحرير. عند تنفيذه بشكل سيء، تحصل على نص مشوش وعليك تنظيف الفواصل والمسافات وأخطاء rn-مقابل-m لمدة ساعة. الفرق في الغالب في ملف المصدر وبضعة أمور يمكنك التحكم بها.

  <figure><img src="/static/blog/images/tool-pdf-to-word.jpg" alt="محول PDF إلى Word من Convertica يقبل مستندا ممسوحا ضوئيا للمعالجة بـ OCR" width="1280" height="800" loading="lazy"></figure>

  <h2>كيفية تمييز ما إذا كان PDF ممسوحا ضوئيا</h2>

  ثلاثة فحوصات سريعة:

  <ul>
    <li><strong>تحديد النص.</strong> حاول تحديد كلمة واحدة. إذا أصبحت الصفحة بأكملها مستطيلا واحدا قابلا للتحديد، فالصفحة صورة.</li>
    <li><strong>حجم الملف.</strong> ملف PDF نصي من 10 صفحات عادة 100 إلى 500 KB. ملف PDF ممسوح من 10 صفحات غالبا 5 إلى 30 MB لأن كل صفحة هي صورة عالية الدقة.</li>
    <li><strong>القطع المرئية.</strong> تظهر المسوحات تنقطا، ودورانا طفيفا، وحوافا باهتة، ونسيج ورق مرئيا. ملفات PDF رقمية المنشأ بها أحرف واضحة بحواف مصقولة وبدون ضوضاء خلفية.</li>
    <li><strong>شكل المؤشر.</strong> حوّم فوق النص. يقلب PDF الرقمي مؤشرك إلى عمود-I فوق النص وسهم فوق الصور. يبقى PDF الممسوح كسهم في كل مكان - لأن كل شيء صورة.</li>
  </ul>

  توجد ملفات PDF هجينة أيضا، حيث مسح شخص ما عقدا ثم ألحق صفحة توقيع رقمية المنشأ. يتخطى OCR الصفحة الرقمية (لا حاجة) ويعالج فقط الممسوحة. قم بإجراء اختبار تحديد النص على عدة صفحات مختلفة من أي ملف كبير قبل افتراض أن الكل من نوع واحد.

  <h2>ما يفعله OCR فعلا</h2>

  OCR هو تعرف على الأنماط لأشكال الحروف. ينظر المحرك إلى مجموعات البكسلات، ويقارنها بنموذج مدرب على ملايين صور المحارف، ويصدر حرفا مخمنا بأفضل حالاته مع درجة ثقة. تستخدم المحركات الحديثة أيضا السياق المحيط: إذا كان متأكدا بنسبة 80% أن الكلمة التالية هي "agreement" والحرف الثالث غامض بين "r" و "n"، فإنه يختار "r" لأن "agreement" كلمة حقيقية.

  هناك إعدادان يحركان الدقة أكثر من أي شيء آخر:

  <ul>
    <li><strong>لغة المصدر.</strong> نموذج مدرب على الإنجليزية على مستند فرنسي يخطئ في الأحرف ذات العلامات ويربك الكلمات الشائعة. اضبط اللغة دائما بشكل صريح عندما تعرض الأداة ذلك.</li>
    <li><strong>دقة DPI للمصدر.</strong> 300 DPI هو الحد العملي لـ OCR نظيف. مسوحات 200 DPI يمكن أن تعمل للطباعة الكبيرة لكنها تكافح مع الحواشي السفلية الصغيرة. تحت 150، تنهار الدقة بسرعة.</li>
  </ul>

  عامل ثالث لا يفكر فيه الناس كثيرا: التباين. يعمل OCR على الفرق بين الحبر والخلفية. نسخة ضوئية باهتة من نسخة ضوئية يمكن أن تكون لها دقة اسمية 300 DPI ولا تزال تنتج عجينة لأن نسبة التباين منخفضة جدا للمحرك ليجد حواف الحروف. تتعامل المحركات الحديثة مع هذا أفضل من القديمة، لكن إصدارات Tesseract القديمة (أي شيء قبل الإصدار 4.0، الصادر في 2018) لا تزال تكافح على المدخلات منخفضة التباين.

  <h2>خطوة بخطوة: PDF ممسوح إلى Word</h2>

  <figure><img src="/static/blog/images/tool-pdf-to-word.jpg" alt="تحويل PDF-إلى-Word مدعوم بـ OCR يحوّل مسحا إلى ‎.docx‎ قابل للتحرير" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>افتح أداة <a href="/ar/pdf-to-word/">تحويل PDF إلى Word</a> وارفع مسحك. تكتشف الأداة ما إذا كان OCR لازما تلقائيا عندما يعود تحديد النص فارغا.</li>
    <li>حدد لغة المصدر بحيث يستخدم المعرف القاموس الصحيح. تتصرف الإنجليزية والإسبانية والألمانية والفرنسية والإيطالية والبرتغالية والروسية والبولندية بشكل أفضل ملحوظ عند ضبطها بشكل صريح.</li>
    <li>شغّل التحويل. مسح من 10 صفحات يستغرق نحو 30 إلى 90 ثانية حسب تعقيد الصورة. أرشيف من 100 صفحة قد يستغرق عدة دقائق.</li>
    <li>نزّل ‎.docx‎ وافتحه في Word. تحقق من الصفحة الأولى مقابل PDF الأصلي قبل الوثوق بالباقي.</li>
  </ol>

  <blockquote class="callout">احتفظ دائما بـ PDF الممسوح الأصلي. إذا شوّش OCR صفحة، فأنت تريد أن تكون قادرا على مقارنتها بالمصدر بدلا من تخمين ما كان يجب أن تكون عليه الكلمة غير المقروءة.</blockquote>

  يستحق التحقق مرة قبل الوثوق بالناتج: افتح ‎.docx‎ في Word وانظر إلى علامات التنسيق (بدّلها بـ Ctrl+Shift+8 على Windows، Cmd+8 على macOS). إذا رأيت الكثير من علامات الفقرات في نهاية كل سطر - لأن OCR ظن أن كل سطر مرئي فقرة - ستحتاج إلى إصلاح ذلك بـ بحث-واستبدال قبل التحرير. الإصلاح بسيط: استبدل علامات الفقرة المفردة بمسافة، ثم علامات الفقرة المزدوجة بمفردة. (أرى أن هذه الحيلة الواحدة في Word توفر وقتا أكثر من أي إعداد OCR.)

  <h2>توقعات دقة واقعية</h2>

  ادعاءات التسويق "دقة 99%" تفترض نصا مطبوعا نظيفا على ورق أبيض بدقة 300 DPI. تتفاوت المستندات الواقعية بشكل كبير. إليك ما يجب توقعه فعلا:

  <table>
    <thead>
      <tr>
        <th>نوع المستند</th>
        <th>دقة OCR النموذجية</th>
        <th>التنظيف اللازم</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>نص مطبوع نظيف، مستند حديث</td>
        <td>95-99%</td>
        <td>الحد الأدنى، علامات ترقيم في الغالب</td>
      </tr>
      <tr>
        <td>مستند مرسل بالفاكس أو منسوخ ضوئيا</td>
        <td>80-90%</td>
        <td>تدقيق صفحة بصفحة</td>
      </tr>
      <tr>
        <td>طباعة قديمة بالآلة الكاتبة / قبل 2000</td>
        <td>75-90%</td>
        <td>تدقيق مكثف، خاصة لـ "1" مقابل "l"</td>
      </tr>
      <tr>
        <td>كتابة يدوية</td>
        <td>30-70%، متغير جدا</td>
        <td>أسرع غالبا إعادة الكتابة</td>
      </tr>
      <tr>
        <td>جداول الأرقام</td>
        <td>التخطيط يفشل في معظم الأوقات</td>
        <td>إعادة تنسيق يدوية</td>
      </tr>
      <tr>
        <td>تخطيط جريدة أو مجلة متعدد الأعمدة</td>
        <td>النص صحيح، التخطيط خاطئ</td>
        <td>إعادة الانسياب إلى عمود واحد يدويا</td>
      </tr>
      <tr>
        <td>صورة كاميرا لصفحة (إضاءة جيدة)</td>
        <td>85-95%</td>
        <td>اقتص وعدّل الإمالة أولا للحصول على أفضل النتائج</td>
      </tr>
    </tbody>
  </table>

  أي شخص يعد بـ 99% على مستند مرسل بالفاكس إما لم يختبره أو يبيع شيئا. اضبط توقعاتك على "سأحتاج للتدقيق"، وليس "أستطيع شحن هذا خاما".

  مشكلة محددة: أرقام الفواتير ورموز المراجع هي حيث تؤذي أخطاء OCR أكثر. رقم مقروء خطأ في فقرة من نص الجسم مغفور؛ رقم مقروء خطأ في "Invoice 1023841" يمكن أن يقيد دفعة لحساب خاطئ. تحقق دائما من المعرفات الرقمية في ناتج OCR مقابل الأصل.

  <h2>تنظيف ما قبل OCR يعزز الدقة</h2>

  خمس دقائق من الإعداد تخفض وقت تنظيف ما بعد OCR إلى النصف:

  <ul>
    <li><strong>قم بتدوير الصفحات الجانبية.</strong> تفترض محركات OCR نصا أفقيا. تعيد الصفحة المدارة 90 درجة هراء أو لا شيء. استخدم أداة لـ <a href="/ar/pdf-edit/rotate/">تدوير الصفحات الجانبية أولا</a> قبل OCR.</li>
    <li><strong>اقتص الهوامش الزائدة.</strong> الحدود البيضاء العريضة تربك محلل التخطيط ليظن أن عمودك الواحد عمودان. <a href="/ar/pdf-edit/rotate/">اقتص الهوامش</a> إلى حيث يبدأ النص فعلا.</li>
    <li><strong>زد التباين.</strong> تستفيد المسوحات الباهتة من تعزيز التباين في برنامج الماسح الضوئي أو أي محرر صور قبل إعادة الحفظ كـ PDF. نص أسود نقي على خلفية بيضاء نقية هو المعيار الذهبي.</li>
    <li><strong>عدّل الإمالة.</strong> الصفحات المائلة بحتى 2 إلى 3 درجات تضر بالدقة. لدى معظم برامج الماسح الضوئي خيار تعديل الإمالة التلقائي، ويستحق التشغيل.</li>
    <li><strong>أسقط اللون إلى تدرج رمادي أو أبيض-وأسود</strong> قبل المسح إن استطعت. الصبغات الملونة (الناتج النموذجي ذو اللون الأصفر للناسخات المكتبية) تغير التباين بطرق ترهق المعرف.</li>
    <li><strong>أزل الدبابيس والتجاعيد قبل المسح.</strong> يبدو واضحا، لكن الصفحات المطوية تنتج خطوطا مظللة يقرأها OCR كشرطات سفلية أو حدود جدول.</li>
  </ul>

  <h2>قائمة تحقق لتنظيف ما بعد OCR</h2>

  بمجرد وصول ‎.docx‎، شغّل بضع جولات بحث-واستبدال قبل البدء في التحرير بجدية. هذه أكثر أخطاء OCR شيوعا في المستندات الإنجليزية:

  <ul>
    <li>غالبا ما تصبح <code>rn</code> <code>m</code>، أو العكس. ابحث عن "rn" وأشباه "modern".</li>
    <li>يخلط <code>l</code> (l صغيرة) بـ <code>1</code> (واحد). شائع خاصة في أرقام الفواتير والتواريخ.</li>
    <li>يخلط <code>0</code> (صفر) بـ <code>O</code> (o كبيرة) داخل الرموز والمعرفات.</li>
    <li>الاقتباسات الذكية تنقلب إلى مستقيمة أو العكس، مما يكسر الاقتباسات.</li>
    <li>تتحول شرطات em إلى شرطتين أو شرطة-مسافة-شرطة.</li>
    <li>قد تنتهي الرؤوس والتذييلات من كل صفحة سطريا كنص. احذفها مرة واحدة وأقفل رأس Word حقيقيا بدلا منها.</li>
    <li>قوائم نقطية تُعرض كفقرات عادية مسبوقة بحرف "•" حرفي أو حرف "o" تائه.</li>
    <li>الكلمات المقطوعة بشرطة في نهاية السطر (mer-/chant على أسطر متتالية) تنجو أحيانا في مستند Word كشرطات حقيقية. ابحث عن "- " (شرطة-مسافة) ونظف.</li>
  </ul>

  تحتاج الجداول دائما تقريبا إلى إعادة بناء يدوية. إذا كان المصدر يحتوي على بيانات تفضل أن تكون في جدول بيانات على أي حال، فقد يكون أسرع <a href="/ar/pdf-to-excel/">استخراج البيانات إلى Excel بدلا من ذلك</a> وتجاوز Word كليا للأقسام الرقمية.

  تستحق فقرة منفصلة: التوقيعات والأختام لا تنجو من OCR. تأتي كصور صغيرة مضمنة، مقطوعة غالبا، ومفقودة أحيانا كليا. إذا كانت القيمة القانونية للمستند تعتمد على توقيع، فإن نسخة Word المعالجة بـ OCR هي نسخة عمل، وليست نسخة موثوقة. احتفظ بـ PDF الأصلي كسجل قانوني.

  <h2>متى لا يستحق OCR</h2>

  أحيانا تكون الإجابة الصحيحة هي إعادة الكتابة بدلا من OCR-والتنظيف. تعتمد نقطة التعادل على طول المستند وجودة المصدر:

  <ul>
    <li><strong>أقل من صفحة واحدة من طباعة نظيفة:</strong> غالبا ما تكون إعادة الكتابة أسرع من تشغيل OCR والتنزيل وفتح Word والتدقيق.</li>
    <li><strong>صفحة إلى عشر صفحات من طباعة نظيفة:</strong> يفوز OCR، حتى مع التنظيف.</li>
    <li><strong>عشر صفحات أو أكثر من جودة فاكس سيئة:</strong> يفوز OCR في الوقت، لكن جولة التنظيف يمكن أن تكون مملة. خطط لها كمهمة حقيقية، وليست مهمة سريعة من خمس دقائق.</li>
    <li><strong>أي شيء مكتوب بخط اليد:</strong> أعد الكتابة ما لم يكن المستند مئات الصفحات والبديل هو "عدم امتلاكه رقميا على الإطلاق".</li>
    <li><strong>البيانات الرقمية:</strong> إعادة كتابة الأرقام أسرع من التحقق من كل رقم في ناتج OCR، وخطوة التحقق إلزامية إذا كانت الدقة مهمة.</li>
  </ul>

  شيء آخر يستحق المعرفة عن السرية: السجل الطبي الممسوح أو نص شهادة تدلي بها وتعالجها بـ OCR عبر خدمة ويب قد عاش الآن لفترة وجيزة على خادم شخص آخر، حتى لو حذف ذلك الخادم على الفور. للمستندات المغطاة بـ HIPAA، أو بيانات الفئة الخاصة بـ GDPR، أو الامتياز بين المحامي والعميل، شغّل OCR محليا بـ Tesseract أو أداة سطح مكتب مثل ABBYY FineReader. ضريبة الإعداد لخمس دقائق تستحق راحة البال.

  <h2>الأسئلة الشائعة</h2>

  <h3>لماذا يخرج مستند Word فارغا بعد التحويل؟</h3>
  <p>دائما تقريبا، شغّلت محولا بدون OCR على PDF ممسوح. لم يجد المحول طبقة نصية، لذا أنتج مستند Word مع صور الصفحة المضمنة لكن بدون نص قابل للتحرير. أعد تشغيل الملف عبر مسار تحويل ممكّن بـ OCR.</p>

  <h3>هل يستطيع OCR التعامل مع ملاحظات مكتوبة بخط اليد؟</h3>
  <p>أحيانا، بشكل سيء. تحسن OCR للكتابة اليدوية مع النماذج العصبية لكنه لا يزال يتراوح من 30% إلى 70% دقة على الكتابة اليدوية الواقعية. لأي شيء مهم، إعادة الكتابة عادة أسرع من تصحيح ناتج OCR. الكتابة اليدوية بأحرف الطباعة (مثل نموذج مملوء بأحرف كبيرة) تعمل أفضل بكثير من الكتابة المتصلة.</p>

  <h3>أي اللغات يدعمها OCR؟</h3>
  <p>تغطي معظم المحركات، بما في ذلك التي تستخدمها Convertica، جميع اللغات الأوروبية الكبرى بما في ذلك الإنجليزية والإسبانية والفرنسية والألمانية والإيطالية والبرتغالية والروسية والبولندية وغيرها الكثير. اضبط لغة المصدر بشكل صريح للنصوص ذات العلامات أو غير اللاتينية. المستندات متعددة اللغات (الإنجليزية مع مقاطع فرنسية مقتبسة) تعمل أفضل عند ضبطها على اللغة المهيمنة.</p>

  <h3>لماذا تخرج الجداول كنص مشوش؟</h3>
  <p>يقرأ OCR من اليسار إلى اليمين، من الأعلى إلى الأسفل، وحدود خلايا الجدول تربك ذلك التدفق. قد تنتهي الأرقام من الصف 1 العمود 3 بجوار الصف 2 العمود 1. للبيانات الجدولية، التحويل المباشر إلى Excel وإعادة بناء الجدول هناك عادة أسرع من إصلاحه في Word.</p>

  <h3>هل تحويل OCR سري؟</h3>
  <p>تعالج الأدوات المتصفحية الموثوقة الملف في جلسة مؤقتة وتحذفه بعد ذلك بفترة قصيرة. اقرأ سياسة الخصوصية لأي أداة قبل رفع مستندات حساسة. للمواد السرية للغاية، فكّر في OCR محلي (Tesseract، ABBYY) بدلا من أي خدمة ويب.</p>

  <h3>كم يستغرق OCR لمسح من 50 صفحة؟</h3>
  <p>نحو دقيقتين إلى خمس دقائق على خدمة جيدة، حسب دقة الصورة وحمل الخادم. تستغرق المسوحات بدقة 600 DPI وقتا أطول ملحوظا من 300 DPI دون إنتاج نتائج أفضل.</p>

  <h2>جرّبه الآن</h2>

  <p>توقف عن إعادة الكتابة. ارفع مسحك إلى <a href="/ar/pdf-to-word/">محول PDF إلى Word</a>، اضبط لغة المصدر، وستحرر في Word بعد دقيقة. فقط خطط لجولة تدقيق سريعة قبل شحن النتيجة.</p>
