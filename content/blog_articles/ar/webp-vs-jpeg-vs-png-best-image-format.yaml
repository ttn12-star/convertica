title_ar: "WebP أم JPEG أم PNG: أي صيغة صور ينبغي أن تستخدم؟"
meta_title_ar: "WebP أم JPEG أم PNG — أفضل صيغة صور للويب | Convertica"
meta_description_ar: "WebP أصغر من JPEG بنسبة 25-35%، وPNG بلا فقدان، وJPEG يُفتح في كل مكان. مقارنة عملية مع جدول قرار وأمثلة أحجام ملفات ومتى تتفوق كل صيغة."
meta_keywords_ar: "webp أم jpeg، webp أم png، أفضل صيغة صور للويب، jpeg أم png، مقارنة صيغ الصور، تحويل صيغة صورة، صيغة webp"
excerpt_ar: "ثلاث صيغ تغطي كل الصور على الويب تقريبا، واختيار الصيغة الخاطئة يكلّفك حجم الملف أو الجودة أو التوافق. إليك كيف تختلف WebP وJPEG وPNG فعليا — وقاعدة بسيطة للاختيار."
content_ar: |
  كل صورة سترفعها تقريبا تنتقل في واحدة من ثلاث حاويات: JPEG أو PNG أو WebP. تبدو قابلة للتبادل — فالصورة هي الصورة — لكنها في الداخل تعقد مقايضات مختلفة جدا، والاختيار الخاطئ يكلّفك شيئا ما بصمت: شعار ضبابي، لقطة شاشة بحجم 4 MB، صورة يرفض نظام قديم قبولها. هذه المقارنة توضّح لأي شيء صُممت كل صيغة فعلا.

  <h2>الإجابة المختصرة</h2>

  <ul>
    <li><strong>WebP</strong> — الخيار الافتراضي للمواقع. أصغر من JPEG بنسبة 25-35% عند الجودة نفسها، وتدعم الشفافية والحركة. استخدمها كلما كنت تتحكم في مكان عرض الصورة.</li>
    <li><strong>JPEG</strong> — الخيار الافتراضي للصور المتنقلة. كل جهاز وبرنامج ونموذج رفع منذ التسعينيات يقبلها. استخدمها عندما يكون التوافق أهم من آخر كيلوبايت.</li>
    <li><strong>PNG</strong> — الخيار الافتراضي للرسوميات الدقيقة حتى مستوى البكسل. بلا فقدان، مع شفافية نظيفة. استخدمها للشعارات ولقطات شاشة الواجهات والمخططات وأي شيء بحواف حادة ونصوص.</li>
  </ul>

  <h2>مقارنة جنبا إلى جنب</h2>

  <table>
    <thead>
      <tr><th></th><th>WebP</th><th>JPEG</th><th>PNG</th></tr>
    </thead>
    <tbody>
      <tr><td><strong>الضغط</strong></td><td>بفقدان أو بلا فقدان</td><td>بفقدان</td><td>بلا فقدان</td></tr>
      <tr><td><strong>حجم الصورة الفوتوغرافية المعتاد</strong></td><td>الأصغر</td><td>متوسط</td><td>الأكبر (غالبا 5-10 أضعاف JPEG)</td></tr>
      <tr><td><strong>الشفافية</strong></td><td>نعم</td><td>لا (تُملأ بالأبيض)</td><td>نعم</td></tr>
      <tr><td><strong>الحركة</strong></td><td>نعم</td><td>لا</td><td>لا (APNG نادرة)</td></tr>
      <tr><td><strong>دعم المتصفحات</strong></td><td>كل المتصفحات الحديثة</td><td>شامل</td><td>شامل</td></tr>
      <tr><td><strong>البرامج / الأجهزة القديمة</strong></td><td>تُرفض أحيانا</td><td>تُقبل دائما</td><td>تُقبل دائما تقريبا</td></tr>
      <tr><td><strong>الأنسب لـ</strong></td><td>صفحات الويب، المتاجر الإلكترونية</td><td>صور المشاركة، البريد، خدمات الطباعة</td><td>الشعارات، لقطات الشاشة، الرسوميات النصية</td></tr>
    </tbody>
  </table>

  <h2>لماذا حجم الملف أهم مما يبدو</h2>

  <p>الصور عادة هي أثقل ما في الصفحة. تقليصها هو أسهل مكسب أداء على الإطلاق: تُحمَّل الصفحات أسرع، وتتحسن درجات <strong>Core Web Vitals</strong>، ويستهلك زوار الهواتف بيانات أقل. سرعة الصفحة إشارة ترتيب في محركات البحث، لذا فاختيار الصيغة بالنسبة لصاحب الموقع هو ضمنيا قرار SEO أيضا.</p>

  <p>للإحساس الملموس بالأرقام: صورة معتادة بدقة 12 ميجابكسل تستقر حول 2-4 MB كملف JPEG عالي الجودة، و1.5-3 MB كملف WebP بالجودة البصرية نفسها، و15-25 MB كملف PNG. رقم PNG هذا ليس خطأ — تخزين الصور الفوتوغرافية بلا فقدان مكلف للغاية، ولهذا فإن PNG هي الصيغة الخاطئة للصور الفوتوغرافية.</p>

  <h2>متى يبقى JPEG هو الخيار الصحيح</h2>

  <p>تتفوق WebP في الحجم، لكن لدى JPEG ميزة لا تُقهر: ثلاثون عاما من الدعم الشامل. اختر JPEG عندما تخرج الصورة من نطاق سيطرتك:</p>

  <ul>
    <li>إرفاق صور بالبريد الإلكتروني أو بمستندات قد يفتحها أحدهم في برنامج قديم.</li>
    <li>الرفع إلى البوابات الحكومية وطلبات التوظيف والنماذج ذات قوائم أنواع الملفات الصارمة.</li>
    <li>إرسال صور إلى خدمة طباعة أو كشك صور.</li>
    <li>المشاركة مع أشخاص لا تعرف شيئا عن أجهزتهم.</li>
  </ul>

  <p>مرفق WebP لا يستطيع المستلم فتحه يوفّر لك 30% من لا شيء.</p>

  <h2>متى تكون PNG هي الإجابة الصحيحة الوحيدة</h2>

  <p>يعمل الضغط بفقدان عبر التخلص من تفاصيل تتسامح معها العين في الصورة الفوتوغرافية — لكن العين لا تتسامح معها في الرسوميات. النص المضغوط بـ JPEG تنمو حوله هالات ضبابية؛ وحدود الألوان الحادة تتلطخ. استخدم PNG في:</p>

  <ul>
    <li><strong>الشعارات والأيقونات</strong>، خصوصا الموضوعة فوق خلفيات ملونة (تحتاج إلى الشفافية).</li>
    <li><strong>لقطات شاشة الواجهات</strong> التي تتضمن نصا — التوثيق، تقارير الأخطاء، الشروحات.</li>
    <li><strong>المخططات والرسوم البيانية وفن البكسل</strong> ذات الحواف الصلبة والألوان المسطحة.</li>
    <li>أي صورة ستخضع <strong>للتحرير وإعادة الحفظ مرارا</strong> — بلا فقدان يعني عدم تدهور الأجيال.</li>
  </ul>

  <h2>كيفية التحويل بين الصيغ</h2>

  <figure><img src="/static/blog/images/tool-convert-image-hero.jpg" alt="شاشة رفع محوّل صيغ الصور من Convertica" width="1280" height="800" loading="lazy"></figure>

  <p>تبديل الصيغ يستغرق ثوانٍ ولا يحتاج إلى تثبيت أي شيء:</p>

  <ol>
    <li>افتح أداة <a href="/ar/image/convert/">تحويل الصور</a> وارفع ملف JPEG أو PNG أو WebP أو GIF أو BMP أو TIFF.</li>
    <li>اختر الصيغة الهدف، ولـ JPEG أو WebP، مستوى الجودة (90 خيار افتراضي آمن).</li>
    <li>نزّل النتيجة. أبعاد البكسلات تبقى كما هي تماما — الترميز فقط هو ما يتغير.</li>
  </ol>

  <figure><img src="/static/blog/images/tool-convert-image-options.jpg" alt="خيارات الصيغة والجودة في محوّل الصور" width="1280" height="800" loading="lazy"></figure>

  <p>تحويل ملفات PNG الحاملة للشفافية إلى WebP يحافظ على قناة الألفا؛ أما تحويلها إلى JPEG فيملأ المناطق الشفافة بالأبيض — لذا تحويل الشعار إلى JPEG خطأ في الغالب. وإذا كان هدفك مجرد ملف أصغر بالصيغة <em>نفسها</em>، فأداة <a href="/ar/image/optimize/">تحسين الصورة</a> تضغط في المكان ويمكنها أيضا تحديد سقف للأبعاد.</p>

  <h2>الأسئلة الشائعة</h2>

  <h3>هل WebP أقل جودة من JPEG؟</h3>
  <p>لا — عند إعدادات متقاربة تحافظ WebP على الجودة البصرية نفسها في ملف أصغر. ضاغطها ببساطة أحدث وأذكى من ضاغط JPEG العائد إلى عام 1992. الجودة يحددها المستوى الذي تختاره، لا اسم الصيغة.</p>

  <h3>لماذا ترفض بعض المواقع رفع ملف WebP؟</h3>
  <p>لأن آلية التحقق من الرفع لديها أقدم من شيوع WebP وتسمح فقط بـ JPEG وPNG. حوّل إلى JPEG لذلك الرفع — مهمة عشر ثوانٍ — وأبقِ WebP لموقعك أنت.</p>

  <h3>هل أحوّل ملفات JPEG الموجودة لديّ إلى WebP؟</h3>
  <p>لموقع تديره أنت — نعم، فهو عادة أرخص مكسب متاح لسرعة الصفحات. أعد الترميز من أعلى مصدر جودة لديك وليس من نسخة مضغوطة بشدة بالفعل، حتى لا تتراكم التشوهات.</p>

  <h3>وماذا عن GIF؟</h3>
  <p>للحركة، تتفوق WebP (أو ملف فيديو حقيقي) على GIF في الحجم وعمق الألوان. وللصور الثابتة، يجعلها حد الـ 256 لونا الأسوأ بين الأربع — فهي تنجو في الغالب بحكم العادة وتقاليد الميمز.</p>

  <h3>ما أفضل إعداد جودة لـ JPEG وWebP؟</h3>
  <p>80-85 لاستخدام الويب — النقطة المثالية حيث تكون التشوهات غير مرئية بأحجام العرض العادية. و90 فأكثر عندما قد تُحرَّر الصورة مجددا أو تُعرض عن قرب. تحت 70، تستمر الوفورات في النمو لكن البقع المرئية تنمو معها، خصوصا في السماوات والتدرجات.</p>

  <h2>اختر مرة واحدة، وحوّل عند الحاجة</h2>

  <p>القاعدة الذهبية تتسع لسطر واحد: <strong>WebP لموقعك، وJPEG للصور المتنقلة، وPNG للرسوميات ذات الحواف.</strong> وعندما تصل صورة بصيغة خاطئة للمهمة، فإن أداة <a href="/ar/image/convert/">تحويل الصور</a> تصلح ذلك بنقرة واحدة — مجانا، بدون تسجيل، وبأبعاد لم تُمس.</p>
