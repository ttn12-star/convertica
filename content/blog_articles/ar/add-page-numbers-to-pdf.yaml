slug: add-page-numbers-to-pdf
title_ar: "كيفية إضافة أرقام صفحات إلى PDF (وتخطّي صفحة الغلاف)"
meta_title_ar: "إضافة أرقام صفحات إلى PDF - مجانا عبر الإنترنت | Convertica"
meta_description_ar: "أضف أرقام صفحات إلى أي PDF في ثوان: اختر الموضع والتنسيق، ابدأ من أي رقم، وتخطّ صفحة الغلاف حتى يبدأ الترقيم حيث ينبغي."
meta_keywords_ar: "إضافة أرقام صفحات إلى pdf، ترقيم صفحات pdf، إدراج أرقام في pdf، ترقيم bates لـ pdf، أرقام صفحات pdf مجانا، تخطي ترقيم صفحة الغلاف"
excerpt_ar: "تبدو أرقام الصفحات تافهة حتى تدمج خمسة مستندات في حزمة من 60 صفحة دون طريقة للإشارة إلى أي شيء. إليك كيف تضيفها بشكل نظيف - وكيف تبدأ الترقيم بعد الغلاف، لا عليه."
content_ar: |
  تدمج خطاب تقديم وسيرة ذاتية وثلاثة مستندات مرجعية في PDF واحد لأجل طلبٍ ما، ثم ترسله، فيرد المراجع بالبريد: "هل يمكنك الإشارة إلى أين تذكر الميزانية؟" لا يوجد رقم صفحة للإشارة إليه. تبدو أرقام الصفحات فكرة لاحقة في التنسيق حتى اللحظة التي يحتاج فيها شخص ما إلى الإشارة إلى صفحة محددة في مستند طويل - وعندها يكون غيابها مزعجا فعلا.

  إضافتها إلى PDF موجود تستغرق نحو عشرين ثانية. القرارات الوحيدة الجديرة بالتفكير هي أين تذهب الأرقام، وأي تنسيق تأخذ، وما إذا كان ينبغي عدّ صفحة الغلاف. يغطي هذا الدليل الثلاثة جميعا، إضافة إلى النسخة الخاصة بالمجال القانوني (ترقيم Bates) وحالة الحزمة المدمجة حيث تهم أرقام الصفحات أكثر.

  <figure><img src="/static/blog/images/tool-page-numbers-hero.jpg" alt="أداة إضافة أرقام الصفحات من Convertica مع منطقة رفع الملفات" width="1280" height="800" loading="lazy"></figure>

  <h2>لماذا تضيف الأرقام بعد وجود الـ PDF</h2>

  إذا كنت قد أنشأت المستند في Word أو Google Docs، فقد كان بإمكانك إضافة الأرقام هناك. لكن معظم مشاكل الترقيم لا تأتي من هناك، بل من ملفات PDF لم تنشئها أو لا تستطيع إعادة تحريرها بسهولة:

  <ul>
    <li>حزمة <a href="/ar/pdf-organize/merge/">دمجتها من عدة ملفات</a>، كل منها بترقيمه الخاص أو دون ترقيم على الإطلاق.</li>
    <li>مستند ممسوح موجود كـ PDF فقط.</li>
    <li>ملف أرسله إليك شخص آخر يحتاج إلى مراجع متسقة قبل اجتماع.</li>
  </ul>

  في كل هذه، ليس عمليا إعادة تحرير المصدر، لذا تختم الأرقام على الـ PDF الجاهز بدلا من ذلك. هذا بالضبط ما تفعله أداة ترقيم الصفحات - تضيف طبقة نص في الهامش دون المساس بمحتوى الصفحة.

  <h2>خطوة بخطوة: رقّم PDF</h2>

  <figure><img src="/static/blog/images/tool-page-numbers-options.jpg" alt="خيارات رقم الصفحة بما في ذلك الموضع والتنسيق ورقم البداية" width="1280" height="800" loading="lazy"></figure>

  لـ<a href="/ar/pdf-edit/add-page-numbers/">إضافة أرقام صفحات عبر الإنترنت</a>:

  <ol>
    <li>ارفع الـ PDF. تعرض المعاينة أين ستهبط الأرقام.</li>
    <li>اختر موضعا - أسفل الوسط هو الافتراضي الآمن؛ أسفل اليمين يناسب المستندات التي ستُجلّد على اليسار.</li>
    <li>اختر تنسيقا. "1" البسيط هو الأنظف؛ "Page 1 of 20" يخبر القارئ كم تبقى؛ "1 of 20" هو الحل الوسط المدمج.</li>
    <li>اضبط رقم البداية والصفحة الأولى للترقيم (انظر أدناه).</li>
    <li>طبّق ونزّل. مرّر مرة واحدة لتأكيد أن الأرقام تجلس بعيدا عن النص الموجود.</li>
  </ol>

  <h2>مسألة صفحة الغلاف</h2>

  أكثر الأخطاء شيوعا هو ترقيم الغلاف. صفحة العنوان أو جدول المحتويات ينبغي عادةً ألا تحمل "1" - بل ينبغي أن يبدأ الترقيم من أول صفحة محتوى. تتعامل الأدوات مع هذا بإعدادين منفصلين يخلط بينهما الناس غالبا:

  <ul>
    <li><strong>الصفحة الأولى للترقيم</strong> - تخبر الأداة بتخطي ختم رقم على الصفحة 1 (الغلاف) والبدء بالطباعة من الصفحة 2.</li>
    <li><strong>رقم البداية</strong> - يخبر الأداة بأي قيمة تطبع أولا. اضبطه على 1 حتى تُقرأ أول صفحة محتوى "1"، لا "2".</li>
  </ul>

  <blockquote class="callout">للحصول على غلاف دون رقم ومحتوى يبدأ عند "1": تخطّ الصفحة الأولى، واضبط رقم البداية على 1. اضبط كليهما - فضبط واحد منهما فقط هو ما يجعل المحتوى يبدأ من الصفحة 2.</blockquote>

  المنطق نفسه ينطبق على المستندات التي تتضمن عدة صفحات تمهيدية. تقرير بغلاف وقسم محتويات من صفحتين قد يتخطى الصفحات الثلاث الأولى ويبدأ العدّ المطبوع عند 1 على الصفحة الرابعة.

  <h2>ترقيم Bates للمستندات القانونية</h2>

  تستخدم مكاتب المحاماة متغيرا أكثر صرامة يسمى ترقيم Bates - معرّف فريد متسلسل يُختم على كل صفحة عبر مجموعة كاملة من المستندات، غالبا ببادئة مثل <code>SMITH-000123</code>. والغرض منه أن يتيح الإشارة إلى أي صفحة بعينها ضمن مستندات الإفصاح القانوني بشكل لا لبس فيه، حتى عبر آلاف الصفحات من ملفات مختلفة. إذا كنت تعدّ مستندات ثبوتية أو مجموعة إفصاح، ابحث عن خيار بادئة ورقم بعرض ثابت (أصفار بادئة) حتى تفرز المعرّفات وتُشار إليها بشكل نظيف. للمستندات اليومية، الترقيم البسيط هو كل ما تحتاجه.

  <h2>ترقيم حزمة مدمجة</h2>

  تبرز قيمة أرقام الصفحات أكثر ما تبرز في المستندات المدمجة. الترتيب الصحيح للعمليات يهم: <strong>ادمج أولا، ثم رقّم</strong>. إذا رقّمت الملفات الفردية ثم دمجتها، تحصل على ثلاث "صفحة 1" في حزمة واحدة. بالترقيم بعد الدمج، يحمل المستند بأكمله تسلسلا متصلا واحدا من أوله إلى آخره.

  إذا أدخلت أو أزلت صفحة لاحقا، أعد تشغيل الترقيم بدلا من تحرير الأرقام المختومة - ستعيد الأداة ترقيم الملف بأكمله بشكل متسق، حيث يترك الإصلاح اليدوي فجوة.

  <h2>إبقاء الأرقام مقروءة</h2>

  <ul>
    <li><strong>انتبه إلى الهامش.</strong> إذا كان المستند يحتوي بالفعل على نص تذييل، ضع الأرقام في زاوية حتى لا تتداخل.</li>
    <li><strong>طابق النبرة.</strong> خط صغير محايد بنفس لون نص المتن يبدو متعمدا؛ رقم كبير عريض يبدو مقحمًا.</li>
    <li><strong>افحص الصفحات الأفقية.</strong> في ملف مختلط الاتجاهات، تأكد أن الرقم لا يزال يهبط في مكان معقول على الصفحات المدورة.</li>
    <li><strong>اترك مجالا للتجليد.</strong> إذا كان المستند سيُطبع ويُجلّد، أبق الأرقام بعيدا عن حافة التجليد.</li>
  </ul>

  <h2>الأسئلة الشائعة</h2>

  <h3>كيف أضيف أرقام صفحات إلى PDF مجانا؟</h3>
  <p>ارفع الملف إلى أداة ترقيم الصفحات، اختر الموضع والتنسيق، اضبط رقم البداية، ونزّل. تضيف طبقة نص في الهامش دون تغيير محتوى الصفحة، ولا تحتاج إلى برنامج أو حساب.</p>

  <h3>كيف أبدأ الترقيم بعد صفحة الغلاف؟</h3>
  <p>اضبط "الصفحة الأولى للترقيم" على الصفحة 2 حتى يبقى الغلاف فارغا، واضبط "رقم البداية" على 1 حتى تُقرأ أول صفحة محتوى "1". اضبط كلا الإعدادين - تغيير واحد فقط يترك المحتوى يبدأ عند "2".</p>

  <h3>هل يمكنني عرض "Page 1 of 20" بدلا من "1" فقط؟</h3>
  <p>نعم. تقدّم معظم الأدوات تنسيقا يتضمن إجمالي عدد الصفحات. "Page X of Y" مفيد في المستندات الطويلة لأنه يخبر القارئ كم تبقى.</p>

  <h3>هل ينبغي أن أرقّم قبل دمج الملفات أم بعده؟</h3>
  <p>بعده. ادمج المستندات في PDF واحد أولا، ثم رقّم الملف المدمج حتى يحمل تسلسلا متصلا واحدا. الترقيم قبل الدمج ينتج عدة "صفحة 1".</p>

  <h3>ما هو ترقيم Bates؟</h3>
  <p>نظام ترقيم قانوني يختم معرّفا فريدا متسلسلا - غالبا ببادئة وأصفار بادئة، مثل SMITH-000123 - على كل صفحة عبر مجموعة مستندات، حتى يمكن الإشارة إلى أي صفحة بشكل لا لبس فيه. استخدم أداة بخيار بادئة وعرض ثابت له.</p>

  <h2>جرّبه الآن</h2>

  <p>افتح <a href="/ar/pdf-edit/add-page-numbers/">أداة إضافة أرقام الصفحات</a>، اضبط موضعك وصفحة البداية، واختم تسلسلا نظيفا في ثوان. تبني حزمة أولا؟ <a href="/ar/pdf-organize/merge/">ادمج ملفاتك</a>، ثم رقّم - أو تصفح <a href="/ar/all-tools/">جميع أدوات PDF</a>.</p>
