content_ar: |
  أيقونة الموقع هي أصغر قطعة في هويتك البصرية، وهي في الوقت نفسه أكثر ما يراه الناس تكرارًا. تظهر في تبويب المتصفح، وفي شريط المفضّلة، وبجوار اسمك في نتائج البحث، وعلى شاشة الهاتف الرئيسية حين يحفظ أحدهم صفحتك. لا أحد ينتبه إلى أيقونة جيدة، لكن الجميع يلاحظون أيقونة مفقودة أو ضبابية، أو تلك الكرة الأرضية الرمادية العامة التي يعرضها المتصفح حين تنسى إضافة أيقونة من الأساس. صناعة أيقونة سليمة لا تستغرق سوى دقائق قليلة متى عرفت ما تطلبه المتصفحات والأجهزة الحديثة فعلًا. إليك الصورة كاملة، وأسرع طريق يعبرها.

  <h2>ما هي أيقونة الموقع (favicon) بالضبط</h2>

  <p>كلمة favicon اختصار لعبارة "favorite icon" أي الأيقونة المفضّلة، وهي تلك الصورة المربّعة الصغيرة التي تمثّل الموقع. بدأت حياتها في أواخر التسعينيات كملف واحد بحجم 16x16 بكسل اسمه favicon.ico، وظلّت القصة تنتهي عند هذا الحد لوقت طويل. لكن الأمر لم يعد كذلك. اليوم يجب أن يظهر الشعار الصغير نفسه واضحًا في تبويب المتصفح على شاشة لابتوب عالية الدقة، وفي إشارة مرجعية، وعلى شاشة الآيفون الرئيسية بمقاس 180 بكسل، وعلى جهاز أندرويد، وداخل تطبيق ويب قابل للتثبيت، وأحيانًا بجوار ظهورك في محرّك البحث. كل موضع من هذه المواضع يطلب مقاسًا مختلفًا، وبعضها يطلب اسم ملف محدّدًا.</p>

  <p>لهذا السبب صارت نصيحة "ارفع صورة 16x16 وانتهى الأمر" الموروثة من سنوات ماضية تنتج فوضى ضبابية. صورة صغيرة مكبّرة إلى أيقونة شاشة رئيسية بحجم 180 بكسل تبدو باهتة ومبعثرة البكسلات. الأسلوب الصحيح هو أن تبدأ من صورة واحدة كبيرة ونظيفة، ثم تولّد منها مجموعة صغيرة من الملفات بالمقاسات الصحيحة.</p>

  <h2>لماذا لم يعد مقاس واحد كافيًا</h2>

  <p>كل سطح يسحب أيقونة مختلفة. فهم مكان ظهور كل واحدة يجعل قائمة المقاسات أدناه تبدو منطقية بدلًا من كونها اعتباطية:</p>

  <ul>
    <li><strong>تبويبات المتصفح والمفضّلة</strong> تستخدم أيقونة favicon الكلاسيكية، عادةً بمقاس 16x16 أو 32x32، مع تفضيل مقاس 32 على الشاشات الحديثة عالية الكثافة.</li>
    <li><strong>شاشات الآيفون والآيباد الرئيسية</strong> تستخدم أيقونة apple-touch-icon بمقاس 180x180 حين يضيف أحدهم صفحتك إلى شاشته الرئيسية.</li>
    <li><strong>أندرويد وتطبيقات الويب القابلة للتثبيت (PWA)</strong> تستخدم أيقونتين بمقاس 192x192 و512x512 مُعرّفتين داخل ملف manifest صغير.</li>
    <li><strong>ويندوز والشاشات عالية الدقة</strong> تستفيد من المقاسات الوسيطة مثل 48 و64 و96 و128 و256 حتى لا تضطر الأيقونة إلى التكبير أو التصغير بعيدًا عن مقاسها الأصلي.</li>
    <li><strong>نتائج البحث</strong> قد تعرض أيقونتك بجوار عنوان الصفحة، وهو ما يعزّز هويتك بهدوء في كل ظهور.</li>
  </ul>

  <h2>المقاسات التي تحتاجها فعلًا في 2026</h2>

  <p>لست بحاجة إلى التخمين أو توليد مئات الملفات. هذه هي المجموعة العملية التي تغطّي كل متصفح وجهاز رئيسي، وهي تطابق تمامًا ما يسلّمه لك مولّد جيد:</p>

  <table>
    <thead>
      <tr><th>الملف</th><th>المقاس</th><th>مكان الظهور</th></tr>
    </thead>
    <tbody>
      <tr><td>favicon.ico</td><td>16 و32 و48 (متعدد المقاسات)</td><td>البديل العالمي: التبويبات وشريط العنوان والمفضّلة والمتصفحات القديمة</td></tr>
      <tr><td>favicon-16x16.png</td><td>16x16</td><td>عرض التبويب والمفضّلة بالمقاس الصغير</td></tr>
      <tr><td>favicon-32x32.png</td><td>32x32</td><td>أيقونة التبويب القياسية في متصفحات سطح المكتب الحديثة</td></tr>
      <tr><td>apple-touch-icon.png</td><td>180x180</td><td>اختصار شاشة الآيفون والآيباد الرئيسية</td></tr>
      <tr><td>android-chrome-192x192.png</td><td>192x192</td><td>شاشة أندرويد الرئيسية وتثبيت PWA</td></tr>
      <tr><td>android-chrome-512x512.png</td><td>512x512</td><td>شاشة بدء أندرويد وتطبيقات PWA عالية الدقة</td></tr>
      <tr><td>صور PNG بمقاسات 48 و64 و96 و128 و256</td><td>متنوّعة</td><td>الشاشات عالية الكثافة وويندوز، حتى نادرًا ما تُكبَّر الأيقونة</td></tr>
    </tbody>
  </table>

  <p>هذا أحد عشر ملفًا في المجموع: ملف ICO واحد، وعشرة ملفات PNG، إضافة إلى ملف manifest صغير ومقتطف من كود HTML. صناعتها كلها يدويًا في محرّر صور عمل مُرهق ويسهل الوقوع فيه بالخطأ. أما صناعتها في خطوة واحدة فهي جوهر القسم التالي.</p>

  <h2>الطريقة الأسرع: توليد الحزمة كاملة دفعة واحدة</h2>

  <figure><img src="/static/images/tools/image-favicon-generator.jpg" alt="مولّد أيقونات الموقع من Convertica يحوّل صورة واحدة إلى حزمة favicon كاملة" width="1280" height="800" loading="lazy"></figure>

  <p>بدلًا من تصدير المقاسات واحدًا تلو الآخر، ابدأ من صورة واحدة عالية الجودة ودَع المولّد يبني المجموعة كاملة. إليك سير العمل مع <a href="/ar/image/favicon-generator/">مولّد أيقونات الموقع</a>:</p>

  <ol>
    <li>افتح <a href="/ar/image/favicon-generator/">مولّد أيقونات الموقع</a> وارفع صورتك الأصلية. صيغة PNG أو JPG أو WebP أو SVG كلها تعمل، وملف SVG أو صورة PNG كبيرة يمنحان أوضح النتائج.</li>
    <li>تقتصّ الأداة صورتك من المركز لتصبح مربّعة بمقاس 512 بكسل، ثم تولّد كل مقاس نيابةً عنك: ملف favicon.ico متعدد الدقّات، والمدى الكامل من أيقونات PNG من 16 حتى 512، وأيقونة apple-touch-icon بمقاس 180 بكسل، وأيقونتي أندرويد بمقاس 192 و512.</li>
    <li>نزّل ملف ZIP. ستجد بداخله كل الأيقونات، وملف site.webmanifest جاهزًا لدعم PWA وأندرويد، وكتلة صغيرة من كود HTML للصقها في موقعك.</li>
  </ol>

  <p>تُحذف الصورة التي رفعتها من الخادم بعد المعالجة، بحيث لا يبقى أي أثر لشعار لم تطلقه بعد. النتيجة مجموعة أيقونات كاملة ومطابقة للمعايير من رفعة واحدة، دون الحاجة إلى أي محرّر صور. والأداة مجانية.</p>

  <h2>كود HTML الذي تلصقه، مشروحًا سطرًا بسطر</h2>

  <p>لا تعمل الأيقونة إلا إذا عرف المتصفح أين يجدها. يسلّمك المولّد مقتطفًا كهذا لتضعه داخل وسم <code>&lt;head&gt;</code> في صفحاتك:</p>

  <pre><code>&lt;link rel="icon" type="image/x-icon" href="/favicon.ico"&gt;
  &lt;link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"&gt;
  &lt;link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png"&gt;
  &lt;link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"&gt;
  &lt;link rel="manifest" href="/site.webmanifest"&gt;</code></pre>

  <p>وهذا ما يفعله كل سطر:</p>

  <ul>
    <li>السطر الأول يشير إلى <strong>favicon.ico</strong>، البديل العالمي الذي يفهمه كل متصفح، بما في ذلك القديمة منها.</li>
    <li>سطرا PNG يمنحان المتصفحات الحديثة أيقونة أوضح بمقاس <strong>32x32</strong> و<strong>16x16</strong>، ويتركان لها اختيار المناسب للشاشة.</li>
    <li>سطر <strong>apple-touch-icon</strong> هو ما تستخدمه أجهزة الآيفون والآيباد حين يحفظ أحدهم صفحتك على شاشته الرئيسية، فتبدو كأيقونة تطبيق حقيقي لا كلقطة شاشة ضبابية.</li>
    <li>سطر <strong>manifest</strong> يشير إلى ملف الـ manifest، وهو حيث تقرأ أجهزة أندرويد وتطبيقات الويب القابلة للتثبيت أيقوناتها وتفاصيل التطبيق.</li>
  </ul>

  <p>ارفع ملفات الأيقونات وملف الـ manifest إلى جذر موقعك حتى تُحلّ المسارات أعلاه، ويتولّى المتصفح ما تبقّى.</p>

  <h2>ما فائدة ملف الـ web manifest</h2>

  <p>ملف site.webmanifest ملف نصّي صغير يصف موقعك كتطبيق قابل للتثبيت. مهمته الأهم بالنسبة للأيقونات هي سرد أيقونتي 192x192 و512x512 اللتين تستخدمهما أجهزة أندرويد وتطبيقات الويب التقدّمية للشاشة الرئيسية وشاشة البدء. إن لم تكن تنوي أبدًا جعل موقعك قابلًا للتثبيت، فالـ manifest لا يسبّب أي ضرر ويبقي أندرويد راضيًا. وإن كنت تنوي ذلك، فهاتان الأيقونتان هما بالضبط ما يحتاجه، والمولّد يملؤهما لك.</p>

  <h2>اختيار الصورة الأصلية وإعدادها</h2>

  <p>أكبر عامل مؤثّر في الجودة هو الصورة التي تبدأ منها. بضع عادات تجعل كل مقاس مولّد يبدو أفضل:</p>

  <ul>
    <li><strong>ابدأ كبيرًا ومربّعًا.</strong> صورة بمقاس 512x512، أو ملف SVG، يصغّران بنظافة. أما المصدر الصغير فلا يمكنه أن يبدو إلا صغيرًا.</li>
    <li><strong>حافظ على البساطة.</strong> كثيرًا ما تُعرض الأيقونة بمقاس 16 بكسل. تختفي التفاصيل الدقيقة والخطوط الرفيعة والنصوص الصغيرة عند هذا الحجم. حرف واحد بارز أو رمز أو شعار مبسّط يُقرأ أفضل بكثير من شعارك الكامل مع عبارته التعريفية.</li>
    <li><strong>استخدم تباينًا قويًّا.</strong> يجب أن تبرز الأيقونة على خلفيتي المتصفح الفاتحة والداكنة معًا. التباين العالي بين الرمز وخلفيته يبقيه واضحًا في كل مكان.</li>
    <li><strong>انتبه للهوامش.</strong> اترك مساحة تنفّس صغيرة حول الرمز حتى لا يُقتطع حين تدوّر بعض المنصّات زوايا أيقونة التطبيق.</li>
  </ul>

  <p>إن كنت تحتار في الصيغة التي تبدأ منها، فدليل <a href="/ar/blog/webp-vs-jpeg-vs-png-best-image-format/">WebP مقابل JPEG مقابل PNG</a> يغطّي المقايضات، وإن كنت تتساءل عمّا يحدث للشعار الذي ترفعه، فملاحظتنا حول <a href="/ar/blog/is-convertica-safe-pdf-file-security-privacy-explained/">كيف تتعامل Convertica مع ملفاتك</a> تشرح جانب الخصوصية.</p>

  <h2>أخطاء شائعة تترك الأيقونة معطوبة</h2>

  <ul>
    <li><strong>الاكتفاء بملف favicon.ico وحده.</strong> يغطّي التبويبات لكنه لا يغطّي شاشات الآيفون الرئيسية ولا عمليات تثبيت PWA. أيقونة apple-touch-icon وأيقونات الـ manifest هي ما يسدّ هذه الثغرات.</li>
    <li><strong>مسارات ملفات خاطئة.</strong> إن لم تتطابق قيمة <code>href</code> في وسوم الروابط مع المكان الذي رفعت إليه الملفات فعلًا، فلن يعرض المتصفح شيئًا. أبقِ الأيقونات في جذر الموقع أو حدّث المسارات لتطابق.</li>
    <li><strong>إلقاء اللوم على ذاكرة المتصفح المؤقتة.</strong> تُخزَّن الأيقونات مؤقتًا بشدّة. بعد إضافة أيقونة أو تغييرها، يُظهر عادةً تحديث قسري أو زيارة في نافذة خاصة الأيقونة الجديدة التي كان التحديث العادي لا يزال يخفيها.</li>
    <li><strong>الانطلاق من صورة صغيرة.</strong> تكبير شعار صغير إلى 180 أو 512 بكسل ينتج أيقونة باهتة ومبعثرة البكسلات. ابدأ دائمًا من أكبر نسخة نظيفة لديك.</li>
  </ul>

  <h2>أسئلة شائعة</h2>

  <h3>هل ما زلت بحاجة إلى favicon.ico، أم أن PNG يكفي؟</h3>
  <p>احتفظ بكليهما. تستخدم المتصفحات الحديثة أيقونات PNG بلا مشكلة، لكن يبقى favicon.ico البديل العالمي الآمن، وبعض المتصفحات والأدوات لا تزال تبحث عنه بالاسم في جذر الموقع. المجموعة الكاملة تشمل الاثنين، ولهذا يُنتج المولّد ملف ICO إلى جانب ملفات PNG.</p>

  <h3>ما الفرق بين ICO وPNG هنا؟</h3>
  <p>ICO صيغة أقدم يمكنها تجميع عدة مقاسات (16 و32 و48) داخل ملف واحد، ولهذا تعمل بكفاءة عالية كأيقونة بديلة وحيدة. أما PNG فيحمل مقاسًا واحدًا لكل ملف لكنه يدعم الصور الواضحة عالية الجودة والشفافية، ولهذا تكون الأيقونات الأكبر بصيغة PNG. أنت تريد الاثنين، كلٌّ يؤدّي المهمّة التي يجيدها أكثر.</p>

  <h3>هل يمكنني استخدام خلفية شفافة؟</h3>
  <p>نعم، وصيغة PNG تدعمها. الخلفية الشفافة تتيح للأيقونة أن تستقرّ بشكل طبيعي على خلفيتي المتصفح الفاتحة والداكنة. تأكّد فقط من أن الرمز نفسه يملك تباينًا كافيًا ليبقى مرئيًّا على كلتيهما.</p>

  <h3>لماذا لا تظهر أيقونة موقعي الجديدة؟</h3>
  <p>السبب في الغالب الأعمّ هو الذاكرة المؤقتة. تحتفظ المتصفحات بالأيقونات مدّةً أطول من معظم الأصول. قم بتحديث قسري، أو افتح الموقع في نافذة خاصة، أو افحص ملف الأيقونة مباشرةً عبر رابطه للتأكّد من أنه رُفع. متى مُسحت الذاكرة المؤقتة ظهرت الأيقونة الجديدة.</p>

  <h3>هل أحتاج إلى favicon لأجل تحسين محركات البحث (SEO)؟</h3>
  <p>ليست عاملًا في الترتيب، لكن الأيقونة قد تظهر بجوار عنوان صفحتك في نتائج البحث، وهو ما يقوّي هويتك وقد يرفع نسبة النقر. إنها مهمّة صغيرة تُنجَز مرة واحدة بأثر بصري دائم، فلا سبب لتجاهلها.</p>

  <h2>أنشئ أيقونتك الآن</h2>

  <p>إن كان موقعك يعمل بلا أيقونة، أو بأيقونة ضبابية متبقّية من سنوات، فأصلح ذلك في دقيقتين. ارفع شعارك إلى <a href="/ar/image/favicon-generator/">مولّد أيقونات الموقع</a>، ونزّل ملف ZIP، وضَع الملفات في جذر موقعك، والصق مقتطف HTML. وإن كنت تحتاج ملف أيقونة واحدًا فقط بدلًا من الحزمة الكاملة، فأداتا <a href="/ar/image/png-to-ico/">تحويل PNG إلى ICO</a> و<a href="/ar/image/svg-to-ico/">تحويل SVG إلى ICO</a> تنجزان تلك المهمّة الواحدة، بينما يساعدك <a href="/ar/image/optimize/">مُحسّن الصور</a> على تقليص صورتك الأصلية أولًا.</p>
