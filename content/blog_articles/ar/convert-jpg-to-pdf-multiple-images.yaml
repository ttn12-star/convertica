title_ar: "كيفية تحويل JPG إلى PDF: ادمج عدة صور في ملف واحد"
meta_title_ar: "تحويل JPG إلى PDF أونلاين مجانا — دمج عدة صور | Convertica"
meta_description_ar: "حوّل صورة واحدة أو رزمة كاملة من ملفات JPG إلى PDF واحد، مجانا وفي المتصفح. ترتيب الصفحات، إعدادات الجودة، نصائح حجم الملف، وكيف تتعامل مع المسوحات والإيصالات."
meta_keywords_ar: "jpg إلى pdf، تحويل jpg إلى pdf، دمج الصور في pdf واحد، عدة jpg إلى pdf، صور إلى pdf، محول صورة إلى pdf، دمج jpg في pdf"
excerpt_ar: "عقد مُصوَّر، رزمة إيصالات، صفحات ممسوحة ضوئيا محفوظة كصور — عاجلا أم آجلا تحتاج كلها إلى أن تصبح ملف PDF واحدا مرتبا. إليك كيف تفعل ذلك مجانا، بالترتيب الصحيح، وبالجودة الصحيحة."
content_ar: |
  حوّلت الهواتف الجميع إلى مشغّلي ماسحات ضوئية: عقد مُصوَّر هنا، ثلاثة إيصالات هناك، لوح أبيض من الاجتماع الأخير. المشكلة هي التسليم. لا أحد يريد استلام أحد عشر ملف JPG متناثرا في سلسلة بريد إلكتروني — يريدون ملف PDF واحدا، بصفحات مرتبة، يُطبع بشكل صحيح. يوضح هذا الدليل كيف تحصل على ذلك بالضبط، مجانا، ودون تثبيت أي شيء.

  <h2>حوّل ملف JPG واحدا — أو ادمج حتى 50 صورة في ملف PDF واحد</h2>

  <figure><img src="/static/blog/images/tool-jpg-to-pdf-hero.jpg" alt="شاشة رفع محوّل JPG إلى PDF من Convertica" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>افتح محوّل <a href="/ar/jpg-to-pdf/">JPG إلى PDF</a> وأضف صورك. ملف واحد يعطيك PDF من صفحة واحدة؛ والملفات المتعددة تُدمج في مستند واحد، صورة لكل صفحة، حتى 50 صورة لكل طلب.</li>
    <li><strong>الترتيب مهم:</strong> تصبح الصور صفحات بالترتيب الذي تضيفها به. سمِّ الملفات <em>01.jpg, 02.jpg, 03.jpg</em> قبل تحديدها ويتولى ترتيب الصفحات نفسه بنفسه.</li>
    <li>اضبط مؤشر الجودة إذا احتجت (المزيد عنه أدناه)، ثم انقر على <strong>تحويل</strong>.</li>
    <li>نزّل ملف PDF الجاهز — بدون علامة مائية وبدون تسجيل.</li>
  </ol>

  <p>تُوضع كل صورة على صفحة A4، ممركزة بهوامش مناسبة، فتبدو النتيجة مستندا لا كومة صور. الصور الطولية والعرضية كلتاهما تلائمان الصفحة تلقائيا — تُحجَّم الصورة على الصفحة ولا تُقتص أبدا.</p>

  <h2>اختيار إعداد الجودة الصحيح</h2>

  <figure><img src="/static/blog/images/tool-jpg-to-pdf-options.jpg" alt="خيارات الجودة في محوّل JPG إلى PDF" width="1280" height="800" loading="lazy"></figure>

  <p>يحدد ضبط الجودة (60-95، الافتراضي 85) مقدار إعادة ضغط الصور داخل ملف PDF:</p>

  <ul>
    <li><strong>85 (الافتراضي)</strong> — مناسب لكل شيء تقريبا. تبقى المستندات مقروءة، والصور نظيفة، وحجم الملف معقولا.</li>
    <li><strong>90 فأكثر</strong> — للصور التي يجب أن تصمد أمام الفحص الدقيق: أعمال البورتفوليو، صور المنتجات، وأي شيء قد يُطبع بحجم كبير. عند 90 وما فوق يتخطى المحوّل أيضا إعادة ضغط الصور التي هي أصلا ملفات JPG نظيفة، محافظا على البكسلات الأصلية.</li>
    <li><strong>60-75</strong> — لمخرجات صديقة للبريد الإلكتروني عندما تكون الصور المصدرية ضخمة. عشر صور هاتف بدقة 12 ميجابكسل قد تنتج بسهولة ملف PDF بحجم 30 MB عند الجودة العالية؛ وخفض المؤشر يروّضه.</li>
  </ul>

  <p>إذا خرج ملف PDF ثقيلا رغم ذلك على حد المرفقات، فمرّره بعد ذلك عبر <a href="/ar/pdf-organize/compress/">ضغط PDF</a> — فالجمع بين جودة معتدلة وضغط يُدخل معظم ملفات PDF المصورة تحت سقوف البريد الإلكتروني المعتادة.</p>

  <h2>فيمَ يستخدمها الناس فعلا</h2>

  <ul>
    <li><strong>تقارير المصروفات.</strong> شهر من الإيصالات الورقية مُصوَّرا ومدموجا في PDF واحد يُؤرشف أفضل بكثير من مجلد صور متناثرة — وقسم المحاسبة سيشكرك.</li>
    <li><strong>المستندات المُصوَّرة.</strong> عقد أو نموذج مُصوَّر صفحة صفحة بالهاتف يصبح مستندا واحدا مرتبا قابلا للطباعة.</li>
    <li><strong>الواجبات والطلبات.</strong> كثير من البوابات تقبل ملفا واحدا بالضبط. عشر صفحات مُصوَّرة وحقل رفع واحد — هذا هو الحل.</li>
    <li><strong>البورتفوليو ولوحات الإلهام.</strong> مجموعة منتقاة من الصور بترتيب ثابت، في مأمن من إعادة ضغط تطبيقات الدردشة لها وخلط ترتيبها.</li>
    <li><strong>الأرشفة.</strong> صفحات PDF بتاريخ في اسم الملف تتفوق على ألبوم الكاميرا في العثور على ذلك الإيصال بعد عامين.</li>
  </ul>

  <h2>الحصول على نتائج نظيفة من صور الهاتف</h2>

  <ul>
    <li>صوّر المستندات من الأمام مباشرة واملأ الإطار — تُوضع الصورة على الصفحة كما هي، فالصورة المائلة تبقى مائلة.</li>
    <li>الإضاءة المتساوية والمنتشرة تتفوق على الفلاش. الوهج على الورق اللامع هو السبب الأكثر شيوعا لصفحة مُصوَّرة غير مقروءة في الطباعة.</li>
    <li>اقتص الفوضى (حواف الطاولة، الأصابع) قبل التحويل؛ ينبغي أن تحتوي الصفحة على المستند، لا المشهد من حوله.</li>
    <li>صور iPhone بصيغة HEIC؟ حوّلها إلى JPG أولا بأداة <a href="/ar/image/heic-to-jpg/">HEIC إلى JPG</a>، ثم ادمج.</li>
  </ul>

  <h2>الأسئلة الشائعة</h2>

  <h3>هل هو مجاني حقا؟ هل من علامة مائية؟</h3>
  <p>تحويل ملفات JPG إلى PDF مجاني، بدون علامة مائية وبدون تسجيل. تنطبق حدود حجم الملف للفئة المجانية على كل صورة؛ وبريميوم يرفعها.</p>

  <h3>كم صورة يمكنني دمجها دفعة واحدة؟</h3>
  <p>حتى 50 صورة لكل طلب، تصبح كل منها صفحة واحدة في ملف PDF الناتج. تحتاج المزيد؟ قسّم الدفعة وادمج ملفات PDF الناتجة بأداة <a href="/ar/pdf-organize/merge/">دمج PDF</a>.</p>

  <h3>هل يمكنني تغيير ترتيب الصفحات بعد الرفع؟</h3>
  <p>تتبع الصفحات ترتيب إضافة الصور. العادة الموثوقة هي ترقيم أسماء الملفات قبل تحديدها. وإذا احتاج ملف PDF جاهز إلى إعادة ترتيب، فأداة <a href="/ar/pdf-organize/organize/">تنظيم PDF</a> توفر إعادة الترتيب بالسحب والإفلات.</p>

  <h3>هل يعمل مع PNG أو الصيغ الأخرى؟</h3>
  <p>تقبل هذه الأداة JPG/JPEG. لملفات PNG أو WebP أو الصيغ الأخرى، إما أن تحوّلها إلى JPG أولا بأداة <a href="/ar/image/convert/">تحويل الصور</a>، أو — لصورة واحدة — حوّلها هناك مباشرة إلى PDF.</p>

  <h3>هل سيكون النص في مستندي المُصوَّر قابلا للبحث؟</h3>
  <p>لا — يحتوي ملف PDF على صور للنص لا على نص. إذا كنت تحتاج إلى البحث في الكلمات أو نسخها أو تحريرها، فمرّر النتيجة عبر أداة OCR <a href="/ar/scanned-pdf-to-word/">PDF ممسوح ضوئيا إلى Word</a>، التي تتعرف على النص وتعيد إليك ملفا قابلا للتحرير.</p>

  <h3>هل بياناتي آمنة؟</h3>
  <p>تُعالَج الملفات لأغراض التحويل وتُنظَّف بصيانة مجدولة بُعيد ذلك. وكما هو الحال مع أي خدمة أونلاين، راجع سياسة الخصوصية قبل رفع مواد شديدة الحساسية.</p>

  <h2>جرّبه الآن</h2>

  <p>أمسك ذلك المجلد من الصفحات المُصوَّرة، رقّم الملفات، وأسقطها في محوّل <a href="/ar/jpg-to-pdf/">JPG إلى PDF</a>. بعد ثلاثين ثانية سيكون لديك ما أراده الجميع فعلا: ملف واحد، بصفحات مرتبة، جاهز للإرسال.</p>
