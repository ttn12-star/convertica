title_ar: "كيفية تقسيم PDF كشف بنكي إلى ملفات شهرية أو لكل معاملة"
meta_title_ar: "تقسيم PDF كشف بنكي حسب الشهر أو الصفحة"
meta_description_ar: "هل لديك كشف بنكي سنوي من 60 صفحة؟ قسّمه إلى ملفات PDF شهرية للضرائب أو طلبات القروض أو تصنيف المصاريف، مع قائمة تحقق للخصوصية قبل المشاركة."
meta_keywords_ar: "تقسيم pdf كشف بنكي، فصل صفحات pdf، تقسيم pdf حسب الشهر، استخراج صفحات من كشف، أداة تقسيم pdf مجانية"
excerpt_ar: "تحب البنوك تسليم ملف PDF عملاق واحد للسنة. تقسيمه إلى أجزاء شهرية يجعل موسم الضرائب وأوراق القروض وتصنيف المصاريف أسهل بشكل كبير."
content_ar: |
  تتيح لك معظم البنوك تنزيل "السنة" كملف PDF واحد. مريح لها، محرج لك في اللحظة التي يطلب فيها وسيط رهن "فقط آخر ثلاثة أشهر" أو يحتاج محاسبك إلى فصل الربع 1 عن الربع 2. إعادة رفع ملف من 60 صفحة في كل مرة تسرب تفاصيل مالية أكثر مما تريد المشاركة، وتجعل تصنيف المعاملات في جدول بيانات مؤلما - ستمرر عبر تسعة أشهر لا تحتاج إلى رؤية أي شيء تحتاجه.

  تقسيم الملف مرة واحدة، إلى ملفات PDF شهرية مسماة بشكل صحيح، يحل كلتا المشكلتين. يغطي هذا الدليل متى <a href="/ar/pdf-organize/split/">تقسم PDF عبر الإنترنت</a> حسب نطاق الصفحات مقابل استخراج صفحات محددة، وخطوات الخصوصية التي تتجاوزها معظم الدروس، واصطلاح تسمية يجعل النتيجة قابلة للعثور عليها بعد سنة.

  <figure><img src="/static/blog/images/tool-split.jpg" alt="أداة تقسيم Convertica تقسم PDF كشف بنكي إلى ملفات شهرية" width="1280" height="800" loading="lazy"></figure>

  <h2>لماذا تقسم كشف بنك أصلا</h2>

  التقسيم ليس مجرد ترتيب أنيق. هناك لحظات ملموسة يوفر فيها الوقت أو يحمي المعلومات:

  <ul>
    <li><strong>تقديم الضرائب.</strong> HMRC وIRS ومعظم سلطات الضرائب الوطنية تتوقع كشوفا لكل ربع أو لكل شهر، خاصة لـ VAT/GST والتقييم الذاتي. يطلب IRS Schedule C على وجه الخصوص إجماليات شهرية؛ إرسال السنة يجبر محاسبك على إعادة بنائها.</li>
    <li><strong>طلبات الرهن والقرض.</strong> يطلب المقرضون دائما تقريبا آخر ثلاثة أو ستة أشهر. إرسال السنة الكاملة كشف زائد، ويستخدم متعهدو الاكتتاب أحيانا معلومات لم تُطلب لتعزيز اعتراضاتهم.</li>
    <li><strong>تصنيف المصاريف.</strong> العمل من خلال شهر واحد في المرة في جدول بيانات أقل عرضة للخطأ بكثير من الانزلاق عبر 48 صفحة.</li>
    <li><strong>المشاركة المستهدفة.</strong> يحتاج محاسبك فقط إلى الأشهر التي يسويها. لا يحتاج محاسبك إلى رؤية ديسمبر إذا كان السؤال عن فبراير.</li>
    <li><strong>مطالبات التأمين.</strong> شركة التأمين التي تطلب الفترة حول حادث محدد تحتاج فقط إلى تلك النافذة، وليس تاريخك المالي بأكمله.</li>
    <li><strong>الحسابات المشتركة في الانفصال.</strong> إذا كنت تقسم المالية مع شريك، فمشاركة الفترة المشتركة فقط بدلا من الملف الكامل تهم قانونيا.</li>
  </ul>

  <blockquote class="callout">كشف البنك من أكثر المستندات حساسية في حياتك. شارك أصغر شريحة تجيب على السؤال.</blockquote>

  <h2>ثلاث استراتيجيات تقسيم</h2>

  قبل أن تنقر على أي شيء، قرر أي نهج يتطابق مع كشفك:

  <table>
    <thead>
      <tr><th>الاستراتيجية</th><th>متى تتناسب</th><th>الجهد</th></tr>
    </thead>
    <tbody>
      <tr><td>نطاق صفحات ثابت</td><td>كل شهر بنفس الطول بالضبط (مثل 4 صفحات)</td><td>منخفض</td></tr>
      <tr><td>حسب الإشارة المرجعية أو حد الشهر</td><td>الكشف به رؤوس "March 2026" واضحة وعدد صفحات غير متساو</td><td>متوسط</td></tr>
      <tr><td>استخراج صفحات محددة</td><td>تحتاج فقط إلى شهر أو شهرين من اثني عشر</td><td>الأدنى</td></tr>
    </tbody>
  </table>

  معظم كشوف البنوك بالتجزئة تقع في الفئة الثانية: الصفحات لكل شهر تختلف لأن هناك معاملات أكثر في بعض الأشهر. انظر إلى الصفحات 1 و5 و9 و13 لتأكيد النمط قبل الالتزام بقاعدة تقسيم. أشهر العطلات (ديسمبر للحسابات في المملكة المتحدة والولايات المتحدة، وأغسطس لأوروبا) تعمل عادة بصفحتين أطول من المتوسط؛ يناير وفبراير أقصر. خطط لذلك.

  حسابات الأعمال غالبا تطبع صفحة ملخص نهاية الشهر منفصلة. قرر ما إذا كان هذا الملخص ينتمي إلى الشهر الذي يلخصه (قسّمه كصفحة أخيرة من نطاق ذلك الشهر) أو إلى الشهر التالي (حيث تميل الكشوف التي تسبقه إلى العيش في سير عملها).

  <h2>خطوة بخطوة: التقسيم بنطاق الصفحات</h2>

  عندما يكون كل شهر بنفس الطول، هذه مهمة من 90 ثانية:

  <ol>
    <li>افتح أداة التقسيم في متصفحك وارفع الكشف.</li>
    <li>اختر <strong>تقسيم بالنطاقات</strong>.</li>
    <li>أدخل النطاقات التي تتطابق مع الأشهر: <code>1-4, 5-8, 9-12, 13-16, ...</code></li>
    <li>انقر تقسيم. تنتج الأداة PDF واحدا لكل نطاق وتجمعها كـ ZIP.</li>
    <li>نزّل وفك الضغط. كل جزء PDF منفصل.</li>
    <li>أعد تسمية الأجزاء إلى <code>YYYY-MM_bank_account-last4.pdf</code> (المزيد عن التسمية أدناه).</li>
  </ol>

  نصيحة: إذا كانت الصفحة الأولى أو الأخيرة غلافا/ملخصا، استبعدها من النطاقات أو قسّمها كـ PDF خاص بها من صفحة واحدة. تتضمن كثير من البنوك إدراجا تسويقيا في النهاية ("نقدم بطاقة ائتماننا الجديدة!") وهي ضوضاء صرفة - أسقطها قبل أن تفتح الملف.

  اختصار لوحة مفاتيح صغير: في حقل النطاق، النطاقات المفصولة بفواصل لا تحتاج إلى مسافات، لذا <code>1-4,5-8,9-12</code> يعمل تماما مثل النسخة المتباعدة. أسرع في الكتابة إذا كنت تعمل من خلال اثني عشر شهرا دفعة واحدة.

  <h2>خطوة بخطوة: استخراج شهر واحد</h2>

  عندما تحتاج فقط إلى أبريل لطلب قرض، لا تقسم كل شيء. استخرج فقط تلك الصفحات.

  <ol>
    <li>افتح الكشف في أي قارئ PDF ومرر للعثور على بداية أبريل ونهايته. لاحظ أرقام الصفحات (مثل 17-22).</li>
    <li>استخدم خيار استخراج الصفحات في محررنا لـ <a href="/ar/pdf-edit/">استخراج صفحات محددة</a>.</li>
    <li>أدخل النطاق، مثل <code>17-22</code>.</li>
    <li>نزّل PDF الناتج.</li>
    <li>احفظ باسم ملف واضح: <code>2026-04_bank_account-1234.pdf</code>.</li>
  </ol>

  هذا يتجنب إنشاء أحد عشر ملفا إضافيا لن تستخدمها، ويعني أن الشهر ذي الصلة فقط يغادر جهازك. إذا طلب المقرض "أحدث ثلاثة أشهر"، قم بثلاثة استخراجات لشهر واحد وأرسلها كثلاثة ملفات مسماة بدلا من نطاق مهروس معا. متعهدو الاكتتاب يحللون الملفات المسماة بشكل أسرع من النطاقات.

  <h2>قائمة تحقق الخصوصية قبل المشاركة</h2>

  تقسيم كشف لا يجعله آمنا للمشاركة تلقائيا. PDF شهري لا يزال يحتوي على رقم حسابك ورصيدك وكل معاملة في تلك الفترة. مر عبر هذه القائمة قبل إرفاقه بأي بريد إلكتروني:

  <figure><img src="/static/blog/images/tool-protect.jpg" alt="أداة حماية بكلمة مرور من Convertica تُستخدم قبل إرسال الكشوف الحساسة بالبريد" width="1280" height="800" loading="lazy"></figure>

  <ul>
    <li><strong>احذف المعاملات غير ذات الصلة.</strong> إذا احتاج المقرض إلى رؤية الراتب والإيجار فقط، اسود الباقي. يجب أن يسطح الحذف PDF (يستبدل البكسلات)، لا فقط يغطيها بصندوق أسود يمكن إزالته من قبل أي شخص لديه محرر PDF مجاني وعشر ثوان.</li>
    <li><strong>أكّد ما على صفحة الغلاف.</strong> تكرر بعض البنوك رقم الحساب الكامل ورمز الفرز والعنوان على كل غلاف شهري. قرر ما إذا كان مستوى التفاصيل هذا مطلوبا.</li>
    <li><strong>أخفِ الأرقام الوسطى من رقم الحساب.</strong> تقبل كثير من المؤسسات "XXXX XXXX 1234" للتحقق دون السلسلة الكاملة.</li>
    <li><strong>افحص أوصاف المعاملات بحثا عن سياق شخصي.</strong> بند سطر يقرأ "Therapy session - Dr. K" أو "Reproductive Health Clinic" يمكن أن يحمل معلومات لم تقصد مشاركتها. احذف الوصف، لا فقط المبلغ، عندما يكون حساسا.</li>
    <li><strong>احم بكلمة مرور قبل البريد.</strong> <a href="/ar/pdf-security/protect/">احم النتيجة بكلمة مرور</a> بكلمة مرور قوية وشارك تلك الكلمة عبر قناة منفصلة (نص، Signal، مكالمة هاتفية)، وليس نفس البريد أبدا.</li>
  </ul>

  <blockquote class="callout">البريد ليس مشفرا افتراضيا. كلمة المرور على PDF هي الفرق بين "خاص" و "عام إذا اعتُرض".</blockquote>

  يستحق المعرفة: أداة "redact" في Adobe Acrobat تزيل فعلا النص تحت الصندوق الأسود. أداة Foxit reader المجانية المشابهة تطلي فوقها فقط - النص الأساسي لا يزال قابلا للاستخراج بعملية نسخ بسيطة. تعلم كثير من الناس هذا بطريقة محرجة بعد أن تبين أن راتبهم "المخفي" نص عادي تحت المستطيل. إذا لم تكن متأكدا من أن أداتك تزيل البيانات حقا، انسخ كتلة محذوفة إلى محرر نص وتحقق.

  <h2>تسمية ملفات الإخراج</h2>

  اسم الملف هو ما ستراه عندما يظهر هذا في بحث في السنة المقبلة. استخدم تنسيقا يفرز نفسه:

  <pre><code>YYYY-MM_bank_account-last4.pdf

  2026-01_chase_4567.pdf
  2026-02_chase_4567.pdf
  2026-03_chase_4567.pdf
  2026-04_chase_4567.pdf</code></pre>

  لماذا ينجح هذا:

  <ul>
    <li>سنة-شهر ISO يفرز بنظافة في كل مدير ملفات ومحرك سحاب.</li>
    <li>اسم البنك في المنتصف يساعد عندما يكون لديك حسابات في أكثر من مؤسسة.</li>
    <li>الأرقام الأربعة الأخيرة من الحساب تتيح لك التمييز بين الحسابات المشتركة والتجارية والشخصية دون فتح أي شيء.</li>
    <li>لا مسافات، لا شرطات مائلة، لا اقتباسات - آمنة عبر أنظمة التشغيل وأدوات المزامنة السحابية.</li>
  </ul>

  إذا احتجت يوما إلى إعادة دمج الأشهر لتقديم نهاية السنة، يمكنك <a href="/ar/pdf-organize/merge/">الدمج لاحقا إذا احتجت إلى إعادة الدمج</a> مرة أخرى في ملف واحد. تسمية الإخراج عكسيا (مثل <code>2026_chase_4567_full-year.pdf</code>) تبقيه مفروزا بجانب الشرائح الشهرية في أي قائمة مجلد.

  <h2>الأسئلة الشائعة</h2>

  <h3>هل من الآمن رفع كشف بنكي إلى مقسم عبر الإنترنت؟</h3>
  <p>استخدم أداة تعالج الملفات في جلسة المتصفح وتحذفها بعد ذلك بفترة قصيرة. تزيل Convertica الملفات المرفوعة بعد نافذة احتفاظ قصيرة ولا تشاركها أبدا. إذا كنت لا تزال غير مرتاح، احذف الحقول الأكثر حساسية محليا قبل الرفع، أو استخدم أداة سطح مكتب للملفات الأكثر حساسية.</p>

  <h3>هل يمكنني تقسيم PDF كشف بنكي محمي بكلمة مرور؟</h3>
  <p>ستحتاج إلى فتحه أولا باستخدام كلمة المرور الخاصة بك، ثم التقسيم، ثم اختياريا إعادة حماية كل جزء. تصدر معظم البنوك كشوفا حيث تكون كلمة المرور جزءا من تاريخ ميلادك أو الأرقام الأخيرة من الحساب؛ التنسيق الدقيق عادة مطبوع في حزمة الترحيب أو متاح على صفحة "افتح كشفك" المساعدة في البنك.</p>

  <h3>كيف أقسم حسب الشهر إذا لم تكن هناك إشارات مرجعية؟</h3>
  <p>افتح الملف مرة ولاحظ الصفحة التي يبدأ فيها كل شهر. ثم استخدم تقسيم-بالنطاق بأرقام صفحات صريحة. يستغرق الأمر دقيقة في المرة الأولى وقابل لإعادة الاستخدام لكل كشف مستقبلي من نفس البنك إذا بقي التخطيط متسقا.</p>

  <h3>هل سيقلل التقسيم جودة الملف؟</h3>
  <p>لا. التقسيم عملية هيكلية: ينسخ نفس بايتات الصفحة إلى ملف جديد. لا توجد إعادة ضغط، ولا تحويل إلى صورة نقطية، ولا فقدان جودة مقارنة بالمصدر.</p>

  <h3>هل يستطيع البنك معرفة أنني قسمت كشفه؟</h3>
  <p>لا يستطيع البنك، لأن التقسيم يحدث بالكامل من جانبك. قد يلاحظ المستلم من الصفحات المفقودة أو أرقام الصفحات إذا استخرجت شريحة فقط، ولهذا يجب أن تقول صراحة "أبريل فقط، الصفحات 17-22" عند إرسال كشف جزئي. لن يفشلك متعهدو الاكتتاب على تقديم جزئي، لكنهم سيفشلونك على واحد يبدو خادعا.</p>

  <h2>جرّبه الآن</h2>

  <p>جلسة عشر دقائق اليوم توفر عليك سنة من الصيد عبر ملف من 60 صفحة. قسّم كشفك، سمِّ الأجزاء بشكل صحيح، وستشكر نفسك في وقت الضرائب. <a href="/ar/pdf-organize/split/">افتح أداة تقسيم PDF ←</a></p>
