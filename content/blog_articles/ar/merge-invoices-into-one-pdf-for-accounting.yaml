slug: merge-invoices-into-one-pdf-for-accounting
title_ar: "كيفية دمج عدة فواتير في PDF واحد للمحاسبة وتقارير المصاريف"
meta_title_ar: "دمج الفواتير في PDF واحد للمحاسبة"
meta_description_ar: "محاسبون ومستقلون وفرق المالية: ادمج الفواتير الشهرية والإيصالات وكشوف الحساب في PDF واحد مرتب لتقديمات نظيفة للمصاريف."
meta_keywords_ar: "دمج فواتير pdf، تجميع إيصالات pdf، تقرير مصاريف pdf، سير عمل محاسبة pdf، فاتورة شهرية pdf"
excerpt_ar: "تقديم 14 ملف PDF فاتورة منفصل لمحاسبك أسرع طريقة لفقدان الإيصالات وحرق الساعات القابلة للفوترة. إليك كيفية تجميعها في ملف واحد مرتب."
content_ar: |
  لم يطلب محاسبك 14 ملف PDF منفصلا. طلب "فواتير هذا الشهر"، و 14 ملف PDF هو ما تنتجه كل أداة مزامنة سحابية وبوابة مورد وتطبيق توصيل طعام. إرسالها كحزمة فضفاضة يعمل، حتى يضيع أحدها في سلسلة، وتتصادم التواريخ على أسماء الملفات، وتقضي ساعة في أبريل القادم في إعادة بناء مسار التدقيق من بحث بريد إلكتروني نصف معطل.

  الإصلاح صغير ودائم: ملف PDF واحد مرتب ومؤرخ لكل شهر. يغطي هذا الدليل اصطلاح التسمية الذي يجعل <a href="/ar/pdf-organize/merge/">دمج PDF عبر الإنترنت</a> موثوقا، وكيفية التعامل مع مدخلات JPG وPDF المختلطة، وروتين نهاية الشهر الذي يستغرق نحو عشر دقائق بمجرد القيام به مرتين.

  <figure><img src="/static/blog/images/tool-merge.jpg" alt="أداة دمج Convertica تجمع عدة ملفات PDF فواتير في ملف واحد" width="1280" height="800" loading="lazy"></figure>

  <h2>لماذا يفضل المحاسبون PDF واحدا على عدة</h2>

  تطورت برامج المحاسبة، لكن تسليم المستندات لم يفعل. تقريبا كل محاسب، سواء استخدم QuickBooks أو Xero أو FreshBooks، يفضل ملفا مجمعا واحدا لأنه:

  <ul>
    <li><strong>يُؤرشف بنظافة.</strong> أنظمة إدارة المستندات تفهرس ملفا واحدا لكل فترة، لا 47 مرفقا عائما.</li>
    <li><strong>ترقيم الصفحات يدعم مسار التدقيق.</strong> "انظر الصفحة 12 من فواتير أبريل" مرجع حقيقي؛ "انظر الفاتورة من البريد الإلكتروني في 17" ليس كذلك.</li>
    <li><strong>أسهل في إعادة التوجيه.</strong> محاسب يسلم سجلاتك إلى مُعد ضرائب يرفق ملفا واحدا، لا مجلدا.</li>
    <li><strong>يتماشى مع سير عمل المرفقات في QuickBooks وXero.</strong> كلاهما يدعم إرفاق PDF واحد لكل قيد دفتر يومية أو معاملة؛ التلاعب بعدة ملفات احتكاك لا يريده أحد في نهاية الشهر. (نعم، حتى اليوم: حدّد Xero مرفقات قيد دفتر اليومية بملف واحد لكل قيد حتى عام 2024 وخفّف ذلك فقط للفئات المدفوعة.)</li>
    <li><strong>يتطابق بنظافة مع طلبات الاكتشاف الإلكتروني والتدقيق الضريبي.</strong> عندما تطلب سلطة ضريبية "جميع فواتير أبريل"، تسليم ملف واحد يتفوق على شرح مجلد.</li>
  </ul>

  <blockquote class="callout">PDF واحد مسمى جيدا لكل شهر هو الفرق بين مهمة أرشفة من 90 دقيقة وأخرى من 10 دقائق.</blockquote>

  <h2>اصطلاح التسمية قبل الدمج</h2>

  رتب الملفات المصدر أولا، ادمج ثانيا. تجمع معظم أدوات الدمج عبر الإنترنت، بما في ذلك أداتنا، الملفات بالترتيب الذي ترفعها به أو بالترتيب الأبجدي. ذلك يجعل اسم الملف عجلة القيادة.

  استخدم هذا التنسيق لكل فاتورة:

  <pre><code>YYYY-MM-DD_vendor_amount.pdf

  2026-04-03_aws_142-50.pdf
  2026-04-08_adobe_19-99.pdf
  2026-04-11_office-supplies_88-30.pdf
  2026-04-22_internet_45-00.pdf</code></pre>

  ثلاثة أسباب لنجاح هذا:

  <ol>
    <li><strong>تاريخ ISO يفرز بشكل صحيح</strong> في أي نظام تشغيل، بغض النظر عن الإعدادات المحلية.</li>
    <li><strong>المورد في المنتصف</strong> يتيح لك المسح بصريا عن "هل دفعت لـ AWS هذا الشهر؟".</li>
    <li><strong>المبلغ في النهاية</strong> يتطابق مع تسوية البنك دون فتح الملف.</li>
  </ol>

  التعامل مع التكرارات: إذا أصدر مورد فاتورتين في نفس التاريخ، أضف حرفا: <code>2026-04-03_aws_142-50_a.pdf</code> و <code>2026-04-03_aws_142-50_b.pdf</code>. يفرز الحرف تحت التاريخ ويتجنب الكتابة فوقه. تجنب استخدام الوقت كفاصل تعادل؛ الطوابع الزمنية لفواتير الموردين غير متسقة ويمكن أن تكذب بشأن متى تمت الفوترة على العمل فعلا.

  عادة أخرى تستحق البناء: عند حفظ الملف من بوابة مورد، أعد تسميته قبل أن يغادر مجلد التنزيلات. القيام بذلك في لحظة الاستلام يكلف عشر ثوان. القيام به في نهاية الشهر لثلاثين ملفا دفعة واحدة يبدو كعمل روتيني وستتجاوزه في الشهر الثاني.

  <h2>خطوة بخطوة: دمج الفواتير في المتصفح</h2>

  بمجرد إعادة تسمية ملفاتك:

  <ol>
    <li>افتح أداة الدمج من Convertica في أي متصفح. لا شيء للتثبيت، ولا شيء لتسجيل الدخول إليه.</li>
    <li>اسحب كل ملف فاتورة من مجلدك إلى منطقة الرفع دفعة واحدة. تحافظ الأداة على ترتيب اسم ملفك.</li>
    <li>تحقق من الترتيب في شريط الصور المصغرة. اسحب أي فاتورة في غير مكانها إلى الفتحة الصحيحة.</li>
    <li>انقر على <strong>دمج</strong>. تنزل النتيجة كـ PDF واحد.</li>
    <li>أعد تسمية الناتج ليطابق الفترة: <code>2026-04_invoices_yourname.pdf</code>.</li>
  </ol>

  تلك إعادة التسمية الأخيرة مهمة. يرث الملف المدمج اسما عاما مثل <code>merged.pdf</code>، وهو أسوأ شيء يمكن أن يكون لديك في مجلد التنزيلات بعد ستة أشهر. (قضيت مرة خمسة عشر دقيقة أبحث عن حزمة محددة لأن ثلاثة ملفات "merged.pdf" مختلفة تصادمت في المزامنة السحابية. كثير من الناس يصطدمون بهذا في شهرهم الأول.)

  <h2>إضافة صفحة غلاف أو جدول محتويات</h2>

  لتقديمات المصاريف الأكبر (20+ فاتورة، أو أي شيء يذهب إلى فريق مالي بدلا من محاسبك الخاص)، صفحة الغلاف تردّ الدقيقتين اللتين تستغرقهما. تعمل ورقة ملخص بسيطة:

  <table>
    <thead>
      <tr><th>التاريخ</th><th>المورد</th><th>المبلغ</th><th>الصفحة</th></tr>
    </thead>
    <tbody>
      <tr><td>2026-04-03</td><td>AWS</td><td>142.50</td><td>1</td></tr>
      <tr><td>2026-04-08</td><td>Adobe</td><td>19.99</td><td>2</td></tr>
      <tr><td>2026-04-11</td><td>Staples</td><td>88.30</td><td>3</td></tr>
    </tbody>
  </table>

  احفظ الجدول كـ PDF وضعه أولا في ترتيب الدمج. بعد الدمج، يمكنك <a href="/ar/pdf-edit/rotate/">إضافة أرقام صفحات عبر الملف المدمج</a> بحيث تُحل مراجع صفحة الغلاف فعلا. إذا كنت تبني حزمة ربع سنوية لفريق مالي، ملخص من صفحة واحدة في المقدمة وصف إجماليات يطابق كشف بنكك يغلق الحلقة على سؤال التدقيق قبل أن يضطروا إلى السؤال.

  نصيحة احترافية: إذا كنت تستخدم Excel أو Google Sheets لبناء الملخص، احفظه إلى PDF باستخدام منطقة طباعة مضبوطة على عرض صفحة واحدة قبل الدمج. ملخص يتدفق إلى الصفحة 2 بسبب تذييل ضخم هو مجرد ضوضاء بصرية.

  <h2>تنسيقات مختلطة: إيصالات JPG وفواتير PDF</h2>

  فحص الواقع: ثلث إيصالات الأعمال الصغيرة على الأقل تصل كصور. فواتير المطاعم، إيصالات سيارات الأجرة، قصاصات ورق متاجر الأدوات، الدلي حول الزاوية الذي يطبع على ورق حراري باهت. تأخذ أداة الدمج فقط ملفات PDF، لذا لديك تحويل من خطوة واحدة قبل الدمج.

  <figure><img src="/static/blog/images/tool-jpg-to-pdf.jpg" alt="محول JPG إلى PDF لتحويل صور الهاتف للإيصالات إلى ملفات PDF قابلة للدمج" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>اجمع جميع إيصالات JPG في مجلد.</li>
    <li><a href="/ar/jpg-to-pdf/">حوّل إيصالات JPG إلى PDF</a> دفعة واحدة. تنتج الأداة ملف PDF واحدا لكل صورة (أو ملف PDF مدمجا واحدا إذا فضلت).</li>
    <li>أعد تسمية كل ناتج ليطابق تنسيق YYYY-MM-DD vendor أعلاه.</li>
    <li>أسقطها في نفس المجلد مع فواتير PDF.</li>
    <li>ادمج بالترتيب الزمني.</li>
  </ol>

  نصيحة: عند تصوير إيصال ورقي، أمسك الهاتف مباشرة فوقه واستخدم خلفية بسيطة (ورقة A4 على الطاولة تعمل جيدا). لن تقتص أداة JPG-إلى-PDF أو تدور تلقائيا؛ ما تصوّره هو ما يُربط في حزمة محاسبتك. تجنب الفلاش على الإيصالات اللامعة؛ انعكاس ساخن يمحو السطر الذي تحتاج فعلا التقاطه.

  خصوصية أخرى: صور HEIC من iPhones الأحدث ليست مقبولة من قبل كل أداة دمج أو تحويل. اضبط كاميرا iOS على "الأكثر توافقا" (Settings &gt; Camera &gt; Formats) قبل تصوير نهاية الشهر، أو حوّل HEIC إلى JPG دفعة مرة واحدة في بداية الجلسة.

  <h2>سير العمل الشهري للمستقلين</h2>

  الهدف كله جعل هذا روتينا، لا بطوليا. إغلاق شهري عملي:

  <h3>روتين نهاية الشهر (نحو 10 دقائق)</h3>

  <ol>
    <li><strong>أول الشهر الجديد، صباحا.</strong> افتح مجلد "الفواتير" للشهر الذي انتهى للتو.</li>
    <li><strong>تحقق مقابل البنك.</strong> افتح كشف بنك عملك. أي شيء على الكشف ليس في المجلد، طارد الفاتورة المفقودة. أي شيء في المجلد ليس على الكشف، علّم للشهر القادم.</li>
    <li><strong>أعد التسمية إلى YYYY-MM-DD_vendor_amount.</strong> دقيقتان لـ 15 ملفا.</li>
    <li><strong>حوّل أي إيصالات JPG.</strong> جولة واحدة عبر أداة JPG-إلى-PDF.</li>
    <li><strong>ادمج.</strong> اسحب الكل إلى أداة الدمج، تحقق من الترتيب، نزّل.</li>
    <li><strong>احفظ الحزمة</strong> كـ <code>2026-04_invoices_yourname.pdf</code> في مجلد "Accounting/2026" الخاص بك.</li>
    <li><strong>أرسل بريدا إلكترونيا للمحاسب.</strong> مرفق واحد، مع ملاحظة من سطر واحد عن أي شيء غير عادي.</li>
  </ol>

  اجعل هذا كتلة في التقويم في صباح اليوم الأول من كل شهر. أي شخص حاول "فعله لاحقا" يعرف أنه في اللحظة التي تتجاوز فيها شهرا، يصبح الشهر الثالث ضعف العمل، ويصبح نهاية الربع ذعرا. الانضباط أهم من الأدوات هنا.

  <h3>النسخ الاحتياطي قبل الدمج</h3>

  احتفظ بالأصول. دائما. PDF المدمج هو تنسيق التسليم الخاص بك، وليس أرشيفك. إذا اعترض مورد على مبلغ أو احتاج محاسبك إلى نسخة غير محذوفة من فاتورة واحدة، فأنت تريد ملف المصدر، لا صفحة مستخرجة من الدمج.

  معظم محركات السحاب تنسخ الملفات تلقائيا؛ إذا لم يفعل محركك، انسخ مجلد الشهر إلى مجلد فرعي "raw_originals" قبل البدء في إعادة التسمية. اضبط قاعدة احتفاظ بسيطة: احتفظ بالأصول لسبع سنوات (نافذة سجل ضريبي قياسية في معظم الولايات القضائية)، احتفظ بالحزم المدمجة إلى أجل غير مسمى لأنها لا تكلف شيئا.

  <h3>الإرسال إلى المحاسب</h3>

  إذا هبط PDF المدمج فوق 20 MB (شائع عندما يكون لديك الكثير من الإيصالات المصورة)، <a href="/ar/pdf-organize/compress/">اضغط الحزمة النهائية للبريد</a> بالإعداد المتوسط. للحزم الحساسة (فواتير تظهر تفاصيل بنكك، أو تفصيلات الراتب، أو أي شيء مغطى بـ NDA عميل)، فكّر في حماية PDF بكلمة مرور ومشاركة كلمة المرور عبر قناة مختلفة - رسالة نصية، لا نفس سلسلة البريد.

  إذا استخدم محاسبك بوابة (Karbon، ClientHub، أو عرض المحاسب في QuickBooks Online)، ارفع مباشرة هناك بدلا من الإرفاق بالبريد. عادة ما يكون لدى البوابات حدود حجم أعلى، وإصدار تلقائي، وسجل تدقيق لا يستطيع البريد مطابقته.

  <h2>الأسئلة الشائعة</h2>

  <h3>هل سيغير دمج الفواتير الملفات الأصلية؟</h3>
  <p>لا. تقرأ أداة الدمج كل PDF مصدر وتكتب ملفا مدمجا جديدا. تبقى أصولك بالضبط كما زُوّدت، وهو ما يهم إذا طلب مورد أو مدقق نسخة غير معدلة.</p>

  <h3>كيف أحافظ على الفواتير بترتيب زمني؟</h3>
  <p>أعد تسمية كل ملف ببادئة YYYY-MM-DD قبل الدمج. تتبع الأداة ترتيب اسم الملف، لذا اصطلاح تسمية نظيف يقوم بالفرز نيابة عنك. إذا نسيت إعادة التسمية، اسحب الصور المصغرة بالترتيب قبل النقر على دمج.</p>

  <h3>هل يمكنني دمج إيصالات JPG مع فواتير PDF؟</h3>
  <p>حوّل ملفات JPG إلى PDF أولا باستخدام أداة JPG-إلى-PDF، ثم ادمج بجانب فواتير PDF الموجودة. تقبل معظم أدوات الدمج عبر الإنترنت (بما في ذلك أداتنا) فقط ملفات PDF كمدخلات.</p>

  <h3>هل من الآمن رفع فواتير بتفاصيل بنكية إلى أداة عبر الإنترنت؟</h3>
  <p>استخدم أداة تعالج الملفات في الجلسة وتحذفها بعد ذلك بفترة قصيرة. تزيل Convertica الملفات المرفوعة بعد نافذة احتفاظ قصيرة. للفواتير الحساسة بشكل خاص، احم PDF المدمج بكلمة مرور قبل المشاركة، وتجنب الرفع من شبكة Wi-Fi عامة حيث يمكن اعتراض الرفع.</p>

  <h3>كم عدد ملفات PDF التي يمكنني دمجها دفعة واحدة؟</h3>
  <p>السقف العملي عادة هو ذاكرة المتصفح وحجم الرفع الإجمالي، وليس الأداة. لحزم نهاية الشهر النموذجية من 10-50 فاتورة، لن تصل إلى أي حد. لـ 200+ ملف، قسّم إلى دمجين واجمع النتائج.</p>

  <h2>جرّبه الآن</h2>

  <p>اجمع كومة فواتير أبريل في ملف نظيف واحد سيشكرك محاسبك عليه فعلا. <a href="/ar/pdf-organize/merge/">افتح أداة دمج PDF ←</a></p>
