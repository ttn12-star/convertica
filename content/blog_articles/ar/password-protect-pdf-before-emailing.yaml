slug: password-protect-pdf-before-emailing
title_ar: "كيفية حماية PDF بكلمة مرور قبل إرساله بالبريد (ومشاركة كلمة المرور بأمان)"
meta_title_ar: "حماية PDF بكلمة مرور للبريد - مجاني وآمن | Convertica"
meta_description_ar: "شفّر PDF بكلمة مرور في 30 ثانية، ثم تعلّم الطريقة الصحيحة لإرسال كلمة المرور حتى لا تلغي حمايتك بنفسك ببريد إلكتروني واحد طائش."
meta_keywords_ar: "حماية pdf بكلمة مرور، تشفير pdf للبريد، مرفق pdf آمن، كلمة مرور pdf مجانا، إرسال pdf بأمان"
excerpt_ar: "كلمة المرور على PDF نصف العمل فقط. إرسال كلمة المرور في نفس البريد يلغي الفكرة بأكملها. إليك كيفية تنفيذ النصفين بشكل صحيح."
content_ar: |
  يستغرق تشفير PDF نحو 30 ثانية. مشاركة كلمة المرور دون إلغاء التشفير فورا تستغرق نحو دقيقتين من التفكير، وهنا يتعثر معظم الناس. وضع كلمة المرور في نفس البريد مع المرفق هو المعادل الأمني لقفل بابك الأمامي ولصق المفتاح على المقبض.

  يغطي هذا الدليل كلا النصفين: كيفية تشفير الملف فعلا، وكيفية إيصال كلمة المرور إلى يدي المستلم عبر قناة لا يستطيع البريد الوصول إليها.

  <figure><img src="/static/blog/images/tool-protect.jpg" alt="أداة حماية PDF بكلمة مرور من Convertica مع تشفير AES-256" width="1280" height="800" loading="lazy"></figure>

  <h2>لماذا تحتاج مرفقات البريد إلى حماية إضافية</h2>

  البريد القياسي بين المزودين مشفر أثناء النقل (TLS) لكن ليس من طرف إلى طرف. هذا يعني:

  <ul>
    <li>يستطيع مزود بريدك قراءة المحتوى.</li>
    <li>يستطيع مزود بريد المستلم قراءة المحتوى.</li>
    <li>إذا أُعيد توجيه الرسالة، أو أُرشفت، أو سُحبت إلى فهرس بحث، تجلس النسخ في أماكن لا تتحكم بها.</li>
    <li>صناديق الوارد المشتركة (info@، accounts@) غالبا ما يكون لها قراء أكثر بكثير مما يدركه المرسل.</li>
    <li>يمكن أن تستمر النسخ الاحتياطية للبريد لسبع سنوات أو أكثر في الصناعات المنظمة، حتى بعد حذف الرسالة الأصلية من صندوق الوارد.</li>
    <li>يمكن لمذكرة استدعاء أو تحقيق داخلي أو حجز قانوني غير مقصود سحب الرسالة من تلك النسخ الاحتياطية بعد سنوات.</li>
  </ul>

  لا يعني أي من ذلك أن البريد غير آمن للمراسلات اليومية. يعني أن عقدا أو قسيمة راتب أو سجلا طبيا أو اتفاقا موقعا يستحق طبقة تنجو من إعادة التوجيه والأرشفة. تشفير PDF هو بالضبط تلك الطبقة.

  <h2>خطوة بخطوة: شفّر PDF</h2>

  <figure><img src="/static/blog/images/tool-protect.jpg" alt="ضبط كلمة مرور قوية ومستوى تشفير AES-256 لـ PDF" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>افتح أداة <a href="/ar/pdf-security/protect/">حماية PDF بكلمة مرور</a> وارفع ملفك. يبقى الأصل دون تغيير على جهازك.</li>
    <li>اضبط كلمة مرور قوية. يحتاج المستلم إلى هذه السلسلة بالضبط، لذا اكتب بعناية والصقها من مدير كلمات المرور بدلا من الكتابة مرتين.</li>
    <li>أكّد مستوى التشفير. تفترض الأدوات الحديثة AES-256 افتراضيا، وهو نفس المعيار الذي تستخدمه البنوك والوكالات الحكومية. لا تزال أوضاع RC4 وAES-128 الأقدم موجودة للتوافق لكن يجب تجنبها ما لم يكن المستلم يشغل برنامجا قديما (Acrobat 8 وما قبله، بعض القارئات المضمنة في الأنظمة الصناعية القديمة).</li>
    <li>نزّل الملف المشفر. افتحه مرة بنفسك بكلمة المرور للتحقق من أن كل شيء يعمل، ثم أرفقه بالبريد.</li>
  </ol>

  <blockquote class="callout">تحقق قبل الإرسال. افتح الملف المشفر بكلمة المرور بنفسك، في عارض من المرجح أن يستخدمه المستلم. عدد مفاجئ من شكاوى "التشفير معطل" يتبين أنها أخطاء طباعة في كلمة المرور، تُكتشف فقط بعد خروج البريد.</blockquote>

  خصوصية تستحق الذكر: إذا نسخت كلمة مرور من مدير كلمات المرور وأضاف مديرك تلقائيا مسافة في النهاية أو حرف اقتباس ذكي، فمحاولة كلمة المرور النصية البسيطة للمستلم لن تتطابق. أزل المسافات البيضاء واستبدل أي اقتباسات "مجعدة" (' ' " ") باقتباسات ASCII مستقيمة (' ") قبل حفظ كلمة المرور في المدير. هذا هو وضع الفشل الصامت لنحو نصف بطاقات "التشفير معطل" التي رأيت زملائي يثيرونها.

  إذا كان المستند أيضا مسودة أو يحتوي على علامات حساسة، قد ترغب في <a href="/ar/pdf-edit/add-watermark/">إضافة علامة مائية سرية أيضا</a> بحيث يرى أي شخص يصل إليه بوضوح أن المحتوى مقيد.

  <h2>كيفية مشاركة كلمة المرور بأمان</h2>

  هذا هو نصف سير العمل الذي يُتجاوز، وهو النصف الذي يحدد ما إذا كان تشفيرك يحمي شيئا فعلا.

  <h3>استخدم قناة مختلفة</h3>

  القاعدة بسيطة: يجب أن تنتقل كلمة المرور عبر طريق لا علاقة له بالبريد. خيارات جيدة:

  <ul>
    <li><strong>SMS أو رسول.</strong> أرسل كلمة المرور برسالة نصية أو رسول مشفر من طرف إلى طرف مثل Signal أو WhatsApp. رقم الهاتف هوية منفصلة عن حساب البريد.</li>
    <li><strong>رابط مشاركة من مدير كلمات المرور.</strong> يقدم 1Password وBitwarden وDashlane جميعا ميزات "مشاركة عنصر" أو "مشاركة عبر رابط" تنتهي بعد عرض واحد أو وقت محدد.</li>
    <li><strong>تسليم شفهي شخصيا أو عبر الهاتف.</strong> تقليدي، لكن مضمون. مفيد للعناصر عالية القيمة الذاهبة إلى أشخاص يمكنك الاتصال بهم.</li>
    <li><strong>خدمات مشاركة الأسرار.</strong> أدوات مثل Bitwarden Send أو خدمات السر لمرة واحدة تتيح لك توليد رابط يدمر نفسه بعد فتح واحد.</li>
    <li><strong>نظام تذاكر خارج النطاق.</strong> إذا استخدم الطرفان مكتب خدمة مشترك (Jira Service Desk، Zendesk)، يمكن لكلمة المرور أن تنتقل كتعليق خاص منفصل عن سلسلة البريد.</li>
  </ul>

  خيارات سيئة تبدو مقبولة لكنها ليست كذلك:

  <ul>
    <li><strong>"كلمة المرور في البريد التالي."</strong> نفس صندوق الوارد، نفس مسار التدقيق، نفس المعاد توجيهيهم. التشفير الآن مطب سرعة.</li>
    <li><strong>كلمة المرور كسطر الموضوع.</strong> نفس المشكلة، مع رؤية إضافية.</li>
    <li><strong>أنماط متوقعة ("كلمة المرور هي اسم عائلة المستلم").</strong> أي شخص يستطيع التخمين لا يحتاج إلى كلمة المرور.</li>
    <li><strong>iMessage بين أجهزة Apple وAndroid مختلطة.</strong> إذا لم يكن المستلم على iMessage، تعود الرسالة إلى SMS عادي، الذي يجلس غير مشفر على بنية المشغل التحتية.</li>
    <li><strong>البريد الصوتي.</strong> تخزن كثير من أنظمة البريد الصوتي المؤسسية التسجيلات في صناديق وارد متكاملة مع البريد وقد تُفرغ نصيا وتُفهرس.</li>
  </ul>

  <h3>اختيار كلمة مرور لن تُكسر</h3>

  يستخدم تشفير PDF كلمة المرور لاشتقاق مفتاح تشفير. تتعرض كلمات المرور الضعيفة لقوى عاتية بلا اتصال بمجرد أن يكون لدى المهاجم الملف. اجعلها صعبة.

  <ul>
    <li><strong>الطول على التعقيد.</strong> سلسلة عشوائية من 16 حرفا تتفوق على سلسلة من 10 أحرف بخمسة رموز. "PurpleDolphinChairOcean42" أقوى من "P@55!".</li>
    <li><strong>تجنب البيانات الشخصية.</strong> اسم المستلم وعيد ميلاده وشركته وحيوانه الأليف كلها قابلة للتخمين من فحص LinkedIn سريع.</li>
    <li><strong>ولّد، لا تخترع.</strong> استخدم مولد مدير كلمات المرور. حتى عبارة مرور diceware من 4 كلمات أكثر أمانا بشكل كبير من شيء اخترعته.</li>
    <li><strong>تجنب الأحرف التي تُصحح تلقائيا.</strong> تستبدل بعض لوحات المفاتيح (خاصة المحمولة) تلقائيا علامات ترقيم ASCII معينة بمكافئات ذكية. التزم بالحروف والأرقام إذا كنت تشارك عبر منصات.</li>
  </ul>

  الحد الأدنى العملي للمواد الحساسة: 12 حرفا أبجديا رقميا عشوائيا أو عبارة مرور diceware من 4 كلمات. يعطي كلاهما نحو 60-70 بت من الانتروبيا، وهو ما يكفي لإبقاء كسر AES-256 بالقوة العاتية غير عملي على أي جهاز موجود في 2026.

  <h2>كلمة مرور الفتح مقابل كلمة مرور الأذونات</h2>

  يدعم تشفير PDF كلمتي مرور مختلفتين، ويقومان بأعمال مختلفة:

  <table>
    <thead>
      <tr>
        <th>نوع كلمة المرور</th>
        <th>ما تفعله</th>
        <th>متى تستخدمها</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>كلمة مرور الفتح / المستخدم</td>
        <td>مطلوبة لعرض المستند على الإطلاق. بدونها، الملف نص مشفر غير قابل للقراءة.</td>
        <td>كلما كان المحتوى نفسه سريا.</td>
      </tr>
      <tr>
        <td>كلمة مرور الأذونات / المالك</td>
        <td>تقيد ما يستطيع العارض فعله (الطباعة، نسخ النص، التعديل). لا يزال المستند يفتح بدونها.</td>
        <td>للمستندات التي يجب أن تكون قابلة للقراءة لكن غير قابلة للتعديل أو النسخ (قوالب نماذج، تقارير موزعة).</td>
      </tr>
    </tbody>
  </table>

  معظم حالات "إرسال PDF سري بالبريد" تستدعي <strong>كلمة مرور فتح</strong>، لأنك تريد الملف غير قابل للقراءة بدون المفتاح. كلمات مرور الأذونات مفيدة لكنها أيضا أسهل في التحايل عليها من قبل المستلمين المصممين - بعض أدوات PDF (ومعظم الإصدارات الأقدم من Mac Preview) تتجاهل علامة الأذونات تماما على المستندات بدون كلمة مرور فتح.

  اضبط كلتيهما إذا كان وضعك يحتاج كلتيهما: فتح للتحكم في الوصول، أذونات لتقييد ما يستطيع المستلم المخول فعله.

  <h2>نصائح بريد حول التشفير</h2>

  ملاحظتان عمليتان تعض الناس كثيرا:

  <ul>
    <li><strong>شفّر قبل الضغط.</strong> إذا كان PDF أيضا كبيرا جدا للبريد، شغّل خطوة <a href="/ar/pdf-organize/compress/">الضغط قبل التشفير</a> بدلا من بعده. تعيد بعض أدوات الضغط ترميز الملف بهدوء بطريقة تزيل التشفير.</li>
    <li><strong>أخبر المستلم أنه مشفر.</strong> ملاحظة قصيرة في نص البريد ("هذا PDF محمي بكلمة مرور. سأرسل كلمة المرور برسالة نصية بعد قليل.") تمنع وضع علامة على الملف كتالف أو حجزه.</li>
    <li><strong>احذر من إيجابيات مرشح البريد العشوائي الكاذبة.</strong> لا يمكن مسح المرفقات المشفرة بحثا عن البرامج الضارة، لذا تضع مرشحات البريد العشوائي المؤسسية أحيانا علامة عليها أو تحجزها. حذّر المستلم من فحص مجلد البريد العشوائي إذا لم ير البريد خلال بضع دقائق، وأخبر تقنية المعلومات مسبقا للإرسال عالي القيمة.</li>
    <li><strong>لا ترسل لنفسك كلمة المرور كـ "نسخة احتياطية".</strong> إذا اخترق أي شخص صندوق وارد، فإن الملف في مجلد المرسل وكلمة المرور في صندوق الوارد متاحان الآن. خزّن كلمة المرور في مدير كلمات المرور فقط.</li>
  </ul>

  <h2>ماذا تفعل إذا نسيت كلمة المرور</h2>

  احتفظ بالأصل غير المشفر في مكان آمن. التشفير متماثل: إذا فقدت كلمة المرور، فإن الملف غير قابل للاسترداد فعلا بالوسائل الشرعية. كسر AES-256 بالقوة العاتية غير واقعي على أي مقياس زمني عادي - الموت الحراري للشمس هو التقدير الفكاهي المعتاد.

  إذا كنت تملك المستند وفقدت كلمة المرور لكن لا يزال لديك الأصل، أعد التشفير بكلمة جديدة واستبدل الملف. إذا كان لديك فقط النسخة المشفرة وتملك حقوقها فعلا، توجد <a href="/ar/pdf-security/unlock/">أدوات فتح PDF تملكه</a> يمكنها محاولة إزالة الحماية الضعيفة، لكنها لن تكسر كلمة مرور AES-256 قوية. (للحماية الضعيفة - PDFs "أذونات فقط" من تصديرات حقبة 2003 - الإزالة تافهة. لـ AES-256 حقيقي بكلمة مرور طويلة، استسلم.)

  <h2>الأسئلة الشائعة</h2>

  <h3>هل تشفير AES-256 قوي بما يكفي للمستندات القانونية؟</h3>
  <p>نعم. AES-256 معتمد للمواد سرية للغاية من قبل وكالة الأمن القومي الأمريكية ويُستخدم من قبل البنوك والحكومات ومزودي السحابة الكبار. الحلقة الضعيفة في أمان PDF دائما تقريبا هي كلمة المرور، لا الخوارزمية.</p>

  <h3>هل يمكنني إرسال كلمة المرور في نفس البريد إذا حذفتها لاحقا؟</h3>
  <p>لا. يُكرر البريد عبر الخوادم، ويُنسخ احتياطيا، ويُؤرشف، ويُعاد توجيهه. "احذف بعد الإرسال" يحذف نسختك المحلية فقط ولا يفعل شيئا حول العشرات من الأماكن الأخرى التي توجد فيها الرسالة. استخدم قناة منفصلة.</p>

  <h3>ماذا يحدث إذا نسي المستلم كلمة المرور؟</h3>
  <p>تعيد إرسال كلمة المرور عبر قناة آمنة. إذا فقدوا كلا الملف وكلمة المرور، تعيد تشفير أصلك بكلمة مرور جديدة وتعيد الإرسال. لا يوجد رمز استرداد أو مفتاح رئيسي لـ PDF محمي بكلمة مرور.</p>

  <h3>هل سيغير التشفير حجم ملف PDF؟</h3>
  <p>قليلا. يضيف التشفير بضع مئات من البايتات لبيانات وصفية لمصافحة الأمان. المحتوى الفعلي مشفر في مكانه، لذا يصبح PDF بحجم 5 MB ربما 5.001 MB. ليس كافيا لدفعك عبر حد حجم البريد.</p>

  <h3>هل يمكن للمستلم إزالة كلمة المرور بعد الفتح؟</h3>
  <p>نعم. بمجرد أن يكون لديهم كلمة المرور، يستطيعون إزالة التشفير بأي أداة PDF قياسية. إذا كنت تحتاج إلى حماية مستمرة تنجو من أفعال المستلم، فالتشفير وحده ليس الجواب. اجمعه مع علامات مائية وسياسة وصول واضحة، وفكّر في أدوات DRM للتوزيع عالي القيمة.</p>

  <h2>جرّبه الآن</h2>

  <p>أقفل الملف أولا، ثم أرسل المفتاح عبر باب مختلف. افتح <a href="/ar/pdf-security/protect/">أداة حماية PDF</a> وشفّر مستندك، ثم أسقط كلمة المرور في Signal أو SMS أو رابط مشاركة مدير كلمات المرور قبل الضغط على إرسال البريد.</p>
