slug: compress-pdf-for-email-under-25mb
title_ar: "كيفية ضغط PDF لإرساله بالبريد الإلكتروني (أقل من 25 MB) دون فقدان الجودة"
meta_title_ar: "ضغط PDF للبريد: أقل من 25 MB في دقيقتين"
meta_description_ar: "Gmail وOutlook وYahoo ترفض ملفات PDF التي تتجاوز 20-25 MB. إليك ثلاث طرق موثوقة لتقليص حجم PDF للبريد، مع أهداف الحجم حسب نوع المستند ونصائح للجودة."
meta_keywords_ar: "ضغط pdf للبريد، تقليل حجم pdf للبريد، pdf كبير جدا للإرسال، تقليص pdf لـ gmail، pdf أقل من 25 ميغا"
excerpt_ar: "يحدد Gmail المرفقات بـ 25 MB، وOutlook بـ 20 MB، ويكفي عقد ممسوح ضوئيا من 10 صفحات لتجاوز كلا الحدين. إليك أسرع طريقة لتقليصه دون فقدان الجودة."
content_ar: |
  لا تزال خدمات البريد الإلكتروني تعامل المرفقات الكبيرة كمشكلة من عام 2010. يرفض Gmail أي شيء يتجاوز 25 MB صادرا، ويقطع Outlook.com عند 20 MB، ومعظم خوادم Exchange المؤسسية تعمل بحدود أضيق من ذلك. عقد ممسوح ضوئيا من 12 صفحة كافٍ غالبا لإطلاق رسالة الرفض، وتصل رسالة الفشل ("Message could not be delivered. The attachment exceeds the allowed size") بعد ساعة، عندما تكون قد انتقلت بالفعل إلى مهام أخرى.

  الخبر السار: يمكن تقليص حجم أي ملف PDF تقريبا إلى ما دون الحد الأقصى في أقل من دقيقتين بالنهج الصحيح. يغطي هذا الدليل الطرق الثلاث التي تنجح فعلا، وتوقعات الحجم الدقيقة حسب نوع المستند، ومتى يجب أن تتخلى عن البريد الإلكتروني وترسل رابطا سحابيا بدلا منه. سنستخدم <a href="/ar/pdf-organize/compress/">أداة ضغط PDF المجانية من Convertica</a> في الشرح، لكن المبادئ تنطبق على أي أداة.

  <figure><img src="/static/blog/images/tool-compress.jpg" alt="واجهة أداة ضغط PDF من Convertica تعرض رفع الملف وخيارات الإعدادات المسبقة" width="1280" height="800" loading="lazy"></figure>

  <h2>الحدود الفعلية لمرفقات البريد الإلكتروني في 2026</h2>

  قبل أن تضغط أي شيء، من المفيد معرفة الهدف الذي تسعى إليه. تنشر المزودات الكبرى حدودا مختلفة قليلا، والسقف العملي أدنى من الرقم المعلن بسبب طريقة نقل البريد للملفات الثنائية.

  <table>
    <thead>
      <tr><th>المزود</th><th>حد الإرسال</th><th>حد الاستقبال</th></tr>
    </thead>
    <tbody>
      <tr><td>Gmail</td><td>25 MB</td><td>50 MB</td></tr>
      <tr><td>Outlook.com</td><td>20 MB</td><td>20 MB</td></tr>
      <tr><td>Yahoo Mail</td><td>25 MB</td><td>25 MB</td></tr>
      <tr><td>iCloud Mail</td><td>20 MB</td><td>20 MB</td></tr>
      <tr><td>Exchange المؤسسي (نموذجي)</td><td>10-25 MB</td><td>10-35 MB</td></tr>
    </tbody>
  </table>

  هناك مشكلة إضافية يغفل عنها معظم الناس: مرفقات البريد مشفرة بترميز base64 (معيار MIME)، الذي يضخم البيانات الثنائية بنحو 33% أثناء النقل. يصل ملف PDF حجمه 20 MB على القرص بحجم نحو 27 MB على الشبكة. إذا كان مزودك يعلن "25 MB"، استهدف ملفا أقل من 18 MB على القرص لتكون آمنا.

  <blockquote class="callout">قاعدة عامة: استهدف 15 MB على القرص لأي بريد إلكتروني عام، و 8 MB إذا كان المستلم على شبكة مؤسسية.</blockquote>

  بعض المشكلات المحددة الجديرة بالذكر، لأن كثيرين يصطدمون بها ويفترضون أن ملفهم سليم:

  <ul>
    <li><strong>قوائم التوزيع.</strong> إرسال PDF كبير إلى قائمة من 200 شخص يضاعف وزن التسليم، وكثير من خوادم البريد المؤسسية تحسب ذلك ضمن حصتك اليومية أو ترفضه فورا.</li>
    <li><strong>سلاسل الرد على الجميع.</strong> المرفق الذي يجتاز قفزة واحدة قد يرتد عند الرد على الجميع إذا كان لدى أي مستلم حد بريد أضيق. تفشل السلسلة بأكملها للجميع.</li>
    <li><strong>مشغلو الهاتف المحمول.</strong> لا تزال بعض بوابات بريد المشغلين تفرض سقفا قدره 10 MB على المرسلات الواردة من نوع MMS. إذا كان مستلمك يقرأ البريد على هاتف بسيط أو عميل محمول قديم، خطط لذلك.</li>
    <li><strong>تأخيرات مكافحة الفيروسات.</strong> تستغرق المرفقات الأكبر وقتا أطول للمسح في بوابة المستلم. رسالة "تم التسليم" التي لا تظهر لمدة 20 دقيقة ليست معطلة، إنها في قائمة الانتظار.</li>
  </ul>

  <h2>ما الذي يجعل PDF ضخما في المقام الأول</h2>

  يعمل الضغط بأفضل شكل عندما تفهم أين توجد البايتات. تتضخم ملفات PDF لأسباب متوقعة:

  <ul>
    <li><strong>المسح الضوئي بدقة DPI عالية.</strong> ماسح ضوئي مزدوج الوجه مضبوط على 600 DPI ملون ينتج 5-15 MB لكل صفحة. معظم المستندات تحتاج فقط إلى 200 DPI بتدرج رمادي، ولن تميز العين الفرق على مسافة قراءة عادية.</li>
    <li><strong>الخطوط المضمنة وملفات تعريف الألوان.</strong> تصدير "Save as PDF/A" للأرشفة يمكن أن يضيف 1-3 MB فقط لمجموعات الخطوط الفرعية المضمنة وملفات تعريف ألوان ICC التي لا تحتاجها للبريد. PDF/A مبني للأرشيفات، وليس لصناديق البريد الواردة.</li>
    <li><strong>الصور غير المضغوطة.</strong> الصور الملصقة من Word أو لقطات الشاشة المحفوظة بصيغة PNG داخل PDF نادرا ما تستخدم ضغط الصور بكفاءة. لقطة شاشة واحدة بدقة 4K مضمنة بشكل خام يمكن أن تضيف 8 MB.</li>
    <li><strong>سجل المراجعات المخفي.</strong> "Save" في Acrobat يضيف تحديثات تزايدية بدلا من إعادة كتابة الملف. تتراكم سنوات من التعديلات كوزن غير مرئي - عقد بدأ بحجم 200 KB يمكن أن يصل إلى 12 MB بعد ثلاثين تعديلا.</li>
    <li><strong>الملفات المضمنة.</strong> تأتي بعض ملفات PDF مع جداول بيانات أو ملفات zip مرفقة بداخلها. تحقق من لوحة المرفقات (أيقونة مشبك الورق في Acrobat) قبل الضغط؛ قد تكون تنقل ملف Excel بحجم 30 MB كمسافر.</li>
    <li><strong>النماذج ذات خلفيات حقول نقطية.</strong> غالبا ما تعرض النماذج الحكومية كل حقل إدخال كصورة صغيرة منفصلة. اضرب في 80 حقلا وستحصل على ملف ضخم بشكل مفاجئ.</li>
  </ul>

  معرفة أي من هذه العوامل يهيمن على ملفك يخبرك بالطريقة الأنسب أدناه. افتح الملف في أي قارئ وانظر إلى الصفحة الأولى. إذا كانت بوضوح صورة من ورقة، فأنت تتعامل مع صور. إذا كان النص واضحا وقابلا للتحديد، فأنت تتعامل مع PDF رقمي المنشأ يحتمل أن يكون منتفخا لسبب آخر.

  <h2>الطريقة 1 - ضغط ملف PDF (الموصى بها)</h2>

  بالنسبة لـ 80% من ملفات PDF كبيرة الحجم، الضغط المباشر هو الإجابة الصحيحة. يعيد كتابة الملف بمعالجة أذكى للصور والخطوط دون تغيير عدد الصفحات أو محتوى النص.

  <figure><img src="/static/blog/images/tool-compress.jpg" alt="ضغط PDF خطوة بخطوة مع محدد إعدادات مسبقة منخفض ومتوسط وعالي" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>افتح <a href="/ar/pdf-organize/compress/">أداة ضغط PDF المجانية</a> من Convertica في أي متصفح.</li>
    <li>اسحب ملف PDF إلى منطقة الرفع، أو انقر لاختيار الملف.</li>
    <li>اختر إعدادا مسبقا: <strong>منخفض</strong> (أفضل جودة، تقليل متواضع)، <strong>متوسط</strong> (موصى به)، أو <strong>عالي</strong> (قوي، للنصوص الحشوية والمستندات المرجعية).</li>
    <li>انتظر معالجة الملف. يمكن أن تستغرق المسوحات الكبيرة 20-40 ثانية؛ والكبيرة جدا (200+ صفحة) دقيقة أو دقيقتين.</li>
    <li>نزّل النسخة المضغوطة. يبقى الأصل دون تغيير على جهازك.</li>
  </ol>

  <h3>أي إعداد مسبق يجب اختياره؟</h3>

  المتوسط هو الافتراضي الصحيح. يخفض دقة الصور إلى نحو 150 DPI ويزيل البيانات الوصفية الزائدة، وهو غير مرئي على الشاشة ولا يزال يطبع بنظافة على A4. استخدم العالي فقط عندما لا يحتاج المستلم إلى الطباعة، واستخدم المنخفض عندما يتضمن المستند رسوما تخطيطية أو صورا فوتوغرافية يجب أن تظل حادة.

  عادة صغيرة لكنها مفيدة على لوحة المفاتيح: بمجرد اكتمال الرفع، يمكنك عادة الضغط على Enter لتأكيد الإعداد المسبق الافتراضي بدلا من الوصول إلى الفأرة. (أرى أن أدوات المتصفح يجب أن تفترض المتوسط وتتجاوز النقرة، لكن الإعدادات الافتراضية تتفاوت.)

  <h3>تقليل الحجم المتوقع حسب نوع المستند</h3>

  هنا تنهار معظم ادعاءات التسويق "أصغر بنسبة تصل إلى 90%!". أرقام صادقة، استنادا إلى ما يستطيع الضغط فعله فعلا:

  <table>
    <thead>
      <tr><th>نوع المستند</th><th>التقليل النموذجي</th><th>مثال</th></tr>
    </thead>
    <tbody>
      <tr><td>PDF نصي فقط (مصدّر من Word، الويب)</td><td>80-95%</td><td>40 MB ← 2-8 MB</td></tr>
      <tr><td>نص + صور فوتوغرافية</td><td>40-70%</td><td>30 MB ← 9-18 MB</td></tr>
      <tr><td>مسح خالص (كل صفحة صورة)</td><td>30-60%</td><td>50 MB ← 20-35 MB</td></tr>
      <tr><td>PDF مضغوط مسبقا</td><td>0-15%</td><td>جرّب طريقة أخرى</td></tr>
    </tbody>
  </table>

  إذا كان ملف PDF الممسوح ضوئيا لا يزال يتجاوز الحد بعد الضغط المتوسط، انتقل إلى الطريقة 3.

  <h2>الطريقة 2 - تقسيم PDF إلى أجزاء أصغر</h2>

  أحيانا يحتاج الملف فعلا إلى البقاء بجودته الكاملة (المستندات القانونية، نماذج التصميم) والضغط لا يكفي. التقسيم يتفوق على الضغط عندما:

  <ul>
    <li>طلب المستلم الجودة الأصلية.</li>
    <li>الضغط وحده يصل بك إلى 30 MB، وليس 20 MB.</li>
    <li>يحتوي PDF على حدود أقسام طبيعية (فصول، كشوف شهرية، ملاحق من A إلى D).</li>
    <li>ترسل أدلة إلى جهة تنظيمية سترفض أي شيء يبدو معاد ترميزه.</li>
  </ul>

  استخدم أداة Convertica لـ <a href="/ar/pdf-organize/split/">تقسيم PDF إلى أجزاء أصغر</a>، اختر نطاق صفحات أو عددا لكل جزء، ونزل القطع. الحيلة هي التسمية بحيث يستطيع المستلم إعادة تجميعها دون التباس:

  <pre><code>2026-04-28_proposal_part-1-of-3.pdf
  2026-04-28_proposal_part-2-of-3.pdf
  2026-04-28_proposal_part-3-of-3.pdf</code></pre>

  أرسل كل جزء كرسالة منفصلة مع ملاحظة قصيرة: "الجزء 1 من 3 - الباقي في الرسالتين التاليتين." يستطيع المستلم <a href="/ar/pdf-organize/merge/">دمج الأجزاء المضغوطة مرة أخرى</a> في ملف واحد عندما يحتاج إلى أرشفته. إذا كنت قلقا من أن يفقدوا الرسالة الثانية، أرسل جميع الأجزاء في نفس السلسلة بسطور موضوع متسلسلة بحيث يبقيها فرز صندوق الوارد متجاورة.

  خصوصية تستحق المعرفة: يضع بعض مرشحات البريد العشوائي المؤسسية علامة على دفعة من ثلاث رسائل متطابقة تقريبا كسلوك مشبوه. باعد بين الإرسالات بـ 60 ثانية، أو أرسل الأولى كرسالة تنبيه ("توقع ثلاثة أجزاء في الدقائق القليلة القادمة") لإبقاء البوابة هادئة.

  <h2>الطريقة 3 - تحويل المسوحات إلى PDF نصي</h2>

  إذا كان ملفك عقدا ممسوحا ضوئيا أو فاكسا أو صورة من صفحة، فالبايتات صور وليست نصا. لا يوجد إعداد ضغط مسبق يصل بمسح خالص بحجم 50 MB إلى أقل من 10 MB دون فقدان جودة مرئي. الإصلاح هو تشغيل التعرف الضوئي على الحروف (OCR)، الذي يستخرج الكلمات ويعيد تصدير المستند كملف PDF نصي.

  سير العمل:

  <ol>
    <li>شغّل OCR على المسح لإنتاج نسخة Word أو نصية.</li>
    <li>تحقق من الدقة في الصفحة الأولى - ابحث عن "rn" المعروضة كـ "m"، و "1" المعروضة كـ "l"، وأي مجموعة تردد فيها برنامج التعرف.</li>
    <li>أعد التصدير إلى PDF من Word.</li>
    <li>اضغط الملف الجديد بالطريقة 1.</li>
  </ol>

  مسح بحجم 50 MB يخرج غالبا بحجم 1-2 MB بعد هذه الجولة لأن النص يأخذ جزءا ضئيلا من البايتات التي تطلبتها صور الصفحة. المقايضة هي أن الكتابة اليدوية والتوقيعات والأختام لن تنجو من التحويل، لذا احتفظ بالأصل إذا كانت تلك الأشياء مهمة قانونيا. للمستندات القضائية أو أي شيء قد يحتاج إلى مصادقة، لا تستبدل المصدر بالنسخة المعالجة بـ OCR أبدا - أرسل الاثنين.

  <h2>الجودة مقابل الحجم: ما يجب توقعه</h2>

  كن صادقا مع نفسك بشأن ما يحتاجه المستلم فعلا:

  <ul>
    <li><strong>القراءة على الشاشة.</strong> الضغط المتوسط غير مرئي. استخدمه بحرية.</li>
    <li><strong>الطباعة على ورق المكتب القياسي.</strong> المتوسط لا يزال جيدا. العالي يبدأ بالظهور على الصور.</li>
    <li><strong>الطباعة الاحترافية أو التوقيع.</strong> التزم بالضغط المنخفض أو احتفظ بالأصل وأرسل رابطا سحابيا.</li>
    <li><strong>المستندات القانونية أو الأدلة.</strong> لا تضغط على الإطلاق. سلامة الملف أهم من ملاءمة البريد، ويمكن للطرف الخصم استخدام إعادة الترميز كحجة مصداقية.</li>
    <li><strong>إيداعات المحاكم عبر بوابات الإيداع الإلكتروني.</strong> تنشر كثير من المحاكم مواصفات PDF دقيقة (PDF/A 1b، لا خطوط مضمنة بخلاف الـ 14 الأساسية، حد أقصى 35 MB). طابق مواصفاتهم بدلا من التخمين.</li>
  </ul>

  <h2>متى تستخدم رابطا سحابيا بدلا من ذلك</h2>

  إذا كان حجم PDF يتجاوز 100 MB من البداية، أو كنت تحتاج إلى إرسال عدة ملفات كبيرة دفعة واحدة، توقف عن محاربة البريد وانتقل إلى رابط. لدى معظم الناس بالفعل واحد من هذه:

  <table>
    <thead>
      <tr><th>الخدمة</th><th>حجم الرفع المجاني</th><th>ملاحظات</th></tr>
    </thead>
    <tbody>
      <tr><td>Google Drive</td><td>15 GB إجماليا مجانا</td><td>يحتاج المستلم إلى ضبط أذونات الرابط</td></tr>
      <tr><td>WeTransfer (مجاني)</td><td>2 GB لكل تحويل</td><td>ينتهي الرابط بعد 7 أيام</td></tr>
      <tr><td>Dropbox</td><td>2 GB مجانا إجماليا</td><td>روابط مشاركة دائمة</td></tr>
      <tr><td>OneDrive</td><td>5 GB مجانا</td><td>الأفضل لمستلمي Outlook</td></tr>
    </tbody>
  </table>

  ملاحظة خصوصية: روابط السحابة تنشئ نسخة خارج مؤسستك. إذا كان المستند حساسا، احم PDF بكلمة مرور قبل الرفع وشارك كلمة المرور عبر قناة مختلفة. اضبط أذونات الرابط على "أشخاص محددين" بدلا من "أي شخص لديه الرابط"، واضبط انتهاء صلاحية إذا كانت المنصة تدعمه (Drive يدعم؛ Dropbox يدعم في الخطط المدفوعة).

  لكل شيء آخر، انظر <a href="/ar/all-tools/">جميع أدوات PDF</a> للضغط والتقسيم والحماية في مكان واحد.

  <h2>الأسئلة الشائعة</h2>

  <h3>لماذا لا يزال ملف PDF يتجاوز 25 MB بعد الضغط؟</h3>
  <p>إما أن الملف صور ممسوحة في الغالب (الطريقة 1 تصل إلى حد أقصى نحو 60% من التقليل في المسوحات الخالصة) أو أنه ضُغط بالفعل مرة واحدة. جرّب الطريقة 3 لتطبيق OCR على المسوحات، أو الطريقة 2 لتقسيمه إلى رسالتين. إذا كان PDF رقمي المنشأ ولا يتقلص، تحقق من لوحة المرفقات بحثا عن ملفات مضمنة تركب معه.</p>

  <h3>هل يقلل ضغط PDF من جودته؟</h3>
  <p>الضغط المتوسط يخفض دقة الصور إلى نحو 150 DPI، وهو غير مرئي على مسافة قراءة عادية ويطبع جيدا على A4. الضغط العالي يظهر على الصور والرسوم التفصيلية. النص لا يتأثر في أي إعداد لأن النص المتجهي لا يخفض.</p>

  <h3>هل يمكنني ضغط PDF محمي بكلمة مرور؟</h3>
  <p>ستحتاج إلى فتحه أولا باستخدام كلمة المرور التي تملكها، ثم الضغط، ثم إعادة الحماية إذا لزم الأمر. لا تستطيع أدوات الضغط قراءة محتويات الصفحة المشفرة، وذلك بحكم التصميم - إذا استطاعت أي أداة ذلك، لما كان التشفير ذا معنى.</p>

  <h3>ما هو حجم الملف الآمن للبريد المؤسسي؟</h3>
  <p>استهدف أقل من 10 MB. كثير من خوادم Exchange ترفض المرفقات التي تتجاوز 10-15 MB، وقد يضيف مرشح البريد العشوائي للمستلم هامشا آخر. عند الشك، اضغط إلى أقل من 8 MB أو استخدم رابطا سحابيا.</p>

  <h3>هل سيتمكن المستلم من طباعة ملف PDF المضغوط؟</h3>
  <p>نعم. يحافظ الضغط المتوسط والمنخفض على دقة كافية لطباعة مكتبية نظيفة. إذا كان المستند سيُطبع احترافيا بحجم كبير (أي شيء أكبر من A3)، التزم بالإعداد المنخفض أو أرسل الأصل.</p>

  <h2>جرّبه الآن</h2>

  <p>تُحل معظم مشكلات "PDF كبير جدا للبريد" في أقل من دقيقة بالإعداد المتوسط. ضع ملفك في أداة ضغط Convertica وأرسل النسخة المُقلَّمة بثقة. <a href="/ar/pdf-organize/compress/">افتح أداة ضغط PDF ←</a></p>
