title_ar: "كيفية استخراج النص من صورة (OCR مجاني، بدون إعادة كتابة)"
meta_title_ar: "تحويل الصورة إلى نص أونلاين مجانا — استخرج النص بـ OCR | Convertica"
meta_description_ar: "حوّل صورة أو لقطة شاشة أو مسحا ضوئيا إلى نص قابل للتحرير بـ OCR مجاني. تعلّم كيف يعمل، وما الذي يؤثر على الدقة، وكيف تتعامل مع صور iPhone بصيغة HEIC و17 لغة."
meta_keywords_ar: "صورة إلى نص، استخراج نص من صورة، صورة فوتوغرافية إلى نص، لقطة شاشة إلى نص، ocr أونلاين مجانا، صورة إلى نص، jpg إلى نص"
excerpt_ar: "النص الذي تحتاجه محاصر داخل صورة — لقطة شاشة، صفحة مُصوَّرة، إيصال. OCR يقرأ البكسلات ويعيد إليك نصا قابلا للتحرير. إليك كيفية القيام بذلك بشكل صحيح."
content_ar: |
  يمكنك رؤية الكلمات، لكنك لا تستطيع تحديدها. إنها محبوسة داخل صورة — لقطة شاشة لشريحة عرض، صورة فوتوغرافية لصفحة مطبوعة، إيصال ممسوح ضوئيا، بطاقة عمل. إعادة الكتابة هي الخيار الواضح والأسوأ في آن واحد. التعرف الضوئي على الحروف (OCR) يفعل ذلك عنك: يقرأ البكسلات، ويتعرف على أشكال الحروف، ويعيد إليك نصا يمكنك نسخه وتحريره والبحث فيه.

  يوضح هذا الدليل كيفية استخراج النص من صورة باستخدام أداة مجانية في المتصفح، وما الذي يجعل النتيجة نظيفة أو مشوهة، وكيف تتعامل مع الحالات الصعبة كصور iPhone بصيغة HEIC والنصوص غير الإنجليزية.

  <h2>متى تحتاج إلى OCR (ومتى لا تحتاج)</h2>

  إذا كنت تستطيع بالفعل تحديد كلمات فردية بالمؤشر، فالنص "حي" — فقط انسخه، لا حاجة لـ OCR. تحتاج إلى OCR عندما تكون الكلمات جزءا من الصورة نفسها:

  <ul>
    <li><strong>لقطات الشاشة</strong> للنص الذي لا يمكن تحديده (إطار فيديو، محادثة، مربع حوار خطأ).</li>
    <li><strong>الصور الفوتوغرافية</strong> لصفحة مطبوعة، لوح أبيض، لافتة، أو شريحة عرض.</li>
    <li><strong>الملفات الممسوحة ضوئيا والفاكسات</strong> المحفوظة بصيغة JPG أو PNG أو TIFF.</li>
    <li><strong>الإيصالات وبطاقات العمل</strong> التي تريد أرشفتها كنص.</li>
  </ul>

  <h2>كيفية استخراج النص من صورة</h2>

  <ol>
    <li>افتح أداة <a href="/ar/image/to-text/">الصورة إلى نص</a> وارفع صورتك (JPG, PNG, WebP, HEIC, BMP, TIFF, أو GIF). يمكنك سحبها مباشرة إلى الصفحة.</li>
    <li>اختر لغة النص، أو اتركها على <strong>الاكتشاف التلقائي</strong>. تحديد اللغة صراحةً يساعد كثيرا للنصوص غير الإنجليزية أو التي تحتوي على حروف مع علامات.</li>
    <li>انقر على <strong>استخراج النص</strong>. يظهر النص المُعرَّف على الصفحة خلال ثوانٍ معدودة.</li>
    <li>استخدم <strong>نسخ</strong> للحصول عليه، أو <strong>تنزيل .txt</strong> لحفظه كملف نصي. دائما أجرِ مراجعة سريعة قبل الاعتماد عليه.</li>
  </ol>

  <p>لا يُثبَّت شيء والملف يُعالَج في جلسة مؤقتة ثم يُحذف — لكن انظر ملاحظة السرية في الأسئلة الشائعة للمستندات الحساسة.</p>

  <h2>ما الذي يؤثر فعلا على الدقة</h2>

  جودة OCR تتحدد في الغالب بالصورة التي تقدمها. ثلاثة أشياء هي الأهم:

  <ul>
    <li><strong>الحدة.</strong> النص الواضح والمُركَّز عليه يُقرأ بنظافة. الضبابية الناجمة عن الحركة وصور الهاتف غير المُركَّزة هي السبب الأول للمخرجات المشوهة.</li>
    <li><strong>التباين.</strong> يعمل OCR على الفرق بين الحبر والخلفية. نسخة ضوئية باهتة أو صورة في إضاءة ضعيفة لا تعطي المحرك ما يكفي للعمل به، حتى بدقة عالية.</li>
    <li><strong>اللغة.</strong> نموذج مدرّب على الإنجليزية يخطئ في قراءة الحروف المعلّمة والكلمات غير المألوفة. اختر اللغة الصحيحة بدلا من الاكتشاف التلقائي دائما حين تعرفها.</li>
  </ul>

  <p>الدقة تساعد أيضا: احرص على أن يكون النص بارتفاع بضع مئات من البكسلات على الأقل عبر سطر واحد. للمسوحات الضوئية، 300 DPI هو الحد الأدنى المريح. الحواشي الصغيرة في صورة منخفضة الدقة هي المكان الذي تنهار فيه الدقة.</p>

  <h2>صور iPhone (HEIC) والصيغ الأخرى</h2>

  <p>الصور الواردة مباشرة من iPhone أو iPad حديث تكون في العادة بصيغة <strong>HEIC/HEIF</strong> وليس JPG. لا تحتاج إلى تحويلها أولا — ارفع ملف HEIC وستقوم الأداة بفك تشفيره مباشرة. JPG وPNG وWebP وBMP وTIFF وGIF كلها تعمل بالطريقة ذاتها. بالنسبة لملف TIFF متعدد الصفحات أو GIF متحرك، يُستخدم الإطار الأول.</p>

  <h2>نصائح للحصول على نتيجة نظيفة</h2>

  <ul>
    <li>املأ الإطار بالنص واقتص الخلفيات والأيدي وحواف الطاولة — الفوضى تربك اكتشاف التخطيط.</li>
    <li>صوّر من الأمام مباشرة. الصفحة المُصوَّرة بزاوية تشوّه الحروف وتخفض الدقة؛ تعالج الأداة الإمالة الخفيفة، لكن التصوير المباشر هو الأفضل.</li>
    <li>تجنب الوهج والظلال. الإضاءة المتساوية والمنتشرة أفضل من نافذة ساطعة أو فلاش الهاتف.</li>
    <li>لتخطيطات متعددة الأعمدة، توقع النص بترتيب القراءة لا بأعمدة مُعاد بناؤها.</li>
    <li>راجع الأخطاء المعتادة: 0/O، 1/l/I، rn/m، وعلامات الترقيم الزائدة.</li>
  </ul>

  <h2>الأسئلة الشائعة</h2>

  <h3>هل هو مجاني حقا؟</h3>
  <p>نعم. استخراج النص من صورة واحدة مجاني، بدون تسجيل وبدون علامة مائية على الناتج.</p>

  <h3>ما اللغات المدعومة؟</h3>
  <p>17 لغة، بما فيها الإنجليزية والروسية والألمانية والفرنسية والإسبانية والإيطالية والبرتغالية والبولندية والتركية والأوكرانية والهندية والإندونيسية والعربية والصينية (المبسطة والتقليدية) واليابانية والكورية — بالإضافة إلى الاكتشاف التلقائي. للنصوص ذات العلامات أو الخطوط غير اللاتينية، اضبط اللغة صراحةً للحصول على أفضل دقة.</p>

  <h3>هل يستطيع قراءة الخط اليدوي؟</h3>
  <p>أحيانا، وليس بشكل موثوق. OCR مدرَّب على النص المطبوع؛ دقة الخط اليدوي تتفاوت تفاوتا كبيرا والكتابة المتصلة هي الأسوأ. الحروف الكبيرة المطبوعة — كنموذج مملوء بخط اليد — تُقرأ بشكل أفضل بكثير من الكتابة المتصلة.</p>

  <h3>لماذا بعض النص خاطئ أو مفقود؟</h3>
  <p>دائما تقريبا تكمن المشكلة في الصورة المصدر: الضبابية، والتباين المنخفض، والنص الصغير، أو إعداد اللغة الخاطئ. أعد التصوير بحدة أعلى وإضاءة أفضل، واختر اللغة الصحيحة، وعادةً ما يتحسن الناتج بشكل ملحوظ.</p>

  <h3>هل هذا سري؟</h3>
  <p>تُعالَج الصورة في جلسة مؤقتة وتُحذف بُعيد ذلك. ومع ذلك، اقرأ سياسة الخصوصية قبل رفع مواد حساسة. للمستندات شديدة السرية — السجلات الطبية، الملفات القانونية المحمية — يُفضَّل OCR المحلي (مثل Tesseract) على أي خدمة ويب.</p>

  <h3>هل يمكنني الحصول على النص كمستند Word؟</h3>
  <p>تُعيد هذه الأداة نصا عاديا يمكنك لصقه في أي مكان. إذا كنت تحتاج تحديدا إلى تحويل <em>PDF</em> ممسوح ضوئيا إلى ملف Word منسّق، استخدم محوّل <a href="/ar/pdf-to-word/">PDF إلى Word</a> المدعوم بـ OCR.</p>

  <h2>جرّبه الآن</h2>

  <p>توقف عن إعادة الكتابة. أسقط لقطة الشاشة أو صورتك في أداة <a href="/ar/image/to-text/">الصورة إلى نص</a>، اختر اللغة، وستحصل على نص قابل للتحرير في ثوانٍ — فقط أجرِ مراجعة سريعة قبل استخدامه.</p>
