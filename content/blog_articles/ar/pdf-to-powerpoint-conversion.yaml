content_ar: |
  يرسل لك زميل عرضا من الشرائح، لكنه يصل بصيغة PDF، وأنت الآن بحاجة إلى تغيير رقمين واستبدال شعار. ملفات PDF مصمَّمة لتبدو متطابقة في كل مكان، لا لتُحرَّر، فلا يمكنك ببساطة النقر داخل شريحة والكتابة. تحويل PDF إلى PowerPoint من جديد يعيد إليك شرائح قابلة للتحرير. إليك كيفية فعل ذلك، ونظرة صادقة إلى متى تكون النتيجة نظيفة ومتى تحتاج بعض الترتيب.

  <h2>لماذا PDF غير قابل للتحرير من الأساس</h2>

  <p>عندما يصدّر أحدهم عرض PowerPoint إلى PDF، تُسطَّح الشرائح إلى صفحات ثابتة. يُثبَّت النص والأشكال والصور في مكانها كي يبدو الملف متطابقا على أي شاشة. هذا رائع للمشاركة وسيّئ للتحرير. التحويل العكسي إلى PowerPoint يحاول عكس هذا التسطيح: يعيد بناء كل صفحة كشريحة، ويحوّل العناصر المجمَّدة من جديد إلى مربعات نصية وصور يمكنك تحريكها وتغييرها.</p>

  <h2>أمر واحد يحدّد مدى نظافة النتيجة</h2>

  <p>لا تتحوّل كل ملفات PDF بالتساوي، والأمر يعود إلى كيفية إنشاء ملف PDF.</p>

  <ul>
    <li><strong>ملف PDF المصدَّر من PowerPoint (أو Keynote أو Google Slides)</strong> يتحوّل جيدا. النص حقيقي وقابل للتحديد، لذا يعود على شكل مربعات نصية قابلة للتحرير، ويبقى التخطيط قريبا من الأصل.</li>
    <li><strong>ملف PDF ممسوح ضوئيا أو صورة لشرائح</strong> هو صورة. لا يوجد نص حقيقي يمكن استرجاعه، فيعتمد التحويل على التعرّف الضوئي على الحروف (OCR) وتحتاج النتيجة إلى مزيد من التنظيف. توقّع إصلاح التنسيق يدويا.</li>
    <li><strong>ملف PDF ذو تصميم كثيف</strong> بخطوط مخصصة وتخطيطات معقّدة سيتحوّل، لكن قد تُستبدل الخطوط وتنزاح العناصر، لأن المحوّل لا يستطيع إعادة البناء إلا بما هو متاح.</li>
  </ul>

  <p>الاختبار السريع هو نفسه كالعادة: حاول تحديد سطر نص في ملف PDF. إذا تلوّن، فأنت في وضع جيد.</p>

  <h2>حوّل PDF إلى PowerPoint</h2>

  <figure><img src="/static/blog/images/tool-pdf-to-ppt.jpg" alt="محوّل PDF إلى PowerPoint من Convertica مع ملف جاهز للتحويل" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>افتح محوّل <a href="/ar/pdf-to-ppt/">PDF إلى PowerPoint</a> وارفع ملفك (حتى 25 MB).</li>
    <li>دعه يعالج الملف. تصير كل صفحة PDF شريحة.</li>
    <li>نزّل ملف PPTX وافتحه في PowerPoint أو Keynote أو Google Slides. صارت الشرائح الآن قابلة للتحرير.</li>
  </ol>

  <p>تُحذف الملفات المرفوعة من الخادم بعد مدة قصيرة، وهذا جدير بالمعرفة إذا كان العرض داخليا أو خاصا بعميل.</p>

  <h2>إصلاح الشرائح بعد التحويل</h2>

  <p>حتى التحويل الجيد يحتاج أحيانا إلى مراجعة خفيفة، خصوصا في العروض ذات التصميم الكثيف:</p>

  <ul>
    <li><strong>استبدال الخطوط.</strong> إذا لم يكن الخط المخصص مضمَّنا، يستبدله PowerPoint بأقرب خط مطابق. أعد تطبيق خط علامتك التجارية من الشريحة الرئيسية (Slide Master) فيسري على الكل.</li>
    <li><strong>عناصر منزاحة.</strong> قد يستقر شعار أو مربع نص على بعد بضعة بكسلات من موضعه. اسحبه إلى مكانه؛ المحتوى كله موجود، وكل ما يحتاجه هو المحاذاة.</li>
    <li><strong>نص على شكل صورة.</strong> في العروض الممسوحة ضوئيا، قد يعود بعض النص كصورة لا كنص قابل للتحرير. أعد كتابة الأجزاء التي تحتاج إلى تغييرها فوقه.</li>
  </ul>

  <h2>متى ينبغي ألا تحوّل إطلاقا</h2>

  <p>إذا كنت تحتاج فقط إلى عرض الشرائح لا تحريرها، فالتحويل عمل لا لزوم له. ملف PDF يُعرض بنظافة من تلقاء نفسه. وإذا كنت تريد فقط إدراج شريحة واحدة في مستند آخر كصورة، فتحويل PDF إلى صور بأداة <a href="/ar/pdf-to-jpg/">PDF إلى JPG</a> أبسط من رحلة كاملة إلى PowerPoint والعودة منها. حوّل إلى PowerPoint فقط حين تحتاج إلى التحرير فعلا.</p>

  <h2>الأسئلة الشائعة</h2>

  <h3>هل ستعود الحركات والانتقالات؟</h3>
  <p>لا. ملف PDF مجموعة من الصفحات الثابتة بلا أي بيانات حركة، لذا لا يمكن استرجاع الحركات والانتقالات، فهي لم تُخزَّن أصلا. ستحصل على شرائح ثابتة قابلة للتحرير، وهو ما تحتاجه معظم التعديلات. إذا كانت الحركات مهمة، فاطلب من المرسِل ملف PPTX الأصلي.</p>

  <h3>هل يمكنني تحويل عرض ممسوح ضوئيا إلى PowerPoint؟</h3>
  <p>نعم، يستخدم المحوّل التعرّف الضوئي على الحروف (OCR) لقراءة النص، لكن الدقة تعتمد على جودة المسح وتحتاج النتيجة إلى مراجعة دقيقة. العرض المصدَّر مباشرة من PowerPoint سيتحوّل دائما بنظافة أكبر من المسح الضوئي.</p>

  <h3>لماذا تغيّرت خطوطي؟</h3>
  <p>إذا لم يكن الخط الأصلي مضمَّنا في ملف PDF، فهو غير موجود في الملف كي يُسترجع، لذا يستبدله PowerPoint بخط مشابه. إعادة تطبيق خطك في PowerPoint تصلح ذلك بسرعة.</p>

  <h3>هل هناك حد لحجم الملف؟</h3>
  <p>يمكن أن يصل الملف الواحد إلى 25 MB، وهو ما يغطي معظم العروض. إذا كان ملف PDF مثقلا بالصور وأكبر من ذلك، فضغطه أولا يعيده عادة تحت الحد دون الإضرار بالشرائح.</p>

  <h3>هل أحتاج إلى تثبيت PowerPoint؟</h3>
  <p>ليس للتحويل. يجري التحويل في متصفحك ويمنحك ملف PPTX، يُفتح في PowerPoint أو Keynote أو Google Slides أو LibreOffice Impress.</p>

  <h2>جرّبه الآن</h2>

  <p>إذا كان العرض الذي تحتاج إلى تحريره عالقا بصيغة PDF، فارفعه إلى محوّل <a href="/ar/pdf-to-ppt/">PDF إلى PowerPoint</a> وافتح الشرائح القابلة للتحرير التي تعود إليك. وعندما تنتهي وتحتاج إلى مشاركته كملف ثابت من جديد، تُغلق أداة <a href="/ar/ppt-to-pdf/">PowerPoint إلى PDF</a> الدائرة.</p>
