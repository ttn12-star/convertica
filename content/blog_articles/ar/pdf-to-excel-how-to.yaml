excerpt_ar: "تحتاج الأرقام من ملف PDF في جدول بيانات، لكن النسخ واللصق يكدّس كل شيء في عمود واحد فوضوي. إليك كيف تحوّل PDF إلى Excel بحيث تنتهي صفوفك وأعمدتك حيث ينبغي، بما في ذلك ما تفعله مع الملفات الممسوحة ضوئيا."
content_ar: |
  يرسل لك مورّد قائمة أسعار بصيغة PDF. ويصدّر بنكك كشوف الحساب ملفات PDF. ويصلك تقرير في بريدك يحمل بالضبط الجدول الذي تحتاجه، محبوسا داخل مستند لا تستطيع تحريره. تحدد الجدول، وتنسخه، وتلصقه في Excel، فينهار كل شيء إلى عمود واحد من نص متلاصق. التحويل الصحيح لملف PDF يعيد تلك الصفوف والأعمدة إلى خلايا حقيقية. إليك كيف تفعل ذلك، وكيف تتعامل مع الملفات العنيدة.

  <h2>لماذا يحوّل النسخ واللصق الجدول إلى فوضى</h2>

  <p>لا يخزّن ملف PDF جدولا في الحقيقة. إنه يخزّن نصا في مواضع ثابتة على الصفحة، إضافة إلى خطوط مرسومة حولها تقرؤها عينك كشبكة. حين تنسخ، تلتقط النص بترتيب القراءة لكنك تفقد الشبكة، فتذوب الأعمدة بعضها في بعض وتصطف الأرقام مع تسميات خاطئة. أما التحويل السليم فيعمل بطريقة مختلفة: ينظر إلى موضع كل قيمة، ويعيد بناء الأعمدة، ويبني جدول بيانات فعليا تحطّ فيه كل رقم في خليته الخاصة.</p>

  <h2>أولا، تحقق من نوع ملف PDF الذي لديك</h2>

  <p>هذا الفحص وحده يحدد كل ما يليه، فهو يستحق عشر ثوانٍ. افتح ملف PDF وحاول تحديد رقم واحد بمؤشرك.</p>

  <ul>
    <li><strong>إذا أُبرز النص،</strong> فلديك ملف PDF أصلي. البيانات نص حقيقي قابل للتحديد، وسيكون التحويل نظيفا ودقيقا.</li>
    <li><strong>إذا لم يُبرز شيء وتصرفت الصفحة كصورة،</strong> فلديك ملف PDF ممسوح ضوئيا. الجدول صورة، فلا بد من قراءة الأرقام بتقنية OCR (التعرّف الضوئي على الحروف) قبل أن تصير خلايا. وهذا ينجح أيضا، لكنه يحتاج خطوة التعرّف الإضافية ونظرة أدقّ على النتيجة.</li>
  </ul>

  <h2>حوّل PDF إلى Excel</h2>

  <figure><img src="/static/blog/images/tool-pdf-to-excel.jpg" alt="محوّل PDF إلى Excel من Convertica ومستند جاهز للتحويل" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>افتح محوّل <a href="/ar/pdf-to-excel/">PDF إلى Excel</a> وارفع ملفك (حتى 25 MB).</li>
    <li>دعه يعالج. مع ملف PDF أصلي يكون هذا سريعا. ومع الملف الممسوح يقرأ النص أولا، فيستغرق وقتا أطول قليلا.</li>
    <li>نزّل ملف XLSX وافتحه في Excel أو Google Sheets أو LibreOffice Calc. صفوفك وأعمدتك الآن خلايا قابلة للتحرير تستطيع فرزها وتصفيتها وجمعها.</li>
  </ol>

  <p>تُحذف الملفات التي ترفعها من الخادم بعد فترة قصيرة، وهذا مهم حين يكون الجدول المعني كشف حساب بنكي أو تقرير رواتب.</p>

  <h2>التنظيف بعد التحويل</h2>

  <p>حتى التحويل الجيد يحتاج أحيانا لمسة خفيفة، خصوصا في الجداول الكثيفة أو الممسوحة. بضعة إصلاحات سريعة تعالج كل شيء تقريبا:</p>

  <ul>
    <li><strong>أعمدة متداخلة.</strong> إذا حطّ عمودان في عمود واحد، فحدّده واستخدم Data ثم Text to Columns في Excel لفصلهما من جديد عند مسافة أو فاصلة.</li>
    <li><strong>أرقام مخزّنة كنص.</strong> إذا رفض عمود أن يُجمع، فإن Excel يعامله كنص. حدّده، واستخدم أيقونة التحذير الصغيرة أو قائمة Data ثم تنسيق الأرقام لتحويله إلى أرقام حقيقية.</li>
    <li><strong>صف عنوان زائد.</strong> قد تتسلل عناوين الصفحات المتكررة في الجداول الممتدة على عدة صفحات. احذف الصفوف الشاردة وتكون قد انتهيت.</li>
    <li><strong>الملفات الممسوحة.</strong> افحص التحويل الممسوح دائما بعينك. قد يقرأ OCR رقم 8 الملطّخ على أنه 3، فألقِ نظرة على كل عمود قبل أن تثق بالمجاميع.</li>
  </ul>

  <h2>XLSX أم CSV: أيهما تختار؟</h2>

  <p>XLSX هو الخيار الافتراضي الصحيح. يحفظ التنسيق، وأوراق العمل المتعددة، وكل ما هو خاص بـ Excel، وهو ما يقصده معظم الناس بجدول البيانات. لا تلجأ إلى CSV إلا حين تستورد البيانات إلى مكان آخر (برنامج محاسبة، أو قاعدة بيانات، أو تطبيق ويب) يتوقع ملفا نصيا مفصولا بفواصل. CSV أخفّ ومقبول عالميا، لكنه يحمل القيم الخام وحدها، بلا تنسيق أو معادلات. إذا كنت ستفتح النتيجة بنفسك في Excel، فابقَ مع XLSX.</p>

  <h2>مثال واقعي: تحويل الكشوف إلى شيء تستطيع جمعه</h2>

  <p>لنقل إنك تمسك دفاتر حسابات شركة صغيرة، وكل كشف من مورّد يصل بصيغة PDF. إعادة كتابتها بطيئة وتستدعي الأخطاء المطبعية، ورقم خاطئ واحد يخرّب المطابقة. تحويل كل كشف إلى Excel بدلا من ذلك يمنحك أعمدة تستطيع جمعها، وتصفيتها بالتاريخ، ولصقها مباشرة في ورقة محاسبتك. ما كان ساعة من الكتابة الحذرة يصير دقيقتين من التحويل وفحصا سريعا. وإذا كان سير عملك يسير في الاتجاه المعاكس أيضا واحتجت إرسال ورقة كمستند ثابت، فمحوّل <a href="/ar/excel-to-pdf/">Excel إلى PDF</a> يغلق الحلقة.</p>

  <h2>الأسئلة الشائعة</h2>

  <h3>هل ستنجو معادلاتي من التحويل؟</h3>
  <p>لا، وهذا متوقع. لا يحمل ملف PDF سوى القيم المحسوبة، لا المعادلات خلفها، فما تستعيده هو الأرقام كما ظهرت. إذا احتجت معادلات حية، فأعد بناءها في Excel فوق البيانات المحوَّلة، وهذا يبقى أسرع بكثير من إعادة كتابة كل شيء.</p>

  <h3>هل أستطيع تحويل ملف PDF ممسوح ضوئيا إلى Excel؟</h3>
  <p>نعم. يقرأ المحوّل النص بتقنية OCR ويعيد بناء الجدول مما يتعرّف عليه. تتوقف الدقة على مدى نظافة المسح، فالمسح الحاد المستقيم يتحول جيدا بينما يحتاج المسح الباهت أو المائل مزيدا من الفحص. راجع دائما النتيجة الممسوحة قبل الاعتماد على الأرقام.</p>

  <h3>ماذا لو كان ملف PDF يحوي عدة جداول أو صفحات كثيرة؟</h3>
  <p>تتحول الجداول الممتدة على عدة صفحات بسلاسة وتستمر عبر الورقة. وحين يحمل مستند عدة جداول مختلفة، راجع الناتج وافصلها إلى أوراق أو نطاقات منفصلة إذا أردت إبقاءها متمايزة.</p>

  <h3>هل هناك حد لحجم الملف؟</h3>
  <p>يمكن أن يصل الملف الواحد إلى 25 MB، وهذا يغطي معظم الكشوف والتقارير. إذا كان ملف PDF ممسوح أكبر من ذلك، فضغطه أولا عادة ما ينزله تحت الحد دون الإضرار بالنص.</p>

  <h3>هل أحتاج إلى تثبيت أي شيء؟</h3>
  <p>لا. يجري التحويل في متصفحك، فليس هناك ما تنزّله أو تُعدّه. لا تحتاج سوى ملف PDF وبرنامج جداول البيانات الذي تستخدمه أصلا لفتح النتيجة.</p>

  <h2>جرّبه الآن</h2>

  <p>إذا كان جدول تحتاجه عالقا داخل ملف PDF الآن، فارفعه إلى محوّل <a href="/ar/pdf-to-excel/">PDF إلى Excel</a> وافتح جدول البيانات العائد. وإذا احتجت يوما العكس، أي تحويل ورقة منتهية إلى مستند مرتّب غير قابل للتحرير، فإن <a href="/ar/excel-to-pdf/">Excel إلى PDF</a> يتولى ذلك الجانب بالسرعة نفسها.</p>
