slug: rotate-pdf-pages-permanently
title_ar: "كيفية تدوير صفحات PDF وحفظ التغيير بشكل دائم (لا فقط في العارض)"
meta_title_ar: "تدوير PDF وحفظه بشكل دائم - مجاني عبر الإنترنت | Convertica"
meta_description_ar: "Adobe Reader 'يدوّر' ملفات PDF فقط في العارض. تعلّم كيف تدوّر الصفحات بشكل دائم بحيث يستمر التغيير عند المشاركة أو الإرسال أو الطباعة من قبل أي شخص."
meta_keywords_ar: "تدوير pdf بشكل دائم، حفظ pdf مدور، إصلاح pdf جانبي، تدوير pdf ممسوح، تدوير pdf مجاني"
excerpt_ar: "إذا سبق لك أن دوّرت PDF في Adobe Reader فقط ليرتد عند إعادة الفتح، فهذا هو الإصلاح. علم اتجاه الصفحة يعيش داخل الملف نفسه."
content_ar: |
  دوّر PDF في Adobe Reader، أغلق الملف، أعد فتحه، وترتد الصفحات إلى حيث بدأت. تلك اللحظة هي عندما يتعلم معظم الناس أن هناك نوعين مختلفين تماما من التدوير، وفقط واحد منهما يغير الملف فعلا. رسالة الخطأ التي يعرضها Adobe Reader عندما تحاول حفظ التدوير - "تم تدوير هذا الملف ويجب استخدام Adobe Acrobat لتثبيت التغيير" - واحدة من تلك الإيقاظات الخشنة الهادئة التي تكلف بعد ظهر لأي شخص لا يراها قادمة.

  هذا الدليل عن النوع الذي يبقى. ستنتهي بـ PDF يبدو نفسه في Chrome وPreview وAcrobat، على هاتف شخص ما، وعلى الطابعة التي تطلقه أخيرا. لن يحتاج أحد في المصب إلى تدويره بنفسه.

  <figure><img src="/static/blog/images/tool-rotate.jpg" alt="أداة تدوير PDF من Convertica مع شبكة صور مصغرة وعناصر تحكم في اتجاه التدوير" width="1280" height="800" loading="lazy"></figure>

  <h2>لماذا يستمر تدويرك في الاختفاء</h2>

  تخزن ملفات PDF علم اتجاه لكل صفحة داخل بنية الملف. عندما "تدور" داخل النسخة المجانية من Adobe Reader، فأنت تخبر العارض فقط كيف يعرض الصفحة على شاشتك في هذه الجلسة. العلم في الملف لم يُمس.

  ثلاثة أشياء تحدث خلف الكواليس:

  <ul>
    <li><strong>التدوير على مستوى العارض</strong> يغير العرض، لا البيانات. أغلق المستند ويذهب التجاوز.</li>
    <li><strong>التدوير على مستوى الملف</strong> يعيد كتابة إدخال اتجاه الصفحة. كل عارض بعد ذلك يقرأ القيمة الجديدة.</li>
    <li><strong>"Save As" في Adobe Reader المجاني</strong> يستطيع حفظ الملف مرة أخرى، لكنه لا يلتزم بالتدوير الذي هو للعرض فقط. تلك الميزة محصورة خلف Acrobat المدفوع.</li>
  </ul>

  <blockquote class="callout">إذا استطعت التدوير لكن التغيير يختفي بعد الإغلاق، فأنت بالتأكيد تقريبا استخدمت تدويرا على مستوى العارض. استخدم أداة تعيد كتابة اتجاه الصفحة في الملف نفسه.</blockquote>

  تحول السلوك قليلا في إصدارات Adobe Reader DC 2019 وما بعدها: زر التدوير الآن مدفون تحت Tools &gt; Organize Pages، حيث يبدو أنه يجب أن يلتزم بالتغيير لكنه لا يزال لا يفعل ما لم تدفع. تخبرك النسخة المجانية صراحة في رسالة تذييل صغيرة بأن "حفظ تدويرات الصفحات يتطلب Acrobat Pro"، التي لا يقرأها كثير من المستخدمين أبدا.

  أسرع إصلاح هو مدوّر متصفحي يعيد ترميز الملف مباشرة. يمكنك <a href="/ar/pdf-edit/rotate/">تدوير PDF عبر الإنترنت</a> في نحو عشر ثوان دون تثبيت أي شيء.

  <h2>خطوة بخطوة: تدوير كل صفحة 90 درجة</h2>

  هذا هو النهج الصحيح عندما يخرج مسح كامل جانبيا، أو عندما يصدر شخص ما تقريرا أفقيا كعمودي بالخطأ.

  <figure><img src="/static/blog/images/tool-rotate.jpg" alt="تدوير كل صفحة 90 درجة في اتجاه عقارب الساعة في إجراء دفعي واحد" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>افتح أداة التدوير وأسقط PDF فيها. تبقى الملفات على جلسة الرفع فقط طالما هو مطلوب للمعالجة.</li>
    <li>اختر اتجاها. 90 درجة في اتجاه عقارب الساعة يصلح معظم المسوحات الجانبية. 180 درجة يتعامل مع المستندات المقلوبة من المغذيات التلقائية التي أمسكت الصفحة بالطريق الخطأ.</li>
    <li>طبّق على كل الصفحات. تعيد الأداة كتابة علم الاتجاه لكل صفحة في تمريرة واحدة.</li>
    <li>نزّل الملف الجديد. افتحه في أي عارض للتأكيد.</li>
  </ol>

  احفظ النتيجة باسم ملف واضح مثل <code>contract_rotated.pdf</code> حتى لا تكتب فوق الأصل بالخطأ. الاحتفاظ بالأصل تأمين رخيص إذا ذهب التدوير في الاتجاه الخاطئ - والتدويرات في الاتجاه الخاطئ هي تقرير "أضعت عشر دقائق" الأكثر شيوعا من أي شخص يستخدم أداة تدوير لأول مرة. دورتان في اتجاه عقارب الساعة تساوي دورة واحدة عكس عقارب الساعة، لذا الاسترداد سريع، لكن فقط إذا كان لديك لا يزال المصدر.

  <h2>خطوة بخطوة: تدوير صفحات محددة فقط</h2>

  ملفات PDF متعددة الاتجاهات شائعة عندما تحتوي دفعة مسح على رسائل عمودية وجدول بيانات أفقي، أو عندما يدمج شخص ما ملفات من مصادر مختلفة.

  <ol>
    <li>ارفع PDF. انظر إلى شبكة الصور المصغرة لتحديد الصفحات الخاطئة.</li>
    <li>حدد الصفحات بالرقم. تتيح معظم الأدوات تدوير الصفحة 3 و7 و9 بشكل مستقل بدلا من الملف بأكمله.</li>
    <li>اضبط اتجاه التدوير لكل صفحة إذا لزم الأمر. إيصال ممسوح مقلوب على الصفحة 5 قد يحتاج إلى 180 درجة بينما تحتاج الصفحة 7 إلى 90 في اتجاه عقارب الساعة.</li>
    <li>طبّق ونزّل. تحقق من أن الصور المصغرة تظهر الاتجاه المصحح قبل شحن الملف.</li>
  </ol>

  إذا وجدت نفسك تحارب تدويرات صفحة بصفحة كثيرا، فغالبا ما يكون أسهل <a href="/ar/pdf-organize/merge/">تنظيم صفحات PDF</a> في عرض مدمج واحد حيث يمكنك التدوير والحذف وإعادة الترتيب قبل التصدير.

  اختصار لوحة مفاتيح يستحق المعرفة في أداتنا (ومعظم الأدوات المتصفحية): بمجرد أن يحصل صورة مصغرة على التركيز، تدور مفاتيح الأقواس غالبا. القوس الأيمن في اتجاه عقارب الساعة، القوس الأيسر عكس عقارب الساعة. ليس عالميا عبر الأدوات، لكنه شائع بما يكفي يستحق التجربة قبل الوصول إلى الفأرة.

  <h2>سيناريوهات شائعة</h2>

  <h3>إيصالات ممسوحة جانبيا</h3>

  تلتقط الماسحات المسطحة وتطبيقات كاميرا الهاتف غالبا الإيصالات الصغيرة في الاتجاه الخاطئ. يصلحها تدوير 90 درجة في اتجاه عقارب الساعة عادة. إذا مسحت كومة باتجاهات مختلطة، افعلها كلها دفعة واحدة وأدر لكل صفحة بدلا من إعادة المسح. إيصالات الورق الحراري (النوع الذي يبهت) عرضة بشكل خاص للخروج 180 درجة بعيدا لأنها غالبا ما تُكدس مع وجه الطباعة لأسفل للحماية.

  <h3>صور الهاتف المحولة إلى PDF</h3>

  iOS و Android يشفران أحيانا اتجاه الصورة في بيانات EXIF الوصفية التي يتجاهلها محول PDF. النتيجة هي صورة عمودية محفوظة كصفحة PDF أفقية. التدوير على مستوى الملف هو الإصلاح الأنظف. يستحق المعرفة: ساء هذا بشكل ملحوظ حول iOS 14، عندما غيرت Apple التنسيق الافتراضي للصور من JPEG إلى HEIC. أدوات PDF الأقدم التي تجرد علامات اتجاه HEIC أثناء التحويل تنتج صفحات جانبية في كل مرة. ضبط الكاميرا مرة أخرى على "الأكثر توافقا" قبل التصوير يحل المشكلة من المصدر.

  <h3>تقارير أفقية وعمودية مختلطة</h3>

  التقارير السنوية وعروض البيع غالبا تجمع صفحات نص عمودية مع رسوم بيانية أفقية. إذا أجبر محول كل شيء على أن يكون عموديا، قد تحتاج إلى تدوير صفحات الرسم البياني 90 درجة بحيث تُقرأ بشكل صحيح عند التمرير أو الطباعة أفقيا. عروض المستثمرين المبنية في PowerPoint والمصدرة إلى PDF جناة شائعون؛ يعامل مسار "Print to PDF" في PowerPoint الملف بأكمله كاتجاه واحد بدلا من شريحة بشريحة.

  <h3>نماذج مستلمة كفاكسات</h3>

  لا تزال كثير من النماذج الطبية والقانونية تصل بالفاكس، مما يعني أنها تمر عبر طابعة قد تكون قد دارت الصفحة لتلائم الورق. كتلة التوقيع تنتهي في الأعلى دليل - دوّر 180، احفظ، أرسل عبر نفس خط الفاكس إذا كان يجب.

  <h2>التحقق من أن التدوير ثبت</h2>

  قبل إرسال الملف، قم بفحص عقلاني من 30 ثانية:

  <ul>
    <li>أعد فتح PDF المدور في عارض لم تستخدمه للتدوير. Chrome وPreview على macOS وEdge كلها تقرأ الملف بشكل مختلف عن Acrobat.</li>
    <li>أرسل الملف بالبريد لنفسك وافتح المرفق من هاتف. تحترم العارضات المحمولة علم الاتجاه على مستوى الملف وستعرض فورا ما إذا كان التغيير حقيقيا.</li>
    <li>شغّل معاينة الطباعة. تعكس المعاينة اتجاه الملف، لا تجاوز العارض، لذا معاينة جانبية تعني أن التدوير لم يحفظ.</li>
    <li>افحص لوحة الصور المصغرة في مدير ملفاتك. كلا Windows Explorer و macOS Finder يعرضان الاتجاه على مستوى الملف في جزء المعاينة. إذا تطابقت الصورة المصغرة هناك مع ما توقعت، فقد التزم التدوير.</li>
  </ul>

  إذا بدا الملف صحيحا في عارض واحد لكن خطأ في آخر، فقد كان التدوير على مستوى العارض. أعد تشغيل الملف عبر أداة تلتزم بالقرص.

  <h2>نصائح التدوير الدفعي</h2>

  عندما تكون على وشك دمج عدة ملفات PDF، أصلح الاتجاهات <strong>قبل</strong> الدمج. وإلا، سيكون عليك تحديد الصفحات المدورة داخل حزمة من 200 صفحة، وهو أبطأ بكثير من إصلاح كل ملف مصدر بشكل فردي.

  تنطبق نصيحة عكسية على المسوحات مباشرة من مغذي مزدوج الوجه. إذا خرجت كل صفحة أخرى مقلوبة لأن الماسح قلب الوجه الخلفي خطأ، أدر أولا، ثم <a href="/ar/pdf-organize/merge/">ادمجها في ملف واحد</a>. ستوفر خطوة مقارنة بالدمج ثم محاولة تدوير الصفحات البديلة داخل PDF المدمج.

  شيء آخر: التدوير لا يغير بيانات الصورة الأساسية، فقط إدخال الاتجاه. لذا لا تفقد الجودة، ويبقى حجم الملف كما هو فعليا (ضع أو خصم بضعة بايتات للبيانات الوصفية المعاد كتابتها). ذلك يجعل التدوير آمنا للتشغيل على المستندات القانونية وملفات الأدلة حيث تكون سلامة التيار البتي الأساسي مهمة - سيتغير تجزئة البيانات لأن البيانات الوصفية تغيرت، لكن محتوى الصفحة متطابق بايتا ببايت.

  مشكلة ببرنامج تشغيل الطباعة تستحق الذكر: تتجاهل بعض الطابعات المؤسسية علم اتجاه PDF وتستخدم منطق التدوير التلقائي الخاص بها بناء على أطول تشغيل نص. إذا طبع PDF المدور جانبيا من Konica أو Xerox المكتبية، فالطابعة تتجاوزك. تحقق من حوار الطباعة عن خيار "Auto-rotate" أو "Orientation: From file" وبدّله إلى يدوي.

  <h2>الأسئلة الشائعة</h2>

  <h3>لماذا يبدو PDF صحيحا في Chrome لكن جانبيا في Adobe؟</h3>
  <p>يصحح Chrome أحيانا الاتجاه تلقائيا بناء على استدلالات اتجاه النص، بينما يحترم Adobe علم اتجاه الصفحة الحرفي في الملف. إذا اختلف العارضان، فإن العلم على مستوى الملف خاطئ رغم أن Chrome يخفي المشكلة. دوّر الملف بشكل صحيح حتى يتفق العارضان.</p>

  <h3>هل يمكنني تدوير صفحة واحدة فقط في PDF متعدد الصفحات؟</h3>
  <p>نعم. استخدم أداة تتيح لك اختيار الصفحات بشكل فردي، أو افتح الملف في عرض منظم الصفحات. اختر الصفحات التي تريد تدويرها، اختر اتجاها لكل صفحة، وصدّر. تبقى الصفحات التي لم تختر دون مساس.</p>

  <h3>هل سيقلل التدوير من جودة PDF؟</h3>
  <p>لا. التدوير يغير فقط إدخال الاتجاه في البيانات الوصفية للملف. بيانات الصورة والنص لا يُعاد ترميزها، لذا لا يوجد فقدان جودة وحجم الملف فعليا دون تغيير.</p>

  <h3>لماذا لا يحفظ تدويري في النسخة المجانية من Adobe Reader؟</h3>
  <p>تدعم النسخة المجانية من Adobe Reader فقط التدوير على مستوى العارض. حفظ الملف لا يلتزم بالتدوير على القرص. التدوير الدائم ميزة Acrobat مدفوعة، أو يمكنك استخدام أداة متصفحية مجانية تعيد كتابة علم الاتجاه مباشرة.</p>

  <h3>هل يمكنني تدوير PDF محمي بكلمة مرور؟</h3>
  <p>تحتاج إلى تقديم كلمة المرور أولا. تطلب معظم المدوّرات عبر الإنترنت ذلك عند رفع ملف مشفر. إذا لم يكن لديك كلمة المرور، لا يمكنك تعديل الملف بشكل شرعي. إذا كنت تملك المستند ونسيت كلمة المرور، فهذه مشكلة استرداد مختلفة (ومؤسفة).</p>

  <h2>جرّبه الآن</h2>

  <p>توقف عن محاربة العارض. افتح <a href="/ar/pdf-edit/rotate/">أداة تدوير PDF</a> والتزم بالاتجاه في الملف في تمريرة واحدة، أو تصفح <a href="/ar/all-tools/">جميع أدوات PDF</a> إذا احتجت أيضا إلى الدمج أو إعادة الترتيب أثناء العمل.</p>
