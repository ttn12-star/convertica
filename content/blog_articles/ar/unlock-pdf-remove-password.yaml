excerpt_ar: "بعض ملفات PDF تطلب كلمة مرور في كل مرة تفتحها. وبعضها يُفتح بلا مشكلة لكنه يرفض السماح لك بالنسخ أو الطباعة. إنهما قفلان مختلفان، ومعرفة أيهما لديك نصف المهمة. إليك كيف تزيل كلمة المرور من ملف تملكه."
content_ar: |
  تذهب لفتح ملف PDF فيطالبك بكلمة مرور قبل أن يعرض لك سطرا واحدا. أو يُفتح فورا، ويبدو عاديا، ثم يرفض بهدوء حين تحاول نسخ فقرة أو الضغط على زر الطباعة. كلاهما ملف محمي، لكنهما مقفلان بطريقتين مختلفتين تماما، والحل يتوقف على القفل الذي تتعامل معه. يشرح هذا الدليل الفرق بكلمات واضحة، ويبيّن كيف تزيل كلمة المرور من ملف تملك حق فتحه.

  <h2>ماذا يعني «القفل» فعلا بالنسبة لملف PDF</h2>

  <p>يمكن أن يحمل ملف PDF كلمتي مرور منفصلتين، وكثير من الالتباس ينشأ من معاملتهما كشيء واحد.</p>

  <ul>
    <li><strong>كلمة مرور الفتح</strong> (وتسمى أيضا كلمة مرور المستخدم). بدونها لن يُفتح الملف أصلا. المحتوى مشفَّر، فليس لدى القارئ ما يعرضه حتى تُكتب كلمة المرور الصحيحة. هذه هي الكلمة التي تظهر لحظة نقرك المزدوج على الملف.</li>
    <li><strong>كلمة مرور المالك</strong> (وتسمى أيضا كلمة مرور الصلاحيات). يُفتح الملف بلا أي مطالبة، لكن المؤلف عطّل أفعالا معينة: نسخ النص، أو الطباعة، أو التحرير، أو تعبئة النماذج، أو استخراج الصفحات. تستطيع قراءته، ومع ذلك تجد الأزرار التي تريدها معطّلة.</li>
  </ul>

  <p>قد يحمل ملف PDF واحد إحداهما، أو الأخرى، أو كلتيهما. ومعرفة أيهما لديك تخبرك فورا بحجم العمل المنتظر. إزالة كلمة مرور المالك من ملف تستطيع فتحه أصلا أمر سريع. أما تجاوز كلمة مرور فتح لا تعرفها فمسألة أخرى، وغالبا ما تكون مستحيلة عن قصد، وهذا بالضبط هدف التشفير.</p>

  <h2>الحالة 1: تعرف كلمة المرور وتريد أن يتوقف الملف عن طلبها</h2>

  <p>هذه هي الحالة الشائعة. أرسل لك زميل كلمة المرور، أو ضبطتها بنفسك، وسئمت الآن من كتابتها كلما فُتح الملف. تريد نسخة نظيفة بلا أي كلمة مرور على الإطلاق.</p>

  <figure><img src="/static/blog/images/tool-unlock.jpg" alt="أداة فتح قفل PDF من Convertica وملف جاهز لإزالة كلمة مروره" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>افتح أداة <a href="/ar/pdf-security/unlock/">فتح قفل PDF</a> وارفع الملف.</li>
    <li>إذا كان لملف PDF كلمة مرور فتح، فاكتبها عند الطلب. تحتاجها الأداة لفك تشفير المحتوى، تماما كما يفعل قارئك.</li>
    <li>نزّل النتيجة. إنه المستند نفسه وقد أُزيلت منه كلمة المرور، فيُفتح مباشرة ويتيح لك النسخ والطباعة والتحرير بشكل طبيعي.</li>
  </ol>

  <p>تستغرق العملية كلها بضع ثوانٍ، ويُحذف الملف المرفوع من الخادم بعد ذلك بوقت قصير، فلا تترك مستندا حساسا ملقى في مكان ما.</p>

  <h2>الحالة 2: يُفتح الملف لكنه يمنع النسخ أو الطباعة أو التحرير</h2>

  <p>هنا لا يحمل ملف PDF سوى كلمة مرور المالك. تستطيع قراءته، أي أنك تملك وصولا مشروعا بالفعل، لكن المؤلف عطّل بعض الأفعال. إذا كان مستندك أنت، أو ملفا مسموحا لك بالعمل عليه، فإزالة تلك القيود أمر مباشر: مرّره عبر أداة <a href="/ar/pdf-security/unlock/">فتح قفل PDF</a> نفسها ونزّل نسخة باستعادة الصلاحيات. لا مطالبة بكلمة مرور هنا، لأنك لم تُمنع من فتحه في المقام الأول.</p>

  <p>ملاحظة صادقة عن هذا النوع: قيود كلمة مرور المالك لم تكن يوما حماية قوية. كثير من قارئات PDF تتجاهلها، والصيغة نفسها تعاملها كطلب لا كجدار. لذا إن كان هدفك حماية مستند فعلا، فالقيود هي الأداة الخطأ. المزيد عن الطريقة الصحيحة أدناه.</p>

  <h2>الحالة 3: تملك الملف لكنك نسيت كلمة مرور الفتح</h2>

  <p>هذه هي الحالة الصعبة، ومن المفيد أن نكون واقعيين. إذا كان لملف PDF كلمة مرور فتح حقيقية بتشفير حديث، فلا يمكن قراءة المحتوى دون تلك الكلمة. لا يوجد زر فتح سري، وأي موقع يعدك بكسر تشفير قوي في ثوانٍ إما يكذب أو يجرّب كل كلمة مرور شائعة في الخلفية، وهذا لا ينجح إلا مع الكلمات الضعيفة.</p>

  <p>لذا قبل أي شيء آخر، أعد تتبع خطواتك:</p>

  <ul>
    <li>افحص البريد أو الرسالة التي وصلك معها الملف. عادة ما تُشارَك كلمات مرور الفتح بجوار المستند مباشرة.</li>
    <li>ابحث في مدير كلمات المرور لديك. إذا كنت من ضبط كلمة المرور، فقد تكون محفوظة هناك.</li>
    <li>اسأل من أنشأ الملف أو أرسله. في مستندات العمل، يستطيع المؤلف أو فريق تقنية المعلومات عادة إصدار نسخة مفتوحة من جديد.</li>
    <li>إذا كنت قد صدّرت ملف PDF بنفسك من برنامج آخر، فأعد توليده من الملف المصدر بدلا من مصارعة النسخة المقفلة.</li>
  </ul>

  <p>إذا ضاعت كلمة المرور فعلا وكان التشفير حقيقيا، فالخطوة العاقلة هي الحصول على نسخة جديدة من المصدر بدلا من مهاجمة الملف. هذا ليس قيدا في أداة بعينها، بل هكذا يُفترض أن يعمل التشفير.</p>

  <h2>هل فتح قفل PDF قانوني؟</h2>

  <p>إزالة كلمة المرور أمر سليم حين يكون المستند ملكك أو تملك تفويضا بفتحه: مسوحاتك الخاصة، وملفات أرسلها لك عميل لتعمل عليها، وتقارير يملكها فريقك. وليس سليما تجاوز الحماية على ملف سري يخص غيرك، أو كتاب إلكتروني مدفوع، أو أي شيء لم يكن مقصودا وصولك إليه. تفترض الأداة أنك تملك حق الملف، وصون هذا الافتراض مسؤوليتك أنت.</p>

  <h2>بعد فتح القفل: حافظ على الأمان بالطريقة الصحيحة</h2>

  <p>إذا أزلت كلمة المرور لتسهيل العمل اليومي فقط بينما الملف لا يزال حساسا، فلا تتركه مكشوفا. أعد حمايته كما ينبغي بكلمة مرور فتح قوية عبر أداة <a href="/ar/pdf-security/protect/">حماية PDF</a>، وشارك تلك الكلمة عبر قناة منفصلة عن الملف نفسه. هذا يمنحك تشفيرا حقيقيا بدلا من القيود الضعيفة سهلة التجاهل التي توفرها كلمة مرور المالك. وإذا كنت ترسل ملفات PDF سرية عبر البريد بانتظام، فدليلنا عن <a href="/ar/blog/password-protect-pdf-before-emailing/">حماية PDF بكلمة مرور قبل إرساله بالبريد</a> يشرح كيف تفعل ذلك بأمان.</p>

  <h2>الأسئلة الشائعة</h2>

  <h3>ما الفرق بين فتح قفل PDF وفك تشفيره؟</h3>
  <p>يصفان النتيجة نفسها من زاويتين. فك التشفير يعني إعادة المحتوى المشفَّر إلى بيانات مقروءة باستخدام كلمة المرور الصحيحة. أما فتح القفل فهو الكلمة اليومية للنتيجة: ملف يُفتح بحرية ويتيح لك النسخ والطباعة والتحرير. إزالة كلمة مرور الفتح تتطلب تلك الكلمة؛ أما إزالة قيود المالك وحدها فلا.</p>

  <h3>هل أستطيع إزالة كلمة مرور PDF دون معرفتها؟</h3>
  <p>قيود كلمة مرور المالك فقط، وذلك لأنها لم تكن تشفيرا حقيقيا أصلا. أما كلمة مرور فتح حقيقية محمية بتشفير حديث فلا يمكن إزالتها بدون الكلمة. إذا كنت تملك الملف، فاحصل على نسخة نظيفة من المصدر بدلا من ذلك.</p>

  <h3>هل يغيّر فتح القفل المستند نفسه؟</h3>
  <p>لا. يبقى النص والصور والتخطيط والصفحات كما كانت تماما. الشيء الوحيد الذي يتغير هو زوال كلمة المرور والقيود، فيتصرف الملف كملف PDF عادي.</p>

  <h3>هل يمكنني فتح قفل عدة ملفات PDF دفعة واحدة؟</h3>
  <p>يستطيع مستخدمو بريميوم معالجة دفعة كاملة بدلا من رفع الملفات واحدا تلو الآخر، وهذا يفيد حين يحمل مجلد كامل من التقارير القيد نفسه. أما لملف واحد، فالأداة القياسية كل ما تحتاجه.</p>

  <h3>هل من الآمن فتح قفل ملف PDF سري أونلاين؟</h3>
  <p>تُعالَج الملفات المرفوعة ثم تُحذف من الخادم بعد فترة قصيرة، فلا تُخزَّن ولا تُشارَك. أما المستند الذي يجب ألا يغادر جهازك أبدا، فأأمن خيار دائما هو الحصول على نسخة غير محمية ممن أنشأه. وللملفات اليومية التي تملكها، يكون فتح القفل أونلاين سريعا ونظيفا.</p>

  <h2>جرّبه الآن</h2>

  <p>إذا كان على مكتبك ملف PDF يظل يطلب كلمة مرور تعرفها بالفعل، أو يُفتح لكنه لا يدعك تنسخ سطرا، فأسقطه في أداة <a href="/ar/pdf-security/unlock/">فتح قفل PDF</a> ونزّل نسخة نظيفة. وإذا كان الملف لا يزال بحاجة إلى حماية، فأعد إليه كلمة مرور سليمة عبر <a href="/ar/pdf-security/protect/">حماية PDF</a> ليبقى آمنا دون أن يعترض طريقك.</p>
