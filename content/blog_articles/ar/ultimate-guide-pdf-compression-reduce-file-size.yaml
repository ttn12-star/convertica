slug: ultimate-guide-pdf-compression-reduce-file-size
title_ar: "الدليل الكامل لضغط PDF: كيف تقلل حجم الملف دون فقدان الجودة"
meta_title_ar: "دليل ضغط PDF: قلل حجم الملف | Convertica"
meta_description_ar: "كيف يعمل ضغط PDF فعليا، وإلى أي حد يمكن تصغير الملف واقعيا، وأي إعداد مسبق تختار للبريد أو الطباعة أو الأرشفة دون الإضرار بالجودة."
meta_keywords_ar: "ضغط pdf، تقليل حجم pdf، ضغط ملف pdf، تحسين pdf، تقليص حجم pdf، خفض دقة صور pdf، ضغط pdf ممسوح ضوئيا"
excerpt_ar: "تقرير بحجم 40 MB ومسح ضوئي بحجم 40 MB يُضغطان بطريقتين مختلفتين تماما. إليك ما يلتهم البايتات فعلا، وكيف يعمل خفض الدقة، وأي إعداد مسبق يناسب كل مهمة."
content_ar: |
  ملفان PDF يُظهران كلاهما "40 MB" في مدير الملفات قد يكونان مشكلتين مختلفتين تماما. الأول تقرير نصي مُصدّر من Word سينزل إلى 3 MB في تمريرة واحدة. والآخر كومة من المسوحات الضوئية الملونة بدقة 600 DPI تكافح للنزول إلى 28 MB وتبدو أسوأ في النهاية. "ضغط PDF" زر واحد، لكن ما يحدث خلفه يعتمد كليا على ما بداخل الملف.

  يشرح هذا الدليل كيف يعمل ضغط PDF فعليا، وما الذي يتقلص واقعيا وما لا يتقلص، وكيف تختار الإعداد الصحيح للمهمة بدلا من التخمين. سنستخدم <a href="/ar/pdf-organize/compress/">أداة ضغط PDF المجانية من Convertica</a> في الأمثلة، لكن المنطق ينطبق على أي أداة تعمل بنزاهة.

  <figure><img src="/static/blog/images/tool-compress-hero.jpg" alt="أداة ضغط PDF من Convertica مع ملف مرفوع ومحدد الإعداد المسبق للضغط" width="1280" height="800" loading="lazy"></figure>

  <h2>أين تكمن البايتات فعليا</h2>

  قبل أن تصغّر ملف PDF، من المفيد معرفة ما الذي يشغل المساحة. PDF حاوية، والوزن نادرا ما يتوزع بالتساوي:

  <ul>
    <li><strong>تهيمن الصور على كل ملف كبير تقريبا.</strong> صورة ملونة واحدة بحجم صفحة كاملة بدقة 300 DPI تزن وحدها نحو 2-4 MB. المستند الممسوح ضوئيا هو <em>صور فقط</em>، واحدة لكل صفحة، ولهذا تنتفخ المسوحات بهذه السرعة.</li>
    <li><strong>النص ضئيل جدا.</strong> الحروف والتخطيط الفعلي لتقرير من 50 صفحة يبلغان مجتمعين بضع مئات من الكيلوبايت. النص الحقيقي أرخص شيء في PDF.</li>
    <li><strong>الخطوط المضمّنة تتراكم.</strong> حفنة من خطوط الـ subset لا بأس بها؛ أما عائلة خطوط كاملة بكل محارفها فتضيف بهدوء ميغابايت أو اثنين.</li>
    <li><strong>عبء غير مرئي.</strong> سجل المراجعات الناتج عن تكرار "حفظ" في Acrobat، والكائنات غير المستخدمة، وملفات تعريف الألوان المتضخمة، والملفات المضمّنة (نعم، يمكن أن يحمل PDF جدول بيانات بداخله) — كل ذلك يسافر مع الملف دون أن تراه.</li>
  </ul>

  أنفع عادة قبل الضغط: افتح الملف وحاول تحديد نص في الصفحة الأولى. إذا أُبرزت الكلمات حرفا حرفا، فلديك PDF رقمي الأصل، ووزنه على الأرجح في الخطوط أو الصور المضمّنة أو العبء. وإذا أُبرزت الصفحة كاملة كمستطيل واحد، فلديك مسح ضوئي، ووزنه صور، انتهى. هذا الاختبار الواحد يتنبأ بكل شيء تقريبا عن مقدار ما ستوفره.

  <h2>كيف يعمل ضغط PDF فعليا</h2>

  هناك آليتان مختلفتان جذريا في العمل، والأدوات الجيدة تستخدم كلتيهما. فهم هذا التقسيم هو ما يفصل بين "لماذا لم يحدث شيء؟" و"لماذا أصبح مسحي الضوئي مشوشا الآن؟".

  <h3>التحسين بلا فقدان (جودة مجانية)</h3>

  بعض التوفير لا يكلفك شيئا. يمكن لأداة الضغط إعادة كتابة بنية الملف دون مساس بأي بكسل مرئي واحد:

  <ul>
    <li>ضغط Deflate (بأسلوب zip) للنص وتدفقات المحتوى، يحزم البيانات المتكررة بإحكام.</li>
    <li>إزالة الكائنات غير المستخدمة والصفحات اليتيمة وسجل المراجعات القديم.</li>
    <li>تجزئة الخطوط (subsetting): لا تُضمّن إلا المحارف التي تستخدمها فعلا.</li>
    <li>إزالة تكرار الصور المتطابقة الظاهرة على صفحات متعددة (شعار في التذييل مثلا).</li>
  </ul>

  في ملف PDF نصي رقمي الأصل، يقوم التحسين بلا فقدان وحده غالبا بمعظم العمل. لا شيء يتدهور؛ الملف فقط مُحزّم بذكاء أكبر.

  <h3>الضغط مع الفقدان: خفض دقة الصور (حيث تذهب الجودة)</h3>

  التخفيضات الكبيرة تأتي من الصور، وهي بطبيعتها مع فقدان. يحدث أمران:

  <ul>
    <li><strong>خفض الدقة</strong> يُنزل الاستبانة. مسح ضوئي بدقة 600 DPI مخفّض إلى 150 DPI يحتفظ بربع البكسلات في كل اتجاه، أي نحو جزء من ستة عشر من البيانات. من هنا تأتي الانخفاضات الكبيرة في الحجم.</li>
    <li><strong>إعادة الترميز</strong> تعيد ضغط كل صورة بصيغة JPEG عند مستوى جودة مختار، متخلصة من تفاصيل دقيقة لا تكاد العين تسجلها.</li>
  </ul>

  لهذا تتصرف ملفات PDF المكثفة نصيا والمكثفة صوريا بهذا الاختلاف. لا توجد دقة للتخلص منها في النص المتجهي، لذا فإن PDF النصي النحيل أصلا لن يتقلص كثيرا. أما المسح الضوئي فهو كله دقة "قابلة للرمي"، ولهذا يُضغط كثيرا وهو نفسه الذي قد ينتهي مشوشا.

  <blockquote class="callout">الفكرة الأساسية: التحسين بلا فقدان آمن دائما ومتواضع عادة. الأرقام الكبيرة تأتي من خفض دقة الصور، وهي الخطوة الوحيدة التي قد تكلفك الجودة بشكل ملحوظ.</blockquote>

  <h2>الإعدادات المسبقة للضغط بكلمات بسيطة</h2>

  معظم الأدوات، ومنها Convertica، تخفي الحسابات خلف بضعة إعدادات مسبقة. إليك ما تفعله فعليا في الخفاء.

  <figure><img src="/static/blog/images/tool-compress-options.jpg" alt="محدد الإعداد المسبق للضغط يعرض خيارات منخفض ومتوسط ومرتفع في أداة Convertica" width="1280" height="800" loading="lazy"></figure>

  <ul>
    <li><strong>منخفض.</strong> تحسين بلا فقدان مع إعادة ترميز خفيفة للصور، بخفض دقة طفيف أو بلا خفض. أفضل جودة، أقل توفير. استخدمه حين تكون الحدّة غير قابلة للتفاوض.</li>
    <li><strong>متوسط (الإعداد الافتراضي المعقول).</strong> يخفض دقة الصور إلى نحو 150 DPI ويعيد الترميز بجودة JPEG متوازنة. غير مرئي على الشاشة، ويُطبع بنظافة على A4، ويتعامل مع معظم الملفات الواقعية.</li>
    <li><strong>مرتفع.</strong> خفض دقة أقوى (نحو 96-120 DPI) وضغط أكثر عدوانية للصور. ممتاز لتمرير شيء تحت حد عنيد عندما يقرأ المستلم على الشاشة فقط ولا يطبع أبدا.</li>
  </ul>

  المتوسط هو نقطة البداية الصحيحة في نحو تسع حالات من عشر. لا تلجأ إلى المنخفض إلا حين يجب أن تبقى المخططات أو الصور حادة، ولا تلجأ إلى المرتفع إلا حين تصارع حد حجم صارما ويكون الهدف الوحيد هو القراءة على الشاشة.

  <h2>أي إعداد لأي مهمة</h2>

  طابق الإعداد المسبق مع الغرض الفعلي من المستند، لا مع مدى صغره الذي يمكنك تحقيقه تقنيا.

  <table>
    <thead>
      <tr><th>هدف الجودة / حالة الاستخدام</th><th>الإعداد المسبق الموصى به</th><th>لماذا</th></tr>
    </thead>
    <tbody>
      <tr><td>القراءة على الشاشة، إرسال مسودة</td><td>متوسط أو مرتفع</td><td>دقة الشاشة متسامحة؛ خفض الدقة غير مرئي.</td></tr>
      <tr><td>الإرسال بالبريد تحت حد 20-25 MB</td><td>المتوسط أولا ثم المرتفع</td><td>المتوسط يحسم معظم الملفات؛ ارفعه فقط إن لم يكفِ.</td></tr>
      <tr><td>الطباعة المكتبية على A4 / Letter</td><td>متوسط</td><td>150 DPI يُطبع بنظافة على طابعة ليزر عادية.</td></tr>
      <tr><td>الصور والمخططات ونسخ التدقيق التصميمية</td><td>منخفض</td><td>يحفظ التفاصيل الدقيقة والتدرجات التي يفسدها JPEG العدواني.</td></tr>
      <tr><td>الطباعة الاحترافية / كبيرة الحجم</td><td>منخفض أو الملف الأصلي</td><td>المطابع تحتاج 300 DPI؛ خفض الدقة يظهر عند الحجم الكبير.</td></tr>
      <tr><td>المرفقات القانونية والعقود الموقّعة</td><td>لا تضغط</td><td>سلامة الملف أهم من الحجم؛ إعادة الترميز قابلة للطعن.</td></tr>
      <tr><td>الأرشفة طويلة الأمد (PDF/A)</td><td>منخفض أو بلا ضغط</td><td>الأرشيف يهدف لحفظ الدقة لا توفير المساحة.</td></tr>
    </tbody>
  </table>

  <h2>إلى أي حد يمكن التصغير واقعيا؟</h2>

  هنا تنهار معظم الوعود من نوع "أصغر بنسبة 99%!". لا يستطيع الضغط رمي إلا ما هو زائد، لذا يعتمد المدى الواقعي كليا على المحتوى. أرقام صادقة:

  <table>
    <thead>
      <tr><th>نوع المستند</th><th>التخفيض النموذجي</th><th>مثال</th></tr>
    </thead>
    <tbody>
      <tr><td>PDF نصي فقط (مُصدّر من Word أو الويب)</td><td>70-95%</td><td>40 MB → 2-12 MB</td></tr>
      <tr><td>مختلط: نص + صور</td><td>40-70%</td><td>30 MB → 9-18 MB</td></tr>
      <tr><td>مسح خالص (كل صفحة صورة)</td><td>30-60%</td><td>50 MB → 20-35 MB</td></tr>
      <tr><td>PDF مضغوط مسبقا</td><td>0-15%</td><td>أنت عند القاع؛ الأفضل أن تقسمه</td></tr>
    </tbody>
  </table>

  يتبع من هذا الجدول أمران. أولا، إذا لم يتقلص الملف إلا قليلا، فهو ليس معطوبا؛ بل على الأرجح كان محسّنا بالفعل، ولم يبقَ شيء لإزالته. ثانيا، للمسح الخالص قاع: لا إعداد يُنزل مسحا بحجم 50 MB تحت 10 MB دون ضرر مرئي، لأن البيانات <em>هي</em> الصورة. حين تصطدم بهذا الجدار، توقف عن الضغط وغيّر التكتيك.

  <h2>متى لا يكون الضغط هو الحل</h2>

  الضغط أداة واحدة لا الوحيدة. حالتان شائعتان تتطلبان خطوة مختلفة:

  <ul>
    <li><strong>يجب أن يبقى الملف بجودة كاملة لكنه يتجاوز الحد.</strong> لا تُضعفه؛ <a href="/ar/pdf-organize/split/">قسّم PDF إلى أجزاء أصغر</a> حسب نطاق الصفحات وأرسلها أو ارفعها منفصلة. هكذا يبقى كل بكسل سليما، وهو ما يهم في نسخ التدقيق التصميمية والمرفقات وكل ما سيدققه جهة تنظيمية. انظر مثالا مشروحا في دليلنا عن <a href="/ar/blog/split-bank-statement-pdf-by-page/">تقسيم PDF كشف الحساب البنكي حسب الصفحات</a>.</li>
    <li><strong>تدمج ملفات PDF صغيرة كثيرة والمشكلة في المجموع.</strong> أحيانا يكون الترتيب الصحيح هو <a href="/ar/pdf-organize/merge/">دمج الملفات في PDF واحد</a> أولا، ثم ضغط المستند المدمج مرة واحدة، كي تُزال تكرارات الموارد المشتركة مثل الخطوط عبر المجموعة كلها. نعرض هذا النمط في مقال <a href="/ar/blog/merge-invoices-into-one-pdf-for-accounting/">دمج الفواتير في PDF واحد للمحاسبة</a>.</li>
  </ul>

  وإذا كان سبب الضغط كله رسالة بريد مرتدّة، فالدليل المخصص (الحدود الفعلية للمزودين، وزيادة base64، ومتى ترسل رابطا سحابيا) موجود في مقال <a href="/ar/blog/compress-pdf-for-email-under-25mb/">كيفية ضغط PDF للبريد أقل من 25 MB</a>.

  <h2>سير عمل قابل للتكرار</h2>

  بجمع كل ذلك، يبدو المسار السريع هكذا:

  <ol>
    <li>أجرِ اختبار تحديد النص لتعرف إن كنت أمام ملف رقمي أو مسح ضوئي.</li>
    <li>جرّب المتوسط أولا. لمعظم الملفات تنتهي هنا.</li>
    <li>إذا بقي كبيرا جدا وكان مسحا، فاقبل أنك قرب القاع: قسّمه، أو أعد تشغيل OCR وأعد التصدير إلى PDF نصي، بدلا من دفع الجودة إلى الأرض.</li>
    <li>إذا بقي كبيرا جدا وكان رقمي الأصل، فافحص الملفات المضمّنة وعبء سجل المراجعات قبل افتراض أن الإعداد المسبق أخفق.</li>
    <li>احتفظ دائما بالملف الأصلي. الضغط طريق باتجاه واحد للتفاصيل المرمية، وقد تحتاج النسخة كاملة الجودة لاحقا.</li>
  </ol>

  <h2>الأسئلة الشائعة</h2>

  <h3>لماذا لم يصغر ملف PDF الخاص بي إلا قليلا؟</h3>
  <p>الأرجح أنه كان محسّنا بالفعل، أو أنه PDF نصي رقمي الأصل بقليل من بيانات الصور لخفض دقتها. الضغط يزيل الزيادة؛ وإن لم يبقَ منها شيء، فلا شيء للتوفير. افحص أيضا لوحة المرفقات، تحسبا لوجود ملف مضمّن ينفخ الحجم.</p>

  <h3>هل يفقد PDF جودته عند الضغط؟</h3>
  <p>الجزء الصوري وحده هو ما قد يفقد. النص والرسوم المتجهية يُعاد حزمها بلا فقدان وتبقى دقيقة بكسلا ببكسل. الصور تُخفض دقتها وتُعاد ترميزها: غير مرئي عند المتوسط للشاشة والمكتب، ويبدأ بالظهور عند المرتفع على الصور والمخططات المفصلة.</p>

  <h3>هل يمكنني ضغط ملف PDF نفسه مرتين ليصبح أصغر؟</h3>
  <p>نادرا ما يستحق ذلك. التمريرة الأولى أزالت الزيادة بالفعل؛ والثانية تعيد غالبا ترميز صور متدهورة أصلا، مضيفة تشوهات بلا مكسب يُذكر في الحجم. إن لم تكفِ تمريرة واحدة، فقسّم الملف أو أعد تشغيل OCR على المسح.</p>

  <h3>لماذا ما زال ملف PDF الممسوح ضوئيا ضخما بعد الضغط؟</h3>
  <p>المسح بيانات صور خالصة، فله قاع صارم (نحو 30-60% تخفيض). للمضي أبعد، شغّل OCR لتحويل الصفحات إلى نص حقيقي وأعد التصدير إلى PDF نصي، ثم اضغطه. يمكن لمسح بحجم 50 MB أن ينزل بهذه الطريقة إلى 1-2 MB، لكن الكتابة اليدوية والتواقيع لن تبقى، فاحتفظ بالأصل.</p>

  <h3>هل ضغط PDF عبر الإنترنت آمن للمستندات الحساسة؟</h3>
  <p>تُشفّر عمليات الرفع أثناء النقل وتُعالج فقط طوال مدة المهمة. للملفات السرية فعلا، احمِ PDF بكلمة مرور بعد الضغط وشارك كلمة المرور عبر قناة منفصلة، أو قسّم الملف واحتفظ به على جهازك.</p>

  <h2>جرّبها الآن</h2>

  <p>أجرِ اختبار تحديد النص، وابدأ بالإعداد المتوسط، وقارن النتيجة بالغرض الفعلي من المستند. <a href="/ar/pdf-organize/compress/">افتح أداة ضغط PDF →</a></p>
