title_ar: "كيفية حماية صورة بكلمة مرور: على الهاتف ولإرسالها"
meta_title_ar: "حماية صورة بكلمة مرور: إخفاء الصور على الهاتف أو إرسالها مقفلة | Convertica"
meta_description_ar: "أخفِ صورك على iPhone أو Android، أو اقفل صورة بكلمة مرور لإرسالها أو تخزينها. لماذا لا تملك الصور كلمة مرور خاصة بها، وكيف تحل ذلك بملف PDF مشفَّر."
meta_keywords_ar: "حماية صورة بكلمة مرور، قفل صورة، كيفية حماية صورة بكلمة مرور، إخفاء الصور في الآيفون، المجلد المقفل في صور جوجل، المجلد الآمن سامسونج، تشفير صورة، كلمة مرور للصورة"
excerpt_ar: "قفل صورة قد يعني أمرين: إخفاءها على هاتفك أنت، أو ختم نسخة بكلمة مرور بحيث لا يستطيع أحد فتحها بعد إرسالها. الصور لا تملك كلمة مرور خاصة بها، فإليك كيف يعمل كل خيار وأين يتوقف بالضبط."
content_ar: |
  تريد قفل صورة. لكن القفل قد يعني أمرين مختلفين تماما، والخلط بينهما هو سبب إخفاق كثير من النصائح على الإنترنت. أحيانا تريد فقط ألا تظهر لقطة خاصة حين تناول هاتفك لصديق. وأحيانا تحتاج إلى إرسال صورة أو تخزينها بحيث لا يفتحها أحد دون كلمة مرور، حتى لو وصل الملف إلى جهاز خاطئ. يغطي هذا الدليل الحالتين، وهو صريح بشأن المكان الذي يتوقف عنده كل أسلوب.

  <h2>أولا، حدد ماذا تعني «الحماية» بالنسبة لك</h2>

  <p>هدفان، وعُدّتان مختلفتان.</p>

  <ul>
    <li><strong>إخفاء صورة على هاتفك أنت.</strong> أنت وحدك تستخدم الجهاز، وكل ما تريده هو إخراج بعض الصور من المعرض الرئيسي خلف Face ID أو رمز. هذه الميزة مدمجة في كل هاتف ولا تكلف شيئا.</li>
    <li><strong>قفل صورة تنوي إرسالها أو تخزينها.</strong> هنا يغادر الملف يديك. الألبوم الخاص على هاتفك لا يفعل شيئا بمجرد إرفاق الصورة برسالة أو نسخها إلى ذاكرة USB. لهذا يجب أن تسافر كلمة المرور داخل الملف نفسه.</li>
  </ul>

  <p>اسأل نفسك أيهما تحتاج فعلا قبل أن تبدأ. الأول إعداد في الهاتف تفعّله في ثوانٍ. أما الثاني فيحتاج تشفيرا حقيقيا، وهنا تصبح الصور معقدة، كما سترى أدناه.</p>

  <h2>قفل الصور على iPhone</h2>

  <p>يمنحك iOS طريقين حسب مدى خصوصية الصورة فعلا.</p>

  <p><strong>ألبوم المخفيات.</strong> في تطبيق الصور، افتح الصورة، اضغط زر المشاركة أو المزيد، واختر «إخفاء». تنتقل إلى ألبوم المخفيات الذي لا يظهر في مكتبتك الرئيسية. في iOS 16 وما بعده، يكون هذا الألبوم، مع «المحذوفة مؤخرا»، مقفلا خلف Face ID أو رمز الدخول افتراضيا، فلا يعثر عليه من يتصفح صورك بالصدفة.</p>

  <p><strong>اقفلها داخل ملاحظة.</strong> إن أردت الصورة خلف كلمة مرور فعلية، الصق الصورة في تطبيق الملاحظات واقفل تلك الملاحظة من زر المشاركة. تستخدم الملاحظات رمز جهازك أو كلمة مرور منفصلة تضبطها، والملاحظة المقفلة مشفَّرة على الجهاز. حيلة عملية حين تريد ختم صورة أو اثنتين حساستين بدلا من إخفاء ألبوم كامل.</p>

  <h2>قفل الصور على Android</h2>

  <p><strong>المجلد المقفل في صور جوجل.</strong> افتح تطبيق الصور، اذهب إلى «المكتبة» ثم «الأدوات» وأعدّ «المجلد المقفل». كل ما تنقله إليه يبقى خارج الشبكة وخارج البحث وخارج أي تطبيق يقرأ معرضك، ولا يُفتح إلا بعد قفل الشاشة. صور المجلد المقفل لا تُنسخ احتياطيا، وهذا هو الثمن مقابل بقائها خاصة بالجهاز.</p>

  <p><strong>المجلد الآمن من سامسونج.</strong> في هواتف Galaxy، يوجد «المجلد الآمن» في «الإعدادات» تحت «الأمان والخصوصية»، وينشئ مساحة منفصلة مشفَّرة بقفلها الخاص. انقل الصور إليه فتختفي من المعرض العادي حتى تفتح المجلد. إنه أقوى من ألبوم مخفي لأن المساحة كلها مشفَّرة، وليست مجرد مخبأة عن العين.</p>

  <h2>المأزق المشترك في كل «خزنة» بالهاتف</h2>

  <p>كل الخيارات أعلاه تحمي الصورة على جهاز واحد. هذا مفيد فعلا، لكن اقرأ الحد بعناية: الحماية لا تسافر مع الملف. لحظة تُرفق صورة مخفية برسالة، أو تشاركها عبر تطبيق مراسلة، أو تنسخها إلى حاسوب، تصل صورة عادية قابلة للفتح. عاش القفل في هاتفك، لا في الصورة نفسها.</p>

  <p>فإذا كان هدفك إرسال صورة تبقى خاصة في الطريق، أو حفظها على قرص مشترك قد يفتحها فيه آخرون، فالخزنة في الهاتف هي الأداة الخطأ. تحتاج إلى كلمة مرور مدمجة في الملف.</p>

  <h2>حماية صورة بكلمة مرور لإرسالها أو تخزينها</h2>

  <p>هذا هو الجزء الصادق الذي تتجاوزه أغلب الأدلة: ملفات الصور ليس فيها مكان لكلمة مرور. ملف JPG أو PNG مجرد بيانات بكسل. لا يوجد حقل في الصيغة يحمل كلمة مرور، ولا طريقة قياسية لعارض الصور كي يطلبها. لهذا لا ترى قط مربع «أدخل كلمة المرور» عند فتح صورة عادية، ولهذا فإعادة تسمية الملف أو «إخفاءه» لا يحمي شيئا بذاته.</p>

  <p>الحل الشامل هو تغليف الصورة في شيء يدعم كلمة المرور، والصيغة التي يفتحها كل جهاز فعلا هي PDF. ضع صورتك داخل ملف PDF، وشفّر ذلك الملف بكلمة مرور، فتحصل على ملف لا يعرض شيئا سوى طلب كلمة المرور حتى تُكتب الكلمة الصحيحة، سواء فُتح على iPhone أو Android أو Mac أو حاسوب يعمل بـ Windows.</p>

  <p>هذا بالضبط ما تفعله أداة <a href="/ar/image/password-protect-image/">حماية الصورة بكلمة مرور</a>.</p>

  <ol>
    <li>افتح أداة <a href="/ar/image/password-protect-image/">حماية الصورة بكلمة مرور</a> وارفع صورتك. تعمل صيغ JPG وPNG وHEIC جميعا.</li>
    <li>اختر كلمة مرور. اجعلها قوية وسهلة التذكر عليك، لأن الملف مشفَّر فعلا ولا يوجد باب خلفي إن فقدتها.</li>
    <li>نزّل النتيجة. إنها ملف PDF يحمل صورتك بداخله، مختوم بتشفير AES-256. أرسله أو خزّنه في أي مكان، وأي من يفتحه يلقى طلب كلمة المرور أولا، لا صورتك.</li>
  </ol>

  <p>شارك كلمة المرور عبر قناة منفصلة عن الملف نفسه. كلمة المرور برسالة نصية والملف بالبريد أأمن بكثير من وضع الاثنين في رسالة واحدة.</p>

  <h2>لماذا AES-256 وليس «JPG مقفل»</h2>

  <p>AES-256 هو نفس فئة التشفير المستخدمة لحماية الملفات المصرفية والحكومية. حين تكون الصورة داخل ملف PDF مشفَّر بـ AES-256، فالبكسلات ليست مخفية فحسب، بل مبعثرة، وبدون كلمة المرور لا يوجد ما يُعرض إطلاقا. قارن ذلك بصورة مخفية أو مُعاد تسميتها يكشفها أي أحد في ثوانٍ. إن كانت الصورة مهمة بما يكفي لقفلها، فهي جديرة بأن تُقفل كما ينبغي.</p>

  <h2>الأسئلة الشائعة</h2>

  <h3>هل أستطيع وضع كلمة مرور مباشرة على JPG أو PNG؟</h3>
  <p>ليس على الصورة نفسها. صيغتا JPG وPNG ليس فيهما حقل لكلمة المرور، فلا يستطيع أي عارض صور قياسي قفلها أو فتحها. لحماية صورة بكلمة مرور تُغلّفها في حاوية مشفَّرة، وملف PDF هو الحاوية التي يفتحها كل جهاز. هذا هو النهج الذي تتبعه هذه الأداة.</p>

  <h3>هل إخفاء صورة يعادل حمايتها بكلمة مرور؟</h3>
  <p>لا. الإخفاء ينقل الصورة بعيدا عن الأنظار على جهاز واحد، لكن الملف يبقى قابلا للفتح تماما. إن غادر الجهاز، أو فتح أحدهم قفل الهاتف، فالصورة حاضرة. أما الحماية بكلمة مرور فتشفّر الملف، فلا يمكن فتحه أصلا دون الكلمة، أينما انتهى به المطاف.</p>

  <h3>ماذا يحدث إن نسيت كلمة المرور؟</h3>
  <p>لا يمكن فتح الملف، وهذا مقصود بالتصميم. التشفير الحقيقي بلا زر استرجاع، فاحفظ كلمة المرور في مدير كلمات مرور ولا تجعلها النسخة الوحيدة أبدا. وإن كنت تحتاج فقط خصوصية يومية على هاتفك أنت لا ملفا مختوما، فالخزنة في الهاتف تجنّبك هذا الخطر تماما.</p>

  <h3>هل يفقد الملف المحمي جودة الصورة؟</h3>
  <p>لا. تدخل صورتك في ملف PDF كما هي، فالصورة بالداخل بنفس جودة الأصل. التشفير يغيّر طريقة تخزين الملف، لا شكل الصورة بعد فتحها.</p>

  <h3>هل يستطيع المستلم فتحه دون برنامج خاص؟</h3>
  <p>نعم. النتيجة ملف PDF مشفَّر عادي، وقارئ PDF موجود بالفعل على كل هاتف وحاسوب. يكتب كلمة المرور مرة واحدة فتظهر الصورة، دون تثبيت أي شيء.</p>

  <h3>هل من الآمن حماية صورة أونلاين؟</h3>
  <p>تُعالَج الملفات المرفوعة ثم تُحذف من الخادم بعد فترة قصيرة، فلا يُخزَّن شيء ولا يُشارَك. أما الصورة التي يجب ألا تغادر جهازك أبدا، فأأمن طريق لها هو خزنة الهاتف أو أداة تعمل دون اتصال. وللصورة التي تحتاج إرسالها أو تخزينها بكلمة مرور، يكون تشفيرها أونلاين سريعا، ومن بعدها يحمل الملف نفسه الحماية.</p>

  <h2>جرّبها الآن</h2>

  <p>إن أردت فقط إخراج بضع لقطات من المعرض الرئيسي، فألبوم المخفيات أو المجلد المقفل أو المجلد الآمن في هاتفك يتولى ذلك في ثوانٍ. أما إن كانت الصورة يجب أن تسافر، أو أن تستقر على قرص مشترك بكلمة مرور، فأسقطها في أداة <a href="/ar/image/password-protect-image/">حماية الصورة بكلمة مرور</a> ونزّل ملف PDF مقفلا لا يُفتح لأحد دون الرمز.</p>
