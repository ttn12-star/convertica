content_en: |
  There are two everyday reasons to turn a PDF into JPGs: you want to post a single page where only images are allowed - a marketplace listing, a social post, a chat app - or you need to drop a page into a slide or a document as a picture. And there's an equally common reverse trip: you've got a pile of phone photos or scans and you need them to arrive as one tidy PDF instead of fifteen separate attachments.

  Both directions are free and take seconds. What separates a crisp result from a blurry, out-of-order mess is two settings that most converters tuck away. Get those right and you'll never think about it again.

  <figure><img src="/static/blog/images/tool-pdf-to-jpg-hero.jpg" alt="Convertica PDF to JPG converter with the file upload area" width="1280" height="800" loading="lazy"></figure>

  <h2>PDF to JPG: the resolution decision</h2>

  When you export a PDF page to JPG, the tool renders the page as a bitmap at a chosen resolution, measured in DPI (dots per inch). This single number decides whether your text stays sharp or turns to mush.

  <ul>
    <li><strong>72-96 DPI</strong> - screen-only. Fine for a thumbnail or a quick preview, too soft for anything with small text.</li>
    <li><strong>150 DPI</strong> - the sweet spot for sharing on screens. Text reads cleanly on a phone or monitor and the file stays light.</li>
    <li><strong>300 DPI</strong> - print quality. Use this if the image will be printed or zoomed into. Files get larger, but text and fine lines stay crisp.</li>
  </ul>

  <blockquote class="callout">If your JPG looks blurry, you almost certainly exported at too low a DPI. Re-export at 150 for screens or 300 for print - you can't sharpen a low-resolution image after the fact.</blockquote>

  A multi-page PDF becomes one JPG per page. Decide upfront whether you want every page or just one - exporting a 40-page report to 40 images when you only needed page 3 is the most common time-waster here. Most tools let you pick a page range before converting.

  <h2>JPG or PNG? It matters more than you think</h2>

  JPG and PNG compress differently, and for documents the difference is visible. JPG uses lossy compression that's great for photographs but creates faint "halos" around sharp black text on white - exactly the content most documents are made of. PNG is lossless and keeps text edges razor-clean.

  <figure><img src="/static/blog/images/tool-pdf-to-jpg-options.jpg" alt="PDF to JPG output options including page range and resolution" width="1280" height="800" loading="lazy"></figure>

  The practical rule: if the page is mostly text or line art (contracts, invoices, diagrams), prefer PNG. If it's mostly a photograph or a rich graphic, JPG gives a much smaller file with no visible loss. When a tool only outputs JPG, bump the DPI up a notch to compensate for the text halos.

  <h2>JPG back to PDF: keep the order</h2>

  Rebuilding a PDF from images is where things quietly go wrong. The trap is filename ordering. If your photos are named <code>IMG_2, IMG_10, IMG_1</code>, many tools sort them alphabetically, which puts <code>IMG_10</code> before <code>IMG_2</code>. Your pages end up shuffled.

  <figure><img src="/static/blog/images/tool-jpg-to-pdf-hero.jpg" alt="Convertica JPG to PDF tool for combining multiple images into one document" width="1280" height="800" loading="lazy"></figure>

  To <a href="/en/jpg-to-pdf/">combine images into one PDF</a> without surprises:

  <ol>
    <li>Upload all the images at once rather than one at a time.</li>
    <li>Check the order in the preview before exporting. Drag thumbnails to fix any that landed out of sequence.</li>
    <li>Set a consistent page size if the images vary - otherwise a portrait scan and a landscape photo produce mismatched pages.</li>
    <li>Export, then scroll the result once to confirm the sequence reads correctly.</li>
  </ol>

  This is the fast way to turn a stack of receipts, a multi-page contract you photographed, or a child's homework into a single file a teacher or accountant can actually open.

  <h2>Common scenarios</h2>

  <h3>Posting one PDF page to a marketplace or social app</h3>
  <p>Listings and social platforms reject PDFs but accept images. Export just the page you need at 150 DPI as JPG, and it uploads like any photo. For a flyer with a lot of text, use PNG so the small print stays legible when someone zooms in.</p>

  <h3>Turning phone photos of a document into a PDF</h3>
  <p>Photograph each page in even light, upload them together, fix the order in the preview, and export. If the photos are large, the resulting PDF can be heavy - <a href="/en/pdf-organize/compress/">compress the PDF</a> afterwards to make it email-friendly.</p>

  <h3>Sending a scan through an app that only takes images</h3>
  <p>Some chat and upload forms accept JPG but not PDF. Convert each page to JPG at 150 DPI and send the images, or rebuild later if the recipient needs a single document.</p>

  <h2>Quality and file-size tips</h2>

  <ul>
    <li>Going PDF → JPG → PDF re-compresses the content each time. Don't round-trip a file repeatedly; keep the original PDF and export images from it as needed.</li>
    <li>Photos straight from a phone are often 4000 pixels wide - far more than a document needs. Converting them to a PDF first, then compressing, usually shrinks the file dramatically with no visible loss.</li>
    <li>If you rebuilt a PDF from scans and now need to search or copy the text, run OCR on it - images of text aren't searchable until you do.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>How do I convert a PDF to JPG without losing quality?</h3>
  <p>Export at 300 DPI for print or 150 DPI for screens. Quality loss in PDF-to-JPG comes from choosing too low a resolution, not from the conversion itself. For text-heavy pages, PNG preserves edges better than JPG.</p>

  <h3>Which is better for documents, JPG or PNG?</h3>
  <p>PNG for text and line art, because its lossless compression keeps edges sharp. JPG for photographs, because it produces much smaller files with no visible loss on continuous-tone images.</p>

  <h3>How do I combine several JPGs into one PDF in the right order?</h3>
  <p>Upload all the images together, then check and drag the thumbnails in the preview before exporting. Don't rely on filename order - alphabetical sorting puts IMG_10 before IMG_2 and scrambles your pages.</p>

  <h3>Why is my PDF huge after I made it from photos?</h3>
  <p>Phone photos are very high resolution, so a PDF built from them inherits that size. Compress the finished PDF, or downscale the images before converting if you don't need print resolution.</p>

  <h3>Can I convert just one page of a PDF to an image?</h3>
  <p>Yes. Set a page range before converting so you get only the page you need instead of one image per page across the whole document.</p>

