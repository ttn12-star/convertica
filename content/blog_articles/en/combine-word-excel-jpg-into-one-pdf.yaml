content_en: |
  The documents that matter in real life almost never share a file type. A job application is a CV in Word, a portfolio summary in Excel, and a scanned certificate as a JPG. A rental application is an ID photo, a pay slip, and a reference letter. An expense claim is a spreadsheet plus a folder of receipt photos. The recipient wants one thing: a single, clean PDF they can open, scroll, and file.

  Stitching those pieces together looks fiddly, but it follows one rule that never changes: convert everything to PDF first, then merge the PDFs in the order you want. Get that sequence right and the rest is mechanical. This guide walks the whole packet from loose files to a finished document.

  <h2>Why "convert first, merge second" is the rule</h2>
  <p>It is tempting to look for one tool that swallows a Word file, a spreadsheet, and three photos and spits out a PDF. That approach is fragile: every format has its own quirks - a spreadsheet that overflows the page, a photo that comes in sideways - and a single black-box converter hides those problems until the final file is wrong.</p>
  <p>Converting each file to PDF on its own lets you check it looks right before it joins the packet. A PDF is also the only format that merges cleanly: once everything is a PDF, combining is a lossless copy, not a re-render. So the workflow is always two stages.</p>

  <h2>Stage 1: turn each file into a PDF</h2>
  <p>Handle each file type on its own terms.</p>

  <h3>Word documents</h3>

  <figure><img src="/static/blog/images/tool-word-to-pdf.jpg" alt="Converting a Word document to PDF before combining" width="1280" height="800" loading="lazy"></figure>
  <p>A .docx or .doc goes straight through the <a href="/en/word-to-pdf/">Office to PDF</a> tool with formatting intact - fonts, headings, page breaks all survive. This is the easy one: what you see in Word is what lands in the PDF.</p>

  <h3>Excel spreadsheets</h3>
  <p>Spreadsheets are the trap. A wide sheet that looks fine in Excel can spill across eight pages once it becomes a PDF, splitting a single table down the middle. Before converting, set the print area and turn on "Fit Sheet on One Page" (or scale to fit width) inside Excel, then run it through the same <a href="/en/word-to-pdf/">Office to PDF</a> tool. The two minutes you spend on print setup is the difference between a tidy one-page table and a sliced mess. The full layout playbook is in the <a href="/en/blog/convert-excel-to-pdf-keep-formatting/">Excel to PDF guide</a>.</p>

  <h3>JPG and photos</h3>

  <figure><img src="/static/blog/images/tool-jpg-to-pdf-hero.jpg" alt="Converting JPG photos to PDF pages" width="1280" height="800" loading="lazy"></figure>
  <p>Photos and scanned images go through <a href="/en/jpg-to-pdf/">JPG to PDF</a>, which wraps each image in a PDF page. If you have several images that belong together - say four pages of a scanned certificate - you can convert them into a single multi-page PDF in one pass, which saves a merge step later.</p>

  <h2>Stage 2: merge the PDFs in order</h2>

  <figure><img src="/static/blog/images/tool-merge-hero.jpg" alt="Merging converted PDFs into one document in the right order" width="1280" height="800" loading="lazy"></figure>
  <p>With every piece now a PDF, open the <a href="/en/pdf-organize/merge/">Merge PDF</a> tool, add all the files, and drag them into the sequence you want. Order is the whole point of this stage - a hiring manager expects the CV first, then supporting documents; an accountant expects the summary sheet before the receipts. Set the order here and the merged file reads like a deliberately assembled document instead of a random pile.</p>
  <p>If you only realise the order is wrong after merging, you do not have to start over - the <a href="/en/pdf-organize/organize/">Organize PDF</a> tool lets you drag pages into place in the combined file.</p>

  <h2>Stage 3: the finishing touches</h2>
  <p>Three quick passes turn a functional merge into a polished packet:</p>
  <ul>
    <li><strong>Fix sideways pages.</strong> A phone photo often imports rotated. <a href="/en/pdf-edit/rotate/">Rotate the page permanently</a> so the recipient is not tilting their head.</li>
    <li><strong>Add page numbers.</strong> For anything longer than a few pages, <a href="/en/pdf-edit/add-page-numbers/">page numbers</a> make a multi-document packet feel like one coherent file and make it easy to reference ("see page 4").</li>
    <li><strong>Shrink it for email.</strong> Photo-heavy packets balloon in size. If it is too big to send, <a href="/en/pdf-organize/compress/">compress the final PDF</a> down to an email-friendly size.</li>
  </ul>

  <h2>Common scenarios, mapped</h2>
  <table>
