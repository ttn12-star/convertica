  <h2>Pitfalls to avoid</h2>
  <p><strong>Skipping the Excel print setup.</strong> This is the single most common cause of an ugly packet. Always set the print area and fit-to-page before converting a spreadsheet.</p>
  <p><strong>Merging in upload order instead of reading order.</strong> The merge tool keeps the order you arrange, not the order you added files. Always drag into reading sequence before you export.</p>
  <p><strong>Forgetting the file gets big.</strong> Each photo can add a megabyte or more. A five-photo packet can easily exceed an email limit - compress at the end, not before, so you only compress once.</p>
  <p><strong>Naming the final file "document.pdf".</strong> Give the packet a clear name like <code>Smith-Application-2026.pdf</code>. The reasoning and a full naming system are in the <a href="/en/blog/pdf-naming-conventions-best-practices/">PDF naming conventions guide</a>.</p>

  <h2>A note for accounting and invoices</h2>
  <p>If your packet is specifically invoices or financial statements being bundled for bookkeeping, there is a tailored walkthrough - including how to keep a consistent order and a clean audit trail - in the <a href="/en/blog/merge-invoices-into-one-pdf-for-accounting/">merge invoices for accounting guide</a>.</p>

  <blockquote class="callout">The whole job is two stages: convert every file to its own PDF, then merge those PDFs in reading order. Everything else - rotating, numbering, compressing - is optional polish on top of that.</blockquote>

  <h2>FAQ</h2>
  <h3>Can I combine a Word file and a JPG into one PDF directly?</h3>
  <p>Not in one step reliably. Convert the Word file to PDF and the JPG to PDF separately, then merge the two PDFs. This two-stage approach gives you control over layout and order and avoids surprises.</p>
  <h3>How do I keep my files in the right order?</h3>
  <p>In the merge tool, drag the files into the sequence you want before exporting - the output follows the arranged order, not the order you added them. If you notice a mistake afterwards, use the organize tool to drag pages around in the combined file.</p>
  <h3>Why does my Excel sheet break across many pages in the PDF?</h3>
  <p>The print area is not set. Before converting, define the print area in Excel and enable "Fit Sheet on One Page" or scale-to-fit-width, then convert. This keeps a wide table on a single page.</p>
  <h3>My combined PDF is too big to email. What do I do?</h3>
  <p>Photo-heavy packets get large fast. Run the finished PDF through a compressor as the last step to bring it under your email provider's limit (around 25 MB for Gmail, 20 MB for Outlook).</p>
  <h3>One of my scanned pages is sideways - how do I fix it?</h3>
  <p>Phone photos often import rotated. Use the rotate tool to turn the page permanently so it saves in the correct orientation, not just for the current view.</p>
  <h3>Can I add several images as one PDF instead of merging them one by one?</h3>
  <p>Yes. The JPG to PDF tool can take multiple images at once and produce a single multi-page PDF, which saves you a separate merge step for grouped images like a multi-page certificate.</p>

