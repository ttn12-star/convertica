content_en: |
  Folders give you the illusion of organisation. A consistent filename gives you actual retrieval. The proof is simple: open your downloads folder right now and try to find last quarter's tax invoice from a specific vendor in under ten seconds. If you fail, the problem is not your folder structure - it is your filenames.

  This is a reference guide for the kind of naming convention that quietly pays off for years. Nothing fancy, nothing requiring a tool, just a few patterns you can start using on the next file you save.

  <h2>Why naming matters more than folders</h2>
  <p>There are three reasons filenames win at scale:</p>
  <ul>
    <li><strong>Search beats hierarchy.</strong> Once you cross a few hundred files, you do not browse - you search. Cloud storage search, OS search, and email search all index filenames first. A descriptive name is found instantly; a generic one is invisible.</li>
    <li><strong>Cloud sync flattens folder structures anyway.</strong> Move a file between Drive folders and the share link can break. Forward an email and the attachment loses its folder context entirely. The filename is the only metadata that travels with the file.</li>
    <li><strong>Filenames survive sharing.</strong> When you email a PDF to a client, your folder structure goes nowhere. The recipient saves the file with the name you sent it under. Make sure that name still makes sense out of context.</li>
  </ul>

  <h2>The universal pattern</h2>
  <p>One pattern handles 80% of cases:</p>
  <pre><code>YYYY-MM-DD_party_subject_version.pdf</code></pre>
  <p>For example: <code>2026-04-12_acme-corp_service-agreement_v02.pdf</code>.</p>
  <p>Three reasons this works year after year:</p>
  <ul>
    <li><strong>ISO date sorts correctly.</strong> 2026-04-12 sorts after 2026-04-11 alphabetically, which means alphabetical = chronological. No filesystem in the world treats 04/12/2026 that way.</li>
    <li><strong>Party before subject groups by client.</strong> All your Acme files cluster together when sorted alphabetically by anything after the date.</li>
    <li><strong>Version at the end</strong> means the latest version always sits at the bottom of a sort. v01 is above v02, which is above v03.</li>
  </ul>
  <blockquote class="callout">If you remember nothing else from this guide, remember to use ISO dates. Everything else is gravy.</blockquote>

  <h2>Patterns by document type</h2>
  <p>Generic advice gets ignored. Concrete patterns by document type get bookmarked. Here are the ones worth committing to muscle memory.</p>

  <h3>Invoices</h3>
  <pre><code>YYYY-MM-DD_vendor_amount_invoice.pdf</code></pre>
  <p>Example: <code>2026-04-15_aws_142-30_invoice.pdf</code>. The amount in the filename makes audit and reconciliation work several times faster - your accountant does not have to open every file to see the totals.</p>

  <h3>Contracts</h3>
  <pre><code>YYYY-MM-DD_counterparty_contract-type_version.pdf</code></pre>
  <p>Example: <code>2026-03-20_acme-corp_msa_v03.pdf</code>. Add <code>_DRAFT</code> or <code>_SIGNED</code> as a suffix when state matters: <code>2026-03-20_acme-corp_msa_v03_SIGNED.pdf</code>. The signed version becomes immediately distinguishable from drafts in any folder listing.</p>

  <h3>Bank statements</h3>
  <pre><code>YYYY-MM_bank_account4digits.pdf</code></pre>
  <p>Example: <code>2026-04_chase_4421.pdf</code>. Statements are monthly so the date drops the day component. The last four digits of the account number disambiguate when you have multiple accounts with the same bank without exposing the full number.</p>

  <h3>Scans and receipts</h3>
  <pre><code>YYYY-MM-DD_subject_scan.pdf</code></pre>
  <p>Example: <code>2026-04-22_lunch-meeting-acme_scan.pdf</code>. The <code>_scan</code> suffix flags that this file likely needs OCR if you ever want the text - useful future-you context.</p>

  <h2>Versioning that does not end in 'final_FINAL_v2'</h2>
  <p>Everyone has a folder somewhere with files named <code>contract_final.pdf</code>, <code>contract_final_v2.pdf</code>, <code>contract_final_REAL_final.pdf</code>, and <code>contract_finalfinal.pdf</code>. The fix is two rules:</p>
  <ul>
    <li><strong>Use zero-padded version numbers.</strong> v01, v02, v03 - not v1, v2, v10. Zero-padding keeps versions sorting correctly past v09. v10 sorts before v9 alphabetically, but v10 sorts correctly after v09.</li>
    <li><strong>State suffixes go at the end.</strong> <code>_DRAFT</code>, <code>_SIGNED</code>, <code>_FINAL</code>. The signed version is the canonical record; everything before it is a draft.</li>
  </ul>
  <h3>When to start a new file vs new version</h3>
  <p>New version: same document, edits and revisions. Same base name, bumped <code>_vNN</code>.</p>
  <p>New file: different counterparty, different subject, different transaction. Don't shoehorn into the version chain. <code>2026-04_acme-corp_msa_v04.pdf</code> and <code>2026-05_beta-co_msa_v01.pdf</code> are different files, not version 4 and version 5 of the same one.</p>

  <h2>Characters to avoid</h2>
  <p>Different operating systems and cloud platforms reject different characters. Stick to the safe set and you will never run into a "filename invalid" error during sync:</p>
  <ul>
    <li><strong>No spaces.</strong> Use hyphens for word separation inside a field, underscores between fields. <code>acme-corp_msa_v02.pdf</code> reads better than <code>acme corp msa v02.pdf</code> and survives URLs, terminals, and old systems.</li>
    <li><strong>No special characters.</strong> Avoid <code>/ \ : * ? " &lt; &gt; |</code>. Many of these are reserved by the filesystem and cause silent failures.</li>
    <li><strong>Stay under 100 characters.</strong> Some sync tools truncate or fail at filename limits, especially when combined with deep folder paths.</li>
    <li><strong>Stick to ASCII letters, digits, hyphen, underscore, period.</strong> Accented characters and emoji can break in unexpected places (older email clients, FTP servers, certain backups).</li>
  </ul>

  <h2>Renaming a backlog without losing your weekend</h2>
  <p>If you are reading this with a downloads folder full of <code>document(3).pdf</code>, you are not going to fix it in one sitting. Don't try. The trick is to make today's files clean and tackle the backlog in small batches.</p>
  <ol>
    <li><strong>Start with new files.</strong> Use the convention on every PDF you save from now on. Two weeks of consistency beats one weekend of cleanup.</li>
    <li><strong>Tackle 50 old files a day.</strong> Pick one folder. Rename what is obvious. Skip what is not. Move on tomorrow.</li>
    <li><strong>Use bulk rename tools.</strong> PowerToys (Windows) and Better Finder Rename or built-in batch rename (macOS) handle find-and-replace patterns across many files at once. Renaming 200 invoices to add an ISO date prefix is a five-minute job, not an afternoon.</li>
    <li><strong>Merge before renaming when it helps.</strong> If you have twelve receipts that all belong to one expense report, <a href="/en/pdf-organize/merge/">merge related files into one well-named PDF</a> rather than renaming each separately. One good name beats twelve mediocre ones.</li>
    <li><strong>Split a misnamed mega-file.</strong> If you have one giant <code>scans.pdf</code> with a year of receipts in it, the answer is to <a href="/en/pdf-organize/split/">split a misnamed mega-file into properly named pieces</a> and rename the parts as you go.</li>
  </ol>

  <h2>Naming and tooling: small wins compound</h2>
  <p>A consistent filename does more work than people expect once it is paired with the rest of your toolchain:</p>
  <ul>
    <li><strong>Cloud search becomes instant retrieval.</strong> Typing "2026-04 acme" into Drive search returns exactly what you wanted, not a ranked list of guesses.</li>
    <li><strong>Email forwarding stays clean.</strong> The recipient sees a sensible name instead of <code>document.pdf</code>, which makes you look organised without effort.</li>
    <li><strong>Backups deduplicate better.</strong> Versioned filenames make it obvious which files are different and which are just resaves of the same thing.</li>
    <li><strong>Archiving is easier.</strong> Before tucking files into long-term storage, <a href="/en/pdf-organize/compress/">compress before archiving</a> to save space and pair the smaller file with its descriptive name.</li>
  </ul>

  <h2>A two-week starter plan</h2>
  <p>If you want to try this without committing to a project:</p>
  <ol>
    <li><strong>Week 1.</strong> Apply the universal pattern (<code>YYYY-MM-DD_party_subject.pdf</code>) to every new file you save. Don't touch old files.</li>
    <li><strong>Week 2.</strong> Add type-specific patterns (invoices, contracts, statements). Spend ten minutes a day renaming the most-used 50 files in your downloads folder.</li>
  </ol>
  <p>By day fifteen, search will start working. By day thirty, the new convention is automatic and the old chaos is reduced to a long-tail of files you almost never open anyway.</p>

  <h2>FAQ</h2>
  <h3>Should I use hyphens or underscores in PDF filenames?</h3>
  <p>Both, with different jobs. Use hyphens inside a field for word separation (<code>acme-corp</code>) and underscores between fields (<code>2026-04-15_acme-corp_invoice.pdf</code>). This makes structure visible at a glance and is also the convention search engines parse most reliably for public files.</p>
  <h3>Why ISO date format (YYYY-MM-DD) instead of MM/DD/YYYY?</h3>
  <p>Because alphabetical sort equals chronological sort with ISO dates. 2026-04-15 sorts after 2026-04-14 in any system, anywhere. MM-DD-YYYY puts April after January but before March, which is useless. ISO is also the international standard, so it works across countries.</p>
  <h3>How long should a PDF filename be?</h3>
  <p>Aim for 30-80 characters. Long enough to be descriptive, short enough to read in a folder listing without truncation. Hard limit is system-dependent (often 255 characters) but combined with deep paths you can hit problems past 200.</p>
  <h3>Should the version number go at the start or end?</h3>
  <p>End. Putting v01, v02 at the end keeps the date sort intact and the version variants cluster together at the bottom of any document group. <code>2026-04_acme_msa_v01.pdf</code>, <code>v02</code>, <code>v03</code> all sit next to each other.</p>
  <h3>Do filename conventions affect SEO when PDFs are public?</h3>
  <p>Yes, modestly. Search engines do read PDF filenames as a ranking signal, especially in the URL slug. A descriptive, hyphenated filename like <code>2026-acme-msa.pdf</code> beats <code>file_3242.pdf</code> for discoverability. Don't keyword-stuff - just be descriptive.</p>

  <h2>Try it now</h2>
  <p>Pick one document type you handle weekly - invoices, statements, contracts - and rename the next ten you save with the matching pattern. The habit costs ten seconds per file and pays off every time you search. <a href="/en/all-tools/">Open all PDF tools →</a></p>
