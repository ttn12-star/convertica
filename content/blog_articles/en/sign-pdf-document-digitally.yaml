content_en: |
  A form shows up in your inbox as a PDF: a rental agreement, a consent form, an offer letter, a contract. It needs your signature. The old routine is painful: print it, sign with a pen, scan it back, and hope the scan is straight. You can skip all of that and sign the file right on screen. This guide shows how, and clears up the one thing people get wrong about "digital signatures."

  <h2>Two things called a "signature" that are not the same</h2>

  <p>Before signing anything, it helps to know which of these you actually need, because they solve different problems.</p>

  <ul>
    <li><strong>An electronic signature</strong> is a picture of your signature placed on the page: typed, drawn with a mouse or finger, or uploaded as an image. It shows intent to sign and is what almost every everyday form, lease, or internal approval asks for.</li>
    <li><strong>A digital signature</strong> is a cryptographic seal tied to a certificate. It does not just show your name, it mathematically proves who signed and that the file has not changed since. Banks, governments, and some legal filings require this stronger kind.</li>
  </ul>

  <p>For the vast majority of documents that land in your inbox, an electronic signature is exactly what is being asked for. If a document specifically requires a certified digital signature, it will say so, and usually points you to a specific provider or a government portal.</p>

  <h2>Sign a PDF on screen (the everyday way)</h2>

  <figure><img src="/static/blog/images/tool-sign-hero.jpg" alt="Convertica Sign PDF tool with a document ready to sign" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Open the <a href="/en/pdf-edit/sign/">Sign PDF</a> tool and upload your file.</li>
    <li>Create your signature: type it and pick a handwriting style, draw it with your mouse or finger, or upload a photo of your real signature.</li>
    <li>Place it where it belongs on the page, resize it, and add the date or your initials if the form needs them.</li>
    <li>Download the signed PDF. It is ready to send back, and it opens the same everywhere.</li>
  </ol>

  <figure><img src="/static/blog/images/tool-sign-options.jpg" alt="Signature options: type, draw, or upload in the Sign PDF tool" width="1280" height="800" loading="lazy"></figure>

  <p>The whole thing takes under a minute, and the uploaded file is removed from the server after a short window, which matters when the document is a contract rather than a throwaway.</p>

  <h2>Getting a clean signature</h2>

  <p>A few small things make an on-screen signature look right instead of clumsy:</p>

  <ul>
    <li><strong>Drawing on a phone or tablet beats a mouse.</strong> A finger or stylus gives a far more natural line than dragging a mouse pointer.</li>
    <li><strong>If you upload a photo of your signature,</strong> sign in dark ink on plain white paper, then crop tight. A clean, high-contrast image places much better on the page.</li>
    <li><strong>Match the size to the line.</strong> An oversized signature sprawling across a form looks off. Resize it to sit neatly on the signature line.</li>
  </ul>

  <h2>Keep the signed file from being changed</h2>

  <p>Once a document is signed, you usually do not want anyone editing it afterward. An electronic signature is an image, so it does not lock the file on its own. If the document is sensitive, add a password so it cannot be altered or opened by the wrong person: run it through the <a href="/en/pdf-security/protect/">Protect PDF</a> tool before sending. If you are emailing signed contracts regularly, our guide on <a href="/en/blog/password-protect-pdf-before-emailing/">password-protecting a PDF before emailing</a> covers doing it safely.</p>

  <h2>FAQ</h2>

  <h3>Is an electronic signature legally valid?</h3>
  <p>In most countries an electronic signature is legally recognized for everyday agreements, and laws like the US ESIGN Act and the EU eIDAS regulation back that up. Some specific documents (certain property, court, or notarized filings) require a stronger certified digital signature. When that is the case, the document or the requesting party will tell you.</p>

  <h3>What is the difference between an electronic and a digital signature again?</h3>
  <p>An electronic signature shows intent, a picture of your signature on the page. A digital signature adds cryptographic proof of identity and that the file is unchanged. Everyday forms need the first; regulated filings sometimes need the second.</p>

  <h3>Can I sign a PDF on my phone?</h3>
  <p>Yes, and it is often the best way, because you can draw your signature with a finger for a natural look. Open the tool in your phone browser, draw, place, and download, no app required.</p>

  <h3>Will signing change the rest of the document?</h3>
  <p>No. Your signature is added as an element on the page. The existing text, layout, and other pages stay exactly as they were.</p>

  <h3>Do I need to print anything?</h3>
  <p>No. The point of signing on screen is to skip printing and scanning entirely. You upload the PDF, add your signature, and download a finished file.</p>

  <h2>Try it now</h2>

  <p>If a form is sitting in your inbox waiting for a signature, open the <a href="/en/pdf-edit/sign/">Sign PDF</a> tool, add your signature, and send it back in a minute. And if the signed copy is confidential, lock it with <a href="/en/pdf-security/protect/">Protect PDF</a> before it leaves your outbox.</p>
