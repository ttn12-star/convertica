content_en: |
  Your accountant didn't ask for 14 separate PDFs. They asked for "this month's invoices", and 14 PDFs is what every cloud sync tool, supplier portal and food-delivery app produces. Sending them as a loose bundle works, until one gets lost in a thread, the dates collide on filenames, and you spend an hour next April reconstructing the audit trail from a half-broken email search.

  The fix is small and durable: one ordered, dated PDF per month. This guide covers the naming convention that makes <a href="/en/pdf-organize/merge/">merge PDF online</a> reliable, how to handle mixed JPG and PDF inputs, and a month-end routine that takes about ten minutes once you've done it twice.

  <figure><img src="/static/blog/images/tool-merge.jpg" alt="Convertica merge tool combining multiple invoice PDFs into one file" width="1280" height="800" loading="lazy"></figure>

  <h2>Why accountants prefer one PDF over many</h2>

  Bookkeeping software has evolved, but document handoff has not. Almost every accountant, whether they use QuickBooks, Xero or FreshBooks, prefers a single bundled file because:

  <ul>
    <li><strong>It archives cleanly.</strong> Document management systems index one file per period, not 47 floating attachments.</li>
    <li><strong>Page numbering supports the audit trail.</strong> "See page 12 of April invoices" is a real reference; "see invoice from the email on the 17th" is not.</li>
    <li><strong>It's easier to forward.</strong> A bookkeeper handing your records to a tax preparer attaches one file, not a folder.</li>
    <li><strong>It aligns with attachment workflows in QuickBooks and Xero.</strong> Both support attaching one PDF per journal entry or transaction; juggling multiple is friction nobody wants on month-end. (Yes, even today: Xero capped journal-entry attachments at one file per entry as recently as 2024 and only relaxed it for paid tiers.)</li>
    <li><strong>It maps cleanly to e-discovery and tax audit requests.</strong> When a tax authority asks for "all April invoices", handing over a single file beats explaining a folder.</li>
  </ul>

  <blockquote class="callout">A single well-named PDF per month is the difference between a 90-minute archive job and a 10-minute one.</blockquote>

  <h2>Naming convention before you merge</h2>

  Order the source files first, merge second. Most online merge tools, including ours, combine files in the order you upload them or in alphabetical order. That makes the filename the steering wheel.

  Use this format for each invoice:

  <pre><code>YYYY-MM-DD_vendor_amount.pdf

  2026-04-03_aws_142-50.pdf
  2026-04-08_adobe_19-99.pdf
  2026-04-11_office-supplies_88-30.pdf
  2026-04-22_internet_45-00.pdf</code></pre>

  Three reasons this works:

  <ol>
    <li><strong>ISO date sorts correctly</strong> in any operating system, regardless of locale.</li>
    <li><strong>Vendor in the middle</strong> lets you scan visually for "did I pay AWS this month?".</li>
    <li><strong>Amount at the end</strong> matches your bank reconciliation without opening the file.</li>
  </ol>

  Handling duplicates: if a supplier issues two invoices on the same date, append a letter: <code>2026-04-03_aws_142-50_a.pdf</code> and <code>2026-04-03_aws_142-50_b.pdf</code>. The letter sorts under the date and avoids overwriting. Avoid using the time as a tie-breaker; suppliers' invoice timestamps are inconsistent and can lie about when the work was actually billed.

  One more habit worth building: when you save the file from a vendor portal, rename it before it ever leaves the Downloads folder. Doing it at moment of receipt costs ten seconds. Doing it on month-end for thirty files at once feels like a chore and you'll skip it the second month.

  <h2>Step-by-step: merge invoices in browser</h2>

  Once your files are renamed:

  <ol>
    <li>Open Convertica's merge tool in any browser. Nothing to install, nothing to log in to.</li>
    <li>Drag every invoice file from your folder onto the upload area at once. The tool keeps your filename order.</li>
    <li>Verify the order in the thumbnail strip. Drag any out-of-place invoice to the right slot.</li>
    <li>Click <strong>Merge</strong>. The result downloads as one PDF.</li>
    <li>Rename the output to match the period: <code>2026-04_invoices_yourname.pdf</code>.</li>
  </ol>

  That last rename matters. The merged file inherits a generic name like <code>merged.pdf</code>, which is the worst possible thing to have in a Downloads folder six months from now. (I once spent fifteen minutes hunting for a specific bundle because three different "merged.pdf" files had collided in cloud sync. Many people hit this on their first month.)

  <h2>Adding a cover page or table of contents</h2>

  For larger expense submissions (20+ invoices, or anything going to a finance team rather than your own bookkeeper), a cover page repays the two minutes it takes. A simple summary sheet works:

  <table>
    <thead>
      <tr><th>Date</th><th>Vendor</th><th>Amount</th><th>Page</th></tr>
    </thead>
    <tbody>
      <tr><td>2026-04-03</td><td>AWS</td><td>142.50</td><td>1</td></tr>
      <tr><td>2026-04-08</td><td>Adobe</td><td>19.99</td><td>2</td></tr>
      <tr><td>2026-04-11</td><td>Staples</td><td>88.30</td><td>3</td></tr>
    </tbody>
  </table>

  Save the table as a PDF and put it first in the merge order. After merging, you can <a href="/en/pdf-edit/">add page numbers across the merged file</a> so the cover-page references actually resolve. If you're building a quarterly bundle for a finance team, a one-page summary at the front and a totals row that matches your bank statement closes the loop on the audit question before they have to ask.

  Pro tip: if you're using Excel or Google Sheets to build the summary, save it to PDF using a print area set to one page wide before merging. A summary that flows onto page 2 because of an oversized footer is just visual noise.

  <h2>Mixed formats: JPG receipts and PDF invoices</h2>

  Reality check: at least a third of small-business receipts arrive as photos. Restaurant tabs, taxi receipts, hardware-store paper slips, the deli around the corner that prints on fading thermal paper. The merge tool only takes PDFs, so you have a one-step conversion before the merge.

  <figure><img src="/static/blog/images/tool-jpg-to-pdf.jpg" alt="JPG to PDF converter for turning phone photos of receipts into mergeable PDFs" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Group all your JPG receipts in a folder.</li>
    <li><a href="/en/jpg-to-pdf/">Convert JPG receipts to PDF</a> in one batch. The tool produces one PDF per image (or a single combined PDF if you prefer).</li>
    <li>Rename each output to match the YYYY-MM-DD vendor format above.</li>
    <li>Drop them into the same folder as your PDF invoices.</li>
    <li>Merge in chronological order.</li>
  </ol>

  Tip: when you photograph a paper receipt, hold the phone directly above and use a plain background (a sheet of A4 on the table works well). The JPG-to-PDF tool won't crop or auto-rotate; what you photograph is what gets bound into your accounting bundle. Avoid flash on glossy receipts; a hot reflection erases the line you actually need to capture.

  Another quirk: HEIC photos from newer iPhones aren't accepted by every merge or convert tool. Set your iOS camera to "Most Compatible" (Settings &gt; Camera &gt; Formats) before a month-end shoot, or batch-convert HEIC to JPG once at the start of the session.

  <h2>Monthly workflow for freelancers</h2>

  The whole point is to make this routine, not heroic. A workable monthly close:

  <h3>End-of-month routine (about 10 minutes)</h3>

  <ol>
    <li><strong>First of the new month, morning.</strong> Open your "Invoices" folder for the month that just ended.</li>
    <li><strong>Cross-check against the bank.</strong> Open your business bank statement. Anything on the statement that's not in the folder, hunt down the missing invoice. Anything in the folder not on the statement, flag for next month.</li>
    <li><strong>Rename to YYYY-MM-DD_vendor_amount.</strong> Two minutes for 15 files.</li>
    <li><strong>Convert any JPG receipts.</strong> One round trip through the JPG-to-PDF tool.</li>
    <li><strong>Merge.</strong> Drag all into the merge tool, verify order, download.</li>
    <li><strong>Save the bundle</strong> as <code>2026-04_invoices_yourname.pdf</code> in your "Accounting/2026" folder.</li>
    <li><strong>Email the accountant.</strong> One attachment, with a one-line note about anything unusual.</li>
  </ol>

  Make this a calendar block on the morning of the 1st of every month. Anyone who's tried to "do it later" knows that the second you skip a month, the third month becomes twice the work, and quarter-end becomes a panic. Discipline matters more than tooling here.

  <h3>Backup before merging</h3>

  Keep the originals. Always. The merged PDF is your handoff format, not your archive. If a supplier disputes an amount or your accountant needs the un-redacted version of a single invoice, you want the source file, not a page extracted from the merge.

  Most cloud drives version files automatically; if yours doesn't, copy the month folder to a "raw_originals" subfolder before you start renaming. Set a simple retention rule: keep originals for seven years (the standard tax-record window in most jurisdictions), keep merged bundles indefinitely because they cost nothing.

  <h3>Sending to the accountant</h3>

  If the merged PDF lands above 20 MB (common when you have a lot of photographed receipts), <a href="/en/pdf-organize/compress/">compress the final bundle for email</a> with the medium preset. For sensitive bundles (invoices showing your bank details, salary breakdowns, or anything covered by a client NDA), consider password-protecting the PDF and sharing the password through a different channel - a text message, not the same email thread.

  If your accountant uses a portal (Karbon, ClientHub, or QuickBooks Online's Accountant view), upload directly there instead of attaching to email. Portals usually have higher size limits, automatic versioning, and an audit log that email can't match.

  <h2>FAQ</h2>

  <h3>Will merging invoices change the original files?</h3>
  <p>No. The merge tool reads each source PDF and writes a new combined file. Your originals stay exactly as supplied, which matters if a supplier or auditor ever asks for the unmodified copy.</p>

  <h3>How do I keep invoices in chronological order?</h3>
  <p>Rename each file with a YYYY-MM-DD prefix before merging. The tool follows your filename order, so a clean naming convention does the sorting for you. If you forget to rename, drag the thumbnails into order before clicking merge.</p>

  <h3>Can I merge JPG receipts with PDF invoices?</h3>
  <p>Convert the JPG files to PDF first using a JPG-to-PDF tool, then merge alongside the existing PDF invoices. Most online merge tools (ours included) only accept PDFs as input.</p>

  <h3>Is it safe to upload invoices with bank details to an online tool?</h3>
  <p>Use a tool that processes files in-session and deletes them shortly after. Convertica removes uploads after a short retention window. For especially sensitive invoices, password-protect the merged PDF before sharing, and avoid uploading from a public Wi-Fi network where the upload could be intercepted.</p>

  <h3>How many PDFs can I merge at once?</h3>
  <p>The practical ceiling is usually browser memory and total upload size, not the tool. For typical month-end bundles of 10-50 invoices, you won't hit any limit. For 200+ files, split into two merges and combine the results.</p>

