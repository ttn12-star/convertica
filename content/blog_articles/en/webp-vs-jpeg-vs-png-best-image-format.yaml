  <p>Converting transparency-bearing PNGs to WebP keeps the alpha channel; converting them to JPEG fills transparent areas with white - so logo-to-JPEG is usually a mistake. If your goal is purely a smaller file in the <em>same</em> format, the <a href="/en/image/optimize/">Optimize Image</a> tool compresses in place and can also cap the dimensions.</p>

  <h2>FAQ</h2>

  <h3>Is WebP lower quality than JPEG?</h3>
  <p>No - at comparable settings WebP preserves the same visual quality in a smaller file. Its compressor is simply newer and smarter than JPEG's 1992-vintage one. Quality is determined by the level you choose, not by the format's name.</p>

  <h3>Why do some sites refuse my WebP upload?</h3>
  <p>Their upload validation predates WebP's popularity and whitelists only JPEG and PNG. Convert to JPEG for that upload - it's a ten-second job - and keep WebP for your own site.</p>

  <h3>Should I convert my existing JPEGs to WebP?</h3>
  <p>For a site you run - yes, it's usually the cheapest page-speed win available. Re-encode from the highest-quality source you have rather than from an already heavily compressed copy, so artifacts don't stack.</p>

  <h3>What about GIF?</h3>
  <p>For animation, WebP (or a real video file) beats GIF on size and colour depth. For static images GIF's 256-colour limit makes it the worst of the four - it survives mostly out of habit and meme tradition.</p>

  <h3>What's the best quality setting for JPEG and WebP?</h3>
  <p>80-85 for web use - the sweet spot where artifacts are invisible at normal viewing sizes. 90+ when the image may be edited again or viewed closely. Below 70, savings keep growing but so do visible blotches, especially in skies and gradients.</p>

  <h2>Pick once, convert when needed</h2>

  <p>The rule of thumb fits in one line: <strong>WebP for your website, JPEG for photos that travel, PNG for graphics with edges.</strong> And when an image arrives in the wrong format for the job, the <a href="/en/image/convert/">Convert Image</a> tool fixes that in one click - free, no registration, dimensions untouched.</p>
