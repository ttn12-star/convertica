content_en: |
  You want a photo locked. But locked can mean two very different things, and mixing them up is why so much advice online misses the point. Sometimes you just want a private shot to stop popping up when you hand your phone to a friend. Other times you need to email or store a photo so that nobody can open it without a password, even if the file lands on the wrong device. This guide covers both, and it is honest about where each approach stops working.

  <h2>First, decide what "protect" means for you</h2>

  <p>Two goals, two toolkits.</p>

  <ul>
    <li><strong>Hide a photo on your own phone.</strong> You are the only one using the device, and you just want certain images out of the main gallery and behind Face ID or a PIN. Every phone has this built in, and it costs nothing.</li>
    <li><strong>Lock a photo you plan to send or store.</strong> Here the file leaves your hands. A private album on your phone does nothing once the image is attached to an email or copied to a USB stick. For this the password has to travel inside the file itself.</li>
  </ul>

  <p>Ask which one you actually need before you start. The first is a phone setting you can turn on in seconds. The second needs real encryption, and that is where images get awkward, as you will see below.</p>

  <h2>Lock photos on an iPhone</h2>

  <p>iOS gives you two routes, depending on how private the photo really is.</p>

  <p><strong>The Hidden album.</strong> In Photos, open the image, tap the share or the more button, and choose Hide. It moves to a Hidden album that does not show up in your main library. On iOS 16 and later, that album, along with Recently Deleted, is locked behind Face ID or your passcode by default, so someone flicking through your camera roll will not stumble onto it.</p>

  <p><strong>Lock it inside a note.</strong> For something you want behind an actual password, paste the photo into the Notes app and lock that note through the share button. Notes uses your device passcode or a separate password you set, and a locked note is encrypted on the device. It is a neat trick when you want one or two sensitive images sealed rather than a whole album hidden.</p>

  <h2>Lock photos on Android</h2>

  <p><strong>Google Photos Locked Folder.</strong> Open Photos, go to Library, then Utilities, and set up the Locked Folder. Anything you move there stays out of the grid, out of search, and out of any app that reads your gallery, and it opens only after your screen lock. Photos in the Locked Folder are not backed up, which is the trade for keeping them private to the device.</p>

  <p><strong>Samsung Secure Folder.</strong> On Galaxy phones, Secure Folder lives in Settings under Security and privacy, and it creates a separate, encrypted space with its own lock. Move photos into it and they disappear from the normal gallery until you unlock the folder. It goes further than a hidden album because the whole space is encrypted, not just tucked out of view.</p>

  <h2>The catch every phone vault shares</h2>

  <p>All of the options above protect a photo on one device. That is genuinely useful, but read the limit carefully: the protection does not travel with the file. The moment you attach a hidden photo to an email, share it over a messenger, or copy it to a computer, it arrives as a plain, openable image. The lock lived on your phone, not in the picture.</p>

  <p>So if your goal is to send a photo that stays private on the way, or to keep one on a shared drive where other people could open it, a phone vault is the wrong tool. You need the password baked into the file.</p>

  <h2>Password protect a photo to send or store</h2>

  <p>Here is the honest part most guides skip: image files have no password slot. A JPG or a PNG is just pixel data. There is no field in the format to hold a password, and no standard way for a photo viewer to ask for one. That is why you never see an "enter password" box when you open a normal image, and why renaming or hiding a file protects nothing on its own.</p>

  <p>The universal fix is to wrap the photo in something that does support a password, and the format every device can already open is PDF. Put your image inside a PDF, encrypt that PDF with a password, and you get a file that shows nothing but a password prompt until the right code is typed, whether it is opened on an iPhone, an Android, a Mac, or a Windows PC.</p>

  <p>That is exactly what the <a href="/en/image/password-protect-image/">Password Protect Image</a> tool does.</p>

  <ol>
    <li>Open the <a href="/en/image/password-protect-image/">Password Protect Image</a> tool and upload your photo. JPG, PNG, and HEIC all work.</li>
    <li>Choose a password. Make it strong and something you will remember, because the file is genuinely encrypted and there is no back door if you lose it.</li>
    <li>Download the result. It is a PDF holding your image, sealed with AES-256 encryption. Send it or store it anywhere, and anyone who opens it meets a password prompt first, not your photo.</li>
  </ol>

  <p>Share the password through a different channel from the file itself. A text message for the password and email for the file is far safer than putting both in the same message.</p>

  <h2>Why AES-256 and not a "locked JPG"</h2>

  <p>AES-256 is the same class of encryption used to protect banking and government files. When a photo sits inside an AES-256 encrypted PDF, the pixels are not merely hidden, they are scrambled, and without the password there is nothing to display at all. Compare that to a hidden or renamed image, which anyone can reveal in seconds. If a photo matters enough to lock, it is worth locking properly.</p>

  <h2>FAQ</h2>

  <h3>Can I put a password directly on a JPG or PNG?</h3>
  <p>Not in the image itself. The JPG and PNG formats have no password field, so no standard photo viewer can lock or unlock one. To password protect a photo you wrap it in an encrypted container, and a PDF is the container every device can open. That is the approach this tool takes.</p>

  <h3>Is hiding a photo the same as password protecting it?</h3>
  <p>No. Hiding moves a photo out of sight on one device, but the file stays fully openable. If it leaves the device, or someone unlocks the phone, the photo is right there. Password protection encrypts the file, so it cannot be opened at all without the password, wherever it ends up.</p>

  <h3>What happens if I forget the password?</h3>
  <p>The file cannot be opened, and that is by design. Real encryption has no recovery button, so keep the password in a password manager and never as the only copy. If you only need day-to-day privacy on your own phone rather than a sealed file, a phone vault avoids this risk entirely.</p>

  <h3>Will the protected file lose image quality?</h3>
  <p>No. Your photo goes into the PDF as it is, so the picture inside is the same quality as the original. Encryption changes how the file is stored, not what the image looks like once it is unlocked.</p>

  <h3>Can the recipient open it without special software?</h3>
  <p>Yes. The result is an ordinary encrypted PDF, and every phone and computer already has a PDF reader. They type the password once and the photo appears, with nothing to install.</p>

  <h3>Is it safe to protect a photo online?</h3>
  <p>Uploaded files are processed and then removed from the server after a short window, so nothing is kept or shared. For a photo that must never leave your machine, a phone vault or an offline tool is the safest route. For a photo you need to send or store with a password, encrypting it online is quick, and from then on the file itself carries the protection.</p>

  <h2>Try it now</h2>

  <p>If you just want a few shots off the main gallery, your phone's Hidden album, Locked Folder, or Secure Folder handles it in seconds. But if the photo needs to travel, or to sit on a shared drive with a password on it, drop it into the <a href="/en/image/password-protect-image/">Password Protect Image</a> tool and download a locked PDF that opens for no one without the code.</p>
