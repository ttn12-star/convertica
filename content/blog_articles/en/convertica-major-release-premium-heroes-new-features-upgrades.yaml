content_en: |
  <p>Our biggest update yet is almost here. This release adds a <strong>Premium subscription system</strong>, improves the tools you already use, and ships five new converters. Here is what is coming.</p>

  <h2>A heads-up before launch</h2>
  <p>A release this size touches a lot of moving parts, so a few things may behave oddly in the first days. If something breaks, <strong>tell us</strong> — we'll fix it fast.</p>

  <h2>Premium subscriptions</h2>
  <p>Premium comes in three plans:</p>
  <ul>
    <li><strong>1 day</strong> — $1</li>
    <li><strong>1 month</strong> — $5</li>
    <li><strong>1 year</strong> — $52</li>
  </ul>
  <p>Every Premium plan unlocks:</p>
  <ul>
    <li>Higher limits on file size and page count</li>
    <li>OCR processing</li>
    <li>Batch processing on selected tools</li>
    <li>A separate, faster processing queue</li>
    <li>Optional dark mode</li>
  </ul>

  <h2>Hero ranks</h2>
  <p>Premium subscribers keep Convertica running, so we call them <strong>Heroes</strong>. The longer you stay subscribed, the higher your rank:</p>
  <ul>
    <li><strong>Bronze Hero</strong> — 30+ consecutive days</li>
    <li><strong>Silver Hero</strong> — 90+ consecutive days</li>
    <li><strong>Gold Hero</strong> — 180+ consecutive days</li>
    <li><strong>Platinum Hero</strong> — 365+ consecutive days</li>
  </ul>
  <p>There's also a <strong>leaderboard</strong> of the top 10 longest-supporting Heroes, plus an opt-in ticker for anyone who wants the spotlight.</p>

  <h2>Five new converters</h2>
  <p>Alongside the Premium features and tool upgrades, we're adding five converters:</p>
  <ul>
    <li>PDF to HTML</li>
    <li>HTML to PDF</li>
    <li>PDF to PPTX</li>
    <li>PPTX to PDF</li>
    <li>Excel to PDF</li>
  </ul>

  <figure><img src="/static/blog/images/tool-all-tools-hero.jpg" alt="Convertica PDF tools collection" width="1280" height="800" loading="lazy"></figure>

  <h2>Thanks for being here</h2>
  <p>This is the release we're most proud of, and your feedback is what shaped it. Browse <a href="/en/all-tools/">all tools</a> to see what's available today, or try the <a href="/en/excel-to-pdf/">Excel to PDF converter</a> the moment it lands. More soon.</p>
