content_en: |
  <p>Quick update from the team: <strong>Convertica went live on December 8</strong>, and the full set of tools is now open to everyone. Thanks to everyone who has tried it in the first days.</p>

  <h2>We are still in active testing</h2>

  <p>We are watching how the platform behaves under real use, and we are honest that it is early days. Right now you might run into:</p>

  <ul>
    <li>A tool that behaves differently than you expected</li>
    <li>A conversion that still needs tuning</li>
    <li>The occasional small bug or rough edge</li>
  </ul>

  <p>None of this is unusual right after a launch, and every report we get helps us tighten things up faster.</p>

  <h2>Tell us what breaks</h2>

  <p>If something does not work, or you have an idea for what we should build next, send it our way through the contact form. We read every message, try to reproduce reported issues, and use what you tell us to decide what to fix first. Early feedback genuinely shapes where Convertica goes.</p>

  <h2>A bigger update is coming</h2>

  <p>We are already working on a larger release planned for <strong>late January to early February</strong>. It brings new features, better performance, and a smoother experience overall. We will write a follow-up post closer to the date with the specifics on what is new.</p>

  <h2>Try the tools</h2>

  <figure><img src="/static/blog/images/tool-all-tools-hero.jpg" alt="Convertica online PDF tools overview" width="1280" height="800" loading="lazy"></figure>

  <p>In the meantime, everything is live and free to use. Browse the full set on the <a href="/en/all-tools/">all tools</a> page, or jump straight into a common one like <a href="/en/pdf-to-word/">PDF to Word</a>. If you hit a snag, let us know. Thanks for being here early.</p>
