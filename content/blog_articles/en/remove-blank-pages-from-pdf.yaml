content_en: |
  Open a PDF that came out of a duplex scanner and you'll often find a blank page after every real one, because the scanner dutifully captured the back of every single-sided original. Open a contract template and you might find two blank pages reserved "for signatures." Open a merged document and you might find leftover separator pages from the source files. The classic culprit is the office Brother or Canon ADF model that defaults to two-sided scanning whether you asked for it or not.

  Removing them takes seconds in a browser. You don't need Adobe Acrobat. You don't need to print and re-scan. You don't need to retype anything. You just need a tool that lets you click the pages you don't want and download what is left.

  <figure><img src="/static/blog/images/tool-organize.jpg" alt="Convertica organize PDF tool showing thumbnails with blank pages selected for removal" width="1280" height="800" loading="lazy"></figure>

  <h2>Where blank pages come from</h2>

  Knowing the source helps you spot them faster:

  <ul>
    <li><strong>Duplex scanners on single-sided originals.</strong> The classic. Every other page in the output is empty.</li>
    <li><strong>Word docs with section breaks.</strong> Section breaks set to "next odd page" or "next even page" insert a blank when needed to maintain pagination, and that blank survives the export to PDF.</li>
    <li><strong>Form templates with placeholder pages.</strong> Many contract and report templates ship with pages reserved for "exhibits", "appendices", or signatures that you may or may not actually use.</li>
    <li><strong>Merged PDFs from mismatched sources.</strong> Combining files where each ended on an even-page boundary leaves blanks behind. Annual reports and pitch decks are common offenders.</li>
    <li><strong>Print drivers.</strong> "Print to PDF" with certain printer settings can append a confirmation page or padding page at the end. Older HP universal print drivers were notorious for this around 2018-2020.</li>
    <li><strong>Mobile scanner apps.</strong> Apps like CamScanner and Adobe Scan sometimes insert a "scanned with [app]" promotional page on the free tier, which feels less like a feature and more like a watermark you have to fight.</li>
  </ul>

  <h2>Step-by-step: remove pages visually</h2>

  This is the right approach when you can't easily predict which pages are blank without looking.

  <figure><img src="/static/blog/images/tool-organize.jpg" alt="Click thumbnails of blank PDF pages to remove them in one pass" width="1280" height="800" loading="lazy"></figure>

  <ol>
    <li>Open the <a href="/en/pdf-edit/rotate/">remove pages from PDF</a> tool and upload your file.</li>
    <li>Look at the thumbnail grid. Blanks are obvious: solid white tiles with no text or images. Pages with faint scanner noise still have visible texture, so they show as light gray rather than pure white.</li>
    <li>Click the pages you want to delete. Most tools highlight the selection with a colored border or trash icon.</li>
    <li>Confirm and download the cleaned-up file. Verify the page count matches what you expect.</li>
  </ol>

  If you also want to reorder or rotate while you're at it, doing all three in one sitting is faster than running three separate tools. The combined <a href="/en/pdf-organize/merge/">organize PDF pages with drag and drop</a> view lets you delete, drag, and rotate before exporting once.

  <h2>Step-by-step: remove pages by range</h2>

  When you already know the page numbers you want gone, typing them is faster than clicking.

  <ol>
    <li>Upload the PDF.</li>
    <li>Switch to range mode (most tools toggle between visual and range entry).</li>
    <li>Type your range using a comma-separated list with hyphens for spans. <code>3, 7-9, 12</code> means: delete page 3, pages 7 through 9, and page 12. Pages outside that list stay.</li>
    <li>Apply and download.</li>
  </ol>

  <blockquote class="callout">Page numbers in this syntax refer to physical pages, not the printed page numbers on the document. If your contract starts numbering at "1" on the third physical page, your "page 1" might be physical page 3.</blockquote>

  Worth knowing: most range fields don't accept open-ended ranges like <code>50-</code> meaning "everything from 50 to the end". You'll need to type the actual end-page (e.g. <code>50-78</code> for a 78-page file). Counting once at the start saves cycles of "wait, that didn't work" later.

  <h2>Removing vs hiding pages</h2>

  A few PDF tools (and Adobe Acrobat) let you "hide" pages rather than delete them. Hidden pages don't display but the data still exists in the file. Anyone who opens the file in another viewer, or who unhides them, can see the content again.

  For sensitive material this is a real problem. If you remove a salary page from an HR document by hiding it, the salary information still travels with the file. Permanent removal is the only safe answer when:

  <ul>
    <li>The pages contain confidential information that must not reach the recipient.</li>
    <li>You are sharing the file outside your organization.</li>
    <li>The file might be archived or forwarded.</li>
    <li>The document will be subject to e-discovery or freedom-of-information requests, where hidden content may still be discoverable.</li>
  </ul>

  Browser-based remove-pages tools delete the page data, not just hide it. Verify by reopening the result in a different viewer; the removed pages should be gone, not invisible. A quick paranoia check: open the cleaned file in any text editor (yes, even Notepad) and search for a unique word from the page you removed. If it doesn't appear, the page is genuinely gone.

  <h2>Re-numbering after removal</h2>

  Most PDFs don't have programmatic page numbers, just text "1", "2", "3" baked into each page during the original export. Removing pages doesn't magically renumber what is left. If your document had a numbered footer reading "Page 5 of 12" on every page, after removal you might have pages reading 1, 2, 4, 6, 7 of 12, which looks broken.

  Two options:

  <ul>
    <li><strong>Live with it</strong> for internal documents where the printed numbers don't really matter.</li>
    <li><strong>Re-number</strong> by stripping the existing footer and adding fresh ones. Tools that <a href="/en/pdf-edit/rotate/">add fresh page numbers</a> let you overwrite a header or footer area across the whole document in one pass.</li>
  </ul>

  Update any table of contents the same way. A TOC pointing to "page 7" when your new page 7 is now what was page 9 frustrates every reader. (I'd argue this is the second-most-common reason a colleague says "this PDF is broken" - the first being "the link from the TOC doesn't work either".)

  <h2>Bulk cleanup for scanned archives</h2>

  Cleaning a 200-page scan one click at a time is unpleasant. Two tricks help:

  <h3>Spotting blanks at scale</h3>

  Increase thumbnail size if the tool supports it. White rectangles jump out instantly. For very faint scanner noise, briefly squint at the page numbers; if you can't make out any text or shapes, it is blank.

  Some tools render thumbnails at very low resolution to save bandwidth. If your blanks aren't obviously white because of dithering or compression artifacts, switch to the larger thumbnail view (often a button labelled "Large preview" or "Detailed thumbnails") before scanning the file. The extra render time is worth not deleting a real page by mistake.

  <h3>The duplex-scanner shortcut</h3>

  If you scanned a stack of single-sided originals on a duplex scanner, every back side is blank. That means you want to delete every <strong>even-numbered</strong> physical page in the PDF. A range like <code>2, 4, 6, 8, 10, ...</code> works, and most tools let you generate that range with a "delete every nth page" or "even pages" option.

  Confirm by checking the first few results. If your scanner sometimes flips originals or if the stack started with a back side, the pattern will be off by one and you'll want to delete every odd page instead. The Fujitsu ScanSnap series is particularly prone to this when the auto-feeder grabs two sheets at once - your first page becomes the back of the pair, throwing the pattern off for the rest of the document.

  After cleanup, you may find the file would benefit from being broken into smaller documents. The <a href="/en/pdf-organize/split/">split into chapters instead</a> route works well when you cleaned up a 200-page archive that should really be five 40-page documents.

  <h2>Verifying before you ship</h2>

  Before you send a cleaned file to someone else, do two checks. First, confirm the page count is what you expected (210 pages in, every other page removed, 105 pages out). Second, scroll through the result quickly to make sure no real pages got caught up in the cleanup. Edge cases worth watching for: section title pages with very little text can look almost blank in a thumbnail and get accidentally deleted. So can pages that consist of a single image (a chart, a signature, a logo) when the thumbnail render scaled the image to invisibility.

  <h2>FAQ</h2>

  <h3>How do I remove blank pages from a 200-page scan automatically?</h3>
  <p>If the blanks follow a pattern (every other page from a duplex scanner), use range mode and delete the even-numbered pages in one operation. If they're scattered randomly, the visual thumbnail grid is faster than any rule because you can scroll quickly and click each white tile.</p>

  <h3>Will removing pages break my page numbering?</h3>
  <p>If your document has hard-coded page numbers in the footer (text like "Page 5 of 12"), yes. The remaining pages keep their original numbers. Either ignore it for internal use, or strip and re-add page numbers across the whole file after cleanup.</p>

  <h3>Can I undo a page removal?</h3>
  <p>The tool itself produces a new file, so your original is untouched on your computer. If you removed pages and downloaded the result, just go back to the original PDF if you made a mistake. Always keep originals until you've verified the cleaned-up version.</p>

  <h3>Why do removed pages sometimes "come back"?</h3>
  <p>That happens when the tool only hid pages rather than deleting them, or when the file was opened in an editor that restored from a saved revision. Use a tool that genuinely strips the page data, and verify by checking the final file size and page count match expectations.</p>

  <h3>Can I remove pages from a password-protected PDF?</h3>
  <p>You need to supply the password first. Most online page-remover tools prompt for it on upload. Without the password, you can't legitimately modify the file.</p>

