  <h2>How to choose a strong password for your ZIP</h2>

  <p>The encryption is only as strong as the password protecting it. AES-256 is theoretically unbreakable, but a weak password can be guessed or brute-forced offline once an attacker has the file.</p>

  <ul>
    <li><strong>Length over complexity.</strong> A 16-character random string is stronger than an 8-character string full of symbols. "CloudDeskLemonPaper7" is much harder to crack than "P@55w0rd!".</li>
    <li><strong>Use a password manager's generator.</strong> Tools like 1Password, Bitwarden, or KeePass generate random passwords you do not have to remember — you store them in the manager.</li>
    <li><strong>Avoid personal data.</strong> Names, birthdays, company names, and pet names can be guessed from public information.</li>
    <li><strong>Keep a backup copy.</strong> Store the password in your password manager the moment you create it. If you lose it, the file is unrecoverable — AES-256 cannot be reversed without the key.</li>
  </ul>

  <h2>How to remove the password from a ZIP file</h2>

  <p>If you no longer need the protection — for example, you have distributed the file and want an unencrypted copy for your own archive — Convertica's <a href="/archive/unlock/">Unlock ZIP tool</a> can remove the password for you.</p>

  <p>Important limitations to understand:</p>

  <ul>
    <li>You must know the current password. The tool decrypts the archive using the password you supply, then saves the result without encryption. It does not crack or bypass unknown passwords.</li>
    <li>If you have forgotten the password and no backup exists, the file cannot be recovered through any practical means. This is by design — it is what makes AES-256 secure.</li>
  </ul>

  <p>The process is the same as protection: upload the encrypted ZIP, enter the password, download the unlocked archive. No registration required.</p>

  <h2>Best practices summary</h2>

  <ul>
    <li>Always use AES-256. Never use ZipCrypto for anything sensitive.</li>
    <li>Tell recipients which archiver to install if they are not technical users.</li>
    <li>Send the password through a different channel than the file.</li>
    <li>Store the password in a password manager immediately — there is no recovery.</li>
    <li>Keep the original unprotected copy in a secure location so you can re-encrypt if needed.</li>
    <li>Verify the protected file opens correctly before sending. A typo in the password is not detectable until the recipient tries to open it.</li>
  </ul>

  <h2>FAQ</h2>

  <h3>Can Windows open a password-protected ZIP without extra software?</h3>
  <p>Only if the ZIP uses the older ZipCrypto encryption — which is weak enough to be cracked quickly. ZIPs encrypted with AES-256 (what Convertica uses) cannot be opened in Windows File Explorer. Tell your recipient to install 7-Zip, which is free and takes under a minute to set up.</p>

  <h3>Is the encryption strong enough for sensitive documents?</h3>
  <p>Yes. AES-256 is the same standard used to protect classified government information and financial data worldwide. The risk is almost always the password, not the algorithm — use a long, randomly generated password and you are well protected.</p>

  <h3>What happens if I forget the password?</h3>
  <p>The file is effectively unrecoverable. There is no master key, no recovery option, and no way to crack AES-256 within any practical timeframe. This is why keeping a copy of the password in a password manager — and keeping the original unencrypted files somewhere safe — is essential before you encrypt.</p>

  <h3>Can I password-protect a ZIP that already contains files?</h3>
  <p>Yes. The Protect ZIP tool works on any existing ZIP archive. If you have loose files, zip them first using Windows or macOS, then upload the ZIP to Convertica to add AES-256 password protection.</p>

  <h3>Does Convertica store my files after processing?</h3>
  <p>No. Files are processed in memory and the download link expires shortly after generation. Convertica does not retain your files, and no account or registration is required to use the tool.</p>

