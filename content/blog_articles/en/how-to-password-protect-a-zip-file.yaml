content_en: |
  A ZIP file is the most universal container for sharing multiple files at once. But by default it offers zero privacy — anyone who gets hold of the archive can open it instantly. Adding a password changes that: the contents become encrypted ciphertext that is unreadable without the key.

  This guide covers how to add strong password protection to a ZIP file, what encryption standard to choose (and why it matters for who can open the result), and how to remove the password later if you no longer need it.

  <h2>Why password-protect a ZIP file?</h2>

  <p>There are three common scenarios where an unprotected archive is a real risk:</p>

  <ul>
    <li><strong>Email attachments.</strong> Email is replicated across servers and backed up for years. A ZIP of contracts, payslips, or medical records sent unprotected can be read by anyone with access to those backups.</li>
    <li><strong>Cloud storage and shared drives.</strong> Uploading sensitive files to Google Drive, Dropbox, or a company SharePoint means the cloud provider and anyone with whom the folder is ever shared can access the contents.</li>
    <li><strong>USB and physical handoff.</strong> A USB stick can be lost, found, and plugged into any computer. An encrypted ZIP on the stick cannot be opened without the password.</li>
  </ul>

  <p>Password protection is not a substitute for all security measures — you still need a strong password and a secure way to share it. But it is the simplest layer of protection available without specialist software on either end.</p>

  <h2>AES-256 vs ZipCrypto — choose the right encryption</h2>

  <p>Not all ZIP password protection is equal. There are two main standards:</p>

  <ul>
    <li><strong>ZipCrypto (also called "traditional" or "Zip 2.0" encryption).</strong> Built into the original ZIP specification from the 1990s. It is weak — modern tools can crack it in seconds with a dictionary attack. Its only advantage is that Windows File Explorer and macOS Archive Utility can open it natively.</li>
    <li><strong>AES-256.</strong> The current gold standard, used by banks, governments, and major cloud storage providers. It is computationally infeasible to brute-force with any hardware that exists today. Convertica's Protect ZIP tool uses AES-256.</li>
  </ul>

  <blockquote class="callout">Use AES-256 for anything that actually matters. ZipCrypto offers a false sense of security — it delays a determined attacker by minutes, not years.</blockquote>

  <h3>Compatibility note: who can open an AES-256 ZIP?</h3>

  <p>The tradeoff with AES-256 is that the built-in archive tools in Windows and macOS do not support it:</p>

  <ul>
    <li><strong>Windows File Explorer</strong> — cannot open AES-256 encrypted ZIPs. It will either show an error or silently show an empty archive.</li>
    <li><strong>macOS Archive Utility (the built-in double-click extractor)</strong> — cannot open AES-256 encrypted ZIPs.</li>
  </ul>

  <p>Recipients need to install a free third-party archiver. All of the following support AES-256 and are free:</p>

  <ul>
    <li><strong>7-Zip</strong> (Windows) — free, open source, widely used.</li>
    <li><strong>WinRAR</strong> (Windows) — technically trial software but fully functional for opening ZIPs.</li>
    <li><strong>WinZip</strong> (Windows/macOS) — commercial but common in enterprise environments.</li>
    <li><strong>Keka</strong> (macOS) — free from the developer's website, paid on the Mac App Store.</li>
    <li><strong>The Unarchiver</strong> (macOS) — free on the Mac App Store, handles AES-256 ZIPs.</li>
  </ul>

  <p>When you send a password-protected ZIP, include a note telling the recipient which app to use if they do not already have one. This prevents the common complaint of "the file is corrupt" when the real issue is an incompatible extractor.</p>

