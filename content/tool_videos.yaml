# Per-tool YouTube tutorial videos (channel @Convertica-p4m, UC53pPAN3wswJxZ4rkqm7lXw).
#
# Rendered as a lazy "facade" embed on each tool page + emitted as VideoObject
# JSON-LD for video rich results (see templates/frontend/includes/youtube_video.html
# and video_jsonld.html). A tool with no entry here simply shows no video, so
# new videos can be added incrementally as they are published — no code change.
#
# Schema (all fields required):
#   <tool_key>:            # must match a key in TOOL_CONFIGS, or "homepage"
#     video_id: <11-char YouTube id>
#     upload_date: <ISO 8601, from the video's YouTube uploadDate>
#     duration: <ISO 8601 duration, e.g. PT1M38S>
#
# The video title/description shown to users and search engines are reused from
# the tool's own translated page_title / page_description, so nothing here is
# language-specific.

homepage:
  video_id: 53XxE5XBP24
  upload_date: "2026-07-06T11:31:42+00:00"
  duration: PT2M26S

