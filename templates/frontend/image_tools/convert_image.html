{% extends "frontend/converter_generic.html" %}
{% load i18n static minified_static %}

{% block edit_options %}
  <!-- Image Conversion Options -->
  <div class="mb-6 space-y-5 bg-gray-50 rounded-xl p-5 border border-gray-200">
    <h3 class="text-sm font-semibold text-gray-700 uppercase tracking-wide">
      {% trans "Conversion Options" %}
    </h3>

    <!-- Output Format (required) -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2" for="outputFormatSelect">
        {% trans "Convert to" %} <span class="text-red-500">*</span>
      </label>
      <select
        id="outputFormatSelect"
        name="output_format"
        required
        class="w-full sm:w-auto min-w-[260px] px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white text-gray-900 text-sm"
        onchange="toggleQualitySection(this.value)">
        <option value="" disabled selected>{% trans "Select output format..." %}</option>
        <option value="JPEG">JPEG &mdash; {% trans "photos, universal compatibility" %}</option>
        <option value="PNG">PNG &mdash; {% trans "lossless, supports transparency" %}</option>
        <option value="WebP">WebP &mdash; {% trans "modern web format, smallest size" %}</option>
        <option value="GIF">GIF &mdash; {% trans "animations, simple graphics" %}</option>
        <option value="BMP">BMP &mdash; {% trans "uncompressed bitmap" %}</option>
        <option value="TIFF">TIFF &mdash; {% trans "high quality, print/archival" %}</option>
      </select>
    </div>

    <!-- Quality Slider (visible only for JPEG / WebP) -->
    <div id="qualitySection" class="hidden">
      <label class="block text-sm font-medium text-gray-700 mb-2" for="qualityRange">
        {% trans "Quality" %}: <span id="qualityDisplay" class="font-bold text-blue-600">90%</span>
      </label>
      <input
        type="range"
        id="qualityRange"
        name="quality"
        min="10"
        max="100"
        value="90"
        step="1"
        class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
        aria-label="{% trans 'Output quality' %}"
        oninput="document.getElementById('qualityDisplay').textContent = this.value + '%'">
      <div class="flex justify-between text-xs text-gray-400 mt-1">
        <span>10% &mdash; {% trans "Smallest file" %}</span>
        <span>100% &mdash; {% trans "Best quality" %}</span>
      </div>
    </div>
  </div>

  <script nonce="{{ csp_nonce }}">
    function toggleQualitySection(fmt) {
      var section = document.getElementById('qualitySection');
      if (!section) return;
      var lossyFormats = ['JPEG', 'WebP'];
      if (lossyFormats.indexOf(fmt) !== -1) {
        section.classList.remove('hidden');
      } else {
        section.classList.add('hidden');
      }
    }
    // Run on page load in case a value is pre-selected
    (function() {
      var sel = document.getElementById('outputFormatSelect');
      if (sel) toggleQualitySection(sel.value);
    })();
  </script>
{% endblock %}
