{% comment %}
YouTube tutorial embed — click-to-play facade (lite-embed pattern).

History, do not re-litigate without new GSC evidence:
- facade (v2.2.135) → GSC "could not determine the prominent video" → iframe;
- native lazy <iframe> (v2.2.141) → GSC then reported the real blocker:
  "Video isn't on a watch page" (22/22 videos, 2026-07-16) — Google only
  indexes videos that are the MAIN content of the page, which tool pages can
  never satisfy. Embed markup cannot fix that, so the embed is purely for
  users, and the facade wins: no YT player JS (~500 KB), no third-party
  cookie, no permissions-policy console errors on page load (all were PSI
  findings), homepage mobile LCP 8.6 s → normal. Video rich results would
  need dedicated watch pages. VideoObject JSON-LD stays for the Enhancements
  report / Bing.

Usage:
{% include "frontend/includes/youtube_video.html" with video_id="ID" title="Title" %}

Optional parameters:
- video_id: YouTube video ID (required)
- title: Video title for accessibility (required)
- aspect_ratio: "16/9" (default) or "4/3"
- heading_level: "h2", "h3", "h4" (default: "h4" for proper heading order)
- hide_heading: True to suppress the built-in heading (page supplies its own)
{% endcomment %}

{% load i18n %}

<div class="youtube-video-wrapper mt-6 sm:mt-8">
  {# Built-in heading; hide it with hide_heading=True when the page supplies its own (e.g. homepage). #}
  {% if not hide_heading %}
  {# Use h4 by default for proper heading hierarchy (pages have h1 title, h2 sections) #}
    {% if heading_level == "h2" %}
      <h2 class="text-base sm:text-lg font-bold mb-3 text-gray-900 dark:text-white flex items-center gap-2">
    {% elif heading_level == "h3" %}
      <h3 class="text-base sm:text-lg font-bold mb-3 text-gray-900 dark:text-white flex items-center gap-2">
    {% else %}
      <h4 class="text-base sm:text-lg font-bold mb-3 text-gray-900 dark:text-white flex items-center gap-2">
    {% endif %}
    <svg class="w-5 h-5 sm:w-6 sm:h-6 text-red-600" viewBox="0 0 24 24" fill="currentColor">
      <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
    </svg>
    {% trans "Video Tutorial" %}
    {% if heading_level == "h2" %}
      </h2>
    {% elif heading_level == "h3" %}
      </h3>
    {% else %}
      </h4>
    {% endif %}
  {% endif %}

  {# aspect-ratio box reserves space so neither facade nor iframe causes layout shift (CLS). #}
  <div class="relative w-full rounded-xl overflow-hidden shadow-lg bg-gray-900"
       style="aspect-ratio: {{ aspect_ratio|default:'16/9' }};">
    <button type="button"
            class="yt-facade absolute inset-0 w-full h-full block cursor-pointer group"
            data-video-id="{{ video_id }}"
            data-title="{{ title }}"
            aria-label="{% blocktrans %}Play video: {{ title }}{% endblocktrans %}">
      {# hqdefault is 480x360 (4:3); object-cover crops it to the 16:9 box like YT's own poster #}
      <img src="https://i.ytimg.com/vi/{{ video_id }}/hqdefault.jpg"
           alt=""
           width="480" height="360"
           loading="lazy"
           decoding="async"
           class="absolute inset-0 w-full h-full object-cover">
      <span class="absolute inset-0 flex items-center justify-center">
        <svg class="w-16 h-16 sm:w-20 sm:h-20 drop-shadow-lg opacity-90 group-hover:opacity-100 transition-opacity" viewBox="0 0 68 48" aria-hidden="true">
          <path d="M66.52 7.74c-.78-2.93-2.49-5.41-5.42-6.19C55.79.13 34 0 34 0S12.21.13 6.9 1.55c-2.93.78-4.63 3.26-5.42 6.19C.06 13.05 0 24 0 24s.06 10.95 1.48 16.26c.78 2.93 2.49 5.41 5.42 6.19C12.21 47.87 34 48 34 48s21.79-.13 27.1-1.55c2.93-.78 4.64-3.26 5.42-6.19C67.94 34.95 68 24 68 24s-.06-10.95-1.48-16.26z" fill="#f00"/>
          <path d="M45 24 27 14v20" fill="#fff"/>
        </svg>
      </span>
    </button>
  </div>
</div>

{% comment %}
  One global click handler regardless of how many facades are on the page;
  guarded so a second include doesn't double-register. The injected iframe's
  allow= omits accelerometer/gyroscope — our Permissions-Policy denies them
  and requesting them logs console violations.
{% endcomment %}
<script nonce="{{ csp_nonce }}">
  if (!window.__ytFacadeInit) {
    window.__ytFacadeInit = true;
    document.addEventListener('click', function (e) {
      var btn = e.target.closest('.yt-facade');
      if (!btn) return;
      var iframe = document.createElement('iframe');
      iframe.className = 'absolute inset-0 w-full h-full';
      iframe.src = 'https://www.youtube-nocookie.com/embed/' + btn.dataset.videoId + '?rel=0&autoplay=1';
      iframe.title = btn.dataset.title || 'YouTube video';
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('allow', 'autoplay; clipboard-write; encrypted-media; picture-in-picture');
      iframe.setAttribute('allowfullscreen', '');
      btn.replaceWith(iframe);
    });
  }
</script>
